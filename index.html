<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>내신핏</title>
<meta name="theme-color" content="#FFFFFF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOSS DESIGN SYSTEM
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  /* Core Palette */
  --blue: #3182F6;
  --blue-d: #1B64DA;
  --blue-l: #E8F3FF;
  --blue-xl: #F5F9FF;
  --red: #F04452;
  --red-l: #FFF0F0;
  --green: #00C072;
  --green-l: #E8FAF0;
  --yellow: #F59E0B;
  --yellow-l: #FFF8E1;
  --purple: #8B5CF6;
  --purple-l: #F3EEFF;

  /* Grayscale */
  --g900: #191F28;
  --g800: #333D4B;
  --g700: #4E5968;
  --g600: #6B7684;
  --g500: #8B95A1;
  --g400: #B0B8C1;
  --g300: #D1D6DB;
  --g200: #E5E8EB;
  --g100: #F2F4F6;
  --g50:  #F8F9FA;
  --white: #FFFFFF;

  /* Semantic */
  --bg: var(--g100);
  --card: var(--white);
  --text: var(--g900);
  --sub: var(--g600);
  --hint: var(--g400);
  --border: var(--g200);
  --divider: var(--g100);

  /* Radius */
  --r-xl: 20px;
  --r-lg: 16px;
  --r-md: 12px;
  --r-sm: 8px;

  /* Shadows — very subtle, Toss style */
  --sh-sm: 0 1px 2px rgba(0,0,0,.04);
  --sh-md: 0 2px 8px rgba(0,0,0,.06);
  --sh-lg: 0 8px 24px rgba(0,0,0,.08);

  /* Motion */
  --ease: cubic-bezier(.22,1,.36,1);
  --dur: .3s;

  /* Nav / overlay backgrounds */
  --nav-bg: rgba(255,255,255,.72);
  --bottom-bg: rgba(255,255,255,.85);
}

/* ━━ Dark Mode ━━ */
[data-theme="dark"] {
  --blue-l: #1A2F4D;
  --blue-xl: #141E30;
  --red-l: #3D1A1E;
  --green-l: #0F2E1F;
  --yellow-l: #2E2510;
  --purple-l: #1E1535;

  --g900: #ECECEC;
  --g800: #D1D1D1;
  --g700: #B0B0B0;
  --g600: #8E8E8E;
  --g500: #6E6E6E;
  --g400: #555555;
  --g300: #3A3A3A;
  --g200: #2C2C2C;
  --g100: #222222;
  --g50:  #1C1C1C;
  --white: #171717;

  --bg: #111111;
  --card: #1A1A1A;
  --text: #ECECEC;
  --sub: #8E8E8E;
  --hint: #555555;
  --border: #2C2C2C;
  --divider: #222222;

  --sh-sm: 0 1px 2px rgba(0,0,0,.2);
  --sh-md: 0 2px 8px rgba(0,0,0,.3);
  --sh-lg: 0 8px 24px rgba(0,0,0,.4);

  --nav-bg: rgba(17,17,17,.85);
  --bottom-bg: rgba(17,17,17,.85);
}

/* ━━ Reset ━━ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}

/* ━━ App Shell ━━ */
.app{max-width:480px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative}

/* ━━ Page Transitions ━━ */
.page{animation:pageEnter var(--dur) var(--ease)}
.page.slide-left{animation:slideLeft var(--dur) var(--ease)}
.page.slide-right{animation:slideRight var(--dur) var(--ease)}
@keyframes pageEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}

/* ━━ Skeleton Loading ━━ */
.skeleton{background:var(--g100);border-radius:var(--r-md);position:relative;overflow:hidden}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 1.5s infinite}
[data-theme="dark"] .skeleton::after{background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ━━ Navigation Bar ━━ */
.nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 20px;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
.nav-back{width:32px;height:32px;border:none;background:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text);margin-left:-6px;border-radius:var(--r-sm);transition:background .15s}
.nav-back:active{background:var(--g100)}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;margin-right:26px}

/* ━━ Typography ━━ */
.t-display{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.3}
.t-heading{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1.35}
.t-title{font-size:17px;font-weight:700;line-height:1.4}
.t-body{font-size:15px;font-weight:500;line-height:1.6}
.t-caption{font-size:13px;font-weight:500;line-height:1.5}
.t-tiny{font-size:11px;font-weight:600;line-height:1.4}
.c-sub{color:var(--sub)}.c-hint{color:var(--hint)}.c-blue{color:var(--blue)}.c-red{color:var(--red)}.c-green{color:var(--green)}

/* ━━ Section ━━ */
.section{padding:0 20px}
.sec-label{font-size:13px;font-weight:600;color:var(--sub);padding:24px 20px 8px}

/* ━━ Card ━━ */
.card{background:var(--card);border-radius:var(--r-lg);margin:0 20px 10px;padding:20px;box-shadow:var(--sh-sm)}
.card-flush{margin:0;border-radius:0;box-shadow:none;border-bottom:1px solid var(--divider)}

/* ━━ Toss Button ━━ */
.btn{width:100%;height:54px;border:none;border-radius:var(--r-md);font-size:16px;font-weight:700;transition:all .15s;position:relative;overflow:hidden}
.btn:active{transform:scale(.985)}
.btn::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .15s}
.btn:active::after{background:rgba(0,0,0,.06)}
.btn-blue{background:var(--blue);color:white}
.btn-blue:disabled{background:var(--g300);color:white;transform:none}
.btn-red{background:var(--red);color:white}
.btn-ghost{background:var(--white);color:var(--text);border:1.5px solid var(--border)}
.btn-sm{height:44px;font-size:14px;border-radius:var(--r-sm)}

/* ━━ Fixed Bottom ━━ */
.bottom-fix{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 20px calc(12px + env(safe-area-inset-bottom));background:var(--bottom-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);z-index:200}
.bottom-spacer{height:90px}

/* ━━ Input ━━ */
.input{width:100%;height:50px;padding:0 16px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:15px;outline:none;background:var(--white);color:var(--text);transition:border .2s,box-shadow .2s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.input::placeholder{color:var(--hint)}
.select{-webkit-appearance:none;appearance:none}

/* ━━ Chip ━━ */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{height:44px;padding:0 18px;border-radius:22px;font-size:14px;font-weight:500;border:1.5px solid var(--border);background:var(--white);display:inline-flex;align-items:center;transition:all .15s;user-select:none;color:var(--text)}
.chip:active{transform:scale(.94)}
.chip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue);font-weight:600}
.chip-sm{height:40px;padding:0 14px;font-size:13px;border-radius:20px}

/* ━━ Option Card (Radio style) ━━ */
.opt{padding:18px;border:1.5px solid var(--border);border-radius:var(--r-lg);display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:all .15s;background:var(--white)}
.opt:active{transform:scale(.985)}
.opt.on{border-color:var(--blue);background:var(--blue-xl)}
.opt-icon{font-size:26px;flex-shrink:0}
.opt-body{flex:1}.opt-body h4{font-size:15px;font-weight:600}.opt-body p{font-size:12px;color:var(--sub);margin-top:2px}
.opt-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.opt.on .opt-check{border-color:var(--blue);background:var(--blue);color:white}
.opt.on .opt-check::after{content:'✓';font-size:12px;font-weight:800}

/* ━━ Accordion ━━ */
.acc{background:var(--card);border-radius:var(--r-lg);margin:0 20px 8px;box-shadow:var(--sh-sm);overflow:hidden}
.acc-trigger{width:100%;padding:16px 20px;border:none;background:none;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;color:var(--text);text-align:left}
.acc-trigger:active{background:var(--g50)}
.acc-trigger .lf{display:flex;align-items:center;gap:8px}
.badge{background:var(--blue);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.arrow{font-size:11px;color:var(--hint);transition:transform .25s var(--ease)}.arrow.open{transform:rotate(180deg)}
.acc-content{padding:0 20px 16px}

/* Smooth accordion slide — grid technique (no max-height hack) */
.acc-slide{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s var(--ease);overflow:hidden}
.acc-slide.open{grid-template-rows:1fr}
.acc-slide>div{overflow:hidden}
.sub-section{padding:14px 0;border-top:1px solid var(--divider)}
.sub-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0}
.sub-trigger span:first-child{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}

/* ━━ Slider ━━ */
.slider-wrap{display:flex;align-items:center;gap:16px}
.slider-wrap input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--g200);border-radius:2px;outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--blue);border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(49,130,246,.3)}
.slider-num{font-size:36px;font-weight:900;color:var(--blue);min-width:52px;text-align:right;font-variant-numeric:tabular-nums}

/* ━━ Exam ━━ */
.exam-bar{position:sticky;top:0;z-index:100;background:var(--bottom-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:14px 20px}
.progress-line{height:3px;background:var(--g200);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s var(--ease)}
.timer-display{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;transition:color .3s}
.timer-display.warn{color:var(--yellow)}.timer-display.danger{color:var(--red);animation:timerPulse .6s infinite}
@keyframes timerPulse{50%{opacity:.3}}

.q-dots{display:flex;gap:4px;justify-content:center;padding:10px 16px;flex-wrap:wrap}
.qd{width:36px;height:36px;border-radius:50%;border:none;font-size:11px;font-weight:700;background:var(--g100);color:var(--sub);cursor:pointer;transition:all .2s var(--ease);display:flex;align-items:center;justify-content:center}
.qd.cur{background:var(--blue);color:white;transform:scale(1.1)}
.qd.done{background:var(--blue-l);color:var(--blue)}

.q-card{background:var(--card);margin:0 20px 12px;border-radius:var(--r-xl);padding:24px;box-shadow:var(--sh-md)}
.q-meta{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.q-no{background:var(--g900);color:white;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.q-diff{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px}
.q-diff.e{background:var(--green-l);color:var(--green)}.q-diff.m{background:var(--yellow-l);color:#D97706}.q-diff.h{background:var(--red-l);color:var(--red)}
.q-pts{font-size:12px;color:var(--sub);font-weight:600}
.q-type{font-size:11px;color:var(--sub);background:var(--g100);padding:4px 8px;border-radius:var(--r-sm);font-weight:600}
.q-stem{font-size:15px;font-weight:600;line-height:1.75;margin-bottom:16px;word-break:keep-all}
.q-passage{font-size:14px;line-height:2;padding:18px 20px;background:var(--g50);border-radius:var(--r-md);margin-bottom:16px;border-left:3px solid var(--blue);color:var(--g700)}
.q-passage b{color:var(--blue);font-weight:700}
.q-passage u{text-decoration-color:var(--red);text-underline-offset:3px}
.q-passage i{color:var(--sub)}

/* Choice buttons with ripple */
.choices{display:flex;flex-direction:column;gap:8px}
.c-btn{width:100%;text-align:left;padding:14px 16px;border-radius:var(--r-md);border:1.5px solid var(--border);background:var(--white);font-size:14px;line-height:1.65;cursor:pointer;transition:all .15s;color:var(--text);display:flex;align-items:baseline;gap:10px;position:relative;overflow:hidden}
.c-btn:active{transform:scale(.985)}
.c-btn .c-n{font-weight:700;color:var(--hint);flex-shrink:0;min-width:16px;transition:color .15s}
.c-btn.on{border-color:var(--blue);background:var(--blue-l)}
.c-btn.on .c-n{color:var(--blue)}

/* Written input */
.w-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:15px;font-family:inherit;outline:none;transition:all .2s;background:var(--white)}
.w-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}

/* ━━ Result ━━ */
/* Staggered fade-in animation */
@keyframes rFadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.r-anim{opacity:0;animation:rFadeUp .5s var(--ease) forwards}

.result-top{text-align:center;padding:56px 20px 40px;position:relative;overflow:hidden;background:var(--white)}

/* Score ring */
.score-ring{position:relative;width:160px;height:160px;margin:0 auto}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring .ring-bg{fill:none;stroke:var(--g100);stroke-width:8}
.score-ring .ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.5s var(--ease)}
.score-ring .ring-fill.pass{stroke:var(--blue)}.score-ring .ring-fill.fail{stroke:var(--red)}
.score-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-num{font-size:48px;font-weight:900;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.score-num .unit{font-size:18px;color:var(--sub);font-weight:700}
.pass-badge{display:inline-flex;align-items:center;gap:4px;margin-top:20px;padding:7px 18px;border-radius:24px;font-size:14px;font-weight:700}
.pass-badge.y{background:var(--blue-l);color:var(--blue)}.pass-badge.n{background:var(--red-l);color:var(--red)}

.r-stats{display:flex;justify-content:center;gap:0;margin-top:24px}
.r-stat{flex:1;text-align:center;position:relative}
.r-stat+.r-stat::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:1px;background:var(--g200)}
.r-stat .sv{font-size:20px;font-weight:800}.r-stat .sl{font-size:11px;color:var(--hint);margin-top:3px;font-weight:500}
.r-stat .sv.g{color:var(--green)}.r-stat .sv.r{color:var(--red)}

.r-sec{background:var(--card);border-radius:var(--r-lg);margin:0 20px 12px;padding:22px;box-shadow:var(--sh-sm)}
.r-sec-h{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--g900)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-cell{padding:14px;background:var(--g50);border-radius:var(--r-md)}.info-cell .ik{font-size:11px;color:var(--hint);font-weight:600}.info-cell .iv{font-size:14px;font-weight:700;margin-top:3px}
.info-cell.hl{background:var(--blue-xl)}.info-cell.hl .iv{color:var(--blue)}

.lv-card{text-align:center;padding:20px 0}
.lv-emoji{font-size:48px;animation:lvFloat 3s ease-in-out infinite}
@keyframes lvFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.lv-name{font-size:22px;font-weight:900;color:var(--blue);margin-top:8px}
.lv-range{font-size:12px;color:var(--hint);margin-top:4px}
.lv-bar{height:4px;background:var(--g100);border-radius:2px;margin:16px 0 10px;overflow:hidden}
.lv-fill{height:100%;border-radius:2px;background:var(--blue);width:0}
.lv-msg{font-size:13px;color:var(--sub)}

.type-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.type-row .tl{min-width:56px;font-size:12px;font-weight:600;color:var(--sub);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-row .bar{flex:1;height:6px;background:var(--g100);border-radius:3px;overflow:hidden}
.type-row .fill{height:100%;border-radius:3px;width:0}
.type-row .tp{min-width:40px;font-size:12px;font-weight:700;text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{padding:5px 12px;border-radius:14px;font-size:12px;font-weight:600}
.tag.g{background:var(--green-l);color:var(--green)}.tag.r{background:var(--red-l);color:var(--red)}

.plan{display:flex;gap:16px;padding:16px;background:var(--g50);border-radius:var(--r-md);align-items:center}
.plan-i{font-size:24px;flex-shrink:0}.plan h4{font-size:14px;font-weight:700}.plan p{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.5}

.act-grid{display:flex;gap:8px}
.act{flex:1;padding:14px 4px;border-radius:var(--r-md);background:var(--g50);text-align:center;transition:all .15s;font-family:inherit;border:none;cursor:pointer}
.act:active{transform:scale(.94);background:var(--g200)}
.act.primary{background:var(--blue);color:white}
.act .ai{font-size:20px;display:block;margin-bottom:4px}.act .al{font-size:11px;font-weight:600;display:block;color:var(--sub)}
.act.primary .al{color:rgba(255,255,255,.8)}

/* Review accordion */
.rev{border:1px solid var(--g100);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden}
.rev-h{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--white);transition:background .15s}
.rev-h:active{background:var(--g50)}
.rev-h .ri{font-size:13px;flex-shrink:0}.rev-h .rt{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rev-h .rp{font-size:12px;color:var(--hint);flex-shrink:0}.rev-h .ra{font-size:11px;color:var(--hint);transition:transform .25s var(--ease);flex-shrink:0}
.rev-b{max-height:0;overflow:hidden;transition:max-height .45s var(--ease),padding .3s var(--ease);padding:0 16px}
.rev-b.open{max-height:8000px;padding:16px}
.ans-cmp{display:flex;gap:8px;margin-bottom:16px}
.ans-box{flex:1;padding:12px;border-radius:var(--r-sm);text-align:center;font-weight:700;font-size:14px}
.ans-box .label{font-size:11px;font-weight:600;opacity:.7;margin-bottom:3px}
.ans-box.ok{background:var(--green-l);color:var(--green)}.ans-box.no{background:var(--red-l);color:var(--red)}.ans-box.cor{background:var(--green-l);color:var(--green)}
.det-tag{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:6px}
.det-tag.b{background:var(--blue-l);color:var(--blue)}.det-tag.g{background:var(--g100);color:var(--sub)}
.det-box{font-size:13px;line-height:1.9;padding:14px 16px;background:var(--g50);border-radius:var(--r-sm);margin-bottom:8px;word-break:keep-all}
.det-box.hl{border-left:3px solid var(--blue);background:var(--blue-xl)}

/* Confetti canvas */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

/* Toast — Toss style */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--g900);color:white;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:all .35s var(--ease);z-index:1000;pointer-events:none;box-shadow:var(--sh-lg);white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}}
.modal-box{background:var(--white);border-radius:var(--r-xl);padding:32px 24px 24px;max-width:320px;width:100%;text-align:center;box-shadow:var(--sh-lg);animation:modalPop .3s var(--ease)}
@keyframes modalPop{from{transform:scale(.92);opacity:0}}

/* Bottom Sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--white);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:480px;padding:8px 20px calc(24px + env(safe-area-inset-bottom));animation:sheetUp .35s var(--ease)}
@keyframes sheetUp{from{transform:translateY(100%)}}
.sheet-bar{width:36px;height:4px;background:var(--g300);border-radius:2px;margin:8px auto 24px}

/* ━━ Tab Bar ━━ */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);z-index:200;padding:6px 0 calc(6px + env(safe-area-inset-bottom));border-top:1px solid var(--divider)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:none;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.tab-item:active{transform:scale(.9)}
.tab-icon{font-size:22px;line-height:1;transition:transform .2s var(--ease)}
.tab-label{font-size:10px;font-weight:600;color:var(--hint);transition:color .15s}
.tab-item.active .tab-icon{transform:scale(1.1)}
.tab-item.active .tab-label{color:var(--blue);font-weight:700}
.tab-spacer{height:calc(72px + env(safe-area-inset-bottom))}

/* ━━ Toss Micro Animations ━━ */
/* Staggered card reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .45s var(--ease),transform .45s var(--ease)}
.reveal.show{opacity:1;transform:translateY(0)}

/* Tab icon bounce */
@keyframes tabBounce{0%{transform:scale(1)}30%{transform:scale(1.25) translateY(-3px)}60%{transform:scale(.95)}100%{transform:scale(1.1)}}
.tab-bounce .tab-icon{animation:tabBounce .4s var(--ease)}

/* Number count-up — handled in JS */

/* Correct answer spring */
@keyframes springCheck{0%{transform:scale(0) rotate(-45deg);opacity:0}50%{transform:scale(1.3) rotate(0deg)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
.spring-check{animation:springCheck .5s var(--ease)}

/* Wrong answer shake */
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.shake{animation:shake .4s var(--ease)}

/* Scale pop (badges, icons) */
@keyframes scalePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.scale-pop{animation:scalePop .4s var(--ease) forwards;opacity:0}

/* Responsive */
@media(max-width:380px){.act-grid{flex-wrap:wrap}.info-grid{grid-template-columns:1fr}.score-num{font-size:56px}}
</style>
</head>

<script>
const FALLBACK_FULL_PASSAGE=`Be Proud of Who You Are
Laura Thompson
Hello, my name is Laura Thompson, and I'm a guidance counselor at the local college. I also have a social media channel where I give advice to young students like you. Today I'd like to talk to you about two things that I hope will inspire you.
Let me start by asking you a question. Have you ever asked yourself whether you made a good impression on someone you just met? In fact, most people believe they make a worse impression than they actually do. Researchers performed an experiment where students were paired up for five-minute ice breaking conversations. They were then asked to rate how much they liked their partners. Additionally, researchers asked participants if they thought their partners liked them. Most participants' estimations of their partners' responses were pessimistic, which were opposite to the real responses. It turns out that participants do not make bad impressions but make better impressions than they think.
The researchers coined a new term, the "liking gap," for this difference in perception or the mismatch between how we perceive ourselves and what others actually think of us. How is this helpful for you? We often underestimate ourselves based on our assumption of how others might judge us. In other words, our fixed attitudes may prevent us from reaching our true potential. Don't worry about the impression you think you make on people; chances are you can be confident that the impression you make is just fine.
The second point I want to make today is about thinking that your personality is fixed. Many people believe that their personality falls into a specific category and often blame their weaknesses or failures on their personality type. For example, they may say they can't do something because they aren't that kind of person. However, personality categorizations are neither absolute nor permanent.
Try to remember yourself from ten years ago. Who was your favorite singer? What did you hope to become when you grow up? Do you feel the same way now? What will your answers be 10 years from now? I bet you don't know. Just like your likes and future dreams keep changing, so do you. If you choose to behave differently and make needed changes, your personality will also change. People are predictable and consistent over time only because they choose to be, so don't limit yourself to a certain type. Start crafting the person you want to become today.

"Giving Up" Has No Place in My Dictionary!
Jake Miller
Hello, everyone! Thank you for your warm welcome. It's good to be back home, but I'm visiting you today not to perform but to talk to you about my life as a musician. Last year, after 20 years of hard work, I finally signed my first record company contract. I'd like to tell you a hopeful story and give some insight into the hard work that I had to put in.
Look at this picture of Picasso's The Old Guitarist behind me. My grandfather was a classical guitarist, and on my 13th birthday, he gave me this picture and a new guitar. After he passed away, I hung it up in my room as a reminder of his love for music.
I wasn't a musical genius, but I was better than most. I was popular at school festivals, and I thought I was born to be a musician. But things were far from easy. In college, I had to compete with classmates who were definitely more capable than I was. I don't even remember how many contests I went to and came up short. I kept failing no matter how hard I tried. It seemed like every disappointment made me lose hope more and more. I wanted to give up.
The funny thing was whenever anyone asked me to play a song for them, I would be so happy. Although my dream was to record an album, the reality was I probably wouldn't make it. Then one day, I looked at the picture of The Old Guitarist on my wall. I suddenly remembered what my grandfather had told me about Picasso: only a tiny fraction of the thousands of artworks he created during his lifetime are recognized by the public. Then I thought of my grandfather and how he loved playing, practicing his art his entire life, even without fame. I realized the only way to become an old guitarist like him was to keep playing.
The happy ending to this story is that after having sent my recordings to countless producers, I finally found one who was eager to work with me. One thing led to another, and I finally signed a record deal. Opportunities only come to those who are prepared. I had spent years performing on unknown streets and writing songs no one recognized. The difficulties I faced were part of my journey. If you love something, keep trying. Someday an opportunity may come knocking at your door, and you have to be ready to welcome it.`;

const FALLBACK_QUESTION_BANK = {
  "단어테스트": {
    "영어1/비상홍/1과": [
{id:1,type:`(A)(B)(C) 조합형`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`(A) worse — (B) pessimistic — (C) opposite`,`(A) better — (B) optimistic — (C) similar`,`(A) worse — (B) optimistic — (C) opposite`,`(A) better — (B) pessimistic — (C) similar`,`(A) worse — (B) pessimistic — (C) similar`],passage:`In fact, most people believe they make a (A)[<b>worse / better</b>] impression than they actually do. Researchers performed an experiment where students were paired up for five-minute ice breaking conversations. They were then asked to rate how much they liked their partners. Additionally, researchers asked participants if they thought their partners liked them. Most participants' estimations of their partners' responses were (B)[<b>pessimistic / optimistic</b>], which were (C)[<b>opposite / similar</b>] to the real responses.`,stem:`다음 글의 (A), (B), (C)의 각 괄호 안에서 문맥에 맞는 표현으로 가장 적절한 것은?`,det:{korean:`사실, 대부분의 사람들은 자신이 실제로 주는 것보다 더 <b>나쁜</b> 인상을 준다고 믿습니다. 연구자들은 학생들이 짝을 이루어 5분간 서먹함을 푸는 대화를 하는 실험을 수행했습니다. 그러고 나서 그들은 짝이 얼마나 마음에 들었는지 평가하도록 요청받았습니다. 추가로, 연구자들은 참가자들에게 짝이 자신을 좋아한다고 생각하는지 물었습니다. 짝의 반응에 대한 참가자 대부분의 평가는 <b>비관적</b>이었는데, 그것은 실제의 반응과 <b>정반대</b>였습니다.`,analysis:`✅ ① worse–pessimistic–opposite: 실제보다 '더 나쁜' 인상을 준다고 믿고, 추정은 '비관적'이었으며 실제와 '반대'였음 ❌ ② better–optimistic–similar: 문맥상 반대 의미 ❌ ③ optimistic은 pessimistic이어야 함 ❌ ④ better는 worse여야 함 ❌ ⑤ similar는 opposite여야 함`,tip:`liking gap 실험: 사람들은 자신이 주는 인상을 실제보다 과소평가(pessimistic)한다는 내용입니다.`}},
{id:2,type:`(A)(B)(C) 조합형`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`(A) genius — (B) far from — (C) cooperate`,`(A) amateur — (B) close to — (C) compete`,`(A) genius — (B) close to — (C) cooperate`,`(A) genius — (B) far from — (C) compete`,`(A) amateur — (B) far from — (C) compete`],passage:`I wasn't a musical (A)[<b>genius / amateur</b>], but I was better than most. I was popular at school festivals, and I thought I was born to be a musician. But things were (B)[<b>far from / close to</b>] easy. In college, I had to (C)[<b>compete / cooperate</b>] with classmates who were definitely more capable than I was.`,stem:`다음 글의 (A), (B), (C)의 각 괄호 안에서 문맥에 맞는 표현으로 가장 적절한 것은?`,det:{korean:`저는 음악 <b>천재</b>는 아니었지만 대부분의 사람보다 더 나았습니다. 저는 학교 축제에서 인기가 많았고 뮤지션이 되기 위해 태어났다고 생각했습니다. 그러나 상황은 <b>전혀</b> 쉽지 않았습니다. 대학에서 저는 저보다 분명히 더 능력 있는 동급생들과 <b>경쟁</b>해야 했습니다.`,analysis:`✅ ④ genius–far from–compete: 천재는 아니지만 대부분보다 나았고, 쉽지 않았으며(far from easy), 동급생과 경쟁했음 ❌ ① cooperate는 compete여야 함 ❌ ② amateur+close to는 문맥 반대 ❌ ③ close to+cooperate 둘 다 오류 ❌ ⑤ amateur는 genius여야 함`,tip:`far from + 형용사 = '전혀 ~하지 않은'이라는 숙어 표현을 기억하세요.`}},
{id:3,type:`(A)(B)(C) 조합형`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`(A) mismatch — (B) overestimate — (C) prevent`,`(A) agreement — (B) underestimate — (C) encourage`,`(A) mismatch — (B) underestimate — (C) encourage`,`(A) agreement — (B) overestimate — (C) prevent`,`(A) mismatch — (B) underestimate — (C) prevent`],passage:`The researchers coined a new term, the 'liking gap,' for this difference in perception or the (A)[<b>mismatch / agreement</b>] between how we perceive ourselves and what others actually think of us. We often (B)[<b>underestimate / overestimate</b>] ourselves based on our assumption of how others might judge us. In other words, our fixed attitudes may (C)[<b>prevent / encourage</b>] us from reaching our true potential.`,stem:`다음 글의 (A), (B), (C)의 각 괄호 안에서 문맥에 맞는 표현으로 가장 적절한 것은?`,det:{korean:`연구자들은 이러한 인식의 차이 또는 우리가 우리 자신을 어떻게 인식하는지와 다른 사람들이 실제로 우리를 어떻게 생각하는지 간의 <b>불일치</b>에 대해 '호감 격차'라는 새로운 용어를 만들었습니다. 우리는 흔히 다른 사람이 우리를 어떻게 판단할지에 대한 추정에 근거하여 우리 자신을 <b>과소평가</b>합니다. 다시 말해, 우리의 고정된 태도는 우리가 진정한 잠재력에 도달하는 것을 <b>막을</b> 수 있습니다.`,analysis:`✅ ⑤ mismatch–underestimate–prevent: '불일치', 자신을 '과소평가', 잠재력 도달을 '막는다' ❌ ① overestimate는 underestimate여야 함 ❌ ② agreement+encourage 모두 반대 ❌ ③ encourage는 prevent여야 함 ❌ ④ agreement는 mismatch여야 함`,tip:`liking gap의 핵심: 자기 인식과 타인의 실제 평가 사이의 '불일치(mismatch)'이며, 우리는 자신을 '과소평가(underestimate)'하는 경향이 있습니다.`}},
{id:4,type:`문맥상 부적절한 어휘`,diff:`보통`,pts:5,fmt:"mc",ans:4,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`The happy ending to this story is that after having sent my recordings to ①<u>countless</u> producers, I finally found one who was eager to work with me. One thing led to another, and I finally signed a record deal. ②<u>Opportunities</u> only come to those who are ③<u>prepared</u>. I had spent years performing on ④<u>unknown</u> streets and writing songs no one ⑤<u>celebrated</u>.`,stem:`다음 글의 밑줄 친 단어 중 문맥상 적절하지 않은 것은?`,det:{korean:`이 이야기의 행복한 결말은 <b>수많은</b> 프로듀서에게 녹음을 보낸 끝에 저와 함께 작업하기를 몹시 원하는 프로듀서를 찾았다는 것입니다. 하나의 일이 다른 일로 이어졌고 마침내 음반 계약을 체결했습니다. <b>기회</b>는 <b>준비된</b> 자에게만 옵니다. 저는 <b>알려지지 않은</b> 거리에서 공연하고 아무도 <b>축하하지 않는(→알아주지 않는)</b> 곡을 썼습니다.`,analysis:`✅ ①countless(수많은) — 적절 ✅ ②Opportunities(기회) — 적절 ✅ ③prepared(준비된) — 적절 ✅ ④unknown(알려지지 않은) — 적절 ❌ ⑤celebrated(축하받는) → 원문은 recognized(알아주는). 'no one celebrated'는 '아무도 축하하지 않는'으로 문맥상 부적절. 원문 'no one recognized'(아무도 알아주지 않는)가 적절`,tip:`recognized = '알아보다, 인정하다'. celebrated = '축하받는, 유명한'으로 의미가 다릅니다. 무명 거리에서 공연하며 아무도 '알아주지 않는(recognized)' 곡을 썼다는 맥락입니다.`}},
{id:5,type:`문맥상 부적절한 어휘`,diff:`쉬움`,pts:4,fmt:"mc",ans:4,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`Thank you for your ①<u>warm</u> welcome. It's good to be back home, but I'm ②<u>visiting</u> you today not to perform but to talk to you about my life as a musician. Last year, after 20 years of hard work, I finally signed my first record company contract. I'd like to tell you a ③<u>hopeful</u> story and give some ④<u>insight</u> into the ⑤<u>easy</u> work that I had to put in.`,stem:`다음 글의 밑줄 친 단어 중 문맥상 적절하지 않은 것은?`,det:{korean:`<b>따뜻한</b> 환영에 감사드립니다. 고향에 돌아와서 좋지만 오늘은 공연하려고가 아니라 뮤지션으로서의 제 삶에 대해 이야기하려고 여러분을 <b>방문</b>했습니다. 작년에 20년간의 노력 끝에 드디어 첫 음반 회사 계약을 체결했습니다. 여러분에게 <b>희망적인</b> 이야기를 들려 드리고 제가 쏟아야 했던 <b>고된(→쉬운)</b> 노력에 대한 약간의 <b>통찰</b>을 드리고 싶습니다.`,analysis:`✅ ①warm(따뜻한) — 적절 ✅ ②visiting(방문하는) — 적절 ✅ ③hopeful(희망적인) — 적절 ✅ ④insight(통찰) — 적절 ❌ ⑤easy → 원문은 'hard work(고된 노력)'이므로 easy는 부적절`,tip:`hard work(고된 노력)는 Jake Miller가 20년간 겪은 어려움을 강조하는 핵심 표현입니다.`}},
{id:6,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:2,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`The second point I want to make today is about thinking that your personality is ①<u>fixed</u>. Many people believe that their personality falls into a ②<u>specific</u> category and often ③<u>credit</u> their weaknesses or failures on their personality type. For example, they may say they can't do something because they aren't that kind of person. However, personality ④<u>categorizations</u> are neither ⑤<u>absolute</u> nor permanent.`,stem:`다음 글의 밑줄 친 단어 중 문맥상 적절하지 않은 것은?`,det:{korean:`오늘 말씀 드리고 싶은 두 번째 요점은 자신의 성격이 <b>고정</b>되어 있다고 생각하는 것에 관한 것입니다. 많은 사람이 자신의 성격이 <b>특정</b> 범주에 속한다고 믿고 종종 자신의 약점이나 실패를 성격 유형 <b>탓으로 돌립니다(→인정합니다)</b>. 그러나 성격 <b>분류</b>는 <b>절대적</b>이지도 영구적이지도 않습니다.`,analysis:`✅ ①fixed(고정된) — 적절 ✅ ②specific(특정한) — 적절 ❌ ③credit(공로를 돌리다) → 원문은 'blame(탓하다/비난하다)'. blame A on B(A를 B 탓으로 돌리다)인데 credit은 긍정적 의미로 부적절 ✅ ④categorizations(분류) — 적절 ✅ ⑤absolute(절대적인) — 적절`,tip:`blame A on B = 'A를 B의 탓으로 돌리다'. credit은 '공로를 인정하다'라는 긍정적 의미이므로 반대 맥락입니다.`}},
{id:7,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`majority`,`fraction`,`collection`,`selection`],passage:`I suddenly remembered what my grandfather had told me about Picasso: only a tiny __________ of the thousands of artworks he created during his lifetime are recognized by the public. Then I thought of my grandfather and how he loved playing, practicing his art his entire life, even without fame. I realized the only way to become an old guitarist like him was to keep playing.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`할아버지가 피카소에 관해 해 주셨던 말이 갑자기 떠올랐는데, 그가 생전에 창작했던 수천 점의 예술 작품 중 아주 작은 <b>부분(fraction)</b>만이 대중에 의해 인정받는다는 것입니다. 그런 다음 할아버지와 명성 없이도 평생 예술을 행하며 연주하는 것을 얼마나 사랑하셨는지를 생각했습니다.`,analysis:`✅ ② fraction: 'a tiny fraction of ~'는 '~의 아주 작은 부분'이라는 의미로 문맥에 적절 ❌ ① majority(대부분) — 'tiny'와 모순 ❌ ③ collection(수집품) — 문맥 부적절 ❌ ④ selection(선택) — 문맥 부적절`,tip:`fraction = 일부, 소량. 'a tiny fraction of'는 '~의 극히 일부'라는 뜻으로 자주 쓰이는 표현입니다.`}},
{id:8,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:0,ch:[`contract`,`concert`,`contest`,`contact`],passage:`It's good to be back home, but I'm visiting you today not to perform but to talk to you about my life as a musician. Last year, after 20 years of hard work, I finally signed my first record company __________. I'd like to tell you a hopeful story and give some insight into the hard work that I had to put in.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`고향에 돌아와서 좋지만, 오늘은 공연하려고가 아니라 뮤지션으로서의 제 삶에 대해 이야기하려고 방문했습니다. 작년에 20년간의 노력 끝에 드디어 첫 음반 회사 <b>계약(contract)</b>을 체결했습니다. 여러분에게 희망적인 이야기를 들려 드리고 싶습니다.`,analysis:`✅ ① contract(계약): 'record company contract(음반 회사 계약)'으로 문맥에 적절 ❌ ② concert(콘서트) — 'signed a concert'는 어색 ❌ ③ contest(대회) — 의미 부적절 ❌ ④ contact(연락처) — 의미 부적절`,tip:`contract(계약), concert(음악회), contest(대회), contact(연락/접촉) — 철자가 비슷하지만 의미가 다른 혼동 어휘입니다.`}},
{id:9,type:`빈칸 어휘 완성`,diff:`어려움`,pts:6,fmt:"mc",ans:2,ch:[`flexible`,`changeable`,`predictable`,`adaptable`],passage:`If you choose to behave differently and make needed changes, your personality will also change. People are __________ and consistent over time only because they choose to be, so don't limit yourself to a certain type. Start crafting the person you want to become today.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`여러분이 다른 방식으로 행동하고 필요한 변화를 만들기로 선택한다면 여러분의 성격도 바뀔 것입니다. 사람은 오직 자신이 그렇게 되기로 선택했기 때문에 시간이 지나도 <b>예측 가능하고(predictable)</b> 일관성이 있는 것이므로, 특정 유형으로 자신을 제한하지 마십시오.`,analysis:`✅ ③ predictable(예측 가능한): 'predictable and consistent(예측 가능하고 일관된)'으로 원문과 일치 ❌ ① flexible(유연한) — consistent와 의미 상충 ❌ ② changeable(변하기 쉬운) — consistent와 반대 ❌ ④ adaptable(적응력 있는) — 문맥 부적절`,tip:`predictable(예측 가능한)과 consistent(일관된)는 의미가 유사한 방향의 단어로 함께 쓰입니다.`}},
{id:10,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:0,ch:[`talented`,`popular`,`generous`,`fortunate`],passage:`I wasn't a musical genius, but I was better than most. I was popular at school festivals, and I thought I was born to be a musician. But things were far from easy. In college, I had to compete with classmates who were definitely more <u>capable</u> than I was.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`저는 음악 천재는 아니었지만 대부분보다 더 나았습니다. 학교 축제에서 인기가 많았고 뮤지션이 되기 위해 태어났다고 생각했습니다. 그러나 상황은 전혀 쉽지 않았습니다. 대학에서 저보다 분명히 더 <b>능력 있는(capable)</b> 동급생들과 경쟁해야 했습니다.`,analysis:`✅ ① talented(재능 있는): capable(능력 있는)과 가장 유사 ❌ ② popular(인기 있는) — 의미 다름 ❌ ③ generous(관대한) — 의미 다름 ❌ ④ fortunate(운 좋은) — 의미 다름`,tip:`capable = able, talented, competent 등과 동의어입니다.`}},
{id:11,type:`동의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`reluctant`,`hesitant`,`enthusiastic`,`indifferent`],passage:`The happy ending to this story is that after having sent my recordings to countless producers, I finally found one who was <u>eager</u> to work with me. One thing led to another, and I finally signed a record deal. Opportunities only come to those who are prepared.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`이 이야기의 행복한 결말은 수많은 프로듀서에게 녹음을 보낸 끝에 저와 함께 작업하기를 몹시 <b>원하는(eager)</b> 프로듀서를 찾았다는 것입니다. 하나의 일이 다른 일로 이어졌고 마침내 음반 계약을 체결했습니다.`,analysis:`✅ ③ enthusiastic(열정적인): eager(열망하는, 몹시 원하는)과 가장 유사 ❌ ① reluctant(꺼리는) — 반의어 ❌ ② hesitant(주저하는) — 반의어 ❌ ④ indifferent(무관심한) — 반의어`,tip:`eager = enthusiastic = keen. 모두 '열망하는, 열정적인'의 의미입니다.`}},
{id:12,type:`동의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:2,ch:[`discovered`,`borrowed`,`invented`,`adopted`],passage:`The researchers <u>coined</u> a new term, the 'liking gap,' for this difference in perception or the mismatch between how we perceive ourselves and what others actually think of us. How is this helpful for you? We often underestimate ourselves based on our assumption of how others might judge us.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`연구자들은 이러한 인식의 차이에 대해 '호감 격차'라는 새로운 용어를 <b>만들었습니다(coined)</b>. 이것이 여러분에게 어떻게 도움이 되나요? 우리는 흔히 다른 사람이 우리를 어떻게 판단할지에 대한 추정에 근거하여 우리 자신을 과소평가합니다.`,analysis:`✅ ③ invented(만들어 냈다): coined(새로운 말/용어를 만들다)와 가장 유사 ❌ ① discovered(발견했다) — '이미 존재하는 것을 찾다'로 뉘앙스 다름 ❌ ② borrowed(빌려 왔다) — '새로 만든 것'이 아니라 '가져온 것' ❌ ④ adopted(채택했다) — '남이 만든 것을 받아들이다'로 의미 다름`,tip:`coin a term = '새로운 용어를 만들다'. coin은 원래 '주화를 주조하다'인데, 비유적으로 '(새로운 말을) 만들어 내다'라는 뜻입니다.`}},
{id:13,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`certain`,`assured`,`convinced`,`doubtful`],passage:`We often underestimate ourselves based on our assumption of how others might judge us. In other words, our fixed attitudes may prevent us from reaching our true potential. Don't worry about the impression you think you make on people; chances are you can be <u>confident</u> that the impression you make is just fine.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`우리는 흔히 다른 사람이 우리를 어떻게 판단할지에 대한 추정에 근거하여 우리 자신을 과소평가합니다. 다시 말해, 우리의 고정된 태도는 우리가 진정한 잠재력에 도달하는 것을 막을 수 있습니다. 여러분이 주는 인상은 괜찮다고 <b>확신해도(confident)</b> 될 것입니다.`,analysis:`✅ ④ doubtful(의심스러운): confident(확신하는)의 반의어 ❌ ① certain(확실한) — 유의어 ❌ ② assured(확신하는) — 유의어 ❌ ③ convinced(확신하는) — 유의어`,tip:`confident = certain = assured = convinced (확신하는) ↔ doubtful = uncertain (의심스러운)`}},
{id:14,type:`반의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`hardships`,`challenges`,`comforts`,`struggles`],passage:`Opportunities only come to those who are prepared. I had spent years performing on unknown streets and writing songs no one recognized. The <u>difficulties</u> I faced were part of my journey. If you love something, keep trying.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`기회는 준비된 자에게만 옵니다. 저는 알려지지 않은 거리에서 공연하고 아무도 알아주지 않는 곡을 쓰며 여러 해를 보냈습니다. 제가 직면했던 <b>어려움(difficulties)</b>은 제 여정의 일부였습니다. 좋아하는 것이 있다면 계속 도전하십시오.`,analysis:`✅ ③ comforts(편안함, 안락함): difficulties(어려움)의 반의어 ❌ ① hardships(고난) — 유의어 ❌ ② challenges(도전/어려움) — 유의어 ❌ ④ struggles(고군분투) — 유의어`,tip:`difficulties = hardships = challenges = struggles (어려움) ↔ comforts = ease (편안함)`}},
{id:15,type:`다의어 문맥적 의미`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`① He tried to <u>make</u> a good impression on his new teacher.<br>② She wanted to <u>make</u> a strong case for her proposal.<br>③ The team worked hard to <u>make</u> a difference in the community.<br>④ They managed to <u>make</u> a beautiful sculpture out of clay.<br>⑤ Although my dream was big, the reality was I probably wouldn't <u>make</u> it.`,stem:`다음 중 밑줄 친 <b>make</b>가 나머지 넷과 <b>다른 의미</b>로 쓰인 것은? [본문 참고: Don't worry about the impression you think you <i>make</i> on people.]`,det:{korean:`① 그는 새 선생님에게 좋은 인상을 <b>만들</b>려고 했다. ② 그녀는 자신의 제안에 대해 강력한 주장을 <b>만들</b>고 싶었다. ③ 팀은 지역사회에 변화를 <b>만들</b>기 위해 열심히 일했다. ④ 그들은 점토로 아름다운 조각품을 <b>만들</b>어 냈다. ⑤ 꿈은 컸지만 현실은 아마 <b>해내지(성공하지)</b> 못할 것 같았다.`,analysis:`✅ ⑤ make it = '성공하다, 해내다' (succeed)로 나머지와 다른 의미 ❌ ①②③④ make = '만들다, 만들어 내다' (create, produce)의 의미`,tip:`make it = succeed(성공하다). 본문에서 'the reality was I probably wouldn't make it'은 '현실은 아마 성공하지 못할 것'이라는 뜻입니다.`}},
{id:16,type:`영영풀이 매칭`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`evidence`,`assumption`,`conclusion`,`prediction`],passage:`<i>a belief or feeling that something is true or that something will happen, although there is no proof</i><br><br>[본문 참고] We often underestimate ourselves based on our __________ of how others might judge us. In other words, our fixed attitudes may prevent us from reaching our true potential.`,stem:`다음 영영 정의에 해당하는 단어로 가장 적절한 것은?`,det:{korean:`<b>assumption(추정, 가정)</b>: 증거가 없지만 어떤 것이 사실이거나 일어날 것이라는 믿음이나 느낌. 우리는 흔히 다른 사람이 우리를 어떻게 판단할지에 대한 <b>추정</b>에 근거하여 우리 자신을 과소평가합니다.`,analysis:`✅ ② assumption(추정, 가정): 영영 정의와 일치하며 본문 문맥에도 적절 ❌ ① evidence(증거) — '증거 없이'와 반대 ❌ ③ conclusion(결론) — 추론의 결과물로 뉘앙스 다름 ❌ ④ prediction(예측) — 미래에 대한 구체적 예측으로 범위가 다름`,tip:`assumption = 증거 없이 사실이라고 여기는 것. 'make an assumption'(추정하다)으로 자주 쓰입니다.`}},
{id:17,type:`어형 변환 (서술형)`,diff:`쉬움`,pts:4,fmt:"written",wa:`perception`,accept:[`perception`],passage:`Most participants' estimations of their partners' responses were pessimistic, which were opposite to the real responses. It turns out that participants do not make bad impressions but make better impressions than they think. The researchers coined a new term, the 'liking gap,' for this difference in (perceive) __________.`,stem:`다음 글의 빈칸에 주어진 단어의 올바른 형태를 쓰시오.`,det:{korean:`짝의 반응에 대한 참가자 대부분의 평가는 비관적이었는데, 그것은 실제의 반응과 정반대였습니다. 참가자들은 나쁜 인상을 주지 않고 생각하는 것보다 더 좋은 인상을 주는 것으로 드러났습니다. 연구자들은 이러한 <b>인식(perception)</b>의 차이에 대해 '호감 격차'라는 새로운 용어를 만들었습니다.`,analysis:`perceive(동사: 인식하다) → perception(명사: 인식). 'this difference in ~'에서 전치사 in 뒤에 명사가 필요합니다.`,tip:`perceive(v.) → perception(n.) → perceptive(adj.) 어형 변환 패턴을 기억하세요.`}},
{id:18,type:`어형 변환 (서술형)`,diff:`어려움`,pts:6,fmt:"written",wa:`failures`,accept:[`failures`],passage:`Many people believe that their personality falls into a specific category and often blame their weaknesses or (fail) __________ on their personality type. For example, they may say they can't do something because they aren't that kind of person. However, personality categorizations are neither absolute nor permanent.`,stem:`다음 글의 빈칸에 주어진 단어의 올바른 형태를 쓰시오.`,det:{korean:`많은 사람이 자신의 성격이 특정 범주에 속한다고 믿고 종종 자신의 약점이나 <b>실패(failures)</b>를 성격 유형 탓으로 돌립니다. 자신이 그런 종류의 사람이 아니기 때문에 무언가를 할 수 없다고 말할 수 있습니다. 그러나 성격 분류는 절대적이지도 영구적이지도 않습니다.`,analysis:`fail(동사: 실패하다) → failures(명사 복수형: 실패들). 'weaknesses or __'에서 or 앞의 weaknesses(복수 명사)와 병렬 구조이므로 복수 명사 failures가 적절합니다.`,tip:`fail(v.) → failure(n.) → failures(n. 복수). 병렬 구조에서 같은 품사·수를 맞추는 것이 중요합니다.`}},
{id:19,type:`빈칸 문맥 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`give up music`,`keep playing`,`become famous`,`win contests`],passage:`Then one day, I looked at the picture of The Old Guitarist on my wall. I suddenly remembered what my grandfather had told me about Picasso: only a tiny fraction of the thousands of artworks he created during his lifetime are recognized by the public. Then I thought of my grandfather and how he loved playing, practicing his art his entire life, even without fame. I realized the only way to become an old guitarist like him was to __________.`,stem:`다음 글의 빈칸에 들어갈 표현으로 가장 적절한 것은?`,det:{korean:`그러던 어느 날, 벽에 걸린 <늙은 기타 연주자> 그림을 보았습니다. 할아버지가 피카소에 관해 해 주셨던 말이 갑자기 떠올랐습니다. 할아버지와 명성 없이도 평생 연주하는 것을 사랑하셨던 것을 생각했습니다. 할아버지 같은 늙은 기타 연주자가 되는 유일한 길은 <b>계속 연주하는 것(keep playing)</b>뿐이라는 것을 깨달았습니다.`,analysis:`✅ ② keep playing(계속 연주하다): 할아버지가 명성 없이도 평생 연주를 사랑했다는 맥락에서 '계속 연주하는 것'이 적절 ❌ ① give up music — 포기하는 것은 본문 메시지와 반대 ❌ ③ become famous — 명성이 아닌 연주 자체가 핵심 ❌ ④ win contests — 대회 우승은 문맥 밖`,tip:`Jake Miller의 깨달음: 명성이 아닌 음악 자체를 사랑하며 '계속 연주하는 것(keep playing)'이 중요하다는 메시지입니다.`}},
{id:20,type:`빈칸 문맥 완성`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`pass you by forever`,`disappear from your life`,`be given to everyone`,`come knocking at your door`],passage:`I had spent years performing on unknown streets and writing songs no one recognized. The difficulties I faced were part of my journey. If you love something, keep trying. Someday an opportunity may __________, and you have to be ready to welcome it.`,stem:`다음 글의 빈칸에 들어갈 표현으로 가장 적절한 것은?`,det:{korean:`저는 알려지지 않은 거리에서 공연하고 아무도 알아주지 않는 곡을 쓰며 여러 해를 보냈습니다. 제가 직면했던 어려움은 제 여정의 일부였습니다. 좋아하는 것이 있다면 계속 도전하십시오. 언젠가 기회가 <b>여러분의 문을 두드릴(come knocking at your door)</b> 수도 있고, 그 기회를 맞이할 준비가 되어 있어야 합니다.`,analysis:`✅ ④ come knocking at your door(문을 두드리다): 원문 표현 그대로이며, 기회가 찾아온다는 비유적 의미 ❌ ① pass you by forever — 기회가 영원히 지나간다는 부정적 의미 ❌ ② disappear from your life — 문맥과 반대 ❌ ③ be given to everyone — 준비된 자에게만 온다는 내용과 모순`,tip:`'come knocking at your door'는 '(기회가) 찾아오다'라는 비유적 표현입니다. 준비된 자만이 기회를 잡을 수 있다는 메시지를 담고 있습니다.`}}
]
  },

{id:1,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장05',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Have you ever asked yourself whether you <b>[① made / ② make]</b> a good impression on someone you just met?</div>',
 ch:['① made','② make'],ans:0,
 det:{ref:'[원문] Have you ever asked yourself whether you made a good impression on someone you just met?\n[해석] 방금 만난 사람에게 좋은 인상을 주었는지 스스로에게 물어본 적이 있나요? [문장 05 참고]',
      correct:'정답: ① made. 주절 "Have you ever asked"는 현재완료이고, whether절 안의 동작은 "just met"한 과거 시점의 일이므로 과거시제 made가 적절하다.',
      wrongs:['① made ✅ — 과거 시점의 인상이므로 과거시제 적절','② make ❌ — 현재시제는 과거 경험을 묻는 맥락에 부적절'],
      tip:'💡 현재완료 + whether절\n• 현재완료(Have you ever ~?)는 경험을 물을 때 사용\n• whether절 안의 시제는 경험의 시점에 맞춤\n\n⚠️ 함정: 주절이 현재완료라고 종속절도 현재완료로 쓰지 않음'}},

{id:2,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장06',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">In fact, most people believe they make a <b>[① worse / ② worst]</b> impression than they actually do.</div>',
 ch:['① worse','② worst'],ans:0,
 det:{ref:'[원문] In fact, most people believe they make a worse impression than they actually do.\n[해석] 사실, 사람들 대부분은 자신이 실제로 주는 것보다 더 나쁜 인상을 준다고 믿습니다. [문장 06 참고]',
      correct:'정답: ① worse. "than"이 있으므로 비교급 worse가 적절하다. worst는 최상급이므로 than과 함께 쓸 수 없다.',
      wrongs:['① worse ✅ — than과 함께 쓰는 비교급','② worst ❌ — 최상급은 than과 함께 쓸 수 없음'],
      tip:'💡 비교급 vs 최상급\n• 비교급 + than: worse than ~\n• 최상급 + in/of: the worst in ~\n\n⚠️ 함정: bad-worse-worst 불규칙 변화 주의'}},

{id:3,type:'어휘',diff:'보통',pts:3,fmt:'mc',note:'문장07',
 passage:``,
 stem:'다음 문장의 빈칸에 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Researchers performed an experiment where students were <b>( ___ )</b> for five-minute ice breaking conversations.</div>',
 ch:['① paired up','② paired down','③ paired off','④ paired out','⑤ paired away'],ans:0,
 det:{ref:'[원문] Researchers performed an experiment where students were paired up for five-minute ice breaking conversations.\n[해석] 연구자들은 학생들이 짝을 이루어 5분 동안 서먹함을 푸는 대화를 하는 실험을 수행했습니다. [문장 07 참고]',
      correct:'정답: ① paired up. "pair up"은 "짝을 이루다"라는 뜻의 구동사이다.',
      wrongs:['① paired up ✅ — 짝을 이루다','② paired down ❌ — 존재하지 않는 표현 (pare down과 혼동 주의)','③ paired off ❌ — pair off도 짝짓다의 뜻이 있으나, 본문 원문은 paired up','④ paired out ❌ — 존재하지 않는 표현','⑤ paired away ❌ — 존재하지 않는 표현'],
      tip:'💡 pair의 구동사\n• pair up (with): ~와 짝을 이루다\n• pair off: 둘씩 짝짓다\n\n⚠️ pair down은 없음! pare down(줄이다)과 혼동 주의'}},

{id:4,type:'연결사',diff:'보통',pts:3,fmt:'written',note:'문장09',
 passage:`They were then asked to rate how much they liked their partners. ( ___ ), researchers asked participants if they thought their partners liked them.`,
 stem:'위 지문의 빈칸에 알맞은 연결사를 쓰시오. (1단어, 영문 12자, A로 시작)',
 wa:"Additionally",accept:["Additionally","additionally","ADDITIONALLY"],
 det:{ref:'[원문] Additionally, researchers asked participants if they thought their partners liked them.\n[해석] 추가로, 연구자들은 참가자들에게 짝이 자신을 좋아한다고 생각하는지 물었습니다. [문장 09 참고]',
      correct:'정답: Additionally. 앞 문장에서 짝의 호감도를 평가하게 했고, 이 문장에서 추가로 참가자에게 질문했으므로 "게다가, 추가로"의 의미인 Additionally가 적절하다.',
      wrongs:[],
      tip:'💡 첨가의 연결사\n• Additionally = In addition = Moreover = Furthermore\n• 앞 내용에 정보를 덧붙일 때 사용\n\n⚠️ However(역접), Therefore(인과)와 구별!'}},

{id:5,type:'어법',diff:'어려움',pts:4,fmt:'mc',note:'문장10',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Most participants\' estimations of their partners\' responses were pessimistic, <b>[① which were / ② which was]</b> opposite to the real responses.</div>',
 ch:['① which were','② which was'],ans:0,
 det:{ref:'[원문] Most participants\' estimations of their partners\' responses were pessimistic, which were opposite to the real responses.\n[해석] 짝의 반응에 대한 참가자 대부분의 평가는 비관적이었는데, 그것은 실제의 반응과 정반대였습니다. [문장 10 참고]',
      correct:'정답: ① which were. 계속적 용법의 관계대명사 which가 앞 절 전체("estimations ~ pessimistic")를 선행사로 받으므로, 주어가 복수(estimations)에 해당하여 were가 적절하다.',
      wrongs:['① which were ✅ — 선행사 estimations(복수)에 수일치','② which was ❌ — 복수 선행사에 단수 동사 불일치'],
      tip:'💡 관계대명사 which의 계속적 용법\n• , which ~: 앞 절 전체 또는 앞 명사를 선행사로 받음\n• 수일치는 실질적 선행사에 맞춤\n\n⚠️ 함정: 계속적 which가 절 전체를 받으면 단수 취급하는 경우도 있지만, 여기서는 estimations를 받음'}},

{id:6,type:'지칭추론',diff:'보통',pts:3,fmt:'mc',note:'문장12',
 passage:`The researchers coined a new term, the "liking gap," for <u>this difference</u> in perception or the mismatch between how we perceive ourselves and what others actually think of us.`,
 stem:'위 문장의 밑줄 친 <b>this difference</b>가 가리키는 것으로 가장 적절한 것은?',
 ch:['① 연구자와 참가자의 인식 차이','② 참가자들이 실제보다 인상을 나쁘게 평가하는 현상','③ 참가자들의 파트너에 대한 호감도','④ 아이스브레이킹 대화의 효과','⑤ 연구 방법론의 차이'],ans:1,
 det:{ref:'[원문] The researchers coined a new term, the "liking gap," for this difference in perception...\n[해석] 연구자들은 이러한 인식의 차이에 대해 "호감 격차"라는 새로운 용어를 만들었습니다. [문장 12 참고]',
      correct:'정답: ② 참가자들이 실제보다 인상을 나쁘게 평가하는 현상. 앞 문장(문장 10-11)에서 참가자들의 비관적 평가와 실제 반응의 차이를 설명했으므로, this difference는 바로 이 "인식의 불일치"를 가리킨다.',
      wrongs:['① ❌ — 연구자와 참가자 간 차이가 아닌, 자기인식과 타인평가 간 차이','② ✅ — 앞 문맥에서 설명한 비관적 자기평가와 실제 반응의 차이','③ ❌ — 호감도 자체가 아닌 호감도의 인식 차이','④ ❌ — 대화의 효과가 아닌 인식의 차이','⑤ ❌ — 연구 방법과 무관'],
      tip:'💡 지칭추론 전략\n• this/that/these/those + 명사 → 앞 문장에서 언급된 내용 확인\n• "difference"라는 단어에 주목 → 무엇과 무엇의 차이인지 파악\n\n⚠️ 함정: 지시어가 가리키는 대상은 보통 바로 앞 1~2문장에 있음'}},

{id:7,type:'어법',diff:'어려움',pts:4,fmt:'mc',note:'문장15',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">In other words, our fixed attitudes may prevent us <b>[① from reaching / ② to reach]</b> our true potential.</div>',
 ch:['① from reaching','② to reach'],ans:0,
 det:{ref:'[원문] In other words, our fixed attitudes may prevent us from reaching our true potential.\n[해석] 다시 말해, 우리의 고정된 태도는 우리가 진정한 잠재력에 도달하는 것을 막을 수 있습니다. [문장 15 참고]',
      correct:'정답: ① from reaching. "prevent A from -ing"는 "A가 ~하는 것을 막다"라는 의미의 고정 구문이다.',
      wrongs:['① from reaching ✅ — prevent A from -ing 구문','② to reach ❌ — prevent는 to부정사를 목적격보어로 취하지 않음'],
      tip:'💡 prevent/stop/keep + O + from -ing\n• prevent A from -ing: A가 ~하는 것을 막다\n• stop A from -ing: A가 ~하는 것을 멈추게 하다\n• keep A from -ing: A가 ~하지 못하게 하다\n\n⚠️ 함정: from 생략 가능(prevent A -ing)하지만 to부정사는 불가!'}},

{id:8,type:'서술형',diff:'보통',pts:3,fmt:'written',note:'문장16',
 passage:`Don't worry about the impression you think you make on people; chances are you can be ( ___ ) that the impression you make is just fine.`,
 stem:'위 지문의 빈칸에 알맞은 단어를 쓰시오. (1단어, 영문 9자, c로 시작)',
 wa:"confident",accept:["confident","Confident","CONFIDENT"],
 det:{ref:'[원문] ...chances are you can be confident that the impression you make is just fine.\n[해석] 아마 여러분이 주는 인상은 그냥 괜찮다고 확신해도 될 것입니다. [문장 16 참고]',
      correct:'정답: confident. "be confident that ~"는 "~을 확신하다"라는 의미이다.',
      wrongs:[],
      tip:'💡 be confident that절\n• be confident (that) S+V: ~을 확신하다\n• confidence(명사) / confident(형용사) / confidently(부사)\n\n⚠️ confident vs confidential(비밀의) 혼동 주의!'}},

{id:9,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장18',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Many people believe that their personality <b>[① falls / ② fall]</b> into a specific category and often blame their weaknesses or failures on their personality type.</div>',
 ch:['① falls','② fall'],ans:0,
 det:{ref:'[원문] Many people believe that their personality falls into a specific category...\n[해석] 많은 사람이 자신의 성격이 특정 범주에 속한다고 믿고... [문장 18 참고]',
      correct:'정답: ① falls. that절의 주어 "their personality"는 단수이므로 3인칭 단수 현재형 falls가 적절하다.',
      wrongs:['① falls ✅ — 주어 personality(단수)에 수일치','② fall ❌ — 단수 주어에 복수형 동사 불일치'],
      tip:'💡 수일치 핵심\n• 주어가 단수 → 동사에 -(e)s\n• Many people believe that their personality falls ~\n• 주절의 주어(people)와 that절의 주어(personality) 구분!\n\n⚠️ 함정: "Many people" 때문에 fall로 쓰기 쉬움'}},

{id:10,type:'서술형',diff:'보통',pts:3,fmt:'written',note:'문장18',
 passage:`Many people believe that their personality falls into a specific category and often blame their weaknesses or failures ( ___ ) their personality type.`,
 stem:'위 지문의 빈칸에 알맞은 전치사를 쓰시오. (1단어, 영문 2자, o로 시작)',
 wa:"on",accept:["on","On","ON"],
 det:{ref:'[원문] ...and often blame their weaknesses or failures on their personality type.\n[해석] ...그리고 종종 자신의 약점이나 실패를 성격 유형 탓으로 돌립니다. [문장 18 참고]',
      correct:'정답: on. "blame A on B"는 "A를 B 탓으로 돌리다"라는 의미의 숙어이다.',
      wrongs:[],
      tip:'💡 blame 구문 2가지\n• blame A on B: A(나쁜 결과)를 B(원인) 탓으로 돌리다\n• blame B for A: B(원인)를 A(나쁜 결과) 때문에 탓하다\n\n⚠️ 전치사 on과 for의 위치가 다름에 주의!'}},

{id:11,type:'오류찾기',diff:'어려움',pts:4,fmt:'mc',note:'문장21-26',
 passage:``,
 stem:'다음 글에서 밑줄 친 부분 중 어법상 틀린 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Try to remember yourself from ten years ago. Who was your favorite singer? What did you hope to become when you <b><u>① grow</u></b> up? Do you feel the same way now? What <b><u>② will</u></b> your answers be 10 years from now? I bet you <b><u>③ don\'t</u></b> know. Just like your likes and future dreams <b><u>④ keep</u></b> changing, so <b><u>⑤ do</u></b> you.</div>',
 ch:['① grow','② will','③ don\'t','④ keep','⑤ do'],ans:0,
 det:{ref:'[원문] What did you hope to become when you grow up?\n[정답 원문] What did you hope to become when you grew up? [문장 23 참고]',
      correct:'정답: ① grow → grew. 주절 "did you hope"가 과거시제이므로, 종속절(when절)도 과거시제 grew로 시제를 일치시켜야 한다.',
      wrongs:['① grow ❌ → grew — 주절 과거시제에 맞춰 시제일치 필요','② will ✅ — 미래를 묻는 문장이므로 will 적절','③ don\'t ✅ — 현재 시점의 추측이므로 현재시제 적절','④ keep ✅ — 주어 likes and dreams(복수)에 수일치','⑤ do ✅ — "so do you" 도치구문, 복수주어 you에 적절'],
      tip:'💡 시제일치 원칙\n• 주절이 과거 → 종속절도 과거\n• did you hope ~ when you grew up\n\n⚠️ 함정: "grow up"이 관용적이라 현재형으로 쓰기 쉬움'}},

{id:12,type:'어형변화',diff:'보통',pts:3,fmt:'written',note:'문장28',
 passage:`If you choose to behave differently and make needed changes, your personality will also ( ___ ).`,
 stem:'위 지문의 괄호 안에 주어진 단어를 어법에 맞게 변형하시오. [change] (1단어, 영문 6자, c로 시작)',
 wa:"change",accept:["change","Change","CHANGE"],
 det:{ref:'[원문] If you choose to behave differently and make needed changes, your personality will also change.\n[해석] 여러분이 다른 방식으로 행동하고 필요한 변화를 만들기로 선택한다면 여러분의 성격도 바뀔 것입니다. [문장 28 참고]',
      correct:'정답: change. "will also" 뒤에는 동사원형이 온다. 조동사 will 뒤에는 항상 동사원형을 사용한다.',
      wrongs:[],
      tip:'💡 조동사 + 동사원형\n• will/can/may/must/should + 동사원형\n• will also change (O) / will also changes (X)\n\n⚠️ 함정: needed changes(명사)의 영향으로 changes로 쓰기 쉬움'}},

{id:13,type:'의미파악',diff:'어려움',pts:4,fmt:'mc',note:'문장30',
 passage:`Start <u>crafting the person you want to become</u> today.`,
 stem:'위 문장에서 밑줄 친 <b>crafting the person you want to become</b>의 의미로 가장 적절한 것은?',
 ch:['① 새로운 직업을 찾기 시작하는 것','② 자신이 되고 싶은 사람을 만들어가는 것','③ 다른 사람의 장점을 배우는 것','④ 과거의 자신을 돌아보는 것','⑤ 주변 사람들의 기대에 부응하는 것'],ans:1,
 det:{ref:'[원문] Start crafting the person you want to become today.\n[해석] 오늘부터 자신이 되고 싶은 사람을 만들기를 시작하십시오. [문장 30 참고]',
      correct:'정답: ② 자신이 되고 싶은 사람을 만들어가는 것. craft는 "정성 들여 만들다"의 뜻으로, "the person you want to become"은 "되고 싶은 사람"을 의미한다. 즉, 자신의 이상적인 모습을 주체적으로 만들어가라는 메시지이다.',
      wrongs:['① ❌ — 직업이 아닌 인격/성격을 만드는 것','② ✅ — craft(만들다) + the person you want to become(되고 싶은 사람)','③ ❌ — 타인의 장점이 아닌 자신의 변화','④ ❌ — 과거 회고가 아닌 미래지향적 행동','⑤ ❌ — 타인의 기대가 아닌 자신의 의지'],
      tip:'💡 craft의 비유적 의미\n• craft: (원래) 수공예로 정성껏 만들다\n• 비유적: 자신의 삶/성격을 의도적으로 설계하고 만들어가다\n\n⚠️ "person you want to become" = 이상적 자아'}},

{id:14,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장33',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">It\'s good to be back home, but I\'m visiting you today not to perform <b>[① but / ② and]</b> to talk to you about my life as a musician.</div>',
 ch:['① but','② and'],ans:0,
 det:{ref:'[원문] ...I\'m visiting you today not to perform but to talk to you about my life as a musician.\n[해석] 오늘은 공연하려고가 아니라 뮤지션으로서의 제 삶에 대해 이야기하려고 여러분을 방문했습니다. [문장 33 참고]',
      correct:'정답: ① but. "not A but B" (A가 아니라 B)라는 상관접속사 구문이다. not to perform but to talk = 공연하려는 것이 아니라 이야기하려고.',
      wrongs:['① but ✅ — not A but B 구문','② and ❌ — not A and B는 부자연스러운 구문'],
      tip:'💡 상관접속사 not A but B\n• not A but B: A가 아니라 B\n• not only A but (also) B: A뿐만 아니라 B도\n• 병렬구조: not to perform but to talk (to부정사 병렬)\n\n⚠️ 함정: not ~ and ~는 "~이 아니고 ~도 아닌"의 뜻이 될 수 있음'}},

{id:15,type:'한영',diff:'어려움',pts:4,fmt:'mc',note:'문장34',
 passage:``,
 stem:'다음 한국어 문장을 영작할 때 가장 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">"작년에 저는 20년간의 노력 끝에 드디어 첫 음반 회사 계약을 체결했습니다."</div>',
 ch:['① Last year, after 20 years of hard work, I finally signed my first record company contract.','② Last year, after 20 years of hard work, I finally signed my first recording company contract.','③ Last year, after 20 years of hard works, I finally signed my first record company contract.','④ Last year, for 20 years of hard work, I finally signed my first record company contract.','⑤ Last year, after 20 years of hard work, I finally have signed my first record company contract.'],ans:0,
 det:{ref:'[원문] Last year, after 20 years of hard work, I finally signed my first record company contract.\n[해석] 작년에 저는 20년간의 노력 끝에 드디어 첫 음반 회사 계약을 체결했습니다. [문장 34 참고]',
      correct:'정답: ①. "after 20 years of hard work"(전치사구) + signed(과거시제) + record company contract(복합명사)가 모두 올바르다.',
      wrongs:['① ✅ — 원문과 일치, 문법적으로 정확','② ❌ — recording company는 비표준 표현, record company가 올바른 복합명사','③ ❌ — hard work는 불가산명사이므로 works 불가','④ ❌ — "~끝에"는 after이지 for가 아님','⑤ ❌ — Last year(과거 시점)와 have signed(현재완료) 불일치'],
      tip:'💡 핵심 포인트\n• hard work: 불가산명사 (works ✕)\n• after vs for: "~후에/끝에" = after, "~동안" = for\n• Last year + 과거시제: signed (현재완료 ✕)\n\n⚠️ record company vs recording company — record가 올바른 복합명사 형태'}},

{id:16,type:'지칭추론',diff:'보통',pts:3,fmt:'mc',note:'문장38',
 passage:`My grandfather was a classical guitarist, and on my 13th birthday, he gave me this picture and a new guitar. After he passed away, I hung <u>it</u> up in my room as a reminder of his love for music.`,
 stem:'위 문장의 밑줄 친 <b>it</b>이 가리키는 것으로 가장 적절한 것은?',
 ch:['① a new guitar','② my room','③ this picture','④ his love','⑤ my 13th birthday'],ans:2,
 det:{ref:'[원문] After he passed away, I hung it up in my room as a reminder of his love for music.\n[해석] 할아버지가 돌아가신 후 저는 그것을 할아버지의 음악에 대한 사랑을 기억나게 하는 물건으로 제 방에 걸어 두었습니다. [문장 38 참고]',
      correct:'정답: ③ this picture. 앞 문장에서 할아버지가 "this picture and a new guitar"를 주었다고 했고, "hung it up"(걸어 두었다)이라는 행위의 대상은 벽에 걸 수 있는 "그림(picture)"이 적절하다.',
      wrongs:['① ❌ — 기타는 "걸어 두다"의 대상으로 부자연스러움','② ❌ — 방 자체를 걸 수 없음','③ ✅ — 그림을 방에 걸어 두는 것이 자연스러움','④ ❌ — 추상적 개념을 걸 수 없음','⑤ ❌ — 생일을 걸 수 없음'],
      tip:'💡 지칭추론 핵심\n• "hung it up"의 동작을 수행할 수 있는 대상 = 물리적 물건\n• picture와 guitar 중 "벽에 걸다"에 적합한 것 = picture\n\n⚠️ 문맥 단서: "as a reminder" → 기념품 역할 = 그림'}},

{id:17,type:'연결사',diff:'보통',pts:3,fmt:'written',note:'문장41',
 passage:`I was popular at school festivals, and I thought I was born to be a musician. ( ___ ) things were far from easy.`,
 stem:'위 지문의 빈칸에 알맞은 연결사를 쓰시오. (1단어, 영문 3자, B로 시작)',
 wa:"But",accept:["But","but","BUT"],
 det:{ref:'[원문] But things were far from easy.\n[해석] 그러나 상황은 전혀 쉽지 않았습니다. [문장 41 참고]',
      correct:'정답: But. 앞 문장에서 학교 축제에서 인기 있었고 뮤지션이 될 운명이라 생각했다는 긍정적 내용 → 이 문장에서 상황이 쉽지 않았다는 부정적 내용으로 전환되므로 역접의 But이 적절하다.',
      wrongs:[],
      tip:'💡 역접의 연결사\n• But / However / Nevertheless / Yet\n• 앞 내용과 반대되는 내용을 이어줌\n\n⚠️ 문장 맨 앞에 But을 쓸 수 있음 (구어적/준격식)'}},

{id:18,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장42',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">In college, I had to compete with classmates <b>[① who were / ② who was]</b> definitely more capable than I was.</div>',
 ch:['① who were','② who was'],ans:0,
 det:{ref:'[원문] In college, I had to compete with classmates who were definitely more capable than I was.\n[해석] 대학에서 저는 저보다 명백히 더 능력 있는 동급생들과 경쟁해야 했습니다. [문장 42 참고]',
      correct:'정답: ① who were. 선행사 "classmates"가 복수이므로, 관계대명사 who 뒤의 be동사는 복수형 were가 적절하다.',
      wrongs:['① who were ✅ — 선행사 classmates(복수)에 수일치','② who was ❌ — 복수 선행사에 단수 동사 불일치'],
      tip:'💡 관계대명사절의 수일치\n• 관계대명사절의 동사는 선행사의 수에 일치\n• classmates(복수) who were ~\n• a classmate(단수) who was ~\n\n⚠️ 함정: "than I was"의 was에 이끌려 who was로 쓰기 쉬움'}},

{id:19,type:'어법',diff:'어려움',pts:4,fmt:'mc',note:'문장45',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">It seemed like every disappointment <b>[① made me lose / ② made me to lose]</b> hope more and more.</div>',
 ch:['① made me lose','② made me to lose'],ans:0,
 det:{ref:'[원문] It seemed like every disappointment made me lose hope more and more.\n[해석] 매번 실망할 때마다 점점 더 희망을 잃게 만드는 것 같았습니다. [문장 45 참고]',
      correct:'정답: ① made me lose. 사역동사 make는 「make + 목적어 + 동사원형」 구조를 취한다. to부정사를 쓸 수 없다.',
      wrongs:['① made me lose ✅ — make + O + 동사원형','② made me to lose ❌ — 사역동사 make 뒤에 to부정사 불가'],
      tip:'💡 사역동사 make\n• make + O + 동사원형(능동): made me lose\n• make + O + p.p.(수동): made it known\n• 수동태: I was made to lose (to 부활!)\n\n⚠️ 시험 최빈출: 사역동사 뒤 to부정사 ✕ (능동태에서)'}},

{id:20,type:'서술형',diff:'보통',pts:3,fmt:'written',note:'문장48',
 passage:`Although my dream was to record an album, the reality was I probably wouldn't ( ___ ) ( ___ ).`,
 stem:'위 지문의 빈칸에 알맞은 표현을 쓰시오. (2단어, 영문 7자, m으로 시작)',
 wa:"make it",accept:["make it","Make it","MAKE IT"],
 det:{ref:'[원문] Although my dream was to record an album, the reality was I probably wouldn\'t make it.\n[해석] 음반을 녹음하는 것이 저의 꿈이었지만 현실은 아마 성공하지 못할 것 같았습니다. [문장 48 참고]',
      correct:'정답: make it. "make it"은 "성공하다, 해내다"라는 의미의 관용표현이다.',
      wrongs:[],
      tip:'💡 make it의 다양한 의미\n• make it: 성공하다, 해내다\n• make it to ~: ~에 도착하다/참석하다\n• make it through ~: ~을 견디다/극복하다\n\n⚠️ wouldn\'t make it = 아마 성공하지 못할 것'}},

{id:21,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장50',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">I suddenly remembered what my grandfather had told me about Picasso: only a tiny fraction of the thousands of artworks he created during his lifetime <b>[① are recognized / ② were recognized]</b> by the public.</div>',
 ch:['① are recognized','② were recognized'],ans:0,
 det:{ref:'[원문] ...only a tiny fraction of the thousands of artworks he created during his lifetime are recognized by the public.\n[해석] ...그가 생전에 창작했던 수천 점의 예술 작품 중 아주 작은 부분만이 대중에 의해 인정받습니다. [문장 50 참고]',
      correct:'정답: ① are recognized. 피카소의 작품이 현재에도 인정받는 일반적 사실(현재시제)이며, 콜론(:) 뒤의 내용은 할아버지가 말한 내용을 직접 인용하는 형태이므로 현재시제가 적절하다.',
      wrongs:['① are recognized ✅ — 일반적 사실/현재의 상태를 나타내는 현재시제','② were recognized ❌ — 현재에도 유효한 사실이므로 과거시제 부적절'],
      tip:'💡 시제: 불변의 진리/일반적 사실\n• 종속절이라도 불변의 사실은 현재시제\n• 단, 여기서는 콜론(:) 뒤 독립적 진술\n\n⚠️ "remembered"에 이끌려 과거시제로 쓰기 쉬움'}},

{id:22,type:'지칭추론',diff:'보통',pts:3,fmt:'mc',note:'문장52',
 passage:`Then I thought of my grandfather and how he loved playing, practicing his art his entire life, even without fame. I realized the only way to become an old guitarist like <u>him</u> was to keep playing.`,
 stem:'위 문장의 밑줄 친 <b>him</b>이 가리키는 것으로 가장 적절한 것은?',
 ch:['① Picasso','② Jake Miller 본인','③ Jake의 할아버지','④ 프로듀서','⑤ 늙은 기타 연주자(그림 속)'],ans:2,
 det:{ref:'[원문] I realized the only way to become an old guitarist like him was to keep playing.\n[해석] 저는 할아버지 같은 늙은 기타 연주자가 되는 유일한 길은 계속 연주하는 것뿐이라는 것을 깨달았습니다. [문장 52 참고]',
      correct:'정답: ③ Jake의 할아버지. 바로 앞 문장에서 "my grandfather and how he loved playing"이라고 할아버지를 언급했으므로, him은 할아버지를 가리킨다.',
      wrongs:['① ❌ — 피카소는 화가이지 기타리스트가 아님','② ❌ — Jake 자신은 아직 젊은 뮤지션','③ ✅ — 앞 문장의 my grandfather를 받음','④ ❌ — 프로듀서는 아직 등장하지 않음','⑤ ❌ — 그림 속 인물이 아닌 실제 할아버지'],
      tip:'💡 him/her/them 등 대명사 지칭\n• 바로 앞 문장에서 언급된 인물 확인\n• "my grandfather" → "him"\n\n⚠️ The Old Guitarist(그림)와 grandfather(실제 인물) 구분!'}},

{id:23,type:'어순배열',diff:'어려움',pts:4,fmt:'mc',note:'문장53',
 passage:``,
 stem:'다음 주어진 단어를 올바른 순서로 배열한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">The happy ending to this story is that <b>[after / sent / having / my recordings / to countless producers]</b>, I finally found one who was eager to work with me.</div>',
 ch:['① after having sent my recordings to countless producers','② after sent having my recordings to countless producers','③ having after sent my recordings to countless producers','④ after having my recordings sent to countless producers','⑤ after having to countless producers sent my recordings'],ans:0,
 det:{ref:'[원문] ...after having sent my recordings to countless producers, I finally found one who was eager to work with me.\n[해석] 수많은 프로듀서에게 제 녹음을 보낸 끝에 저는 마침내 저와 함께 작업하기를 몹시 원하는 프로듀서를 찾았습니다. [문장 53 참고]',
      correct:'정답: ① after having sent my recordings to countless producers. "after having p.p."는 완료분사구문으로, 주절보다 앞선 시점의 동작을 나타낸다.',
      wrongs:['① ✅ — after having p.p. 완료분사구문','② ❌ — sent having 어순 오류','③ ❌ — having after 어순 오류','④ ❌ — 의미 변경: 녹음물을 보내게 시킨 것','⑤ ❌ — 전치사구 위치 오류'],
      tip:'💡 완료분사구문: after having p.p.\n• after having sent = after I had sent\n• 주절보다 앞선 동작 강조\n• having p.p. = 완료 동명사/분사\n\n⚠️ "after having sent"에서 having 생략 가능: "after sending"도 가능'}},

{id:24,type:'어형변화',diff:'보통',pts:3,fmt:'written',note:'문장55',
 passage:`Opportunities only come to those who are ( ___ ).`,
 stem:'위 지문의 괄호 안에 주어진 단어를 어법에 맞게 변형하시오. [prepare] (1단어, 영문 8자, p로 시작)',
 wa:"prepared",accept:["prepared","Prepared","PREPARED"],
 det:{ref:'[원문] Opportunities only come to those who are prepared.\n[해석] 기회는 준비된 자에게만 옵니다. [문장 55 참고]',
      correct:'정답: prepared. "who are prepared"는 수동태(be + p.p.)로 "준비된 상태"를 나타낸다.',
      wrongs:[],
      tip:'💡 be prepared\n• be prepared: 준비된 상태이다 (수동/형용사적)\n• prepare for: ~을 준비하다 (능동)\n• be prepared to V: 기꺼이 ~하다\n\n⚠️ prepare → prepared (과거분사/형용사)'}},

{id:25,type:'문장삽입',diff:'어려움',pts:3,fmt:'mc',note:'문장47-52',
 passage:``,
 stem:'다음 주어진 문장이 들어갈 가장 적절한 위치를 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;"><i>"I realized the only way to become an old guitarist like him was to keep playing."</i></div><br>( ① ) The funny thing was whenever anyone asked me to play a song for them, I would be so happy. ( ② ) Although my dream was to record an album, the reality was I probably wouldn\'t make it. ( ③ ) Then one day, I looked at the picture of The Old Guitarist on my wall. ( ④ ) I suddenly remembered what my grandfather had told me about Picasso: only a tiny fraction of the thousands of artworks he created during his lifetime are recognized by the public. ( ⑤ ) Then I thought of my grandfather and how he loved playing, practicing his art his entire life, even without fame.',
 ch:['① ①','② ②','③ ③','④ ④','⑤ ⑤'],ans:4,
 det:{ref:'[삽입문] I realized the only way to become an old guitarist like him was to keep playing.\n[해석] 저는 할아버지 같은 늙은 기타 연주자가 되는 유일한 길은 계속 연주하는 것뿐이라는 것을 깨달았습니다.',
      correct:'정답: ⑤. 주어진 문장에서 "like him"은 할아버지를 가리키고, 이 깨달음은 피카소에 대한 기억(④ 앞)과 할아버지의 평생 연주에 대한 생각(⑤ 앞) 뒤에 와야 자연스럽다. ⑤ 뒤에 위치하면 할아버지를 떠올린 후 깨달음에 이르는 논리적 흐름이 완성된다.',
      wrongs:['① ❌ — 아직 할아버지/피카소 이야기가 시작되지 않음','② ❌ — 꿈과 현실의 대비 중간에 깨달음이 들어가면 흐름 단절','③ ❌ — 그림을 보기 전에 깨달음이 올 수 없음','④ ❌ — 피카소 이야기 직후는 할아버지 생각으로 이어져야 함','⑤ ✅ — 할아버지의 연주 사랑을 떠올린 후 깨달음으로 자연스럽게 연결'],
      tip:'💡 문장삽입 전략\n• 지시어(him, this) → 가리키는 대상이 앞에 있어야 함\n• 논리적 흐름: 기억 → 생각 → 깨달음\n• "like him" = 할아버지 → 할아버지 언급 뒤에 위치\n\n⚠️ ④와 ⑤ 사이에서 헷갈림 주의 — ⑤가 할아버지를 직접 언급하므로 그 뒤가 적절'}},

{id:26,type:'주제',diff:'보통',pts:4,fmt:'mc',note:'종합',
 passage:FALLBACK_FULL_PASSAGE,
 stem:'윗글의 주제로 가장 적절한 것은?',
 ch:['① 효과적인 대인관계 기술을 개발하는 방법','② 자기 인식의 편향을 극복하고 끈기를 통해 성장하는 것의 중요성','③ 음악 분야에서 성공하기 위한 구체적 전략','④ 학교 교육이 학생의 성격 형성에 미치는 영향','⑤ 심리학 연구가 일상생활에 적용되는 다양한 사례'],ans:1,
 det:{ref:'[Text 1] 호감 격차 연구를 통해 자기 과소평가를 극복하고, 성격이 고정적이지 않음을 인식하라.\n[Text 2] 20년간의 노력 끝에 음반 계약을 체결한 뮤지션의 이야기를 통해 포기하지 말라는 교훈.',
      correct:'정답: ② 자기 인식의 편향을 극복하고 끈기를 통해 성장하는 것의 중요성. Text 1은 자기 인식의 편향(호감 격차, 고정된 성격 관념)을 극복하라는 메시지이고, Text 2는 끈기와 노력으로 꿈을 이루라는 메시지이다. 두 글 모두 "자기 제한을 넘어서 성장하라"는 주제를 공유한다.',
      wrongs:['① ❌ — 대인관계 기술이 아닌 자기 인식과 끈기가 핵심','② ✅ — 두 글의 공통 주제를 정확히 포괄','③ ❌ — 음악은 Text 2의 소재일 뿐 주제가 아님','④ ❌ — 학교 교육의 영향은 다루지 않음','⑤ ❌ — 심리학 연구 적용은 Text 1의 일부 소재일 뿐'],
      tip:'💡 주제 파악 전략\n• 두 글의 공통 메시지를 찾기\n• Text 1: 자기 과소평가 극복, 성격 변화 가능\n• Text 2: 포기하지 않고 꿈 추구\n• 공통점: 자기 제한 극복 + 성장\n\n⚠️ 소재(심리학, 음악)와 주제(성장, 극복)를 구분!'}},

{id:27,type:'T/F',diff:'보통',pts:4,fmt:'mc',note:'종합',
 passage:FALLBACK_FULL_PASSAGE,
 stem:'다음 중 윗글의 내용과 <b>일치하지 않는</b> 것은?',
 ch:['① Laura Thompson은 지역 대학의 지도 상담가이다.','② 실험에서 참가자들은 자신의 인상을 실제보다 더 좋게 평가했다.','③ 성격 분류는 절대적이지도 영구적이지도 않다.','④ Jake Miller의 할아버지는 클래식 기타 연주자였다.','⑤ Jake Miller는 20년간의 노력 끝에 첫 음반 계약을 체결했다.'],ans:1,
 det:{ref:'[원문] Most participants\' estimations of their partners\' responses were pessimistic, which were opposite to the real responses.\n[해석] 참가자 대부분의 평가는 비관적이었다 = 실제보다 더 나쁘게 평가. [문장 10 참고]',
      correct:'정답: ② 일치하지 않음. 참가자들은 자신의 인상을 실제보다 "더 나쁘게"(비관적으로) 평가했지, "더 좋게" 평가한 것이 아니다.',
      wrongs:['① ✅ 일치 — 문장 01에서 guidance counselor at the local college 확인','② ❌ 불일치 — 실제보다 더 좋게가 아닌 더 나쁘게 평가','③ ✅ 일치 — 문장 20: neither absolute nor permanent','④ ✅ 일치 — 문장 37: a classical guitarist','⑤ ✅ 일치 — 문장 34: after 20 years of hard work'],
      tip:'💡 T/F 문제 전략\n• 원문의 키워드를 정확히 대조\n• "더 좋게" vs "더 나쁘게" — 반대 방향 함정\n\n⚠️ pessimistic = 비관적 = 실제보다 나쁘게 평가'}},

{id:28,type:'요약',diff:'어려움',pts:4,fmt:'mc',note:'종합',
 passage:FALLBACK_FULL_PASSAGE,
 stem:'윗글을 다음과 같이 요약할 때, 빈칸 (A)~(D)에 들어갈 말로 가장 적절한 것은?<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">People tend to (A)___ themselves due to the "liking gap." Also, personality is not (B)___. Meanwhile, Jake Miller\'s story shows that (C)___ and dedication can lead to success, as opportunities come to those who are (D)___.</div>',
 ch:['① (A) underestimate - (B) fixed - (C) persistence - (D) prepared','② (A) overestimate - (B) fixed - (C) talent - (D) prepared','③ (A) underestimate - (B) changing - (C) persistence - (D) lucky','④ (A) overestimate - (B) permanent - (C) talent - (D) lucky','⑤ (A) underestimate - (B) permanent - (C) persistence - (D) talented'],ans:0,
 det:{ref:'[Text 1] We often underestimate ourselves (문장 14) / personality is not fixed (문장 17, 20)\n[Text 2] After 20 years of hard work (persistence, 문장 34) / those who are prepared (문장 55)',
      correct:'정답: ① (A) underestimate - (B) fixed - (C) persistence - (D) prepared. 호감 격차로 인해 자신을 과소평가(underestimate)하고, 성격은 고정적(fixed)이지 않으며, Jake의 끈기(persistence)와 준비(prepared)가 성공으로 이어졌다.',
      wrongs:['① ✅ — 모든 빈칸이 본문 내용과 일치','② ❌ — overestimate(과대평가)는 반대, talent는 본문 강조점 아님','③ ❌ — changing은 "변하는"으로 의미 반전, lucky는 본문과 다름','④ ❌ — overestimate 반대, lucky는 본문과 다름','⑤ ❌ — permanent는 맞으나 talented는 본문 강조점 아님'],
      tip:'💡 요약문 전략\n• 각 빈칸의 키워드를 본문에서 확인\n• underestimate(문장14), fixed(문장17), prepared(문장55)\n\n⚠️ overestimate(과대평가) vs underestimate(과소평가) 방향 주의!'}},

{id:29,type:'추론',diff:'보통',pts:3,fmt:'mc',note:'종합',
 passage:FALLBACK_FULL_PASSAGE,
 stem:'윗글을 읽고 <b>추론할 수 없는</b> 내용은?',
 ch:['① 사람들은 실제보다 자신의 첫인상을 부정적으로 인식하는 경향이 있다.','② 행동 변화를 통해 성격도 변할 수 있다.','③ Jake의 할아버지는 유명한 기타 연주자로 대중에게 인정받았다.','④ Jake는 수년간 무명 거리에서 공연하며 준비했다.','⑤ 기회는 준비된 사람에게 찾아온다.'],ans:2,
 det:{ref:'[원문] ...he loved playing, practicing his art his entire life, even without fame.\n[해석] 명성 없이도 평생 연주를 사랑했다. [문장 51 참고]',
      correct:'정답: ③ 추론 불가. 본문에서 할아버지는 "even without fame(명성 없이도)" 평생 연주를 했다고 했으므로, 유명한 연주자로 대중에게 인정받았다는 추론은 본문과 반대된다.',
      wrongs:['① ✅ 추론 가능 — 호감 격차(liking gap) 연구 결과','② ✅ 추론 가능 — 문장 28: 행동 변화 → 성격 변화','③ ❌ 추론 불가 — "without fame"이므로 유명하지 않았음','④ ✅ 추론 가능 — 문장 56: performing on unknown streets','⑤ ✅ 추론 가능 — 문장 55: Opportunities only come to those who are prepared'],
      tip:'💡 추론 불가 문제 전략\n• 본문의 내용과 정반대인 선지 찾기\n• "without fame" = 명성 없이 → "유명했다"는 추론 불가\n\n⚠️ "추론할 수 없는"을 "추론할 수 있는"으로 읽는 실수 주의!'}},

{id:30,type:'주제빈칸',diff:'보통',pts:3,fmt:'written',note:'종합',
 passage:FALLBACK_FULL_PASSAGE,
 stem:'윗글의 주제를 다음과 같이 쓸 때, 빈칸에 알맞은 단어를 본문에서 찾아 쓰시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">The importance of overcoming self-doubt and keeping p________ to achieve one\'s goals</div><br>(1단어, 영문 11자, p로 시작)',
 wa:"persistence",accept:["persistence","Persistence","PERSISTENCE","persisting"],
 det:{ref:'[종합] Text 1: 자기 의심(호감 격차) 극복 / Text 2: 끈기(persistence)로 목표 달성',

let QUESTION_BANK = {};
let FULL_PASSAGE = '';

// Deep-copy fallback into QUESTION_BANK on init
(function initFallback(){
  try{QUESTION_BANK=JSON.parse(JSON.stringify(FALLBACK_QUESTION_BANK));}catch(e){QUESTION_BANK={};}
  FULL_PASSAGE=FALLBACK_FULL_PASSAGE;

// ━━ FETCH & PARSE LOGIC ━━
function parseTestHTML(htmlText) {
  // Extract FULL_PASSAGE if present
  const fpMatch = htmlText.match(/const\s+FULL_PASSAGE\s*=\s*`([\s\S]*?)`;/);
  const fullPassage = fpMatch ? fpMatch[1] : null;

  // Extract EI
  const eiMatch = htmlText.match(/const\s+EI\s*=\s*(\{[\s\S]*?\});/);
  let ei = null;
  if (eiMatch) {
    try { ei = (new Function('return ' + eiMatch[1]))(); } catch(e) { console.warn('EI parse error:', e); }
  }

  // Extract Q array — bracket matching
  const qIdx = htmlText.search(/const\s+Q\s*=\s*\[/);
  let questions = [];
  if (qIdx >= 0) {
    const bracketStart = htmlText.indexOf('[', qIdx);
    let depth = 0, end = bracketStart;
    for (let i = bracketStart; i < htmlText.length; i++) {
      if (htmlText[i] === '[') depth++;
      else if (htmlText[i] === ']') depth--;
      if (depth === 0) { end = i + 1; break; }
    }
    const qStr = htmlText.slice(bracketStart, end);
    try {
      if (fullPassage) {
        questions = (new Function('FULL_PASSAGE', 'return ' + qStr))(fullPassage);
      } else {
        questions = (new Function('return ' + qStr))();
      }
    } catch(e) { console.warn('Q parse error:', e); }
  }
  return { ei, questions, fullPassage };
}

// Fetch cache
const _fetchCache = {};

async function fetchTestQuestions(testType, selKey) {
  const cacheKey = testType + '|' + selKey;
  if (_fetchCache[cacheKey]) return _fetchCache[cacheKey];

  const path = '교과서/' + selKey + '/' + testType + '.html';
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    const { ei, questions, fullPassage } = parseTestHTML(html);
    if (questions.length) {
      _fetchCache[cacheKey] = questions;
      if (!QUESTION_BANK[testType]) QUESTION_BANK[testType] = {};
      QUESTION_BANK[testType][selKey] = questions;
      if (fullPassage) FULL_PASSAGE = fullPassage;
      return questions;
    }
  } catch(e) {
    console.warn('Fetch failed for', path, '- using fallback:', e.message);
  }
  return null;
}

async function ensureQuestionsLoaded(testType, selections) {
  const promises = selections.map(sel => {
    if (QUESTION_BANK[testType] && QUESTION_BANK[testType][sel]) return Promise.resolve();
    return fetchTestQuestions(testType, sel);
  });
  await Promise.all(promises);
}

// ━━ Weekly Report ━━
function getWeeklyReport(){
  const hist=gH();const now=new Date();const weekAgo=new Date(now-7*86400000);
  const thisWeek=hist.filter(r=>{const d=new Date(r.date);return d>=weekAgo;});
  if(!thisWeek.length)return null;
  const count=thisWeek.length;
  const avgScore=Math.round(thisWeek.reduce((a,r)=>a+r.score,0)/count);
  const bestScore=Math.max(...thisWeek.map(r=>r.score));
  // Find most improved type
  const tM={};thisWeek.forEach(r=>{if(r.tM)Object.entries(r.tM).forEach(([t,v])=>{if(!tM[t])tM[t]={total:0,ok:0};tM[t].total+=v.total;tM[t].ok+=v.ok;});});
  let bestType=null,bestPct=0;
  Object.entries(tM).forEach(([t,v])=>{const p=Math.round(v.ok/v.total*100);if(p>bestPct){bestPct=p;bestType=t;}});
  return{count,avgScore,bestScore,bestType,bestPct};
}
