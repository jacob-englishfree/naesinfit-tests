function confetti(){
  const cv=$('confetti'),ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const particles=[];const colors=['#3182F6','#00C072','#F59E0B','#F04452','#8B5CF6','#FF6B6B'];
  for(let i=0;i<80;i++)particles.push({x:cv.width/2,y:cv.height/2,vx:(Math.random()-.5)*12,vy:Math.random()*-14-4,size:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rv:(Math.random()-.5)*8,life:1});
  let frame=0;
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
    particles.forEach(p=>{if(p.life<=0)return;alive=true;p.x+=p.vx;p.vy+=.25;p.y+=p.vy;p.rot+=p.rv;p.life-=.012;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();});
    if(alive&&frame<180){frame++;requestAnimationFrame(draw);}else{ctx.clearRect(0,0,cv.width,cv.height);}
  }
  draw();
}

// ━━ Score counter animation ━━
function animateScore(target){
  const el=$('scoreNum');if(!el)return;
  const ring=$('scoreRing');const circ=2*Math.PI*70;
  const dur=1400;const start=performance.now();
  function step(ts){const p=Math.min((ts-start)/dur,1);const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*ease);
    if(ring)ring.style.strokeDashoffset=circ*(1-target/100*ease);
    if(p<1)requestAnimationFrame(step);
    else{
      // Animate level bar
      const lb=$('lvBar');if(lb)lb.style.width=target+'%';
      // Animate type bars
      document.querySelectorAll('.r-bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%';});
    }}
  requestAnimationFrame(step);
}

function setBottom(html){const b=$('bottomBar');if(!html){b.style.display='none';b.innerHTML='';return;}b.innerHTML=html;b.style.display='';}
function R(){({login:rLogin,home:rHome,learn:rLearn,record:rRecord,my:rMy,select:rSel,settings:rSet,exam:rExam,result:rResult}[S.scr]||rLogin)();
  // Apply page transition direction
  const pg=app.querySelector('.page');if(pg&&S.dir&&S.dir!=='none'){pg.classList.remove('slide-left','slide-right');if(S.dir==='back')pg.classList.add('slide-right');else if(S.dir==='fwd')pg.classList.add('slide-left');}S.dir='fwd';
  // Tab bar visibility
  const tabScreens=['home','learn','record','my'];

    // Staggered reveal + count-up for tab pages
    requestAnimationFrame(()=>{const cards=app.querySelectorAll('.card,.sec-label');cards.forEach((c,i)=>{c.classList.add('reveal');setTimeout(()=>c.classList.add('show'),50*i);});setTimeout(applyCountUps,200);});
  }else{tb.style.display='none';}}
function switchTab(tab){if(S.scr===tab)return;haptic('tap');S.scr=tab;S.dir='none';R();
  // Tab bounce animation
  const ti=$('tab_'+tab);if(ti){ti.classList.remove('tab-bounce');void ti.offsetWidth;ti.classList.add('tab-bounce');ti.addEventListener('animationend',()=>ti.classList.remove('tab-bounce'),{once:true});}
  // Staggered reveal for cards
  requestAnimationFrame(()=>{const cards=app.querySelectorAll('.card,.sec-label');cards.forEach((c,i)=>{c.classList.add('reveal');setTimeout(()=>c.classList.add('show'),60*i);});});
}

// ━━ Count-up Animation ━━
function countUp(el,target,duration=800){
  if(!el)return;const start=performance.now();const from=0;
  function step(now){const p=Math.min((now-start)/duration,1);const eased=1-Math.pow(1-p,3);// easeOutCubic
  el.textContent=Math.round(from+(target-from)*eased);if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}
// Apply count-up to elements with data-count attribute
function applyCountUps(){
  document.querySelectorAll('[data-count]').forEach(el=>{
    const target=parseInt(el.getAttribute('data-count'));
    if(!isNaN(target))countUp(el,target);
  });
}

// ━━ Passage Memorization Question Generator ━━
function generatePassageQuestions(passage){
  if(!passage||!passage.trim())return[];
  // Clean passage: remove extra whitespace
  const clean=passage.replace(/\n+/g,' ').replace(/\s+/g,' ').trim();
  // Split into sentences
  const sentences=clean.match(/[^.!?]+[.!?]+/g)||[clean];
  const questions=[];
  // Key word patterns: 4+ letter words, skip common words
  const skip=new Set(['this','that','these','those','then','than','them','they','their','there','with','from','have','been','were','will','would','could','should','about','after','before','which','where','when','what','into','also','just','like','very','even','only','some','most','many','more','each','your','other','over','such','back','because','between','through','during','without','however','although']);
  let id=1;
  sentences.forEach(sent=>{
    const trimmed=sent.trim();if(trimmed.length<20)return;
    // Find blankable words (4+ chars, not in skip list)
    const words=trimmed.split(/\s+/);
    const candidates=[];
    words.forEach((w,i)=>{
      const cleaned=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
      if(cleaned.length>=4&&!skip.has(cleaned)){candidates.push({word:w,cleanWord:cleaned,idx:i});}
    });
    if(!candidates.length)return;
    // Pick 1-2 words per sentence
    shuffle(candidates);
    const picks=candidates.slice(0,Math.min(2,candidates.length));
    picks.forEach(pick=>{
      // Build sentence with blank
      const blanked=words.map((w,i)=>{
        if(i===pick.idx){
          const punc=w.replace(/[a-zA-Z''-]+/,'');
          return '<b>__________</b>'+punc;
        }
        return w;
      }).join(' ');
      // Extract the actual answer (letters only + apostrophes)
      const ansWord=pick.word.replace(/[^a-zA-Z'''-]/g,'');
      questions.push({
        id:id++,type:'본문 빈칸',diff:'보통',pts:3,fmt:'written',
        passage:`<div style="line-height:2">${blanked}</div>`,
        stem:'다음 본문의 빈칸에 들어갈 단어를 쓰시오.',
        wa:ansWord,
        accept:[ansWord,ansWord.toLowerCase(),ansWord.toUpperCase(),ansWord.charAt(0).toUpperCase()+ansWord.slice(1).toLowerCase()],
        det:{
          ref:'[원문] '+trimmed,
          correct:'정답: '+ansWord,
          tip:'본문을 반복해서 읽고 핵심 단어를 암기하세요.'
        }
      });
    });
  });
  return questions;
}

async function loadPassageQuestions(){
  if(!QUESTION_BANK['본문암기'])QUESTION_BANK['본문암기']={};

    if(QUESTION_BANK['본문암기'][sel])return;

    const types=['단어테스트','워크북테스트','퀴즈테스트'];
    let passage=null;
    for(const t of types){
      const path='교과서/'+sel+'/'+t+'.html';
      try{
        const resp=await fetch(path);
        if(!resp.ok)continue;
        const html=await resp.text();
        const fpMatch=html.match(/const\s+FULL_PASSAGE\s*=\s*`([\s\S]*?)`;/);
        if(fpMatch){passage=fpMatch[1];break;}

    const qs=generatePassageQuestions(passage);
    if(qs.length)QUESTION_BANK['본문암기'][sel]=qs;
  });
  await Promise.all(promises);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
async function startE(){
  // Show skeleton loading
  app.innerHTML=`<div class="page"><div style="padding:20px"><div class="skeleton" style="height:52px;margin-bottom:16px"></div><div class="skeleton" style="height:36px;width:60%;margin-bottom:24px"></div><div class="skeleton" style="height:200px;margin-bottom:12px;border-radius:var(--r-xl)"></div><div class="skeleton" style="height:160px;margin-bottom:12px;border-radius:var(--r-xl)"></div><div class="skeleton" style="height:44px;width:40%;margin-bottom:12px"></div></div></div>`;
  setBottom(null);
  await ensureQuestionsLoaded(S.tt,S.sel);const b=QUESTION_BANK[S.tt]||{};
  // Build per-selection pools
  const groups=[];S.sel.forEach(k=>{if(b[k]&&b[k].length)groups.push(b[k].map(q=>({...q})));});
  if(!groups.length){toast('선택한 범위에 문항이 없어요');return;}
  // Even distribution: base per group + remainder distributed round-robin
  const n=groups.length,total=S.qc;const base=Math.floor(total/n);let rem=total%n;
  let pool=[];groups.forEach(g=>{shuffle(g);const take=Math.min(g.length,base+(rem>0?1:0));if(rem>0)rem--;pool.push(...g.slice(0,take));});
  // If some groups had fewer than quota, fill from remaining
  if(pool.length<total){const used=new Set(pool.map(q=>q.id+'_'+(q.stem||'').slice(0,20)));let extras=[];groups.forEach(g=>g.forEach(q=>{if(!used.has(q.id+'_'+(q.stem||'').slice(0,20)))extras.push(q);}));shuffle(extras);pool.push(...extras.slice(0,total-pool.length));}
  shuffle(pool);S.qs=pool.slice(0,total);S.ans={};S.ci=0;S.scr='exam';S.ts=Date.now();S.te=0;S.tlf=S.tl;if(S.ti)clearInterval(S.ti);S.ti=setInterval(()=>{S.te=Math.floor((Date.now()-S.ts)/1000);S.tlf=Math.max(0,S.tl-S.te);const el=$('tmr');if(el){el.textContent=ft(S.tlf);el.className='timer-display'+(S.tlf<=60?' danger':S.tlf<=300?' warn':'');}if(S.tlf<=0){clearInterval(S.ti);doSub(true);}},1000);R();}

function updateExAc(){const ac=Object.keys(S.ans).length,tot=S.qs.length;const el=$('exAc');if(el)el.textContent=ac+'/'+tot+' 응답';}

function goQ(di){if(di<0||di>=S.qs.length)return;S.ci=di;renderExQ();scrollTo(0,0);}

function confirmExit(){const d=document.createElement('div');d.className='modal-overlay';d.id='cexit';d.innerHTML=`<div class="modal-box"><div style="font-size:40px;margin-bottom:12px">🚪</div><div class="t-title">시험을 그만둘까요?</div><div class="t-caption c-sub" style="margin-top:6px;margin-bottom:24px">진행 중인 시험은 저장되지 않아요</div><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" style="flex:1" onclick="$('cexit').remove()">계속 풀게요</button><button class="btn btn-red btn-sm" style="flex:1" onclick="$('cexit').remove();goHome()">나갈게요</button></div></div>`;document.body.appendChild(d);}

// ━━ SUBMIT ━━
function doSub(auto){
  if(!S.qs.length){toast('시험 데이터가 없어요');return;}
  if(!auto){const un=S.qs.length-Object.keys(S.ans).length;if(un>0){const d=document.createElement('div');d.className='modal-overlay';d.id='cm';d.innerHTML=`<div class="modal-box"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div class="t-title">${un}문항이 비어있어요</div><div class="t-caption c-sub" style="margin-top:6px;margin-bottom:24px">빈 문항은 오답으로 처리돼요</div><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" style="flex:1" onclick="$('cm').remove()">돌아갈게요</button><button class="btn btn-red btn-sm" style="flex:1" onclick="$('cm').remove();doSub(true)">제출할게요</button></div></div>`;document.body.appendChild(d);return;}}
  if(S.ti)clearInterval(S.ti);
  let tP=0,eP=0,ok=0,no=0,sk=0;const tM={};
  const det=S.qs.map((q,i)=>{tP+=q.pts||0;const a=S.ans[i];let c=false;if(a===undefined||a==='')sk++;else if(q.fmt==='mc')c=a===q.ans;else{const u=String(a).trim().replace(/\s+/g,' ').toLowerCase();if(q.accept)c=q.accept.some(x=>x.trim().replace(/\s+/g,' ').toLowerCase()===u);if(!c&&q.wa)c=u===q.wa.trim().replace(/\s+/g,' ').toLowerCase();}if(c){ok++;eP+=(q.pts||0);}else if(a!==undefined&&a!=='')no++;const t=q.type||'기타';if(!tM[t])tM[t]={total:0,ok:0};tM[t].total++;if(c)tM[t].ok++;return{q,ua:a,ok:c};});
  const score=tP>0?Math.round(eP/tP*100):0;
  S.res={score,ok,no,sk,tP,eP,lv:LV(score),det,tM};S.scr='result';S.rv={};
  sH({date:new Date().toLocaleDateString('ko-KR'),score,ok,no,sk,tP,eP,time:ftk(S.te),type:S.tt,level:LV(score).i+' '+LV(score).n,det,tM});
  if(S._isReview){removeWrongs(det);S._isReview=false;}
  else if(S._isDaily){saveDailyState({date:new Date().toISOString().slice(0,10),completed:true,score});S._isDaily=false;addWrongs(det);}
  else{addWrongs(det);}
  updateStreak();
  // XP, Type Analysis, Badges
  const xpGain=xpFromScore(score,S.qs.length);
  const xpResult=addXP(xpGain);
  addCumType(tM);
  const newBadges=checkBadges();
  S.res.xpGain=xpGain;S.res.xpResult=xpResult;
  haptic('submit');
  R();
  // Animations
  setTimeout(()=>animateScore(score),100);
  if(score>=80)setTimeout(confetti,400);
  // Badge toasts
  if(newBadges.length){let delay=score>=80?1200:800;newBadges.forEach((b,i)=>{setTimeout(()=>showBadgeToast(b),delay+i*2500);});}
}

// ━━ RESULT ━━
function rResult(){setBottom(null);
  const r=S.res,l=r.lv,p=profile,pass=r.score>=80;
  const pT=Object.entries(r.tM).filter(([,v])=>v.ok===v.total).map(([k])=>k);
  const wT=Object.entries(r.tM).filter(([,v])=>v.ok<v.total).map(([k])=>k);
  const fromH=S.fromHist;S.fromHist=false;
  const circ=2*Math.PI*70;let si=0;const d=ms=>`animation-delay:${ms}ms`;

  let h=`<div class="page">${fromH?'<div class="nav"><button class="nav-back" onclick="goHome()">←</button><div class="nav-title">시험 기록</div></div>':''}`;

  // Score ring hero
  h+=`<div class="result-top r-anim" style="${d(0)}"><div class="score-ring"><svg viewBox="0 0 160 160"><circle class="ring-bg" cx="80" cy="80" r="70"/><circle class="ring-fill ${pass?'pass':'fail'}" id="scoreRing" cx="80" cy="80" r="70" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/></svg><div class="score-inner"><div class="score-num"><span id="scoreNum">0</span><span class="unit">점</span></div></div></div><div class="pass-badge ${pass?'y':'n'}">${pass?'통과':'미통과'}</div><div class="r-stats"><div class="r-stat"><div class="sv g">${r.ok}</div><div class="sl">정답</div></div><div class="r-stat"><div class="sv r">${r.no}</div><div class="sl">오답</div></div><div class="r-stat"><div class="sv">${r.sk}</div><div class="sl">미응답</div></div><div class="r-stat"><div class="sv">${ftk(S.te)}</div><div class="sl">소요시간</div></div></div></div>`;

  // 시험 정보
  h+=`<div class="r-sec r-anim" style="${d(100)}"><div class="r-sec-h">시험 정보</div><div class="info-grid"><div class="info-cell"><div class="ik">이름</div><div class="iv">${esc(p.name)}</div></div><div class="info-cell"><div class="ik">학교 / 학년</div><div class="iv">${esc(p.school||'-')} · ${esc(p.grade)}</div></div><div class="info-cell"><div class="ik">테스트</div><div class="iv">${S.tt}</div></div><div class="info-cell"><div class="ik">응시일</div><div class="iv">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell hl"><div class="ik">점수</div><div class="iv">${r.score}점 (${r.eP}/${r.tP})</div></div><div class="info-cell hl"><div class="ik">통과</div><div class="iv">${pass?'통과':'미통과'}</div></div></div></div>`;

  // 레벨 + XP
  const xpG=r.xpGain||0;const xpR=r.xpResult||getXP();const xpPct=Math.min(100,Math.round(xpR.xp/xpForLevel(xpR.lv)*100));
  h+=`<div class="r-sec r-anim" style="${d(200)}"><div class="r-sec-h">레벨</div><div class="lv-card"><div class="lv-emoji">${l.i}</div><div class="lv-name">${l.n}</div><div class="lv-range">${l.r}점 구간</div><div class="lv-bar"><div class="lv-fill" id="lvBar"></div></div><div class="lv-msg">${l.m}</div></div>
  ${xpG?`<div style="margin-top:12px;padding:14px 16px;background:var(--blue-l);border-radius:var(--r-md);display:flex;align-items:center;justify-content:space-between"><div><span style="font-size:13px;font-weight:700;color:var(--blue)">+${xpG} XP 획득!</span><span style="font-size:12px;color:var(--sub);margin-left:8px">Lv.${xpR.lv} ${lvName(xpR.lv)}</span></div><div style="font-size:11px;color:var(--sub)">${xpR.xp}/${xpForLevel(xpR.lv)}</div></div>`:''}</div>`;

  // 유형별 분석
  h+=`<div class="r-sec r-anim" style="${d(300)}"><div class="r-sec-h">유형별 분석</div>`;
  Object.entries(r.tM).forEach(([t,v])=>{const pc=Math.round(v.ok/v.total*100);const c=pc>=80?'var(--green)':pc>=50?'var(--yellow)':'var(--red)';h+=`<div class="type-row"><span class="tl">${t.slice(0,8)}</span><div class="bar"><div class="fill r-bar-fill" data-w="${pc}" style="background:${c}"></div></div><span class="tp" style="color:${c}">${v.ok}/${v.total}</span></div>`;});
  if(pT.length)h+=`<div class="tags">${pT.map(t=>`<span class="tag g">${t.slice(0,8)}</span>`).join('')}</div>`;
  if(wT.length)h+=`<div class="tags">${wT.map(t=>`<span class="tag r">${t.slice(0,8)}</span>`).join('')}</div>`;
  h+=`</div>`;

  // 학습 플랜
  h+=`<div class="r-sec r-anim" style="${d(400)}"><div class="r-sec-h">학습 플랜</div><div class="plan">`;
  if(r.score>=95)h+=`<div class="plan-i">${l.i}</div><div><h4>완벽!</h4><p>다른 단원도 도전하세요.</p></div>`;
  else if(r.score>=80)h+=`<div class="plan-i">${l.i}</div><div><h4>통과! 더 올릴 수 있어요</h4><p>틀린 유형만 집중 복습하면 만점!</p></div>`;
  else if(r.score>=60)h+=`<div class="plan-i">${l.i}</div><div><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;
  else h+=`<div class="plan-i">${l.i}</div><div><h4>기본기부터!</h4><p>지문 해석을 완벽히 이해한 뒤 재도전!</p></div>`;
  h+=`</div></div>`;

  // 액션
  h+=`<div class="r-sec r-anim" style="${d(500)}"><div class="r-sec-h">액션</div><div class="act-grid"><button class="act" onclick="cpRes()"><span class="ai">📋</span><span class="al">결과 복사</span></button><button class="act" onclick="svImg()"><span class="ai">🖼️</span><span class="al">이미지 저장</span></button>${fromH?'':`<button class="act" onclick="startE()"><span class="ai">🔄</span><span class="al">재시험</span></button>`}<button class="act primary" onclick="goHome()"><span class="ai">🏠</span><span class="al">홈으로</span></button></div></div>`;

  // 정답과 해설
  h+=`<div class="r-sec r-anim" style="${d(600)}"><div class="r-sec-h">정답과 해설 <span class="t-tiny c-hint" style="font-weight:400;margin-left:4px">탭하여 펼치기</span></div>`;
  r.det.forEach((dd,i)=>{const ic=dd.ok?'<span class="spring-check">✅</span>':(dd.ua===undefined||dd.ua===''?'⬜':'<span class="shake">❌</span>');const ua=dd.q.fmt==='mc'?(dd.ua!==undefined?NM[dd.ua]||'':'미응답'):(dd.ua||'미응답');const ca=dd.q.fmt==='mc'?(NM[dd.q.ans]||''):(dd.q.wa||'');const so=!dd.ok;const dt=dd.q.det||{};
    h+=`<div class="rev"><div class="rev-h" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.ra').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><span class="ri">${ic}</span><span class="rt">${dd.q.id||i+1}번 [${(dd.q.type||'').slice(0,8)}]</span><span class="rp">${dd.q.pts||0}점</span><span class="ra" style="${so?'transform:rotate(180deg)':''}">▼</span></div><div class="rev-b${so?' open':''}"><div class="ans-cmp"><div class="ans-box ${dd.ok?'ok':'no'}"><div class="label">내 답</div>${ua}</div><div class="ans-box cor"><div class="label">정답</div>${ca}</div></div>`;
    if(dt.korean)h+=`<div class="det-tag b">해석</div><div class="det-box hl">${dt.korean}</div>`;
    if(dt.analysis)h+=`<div class="det-tag g">분석</div><div class="det-box">${dt.analysis}</div>`;
    if(dt.ref)h+=`<div class="det-tag b">원문</div><div class="det-box hl">${String(dt.ref).replace(/\n/g,'<br>')}</div>`;
    if(dt.correct)h+=`<div class="det-tag g">해설</div><div class="det-box">${String(dt.correct).replace(/\n/g,'<br>')}</div>`;
    if(dt.wrongs&&dt.wrongs.length)h+=`<div class="det-tag g">오답</div><div class="det-box">${dt.wrongs.join('<br>')}</div>`;
    if(dt.tip)h+=`<div class="det-tag b">팁</div><div class="det-box hl">${String(dt.tip).replace(/\n/g,'<br>')}</div>`;
    h+=`</div></div>`;});
  h+=`</div><div style="padding:20px"><button class="btn btn-blue" onclick="goHome()" style="width:100%">홈으로 돌아가기</button></div><div style="height:20px"></div></div>`;
  app.innerHTML=h;scrollTo(0,0);
}

// ━━ COPY ━━
function cpRes(){const r=S.res,p=profile,l=r.lv;let t=`━━━━━━━━━━━━━━━━━━━━━━━━━\n🎯 내신핏 ${S.tt} 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 ${p.name} · ${p.school||''} · ${p.grade||''}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n📊 점수: ${r.score}/100\n✅ ${r.ok} ❌ ${r.no} ⬜ ${r.sk}\n🏅 ${l.i} ${l.n} · ⏱ ${ftk(S.te)}\n\n`;Object.entries(r.tM).forEach(([k,v])=>t+=`${k}: ${v.ok}/${v.total} (${Math.round(v.ok/v.total*100)}%)\n`);t+=`━━━━━━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(t).then(()=>toast('📋 결과를 복사했어요')).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 결과를 복사했어요');});}

// ━━ IMAGE ━━
function svImg(){
  const r=S.res,p=profile,l=r.lv,pass=r.score>=80;
  const W=800,sc=2,pad=40,cw=W-pad*2;

  // ── Pre-calculate total height
  const typeCount=Object.keys(r.tM).length;
  const qCount=r.det.length;
  const totalH=40+180+20+160+20+70+20+90+20+(50+typeCount*36)+20+(50+qCount*32)+40+30;

  const cv=document.createElement('canvas');cv.width=W*sc;cv.height=totalH*sc;
  const c=cv.getContext('2d');c.scale(sc,sc);

  // Helpers
  function rr(x,y,w,h,rad){c.beginPath();c.moveTo(x+rad,y);c.lineTo(x+w-rad,y);c.quadraticCurveTo(x+w,y,x+w,y+rad);c.lineTo(x+w,y+h-rad);c.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);c.lineTo(x+rad,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rad);c.lineTo(x,y+rad);c.quadraticCurveTo(x,y,x+rad,y);c.closePath();}
  function fillRR(x,y,w,h,rad,color){rr(x,y,w,h,rad);c.fillStyle=color;c.fill();}
  function txt(text,x,y,size,weight,color,align){c.font=weight+' '+size+'px "Noto Sans KR",sans-serif';c.fillStyle=color;c.textAlign=align||'left';c.textBaseline='middle';c.fillText(text,x,y);}
  function bar(x,y,w,h,pct,bg,fg){fillRR(x,y,w,h,h/2,bg);if(pct>0)fillRR(x,y,Math.max(w*Math.min(pct/100,1),h),h,h/2,fg);}

  // ── Background
  c.fillStyle='#F2F4F6';c.fillRect(0,0,W,totalH);

  let Y=40;

  // ━━ Header gradient card
  const grd=c.createLinearGradient(pad,Y,W-pad,Y+180);
  grd.addColorStop(0,'#3182F6');grd.addColorStop(1,'#1B64DA');
  fillRR(pad,Y,cw,180,20,grd);
  c.globalAlpha=0.08;c.fillStyle='#FFF';c.beginPath();c.arc(W-100,Y+40,60,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(W-160,Y+140,40,0,Math.PI*2);c.fill();c.globalAlpha=1;
  txt('NAESINFIT',pad+28,Y+40,11,'700','rgba(255,255,255,.6)');
  txt('내신핏 '+S.tt+' 결과',pad+28,Y+75,22,'800','#FFFFFF');
  txt(p.name+' · '+(p.school||'')+' · '+(p.grade||''),pad+28,Y+108,14,'500','rgba(255,255,255,.8)');
  txt(new Date().toLocaleDateString('ko-KR')+' · ⏱ '+ftk(S.te),pad+28,Y+135,12,'500','rgba(255,255,255,.6)');
  Y+=200;

  // ━━ Score card
  fillRR(pad,Y,cw,160,16,'#FFFFFF');
  txt(String(r.score),W/2,Y+65,64,'900',pass?'#191F28':'#F04452','center');
  txt('/ 100점',W/2,Y+100,14,'600','#8B95A1','center');
  const bTxt=pass?'🎉 통과':'📚 미통과',bBg=pass?'#E8F3FF':'#FFF0F0',bCol=pass?'#3182F6':'#F04452';
  fillRR(W/2-44,Y+118,88,28,14,bBg);
  txt(bTxt,W/2,Y+132,12,'700',bCol,'center');
  Y+=180;

  // ━━ Stats row
  fillRR(pad,Y,cw,70,16,'#FFFFFF');
  const sw=cw/4;
  [{v:r.ok,l:'정답',c:'#00C072'},{v:r.no,l:'오답',c:'#F04452'},{v:r.sk,l:'미응답',c:'#8B95A1'},{v:ftk(S.te),l:'소요시간',c:'#3182F6'}].forEach((s,i)=>{
    txt(String(s.v),pad+sw*i+sw/2,Y+30,i===3?14:22,i===3?'700':'800',s.c,'center');
    txt(s.l,pad+sw*i+sw/2,Y+52,11,'500','#8B95A1','center');
    if(i<3){c.fillStyle='#F2F4F6';c.fillRect(pad+sw*(i+1),Y+12,1,46);}
  });
  Y+=90;

  // ━━ Level card
  fillRR(pad,Y,cw,90,16,'#FFFFFF');
  txt(l.i,pad+28,Y+45,36,'400','#000');
  txt(l.n,pad+80,Y+35,20,'800','#3182F6');
  txt(l.r+'점 구간 · '+l.m,pad+80,Y+60,12,'500','#8B95A1');
  bar(pad+80,Y+74,cw-80-pad,6,r.score,'#F2F4F6','#3182F6');
  Y+=110;

  // ━━ Type analysis
  const typeH=50+typeCount*36;
  fillRR(pad,Y,cw,typeH,16,'#FFFFFF');
  txt('📊 유형별 분석',pad+20,Y+28,14,'700','#191F28');
  let ty=Y+50;
  Object.entries(r.tM).forEach(([type,data])=>{
    const pct=Math.round(data.ok/data.total*100);
    const col=pct>=80?'#00C072':pct>=50?'#F59E0B':'#F04452';
    txt(type.slice(0,8),pad+20,ty+12,12,'600','#6B7684');
    bar(pad+130,ty+6,cw-130-pad-90,8,pct,'#F2F4F6',col);
    txt(data.ok+'/'+data.total+' ('+pct+'%)',pad+cw-20,ty+12,11,'700',col,'right');
    ty+=36;
  });
  Y+=typeH+20;

  // ━━ Question results — with my answer vs correct answer
  const qH=50+qCount*32;
  fillRR(pad,Y,cw,qH,16,'#FFFFFF');
  txt('📝 문항별 결과',pad+20,Y+28,14,'700','#191F28');
  let qy=Y+50;
  r.det.forEach((d,i)=>{
    const icon=d.ok?'✅':'❌';
    const ca=d.q.fmt==='mc'?(NM[d.q.ans]||''):(d.q.wa||'');
    const ua=d.q.fmt==='mc'?(d.ua!==undefined?(NM[d.ua]||'?'):'—'):(d.ua||'—');
    const col=d.ok?'#00C072':'#F04452';
    // Light row background for wrong answers
    if(!d.ok)fillRR(pad+12,qy-4,cw-24,26,6,'#FFF8F8');
    txt(icon,pad+20,qy+8,12,'400',col);
    txt('Q'+(i+1),pad+44,qy+8,12,'700','#191F28');
    txt('['+((d.q.type||'').slice(0,6))+'] '+(d.q.pts||0)+'점',pad+80,qy+8,11,'500','#8B95A1');
    txt('내답: '+ua,pad+260,qy+8,11,'600',d.ok?'#00C072':'#F04452');
    txt('정답: '+ca,pad+420,qy+8,11,'600','#00C072');
    qy+=32;
  });
  Y=qy+20;

  // ━━ Footer
  txt('내신핏 NAESINFIT · 온라인 영어학원',W/2,Y,10,'500','#B0B8C1','center');

  cv.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='내신핏_'+S.tt+'_'+p.name+'_'+new Date().toISOString().slice(0,10)+'.png';
    a.click();
    toast('🖼️ 이미지를 저장했어요');
  });
}

R();
</script>
