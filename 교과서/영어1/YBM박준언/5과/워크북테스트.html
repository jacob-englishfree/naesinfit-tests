<style>
:root{--o:#7C3AED;--od:#5B21B6;--ol:#A78BFA;--oxl:#F3F0FF;--oxxl:#FAF5FF;--bg:#F5F3FF;--text:#1E1B18;--tm:#6B6560;--tl:#A09890;--g:#1A9960;--gl:#E6F9F0;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--p:#7C4DFF;--pl:#F3EEFF;--sky:#0EA5E9;--skyl:#E8F6FF;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s cubic-bezier(.4,0,.2,1);}

.timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;}.timer.warn{color:var(--o);}.timer.danger{color:var(--r);animation:pulse .6s infinite;}

.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.q-header{display:flex;align-items:center;gap:10px;padding:16px 22px;background:linear-gradient(135deg,#FFFAF5,#FFF6EE);border-bottom:1px solid #EDE9FE;}

.q-type-tag{font-size:11px;font-weight:800;padding:4px 12px;border-radius:14px;}
.tag-어법{background:var(--rl);color:var(--r);}.tag-어휘{background:var(--bl);color:var(--b);}.tag-대의{background:var(--gl);color:var(--g);}.tag-일치{background:var(--oxl);color:var(--od);}.tag-빈칸{background:var(--pl);color:var(--p);}.tag-함축{background:#FFF0F5;color:#D946A0;}.tag-순서{background:var(--skyl);color:var(--sky);}.tag-무관{background:#F0FDF4;color:#16A34A;}.tag-서술형{background:var(--gl);color:var(--g);}.tag-지칭{background:#FEF3C7;color:#D97706;}.tag-TF{background:#E0E7FF;color:#4338CA;}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#F3F0FF;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--o);font-weight:800;}
.q-body{padding:22px;}
.q-passage{background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-left:4px solid var(--o);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-passage .label{font-size:11px;font-weight:800;color:var(--o);margin-bottom:8px;display:flex;align-items:center;gap:5px;}

.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #E9E5F5;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;position:relative;overflow:hidden;}
.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}
.choice-btn.selected{border-color:var(--o);box-shadow:0 0 0 3px rgba(124,58,237,.12);background:var(--oxxl);}
.c-num{min-width:26px;height:26px;background:#EDE9FE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}
.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #DDD6FE;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}
.written-input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(124,58,237,.08);}
.cond-box{background:linear-gradient(135deg,#F8F6F3,#F3F0EC);border:1.5px solid #DDD6FE;border-radius:var(--rs);padding:16px;margin-bottom:16px;}.cond-box .ct{font-weight:800;color:var(--od);margin-bottom:8px;font-size:13px;}.cond-box ul{margin-left:18px;margin-bottom:10px;}.cond-box li{margin-bottom:3px;font-size:13px;}
.bogi-label{font-size:11px;color:var(--tl);font-weight:800;margin-bottom:4px;}.bogi-box{background:#fff;border:1.5px solid #C4B5FD;border-radius:var(--rxs);padding:12px;text-align:center;font-weight:700;font-size:14px;}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:65%;}
.nav-dot{width:28px;height:28px;border-radius:50%;background:#E9E5F5;cursor:pointer;border:none;font-size:10px;font-weight:800;color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:var(--tr);}
.nav-dot.current{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.3);transform:scale(1.08);}

.nav-btn{padding:9px 18px;background:#fff;border:2px solid #DDD6FE;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#EDE9FE;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #E9E5F5;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(124,58,237,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#EDE9FE;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(124,58,237,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #E9E5F5;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F3F0FF;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #DDD6FE;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(124,58,237,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #DDD6FE;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}
.tag-어법{background:#FEF2F2;color:#DC2626;}.tag-어휘{background:#EEF2FF;color:#4F46E5;}.tag-오류찾기{background:#FEF2F2;color:#B91C1C;}.tag-연결사{background:#F3F0FF;color:#7C3AED;}.tag-서술형{background:#ECFDF5;color:#059669;}.tag-한영{background:#ECFEFF;color:#0891B2;background:#ECFEFF;}.tag-한→영{background:#ECFEFF;color:#0891B2;}.tag-지칭추론{background:#FFFBEB;color:#B45309;}.tag-어순배열{background:#F3F0FF;color:#6D28D9;}.tag-의미파악{background:#FDF2F8;color:#BE185D;}.tag-T\/F{background:#F0F9FF;color:#0369A1;}.tag-주제{background:#F5F3FF;color:#374151;}.hl{background:linear-gradient(transparent 60%,rgba(124,58,237,.15) 60%);font-weight:700;}
</style>
</head>

<div id="startScreen" class="screen active">
<div class="start-container">

const FULL_PASSAGE=`Astronaut Yujin's Space Log

Day 1 — Back to Space!
After blasting off from Earth, we took about 27 hours to reach the International Space Station, where we docked successfully. This is my third journey into space. After ten years, I'm back on this station, the largest artificial space habitat in orbit 400 kilometers away from Earth!

Day 5 — The World with No Gravity
Now I'm getting better at remembering where I am when I first wake up, but I'm still often confused about how my body is positioned. In the dark and without gravity, my inner ear just takes a random guess as to my position, and sometimes I wake up convinced that I'm upside down. Of course, it's actually my brain readjusting to an environment where height and weight lose their meaning. I can use any wall equally as if each were a floor. Everything has zero weight. This enables me not only to fly but also to lift huge objects with one finger as if I were a superhero. Unfortunately, zero gravity also makes astronauts lose muscle and bone density really fast. That's why I exercise for 150 minutes a day as my colleagues do.

Day 25 — Starting the Day
The station orbits Earth once every 90 minutes, and the sun rises and sets every 45 minutes. However, our schedules are set to Greenwich Mean Time on Earth. My day starts around 6:00 a.m. in my personal space, which is about the size of a phone booth. Still in my sleeping bag, I click through new emails and brush my teeth. I swallow the toothpaste with a sip of water from a bag with a straw. There's no good way to spit in space because everything floats. Then, I look over the daily schedule sent by the flight control team on Earth. After a meeting with the Earth team at 7:30, I start work. Every minute of an astronaut's day is planned by the Earth team. My work comprises lots of scientific experiments and maintenance of the station. My favorite experiment is growing basil from seeds as I film its growth every day. Having green plants in space is a delight!

Day 60 — Spacewalk!
Today's mission required a spacewalk, one of the riskiest tasks on the ISS. We had to install the bases for some newly developed solar batteries on the outside of the station. Scott, my colleague, and I went to an airlock, a room connected to the outside of the station, put on our spacesuits, and floated gently into space. The large blue dome of Earth hovered overhead, looking like it was ready to come crashing down upon us. Forcing myself to focus on the task, I secured the hook of my safety cable to a ring just outside the airlock. We moved along the handrail to the edge of the station. The dark void in front of us seemed endless. Despite the safety cable, panic rose in me. I thought, "If my hand misses the handrail, I will fall into the void." The task seemed to take forever, but I finally managed to install the battery bases. When I turned my head, the bright blue Earth was still there. In the middle of darkness, its beauty was beyond description.

Day 99 — One Day Left
I'll return to Earth tomorrow. If getting up into space is alarming and uncomfortable, coming back down is one of the most dangerous and physically harsh things an astronaut ever does. Back on Earth, I'll miss lots of things here. I'll miss the satisfaction of successfully finishing an experiment or a challenging task like a spacewalk. I'll especially miss my basil plants, whose leaves have become a dense forest! All the same, I'll never forget how lucky we are to have that wonderful blue planet as our home.

Day 100 — The Descent to Earth
Mother Earth didn't exactly welcome us back with open arms. Earth's atmosphere is resistant to objects entering from space. Any object will create enough friction simply to burn up from the heat. This protects the planet from the orbital debris that would otherwise rain down on it. But it also meant we had to survive a fall through the atmosphere that created temperatures up to 1650 degrees Celsius. After pushing our spaceship away from the station, we eased our way into the upper layers of the atmosphere to start our descent. We felt gravity begin to return. My watch felt a lot heavier on my wrist, and breathing got harder. The capsule heated up, and orange and purple flaming pieces flew by the window, which was scorched black. We were falling faster than the speed of sound. Once we got inside the atmosphere about eight kilometers above the planet, a parachute caught us with a sudden halt and dragged and swung our capsule wildly through the sky until we hit the ground. It's hard to describe how heavy everything felt in those first few minutes after landing. My arms felt terribly heavy, and so did my legs. Getting used to gravity, which I missed in space, will take quite a long time. The important thing is I'm home. I can smell the grass and feel the wind and the rain! I'll remember how magical these things are for the rest of my life.

Further Reading — The International Space Station
The International Space Station, or ISS, is the ninth space station to be inhabited by humans. Since 2000, it has been continuously occupied by astronauts. It serves as a research laboratory for many fields, including astronomy, physics, and medicine. It is also used to test spacecraft systems required for possible future missions to the moon, Mars, and asteroids. As big as a football field, it is composed of many different sections, such as experiment modules, habitation modules, solar battery panels, and robotic arms. It is a completely unique structure assembled by spacewalkers flying around Earth at 28,000 kilometers per hour in a vacuum in extremes of temperature of plus and minus 270 degrees Celsius. It is the result of work by 15 different nations over about two decades. The work was carried out by thousands of people speaking different languages and using different engineering methods and standards. Putting the space station into orbit, making it work, and keeping it working are perhaps some of the most difficult things that human beings have ever done. In January 2022, NASA announced a plan to de-orbit the ISS in 2030. Many astronauts believe that it will stand forever as proof that when humans work together, we can do anything from going to Mars to solving our problems here on Earth.`;

 stem:'다음 문장에서 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">My favorite experiment is growing basil from seeds as I film its growth every day. ①<u>Having</u> / <u>To have</u> green plants in space is a delight!</div>',
 ch:['① Having','② To have'],ans:0,
 det:{ref:'[원문] Having green plants in space is a delight!\n[해석] 우주에서 녹색 식물을 기르는 것은 기쁨이다! [문장 23 참고]',
      correct:'① Having — 동명사가 주어로 쓰여 "기르는 것"이라는 일반적 사실/습관을 나타냄.',
      wrongs:['① Having ✅ — 동명사 주어: 일반적/습관적 행위','② To have ❌ — to부정사도 주어 가능하나, 일반적 사실에는 동명사가 자연스러움'],
      tip:'💡 동명사 주어 vs to부정사 주어\n• 동명사: 일반적/반복적/습관적 → Having plants is nice.\n• to부정사: 구체적/미래적/일회적 → To finish this by Friday is important.\n\n⚠️ 원문에서 이미 반복적 경험이므로 동명사가 적절'}},

{id:12,type:'어휘',diff:'보통',pts:3,fmt:'written',note:'문장24',
 passage:`Today's mission ( ____________ ) a spacewalk, one of the riskiest tasks on the ISS.`,
 stem:'빈칸에 알맞은 단어를 쓰시오. (1단어, 영문 8자, r로 시작) [힌트: "~을 필요로 했다"]',
 wa:"required",accept:["required","Required"],
 det:{ref:'[원문] Today\'s mission required a spacewalk...\n[해석] 오늘의 임무는 우주유영을 필요로 했다... [문장 24 참고]',
      correct:'required — require(필요로 하다)의 과거형. 임무가 우주유영을 요구했다는 의미.',
      wrongs:[],
      tip:'💡 require 용법\n• require + 목적어: ~을 필요로 하다\n• require + that S + (should) V: ~할 것을 요구하다\n• require + O + to V: ~에게 ~할 것을 요구하다\n\n⚠️ require vs request\n• require: 필수적 요구 / request: 정중한 요청'}},

{id:13,type:'의미파악',diff:'어려움',pts:4,fmt:'mc',note:'문장27',
 passage:`The large blue dome of Earth hovered overhead, <u>looking like it was ready to come crashing down upon us</u>.`,
 stem:'윗글의 밑줄 친 부분이 의미하는 바로 가장 적절한 것은?',
 ch:['① 지구가 실제로 우주 정거장에 충돌할 위험이 있었다','② 지구가 머리 위에서 마치 떨어질 것처럼 압도적으로 크게 보였다','③ 우주 유영 중 지구의 중력이 갑자기 느껴졌다','④ 지구의 대기가 우주 비행사에게 위협이 되었다','⑤ 우주 정거장이 지구를 향해 추락하기 시작했다'],ans:1,
 det:{ref:'[원문] The large blue dome of Earth hovered overhead, looking like it was ready to come crashing down upon us.\n[해석] 지구의 커다란 푸른 돔이 머리 위에 떠 있었는데, 마치 우리 위로 무너져 내릴 것처럼 보였다. [문장 27 참고]',
      correct:'② 지구가 머리 위에서 마치 떨어질 것처럼 압도적으로 크게 보였다 — 우주 유영 중 지구가 거대한 돔처럼 머리 위를 덮고 있는 압도적 시각 경험을 묘사.',
      wrongs:['① ❌ — 비유적 표현이지 실제 충돌 위험은 아님','③ ❌ — 중력과 무관한 시각적 경험','④ ❌ — 대기 위협 언급 없음','⑤ ❌ — 우주 정거장 추락이 아닌 지구의 시각적 인상'],
      tip:'💡 비유 표현 해석 전략\n• "looking like" = ~처럼 보이다 (비유)\n• come crashing down = 와르르 무너지다\n• 실제 사건이 아닌 시각적/심리적 묘사\n\n⚠️ 비유 vs 사실 구분이 의미파악의 핵심'}},

{id:14,type:'서술형',diff:'보통',pts:3,fmt:'written',note:'문장28',
 passage:`( ____________ ) myself to focus on the task, I secured the hook of my safety cable to a ring just outside the airlock.`,
 stem:'빈칸에 알맞은 단어를 쓰시오. (1단어, 영문 7자, F로 시작) [힌트: 분사구문, "억지로 ~하면서"]',
 wa:"Forcing",accept:["Forcing","forcing"],
 det:{ref:'[원문] Forcing myself to focus on the task, I secured the hook...\n[해석] 억지로 임무에 집중하면서, 나는 안전 케이블의 고리를 고정했다. [문장 28 참고]',
      correct:'Forcing — 분사구문으로 주절의 주어(I)가 force의 행위자이므로 현재분사. force oneself to V = 자신을 억지로 ~하게 하다.',
      wrongs:[],
      tip:'💡 분사구문 만들기\n• 접속사 제거 → 주어 동일시 생략 → 동사를 V-ing\n• As I forced myself → Forcing myself\n\n⚠️ force oneself to V\n• = make oneself V\n• 자발적 노력/의지를 나타냄'}},

{id:15,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장30-31',
 passage:``,
 stem:'다음 문장에서 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">The dark void in front of us seemed ①<u>endless</u> / <u>endlessly</u>. Despite the safety cable, panic ②<u>rose</u> / <u>raised</u> in me.</div>',
 ch:['① endless — ② rose','① endlessly — ② rose','① endless — ② raised','① endlessly — ② raised'],ans:0,
 det:{ref:'[원문] The dark void...seemed endless. ...panic rose in me.\n[해석] 어두운 공허가 끝없어 보였다. ...공포가 내 안에서 올라왔다. [문장 30-31 참고]',
      correct:'① endless — rose\n• ① seem + 형용사(보어): seemed endless (끝없어 보였다)\n• ② rise-rose-risen (자동사: 올라오다) — panic이 스스로 올라옴',
      wrongs:['② endlessly—rose ❌ — seem 뒤에 부사 불가 (보어 자리)','③ endless—raised ❌ — raise는 타동사(~을 올리다), 여기서 panic이 스스로 올라옴','④ endlessly—raised ❌ — 둘 다 부적절'],
      tip:'💡 seem + 형용사 (2형식)\n• seem/look/appear/sound + 형용사 (보어)\n• ❌ seem + 부사\n\n⚠️ rise vs raise\n• rise (자동사): 올라가다 — rise-rose-risen\n• raise (타동사): ~을 올리다 — raise-raised-raised'}},

{id:16,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장33',
 passage:``,
 stem:'다음 문장의 밑줄 친 부분 중 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">The task seemed to take forever, but I finally managed ①<u>to install</u> / <u>installing</u> the battery bases.</div>',
 ch:['① to install','② installing'],ans:0,
 det:{ref:'[원문] ...I finally managed to install the battery bases.\n[해석] ...나는 마침내 배터리 기지를 설치하는 데 성공했다. [문장 33 참고]',
      correct:'① to install — manage to V = (어려운 것을) 해내다. manage 뒤에는 항상 to부정사.',
      wrongs:['① to install ✅ — manage to V 고정 패턴','② installing ❌ — manage + V-ing 불가'],
      tip:'💡 to V만 취하는 동사\n• manage / afford / decide / refuse / expect + to V\n• ❌ manage + V-ing\n\n⚠️ manage to V = succeed in V-ing\n• 어려움을 극복하고 해냈다는 뉘앙스'}},

{id:17,type:'어순배열',diff:'어려움',pts:4,fmt:'mc',note:'문장35',
 passage:`When I turned my head, the bright blue Earth was still there.`,
 stem:'주어진 단어를 올바르게 배열한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">( darkness / of / the / in / middle ), its beauty was beyond description.</div>',
 ch:['① In the middle of darkness','② In the darkness of middle','③ In middle the of darkness','④ Of the middle in darkness','⑤ The middle in of darkness'],ans:0,
 det:{ref:'[원문] In the middle of darkness, its beauty was beyond description.\n[해석] 어둠 한가운데에서, 그 아름다움은 형언할 수 없었다. [문장 35 참고]',
      correct:'① In the middle of darkness — 전치사구: in the middle of + 명사 = ~의 한가운데에',
      wrongs:['② ❌ — of middle은 문법적으로 성립하지 않음','③ ❌ — 관사 the의 위치 오류','④ ❌ — 전치사 배열 오류','⑤ ❌ — 의미 불성립'],
      tip:'💡 in the middle of ~\n• in the middle of the night (한밤중에)\n• in the middle of a meeting (회의 중에)\n\n⚠️ beyond description\n• = indescribable (형언할 수 없는)\n• beyond + 명사: ~을 넘어서는'}},

{id:18,type:'지칭추론',diff:'보통',pts:4,fmt:'mc',note:'문장40-41',
 passage:`I'll miss the satisfaction of successfully finishing an experiment or a challenging task like a spacewalk. I'll especially miss my basil plants, <u>whose</u> leaves have become a dense forest! All the same, I'll never forget how lucky we are to have <u>that</u> wonderful blue planet as our home.`,
 stem:'윗글의 밑줄 친 <u>whose</u>와 <u>that</u>이 각각 가리키는 것으로 적절한 것은?',
 ch:['① whose: basil plants — that: 지구','② whose: an experiment — that: ISS','③ whose: a spacewalk — that: 지구','④ whose: basil plants — that: ISS','⑤ whose: satisfaction — that: 달'],ans:0,
 det:{ref:'[원문] ...my basil plants, whose leaves have become a dense forest! ...that wonderful blue planet as our home.\n[해석] ...내 바질 식물들, 그것들의 잎이 빽빽한 숲이 되었다! ...저 아름다운 푸른 행성을 우리의 집으로... [문장 40-41 참고]',
      correct:'① whose: basil plants — that: 지구\n• whose는 관계대명사 소유격으로 선행사 basil plants의 잎\n• that은 지시형용사로 "저" 아름다운 푸른 행성 = 지구',
      wrongs:['② ❌ — whose의 선행사가 experiment일 수 없음','③ ❌ — whose의 선행사가 spacewalk일 수 없음','④ ❌ — that wonderful blue planet은 ISS가 아닌 지구','⑤ ❌ — 선행사 및 지시 대상 모두 부적절'],
      tip:'💡 관계대명사 whose\n• 선행사 + whose + 명사: ~의 ...인\n• my basil plants, whose leaves = and their leaves\n\n⚠️ that = 지시형용사\n• that + 명사: 저 ~\n• 여기서 that은 관계대명사가 아님!'}},

{id:19,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장37',
 passage:``,
 stem:'다음 문장에서 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">If getting up into space is alarming and uncomfortable, coming back down is one of the most dangerous and ①<u>physically</u> / <u>physical</u> harsh things an astronaut ever ②<u>does</u> / <u>do</u>.</div>',
 ch:['① physically — ② does','① physical — ② does','① physically — ② do','① physical — ② do'],ans:0,
 det:{ref:'[원문] ...one of the most dangerous and physically harsh things an astronaut ever does.\n[해석] ...우주 비행사가 경험하는 것 중 가장 위험하고 신체적으로 가혹한 것 중 하나이다. [문장 37 참고]',
      correct:'① physically — does\n• ① physically는 형용사 harsh를 수식하는 부사\n• ② an astronaut(3인칭 단수) → does',
      wrongs:['② physical—does ❌ — physical harsh는 형용사+형용사 연결로 부적절','③ physically—do ❌ — an astronaut는 단수이므로 do 불가','④ physical—do ❌ — 둘 다 부적절'],
      tip:'💡 부사의 형용사 수식\n• physically harsh = 신체적으로 가혹한\n• 부사 + 형용사 = 형용사를 꾸미는 구조\n\n⚠️ one of the + 최상급 + 복수명사\n• 주어는 one이므로 동사는 단수 (is/does)'}},

{id:20,type:'한영',diff:'어려움',pts:3,fmt:'written',note:'문장41',
 passage:``,
 stem:'다음 한국어를 영작하시오. (2단어)<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">I\'ll never forget how lucky we are to have that wonderful blue planet as our home.<br><br>"그럼에도 불구하고" → ( __________ __________ )</div><br>[힌트: 2단어, 영문 총 10자, A로 시작]',
 wa:"All the",accept:["All the","all the"],
 det:{ref:'[원문] All the same, I\'ll never forget how lucky we are...\n[해석] 그럼에도 불구하고, 나는 ...이 얼마나 행운인지 잊지 않을 것이다. [문장 41 참고]',
      correct:'All the (same) — "All the same"은 "그럼에도 불구하고, 그래도"라는 의미의 관용 표현.\n※ 문제에서 2단어만 요구하므로 "All the"가 정답 (same은 이미 제시됨)',
      wrongs:[],
      tip:'💡 All the same = nevertheless = nonetheless\n• 앞의 내용에도 불구하고 뒤의 내용이 성립\n• 문장 앞에 콤마와 함께 사용\n\n⚠️ 유사 표현 구분\n• all the same (그래도) vs at the same time (동시에)'}},

{id:21,type:'어법',diff:'보통',pts:4,fmt:'mc',note:'문장43-44',
 passage:``,
 stem:'다음 문장에서 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Earth\'s atmosphere is ①<u>resistant</u> / <u>resistance</u> to objects ②<u>entering</u> / <u>entered</u> from space. Any object will create enough friction simply ③<u>to burn</u> / <u>burning</u> up from the heat.</div>',
 ch:['① resistant—② entering—③ to burn','① resistance—② entering—③ to burn','① resistant—② entered—③ to burn','① resistant—② entering—③ burning','① resistant—② entered—③ burning'],ans:0,
 det:{ref:'[원문] ...resistant to objects entering from space. ...enough friction simply to burn up...\n[해석] ...우주에서 진입하는 물체에 저항력이 있다. ...단순히 열로 타 버릴 만큼의 마찰... [문장 43-44 참고]',
      correct:'① resistant—entering—to burn\n• ① be resistant to: ~에 저항력이 있는 (형용사)\n• ② objects entering: 물체가 진입하는 (능동 → 현재분사)\n• ③ enough + N + to V: ~할 만큼 충분한 → enough friction to burn up',
      wrongs:['② resistance—entering—to burn ❌ — be 뒤 보어로 명사 resistance는 부적절(is resistant to가 관용)','③ resistant—entered—to burn ❌ — 물체가 진입하는 것이므로 능동(entering)','④ resistant—entering—burning ❌ — enough + N + to V 구조에서 burning 불가','⑤ resistant—entered—burning ❌ — 둘 다 부적절'],
      tip:'💡 be resistant to + (동)명사\n• resistant (형) ↔ resistance (명)\n• to는 전치사 → 뒤에 V-ing\n\n⚠️ enough + N + to V\n• enough friction to burn up (타 버릴 만큼 충분한 마찰)\n• = so much friction that it burns up'}},

{id:22,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장45-46',
 passage:``,
 stem:'다음 문장의 밑줄 친 부분 중 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">This protects the planet from the orbital debris that would ①<u>otherwise</u> / <u>therefore</u> rain down on it. But it also meant we had to survive a fall through the atmosphere that ②<u>created</u> / <u>was created</u> temperatures up to 1650 degrees Celsius.</div>',
 ch:['① otherwise — ② created','① therefore — ② created','① otherwise — ② was created','① therefore — ② was created'],ans:0,
 det:{ref:'[원문] ...that would otherwise rain down on it. ...a fall through the atmosphere that created temperatures...\n[해석] ...그렇지 않으면 비처럼 쏟아질 궤도 잔해물. ...1650도까지 온도를 만들어낸 대기 통과... [문장 45-46 참고]',
      correct:'① otherwise — created\n• ① otherwise: "그렇지 않으면" (대기 보호가 없다면) 잔해가 떨어질 것\n• ② created: 대기 통과(fall)가 온도를 "만들어낸" 것이므로 능동태',
      wrongs:['② therefore—created ❌ — therefore(그러므로)는 인과 아닌 반사실 맥락에 부적절','③ otherwise—was created ❌ — 대기 통과가 온도를 만드는 것이므로 능동','④ therefore—was created ❌ — 둘 다 부적절'],
      tip:'💡 would otherwise + V\n• "그렇지 않으면 ~할 것이다"\n• 조건의 반대 상황을 나타냄\n\n⚠️ otherwise vs therefore\n• otherwise: 그렇지 않으면 (반대)\n• therefore: 그러므로 (결과)'}},

{id:23,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장50-51',
 passage:``,
 stem:'다음 문장에서 어법상 적절한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">The capsule heated up, and orange and purple flaming pieces flew by the window, ①<u>which</u> / <u>what</u> was scorched black. We were falling ②<u>faster</u> / <u>more fast</u> than the speed of sound.</div>',
 ch:['① which — ② faster','① what — ② faster','① which — ② more fast','① what — ② more fast'],ans:0,
 det:{ref:'[원문] ...the window, which was scorched black. We were falling faster than...\n[해석] ...창문은 검게 그을렸다. 우리는 소리의 속도보다 더 빠르게 떨어지고 있었다. [문장 50-51 참고]',
      correct:'① which — faster\n• ① , which = 계속적 용법 관계대명사 (선행사: window)\n• ② faster: fast의 비교급 (1음절 → -er)',
      wrongs:['② what—faster ❌ — what은 선행사를 포함하므로 계속적 용법 불가','③ which—more fast ❌ — fast는 1음절 형용사/부사이므로 more fast 불가','④ what—more fast ❌ — 둘 다 부적절'],
      tip:'💡 , which (계속적 용법)\n• 콤마 + which = and it\n• what은 선행사 포함이므로 콤마 뒤 사용 불가\n\n⚠️ 비교급 형태\n• 1음절: fast → faster\n• 2음절 이상: beautiful → more beautiful'}},

{id:24,type:'오류찾기',diff:'어려움',pts:4,fmt:'mc',note:'문장52-55',
 passage:``,
 stem:'다음 글에서 어법상 틀린 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Once we got inside the atmosphere about eight kilometers above the planet, a parachute ①<u>caught</u> us with a sudden halt. It\'s hard ②<u>to describe</u> how heavy everything felt. My arms felt ③<u>terribly</u> heavy, and so ④<u>did</u> my legs. ⑤<u>Getting used to</u> gravity, that I missed in space, will take quite a long time.</div>',
 ch:['① caught','② to describe','③ terribly','④ did','⑤ Getting used to'],ans:4,
 det:{ref:'[원문] Getting used to gravity, which I missed in space, will take quite a long time.\n[해석] 우주에서 그리웠던 중력에 익숙해지는 것은 꽤 오랜 시간이 걸릴 것이다. [문장 55 참고]',
      correct:'⑤ 문장에서 "that I missed" → "which I missed"로 바뀌어야 함.\n• 원문은 "which I missed"인데, 문제에서 that으로 바꿈.\n• 관계대명사 계속적 용법(콤마 뒤)에서는 that 사용 불가 → which 사용.',
      wrongs:['① caught ✅ — catch-caught-caught 과거형 적절','② to describe ✅ — It\'s hard to V 가주어 구문','③ terribly ✅ — 부사로 형용사 heavy 수식','④ did ✅ — so did my legs = my legs also felt heavy (도치)'],
      tip:'💡 관계대명사 that vs which\n• , which (계속적 용법) ✅\n• , that (계속적 용법) ❌ — that은 콤마 뒤 사용 불가\n\n⚠️ so + 조동사 + 주어 (도치)\n• so did my legs = my legs also did (felt heavy)\n• "~도 역시 그러하다"'}},

      correct:'journey — 전체 글이 우주 생활의 "여정(journey)"과 지구에 대한 감사를 담은 일지.',

      tip:'💡 주제 빈칸 전략\n• 글의 핵심 개념을 포괄하는 단어 선택\n• journey = 단순한 이동이 아닌 경험의 과정\n\n⚠️ 유사 단어 구분\n• journey (여정, 과정) vs trip (여행) vs travel (여행 일반)'}}
];

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){const p=s;if(p>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(p>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(p>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(p>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(p>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="영어로 입력 (대소문자 무관, 띄어쓰기 주의)" oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{
  const u=String(a).trim().toLowerCase().replace(/[!.,;'?"\u2019]/g,'').replace(/\s+/g,' ');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.total);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.ok===v.total);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="copyDetailedResult()"><span class="act-icon">📄</span><span class="act-label">상세 결과 복사</span></button><button class="act-btn" onclick="saveResultImage()"><span class="act-icon">🖼️</span><span class="act-label">이미지 저장</span></button><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;
r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}
h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;
if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;
if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;
h+=`</div></div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📋 시험 기록</div>`;const hist=getHistory();if(!hist.length)h+=`<p style="color:var(--tl)">기록 없음</p>`;else h+=hist.slice(-10).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date}·${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);}
function copyDetailedResult(){const nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);let txt=`━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🎯 내신핏 온라인퀴즈 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} ${EI.pub} ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n\n📊 점수: ${r.score}/100 (${r.score}%)\n✅ 정답 ${r.correct}/${QCOUNT} | ❌ 오답 ${r.wrong} | ⬜ 미응답 ${r.unanswered}\n🏅 레벨: ${lv.icon} ${lv.name}\n${r.score>=80?'🎉 통과!':'📚 미통과'}\n\n━━ 문항별 결과 ━━\n`;r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const at=d.q.fmt==='mc'?(d.ans!==null?(d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]):'미응답'):(d.ans||'미응답');const ct=d.q.fmt==='mc'?(d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]):d.q.wa;txt+=`${mk} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점 — 내답:${at} | 정답:${ct}\n`;});const tm={};r.details.forEach(d=>{const t=d.q.type;if(!tm[t])tm[t]={t:0,o:0};tm[t].t++;if(d.ok)tm[t].o++;});txt+=`\n━━ 유형별 ━━\n`;Object.entries(tm).forEach(([t,v])=>txt+=`${t}: ${v.o}/${v.t} (${Math.round(v.o/v.t*100)}%)\n`);txt+=`\n━━ 보완 피드백 ━━\n`;fb.forEach(f=>txt+=`${f}\n`);txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>toast('📄 상세 결과 복사 완료!')).catch(()=>toast('복사 실패'));}
function saveResultImage(){const nm=document.getElementById('inpName').value.trim(),r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);const W=800,pad=40;const lines=[{t:'🎯 내신핏 온라인퀴즈 상세 결과',s:22,b:1,c:'#E8772E'},{t:''},{t:`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}`,s:14,c:'#555'},{t:`👤 ${nm} · ${new Date().toLocaleDateString('ko-KR')}`,s:14,c:'#555'},{t:''},{t:`📊 점수: ${r.score}/100`,s:20,b:1},{t:`✅${r.correct}/${QCOUNT} ❌${r.wrong} ⬜${r.unanswered}`,s:14,c:'#555'},{t:`🏅 ${lv.icon} ${lv.name} ${r.score>=80?'🎉 통과':'📚 미통과'}`,s:16,b:1,c:r.score>=80?'#1A9960':'#D63B3B'},{t:''}];r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const ct=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;lines.push({t:`${mk} ${d.q.id}번[${d.q.type}]${d.q.pts}점 정답:${ct}`,s:12,c:d.ok?'#1A9960':'#D63B3B'});});lines.push({t:''});fb.forEach(f=>lines.push({t:f,s:11,c:'#444'}));lines.push({t:''},{t:'내신핏 · 온라인퀴즈 TEST',s:10,c:'#bbb'});let H=pad*2;lines.forEach(l=>{H+=(l.s||14)+10;});const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;const ctx=canvas.getContext('2d');ctx.scale(2,2);ctx.fillStyle='#FFF';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E8772E';ctx.fillRect(0,0,W,4);let y=pad+10;lines.forEach(l=>{const fs=l.s||14;ctx.font=`${l.b?'800':'500'} ${fs}px sans-serif`;ctx.fillStyle=l.c||'#222';if(l.t)ctx.fillText(l.t,pad,y);y+=fs+10;});ctx.fillStyle='#E8772E';ctx.fillRect(0,H-4,W,4);canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`퀴즈결과_${nm}_${new Date().toISOString().slice(0,10)}.png`;a.click();toast('🖼️ 이미지 저장 완료!');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}

</script>
