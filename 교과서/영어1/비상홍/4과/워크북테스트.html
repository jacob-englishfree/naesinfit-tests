<style>
:root{--o:#7C3AED;--od:#5B21B6;--ol:#A78BFA;--oxl:#F3F0FF;--oxxl:#FAF5FF;--bg:#F5F3FF;--text:#1E1B18;--tm:#6B6560;--tl:#A09890;--g:#1A9960;--gl:#E6F9F0;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--p:#7C4DFF;--pl:#F3EEFF;--sky:#0EA5E9;--skyl:#E8F6FF;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s cubic-bezier(.4,0,.2,1);}

.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,.04);}

.tag-어법{background:var(--rl);color:var(--r);}.tag-어휘{background:var(--bl);color:var(--b);}.tag-대의{background:var(--gl);color:var(--g);}.tag-일치{background:var(--oxl);color:var(--od);}.tag-빈칸{background:var(--pl);color:var(--p);}.tag-함축{background:#FFF0F5;color:#D946A0;}.tag-순서{background:var(--skyl);color:var(--sky);}.tag-무관{background:#F0FDF4;color:#16A34A;}.tag-서술형{background:var(--gl);color:var(--g);}.tag-지칭{background:#FEF3C7;color:#D97706;}.tag-TF{background:#E0E7FF;color:#4338CA;}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#F3F0FF;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--o);font-weight:800;}

.q-passage{background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-left:4px solid var(--o);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-passage .label{font-size:11px;font-weight:800;color:var(--o);margin-bottom:8px;display:flex;align-items:center;gap:5px;}

.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #E9E5F5;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;position:relative;overflow:hidden;}
.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}
.choice-btn.selected{border-color:var(--o);box-shadow:0 0 0 3px rgba(124,58,237,.12);background:var(--oxxl);}
.c-num{min-width:26px;height:26px;background:#EDE9FE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}
.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #DDD6FE;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}
.written-input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(124,58,237,.08);}

.bogi-label{font-size:11px;color:var(--tl);font-weight:800;margin-bottom:4px;}.bogi-box{background:#fff;border:1.5px solid #C4B5FD;border-radius:var(--rxs);padding:12px;text-align:center;font-weight:700;font-size:14px;}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}

.nav-btn{padding:9px 18px;background:#fff;border:2px solid #DDD6FE;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}

.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#EDE9FE;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #E9E5F5;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(124,58,237,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#EDE9FE;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}

.rev-card{border:1.5px solid #E9E5F5;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F3F0FF;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #DDD6FE;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(124,58,237,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #DDD6FE;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}
.tag-어법{background:#FEF2F2;color:#DC2626;}.tag-어휘{background:#EEF2FF;color:#4F46E5;}.tag-오류찾기{background:#FEF2F2;color:#B91C1C;}.tag-연결사{background:#F3F0FF;color:#7C3AED;}.tag-서술형{background:#ECFDF5;color:#059669;}.tag-한영{background:#ECFEFF;color:#0891B2;background:#ECFEFF;}.tag-한→영{background:#ECFEFF;color:#0891B2;}.tag-지칭추론{background:#FFFBEB;color:#B45309;}.tag-어순배열{background:#F3F0FF;color:#6D28D9;}.tag-의미파악{background:#FDF2F8;color:#BE185D;}.tag-T\/F{background:#F0F9FF;color:#0369A1;}.tag-주제{background:#F5F3FF;color:#374151;}.hl{background:linear-gradient(transparent 60%,rgba(124,58,237,.15) 60%);font-weight:700;}
</style>
</head>

<div id="startScreen" class="screen active">
<div class="start-container">

const FULL_PASSAGE=`Traditionally, fishers went out to sea with fishing nets or long lines on boats to catch fish. They took advantage of their experience gained through trial and error, through observation, and through knowledge passed down from previous generations. With wild fish stocks gradually declining due to overfishing and the changing climate, more fishers are turning to farming instead of casting nets or lines. In fact, according to a UN report, about 49% of the fish consumed worldwide in 2020 came from fish farms, not from the wild. This figure is expected to continue to grow, increasing to 62% by 2030. With the arrival of smart fish farming technology driven by artificial intelligence (AI), fish farmers are able to provide healthy, affordable seafood to families everywhere.
An essential element in providing healthy fish to consumers is the fish farmers' ability to detect and prevent sea lice, a significant threat to fish health and profitability. One of the most modern methods to do this is through the power of computer vision and precision sensors, allowing fish farmers to identify and track diseases before they spread. An aquaculture system equipped with high-precision underwater tools has already been developed in Norway. It can hold up to 150,000 salmon in a sea cage, regularly inducing each fish into a tube where high-resolution cameras and sensors record everything about each individual salmon, including their overall shapes and dot patterns, their weight and growth rate, as well as any signs of sea lice, physical wounds, or abnormalities. Every detail is registered in the fish's health record, along with millions of images and figures. Such huge amounts of data and other information are taken care of by the AI system.
A computer system with deep learning capabilities is able to track and record fish behavior better than humans can, especially when the system is trained with enough relevant data. It can distinguish and identify one fish from another and diagnose whether a small speck is dirt or sea lice, and this information is entered into the fish's health record. In a sense, the fish farm is monitored by an AI doctor on duty 24/7. Farmers can then determine when they should take action, such as when to separate an abnormal group from the rest or spread out the fish population to reduce density, without resorting to harsh chemical treatments, which can harm the fish, the environment, and even the consumer. In addition, all this data from cameras and sensors can be utilized for various applications and purposes.
One of the most noticeable and effective applications is real-time monitoring of fish behavior and other environmental changes, which serves multiple purposes, including diagnosing diseases in individual fish. By processing large sets of data, an AI system can detect and recognize unusual group behaviors of an entire school of fish, possibly caused by changes in water quality, temperature, or oxygen levels surrounding the cage. It can also ensure the quality of cage nets to prevent fish from escaping or predators from invading and protect the surrounding habitat. The system can also tell farmers exactly when to feed the fish by identifying patterns of behavior that an individual fish or the school exhibits when they are hungry. This is how farmers can accurately determine optimal feeding times and amounts. The right amount of food at the right time minimizes cost, reduces waste and pollution, and maximizes fish growth rates. Given the fact that feeding constitutes more than 50% of a fish farm's operational budget, this precise feeding approach will ultimately contribute to a more affordable supply of fish for consumers as well as efficient and sustainable aquaculture operations in general.
AI continues to advance in aquaculture to extend beyond caged fish. In particular, smart fish farming technologies can be applied to seaweed farming. Seaweed is as valuable a source of food as fish. It's also a source of fuel and an important ingredient for cosmetics, fertilizers, and other medicinal and industrial products. As such, ongoing research is exploring various ways AI can help in the seaweed industry, including the use of autonomous underwater vehicles (AUVs) and swarm robotics. Using cameras and sensors, AUVs can do many of the analytical and diagnostic tasks on seaweed farms. Swarm robots, or many small robots working together, can swim in and around seaweed farms to collect data and then make decisions on how to deal with problems that arise. Single larger robots or even humans may be available to take care of the physical labor from removing harmful weeds to harvesting; however, swarm robots may be more efficient and cost-effective. The potential of AI in aquaculture is vast, and it brings a more sustainable and technologically driven future for fish and seaweed farming. Families that gather together, eagerly anticipating a healthy seafood dinner, may not be aware of the carefully monitored fish and seaweed farms or the cutting-edge AI technology involved in getting food to their table. However, the process of doing so is evidence of the considerable amount of investment in sustainable, high-quality aquaculture with AI. With AI as an ally, the future of the oceans and the nourishment of humanity is just a little bit more secure.`;

      wrongs:['⑤ ⓑ+ⓓ 모두 수정 ✅','① ⓐ는 정상 — inducing은 분사구문으로 적절','② ⓑ만 수정 — ⓓ도 수정 필요','③ ⓒ는 정상 — is registered(수동태)가 적절','④ ⓓ만 수정 — ⓑ도 수정 필요'],
      tip:'💡 including vs. include\n• including: 전치사처럼 쓰이는 분사 (~을 포함하여)\n• include는 동사 → 접속사 없이 사용 불가\n\n⚠️ millions of + 복수명사\n• millions of images and figures ✓\n• millions of figure ✗'}},

{id:11,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장12',
 passage:``,
 stem:'다음 문장에서 밑줄 친 부분의 어법상 적절 여부를 판단하시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Such huge amounts of data and other information <b><u>are taken care of</u></b> by the AI system.</div>',
 ch:['① 적절하다 — 복수 주어에 맞는 수동태','② 부적절하다 — is taken care of가 맞다','③ 부적절하다 — are taking care of가 맞다','④ 부적절하다 — takes care of가 맞다','⑤ 부적절하다 — have taken care of가 맞다'],ans:0,
 det:{ref:'[원문] Such huge amounts of data and other information are taken care of by the AI system.\n[해석] 이렇게 막대한 양의 데이터와 기타 정보는 AI 시스템에 의해 관리된다. [문장 12 참고]',
      correct:'are taken care of: 주어가 "amounts of data and other information"으로 복수이므로 are가 적절. 수동태(be + p.p.) 구조도 정확함.',
      wrongs:['① 적절 ✅ — amounts(복수) + are + 수동태','② is ❌ — 주어가 복수이므로 is 불가','③ taking ❌ — 의미상 수동(데이터가 관리됨)이므로 능동태 부적절','④ takes ❌ — 주어가 복수 + 능동태 부적절','⑤ have taken ❌ — 능동태 + 시제 변경 부적절'],
      tip:'💡 amounts of + 불가산명사\n• amounts(복수) → 복수 동사 사용\n• a large amount of data → 단수 동사\n• huge amounts of data → 복수 동사\n\n⚠️ take care of의 수동태\n• take care of → be taken care of (전치사 of 유지!)'}},

{id:12,type:'서술형',diff:'어려움',pts:4,fmt:'mc',note:'문장12',
 passage:``,
 stem:'다음 수동태 문장을 능동태로 바르게 전환한 것은?<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Such huge amounts of data and other information <u>are taken care of</u> by the AI system.</div>',
 ch:['① The AI system takes care of such huge amounts of data and other information.','② The AI system is taking care of such huge amounts of data and other information.','③ Such huge amounts of data and other information take care of the AI system.','④ The AI system has taken care of such huge amounts of data and other information.','⑤ The AI system took care of such huge amounts of data and other information.'],ans:0,
 det:{ref:'[원문] Such huge amounts of data and other information are taken care of by the AI system.\n[해석] 이렇게 막대한 양의 데이터와 기타 정보는 AI 시스템에 의해 관리된다. [문장 12 참고]',
      correct:'수동태 → 능동태 전환: by 뒤의 the AI system이 주어, are taken → takes (3인칭 단수 현재), care of 뒤에 원래 주어를 목적어로.',
      wrongs:['① takes care of ✅ — 올바른 능동태 전환','② is taking ❌ — 진행형 시제 변경','③ 주객 전도 ❌ — 의미가 반대','④ has taken ❌ — 현재완료 시제 변경','⑤ took ❌ — 과거 시제 변경'],
      tip:'💡 수동태 → 능동태 전환법\n• S + be p.p. + by A → A + V + S(목적어)\n• 시제 유지 필수!\n\n⚠️ take care of 주의\n• 수동: be taken care of (of 유지)\n• 능동: take care of + 목적어'}},

{id:13,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장13',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">A computer system with deep learning capabilities is able to track and record fish behavior better than humans <b>[can / do]</b>, especially when the system is trained with enough relevant data.</div>',
 ch:['① can','② do','③ are','④ could','⑤ does'],ans:0,
 det:{ref:'[원문] A computer system with deep learning capabilities is able to track and record fish behavior better than humans can...\n[해석] 딥러닝 능력을 갖춘 컴퓨터 시스템은 인간보다 더 잘 물고기의 행동을 추적하고 기록할 수 있다. [문장 13 참고]',
      correct:'can: 비교 구문에서 반복을 피하기 위해 대동사를 사용. 앞의 "is able to track and record"를 대신하므로 "할 수 있다"의 의미인 can이 적절.',
      wrongs:['① can ✅ — is able to를 대신하는 조동사','② do ❌ — 단순 대동사로는 "능력" 의미 전달 불가','③ are ❌ — be동사는 track을 대체 불가','④ could ❌ — 가정법/과거 의미로 시제 불일치','⑤ does ❌ — humans는 복수이므로 does 불가'],
      tip:'💡 비교 구문의 대동사\n• be able to V → can으로 대체 가능\n• better than humans can (= can track)\n\n⚠️ do vs. can\n• do/does: 일반동사 반복 회피\n• can: 능력(be able to) 반복 회피'}},

{id:14,type:'의미파악',diff:'보통',pts:3,fmt:'mc',note:'문장15',
 passage:`In a sense, the fish farm is monitored by <u>an AI doctor on duty 24/7</u>.`,
 stem:'밑줄 친 <u>an AI doctor on duty 24/7</u>이 의미하는 것으로 가장 적절한 것은?',
 ch:['① 실제 수의사가 양식장에서 24시간 근무하는 것','② AI 시스템이 24시간 쉬지 않고 양식장을 감시하는 것','③ 의사가 AI 기술을 활용하여 물고기를 진료하는 것','④ 양식장 직원들이 교대로 24시간 감시하는 것','⑤ AI가 하루에 7번씩 물고기를 점검하는 것'],ans:1,
 det:{ref:'[원문] In a sense, the fish farm is monitored by an AI doctor on duty 24/7.\n[해석] 어떤 의미에서, 양식장은 24시간 연중무휴로 근무하는 AI 의사에 의해 모니터링된다. [문장 15 참고]',
      correct:'AI 시스템을 의사에 비유한 표현. "on duty 24/7"은 "24시간 7일 내내 근무 중"을 의미하며, AI가 쉬지 않고 양식장의 물고기 건강을 감시한다는 뜻.',
      wrongs:['② AI가 24시간 감시 ✅ — 비유적 표현의 올바른 해석','① 실제 수의사 ❌ — "In a sense(어떤 의미에서)"가 비유임을 나타냄','③ 의사가 AI 활용 ❌ — AI 자체가 의사 역할','④ 직원 교대 ❌ — AI 시스템이 주체','⑤ 7번 점검 ❌ — 24/7은 "24시간 7일" 의미'],
      tip:'💡 비유적 표현 해석\n• "In a sense" = 어떤 의미에서 (비유 신호)\n• AI doctor = AI 시스템을 의사에 비유\n• 24/7 = twenty-four seven = 24시간 연중무휴\n\n⚠️ "In a sense" 출현 시 → 뒤에 비유가 옴'}},

{id:15,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장16',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Farmers can then determine when they should take action, ... without <b>[resorting / resort]</b> to harsh chemical treatments, <b>[which / what]</b> can harm the fish.</div>',
 ch:['① resorting — which','② resort — which','③ resorting — what','④ resort — what','⑤ resorting — that'],ans:0,
 det:{ref:'[원문] ...without resorting to harsh chemical treatments, which can harm the fish, the environment, and even the consumer.\n[해석] 물고기, 환경, 심지어 소비자에게까지 해를 끼칠 수 있는 가혹한 화학 처리에 의존하지 않고... [문장 16 참고]',
      correct:'resorting: 전치사 without 뒤에는 동명사(-ing)가 와야 함. which: 계속적 용법의 관계대명사로, 앞의 harsh chemical treatments를 선행사로 받음.',
      wrongs:['① resorting-which ✅','② resort ❌ — 전치사 뒤 동사원형 불가','③ what ❌ — 선행사(chemical treatments)가 있으므로 what 불가','④ 둘 다 틀림','⑤ that ❌ — 계속적 용법(쉼표 뒤)에 that 사용 불가'],
      tip:'💡 without + V-ing\n• 전치사 + 동명사: without resorting to\n• resort to: ~에 의존하다\n\n⚠️ which vs. that (계속적 용법)\n• , which ~ ✓ (계속적 용법)\n• , that ~ ✗ (that은 계속적 용법 불가)'}},

{id:16,type:'연결사',diff:'쉬움',pts:3,fmt:'written',note:'문장17',
 passage:`( ___ ), all this data from cameras and sensors can be utilized for various applications and purposes.`,
 stem:'빈칸에 알맞은 연결 표현을 쓰시오. (2단어, 영문 11자, I로 시작) [힌트: 앞 내용에 추가 정보를 더함]',
 wa:"In addition",accept:["In addition","in addition","IN ADDITION"],
 det:{ref:'[원문] In addition, all this data from cameras and sensors can be utilized for various applications and purposes.\n[해석] 게다가, 카메라와 센서에서 나온 이 모든 데이터는 다양한 용도와 목적으로 활용될 수 있다. [문장 17 참고]',
      correct:'In addition: 앞 문장에서 AI의 질병 진단 기능을 설명한 후, 데이터의 추가적 활용 가능성을 덧붙이는 첨가의 연결어.',
      wrongs:[],
      tip:'💡 In addition = Moreover = Furthermore\n• 앞 내용에 새로운 정보를 추가\n• 뒤에 쉼표(,) 필수\n\n⚠️ In addition vs. In addition to\n• In addition, S + V (부사구)\n• In addition to N, S + V (전치사구)'}},

{id:17,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장18',
 passage:``,
 stem:'다음 문장에서 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">One of the most noticeable and effective applications is real-time monitoring of fish behavior and other environmental changes, <b>[which serves / which serve]</b> multiple purposes.</div>',
 ch:['① which serves','② which serve','③ that serving','④ what serves','⑤ it serves'],ans:0,
 det:{ref:'[원문] One of the most noticeable and effective applications is real-time monitoring of fish behavior and other environmental changes, which serves multiple purposes...\n[해석] 가장 눈에 띄고 효과적인 응용 중 하나는 물고기 행동 및 기타 환경 변화의 실시간 모니터링으로, 이는 여러 목적에 기여한다. [문장 18 참고]',
      correct:'which serves: 관계대명사 which의 선행사는 "real-time monitoring"(단수)이므로 단수 동사 serves가 적절.',
      wrongs:['① which serves ✅ — 선행사 monitoring(단수)','② serve ❌ — 단수 선행사이므로 복수 동사 불가','③ that serving ❌ — 관계대명사 뒤에 분사 불가','④ what ❌ — 선행사가 있으므로 what 불가','⑤ it serves ❌ — 접속사 없이 절 연결 불가'],
      tip:'💡 which의 수 일치\n• 선행사가 단수 → which + 단수 동사\n• 선행사가 복수 → which + 복수 동사\n\n⚠️ One of the + 복수명사 + is/are?\n• "One of the applications IS" (주어는 One)\n• 하지만 which의 선행사는 문맥에 따라 판단'}},

{id:18,type:'한→영',diff:'어려움',pts:4,fmt:'mc',note:'문장19',
 passage:``,
 stem:'다음 한국어를 영어로 올바르게 옮긴 것은?<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">"수질, 온도, 또는 가두리 주변의 산소 수치 변화에 의해 야기될 수 있는"</div>',
 ch:['① possibly caused by changes in water quality, temperature, or oxygen levels surrounding the cage','② possibly causing by changes in water quality, temperature, or oxygen levels surrounding the cage','③ possible caused by changing in water quality, temperature, or oxygen levels surrounded the cage','④ possibly caused by changes in water quality, temperature, or oxygen levels surrounded by the cage','⑤ possibly caused of changes in water quality, temperature, and oxygen levels surrounding the cage'],ans:0,
 det:{ref:'[원문] ...possibly caused by changes in water quality, temperature, or oxygen levels surrounding the cage.\n[해석] 수질, 온도, 또는 가두리 주변의 산소 수치 변화에 의해 야기될 수 있는 [문장 19 참고]',
      correct:'possibly caused by: "야기될 수 있는" (수동 의미의 과거분사 + by). changes in: "~의 변화" (change + in). surrounding the cage: "가두리를 둘러싼" (현재분사).',
      wrongs:['① 정답 ✅','② causing ❌ — 수동 의미이므로 caused 필요','③ changing ❌ — changes(명사)가 적절, surrounded ❌ — 능동(surrounding)이어야 함','④ surrounded by the cage ❌ — 산소 수치가 가두리에 둘러싸인 것이 아님','⑤ caused of ❌ — caused by가 올바른 전치사 결합, and ❌ — or이 적절'],
      tip:'💡 caused by vs. caused of\n• caused by ~: ~에 의해 야기된 ✓\n• caused of ~: ✗ (비문법적)\n\n⚠️ surrounding vs. surrounded\n• levels surrounding the cage: 수치가 가두리를 둘러싸는 (능동)\n• levels surrounded by ~: 수치가 둘러싸인 (수동) → 부자연스러움'}},

{id:19,type:'지칭추론',diff:'보통',pts:3,fmt:'mc',note:'문장20',
 passage:`By processing large sets of data, an AI system can detect and recognize unusual group behaviors of an entire school of fish. <u>It</u> can also ensure the quality of cage nets to prevent fish from escaping or predators from invading.`,
 stem:'밑줄 친 <u>It</u>이 가리키는 것으로 가장 적절한 것은?',
 ch:['① the data','② an entire school of fish','③ an AI system','④ the cage net','⑤ the unusual group behavior'],ans:2,
 det:{ref:'[원문] By processing large sets of data, an AI system can detect... It can also ensure the quality of cage nets...\n[해석] 대규모 데이터를 처리함으로써, AI 시스템은 감지할 수 있다... 그것은 또한 가두리 그물의 품질을 보장할 수 있다. [문장 19-20 참고]',
      correct:'It은 앞 문장의 주어인 "an AI system"을 가리킨다. AI 시스템이 데이터 처리뿐 아니라 그물 품질 확인까지 할 수 있다는 맥락.',
      wrongs:['③ an AI system ✅ — 앞 문장의 주어','① the data ❌ — 데이터가 그물 품질을 보장할 수 없음','② school of fish ❌ — 물고기 무리가 주체가 아님','④ cage net ❌ — 그물이 자신의 품질을 보장할 수 없음','⑤ unusual behavior ❌ — 행동이 주체가 아님'],
      tip:'💡 It의 지칭 파악\n• 앞 문장의 주어를 우선 확인\n• also는 "또한"으로, 같은 주어의 추가 기능을 나타냄\n\n⚠️ also 단서 활용\n• "It can also ~" = 같은 주어가 추가로 ~ 할 수 있다'}},

{id:20,type:'어순배열',diff:'어려움',pts:4,fmt:'mc',note:'문장22',
 passage:``,
 stem:'주어진 단어를 올바른 순서로 배열한 것은?<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">This is [ ① farmers ② how ③ can ④ accurately ⑤ determine ] optimal feeding times and amounts.</div>',
 ch:['① ②-①-③-④-⑤','② ②-①-④-③-⑤','③ ①-②-③-⑤-④','④ ②-③-①-④-⑤','⑤ ①-④-③-②-⑤'],ans:0,
 det:{ref:'[원문] This is how farmers can accurately determine optimal feeding times and amounts.\n[해석] 이것이 어민들이 최적의 급이 시간과 양을 정확하게 결정하는 방법이다. [문장 22 참고]',

function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){const p=s;if(p>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(p>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(p>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(p>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(p>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}

function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}

function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="영어로 입력 (대소문자 무관, 띄어쓰기 주의)" oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}

function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{

function copyDetailedResult(){const nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);let txt=`━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🎯 내신핏 온라인퀴즈 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} ${EI.pub} ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n\n📊 점수: ${r.score}/100 (${r.score}%)\n✅ 정답 ${r.correct}/${QCOUNT} | ❌ 오답 ${r.wrong} | ⬜ 미응답 ${r.unanswered}\n🏅 레벨: ${lv.icon} ${lv.name}\n${r.score>=80?'🎉 통과!':'📚 미통과'}\n\n━━ 문항별 결과 ━━\n`;r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const at=d.q.fmt==='mc'?(d.ans!==null?(d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]):'미응답'):(d.ans||'미응답');const ct=d.q.fmt==='mc'?(d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]):d.q.wa;txt+=`${mk} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점 — 내답:${at} | 정답:${ct}\n`;});const tm={};r.details.forEach(d=>{const t=d.q.type;if(!tm[t])tm[t]={t:0,o:0};tm[t].t++;if(d.ok)tm[t].o++;});txt+=`\n━━ 유형별 ━━\n`;Object.entries(tm).forEach(([t,v])=>txt+=`${t}: ${v.o}/${v.t} (${Math.round(v.o/v.t*100)}%)\n`);txt+=`\n━━ 보완 피드백 ━━\n`;fb.forEach(f=>txt+=`${f}\n`);txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>toast('📄 상세 결과 복사 완료!')).catch(()=>toast('복사 실패'));}
function saveResultImage(){const nm=document.getElementById('inpName').value.trim(),r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);const W=800,pad=40;const lines=[{t:'🎯 내신핏 온라인퀴즈 상세 결과',s:22,b:1,c:'#E8772E'},{t:''},{t:`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}`,s:14,c:'#555'},{t:`👤 ${nm} · ${new Date().toLocaleDateString('ko-KR')}`,s:14,c:'#555'},{t:''},{t:`📊 점수: ${r.score}/100`,s:20,b:1},{t:`✅${r.correct}/${QCOUNT} ❌${r.wrong} ⬜${r.unanswered}`,s:14,c:'#555'},{t:`🏅 ${lv.icon} ${lv.name} ${r.score>=80?'🎉 통과':'📚 미통과'}`,s:16,b:1,c:r.score>=80?'#1A9960':'#D63B3B'},{t:''}];r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const ct=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;lines.push({t:`${mk} ${d.q.id}번[${d.q.type}]${d.q.pts}점 정답:${ct}`,s:12,c:d.ok?'#1A9960':'#D63B3B'});});lines.push({t:''});fb.forEach(f=>lines.push({t:f,s:11,c:'#444'}));lines.push({t:''},{t:'내신핏 · 온라인퀴즈 TEST',s:10,c:'#bbb'});let H=pad*2;lines.forEach(l=>{H+=(l.s||14)+10;});const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;const ctx=canvas.getContext('2d');ctx.scale(2,2);ctx.fillStyle='#FFF';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E8772E';ctx.fillRect(0,0,W,4);let y=pad+10;lines.forEach(l=>{const fs=l.s||14;ctx.font=`${l.b?'800':'500'} ${fs}px sans-serif`;ctx.fillStyle=l.c||'#222';if(l.t)ctx.fillText(l.t,pad,y);y+=fs+10;});ctx.fillStyle='#E8772E';ctx.fillRect(0,H-4,W,4);canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`퀴즈결과_${nm}_${new Date().toISOString().slice(0,10)}.png`;a.click();toast('🖼️ 이미지 저장 완료!');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
