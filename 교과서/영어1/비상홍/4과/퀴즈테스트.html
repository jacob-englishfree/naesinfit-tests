<style>

.choices{display:flex;flex-direction:column;gap:8px;}

.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}

.c-num{min-width:26px;height:26px;background:#f0ece8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}

.written-input{width:100%;padding:14px 16px;border:2px solid #e0dcd8;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}

.bogi-label{font-size:11px;color:var(--tl);font-weight:800;margin-bottom:4px;}.bogi-box{background:#fff;border:1.5px solid #d8d4d0;border-radius:var(--rxs);padding:12px;text-align:center;font-weight:700;font-size:14px;}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}

.nav-btn{padding:9px 18px;background:#fff;border:2px solid #e0dcd8;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}

.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#f0ece8;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(232,119,46,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #ebe7e3;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F8F5F0;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}

const Q = [
  {
    id:1, type:'어법', diff:'보통', pts:5, fmt:'mc',
    note:'PART1 전통어업→양식전환',
    passage:`Traditionally, fishers went out to sea with fishing nets or long lines on boats to catch fish. They took advantage of their experience ⓐ <u>gained</u> through trial and error, through observation, and through knowledge ⓑ <u>passed</u> down from previous generations. With wild fish stocks gradually ⓒ <u>declining</u> due to overfishing and the changing climate, more fishers are turning to farming instead of ⓓ <u>cast</u> nets or lines. In fact, according to a UN report, about 49% of the fish ⓔ <u>consumed</u> worldwide in 2020 came from fish farms, not from the wild.`,
    stem:'다음 글의 밑줄 친 ⓐ~ⓔ 중 어법상 어색한 것은?',
    ch:['ⓐ gained','ⓑ passed','ⓒ declining','ⓓ cast','ⓔ consumed'],
    ans:3,
    det:{
      ref:`[원문] instead of casting nets or lines [해석] 그물이나 줄을 던지는 대신. 전치사 instead of 뒤에는 동명사(v-ing)가 와야 합니다. cast(동사원형)는 전치사의 목적어 자리에 올 수 없으므로 casting으로 고쳐야 합니다. ⓐ gained: experience를 수식하는 과거분사(경험은 얻어지는 것 → 수동) ✅ ⓑ passed: knowledge를 수식하는 과거분사(지식은 전해지는 것 → 수동) ✅ ⓒ declining: with + O + v-ing(부대상황, 능동) ✅ ⓔ consumed: fish를 수식하는 과거분사(수동) ✅`,
      correct:`① ⓐ gained — experience(경험)를 뒤에서 수식하는 과거분사. 경험은 '얻어지는' 것이므로 수동 의미의 과거분사 gained 적절 ✅\n② ⓑ passed — knowledge(지식)를 수식하는 과거분사. 지식은 '전해지는' 것이므로 수동 의미 passed 적절 ✅\n③ ⓒ declining — 'With + 목적어 + 분사' 구문. fish stocks가 능동적으로 '줄어드는' 주체이므로 현재분사 declining 적절 ✅\n④ ⓓ cast — 전치사 instead of 뒤에 동사원형 cast가 왔으므로 어법 오류 ❌ → casting(동명사)이 되어야 함\n⑤ ⓔ consumed — fish를 수식하는 과거분사. 물고기는 '소비되는' 것이므로 수동 의미 consumed 적절 ✅`,
      wrongs:[],
      tip:`🔑 전치사 + 동명사(v-ing): instead of / in spite of / by / without + v-ing. 전치사 뒤에는 명사 또는 동명사만 가능하며, 동사원형은 불가. cast의 과거형·과거분사도 cast(불규칙: cast-cast-cast)이므로 문맥 확인 필수.`
    }
  },
  {
    id:2, type:'어법', diff:'어려움', pts:6, fmt:'mc',
    note:'PART2 AI 시스템 기능',
    passage:`A computer system with deep learning capabilities is able to track and record fish behavior better than humans can, especially when the system is trained with enough relevant data. It can distinguish and identify one fish from (A) <u>[another / the other]</u> and diagnose whether a small speck is dirt or sea lice, and this information is entered into the fish\`s health record. Farmers can then determine when they should take action, such as when to separate an abnormal group from the rest or spread out the fish population (B) <u>[reduce / to reduce]</u> density, without (C) <u>[resorting / resorted]</u> to harsh chemical treatments.`,
    stem:'(A), (B), (C)에 들어갈 표현으로 가장 적절한 것은?',
    ch:['another — reduce — resorting','another — to reduce — resorting','the other — reduce — resorted','the other — to reduce — resorting','another — to reduce — resorted'],
    ans:1,
    det:{
      ref:`[원문] one fish from another / to reduce density / without resorting to [해석] 한 마리 물고기를 다른 한 마리와 구별 / 밀도를 줄이기 위해 / 거친 화학 처리에 의존하지 않고. (A) one ~ another: 불특정 다수 중 하나와 또 다른 하나 대비. (B) to reduce: 목적의 to부정사. (C) without + v-ing: 전치사 뒤 동명사.`,
      correct:`① another — reduce — resorting: (B) reduce(동사원형)가 목적의 의미 불가 ❌\n② another — to reduce — resorting: (A) 불특정 다수 중 또 다른 하나 → another ✅ (B) 목적의 to부정사 → to reduce ✅ (C) 전치사 without 뒤 동명사 → resorting ✅ 정답!\n③ the other — reduce — resorted: (A) the other ❌ (C) resorted ❌\n④ the other — to reduce — resorting: (A) the other ❌\n⑤ another — to reduce — resorted: (C) without 뒤 과거분사 불가 ❌`,
      wrongs:[],
      tip:`🔑 one ~ another(셋 이상 중 하나~또 다른 하나) vs one ~ the other(둘 중 하나~나머지). 🔑 to부정사 부사적 용법(목적): ~하기 위해. 🔑 전치사(without, instead of, by) + 동명사(v-ing) 필수.`
    }
  },
  {
    id:3, type:'어법', diff:'어려움', pts:6, fmt:'mc',
    note:'PART3 먹이 공급 최적화',
    passage:`The system can also tell farmers exactly when to feed the fish by ⓐ <u>identifying</u> patterns of behavior that an individual fish or the school exhibits when they are hungry. This is how farmers can accurately determine optimal feeding times and amounts. The right amount of food at the right time minimizes cost, ⓑ <u>reduces</u> waste and pollution, and maximizes fish growth rates. ⓒ <u>Given</u> the fact that feeding constitutes more than 50% of a fish farm\`s operational budget, this precise feeding approach will ultimately contribute to a more affordable supply of fish for consumers as well as efficient and ⓓ <u>sustaining</u> aquaculture operations in general.`,
    stem:'다음 글의 밑줄 친 ⓐ~ⓓ 중 어법상 어색한 것은?',
    ch:['ⓐ identifying','ⓑ reduces','ⓒ Given','ⓓ sustaining'],
    ans:3,
    det:{
      ref:`[원문] efficient and sustainable aquaculture operations [해석] 효율적이고 지속 가능한 양식 운영. sustaining(현재분사)은 '~을 유지하는'이라는 능동 의미이고, sustainable(형용사)은 '지속 가능한'이라는 확립된 형용사입니다. efficient(형용사)와 병렬이므로 형용사 sustainable이 적절합니다.`,
      correct:`① ⓐ identifying — 전치사 by + 동명사(v-ing). 수단의 의미 '패턴을 파악함으로써' ✅\n② ⓑ reduces — minimizes, reduces, maximizes 세 동사가 and로 병렬 연결 ✅\n③ ⓒ Given — 분사구문 '~을 고려하면(Considering)' ✅\n④ ⓓ sustaining — efficient(형용사)와 병렬이므로 형용사 sustainable이 필요 ❌ → sustaining은 현재분사로 의미가 다름`,
      wrongs:[],
      tip:`🔑 sustainable(지속 가능한, 형용사) vs sustaining(유지하는, 현재분사): 환경 맥락에서는 sustainable이 적합. 🔑 병렬 구조: A and B → 같은 품사 필요. 🔑 Given (that) ~ = Considering that ~ (고려하면).`
    }
  },
  {
    id:4, type:'어휘', diff:'보통', pts:5, fmt:'mc',
    note:'PART1 AI 양식 도입',
    passage:`An essential element in providing healthy fish to consumers is the fish farmers\` ability to detect and (A) <u>[prevent / promote]</u> sea lice, a significant threat to fish health and profitability. One of the most modern methods to do this is through the power of computer vision and precision sensors, allowing fish farmers to (B) <u>[identify / ignore]</u> and track diseases before they spread. An aquaculture system equipped with high-precision underwater tools has already been (C) <u>[developed / abandoned]</u> in Norway.`,
    stem:'(A), (B), (C)에 들어갈 말로 가장 적절한 것은?',
    ch:['prevent — identify — developed','prevent — ignore — developed','promote — identify — abandoned','promote — ignore — developed','prevent — identify — abandoned'],
    ans:0,
    det:{
      ref:`[원문] detect and prevent sea lice / identify and track diseases / has already been developed in Norway [해석] 바다이를 탐지하고 예방하다 / 질병을 식별하고 추적 / 노르웨이에서 이미 개발됨. (A) sea lice는 위협이므로 prevent(예방). (B) 질병을 track하기 전에 identify(식별). (C) 첨단 시스템이 개발되었다는 긍정적 맥락.`,
      correct:`① prevent — identify — developed: (A) 위협인 sea lice를 예방 ✅ (B) 질병을 식별하고 추적 ✅ (C) 시스템이 노르웨이에서 개발됨 ✅ 정답!\n② prevent — ignore — developed: (B) ignore(무시)는 질병 관리에 부적절 ❌\n③ promote — identify — abandoned: (A) 위협을 촉진은 논리 오류 ❌\n④ promote — ignore — developed: (A)(B) 모두 부적절 ❌\n⑤ prevent — identify — abandoned: (C) 첨단 시스템이 폐기는 문맥 반대 ❌`,
      wrongs:[],
      tip:`🔑 prevent(예방) ≈ stop, block ↔ promote(촉진). 🔑 identify(식별) ≈ recognize ↔ ignore(무시). 🔑 develop(개발) ≈ create ↔ abandon(포기, 폐기).`
    }
  },
  {
    id:5, type:'어휘', diff:'어려움', pts:6, fmt:'mc',
    note:'PART3 먹이 공급 효과',
    passage:`The system can also tell farmers exactly when to feed the fish by identifying patterns of behavior that an individual fish or the school ① <u>exhibits</u> when they are hungry. This is how farmers can accurately determine ② <u>optimal</u> feeding times and amounts. The right amount of food at the right time minimizes cost, reduces waste and pollution, and ③ <u>maximizes</u> fish growth rates. Given the fact that feeding ④ <u>constitutes</u> more than 50% of a fish farm\`s operational budget, this precise feeding approach will ultimately ⑤ <u>hinder</u> a more affordable supply of fish for consumers.`,
    stem:'밑줄 친 ①~⑤ 중 문맥상 낱말의 쓰임이 적절하지 않은 것은?',
    ch:['① exhibits','② optimal','③ maximizes','④ constitutes','⑤ hinder'],
    ans:4,
    det:{
      ref:`[원문] will ultimately contribute to a more affordable supply [해석] 궁극적으로 더 저렴한 어류 공급에 기여할 것이다. 원문 contribute to(기여하다)가 ⑤ hinder(방해하다)로 바뀌어 문맥에 맞지 않습니다.`,
      correct:`① exhibits — '(행동 패턴을) 보이다'. 물고기가 배고플 때 행동 패턴을 보인다는 맥락에 적절 ✅\n② optimal — '최적의'. 최적의 먹이 시간과 양을 결정한다는 맥락에 적절 ✅\n③ maximizes — '극대화하다'. 적절한 먹이가 물고기 성장률을 극대화 ✅\n④ constitutes — '구성하다, 차지하다'. 먹이가 운영 예산의 50% 이상 차지 ✅\n⑤ hinder — '방해하다'. 정밀 먹이 공급이 저렴한 어류 공급에 방해는 문맥상 반대 ❌ → contribute to(기여하다)가 원문`,
      wrongs:[],
      tip:`🔑 contribute to(기여) ≈ help, lead to ↔ hinder(방해) ≈ impede, obstruct. 🔑 constitute(차지) ≈ make up, account for. 🔑 exhibit(보이다) ≈ display, show. 🔑 optimal(최적의) ≈ best, ideal.`
    }
  },
  {
    id:6, type:'어휘', diff:'보통', pts:5, fmt:'mc',
    note:'PART4 해조류·로봇',
    passage:`AI continues to advance in aquaculture to extend beyond caged fish. In particular, smart fish farming technologies can be ① <u>applied</u> to seaweed farming. Seaweed is as ② <u>valuable</u> a source of food as fish. Using cameras and sensors, AUVs can do many of the ③ <u>analytical</u> and diagnostic tasks on seaweed farms. Swarm robots, or many small robots working together, can swim in and around seaweed farms to ④ <u>collect</u> data and then make decisions on how to deal with problems that arise. Single larger robots or even humans may be available to take care of the physical labor; however, swarm robots may be more ⑤ <u>inefficient</u> and cost-effective.`,
    stem:'밑줄 친 ①~⑤ 중 문맥상 낱말의 쓰임이 적절하지 않은 것은?',
    ch:['① applied','② valuable','③ analytical','④ collect','⑤ inefficient'],
    ans:4,
    det:{
      ref:`[원문] swarm robots may be more efficient and cost-effective [해석] 군집 로봇이 더 효율적이고 비용 효과적일 수 있다. 원문 efficient(효율적인)가 ⑤ inefficient(비효율적인)로 바뀌어 문맥 반대.`,
      correct:`① applied — 스마트 기술이 해조류 양식에 '적용' ✅\n② valuable — 해조류가 물고기만큼 '가치 있는' 식량 자원 ✅\n③ analytical — AUV가 '분석적' 업무 수행 ✅\n④ collect — 데이터를 '수집' ✅\n⑤ inefficient — 군집 로봇의 장점 서술에서 '비효율적'은 문맥 반대 ❌ → efficient가 원문`,
      wrongs:[],
      tip:`🔑 efficient(효율적) ≈ effective ↔ inefficient(비효율적). 접두사 in-은 부정. 🔑 cost-effective(비용 효과적) ≈ economical. 🔑 as valuable a source as: 원급 비교(as + 형 + a/an + 명 + as).`
    }
  },
  {
    id:7, type:'대의', diff:'보통', pts:5, fmt:'mc',
    note:'PART1 AI 양식 기술',
    passage:`With the arrival of smart fish farming technology driven by artificial intelligence (AI), fish farmers are able to provide healthy, affordable seafood to families everywhere. An essential element in providing healthy fish to consumers is the fish farmers\` ability to detect and prevent sea lice, a significant threat to fish health and profitability. One of the most modern methods to do this is through the power of computer vision and precision sensors, allowing fish farmers to identify and track diseases before they spread.`,
    stem:'다음 글의 주제로 가장 적절한 것은?',

    ans:1,
    det:{
      ref:`[원문] smart fish farming technology driven by artificial intelligence (AI) [해석] 인공지능(AI)에 의해 구동되는 스마트 양식 기술. 글은 AI 기술이 현대 양식업에서 질병 탐지, 예방 등을 가능하게 하는 역할을 설명합니다.`,

      wrongs:[],
      tip:`🔑 주제 파악: 반복 키워드(AI, smart technology, fish farming) + 전체 흐름(도입→AI 기술 설명→질병 탐지). 배경 정보와 핵심 주제 구별 필수.`

  {

    note:'PART1 노르웨이 양식 시스템',
    passage:`An aquaculture system equipped with high-precision underwater tools has already been developed in Norway. It can hold up to 150,000 salmon in a sea cage, regularly inducing each fish into a tube where high-resolution cameras and sensors record everything about each individual salmon, including their overall shapes and dot patterns, their weight and growth rate, as well as any signs of sea lice, physical wounds, or abnormalities. Every detail is registered in the fish\`s health record, along with millions of images and figures.`,
    stem:'다음 글의 내용과 일치하는 것은?',

      correct:`① 일본에서 개발 — 원문: Norway(노르웨이) ❌\n② 최대 15만 마리 연어 수용 — 원문: hold up to 150,000 salmon과 일치 ✅\n③ 무게만 기록 — 원문: shapes, dot patterns, weight, growth rate 등 다양한 항목 ❌\n④ 저해상도 카메라 — 원문: high-resolution cameras ❌\n⑤ 시각적 데이터 없음 — 원문: millions of images ❌`,
      wrongs:[],
      tip:`🔑 일치 문제: 수치(150,000), 장소(Norway), 형용사(high/low-resolution)를 원문과 정확히 대조. 🔑 up to(최대 ~까지) ≈ a maximum of.`
    }
  },
  {
    id:11, type:'불일치', diff:'보통', pts:5, fmt:'mc',
    note:'PART4 해조류 활용',
    passage:`AI continues to advance in aquaculture to extend beyond caged fish. In particular, smart fish farming technologies can be applied to seaweed farming. Seaweed is as valuable a source of food as fish. It\`s also a source of fuel and an important ingredient for cosmetics, fertilizers, and other medicinal and industrial products. As such, ongoing research is exploring various ways AI can help in the seaweed industry, including the use of autonomous underwater vehicles (AUVs) and swarm robotics.`,
    stem:'다음 글의 내용과 일치하지 않는 것은?',
    ch:['AI technology in aquaculture is expanding beyond caged fish.','Smart fish farming technologies can be applied to seaweed farming.','Seaweed serves only as a food source and has no industrial uses.','Research is exploring the use of AUVs in the seaweed industry.','Swarm robotics is being considered for seaweed farming.'],
    ans:2,
    det:{
      ref:`[원문] a source of fuel and an important ingredient for cosmetics, fertilizers, and other medicinal and industrial products [해석] 연료의 원천이며, 화장품, 비료, 의약·산업 제품의 중요한 원료. ③은 only as a food source라고 했지만 다양한 용도가 있으므로 불일치.`,
      correct:`① AI 기술이 가두리 양식 넘어 확대 — 원문: extend beyond caged fish 일치 ✅\n② 스마트 기술이 해조류 양식에 적용 — 원문 일치 ✅\n③ 해조류는 식품으로서만 사용, 산업적 용도 없음 — 원문: fuel, cosmetics, fertilizers 등 다양한 용도 → 불일치 ❌\n④ AUV 사용이 해조류 산업에서 탐색 — 원문 일치 ✅\n⑤ 군집 로봇이 해조류 양식에 고려 — 원문 일치 ✅`,
      wrongs:[],
      tip:`🔑 불일치 문제: only, never, always 등 극단적 한정어 주의! ③의 only가 핵심 오류. 🔑 ingredient(원료) ≈ component, material.`

  {
    id:12, type:'빈칸', diff:'어려움', pts:6, fmt:'mc',
    note:'PART3 실시간 모니터링',
    passage:`One of the most noticeable and effective applications is real-time monitoring of fish behavior and other environmental changes, which serves multiple purposes, including diagnosing diseases in individual fish. By processing large sets of data, an AI system can detect and recognize unusual group behaviors of an entire school of fish, possibly caused by changes in water quality, temperature, or oxygen levels surrounding the cage. It can also ensure the quality of cage nets to prevent fish from escaping or predators from invading and protect the surrounding habitat. In short, AI-powered monitoring serves as __________________ for the entire aquaculture environment.`,
    stem:'빈칸에 들어갈 말로 가장 적절한 것은?',
    ch:['a replacement for all human workers','a comprehensive guardian','an obstacle to natural fish behavior','a temporary solution to pollution','a luxury available only to large corporations'],
    ans:1,
    det:{
      ref:`[원문] serves multiple purposes / detect unusual behaviors / ensure cage net quality / protect habitat [해석] 다양한 목적에 기여 / 비정상 행동 탐지 / 그물 품질 보장 / 서식지 보호. 다방면의 종합적 보호 역할 → comprehensive guardian.`,
      correct:`① 모든 인간 노동자의 대체물 — 모든 인력 대체 언급 없음 ❌\n② 종합적인 수호자 — 질병 진단 + 환경 감시 + 그물 관리 + 서식지 보호 모두 포괄 ✅\n③ 자연적 물고기 행동의 장애물 — 관찰·보호 역할이며 장애 아님 ❌\n④ 오염의 임시 해결책 — 포괄적 모니터링이 주제이며 temporary 부적절 ❌\n⑤ 대기업만의 사치품 — 접근성 제한 언급 없음 ❌`,
      wrongs:[],
      tip:`🔑 빈칸(구) 풀이: 앞뒤 핵심 키워드(multiple purposes, detect, ensure, protect) → 포괄하는 표현 선택. 🔑 comprehensive(종합적) ≈ all-inclusive, thorough. 🔑 guardian(수호자) ≈ protector.`
    }
  },
  {

    det:{

      correct:`① 양식업자가 농장 방문 불필요 — no longer ~ at all은 극단적 ❌\n② 24시간 근무 AI 의사가 모니터링 — AI의 지속적 감시·진단 기능의 비유 ✅\n③ 딥러닝이 수의학 완전 대체 — completely replaced는 과장 ❌\n④ 바다이가 더 이상 문제 안 됨 — 여전히 위협으로 언급 ❌\n⑤ 인간 관찰이 컴퓨터보다 정확 — better than humans can → 반대 내용 ❌`,
      wrongs:[],
      tip:`🔑 In a sense(어떤 의미에서): 앞 내용을 비유적으로 요약하는 신호. 🔑 on duty(근무 중) ≈ working. 24/7 = 하루 24시간, 주 7일. 🔑 극단적 표현(no longer ~ at all, completely replaced)은 보통 오답 신호.`

  {

    stem:'밑줄 친 부분이 의미하는 바로 가장 적절한 것은?',

    }

  {
    id:15, type:'순서', diff:'보통', pts:5, fmt:'mc',
    note:'PART1 글 순서',
    passage:`With wild fish stocks gradually declining due to overfishing and the changing climate, more fishers are turning to farming instead of casting nets or lines.<br><br>(A) With the arrival of smart fish farming technology driven by artificial intelligence (AI), fish farmers are able to provide healthy, affordable seafood to families everywhere.<br><br>(B) In fact, according to a UN report, about 49% of the fish consumed worldwide in 2020 came from fish farms, not from the wild. This figure is expected to continue to grow, increasing to 62% by 2030.<br><br>(C) An essential element in providing healthy fish to consumers is the fish farmers\` ability to detect and prevent sea lice, a significant threat to fish health and profitability.`,
    stem:'주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?',
    ch:['(A)-(B)-(C)','(A)-(C)-(B)','(B)-(A)-(C)','(B)-(C)-(A)','(C)-(A)-(B)'],
    ans:2,
    det:{
      ref:`[해석] 주어진 글: 야생 어류 감소 → 양식 전환. (B) In fact로 양식업 성장 통계(49%→62%) 제시. (A) With the arrival of로 AI 스마트 기술 도입. (C) An essential element로 구체적 기술(sea lice 탐지) 설명.`,
      correct:`① (A)-(B)-(C): 주어진 글 → 바로 AI 기술은 급작스러움 ❌\n② (A)-(C)-(B): 통계(B)가 마지막이면 부자연스러움 ❌\n③ (B)-(A)-(C): 양식 전환 → In fact 통계 → AI 기술 도입 → 구체적 기술 ✅\n④ (B)-(C)-(A): (C) 뒤 (A)면 논리 역행 ❌\n⑤ (C)-(A)-(B): sea lice가 먼저면 맥락 없음 ❌`,
      wrongs:[],
      tip:`🔑 순서배열: ① 마지막 문장 핵심어(farming) ② 연결어 분석(In fact, With the arrival of, An essential element) ③ In fact는 앞 내용 뒷받침 → (B) 먼저 ④ 일반→구체 흐름 확인.`

      wrongs:[],
      tip:`🔑 무관문장: 핵심 주제어(seaweed farming, robots, AUV) 파악 → 무관 문장(electric vehicles, battery) 찾기. however(⑤)가 ④→⑤ 연결하므로 자연스러움.`

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
