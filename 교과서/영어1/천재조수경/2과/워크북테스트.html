<!DOCTYPE html>
<html lang="ko">
<head>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--o:#7C3AED;--od:#5B21B6;--ol:#A78BFA;--oxl:#F3F0FF;--oxxl:#FAF5FF;--bg:#F5F3FF;--text:#1E1B18;--tm:#6B6560;--tl:#A09890;--g:#1A9960;--gl:#E6F9F0;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--p:#7C4DFF;--pl:#F3EEFF;--sky:#0EA5E9;--skyl:#E8F6FF;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}

.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.012;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
#startScreen{align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#FAF5FF,#F5F3FF 40%,#F3F0FF);position:relative;}
.start-container{max-width:460px;width:100%;position:relative;z-index:1;}
.brand-badge{background:linear-gradient(135deg,var(--o),var(--ol));color:#fff;font-size:12px;font-weight:800;padding:7px 16px;border-radius:24px;letter-spacing:.8px;box-shadow:0 4px 14px rgba(124,58,237,.25);display:inline-block;margin-bottom:20px;}
.start-title{font-size:36px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}.start-title span{background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.start-subtitle{font-size:14px;color:var(--tm);margin-bottom:30px;font-weight:500;}
.info-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.info-card-header{background:linear-gradient(135deg,var(--o),var(--ol));padding:14px 20px;color:#fff;font-size:13px;font-weight:700;}
.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #F3F0FF;}.info-row:last-child{border:none;}.info-label{color:var(--tm);font-weight:500;}.info-value{font-weight:700;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}.chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid #E9E5F5;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:600;color:var(--tm);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.input-group{margin-bottom:14px;}.input-group label{display:block;font-size:12px;font-weight:700;color:var(--tm);margin-bottom:6px;}
.input-group input,.input-group select{width:100%;padding:13px 16px;border:2px solid #DDD6FE;border-radius:var(--rs);font-size:15px;font-family:inherit;background:#fff;transition:var(--tr);}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(124,58,237,.1);}
.input-row{display:flex;gap:10px;}
.btn{padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--tr);width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 6px 20px rgba(124,58,237,.3);margin-top:12px;}.btn-primary:hover{transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid #DDD6FE;color:var(--tm);margin-top:8px;font-size:14px;padding:12px;}.btn-outline:hover{border-color:var(--o);color:var(--o);}
.history-badge{background:var(--oxl);color:var(--o);font-weight:800;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;}
#historyPanel{display:none;margin-top:14px;}
.history-item{background:var(--card);border:1.5px solid #E9E5F5;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.history-item .hi-left .hi-name{font-weight:700;font-size:13px;}.history-item .hi-left .hi-meta{font-size:11px;color:var(--tl);}
.history-item .hi-right .hi-score{font-size:20px;font-weight:900;color:var(--o);}.history-item .hi-right .hi-level{font-size:10px;color:var(--tm);text-align:right;}
#examScreen{min-height:100vh;}
.exam-topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:10px;}.topbar-dot{width:8px;height:8px;background:var(--o);border-radius:50%;}
.topbar-info{font-size:13px;color:var(--tm);font-weight:600;}.topbar-info span{color:var(--o);font-weight:800;}
.timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;}.timer.warn{color:var(--o);}.timer.danger{color:var(--r);animation:pulse .6s infinite;}
@keyframes pulse{50%{opacity:.3;}}
.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.q-header{display:flex;align-items:center;gap:10px;padding:16px 22px;background:linear-gradient(135deg,#FFFAF5,#FFF6EE);border-bottom:1px solid #EDE9FE;}
.q-num{width:36px;height:36px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;box-shadow:0 3px 8px rgba(124,58,237,.25);}
.q-type-tag{font-size:11px;font-weight:800;padding:4px 12px;border-radius:14px;}
.tag-어법{background:var(--rl);color:var(--r);}.tag-어휘{background:var(--bl);color:var(--b);}.tag-대의{background:var(--gl);color:var(--g);}.tag-일치{background:var(--oxl);color:var(--od);}.tag-빈칸{background:var(--pl);color:var(--p);}.tag-함축{background:#FFF0F5;color:#D946A0;}.tag-순서{background:var(--skyl);color:var(--sky);}.tag-무관{background:#F0FDF4;color:#16A34A;}.tag-서술형{background:var(--gl);color:var(--g);}.tag-지칭{background:#FEF3C7;color:#D97706;}.tag-TF{background:#E0E7FF;color:#4338CA;}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#F3F0FF;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--o);font-weight:800;}
.q-body{padding:22px;}
.q-passage{background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-left:4px solid var(--o);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-passage .label{font-size:11px;font-weight:800;color:var(--o);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.q-passage u{text-decoration-color:var(--o);text-decoration-thickness:2px;text-underline-offset:3px;}
.q-stem{font-size:15px;font-weight:700;margin-bottom:18px;line-height:1.7;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #E9E5F5;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;position:relative;overflow:hidden;}
.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}
.choice-btn.selected{border-color:var(--o);box-shadow:0 0 0 3px rgba(124,58,237,.12);background:var(--oxxl);}
.c-num{min-width:26px;height:26px;background:#EDE9FE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}
.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #DDD6FE;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}
.written-input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(124,58,237,.08);}
.cond-box{background:linear-gradient(135deg,#F8F6F3,#F3F0EC);border:1.5px solid #DDD6FE;border-radius:var(--rs);padding:16px;margin-bottom:16px;}.cond-box .ct{font-weight:800;color:var(--od);margin-bottom:8px;font-size:13px;}.cond-box ul{margin-left:18px;margin-bottom:10px;}.cond-box li{margin-bottom:3px;font-size:13px;}
.bogi-label{font-size:11px;color:var(--tl);font-weight:800;margin-bottom:4px;}.bogi-box{background:#fff;border:1.5px solid #C4B5FD;border-radius:var(--rxs);padding:12px;text-align:center;font-weight:700;font-size:14px;}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:65%;}
.nav-dot{width:28px;height:28px;border-radius:50%;background:#E9E5F5;cursor:pointer;border:none;font-size:10px;font-weight:800;color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:var(--tr);}
.nav-dot.current{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.3);transform:scale(1.08);}
.nav-dot.answered{background:var(--g);color:#fff;}
.nav-btn{padding:9px 18px;background:#fff;border:2px solid #DDD6FE;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#EDE9FE;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #E9E5F5;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(124,58,237,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#EDE9FE;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(124,58,237,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #E9E5F5;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F3F0FF;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #DDD6FE;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(124,58,237,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #DDD6FE;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}
.tag-어법{background:#FEF2F2;color:#DC2626;}.tag-어휘{background:#EEF2FF;color:#4F46E5;}.tag-오류찾기{background:#FEF2F2;color:#B91C1C;}.tag-연결사{background:#F3F0FF;color:#7C3AED;}.tag-서술형{background:#ECFDF5;color:#059669;}.tag-한영{background:#ECFEFF;color:#0891B2;background:#ECFEFF;}.tag-한→영{background:#ECFEFF;color:#0891B2;}.tag-지칭추론{background:#FFFBEB;color:#B45309;}.tag-어순배열{background:#F3F0FF;color:#6D28D9;}.tag-의미파악{background:#FDF2F8;color:#BE185D;}.tag-T\/F{background:#F0F9FF;color:#0369A1;}.tag-주제{background:#F5F3FF;color:#374151;}.hl{background:linear-gradient(transparent 60%,rgba(124,58,237,.15) 60%);font-weight:700;}
</style>
</head>
<body>
<div class="grain"></div><div class="toast" id="toast"></div>

<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">📚 내신핏</div>
  <h1 class="start-title">온라인 워크북 <span>TEST</span></h1>
  <p class="start-subtitle">천재(조수경) 2과 · The Potential of Unconventional Thinking</p>
  <div class="info-card"><div class="info-card-header">📚 시험 정보</div><div class="info-rows">
    <div class="info-row"><span class="info-label">과목</span><span class="info-value">영어1</span></div>
    <div class="info-row"><span class="info-label">출판사</span><span class="info-value">천재(조수경)</span></div>
    <div class="info-row"><span class="info-label">단원</span><span class="info-value">2과 The Potential of Unconventional Thinking</span></div>
  </div></div>
  <div class="chip-row"><div class="chip">📝 30문항</div><div class="chip">⏱️ 20분</div><div class="chip">✅ 80점 이상 통과</div><div class="chip">📊 100점 만점</div></div>

  <div class="input-row"><div class="input-group" style="flex:1"><label>학교</label><input type="text" id="inpSchool" placeholder="선택"></div><div class="input-group" style="flex:.6"><label>학년</label><select id="inpGrade"><option>고1</option><option>고2</option><option>고3</option></select></div></div>

  <div id="historyPanel"></div>
</div>
</div>

<div id="examScreen" class="screen">
  <div class="exam-topbar"><div class="topbar-left"><div class="topbar-dot"></div><div class="topbar-info">영어1 · 천재(조수경) · <span>2과</span></div></div><div class="timer" id="timer">20:00</div><button class="btn-submit" onclick="submitExam()">제출하기</button></div>
  <div class="exam-scroll" id="examScroll"></div>
  <div class="exam-nav"><button class="nav-btn" onclick="scrollToQ(S.cur-1)">←</button><div class="nav-dots" id="navDots"></div><button class="nav-btn" onclick="scrollToQ(S.cur+1)">→</button></div>
</div>

const FULL_PASSAGE=`As we go through life, we may become stuck in a routine, missing out on extraordinary ideas or solutions. In such a situation, we can try considering things from a different angle. By doing so, we can expand our understanding of the world, challenge our assumptions, and find creative solutions to problems. Let's look at two stories that demonstrate the power of thinking differently.

Walter Gropius was a well-known architect, widely regarded as one of the pioneers of modernist architecture. However, even this expert architect was once troubled when designing an amusement park. He finished most of the main structures except for the pathways between the attractions. Gropius wanted to find the best design for the pathways but could not come up with anything that satisfied him. One day, Gropius took a trip to France. The place he went to was famous for its vineyards. Farmers were selling grapes along the road near each vineyard. Then, one far ahead caught his eye because there was no one selling grapes but only a box by the side of the road. It turned out that the elderly couple who owned the vineyard were in poor health and could not pick the grapes themselves. Instead, they let people pick as many grapes as they wanted as long as they put five francs in the box. The couple not only prevented their grapes from becoming too ripe by permitting grape picking, but they also provided an enjoyable experience for their customers.

Astonished by the elderly couple's idea of allowing customers to freely pick grapes, Gropius thought it would be good to extend this idea to the amusement park design and allow visitors to create their own paths. Upon returning to his project, he instructed the construction team to plant grass in areas where he wanted to create the pathways. When the grass started to grow, he opened the amusement park earlier than planned.

In places where people repeatedly walked, small footpaths started to form on the grass. The shapes of the paths were not unified, with some wide and some narrow, because they were formed naturally by visitors. The following year, Gropius used the grass pathways as an outline on which he built permanent pathways, resulting in the most convenient and efficient routes. This pathway design was later chosen as the best road design at the 1971 International Landscape Architecture Symposium in London.

It was contrary to common sense to allow people to walk on newly sprouted grass because it could damage the grass. Moreover, it was unprecedented for an architect to let people do the designing. Nonetheless, Gropius gained insight into creating ideal pathways by thinking outside the box.

Have you ever wondered why there are mirrors in elevators? The world's first successful passenger elevator was installed in a five-story building in New York in 1857. This prominent development brought excitement to the field of architecture by making it possible to build much taller buildings than ever before. Nevertheless, passengers were highly dissatisfied regardless of how practical it was.

Employees of the elevator company conducted a customer survey in order to find out why the passengers were so unhappy. The results of the questionnaire showed that it was the elevator's slow speed that was causing dissatisfaction. The trip from one floor to the next took nearly fifteen seconds. The employees also discovered that passengers thought the elevator was much slower than it actually was because passengers had nothing to do. During the slow ride, some passengers complained and said they felt trapped. Even though the employees identified speed as the main source of dissatisfaction, it was not something that could be improved immediately due to technological limitations.

Then, one day, one employee of the elevator company began to look at the problem from a different perspective. She thought about it from a passenger's point of view. She thought that what mattered was not speed but discomfort and boredom. She asked herself what could be done in this case. After many days of searching for a solution, she proposed installing a mirror inside the elevator. She believed that it could make the elevator appear larger, reducing the feeling of being trapped. Also, she believed that people could relieve boredom by looking in the mirror.

On a survey done after the mirror was installed, passengers commented on how much faster the new elevator was, even though the speed was exactly the same. Passengers stopped paying attention to the speed of the elevator because they were looking in the mirror. If the employee had thought only of ways to increase the speed of the elevator to resolve the problem, it might not have been possible to find a solution. However, by viewing the problem from a different perspective, the employee found the solution by speeding up the customers' perception of time.

In solving problems that are new to us, it is quite easy to get stuck in a particular point of view. However, even a simple shift in perspective can result in a creative solution. So, the next time you face a problem, try thinking about it from a different angle.

Have you ever come across an advertisement that actually encourages customers not to buy a product? It does not seem to make sense, but there are instances where companies have successfully used this somewhat odd approach. For example, there was a fast-food company that was concerned about public criticism on negative health effects due to the high fat content of fast food. Instead of trying to dispute the public criticism and claim their food was healthy, the company tried something different. They discouraged customers from eating fast food, like hamburgers, too often. Unexpectedly, this approach had an interesting effect. The company gained a positive image as being socially responsible, attracting more customers. This approach was also successful in the world of fashion. There was a rising concern about buying clothes and throwing them away quickly. This type of fast fashion trend has a destructive impact on the environment because excessive production of clothes produces a massive amount of waste. Surprisingly, one fashion company started to persuade people not to buy their clothes. They argued that people should consume less and far more slowly. This unconventional marketing strategy not only raised awareness about the harmful effects of fast fashion on the environment, but also increased the company's sales. People thought that this brand really cared about the environment, and they started to buy more of this company's products. To sum up, both of these companies positioned themselves as responsible brands by discouraging consumption, which ultimately captured the attention and appreciation of a growing audience.`;

      tip:'💡 대명사 one\n• one은 앞에 나온 가산명사의 반복을 피하기 위해 사용\n• one = a + 단수명사 (불특정 대상)\n• it = the + 단수명사 (특정 대상)\n\n⚠️ 함정\n• one은 가산명사만 대신함!'}},

{id:10,type:'지칭추론',diff:'보통',pts:3,fmt:'mc',note:'문장41',
 passage:`After many days of searching for a solution, she proposed installing a mirror inside the elevator. She believed that <u>it</u> could make the elevator appear larger, reducing the feeling of being trapped.`,
 stem:'밑줄 친 <u>it</u>이 가리키는 것으로 가장 적절한 것은?',
 ch:['① the solution','② the elevator','③ a mirror','④ the feeling','⑤ the speed'],ans:2,
 det:{ref:'[원문] She believed that it could make the elevator appear larger, reducing the feeling of being trapped.\n[해석] 그녀는 그것(거울)이 엘리베이터를 더 넓어 보이게 만들어 갇힌 느낌을 줄여줄 수 있다고 믿었다. [문장 41 참고]',
      correct:'it은 바로 앞 문장에서 제안한 a mirror를 가리킨다. 거울이 엘리베이터를 넓어 보이게 만든다는 의미.',
      wrongs:['① the solution — 아직 해결책이 구체화되지 않은 시점','② the elevator — 엘리베이터가 자기를 넓혀 보이게 할 수는 없음','③ a mirror ✅ — 직전에 제안한 거울을 지칭','④ the feeling — 감정이 엘리베이터를 넓혀 보이게 하는 것은 비논리적','⑤ the speed — 속도는 문맥상 관련 없음'],
      tip:'💡 대명사 it 추론 전략\n• 가장 가까운 앞 문장에서 단수명사 찾기\n• 문맥상 의미가 통하는지 확인\n• 주어-동사 관계가 논리적인지 검증\n\n⚠️ 함정\n• it이 가리키는 대상은 꼭 바로 앞 명사가 아닐 수 있음!'}},

{id:11,type:'의미파악',diff:'어려움',pts:4,fmt:'mc',note:'문장25',
 passage:`Nonetheless, Gropius gained insight into creating ideal pathways by <u>thinking outside the box</u>.`,
 stem:'밑줄 친 <u>thinking outside the box</u>의 의미와 가장 가까운 것은?',
 ch:['① following traditional methods','② thinking in an unconventional way','③ building a box-shaped structure','④ working without any plan','⑤ avoiding creative approaches'],ans:1,
 det:{ref:'[원문] Nonetheless, Gropius gained insight into creating ideal pathways by thinking outside the box.\n[해석] 그럼에도 불구하고, Gropius는 틀에 박히지 않은 사고를 통해 이상적인 산책로를 만드는 통찰력을 얻었다. [문장 25 참고]',
      correct:'thinking outside the box는 "틀에 박히지 않고 창의적으로 생각하다"라는 관용 표현. ② thinking in an unconventional way(비전통적인 방식으로 생각하기)가 가장 가까운 의미.',
      wrongs:['① following traditional methods — 전통적 방법을 따르기: 정반대 의미','② thinking in an unconventional way ✅ — 비전통적 방식으로 생각하기','③ building a box-shaped structure — 상자 모양 구조물 짓기: 직역 오류','④ working without any plan — 계획 없이 일하기: 의미 다름','⑤ avoiding creative approaches — 창의적 접근 회피: 정반대 의미'],
      tip:'💡 관용 표현\n• think outside the box = 틀에서 벗어나 생각하다\n• box = 고정관념, 틀\n• 동의어: think creatively, think differently\n\n⚠️ 함정\n• box를 물리적 "상자"로 해석하면 오답!'}},

{id:12,type:'오류찾기',diff:'어려움',pts:4,fmt:'mc',note:'문장16-18',
 passage:``,
 stem:'다음 글에서 밑줄 친 부분 중 어법상 틀린 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Astonished by the elderly couple\'s idea, Gropius thought it would be good <u>① to extend</u> this idea to the amusement park design and allow visitors <u>② creating</u> their own paths. Upon <u>③ returning</u> to his project, he instructed the construction team <u>④ to plant</u> grass in areas <u>⑤ where</u> he wanted to create the pathways.</div>',
 ch:['① to extend','② creating','③ returning','④ to plant','⑤ where'],ans:1,
 det:{ref:'[원문] ...Gropius thought it would be good to extend this idea to the amusement park design and allow visitors to create their own paths.\n[해석] ...이 아이디어를 놀이공원 설계에 확장하고 방문객들이 자신만의 길을 만들게 하면 좋겠다고 생각했다. [문장 16 참고]',
      correct:'② creating → to create. allow는 「allow + 목적어 + to부정사」 구조를 취한다. allow visitors creating은 비문.',
      wrongs:['① to extend ✅ — it would be good to extend: 가주어-진주어 구문','② creating ❌ → to create — allow+O+to-V 구조','③ returning ✅ — Upon returning: 전치사+동명사','④ to plant ✅ — instruct+O+to-V 구조','⑤ where ✅ — 관계부사 where: 선행사 areas(장소)'],
      tip:'💡 allow의 목적격보어\n• allow + O + to-V (O가 ~하는 것을 허락하다)\n• ❌ allow + O + V-ing (불가)\n\n💡 5형식 동사별 목적격보어\n• let/make/have + O + V(원형)\n• allow/permit/enable + O + to-V\n\n⚠️ 함정\n• allow와 let을 혼동하지 말 것!'}},

{id:13,type:'오류찾기',diff:'보통',pts:3,fmt:'mc',note:'문장30-32',
 passage:``,
 stem:'다음 글에서 밑줄 친 부분 중 어법상 틀린 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Employees of the elevator company conducted a customer survey in order to <u>① find out</u> why the passengers were so unhappy. The results of the questionnaire <u>② showed</u> that it was the elevator\'s slow speed <u>③ which</u> was causing dissatisfaction. The trip from one floor to the next <u>④ took</u> nearly fifteen seconds.</div>',
 ch:['① find out','② showed','③ which','④ took','⑤ 틀린 것 없음'],ans:2,
 det:{ref:'[원문] The results of the questionnaire showed that it was the elevator\'s slow speed that was causing dissatisfaction.\n[해석] 설문 결과, 불만의 원인은 엘리베이터의 느린 속도라는 것이 밝혀졌다. [문장 31 참고]',
      correct:'③ which → that. 이 문장은 강조 구문(It is ~ that ...)이다. 강조 구문에서는 관계대명사 which가 아닌 that을 사용한다.',
      wrongs:['① find out ✅ — in order to+V: ~하기 위해','② showed ✅ — 주어 The results 복수에 과거형 적절','③ which ❌ → that — It was ... that 강조 구문','④ took ✅ — The trip(주어)+took(동사) 적절','⑤ 해당 없음'],
      tip:'💡 강조 구문 (It is ~ that ...)\n• It is/was + 강조 대상 + that + 나머지\n• 강조 대상: 주어, 목적어, 부사(구) 등\n• that은 who/which로 대체 불가 (단, 사람 강조 시 who 가능)\n\n⚠️ 함정\n• 강조 구문의 that을 관계대명사로 착각하지 말 것!'}},

{id:14,type:'서술형',diff:'보통',pts:3,fmt:'written',note:'문장08',
 passage:`Gropius wanted to find the best design for the pathways but could not come up with anything that ( ___ ) him.`,
 stem:'위 빈칸에 들어갈 알맞은 단어를 쓰시오. (1단어, 영문 9자, s로 시작)',
 wa:"satisfied",accept:["satisfied","Satisfied"],
 det:{ref:'[원문] Gropius wanted to find the best design for the pathways but could not come up with anything that satisfied him.\n[해석] Gropius는 산책로의 최적 디자인을 찾고 싶었지만 자신을 만족시키는 것을 떠올릴 수 없었다. [문장 08 참고]',
      correct:'satisfied(만족시켰다)가 적절. anything that satisfied him = 그를 만족시키는 어떤 것. satisfy는 타동사로 목적어(him)를 취한다.',
      wrongs:[],
      tip:'💡 satisfy의 용법\n• satisfy + 사람: ~를 만족시키다\n• be satisfied with: ~에 만족하다\n• satisfying: 만족스러운 (능동)\n• satisfied: 만족한 (수동/감정)\n\n⚠️ 함정\n• 관계절 안에서 satisfy는 능동 → satisfied (과거형)'}},

{id:15,type:'한→영',diff:'어려움',pts:4,fmt:'mc',note:'문장21',
 passage:``,
 stem:'다음 우리말과 같은 뜻이 되도록 주어진 단어를 사용하여 영작하시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">"이듬해 Gropius는 잔디 위의 산책로를 윤곽으로 사용하여 영구 산책로를 건설했다."<br><br>→ The following year, Gropius used the grass pathways as an outline [&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;].</div>제시어: which / built / he / permanent / on / pathways',
 ch:['① on which he built permanent pathways','② which he built permanent pathways on','③ that he built on permanent pathways','④ where he built permanent pathways','⑤ on that he built permanent pathways'],ans:0,
 det:{ref:'[원문] The following year, Gropius used the grass pathways as an outline on which he built permanent pathways, resulting in the most convenient and efficient routes.\n[해석] 이듬해, Gropius는 잔디 위의 산책로를 윤곽으로 삼아 그 위에 영구 산책로를 건설하여 가장 편리하고 효율적인 길을 만들었다. [문장 21 참고]',
      correct:'「전치사+관계대명사」 구조: on which = on the outline. 윤곽(outline) 위에(on) 영구 산책로를 건설했다는 의미.',
      wrongs:['① on which he built permanent pathways ✅ — 전치사+관계대명사 구조','② which he built permanent pathways on — 문법적으로 가능하나 격식체에서 전치사 후치 비선호','③ that he built on permanent pathways — on의 위치가 부적절','④ where he built permanent pathways — where는 전치사 on의 의미를 포함하지 않음','⑤ on that he built permanent pathways — 전치사 뒤에 that 불가'],
      tip:'💡 전치사 + 관계대명사\n• 전치사 + which (사물)\n• 전치사 + whom (사람)\n• ❌ 전치사 + that (불가)\n• 예: the book in which I found it\n\n⚠️ 함정\n• that 앞에는 전치사를 놓을 수 없다!'}},

{id:16,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장29',
 passage:``,
 stem:'다음 빈칸에 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Nevertheless, passengers were highly dissatisfied <b>[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]</b> how practical it was.</div>',
 ch:['① because of','② in spite of','③ regardless of','④ according to','⑤ instead of'],ans:2,
 det:{ref:'[원문] Nevertheless, passengers were highly dissatisfied regardless of how practical it was.\n[해석] 그럼에도 불구하고, 그것이 아무리 실용적이었음에도 승객들은 매우 불만족스러워했다. [문장 29 참고]',
      correct:'regardless of는 "~에 상관없이"라는 양보 표현. 실용적이든 아니든 불만이었다는 의미.',
      wrongs:['① because of — ~때문에: 인과 관계로 문맥 부적절','② in spite of — ~에도 불구하고: 가능하나 원문은 regardless of','③ regardless of ✅ — ~에 상관없이: 양보 표현','④ according to — ~에 따르면: 문맥 부적절','⑤ instead of — ~대신에: 문맥 부적절'],
      tip:'💡 양보 표현 비교\n• regardless of + 명사/동명사: ~에 상관없이\n• in spite of / despite + 명사/동명사: ~에도 불구하고\n• no matter + 의문사: 아무리 ~해도\n\n⚠️ 함정\n• regardless of ≠ regarding (~에 관하여)'}},

{id:17,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장33',
 passage:``,
 stem:'다음 문장의 빈칸에 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">The employees also discovered that passengers thought the elevator was much <b>[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]</b> than it actually was because passengers had nothing to do.</div>',
 ch:['① slow','② slower','③ slowest','④ more slowly','⑤ most slow'],ans:1,
 det:{ref:'[원문] The employees also discovered that passengers thought the elevator was much slower than it actually was because passengers had nothing to do.\n[해석] 직원들은 또한 승객들이 할 일이 없었기 때문에 엘리베이터가 실제보다 훨씬 느리다고 생각했다는 것을 발견했다. [문장 33 참고]',
      correct:'than이 있으므로 비교급 필요. slow의 비교급은 slower. much는 비교급 강조 부사.',
      wrongs:['① slow — 원급이므로 than과 함께 쓸 수 없음','② slower ✅ — 비교급 + than 구조','③ slowest — 최상급은 than과 함께 쓸 수 없음','④ more slowly — slowly는 부사이고, 여기서는 보어(형용사) 필요','⑤ most slow — 최상급 형태 오류 (slowest가 올바름)'],
      tip:'💡 비교급 강조\n• much / even / still / far / a lot + 비교급\n• 예: much slower, far better, even worse\n\n⚠️ 함정\n• very는 비교급 강조 불가! (very slower ❌)'}},

{id:18,type:'어법',diff:'어려움',pts:3,fmt:'mc',note:'문장35',
 passage:``,
 stem:'다음 문장의 어법상 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">Even though the employees identified speed as the main source of dissatisfaction, it was not something that could <b>[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]</b> immediately due to technological limitations.</div>',
 ch:['① improve','② improved','③ be improved','④ improving','⑤ have improved'],ans:2,
 det:{ref:'[원문] Even though the employees identified speed as the main source of dissatisfaction, it was not something that could be improved immediately due to technological limitations.\n[해석] 직원들이 속도를 불만의 주요 원인으로 확인했지만, 기술적 한계로 인해 즉시 개선될 수 있는 것이 아니었다. [문장 35 참고]',
      correct:'something이 "개선되는" 대상이므로 수동태 be improved가 필요. could be improved = 개선될 수 있었다.',
      wrongs:['① improve — 능동태이므로 주어가 개선하는 주체여야 하나, something은 개선 대상','② improved — could + p.p.는 비문','③ be improved ✅ — 조동사 + 수동태 (could be p.p.)','④ improving — 진행형 + 수동 미포함','⑤ have improved — 능동 완료이므로 의미 부적절'],
      tip:'💡 조동사 + 수동태\n• can/could/will/may + be + p.p.\n• 예: It can be done. / It could be improved.\n\n⚠️ 함정\n• 조동사 뒤에는 반드시 동사원형 → be improved (O), is improved (X)'}},

{id:19,type:'어휘',diff:'보통',pts:4,fmt:'mc',note:'문장38',
 passage:``,
 stem:'다음 빈칸에 들어갈 가장 적절한 표현을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">She thought that what mattered was not speed but <b>[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]</b> and boredom.</div>',
 ch:['① comfort','② excitement','③ discomfort','④ convenience','⑤ satisfaction'],ans:2,
 det:{ref:'[원문] She thought that what mattered was not speed but discomfort and boredom.\n[해석] 그녀는 중요한 것은 속도가 아니라 불편함과 지루함이라고 생각했다. [문장 38 참고]',
      correct:'discomfort(불편함)이 적절. not A but B(A가 아니라 B) 구조에서 속도가 아닌 불편함과 지루함이 진짜 문제라는 의미.',
      wrongs:['① comfort — 편안함: 문맥상 문제의 원인이 아님','② excitement — 흥분: 문맥상 부적절','③ discomfort ✅ — 불편함: boredom과 함께 불만의 원인','④ convenience — 편리함: 문제가 아닌 긍정적 의미','⑤ satisfaction — 만족: 문맥 정반대'],
      tip:'💡 not A but B 구문\n• A가 아니라 B: B가 진짜 중요한 내용\n• 예: Not speed but discomfort = 속도가 아닌 불편함\n\n💡 접두사 dis-\n• dis- = 반대, 부정\n• comfort ↔ discomfort\n• advantage ↔ disadvantage\n\n⚠️ 함정\n• comfort(편안함)와 discomfort(불편함)는 반의어!'}},

{id:20,type:'어형변화',diff:'보통',pts:3,fmt:'written',note:'문장43',
 passage:`On a survey done after the mirror was installed, passengers commented on how much faster the new elevator was, even though the speed was exactly the ( ___ ). [same]`,
 stem:'위 빈칸에 주어진 단어를 알맞은 형태로 쓰시오. (1단어, 영문 4자, s로 시작)',
 wa:"same",accept:["same","Same"],
 det:{ref:'[원문] On a survey done after the mirror was installed, passengers commented on how much faster the new elevator was, even though the speed was exactly the same.\n[해석] 거울이 설치된 후 실시한 설문에서, 속도는 정확히 같았는데도 승객들은 새 엘리베이터가 훨씬 빠르다고 말했다. [문장 43 참고]',
      correct:'the same: 형용사/대명사로 "같은/동일한" 의미. 형태 변화 없이 same 그대로 사용.',
      wrongs:[],
      tip:'💡 the same\n• the same + 명사: 같은 ~\n• the same as ~: ~와 같은\n• exactly the same: 정확히 같은\n\n⚠️ 함정\n• same은 항상 the와 함께 사용 (a same ❌)'}},

{id:21,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장45',
 passage:``,
 stem:'다음 빈칸에 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">If the employee <b>[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]</b> only of ways to increase the speed of the elevator, it might not have been possible to find a solution.</div>',
 ch:['① thinks','② thought','③ had thought','④ has thought','⑤ would think'],ans:2,
 det:{ref:'[원문] If the employee had thought only of ways to increase the speed of the elevator to resolve the problem, it might not have been possible to find a solution.\n[해석] 만약 그 직원이 문제를 해결하기 위해 엘리베이터의 속도를 높이는 방법만 생각했다면, 해결책을 찾는 것이 불가능했을 것이다. [문장 45 참고]',
      correct:'가정법 과거완료(If + S + had p.p., S + would/could/might + have p.p.) 구조. 과거 사실의 반대를 가정하므로 had thought가 적절.',
      wrongs:['① thinks — 현재형은 가정법 과거완료에 부적절','② thought — 단순 과거는 가정법 과거(현재 반대)','③ had thought ✅ — 가정법 과거완료: 과거 사실 반대','④ has thought — 현재완료는 가정법에 부적절','⑤ would think — 주절 형태이므로 조건절에 부적절'],
      tip:'💡 가정법 과거완료\n• If + S + had p.p., S + would/could/might + have p.p.\n• 과거에 실현되지 않은 일에 대한 가정\n• 주절: might not have been possible\n\n⚠️ 함정\n• 가정법 과거(If+과거형)와 가정법 과거완료(If+had p.p.) 구분!'}},

{id:22,type:'어순배열',diff:'어려움',pts:4,fmt:'mc',note:'문장46',
 passage:``,
 stem:'다음 주어진 단어를 올바른 어순으로 배열한 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">However, by viewing the problem from a different perspective,<br>the employee found the solution by<br><b>[ speeding / the customers\' / up / of / perception / time ]</b>.</div>',
 ch:['① speeding up the customers\' perception of time','② speeding the customers\' up perception of time','③ the customers\' speeding up of perception time','④ speeding up of time the customers\' perception','⑤ up speeding the customers\' perception of time'],ans:0,
 det:{ref:'[원문] However, by viewing the problem from a different perspective, the employee found the solution by speeding up the customers\' perception of time.\n[해석] 그러나 다른 관점에서 문제를 바라봄으로써, 그 직원은 고객의 시간 인식 속도를 높임으로써 해결책을 찾았다. [문장 46 참고]',
      correct:'by speeding up the customers\' perception of time: 「전치사 by + 동명사(speeding up) + 목적어(the customers\' perception of time)」 구조.',
      wrongs:['① speeding up the customers\' perception of time ✅','② 구동사 speed up의 목적어 위치 오류','③ 동명사의 주어-목적어 구조 오류','④ 전치사구 of time의 위치 오류','⑤ 구동사 분리 오류'],
      tip:'💡 구동사(phrasal verb) + 명사 목적어\n• speed up + 명사: 명사가 길면 뒤에 배치\n• speed up the perception (O)\n• speed the perception up (O, 짧은 경우)\n\n⚠️ 함정\n• 목적어가 길면 구동사 사이에 넣지 않는 것이 자연스러움'}},

{id:23,type:'어법',diff:'보통',pts:3,fmt:'mc',note:'문장52',
 passage:``,
 stem:'다음 빈칸에 알맞은 것을 고르시오.<br><div style="background:#f7f7f9;padding:10px 14px;border-radius:8px;margin:8px 0;line-height:1.85;border-left:3px solid #f59e0b;">There was a fast-food company that was concerned about public criticism on negative health effects <b>[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]</b> the high fat content of fast food.</div>',
 ch:['① due to','② because','③ so that','④ in case','⑤ even if'],ans:0,
 det:{ref:'[원문] For example, there was a fast-food company that was concerned about public criticism on negative health effects due to the high fat content of fast food.\n[해석] 예를 들어, 패스트푸드의 높은 지방 함량으로 인한 부정적 건강 영향에 대한 대중의 비판을 우려하는 패스트푸드 회사가 있었다. [문장 52 참고]',
      correct:'due to는 "~때문에"라는 전치사구. 뒤에 명사구(the high fat content)가 오므로 전치사 due to가 적절.',
      wrongs:['① due to ✅ — ~때문에 (전치사구 + 명사)','② because — 접속사이므로 뒤에 절(S+V) 필요','③ so that — ~하기 위해/~하도록: 목적/결과','④ in case — ~의 경우에: 조건','⑤ even if — 비록 ~일지라도: 양보'],
      tip:'💡 because vs due to\n• because + 절(S+V): 접속사\n• due to + 명사/동명사: 전치사구\n• 예: because it rains / due to the rain\n\n⚠️ 함정\n• because of + 명사 = due to + 명사 (동의)'}},

{id:24,type:'서술형',diff:'보통',pts:3,fmt:'written',note:'문장62',
 passage:`This unconventional marketing strategy not only raised awareness about the harmful effects of fast fashion on the environment, but also increased the company's ( ___ ).`,
 stem:'위 빈칸에 들어갈 알맞은 단어를 쓰시오. (1단어, 영문 5자, s로 시작)',
 wa:"sales",accept:["sales","Sales"],
 det:{ref:'[원문] This unconventional marketing strategy not only raised awareness about the harmful effects of fast fashion on the environment, but also increased the company\'s sales.\n[해석] 이 비전통적인 마케팅 전략은 환경에 대한 패스트 패션의 해로운 영향에 대한 인식을 높였을 뿐만 아니라 회사의 판매량도 증가시켰다. [문장 62 참고]',
      correct:'sales(판매량)가 적절. not only A but also B 구조에서 인식 제고(A)뿐 아니라 판매 증가(B)도 달성했다는 의미.',
      wrongs:[],
      tip:'💡 not only A but also B\n• A뿐만 아니라 B도\n• 동사 수 일치: B에 일치\n• 예: Not only the students but also the teacher was present.\n\n⚠️ 함정\n• sale(할인행사) vs sales(판매/매출) 구분!'}},

{id:25,type:'문장삽입',diff:'어려움',pts:4,fmt:'mc',note:'Story2',
 passage:FULL_PASSAGE,
 stem:'다음 주어진 문장이 들어갈 가장 적절한 위치는?\n\n"<i>She asked herself what could be done in this case.</i>"\n\n본문에서 [A]~[E] 위치 중 선택하시오.\n\n[A] Then, one day, one employee began to look at the problem from a different perspective. [B] She thought about it from a passenger\'s point of view. [C] She thought that what mattered was not speed but discomfort and boredom. [D] After many days of searching for a solution, she proposed installing a mirror inside the elevator. [E]',
 ch:['① [A]','② [B]','③ [C]','④ [D]','⑤ [E]'],ans:2,
 det:{ref:'[원문] She asked herself what could be done in this case.\n[해석] 그녀는 이 경우에 무엇을 할 수 있을지 자문했다. [문장 39 참고]',
      correct:'[C]와 [D] 사이가 적절. [C] 앞 문장에서 문제의 본질(불편함과 지루함)을 파악한 후, 자문(what could be done)을 거쳐 [D]에서 해결책(거울 설치)을 제안하는 흐름이 자연스럽다.',
      wrongs:['① [A] — 아직 문제 분석 전이므로 자문하기 이름','② [B] — 승객 관점으로 전환하는 단계이므로 이름','③ [C] ✅ — 문제 파악 후 → 자문 → 해결책 제안의 자연스러운 흐름','④ [D] — 해결책 제안 후에 자문하는 것은 논리적 순서 위배','⑤ [E] — 이미 해결책이 제안된 후이므로 부적절'],
      tip:'💡 문장 삽입 전략\n• 삽입 문장의 지시어/연결사 확인\n• 앞뒤 문장과의 논리적 흐름 확인\n• 대명사의 지시 대상이 앞에 있는지 확인\n\n⚠️ 함정\n• "this case"는 앞 문장의 내용을 받으므로, 문맥 파악 필수'}},

{id:26,type:'주제',diff:'보통',pts:4,fmt:'mc',note:'종합',
 passage:FULL_PASSAGE,
 stem:'윗글의 주제로 가장 적절한 것은?',
 ch:['① the history of modern architecture and elevator technology','② the importance of unconventional thinking in solving problems','③ why companies should always follow traditional marketing strategies','④ the negative effects of routine on personal development','⑤ how to design the best pathways for amusement parks'],ans:1,
 det:{ref:'[원문] 전체 지문 참고\n[해석] 세 가지 이야기 모두 틀에 박히지 않은 사고가 창의적 해결책을 이끌어낸 사례를 보여준다.',
      correct:'② 세 이야기(Gropius의 산책로, 엘리베이터 거울, 역발상 마케팅) 모두 "비전통적/창의적 사고로 문제를 해결한 사례"를 다룬다.',

      tip:'💡 주제 파악 전략\n• 반복되는 핵심어 찾기: unconventional, different perspective, creative\n• 세 이야기의 공통점 찾기\n• 도입부와 결론부의 요지 확인\n\n⚠️ 함정\n• 소재(건축, 엘리베이터)와 주제(창의적 사고)를 혼동하지 말 것!'}},

{id:27,type:'T/F',diff:'보통',pts:4,fmt:'mc',note:'종합',
 passage:FULL_PASSAGE,
 stem:'다음 중 본문의 내용과 일치하지 않는 것은?',
 ch:['① Gropius는 놀이공원의 산책로 디자인에 어려움을 겪었다.','② 프랑스의 노부부는 건강이 좋지 않아 직접 포도를 딸 수 없었다.','③ 엘리베이터 직원은 속도를 높여서 승객 불만을 해결했다.','④ 패스트푸드 회사는 고객에게 너무 자주 먹지 말라고 했다.','⑤ 패션 회사의 역발상 전략은 매출 증가로 이어졌다.'],ans:2,
 det:{ref:'[원문] 문장 06~08, 13, 40~44, 54, 62 참고\n[해석] 각 선지의 근거를 본문에서 확인.',
      correct:'③이 일치하지 않음. 직원은 속도를 높인 것이 아니라, 거울을 설치하여 "시간 인식 속도"를 높였다(speeding up the customers\' perception of time). 실제 속도는 변하지 않았다.',
      wrongs:['① 일치 ✅ — 문장 06~08에서 확인','② 일치 ✅ — 문장 13에서 확인','③ 불일치 ❌ — 속도를 높인 것이 아니라 거울 설치','④ 일치 ✅ — 문장 54에서 확인','⑤ 일치 ✅ — 문장 62에서 확인'],
      tip:'💡 T/F 문제 전략\n• 각 선지를 본문 문장과 하나씩 대조\n• "속도를 높였다" vs "시간 인식을 높였다" 같은 미세한 차이 주의\n\n⚠️ 함정\n• 본문의 표현을 살짝 바꿔 함정을 만드는 경우가 많음!'}},

{id:28,type:'요약',diff:'어려움',pts:3,fmt:'written',note:'종합',
 passage:FULL_PASSAGE,
 stem:'윗글을 다음과 같이 요약할 때 빈칸에 들어갈 알맞은 단어를 쓰시오.\n\n"When facing difficult problems, thinking from a different (  ___  ) can lead to creative solutions."\n\n(1단어, 영문 11자, p로 시작)',
 wa:"perspective",accept:["perspective","Perspective"],
 det:{ref:'[원문] try thinking about it from a different angle / by viewing the problem from a different perspective\n[해석] 다른 관점에서 생각해 보라 / 다른 관점에서 문제를 바라봄으로써 [문장 02, 46, 49 참고]',
      correct:'perspective(관점)가 적절. 지문 전체의 핵심 메시지는 "다른 관점(perspective/angle)에서 바라보면 창의적 해결책을 찾을 수 있다"이다.',
      wrongs:[],
      tip:'💡 핵심 어휘\n• perspective = viewpoint = angle = point of view (관점)\n• 지문에서 가장 많이 반복되는 핵심 개념\n\n⚠️ 함정\n• angle과 perspective 모두 "관점"이지만 철자 혼동 주의'}},

      correct:'② 추론 불가. 본문에 의하면 거울 설치 후 승객들이 "빨라졌다고 느꼈을 뿐" 실제 속도는 정확히 같았다(the speed was exactly the same).',

      tip:'💡 추론 문제 전략\n• "추론할 수 없는" = 본문에 근거 없거나 본문과 반대\n• 각 선지의 근거를 본문에서 찾기\n\n⚠️ 함정\n• "느꼈다"와 "실제로 그렇다"를 구분!'}},

 passage:FULL_PASSAGE,

      correct:'unconventional(비전통적인)이 적절. 지문의 제목이자 핵심 주제어.',

];

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){const p=s;if(p>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(p>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(p>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(p>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(p>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}

function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}

function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="영어로 입력 (대소문자 무관, 띄어쓰기 주의)" oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}

function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{

function copyDetailedResult(){const nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);let txt=`━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🎯 내신핏 온라인퀴즈 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} ${EI.pub} ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n\n📊 점수: ${r.score}/100 (${r.score}%)\n✅ 정답 ${r.correct}/${QCOUNT} | ❌ 오답 ${r.wrong} | ⬜ 미응답 ${r.unanswered}\n🏅 레벨: ${lv.icon} ${lv.name}\n${r.score>=80?'🎉 통과!':'📚 미통과'}\n\n━━ 문항별 결과 ━━\n`;r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const at=d.q.fmt==='mc'?(d.ans!==null?(d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]):'미응답'):(d.ans||'미응답');const ct=d.q.fmt==='mc'?(d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]):d.q.wa;txt+=`${mk} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점 — 내답:${at} | 정답:${ct}\n`;});const tm={};r.details.forEach(d=>{const t=d.q.type;if(!tm[t])tm[t]={t:0,o:0};tm[t].t++;if(d.ok)tm[t].o++;});txt+=`\n━━ 유형별 ━━\n`;Object.entries(tm).forEach(([t,v])=>txt+=`${t}: ${v.o}/${v.t} (${Math.round(v.o/v.t*100)}%)\n`);txt+=`\n━━ 보완 피드백 ━━\n`;fb.forEach(f=>txt+=`${f}\n`);txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>toast('📄 상세 결과 복사 완료!')).catch(()=>toast('복사 실패'));}
function saveResultImage(){const nm=document.getElementById('inpName').value.trim(),r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);const W=800,pad=40;const lines=[{t:'🎯 내신핏 온라인퀴즈 상세 결과',s:22,b:1,c:'#E8772E'},{t:''},{t:`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}`,s:14,c:'#555'},{t:`👤 ${nm} · ${new Date().toLocaleDateString('ko-KR')}`,s:14,c:'#555'},{t:''},{t:`📊 점수: ${r.score}/100`,s:20,b:1},{t:`✅${r.correct}/${QCOUNT} ❌${r.wrong} ⬜${r.unanswered}`,s:14,c:'#555'},{t:`🏅 ${lv.icon} ${lv.name} ${r.score>=80?'🎉 통과':'📚 미통과'}`,s:16,b:1,c:r.score>=80?'#1A9960':'#D63B3B'},{t:''}];r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const ct=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;lines.push({t:`${mk} ${d.q.id}번[${d.q.type}]${d.q.pts}점 정답:${ct}`,s:12,c:d.ok?'#1A9960':'#D63B3B'});});lines.push({t:''});fb.forEach(f=>lines.push({t:f,s:11,c:'#444'}));lines.push({t:''},{t:'내신핏 · 온라인퀴즈 TEST',s:10,c:'#bbb'});let H=pad*2;lines.forEach(l=>{H+=(l.s||14)+10;});const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;const ctx=canvas.getContext('2d');ctx.scale(2,2);ctx.fillStyle='#FFF';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E8772E';ctx.fillRect(0,0,W,4);let y=pad+10;lines.forEach(l=>{const fs=l.s||14;ctx.font=`${l.b?'800':'500'} ${fs}px sans-serif`;ctx.fillStyle=l.c||'#222';if(l.t)ctx.fillText(l.t,pad,y);y+=fs+10;});ctx.fillStyle='#E8772E';ctx.fillRect(0,H-4,W,4);canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`퀴즈결과_${nm}_${new Date().toISOString().slice(0,10)}.png`;a.click();toast('🖼️ 이미지 저장 완료!');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
