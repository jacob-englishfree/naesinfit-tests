<style>

.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(232,119,46,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #ebe7e3;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F8F5F0;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}
</style>

<script>
const EI={"subject":"영어1","pub":"능률(오선영)","lesson":"4과","title":"Seeing the Extraordinary in the Ordinary","total":100,"time":1200,"histKey":"quizH_능률오선영_4과_20","qCount":20};

const Q=[
{id:1,type:'어법',diff:'보통',pts:5,fmt:'mc',note:'Arcimboldo 초상화',
passage:`Look at these two paintings. Believe it or not, they both <u>ⓐ depict</u> the same person, Holy Roman Emperor Rudolf II. Created by a 16th-century Italian painter <u>ⓑ named</u> Giuseppe Arcimboldo, the painting shows striking creativity and originality. Fruits, flowers, and vegetables <u>ⓒ are arranged</u> like the pieces of a puzzle to create a human head. He used plants, animals, and other objects to create many other portraits <u>ⓓ like</u> this. Another good example of Arcimboldo's unique creativity can <u>ⓔ find</u> in <i>The Gardener</i>, one of his "reversible" paintings.`,
stem:'다음 글의 밑줄 친 ⓐ~ⓔ 중에서 어법상 어색한 것은?',
ch:['ⓐ','ⓑ','ⓒ','ⓓ','ⓔ'],ans:4,
det:{ref:`[원문] Another good example can find in The Gardener. [해석] 또 다른 좋은 예는 The Gardener에서 찾을 수 있다. 주어 example이 발견되는 것이므로 수동태 can be found가 되어야 한다.`,
correct:`ⓐ depict: 주어 they(복수) → 복수동사 depict ✅<br>ⓑ named: a painter를 수식하는 과거분사 ✅<br>ⓒ are arranged: 복수 주어+수동태 ✅<br>ⓓ like: 전치사(~와 같은)+this ✅<br>ⓔ find: 주어가 발견되는 대상이므로 can be found 필요 ❌`,wrongs:[],
tip:`🔑 조동사+be+p.p.(수동태): can be found, should be done. find(능동) vs be found(수동): 주어가 동작의 대상이면 수동태.`}},

{id:2,type:'어법',diff:'어려움',pts:6,fmt:'mc',note:'뒤집기 그림 제작',
passage:`Their research showed that he first painted them as still life paintings and then turned them upside down and made some adjustments (A) <u>to create / creating</u> faces. Why did he make his paintings (B) <u>reversible / reversibly</u>? It was probably because he wanted to add an interactive element to his work by (C) <u>doing / done</u> so.`,
stem:'다음 글의 (A), (B), (C)에서 어법에 맞는 표현으로 가장 적절한 것은?',
ch:['(A) to create – (B) reversible – (C) doing','(A) creating – (B) reversible – (C) doing','(A) to create – (B) reversibly – (C) done','(A) creating – (B) reversibly – (C) doing','(A) to create – (B) reversible – (C) done'],ans:0,
det:{ref:`[원문] adjustments to create faces / make paintings reversible / by doing so [해석] (A) 목적의 to부정사. (B) make+O+형용사(OC). (C) 전치사 by+동명사.`,
correct:`① to create–reversible–doing: 모두 적절 ✅<br>② creating: 가능하나 목적의 to create가 더 적절 ❌<br>③ reversibly: 부사는 OC 불가 ❌<br>④ (A),(B) 부적절 ❌<br>⑤ done: by+p.p. 부적절 ❌`,wrongs:[],
tip:`🔑 make+O+형용사(OC): make paintings reversible. by+v-ing: by doing so. 목적의 to부정사: to create.`}},

{id:3,type:'어법',diff:'어려움',pts:6,fmt:'mc',note:'Stentzel의 관찰력',
passage:`Stentzel says <u>ⓐ that</u> it is her active observation skills that allow her to make magic out of the ordinary. As a child, she would spend time <u>ⓑ staring</u> at the patterns in the wood of her bed, trying to find different animal shapes. She admits that even today she stares at things <u>ⓒ long</u> than is acceptable in society. This keen observation is <u>ⓓ what</u> enables her to continuously produce creative and imaginative works of art.`,
stem:'다음 글의 밑줄 친 ⓐ~ⓓ 중에서 어법상 어색한 것은?',
ch:['ⓐ','ⓑ','ⓒ','ⓓ'],ans:2,
det:{ref:`[원문] she stares at things longer than is acceptable [해석] 사회에서 용인되는 것보다 더 오래 응시한다. than이 뒤따르므로 비교급 longer 필요.`,
correct:`ⓐ that: says의 목적어절 접속사 ✅<br>ⓑ staring: spend time+v-ing ✅<br>ⓒ long: 뒤에 than → 비교급 longer 필요 ❌<br>ⓓ what: 선행사 포함 관계대명사 ✅`,wrongs:[],
tip:`🔑 비교급+than: longer than. spend+시간+v-ing. what=the thing that(선행사 포함 관계대명사).`}},

{id:4,type:'어휘',diff:'보통',pts:5,fmt:'mc',note:'The Gardener 특성',
passage:`When viewed normally, it is just an (A) <u>ordinary / extraordinary</u> still life of vegetables in a bowl. However, when flipped upside down, it is magically transformed into a smiling face! Why did he make his paintings reversible? It was probably because he wanted to add an (B) <u>interactive / passive</u> element to his work. Viewers feel as if they are playing a visual game, which brings them a sense of (C) <u>pleasure / anxiety</u>.`,
stem:'다음 글의 (A), (B), (C)에서 문맥에 맞는 낱말로 가장 적절한 것은?',
ch:['(A) ordinary – (B) interactive – (C) pleasure','(A) extraordinary – (B) interactive – (C) pleasure','(A) ordinary – (B) passive – (C) pleasure','(A) ordinary – (B) interactive – (C) anxiety','(A) extraordinary – (B) passive – (C) anxiety'],ans:0,
det:{ref:`[원문] just an ordinary still life / interactive element / sense of pleasure [해석] (A) 평범한 정물화. (B) 쌍방향 요소. (C) 즐거움.`,
correct:`① ordinary–interactive–pleasure: 모든 문맥 적합 ✅<br>② extraordinary: 평범하게 보면 비범한은 모순 ❌<br>③ passive: interactive 반대 ❌<br>④ anxiety: 즐거움이지 불안 아님 ❌<br>⑤ 전체 부적합 ❌`,wrongs:[],
tip:`🔑 ordinary(평범한) ↔ extraordinary(비범한). interactive(쌍방향) ↔ passive(수동적). pleasure(즐거움) ↔ anxiety(불안).`}},

{id:5,type:'어휘',diff:'어려움',pts:6,fmt:'mc',note:'Clothesline Animals',
passage:`Using everyday items, she creates playful visual ① <u>illusions</u> that force you to look twice. Her unique style has been called "household surrealism." She got ② <u>inspiration</u> for the series while she was hanging her laundry. By simply adding some colorful clothespins and a dish towel, she was able to ③ <u>transform</u> her black sweatshirt and dark grey pants into a horse. Other creations followed, including a brown cow standing on some hills and a zebra ④ <u>crossing</u> the desert. All of these works were created from nothing more than laundry and ⑤ <u>industrial</u> items.`,
stem:'다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 적절하지 않은 것은?',
ch:['①','②','③','④','⑤'],ans:4,
det:{ref:`[원문] laundry and household items [해석] 빨래와 가정용 물건. 원문 household가 ⑤ industrial로 바뀜.`,
correct:`① illusions: 시각적 착시 ✅<br>② inspiration: 영감 ✅<br>③ transform: 변환하다 ✅<br>④ crossing: 건너는 ✅<br>⑤ industrial: 원문 household → industrial ❌`,wrongs:[],
tip:`🔑 household(가정의) ↔ industrial(산업의). nothing more than: ~에 불과한.`}},

{id:6,type:'어휘',diff:'보통',pts:5,fmt:'mc',note:'Arcimboldo의 접근법',
passage:`Everyone has the ability to be creative. Some artists ① <u>spark</u> their creativity by looking closely at ordinary objects. They try to ② <u>discover</u> the beauty hidden within these common objects. The painting shows striking creativity and ③ <u>originality</u>. His ④ <u>conventional</u> approach to art inspired many great artists who came after him. Each of Arcimboldo's works is a careful study of ⑤ <u>everyday</u> objects.`,
stem:'다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 적절하지 않은 것은?',
ch:['①','②','③','④','⑤'],ans:3,
det:{ref:`[원문] His innovative approach to art [해석] 그의 혁신적인 접근법. 원문 innovative가 ④ conventional로 바뀜.`,
correct:`① spark: 촉발하다 ✅<br>② discover: 발견하다 ✅<br>③ originality: 독창성 ✅<br>④ conventional: 원문 innovative → conventional ❌<br>⑤ everyday: 일상의 ✅`,wrongs:[],
tip:`🔑 innovative(혁신적인) ↔ conventional(전통적인). 유의어: innovative ≈ creative, original, groundbreaking.`}},

{id:7,type:'대의',diff:'보통',pts:5,fmt:'mc',note:'글의 주제',
passage:`Creativity. When you hear this word, what instantly pops into your mind? You may think it is a quality that only artists and writers possess — some special talent you are either born with or without. Many people accept the idea that we can be divided into two groups: those who are creative and those who are not. This common belief, however, is far from the truth. Everyone has the ability to be creative. Finding creativity inside yourself just takes a little effort.`,
stem:'다음 글의 주제로 가장 적절한 것은?',
ch:['the difference between artists and ordinary people','why only talented people can be creative','the belief that everyone has creative ability','the history of creative art movements','how ordinary objects are made in factories'],ans:2,
det:{ref:`[원문] Everyone has the ability to be creative. [해석] 모든 사람은 창의적일 능력이 있다.`,
correct:`① 차이 강조가 아님 ❌<br>② 주장과 정반대 ❌<br>③ 핵심과 일치 ✅<br>④ 언급 없음 ❌<br>⑤ 다른 주제 ❌`,wrongs:[],
tip:`🔑 핵심 문장: Everyone has the ability to be creative. far from the truth: 사실과 거리가 먼.`}},

{id:8,type:'대의',diff:'보통',pts:5,fmt:'mc',note:'글의 제목',
passage:`Each of Arcimboldo's works is a careful study of everyday objects. When he looked at typical objects, such as a bowl of vegetables, he saw the artistic and imaginative potential in them. His innovative approach to art inspired many great artists. Stentzel says that it is her active observation skills that allow her to make magic out of the ordinary. This keen observation is what enables her to continuously produce creative and imaginative works of art.`,
stem:'다음 글의 제목으로 가장 적절한 것은?',
ch:['The Decline of Modern Art','Making Magic: Finding Art in Everyday Objects','Why Technology Replaced Traditional Art','The Life and Death of Giuseppe Arcimboldo','Industrial Design: The Future of Creativity'],ans:1,
det:{ref:`[원문] make magic out of the ordinary / artistic and imaginative potential [해석] 평범한 것에서 마법을 만들고 예술적 잠재력을 본다.`,
correct:`① 쇠퇴가 아님 ❌<br>② 일상에서 예술 찾기 ✅<br>③ 기술 대체 없음 ❌<br>④ 전기가 아님 ❌<br>⑤ 산업 디자인 없음 ❌`,wrongs:[],
tip:`🔑 핵심어: everyday objects, magic, ordinary, creative. make magic out of the ordinary.`}},

{id:9,type:'대의',diff:'어려움',pts:6,fmt:'mc',note:'시사점',
passage:`Everyone has the ability to be creative. Finding creativity inside yourself just takes a little effort. Some artists spark their creativity by looking closely at ordinary objects. Stentzel says that it is her active observation skills that allow her to make magic out of the ordinary. As a child, she would spend time staring at the patterns in the wood of her bed. This keen observation is what enables her to continuously produce creative and imaginative works of art.`,
stem:'다음 글의 내용을 통해 얻을 수 있는 시사점으로 가장 적절한 것은?',
ch:['Creativity requires expensive materials and advanced technology.','Only professional artists can find beauty in ordinary things.','Careful observation of everyday things can be a source of creativity.','Children are more creative than adults in all circumstances.','Art education should focus only on traditional painting techniques.'],ans:2,
det:{ref:`[원문] active observation skills that allow her to make magic [해석] 적극적 관찰이 마법을 만든다. 일상 관찰이 창의성의 원천.`,
correct:`① 비싼 재료 → 일상 물건으로 가능 ❌<br>② 전문가만 → 모든 사람 가능 ❌<br>③ 일상 관찰이 창의성 원천 ✅<br>④ 어린이가 항상 → 과도한 일반화 ❌<br>⑤ 전통에만 집중 → 혁신 강조 ❌`,wrongs:[],
tip:`🔑 강조구문 It is ~ that. keen observation ≈ active observation. only, all, always 주의.`}},

{id:10,type:'일치',diff:'쉬움',pts:3,fmt:'mc',note:'Arcimboldo 정보',
passage:`Look at these two paintings. They both depict the same person, Holy Roman Emperor Rudolf II. The one on the left might look familiar, as it is a standard style of portrait. However, the one on the right, called <i>Vertumnus</i>, is very unconventional. Created by a 16th-century Italian painter named Giuseppe Arcimboldo, the painting shows striking creativity. Fruits, flowers, and vegetables are arranged like the pieces of a puzzle to create a human head.`,
stem:'Giuseppe Arcimboldo에 관한 다음 글의 내용과 일치하는 것은?',
ch:['Arcimboldo was a 17th-century French painter.','Vertumnus depicts Holy Roman Emperor Rudolf II.','The painting on the left is called Vertumnus.','Arcimboldo used only flowers in his portraits.','The standard portrait is on the right side.'],ans:1,
det:{ref:`[원문] the one on the right, called Vertumnus ... depict Holy Roman Emperor Rudolf II [해석] 오른쪽 그림 Vertumnus는 Rudolf II를 묘사.`,
correct:`① 17세기 프랑스 → 16세기 이탈리아 ❌<br>② Vertumnus는 Rudolf II 묘사 ✅<br>③ 왼쪽이 Vertumnus → 오른쪽 ❌<br>④ 꽃만 → fruits, flowers, vegetables ❌<br>⑤ 표준 초상화 오른쪽 → 왼쪽 ❌`,wrongs:[],
tip:`🔑 세부 정보 대조: 16th vs 17th, Italian vs French, right vs left.`}},

{id:11,type:'불일치',diff:'보통',pts:5,fmt:'mc',note:'Stentzel 정보',
passage:`Using everyday items, she creates playful visual illusions. Her unique style has been called "household surrealism." Stentzel is perhaps best known for her <i>Clothesline Animals</i> series. She got inspiration for the series while she was hanging her laundry. By simply adding some colorful clothespins and a dish towel, she was able to transform her black sweatshirt and dark grey pants into a horse. Another series is <i>Edible Creatures</i>. For this series, she arranges food items you can find in any kitchen to create cute animals.`,
stem:'Helga Stentzel에 관한 다음 글의 내용과 일치하지 않는 것은?',
ch:['Her style is called "household surrealism."','She is best known for the Clothesline Animals series.','She got inspiration while cooking dinner for her family.','She transformed a sweatshirt and pants into a horse.','The Edible Creatures series uses food items from the kitchen.'],ans:2,
det:{ref:`[원문] She got inspiration while she was hanging her laundry. [해석] 빨래를 널다가 영감. ③은 저녁 요리 중이라고 했는데 본문과 다름.`,
correct:`① household surrealism ✅<br>② Clothesline Animals로 유명 ✅<br>③ 저녁 요리 중 → 빨래 널다가 ❌ (불일치)<br>④ 스웨트셔츠+바지→말 ✅<br>⑤ Edible Creatures 주방 음식 ✅`,wrongs:[],
tip:`🔑 시리즈별 영감 구분: Clothesline Animals = hanging laundry. Crunchie = putting together a salad.`}},

{id:12,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',note:'빈칸(구)',
passage:`Stentzel says that it is her active observation skills that allow her to make magic out of the ordinary. As a child, she would spend time staring at the patterns in the wood of her bed, trying to find different animal shapes. She admits that even today she stares at things longer than is acceptable in society. This <u>__________</u> is what enables her to continuously produce creative and imaginative works of art.`,
stem:'다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?',
ch:['financial investment','formal training','keen observation','social networking','digital technology'],ans:2,
det:{ref:`[원문] This keen observation is what enables her [해석] 이 예리한 관찰이 가능하게 한다.`,
correct:`① 관찰과 무관 ❌<br>② 교육 아닌 관찰 ❌<br>③ staring, observation skills와 직결 ✅<br>④ 무관 ❌<br>⑤ 아날로그적 관찰 ❌`,wrongs:[],
tip:`🔑 앞 문맥 단서: active observation skills → staring → stares longer → keen observation. keen ≈ sharp, acute.`}},

{id:13,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',note:'빈칸(문장)',
passage:`Many people accept the idea that we can be divided into two groups: those who are creative and those who are not. This common belief, however, is far from the truth. Everyone has the ability to be creative. Finding creativity inside yourself just takes a little effort. Some artists, for example, spark their creativity by <u>__________</u>. They try to discover the beauty hidden within these common objects and then turn them into works of art.`,
stem:'다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?',
ch:['studying at expensive art schools','looking closely at ordinary objects','copying the works of famous painters','using only advanced digital tools','traveling to exotic countries for inspiration'],ans:1,
det:{ref:`[원문] spark their creativity by looking closely at ordinary objects [해석] 평범한 사물을 자세히 관찰. these common objects가 핵심 단서.`,
correct:`① 언급 없음 ❌<br>② these common objects와 연결 ✅<br>③ 독창적 발견이지 모방 아님 ❌<br>④ 언급 없음 ❌<br>⑤ 언급 없음 ❌`,wrongs:[],
tip:`🔑 these common objects가 결정적 단서. these는 앞에서 언급된 ordinary objects를 가리킴.`}},

{id:14,type:'함축',diff:'보통',pts:5,fmt:'mc',note:'composite portraits',
passage:`Fruits, flowers, and vegetables are arranged like the pieces of a puzzle to create a human head. A cherry and a mulberry become the dark eyes, while an apple and a peach act as the pink cheeks. This painting is representative of the artist's signature style of <u>"composite portraits."</u> He used plants, animals, and other objects to create many other portraits like this.`,
stem:'다음 글의 밑줄 친 "composite portraits"가 의미하는 바로 가장 적절한 것은?',
ch:['portraits painted on multiple canvases','portraits made by combining various natural objects','traditional portraits using only oil paints','abstract paintings with no recognizable shapes','photographs enhanced with digital effects'],ans:1,
det:{ref:`[원문] Fruits, flowers, and vegetables are arranged like pieces of a puzzle [해석] 과일·꽃·채소가 퍼즐처럼 배열. composite portraits = 자연 사물 조합 초상화.`,
correct:`① 여러 캔버스 → 사물 조합 ❌<br>② 자연 사물 조합 초상화 ✅<br>③ 유화만 전통 → unconventional ❌<br>④ 형태 없는 추상화 → 얼굴 인식됨 ❌<br>⑤ 디지털 사진 → 16세기 ❌`,wrongs:[],
tip:`🔑 composite(합성의): com-(함께)+posite(놓다). 문맥 단서: arranged like pieces of a puzzle. signature style: 특유의 화풍.`}},

{id:15,type:'순서',diff:'보통',pts:5,fmt:'mc',note:'Clothesline Animals 순서',
passage:`<b>Stentzel is perhaps best known for her <i>Clothesline Animals</i> series.</b><br><br>(A) Other creations followed, including a brown cow standing on some hills and a zebra crossing the desert. All of these works were created from nothing more than laundry and household items.<br><br>(B) She got inspiration for the series while she was hanging her laundry. By simply adding some colorful clothespins and a dish towel, she was able to transform her black sweatshirt and dark grey pants into a horse.<br><br>(C) Another series that highlights Stentzel's astonishing creativity is <i>Edible Creatures</i>. For this series, she arranges food items you can find in any kitchen to create cute animals.`,
stem:'주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?',
ch:['(A)-(B)-(C)','(A)-(C)-(B)','(B)-(A)-(C)','(B)-(C)-(A)','(C)-(A)-(B)'],ans:2,
det:{ref:`[해석] 주어진 문장(유명) → (B) 빨래 영감, 말 → (A) 후속작(소, 얼룩말) → (C) 새 시리즈 Edible Creatures.`,
correct:`① Other가 먼저 불가 ❌<br>② 마찬가지 ❌<br>③ 영감→후속작→새 시리즈 ✅<br>④ these works 연결 어색 ❌<br>⑤ Another가 먼저 불가 ❌`,wrongs:[],
tip:`🔑 Other/Another가 핵심 단서. (B) 시작 → (A) 추가 → (C) 새 주제 전환.`}},

{id:16,type:'무관',diff:'쉬움',pts:3,fmt:'mc',note:'무관문장',
passage:`Another good example of Arcimboldo's unique creativity can be found in <i>The Gardener</i>, one of his "reversible" paintings. ① When viewed normally, it is just an ordinary still life of vegetables in a bowl. ② However, when flipped upside down, it is magically transformed into a smiling face! ③ The Italian economy experienced significant growth during the Renaissance period. ④ Their research showed that he first painted them as still life paintings and then turned them upside down. ⑤ X-ray examination revealed that he sometimes changed the positions of some of the fruits and vegetables.`,
stem:'다음 글에서 전체 흐름과 관계 없는 문장은?',
ch:['①','②','③','④','⑤'],ans:2,
det:{ref:`[해석] ③ 르네상스 이탈리아 경제 성장은 예술 작품 분석과 무관.`,
correct:`① 야채 정물화 ✅<br>② 뒤집으면 웃는 얼굴 ✅<br>③ 이탈리아 경제 → 무관 ❌<br>④ 정물화 그리고 뒤집음 ✅<br>⑤ X선으로 위치 변경 확인 ✅`,wrongs:[],
tip:`🔑 글 주제: The Gardener의 뒤집기 효과. Italian economy/Renaissance는 다른 주제.`}},

{id:17,type:'TF',diff:'쉬움',pts:3,fmt:'mc',note:'Crunchie TF',
passage:`The stars of the series are Brad Pet and Crunchie, a pair of puppies made of sliced bread and lettuce respectively. Stentzel says she came up with the concept of Crunchie while putting together a salad for her family.`,

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;

h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;

r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
