<!DOCTYPE html>

<head>

<title>공통영어1 동아(이병민) 3과 온라인단어TEST</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--g:#16A34A;--gd:#14532D;--gl:#E8F5E9;--gxl:#F0FDF4;--gxxl:#F8FDF9;--bg:#F4F8F5;--text:#1A1A2E;--tm:#5A6A5E;--tl:#8A9A8E;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--o:#F59E0B;--ol:#FFF8E1;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s ease;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#startScreen{align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#F0FDF4,#E8F5E9 40%,#DCFCE7);}
.start-container{max-width:460px;width:100%;z-index:1;}
.brand-badge{display:inline-block;background:linear-gradient(135deg,var(--g),#0D9488);color:#fff;font-size:12px;font-weight:800;padding:7px 16px;border-radius:24px;margin-bottom:20px;}
.start-title{font-size:36px;font-weight:900;margin-bottom:4px;}.start-title span{background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.start-subtitle{font-size:14px;color:var(--tm);margin-bottom:30px;}
.info-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
.info-card-header{background:linear-gradient(135deg,var(--g),#0D9488);padding:14px 20px;color:#fff;font-size:13px;font-weight:700;}
.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #f0f5f1;}.info-row:last-child{border:none;}
.info-label{color:var(--tm);}.info-value{font-weight:700;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}
.chip{background:var(--card);border:1.5px solid #dde8df;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:600;color:var(--tm);}
.input-group{margin-bottom:14px;}.input-group label{display:block;font-size:12px;font-weight:700;color:var(--tm);margin-bottom:6px;}
.input-group input,.input-group select{width:100%;padding:13px 16px;border:2px solid #d0dcd2;border-radius:var(--rs);font-size:15px;font-family:inherit;background:#fff;transition:var(--tr);}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 4px rgba(22,163,74,.1);}
.input-row{display:flex;gap:10px;}
.btn{padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--tr);width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;box-shadow:0 6px 20px rgba(22,163,74,.3);margin-top:12px;}.btn-primary:hover{transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid #c8d8ca;color:var(--tm);margin-top:8px;font-size:14px;padding:12px;}.btn-outline:hover{border-color:var(--g);color:var(--g);}
.history-badge{background:var(--gxl);color:var(--g);font-weight:800;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;}
#historyPanel{display:none;margin-top:14px;}
.history-item{background:var(--card);border:1.5px solid #dde8df;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.hi-left .hi-name{font-weight:700;font-size:13px;}.hi-left .hi-meta{font-size:11px;color:var(--tl);}
.hi-right .hi-score{font-size:20px;font-weight:900;color:var(--g);}.hi-right .hi-level{font-size:10px;color:var(--tm);text-align:right;}
.exam-topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:10px;}.topbar-dot{width:8px;height:8px;background:var(--g);border-radius:50%;}
.topbar-info{font-size:13px;color:var(--tm);font-weight:600;}.topbar-info span{color:var(--g);font-weight:800;}
.timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;}.timer.warn{color:var(--o);}.timer.danger{color:var(--r);animation:pulse .6s infinite;}
@keyframes pulse{50%{opacity:.3;}}
.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;}
.q-header{display:flex;align-items:center;gap:10px;padding:16px 22px;background:linear-gradient(135deg,#F0FDF4,#E8F5E9);border-bottom:1px solid #e0ece2;flex-wrap:wrap;}
.q-num{width:36px;height:36px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;}
.q-type-tag{font-size:11px;font-weight:800;padding:4px 12px;border-radius:14px;}
.tag-combo{background:var(--gl);color:#166534;}.tag-wrong{background:var(--rl);color:var(--r);}.tag-blank{background:#E0F7FA;color:#00838F;}.tag-syn{background:var(--bl);color:var(--b);}.tag-ant{background:var(--ol);color:#B45309;}.tag-poly{background:#FCE4EC;color:#C2185B;}.tag-eng{background:#E8F6FF;color:#0277BD;}.tag-morph{background:#FFF3E0;color:#E65100;}.tag-ctx{background:#EDE7F6;color:#5E35B1;}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#f0f5f1;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--g);font-weight:800;}
.q-body{padding:22px;}
.q-passage{background:linear-gradient(135deg,#FAFDFB,#F5FAF6);border-left:4px solid var(--g);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-stem{font-size:14px;font-weight:700;margin-bottom:16px;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #dde8df;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;}
.choice-btn:hover{border-color:var(--g);}.choice-btn.selected{border-color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,.12);background:var(--gxxl);}
.c-num{min-width:26px;height:26px;background:#e8efe9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;}.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #d0dcd2;border-radius:var(--rs);font-size:15px;font-family:inherit;}.written-input:focus{outline:none;border-color:var(--g);}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 16px;display:flex;align-items:center;gap:5px;justify-content:center;z-index:100;overflow-x:auto;flex-wrap:wrap;}
.nav-dot{width:28px;height:28px;border-radius:50%;background:#dde8df;cursor:pointer;border:none;font-size:10px;font-weight:800;color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;}.nav-dot.answered{background:var(--g);color:#fff;}
.r-hero{padding:48px 20px 36px;text-align:center;}.r-hero.pass{background:linear-gradient(160deg,#E8F5E9,#C8E6C9);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;}.r-score sup{font-size:24px;color:var(--tl);}
.r-stats{display:flex;justify-content:center;gap:14px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.level-range{font-size:13px;color:var(--tm);margin-top:4px;}
.level-bar{margin-top:16px;height:8px;background:#e8efe9;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),#4ADE80);transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:#FAFDFB;border-radius:var(--rs);border:1px solid #dde8df;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:var(--gxl);}.info-cell.highlight .ic-value{color:var(--g);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:60px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#e8efe9;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;padding:16px;background:var(--gxl);border-radius:var(--rs);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #d0dcd2;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--g);color:var(--g);}.act-btn.primary{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.rev-card{border:1.5px solid #dde8df;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:#FAFDFB;display:flex;align-items:center;gap:12px;cursor:pointer;}.rev-header:hover{background:#F0F8F1;}.rev-icon{font-size:18px;margin-left:auto;transition:transform .2s;}.rev-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 18px;}.rev-body.open{max-height:3000px;padding:20px 18px;}
.expl-tag{display:inline-flex;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.tip{background:var(--gxl);color:var(--gd);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);margin-bottom:10px;}.expl-box.ans-b{border-left:3px solid var(--g);}.expl-box.tip-b{border-left:3px solid var(--g);background:var(--gxl);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}}
</style>

<body>
<div class="toast" id="toast"></div>
<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">📝 온라인단어 TEST</div>
  <h1 class="start-title">온라인단어 <span>TEST</span></h1>
  <p class="start-subtitle">능률(오선영) 4과 · Seeing the Extraordinary in the Ordinary · 20문항</p>
  <div class="info-card"><div class="info-card-header">📚 시험 정보</div><div class="info-rows">
    <div class="info-row"><span class="info-label">과목</span><span class="info-value">공통영어1</span></div>
    <div class="info-row"><span class="info-label">출판사</span><span class="info-value">동아(이병민)</span></div>
    <div class="info-row"><span class="info-label">단원</span><span class="info-value">4과 Seeing the Extraordinary in the Ordinary</span></div>
  </div></div>
  <div class="chip-row"><div class="chip">📝 20문항</div><div class="chip">⏱️ 20분</div><div class="chip">✅ 80점 이상 통과</div><div class="chip">📊 100점 만점</div></div>
  <div class="input-group"><label>이름 *</label><input type="text" id="inpName" placeholder="이름을 입력하세요"></div>
  <div class="input-row">
    <div class="input-group" style="flex:1"><label>학교</label><input type="text" id="inpSchool" placeholder="선택"></div>
    <div class="input-group" style="flex:.6"><label>학년</label><select id="inpGrade"><option>고1</option><option>고2</option><option>고3</option><option>중3</option></select></div>
  </div>
  <button class="btn btn-primary" onclick="startExam()">시험 시작하기 →</button>

</div>

  <div class="exam-topbar"><div class="topbar-left"><div class="topbar-dot"></div><div class="topbar-info">영어1 · 능률(오선영) · <span>4과</span></div></div><div class="timer" id="timer">20:00</div><button class="btn-submit" onclick="submitExam()">제출하기</button></div>

<div id="resultScreen" class="screen"></div>
<script>
const EI={"subject":"영어1","pub":"능률(오선영)","lesson":"4과","title":"Seeing the Extraordinary in the Ordinary","total":100,"time":1200,"totalQ":20,"histKey":"wordTest_nle_4"};

const Q=[
{id:1,type:`(A)(B)(C) 조합형`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`(A) spark – (B) discover – (C) turn`,`(A) suppress – (B) discover – (C) prevent`,`(A) spark – (B) conceal – (C) turn`,`(A) suppress – (B) conceal – (C) turn`,`(A) spark – (B) discover – (C) prevent`],passage:`Everyone has the ability to be creative. Finding creativity inside yourself just takes a little effort. Some artists, for example, (A)[<b>spark / suppress</b>] their creativity by looking closely at ordinary objects. They try to (B)[<b>discover / conceal</b>] the beauty hidden within these common objects and then (C)[<b>turn / prevent</b>] them into works of art.`,stem:`다음 글의 (A), (B), (C)의 각 괄호 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`모든 사람은 창의적이 될 수 있는 능력을 가지고 있다. 자신 안에서 창의성을 찾는 것은 약간의 노력만 필요하다. 예를 들어, 일부 예술가들은 평범한 사물을 면밀히 관찰함으로써 창의성에 <b>불을 붙인다</b>. 그들은 이러한 흔한 사물 안에 숨겨진 아름다움을 <b>발견</b>하고, 그것들을 예술 작품으로 <b>변환</b>하려고 한다.`,analysis:`✅ ① spark(불을 붙이다) – discover(발견하다) – turn(변환하다): 본문 내용과 일치 ❌ ② suppress(억압하다)는 창의성을 자극한다는 문맥에 반대 ❌ ③ conceal(숨기다)은 발견과 반대 ❌ ④ suppress, conceal 모두 부적절 ❌ ⑤ prevent(방지하다)는 변환과 반대`,tip:`spark(불꽃을 튀기다, 촉발하다) ↔ suppress(억압하다), discover(발견하다) ↔ conceal(숨기다), turn into(~로 변환하다) ↔ prevent(방지하다)의 대립 쌍을 기억하세요.`}},
{id:2,type:`(A)(B)(C) 조합형`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`(A) destroyed – (B) adjustments – (C) revealed`,`(A) transformed – (B) mistakes – (C) hid`,`(A) transformed – (B) adjustments – (C) revealed`,`(A) transformed – (B) adjustments – (C) hid`,`(A) destroyed – (B) mistakes – (C) revealed`],passage:`When viewed normally, it is just an ordinary still life of vegetables in a bowl. However, when flipped upside down, it is magically (A)[<b>transformed / destroyed</b>] into a smiling face! Experts have studied this painting, along with Arcimboldo's other reversible ones. Their research showed that he first painted them as still life paintings and then turned them upside down and made some (B)[<b>adjustments / mistakes</b>] to create faces. X-ray examination (C)[<b>revealed / hid</b>] that he sometimes changed the positions of some of the fruits and vegetables.`,stem:`다음 글의 (A), (B), (C)의 각 괄호 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`정상적으로 보면, 그것은 그릇에 담긴 채소의 평범한 정물화에 불과하다. 그러나 거꾸로 뒤집으면, 마법처럼 웃는 얼굴로 <b>변환</b>된다! 전문가들은 아르침볼도의 다른 반전 그림들과 함께 이 그림을 연구했다. 그들의 연구에 따르면, 그는 먼저 정물화로 그린 다음 뒤집어서 얼굴을 만들기 위해 약간의 <b>조정</b>을 했다. X-ray 조사는 그가 때때로 과일과 채소의 위치를 바꿨다는 것을 <b>밝혀냈다</b>.`,analysis:`❌ ① destroyed(파괴된)는 변환과 반대 ❌ ② mistakes(실수)는 조정이 아님 ✅ ③ transformed(변환된) – adjustments(조정) – revealed(밝혀냈다): 본문 내용과 정확히 일치 ❌ ④ hid(숨겼다)는 밝혀냈다와 반대 ❌ ⑤ destroyed, mistakes 모두 부적절`,tip:`transformed(변환된) ↔ destroyed(파괴된), adjustments(조정) ↔ mistakes(실수), revealed(밝혀냈다) ↔ hid(숨겼다)의 대립을 파악하세요.`}},
{id:3,type:`(A)(B)(C) 조합형`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`(A) playful – (B) frustration – (C) transform`,`(A) dull – (B) inspiration – (C) transform`,`(A) playful – (B) inspiration – (C) abandon`,`(A) playful – (B) inspiration – (C) transform`,`(A) dull – (B) frustration – (C) abandon`],passage:`Using everyday items, she creates (A)[<b>playful / dull</b>] visual illusions that force you to look twice in order to confirm what you have just seen. Her unique style has been called "household surrealism." Stentzel is perhaps best known for her Clothesline Animals series. She got (B)[<b>inspiration / frustration</b>] for the series while she was hanging her laundry. By simply adding some colorful clothespins and a dish towel, she was able to (C)[<b>transform / abandon</b>] her black sweatshirt and dark grey pants into a horse.`,stem:`다음 글의 (A), (B), (C)의 각 괄호 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`일상 용품을 사용하여, 그녀는 방금 본 것을 확인하기 위해 두 번 보게 만드는 <b>재치 있는</b> 시각적 착시를 만든다. 그녀의 독특한 스타일은 '가정용 초현실주의'라고 불린다. Stentzel은 아마도 빨랫줄 동물 시리즈로 가장 잘 알려져 있다. 그녀는 빨래를 널다가 이 시리즈에 대한 <b>영감</b>을 얻었다. 단순히 몇 개의 색깔 빨래집게와 행주를 추가하여, 그녀는 검은 맨투맨과 짙은 회색 바지를 말로 <b>변신시킬</b> 수 있었다.`,analysis:`❌ ① frustration(좌절)은 영감과 반대 ❌ ② dull(지루한)은 재치 있는과 반대 ❌ ③ abandon(포기하다)은 변신시키다와 반대 ✅ ④ playful(재치 있는) – inspiration(영감) – transform(변신시키다): 본문 내용과 정확히 일치 ❌ ⑤ dull, frustration, abandon 모두 부적절`,tip:`playful(재치 있는) ↔ dull(지루한), inspiration(영감) ↔ frustration(좌절), transform(변환하다) ↔ abandon(포기하다)의 대립 쌍을 기억하세요.`}},
{id:4,type:`문맥상 부적절한 어휘`,diff:`쉬움`,pts:4,fmt:"mc",ans:4,ch:[`① divided`,`② common`,`③ ability`,`④ ordinary`,`⑤ exposed`],passage:`Many people accept the idea that we can be ①<u>divided</u> into two groups: those who are creative and those who are not. This ②<u>common</u> belief, however, is far from the truth. Everyone has the ③<u>ability</u> to be creative. Finding creativity inside yourself just takes a little effort. Some artists, for example, spark their creativity by looking closely at ④<u>ordinary</u> objects. They try to discover the beauty ⑤<u>exposed</u> within these common objects and then turn them into works of art.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`많은 사람들은 우리가 두 그룹으로 <b>나뉠</b> 수 있다는 생각을 받아들인다: 창의적인 사람과 그렇지 않은 사람. 그러나 이 <b>흔한</b> 믿음은 진실과 거리가 멀다. 모든 사람은 창의적이 될 <b>능력</b>을 가지고 있다. 일부 예술가들은 <b>평범한</b> 사물을 면밀히 관찰함으로써 창의성에 불을 붙인다. 그들은 이러한 흔한 사물 안에 <b>숨겨진(→exposed는 부적절)</b> 아름다움을 발견하려 한다.`,analysis:`✅ ① divided(나뉜): 적절 ✅ ② common(흔한): 적절 ✅ ③ ability(능력): 적절 ✅ ④ ordinary(평범한): 적절 ❌ ⑤ exposed(노출된) → 원문은 hidden(숨겨진). 아름다움이 사물 안에 '숨겨져' 있다는 문맥이므로 exposed(노출된)는 부적절`,tip:`hidden(숨겨진) ↔ exposed(노출된). 평범한 사물 안에 '숨겨진' 아름다움을 발견한다는 것이 핵심입니다.`}},
{id:5,type:`문맥상 부적절한 어휘`,diff:`보통`,pts:5,fmt:"mc",ans:4,ch:[`① striking`,`② arranged`,`③ representative`,`④ signature`,`⑤ identical`],passage:`Created by a 16th-century Italian painter named Giuseppe Arcimboldo, the painting shows ①<u>striking</u> creativity and originality. Fruits, flowers, and vegetables are ②<u>arranged</u> like the pieces of a puzzle to create a human head. A cherry and a mulberry become the dark eyes, while an apple and a peach act as the pink cheeks. This painting is ③<u>representative</u> of the artist's ④<u>signature</u> style of "composite portraits." He used plants, animals, and other objects to create many other ⑤<u>identical</u> portraits like this.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`16세기 이탈리아 화가 주세페 아르침볼도가 만든 이 그림은 <b>인상적인</b> 창의성과 독창성을 보여준다. 과일, 꽃, 채소가 퍼즐 조각처럼 <b>배열</b>되어 인간의 머리를 만든다. 체리와 뽕나무 열매가 어두운 눈이 되고, 사과와 복숭아가 분홍빛 뺨 역할을 한다. 이 그림은 예술가의 <b>대표적인</b> <b>시그니처</b> 스타일인 '합성 초상화'의 전형이다. 그는 식물, 동물, 기타 사물을 사용하여 이와 같은 다른 많은 초상화를 <b>만들었다(→identical은 부적절)</b>.`,analysis:`✅ ① striking(인상적인): 적절 ✅ ② arranged(배열된): 적절 ✅ ③ representative(대표적인): 적절 ✅ ④ signature(시그니처, 고유한): 적절 ❌ ⑤ identical(동일한) → 문맥상 다양한 초상화를 만들었다는 의미이므로 identical은 부적절. 원문에서도 many other portraits처럼 '다른 많은' 초상화를 강조`,tip:`identical(동일한)은 '똑같은'이라는 뜻으로, 다양한 합성 초상화를 만들었다는 문맥에 맞지 않습니다.`}},
{id:6,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`① ordinary`,`② staring`,`③ admits`,`④ acceptable`,`⑤ prevents`],passage:`Stentzel says that it is her active observation skills that allow her to make magic out of the ①<u>ordinary</u>. As a child, she would spend time ②<u>staring</u> at the patterns in the wood of her bed, trying to find different animal shapes. She ③<u>admits</u> that even today she stares at things longer than is ④<u>acceptable</u> in society. This keen observation is what ⑤<u>prevents</u> her to continuously produce creative and imaginative works of art.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`Stentzel은 <b>평범한</b> 것에서 마법을 만들어 내는 것은 자신의 적극적인 관찰력 덕분이라고 말한다. 어린 시절, 그녀는 침대 나뭇결의 패턴을 <b>응시</b>하며 다양한 동물 모양을 찾으려 했다. 그녀는 오늘날에도 사회적으로 <b>용인되는</b> 것보다 더 오래 사물을 응시한다고 <b>인정</b>한다. 이 예리한 관찰력이 그녀가 지속적으로 창의적이고 상상력 넘치는 예술 작품을 <b>만들 수 있게 해준다(→prevents는 부적절)</b>.`,analysis:`✅ ① ordinary(평범한): 적절 ✅ ② staring(응시하는): 적절 ✅ ③ admits(인정한다): 적절 ✅ ④ acceptable(용인되는): 적절 ❌ ⑤ prevents(방지하다) → 원문은 enables(가능하게 하다). 관찰력이 창작을 '가능하게 한다'는 문맥이므로 prevents(방지하다)는 부적절`,tip:`enables(가능하게 하다) ↔ prevents(방지하다). 관찰력이 창작 활동을 가능하게 해주는 긍정적 역할을 한다는 맥락입니다.`}},
{id:7,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`conventional`,`traditional`,`unconventional`,`predictable`],passage:`Look at these two paintings. Believe it or not, they both depict the same person, Holy Roman Emperor Rudolf II. The one on the left might look familiar, as it is a standard style of portrait that you would see in a gallery or an art book. However, the one on the right, called Vertumnus, is very __________.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`이 두 그림을 보라. 믿거나 말거나, 둘 다 같은 사람, 신성 로마 제국 황제 루돌프 2세를 묘사하고 있다. 왼쪽의 것은 미술관이나 미술 서적에서 볼 수 있는 표준적인 스타일의 초상화이기 때문에 익숙해 보일 것이다. 그러나 오른쪽의 베르툼누스라는 그림은 매우 <b>파격적이다</b>.`,analysis:`❌ ① conventional(관습적인): 표준적인 초상화와 대비되는 문맥에 맞지 않음 ❌ ② traditional(전통적인): 같은 이유로 부적절 ✅ ③ unconventional(파격적인): 표준 초상화와 대비하여 '파격적'이라는 원문과 일치 ❌ ④ predictable(예측 가능한): 문맥에 맞지 않음`,tip:`conventional(관습적인) ↔ unconventional(파격적인). However가 앞 문장과의 대비를 나타내는 단서입니다.`}},
{id:8,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`practical`,`imaginative`,`financial`,`scientific`],passage:`When he looked at typical objects, such as a bowl of vegetables, he saw the artistic and __________ potential in them. His innovative approach to art inspired many great artists who came after him, including Pablo Picasso, Salvador Dali, and Rene Magritte.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`그가 채소 한 그릇과 같은 전형적인 사물을 바라보았을 때, 그는 그 안에서 예술적이고 <b>상상력이 넘치는</b> 가능성을 보았다. 예술에 대한 그의 혁신적인 접근법은 피카소, 살바도르 달리, 르네 마그리트를 포함한 많은 위대한 예술가들에게 영감을 주었다.`,analysis:`❌ ① practical(실용적인): 예술적 문맥에 맞지 않음 ✅ ② imaginative(상상력이 넘치는): artistic과 함께 예술적 잠재력을 설명 — 원문과 일치 ❌ ③ financial(재정적인): 문맥에 맞지 않음 ❌ ④ scientific(과학적인): 예술적 문맥에 맞지 않음`,tip:`imaginative(상상력이 넘치는)는 artistic(예술적인)과 함께 쓰여 창의적인 잠재력을 표현합니다.`}},
{id:9,type:`빈칸 어휘 완성`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`interactive`,`destructive`,`passive`,`repetitive`],passage:`Why did he make his paintings reversible? It was probably because he wanted to add an __________ element to his work by doing so. Viewers feel as if they are playing a visual game, which brings them a sense of pleasure.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`왜 그는 그림을 반전 가능하게 만들었을까? 아마도 그렇게 함으로써 작품에 <b>상호작용적인</b> 요소를 추가하고 싶었기 때문일 것이다. 관람객들은 마치 시각적 게임을 하는 것처럼 느끼며, 이는 그들에게 즐거움을 가져다준다.`,analysis:`✅ ① interactive(상호작용적인): 관람객이 그림을 뒤집어 보며 참여하는 요소 — 원문과 일치 ❌ ② destructive(파괴적인): 문맥에 맞지 않음 ❌ ③ passive(수동적인): 상호작용의 반대 ❌ ④ repetitive(반복적인): 문맥에 맞지 않음`,tip:`interactive(상호작용적인)는 관람객이 적극적으로 참여한다는 의미입니다. '시각적 게임을 하는 것처럼'이라는 후속 문장이 단서입니다.`}},
{id:10,type:`동의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`boring`,`clever`,`ordinary`,`serious`],passage:`This <u>witty</u> and amusing creation is actually a work of art created by the visual artist Helga Stentzel. Using everyday items, she creates playful visual illusions that force you to look twice in order to confirm what you have just seen.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`이 <b>재치 있는</b> 그리고 재미있는 창작물은 사실 시각 예술가 Helga Stentzel이 만든 예술 작품이다. 일상 용품을 사용하여, 그녀는 방금 본 것을 확인하기 위해 두 번 보게 만드는 재치 있는 시각적 착시를 만든다.`,analysis:`❌ ① boring(지루한): 반대 의미 ✅ ② clever(재치 있는, 영리한): witty의 동의어 — 정답 ❌ ③ ordinary(평범한): 다른 의미 ❌ ④ serious(심각한): 다른 의미`,tip:`witty(재치 있는) = clever(영리한). 둘 다 유머와 지적 영리함을 나타냅니다.`}},
{id:11,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`conventional`,`groundbreaking`,`outdated`,`simple`],passage:`Each of Arcimboldo's works is a careful study of everyday objects. When he looked at typical objects, such as a bowl of vegetables, he saw the artistic and imaginative potential in them. His <u>innovative</u> approach to art inspired many great artists who came after him, including Pablo Picasso, Salvador Dali, and Rene Magritte.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`아르침볼도의 각 작품은 일상 사물에 대한 세심한 연구이다. 그가 채소 한 그릇과 같은 전형적인 사물을 바라보았을 때, 그는 그 안에서 예술적이고 상상력이 넘치는 가능성을 보았다. 예술에 대한 그의 <b>혁신적인</b> 접근법은 피카소, 달리, 마그리트를 포함한 많은 위대한 예술가들에게 영감을 주었다.`,analysis:`❌ ① conventional(관습적인): 반대 의미 ✅ ② groundbreaking(획기적인): innovative의 동의어 — 정답 ❌ ③ outdated(구식의): 반대 의미 ❌ ④ simple(단순한): 다른 의미`,tip:`innovative(혁신적인) = groundbreaking(획기적인). 둘 다 새롭고 독창적인 것을 의미합니다.`}},
{id:12,type:`동의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:1,ch:[`disappointing`,`amazing`,`mild`,`typical`],passage:`Another series that highlights Stentzel's <u>astonishing</u> creativity is Edible Creatures. For this series, she arranges food items you can find in any kitchen to create cute animals. The stars of the series are Brad Pet and Crunchie, a pair of puppies made of sliced bread and lettuce respectively.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`Stentzel의 <b>놀라운</b> 창의성을 강조하는 또 다른 시리즈는 Edible Creatures이다. 이 시리즈를 위해, 그녀는 어떤 부엌에서나 찾을 수 있는 식품 재료를 배열하여 귀여운 동물을 만든다. 이 시리즈의 스타는 각각 썬 빵과 양상추로 만들어진 한 쌍의 강아지, Brad Pet과 Crunchie이다.`,analysis:`❌ ① disappointing(실망스러운): 반대 의미 ✅ ② amazing(놀라운): astonishing의 동의어 — 정답 ❌ ③ mild(가벼운, 온화한): 다른 의미 ❌ ④ typical(전형적인): 놀라움과 반대`,tip:`astonishing(놀라운) = amazing(놀라운). 둘 다 깜짝 놀랄 만큼 대단하다는 뜻입니다.`}},
{id:13,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`distant`,`remote`,`removed`,`close`],passage:`You may think it is a quality that only artists and writers possess — some special talent you are either born with or without. Many people accept the idea that we can be divided into two groups: those who are creative and those who are not. This common belief, however, is <u>far</u> from the truth.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`당신은 그것이 예술가와 작가만이 가진 자질이라고 생각할 수 있다 — 태어날 때 가지고 있거나 아닌 어떤 특별한 재능. 많은 사람들은 우리가 두 그룹으로 나뉠 수 있다는 생각을 받아들인다: 창의적인 사람과 그렇지 않은 사람. 그러나 이 흔한 믿음은 진실과 <b>거리가 멀다</b>.`,analysis:`✅ ① distant(먼): far의 유의어 ✅ ② remote(먼): far의 유의어 ✅ ③ removed(동떨어진): far의 유의어 ❌ ④ close(가까운): far의 반의어 — 정답`,tip:`far(먼) ↔ close(가까운). 'far from the truth'는 '진실과 거리가 먼'이라는 관용 표현입니다.`}},
{id:14,type:`반의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`sharp`,`acute`,`intense`,`dull`],passage:`Stentzel says that it is her active observation skills that allow her to make magic out of the ordinary. As a child, she would spend time staring at the patterns in the wood of her bed, trying to find different animal shapes. She admits that even today she stares at things longer than is acceptable in society. This <u>keen</u> observation is what enables her to continuously produce creative and imaginative works of art.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`Stentzel은 평범한 것에서 마법을 만들어 내는 것은 자신의 적극적인 관찰력 덕분이라고 말한다. 어린 시절, 그녀는 침대 나뭇결의 패턴을 응시하며 다양한 동물 모양을 찾으려 했다. 그녀는 오늘날에도 사회적으로 용인되는 것보다 더 오래 사물을 응시한다고 인정한다. 이 <b>예리한</b> 관찰력이 그녀가 지속적으로 창의적이고 상상력 넘치는 예술 작품을 만들 수 있게 해준다.`,analysis:`✅ ① sharp(예리한): keen의 유의어 ✅ ② acute(예리한): keen의 유의어 ✅ ③ intense(강렬한): keen의 유의어 ❌ ④ dull(둔한, 무딘): keen의 반의어 — 정답`,tip:`keen(예리한) ↔ dull(둔한). keen observation은 '예리한 관찰력'이라는 뜻입니다.`}},
{id:15,type:`다의어 문맥적 의미`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`His <u>works</u> are displayed in major museums around the world.`,`She spent months creating her latest <u>work</u> of art.`,`The artist's <u>works</u> include both paintings and sculptures.`,`This machine doesn't <u>work</u> properly anymore.`,`All of these <u>works</u> were created from nothing more than laundry and household items.`],passage:`[참고] They try to discover the beauty hidden within these common objects and then turn them into <u>works</u> of art. / Each of Arcimboldo's <u>works</u> is a careful study of everyday objects.`,stem:`다음 밑줄 친 <b>work</b>가 나머지 넷과 <b>다른 의미</b>로 쓰인 것은?`,det:{korean:`① 그의 <b>작품들</b>은 전 세계 주요 박물관에 전시되어 있다. ② 그녀는 최신 <b>예술 작품</b>을 만드는 데 몇 달을 보냈다. ③ 그 예술가의 <b>작품들</b>에는 회화와 조각 모두 포함된다. ④ 이 기계는 더 이상 제대로 <b>작동하지</b> 않는다. ⑤ 이 모든 <b>작품들</b>은 빨래와 가정 용품으로만 만들어졌다.`,analysis:`①②③⑤ work(s) = 작품 (예술적 창작물) ❌ ④ work = 작동하다 (기계 등이 기능하다) — 나머지 넷과 다른 의미 ✅ 정답: ④`,tip:`work는 명사로 '작품', 동사로 '작동하다/일하다' 등 다양한 의미가 있습니다. 문맥에서 명사/동사 구분이 핵심입니다.`}},
{id:16,type:`영영풀이 매칭`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`portrait`,`illusion`,`pattern`,`sculpture`],passage:`<i>"a false visual impression; something that deceives the eye"</i><br><br>[참고 원문] Using everyday items, she creates playful visual illusions that force you to look twice in order to confirm what you have just seen. Her unique style has been called "household surrealism."`,stem:`다음 영영 풀이에 해당하는 단어로 가장 적절한 것은?`,det:{korean:`"잘못된 시각적 인상; 눈을 속이는 것" — <b>착시(환영)</b><br>[참고 해석] 일상 용품을 사용하여, 그녀는 방금 본 것을 확인하기 위해 두 번 보게 만드는 재치 있는 시각적 착시를 만든다. 그녀의 독특한 스타일은 '가정용 초현실주의'라고 불린다.`,analysis:`❌ ① portrait(초상화): 시각적 속임과 무관 ✅ ② illusion(착시, 환영): 눈을 속이는 시각적 인상 — 정답 ❌ ③ pattern(패턴): 다른 개념 ❌ ④ sculpture(조각): 다른 예술 형태`,tip:`illusion(착시, 환영) = a false visual impression. visual illusion(시각적 착시)은 눈으로 보는 것이 실제와 다르게 보이는 현상입니다.`}},
{id:17,type:`어형 변환 (서술형)`,diff:`보통`,pts:5,fmt:"written",wa:`originality`,accept:[`originality`],passage:`Created by a 16th-century Italian painter named Giuseppe Arcimboldo, the painting shows striking creativity and (original) __________. Fruits, flowers, and vegetables are arranged like the pieces of a puzzle to create a human head. A cherry and a mulberry become the dark eyes, while an apple and a peach act as the pink cheeks.`,stem:`다음 글의 괄호 안의 단어를 문맥에 맞게 변형하여 빈칸을 완성하시오.`,det:{korean:`16세기 이탈리아 화가 주세페 아르침볼도가 만든 이 그림은 인상적인 창의성과 <b>독창성(originality)</b>을 보여준다. 과일, 꽃, 채소가 퍼즐 조각처럼 배열되어 인간의 머리를 만든다. 체리와 뽕나무 열매가 어두운 눈이 되고, 사과와 복숭아가 분홍빛 뺨 역할을 한다.`,analysis:`original(형용사: 독창적인) → <b>originality</b>(명사: 독창성). and 앞의 creativity(명사)와 병렬 구조이므로 명사형이 필요합니다.`,tip:`형용사 → 명사 변환: original + -ity = originality. 'creativity and originality'는 and로 연결된 병렬 구조입니다.`}},
{id:18,type:`어형 변환 (서술형)`,diff:`보통`,pts:5,fmt:"written",wa:`continuously`,accept:[`continuously`],passage:`This keen observation is what enables her to (continue) __________ produce creative and imaginative works of art. Stentzel says that it is her active observation skills that allow her to make magic out of the ordinary.`,stem:`다음 글의 괄호 안의 단어를 문맥에 맞게 변형하여 빈칸을 완성하시오.`,det:{korean:`이 예리한 관찰력이 그녀가 <b>지속적으로(continuously)</b> 창의적이고 상상력 넘치는 예술 작품을 만들 수 있게 해주는 것이다. Stentzel은 평범한 것에서 마법을 만들어 내는 것은 자신의 적극적인 관찰력 덕분이라고 말한다.`,analysis:`continue(동사: 계속하다) → <b>continuously</b>(부사: 지속적으로). 동사 produce를 수식해야 하므로 부사형이 필요합니다.`,tip:`동사 → 부사 변환: continue → continuous(형용사) → continuously(부사). 부사는 동사를 수식합니다.`}},
{id:19,type:`빈칸 문맥 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`canvas`,`shelf`,`clothesline`,`table`],passage:`Take a look at this picture. Do you see a horse standing in a field? Or is it simply a collection of clothes hanging on a __________? This witty and amusing creation is actually a work of art created by the visual artist Helga Stentzel.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`이 그림을 보라. 들판에 서 있는 말이 보이는가? 아니면 단순히 <b>빨랫줄</b>에 걸린 옷 모음인가? 이 재치 있고 재미있는 창작물은 사실 시각 예술가 Helga Stentzel이 만든 예술 작품이다.`,analysis:`❌ ① canvas(캔버스): 옷을 거는 곳이 아님 ❌ ② shelf(선반): 옷을 널지 않음 ✅ ③ clothesline(빨랫줄): 옷을 널어 말리는 줄 — 원문과 일치 ❌ ④ table(탁자): 문맥에 맞지 않음`,tip:`clothesline(빨랫줄)은 옷을 널어 말리는 줄입니다. Stentzel의 'Clothesline Animals' 시리즈의 핵심 소재입니다.`}},
{id:20,type:`빈칸 문맥 완성`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`communication`,`observation`,`negotiation`,`calculation`],passage:`Stentzel says she came up with the concept of Crunchie while putting together a salad for her family. What do you think her secret is? Stentzel says that it is her active __________ skills that allow her to make magic out of the ordinary.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`Stentzel은 가족을 위해 샐러드를 준비하다가 Crunchie의 개념을 떠올렸다고 한다. 그녀의 비결이 무엇이라고 생각하는가? Stentzel은 평범한 것에서 마법을 만들어 내는 것은 자신의 적극적인 <b>관찰</b> 기술 덕분이라고 말한다.`,analysis:`❌ ① communication(소통): 예술 창작과 직접 관련 없음 ✅ ② observation(관찰): 평범한 것에서 마법을 만드는 비결 — 원문과 일치 ❌ ③ negotiation(협상): 문맥에 맞지 않음 ❌ ④ calculation(계산): 문맥에 맞지 않음`,tip:`observation(관찰)은 Stentzel의 핵심 능력입니다. 사물을 오래 응시하며 숨겨진 형태를 발견하는 '관찰력'이 그녀의 비결입니다.`}}
];


let S={cur:0,ans:new Array(EI.totalQ).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,levelIcon:getLevel(r.score).icon});if(h.length>10)h.splice(0,h.length-10);try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 시험 기록이 없습니다.</p>';else p.innerHTML=h.slice().reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time} · ${r.grade}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.levelIcon} ${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'전설',icon:'🐉',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'챔피언',icon:'🏆',range:'90~94',msg:'최상위권!'};if(s>=80)return{name:'다이아몬드',icon:'💎',range:'80~89',msg:'통과! 취약 유형만 복습하면 최상위!'};if(s>=70)return{name:'빛나는별',icon:'🌟',range:'70~79',msg:'통과까지 조금만 더!'};if(s>=60)return{name:'별',icon:'⭐',range:'60~69',msg:'기본기 탄탄! 본문 복습 후 재도전!'};if(s>=40)return{name:'나무',icon:'🌲',range:'40~59',msg:'성장 중!'};return{name:'새싹',icon:'🌱',range:'0~39',msg:'단어 암기부터 시작!'};}
function fmtTime(s){return Math.floor(s/60)+'분 '+(s%60)+'초';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(EI.totalQ).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
const typeTag={'(A)(B)(C) 조합형':'tag-combo','문맥상 부적절한 어휘':'tag-wrong','빈칸 어휘 완성':'tag-blank','동의어 고르기':'tag-syn','반의어 고르기':'tag-ant','다의어 문맥적 의미':'tag-poly','영영풀이 매칭':'tag-eng','어형 변환 (서술형)':'tag-morph','빈칸 문맥 완성':'tag-ctx'};
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc=typeTag[q.type]||'';h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body">`;if(q.passage)h+=`<div class="q-passage">${q.passage}</div>`;h+=`<div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){const mk=q.ch.length===5?'①②③④⑤':'①②③④';h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${mk[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:EI.totalQ},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('answered',S.ans[i]!==null));}
function scrollToQ(i){if(i<0||i>=EI.totalQ)return;S.cur=i;document.getElementById('qc-'+i).scrollIntoView({behavior:'smooth',block:'center'});}
function sel(qi,ci){document.querySelectorAll('.choice-btn[data-q="'+qi+'"]').forEach(b=>b.classList.remove('selected'));document.querySelector('.choice-btn[data-q="'+qi+'"][data-c="'+ci+'"]').classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById('w-'+qi).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase();if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase());if(!ok&&q.wa)ok=u===q.wa.toLowerCase();}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok});});return{score,correct,wrong,unanswered,details};}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100);const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={total:0,ok:0};typeMap[t].total++;if(d.ok)typeMap[t].ok++;});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.ok===v.total).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.ok<v.total).map(([k])=>k);let h='';
h+=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/${EI.total}</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong></span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교 / 학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 / ${EI.total}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간 / 통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.ok/d.total*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type.replace(/\(.+?\)/g,'').trim().slice(0,6)}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});
if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t.slice(0,8)}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t.slice(0,8)}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽!</h4><p>다른 단원도 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>틀린 유형 집중 복습으로 만점까지!</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기부터!</h4><p>지문 해석을 완벽히 이해한 뒤 재도전!</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="copyResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유하기</span></button><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);margin-left:8px">클릭하여 펼치기</span></div>`;r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const mk=d.q.ch&&d.q.ch.length===5?'①②③④⑤':'①②③④';const ua=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const ca=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;const open=!d.ok;h+=`<div class="rev-card"><div class="rev-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.rev-icon').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><span style="font-weight:800">${icon} ${d.q.id}번</span><span style="font-size:12px;color:var(--tm)">[${d.q.type.slice(0,6)}] ${d.q.pts}점</span><span class="rev-icon">▼</span></div><div class="rev-body${open?' open':''}"><div style="display:flex;gap:10px;margin-bottom:14px"><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;${d.ok?'background:var(--gl);color:var(--g)':'background:var(--rl);color:var(--r)'}"><div style="font-size:11px;opacity:.7">내 답</div>${ua}</div><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;background:var(--gl);color:var(--g)"><div style="font-size:11px;opacity:.7">정답</div>${ca}</div></div><div class="expl-tag ans">🇰🇷 해석</div><div class="expl-box ans-b">${d.q.det.korean}</div><div class="expl-tag tip">📋 분석</div><div class="expl-box">${d.q.det.analysis}</div><div class="expl-tag tip">💡 팁</div><div class="expl-box tip-b">${d.q.det.tip}</div></div></div>`;});h+=`</div></div>`;document.getElementById('resultScreen').innerHTML=h;}
function copyResult(){const r=grade(),lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100),nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,elapsed=Math.floor((Date.now()-S.start)/1000),pass=r.score>=80;const mk5='①②③④⑤',mk4='①②③④';const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,w:[]};typeMap[t].t++;if(d.ok)typeMap[t].o++;else typeMap[t].w.push(d.q.id);});
let txt=`📝 온라인단어 TEST 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🏆 점수: ${r.score} / ${EI.total}점 (${pct}%)\n${lv.icon} 레벨: ${lv.name}\n${pass?'🎉 통과!':'📚 미통과'}\n\n✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n⏱️ 소요시간: ${fmtTime(elapsed)}\n\n━━ 📊 문항별 결과 ━━\n`;
r.details.forEach(d=>{const mark=d.ok?'✅':'❌';const mk=d.q.ch&&d.q.ch.length===5?mk5:mk4;const ans=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const cor=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;txt+=`${mark} ${d.q.id}번 [${d.q.type.slice(0,6)}] ${d.q.pts}점 — 내답:${ans} 정답:${cor}\n`;});
txt+=`\n━━ 📈 유형별 분석 ━━\n`;Object.entries(typeMap).forEach(([t,v])=>{const p=Math.round(v.o/v.t*100);const ic=p===100?'🟢':(p>0?'🟡':'🔴');txt+=`${ic} ${t.slice(0,6)}: ${v.o}/${v.t} (${p}%)`;if(v.w.length)txt+=` ← 틀린:${v.w.join(',')}번`;txt+=`\n`;});
txt+=`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n#온라인단어TEST #영어내신`;
navigator.clipboard.writeText(txt).then(()=>toast('📋 상세 결과가 복사되었습니다!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('📋 복사되었습니다!');}catch(e){toast('복사 실패');}document.body.removeChild(ta);});}
function retake(){startExam();}
function goHome(){showScreen('startScreen');updateHCount();}
window.addEventListener('beforeunload',e=>{if(S.ti){e.preventDefault();e.returnValue='';}});

</script>
</body>
</html>
