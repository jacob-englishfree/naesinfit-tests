<script>

const Q = [
{
  id: 1, type: '어법', diff: '보통', pts: 5, fmt: 'mc',
  note: '어법 ⓐ~ⓔ',
  passage: `One of my patients had become severely depressed. However, she couldn't get help because she was <u>(ⓐ) unable</u> to afford the bus ride to the hospital. This <u>(ⓑ) shocked</u> me, as I had never <u>(ⓒ) considered</u> such a problem before. In fact, it is difficult for many people in Zimbabwe <u>(ⓓ) to pay</u> for transportation and <u>(ⓔ) receiving</u> medical treatment.`,
  stem: `다음 글의 밑줄 친 ⓐ~ⓔ 중에서 어법상 어색한 것은?`,
  ch: ["ⓐ", "ⓑ", "ⓒ", "ⓓ", "ⓔ"],
  ans: 4,
  det: {
    ref: `[원문] it is difficult for many people in Zimbabwe <b>to pay</b> for transportation and <b>receiving</b> medical treatment. [해석] 짐바브웨의 많은 사람들이 교통비를 내고 의료 치료를 받는 것은 어렵다. ▶ 'to pay'와 'receiving'이 and로 병렬 연결되어 있으므로, 동일한 형태(to부정사)로 맞춰야 합니다. 따라서 receiving → <b>receive</b>로 고쳐야 합니다. 'it is difficult ... to pay ... and (to) receive'의 구조입니다.`,
    correct: `ⓐ unable: be unable to-v 구문으로 '~할 수 없는'이라는 의미. 형용사 보어로 적절 ✅<br>ⓑ shocked: 주어 This(이것)가 사물이므로, 감정을 유발하는 능동 의미의 과거시제 동사 shocked 적절 ✅<br>ⓒ considered: had never considered — 과거완료(대과거)로 '그 전에 한 번도 고려한 적 없었다'는 경험 표현 ✅<br>ⓓ to pay: it is difficult for ~ to-v 가주어·진주어 구문의 to부정사. 적절 ✅<br>ⓔ receiving: and로 to pay와 병렬 연결 → to부정사 형태가 되어야 함. receiving ❌ → <b>receive</b> ✅`,
    wrongs: [],
    tip: `🔑 <b>병렬 구조(Parallel Structure)</b>: and/or/but으로 연결된 요소는 문법적 형태를 일치시켜야 합니다. to pay and (to) receive (○) / to pay and receiving (✕). ▶ 비교: spend + 시간 + v-ing (동명사) vs. it is difficult to-v (to부정사)`
  }
},

{

},
{

{
  id: 7, type: '대의', diff: '보통', pts: 5, fmt: 'mc',
  note: '주제',
  passage: `The idea came from an experience I had as a psychiatrist. One of my patients had become severely depressed. However, she couldn't get help because she was unable to afford the bus ride to the hospital. In fact, it is difficult for many people in Zimbabwe to pay for transportation and receive medical treatment. When the Friendship Bench program started in 2006, there were only eleven psychiatrists serving Zimbabwe's population of over twelve million people. I needed to find a way to bring psychiatry into the community. The program was created as a way to provide accessible mental health services. It offers talk therapy sessions to people dealing with issues such as depression or anxiety.`,
  stem: `다음 글의 주제로 가장 적절한 것은?`,
  ch: ["짐바브웨의 교통 인프라 부족 문제", "지역사회 기반 정신건강 지원 프로그램의 탄생과 운영", "전문 정신과 의사 양성의 필요성", "아프리카의 경제 발전을 위한 국제 원조", "노인 봉사활동이 건강에 미치는 영향"],
  ans: 1,
  det: {
    ref: `[원문] I needed to find a way to bring psychiatry into the community. The program was created as a way to provide accessible mental health services. [해석] 나는 정신의학을 지역사회에 가져올 방법을 찾아야 했다. 이 프로그램은 접근 가능한 정신건강 서비스를 제공하기 위한 방법으로 만들어졌다. ▶ 글 전체의 핵심은 정신과 의사 부족과 교통비 문제를 해결하기 위해 지역사회 기반 정신건강 프로그램(Friendship Bench)을 만들었다는 내용입니다.`,
    correct: `① 짐바브웨의 교통 인프라 부족 문제: 교통비 문제는 프로그램 탄생의 배경일 뿐, 글의 주제가 아님 ❌<br>② 지역사회 기반 정신건강 지원 프로그램의 탄생과 운영: 글의 핵심 내용과 정확히 일치 ✅<br>③ 전문 정신과 의사 양성의 필요성: 의사 부족은 배경 설명이며, 해결책으로 제시된 것은 할머니 상담사 프로그램 ❌<br>④ 아프리카의 경제 발전을 위한 국제 원조: 글에서 국제 원조 관련 내용 없음 ❌<br>⑤ 노인 봉사활동이 건강에 미치는 영향: 할머니들의 봉사는 소재이나, 봉사가 노인 건강에 미치는 영향은 다루지 않음 ❌`,
    wrongs: [],
    tip: `🔑 <b>주제 파악 전략</b>: 반복되는 핵심어(key words)를 찾아라! → psychiatry, community, mental health, accessible, program 등이 반복됨 → '지역사회 기반 정신건강 프로그램'이 주제. ▶ 배경 정보(교통비, 의사 부족)와 핵심 주제를 구별하는 것이 중요!`
  }
},

  ans: 0,
  det: {
    ref: `[원문] 'grandmothers,' volunteer to sit with patients at the benches, listen to their stories, and provide them with emotional support. [해석] '할머니'라 불리는 이 여성들은 벤치에서 환자들과 함께 앉아 그들의 이야기를 듣고 정서적 지지를 제공하는 자원봉사를 한다. ▶ 글의 핵심은 Friendship Bench에서 대화를 통해 지역사회를 치유하는 프로그램이므로, 제목은 '대화를 통한 지역사회 치유'가 가장 적절합니다.`,
    correct: `① Friendship Benches: Healing Communities Through Conversation: 프로그램명(Friendship Bench) + 핵심 방법(대화/conversation) + 효과(치유/healing)를 모두 포함 ✅<br>② The Science Behind Modern Psychiatry: 현대 정신의학의 과학적 측면 — 글의 초점이 아님 ❌<br>③ How to Build Public Benches for Parks: 공원 벤치 건설 방법 — 글의 내용과 무관 ❌<br>④ Elderly Women and Their Retirement Hobbies: 노인 여성의 은퇴 후 취미 — 할머니 봉사자는 취미가 아닌 상담 프로그램 ❌<br>⑤ Zimbabwe's Economic Challenges in Healthcare: 짐바브웨 의료 경제 문제 — 배경 소재일 뿐 핵심 주제 아님 ❌`,
    wrongs: [],
    tip: `🔑 <b>제목 선택 전략</b>: 좋은 제목은 ① 글의 핵심 소재(Friendship Bench)를 포함하고 ② 핵심 방법이나 특징(conversation/대화)을 담으며 ③ 글의 목적이나 효과(healing/치유)를 반영한다. ▶ 너무 포괄적이거나 너무 세부적인 선택지는 오답!`
  }
},
{
  id: 9, type: '대의', diff: '어려움', pts: 6, fmt: 'mc',
  note: '시사점',
  passage: `When the Friendship Bench program started in 2006, there were only eleven psychiatrists serving Zimbabwe's population of over twelve million people. I needed to find a way to bring psychiatry into the community. The program was created as a way to provide accessible mental health services. These women, called 'grandmothers,' volunteer to sit with patients at the benches, listen to their stories, and provide them with emotional support. In 2022, we provided face-to-face counseling to about 90,000 patients in Zimbabwe. We've also started expanding the program, and we now offer online counseling through an app.`,
  stem: `위 글이 시사하는 바로 가장 적절한 것은?`,
  ch: ["전문 인력이 부족한 상황에서도 훈련된 지역사회 구성원을 통해 효과적인 정신건강 지원이 가능하다.", "정신건강 문제는 반드시 면허를 가진 정신과 의사만 치료해야 한다.", "온라인 앱 상담이 대면 상담보다 항상 더 효과적이다.", "병원을 더 많이 건설하면 정신건강 문제가 완전히 해결된다.", "노인들은 전문적인 의료 서비스 분야에 참여해서는 안 된다."],
  ans: 0,
  det: {
    ref: `[원문] I needed to find a way to bring psychiatry into the community. [해석] 나는 정신의학을 지역사회로 가져올 방법을 찾아야 했다. ▶ 정신과 의사가 11명뿐인 상황에서 지역사회 할머니들을 훈련시켜 90,000명의 환자를 상담한 사례는, 전문 인력이 부족해도 지역사회 자원을 활용하면 효과적인 지원이 가능하다는 시사점을 줍니다.`,
    correct: `① 훈련된 지역사회 구성원을 통한 효과적 정신건강 지원 가능: 글의 핵심 메시지와 정확히 일치. 의사 부족 → 할머니 훈련 → 9만 명 상담 성공 ✅<br>② 면허 있는 정신과 의사만 치료해야 함: 글은 오히려 비전문가(할머니)가 효과적으로 상담할 수 있음을 보여줌 ❌<br>③ 온라인 앱 상담이 대면보다 항상 효과적: 글에서 온라인 앱은 확장 수단으로 언급되었을 뿐, 우위 비교 없음 ❌<br>④ 병원 건설로 문제 완전 해결: 글의 핵심은 병원이 아닌 지역사회 기반 해결책 ❌<br>⑤ 노인은 전문 의료에 참여하면 안 됨: 글은 정반대로 할머니들의 참여를 긍정적으로 평가 ❌`,
    wrongs: [],
    tip: `🔑 <b>시사점 파악 전략</b>: ① 글의 문제 상황(정신과 의사 부족)과 ② 해결 방안(지역사회 할머니 훈련)을 연결하여 ③ 일반적 교훈을 도출하라. ▶ '항상', '반드시', '완전히' 같은 극단적 표현이 포함된 선택지는 대부분 오답!`
  }
},
{
  id: 10, type: '일치', diff: '쉬움', pts: 3, fmt: 'mc',
  note: '일치',
  passage: `When the Friendship Bench program started in 2006, there were only eleven psychiatrists serving Zimbabwe's population of over twelve million people. The program was created as a way to provide accessible mental health services. At the beginning, we started with only fourteen volunteer grandmothers. But today, there are thousands of grandmothers who have been trained. In 2022, we provided face-to-face counseling to about 90,000 patients in Zimbabwe.`,
  stem: `Friendship Bench 프로그램에 관한 다음 글의 내용과 일치하는 것은?`,
  ch: ["프로그램이 시작될 때 짐바브웨에는 11명의 할머니 상담사가 있었다.", "Friendship Bench 프로그램은 2006년에 시작되었다.", "프로그램의 상담 세션은 유료로 진행된다.", "처음부터 수천 명의 할머니 자원봉사자가 참여했다.", "2022년에 약 9,000명의 환자에게 상담을 제공했다."],
  ans: 1,
  det: {
    ref: `[원문] When the Friendship Bench program started in <b>2006</b>, there were only eleven <b>psychiatrists</b> serving Zimbabwe's population [해석] Friendship Bench 프로그램이 <b>2006년</b>에 시작되었을 때, 짐바브웨 인구를 담당하는 <b>정신과 의사</b>는 단 11명뿐이었다. ▶ ②번이 원문의 내용과 정확히 일치합니다.`,
    correct: `① 11명의 할머니 상담사: 11명은 정신과 의사(psychiatrists)이지 할머니 상담사가 아님. 할머니는 14명으로 시작 ❌<br>② 2006년에 시작: 원문 'started in 2006'과 정확히 일치 ✅<br>③ 유료 진행: 원문 'The sessions are free' — 무료 ❌<br>④ 처음부터 수천 명: 원문 'started with only fourteen' — 14명으로 시작, 현재 수천 명 ❌<br>⑤ 약 9,000명: 원문 'about 90,000 patients' — 9만 명 ❌`,
    wrongs: [],
    tip: `🔑 <b>일치 문제 풀이법</b>: 선택지의 숫자·고유명사를 원문과 하나씩 대조하라! ▶ 11명 = psychiatrists(의사) ≠ grandmothers(할머니) / 14명 = 초기 할머니 수 / 90,000 ≠ 9,000 — 숫자 함정에 주의!`
  }
},
{
  id: 11, type: '불일치', diff: '보통', pts: 5, fmt: 'mc',
  note: '불일치',
  passage: `Hello, my name is Judith Moyo, but people call me Grandma Moyo. I'm 76 years old, and I have been volunteering for the Friendship Bench program for about eight years. I joined the program because many people in my community struggle with mental health problems, and I wanted to do something about it. One patient of mine, a nineteen-year-old girl, was going through a difficult time after her mom passed away. I counseled her and helped her begin her recovery journey. Now her life is back on track, and she has even started her own business!`,
  stem: `Grandma Moyo에 관한 다음 글의 내용과 일치하지 않는 것은?`,
  ch: ["본명은 Judith Moyo이다.", "76세이며 약 8년간 봉사해 왔다.", "지역사회의 정신건강 문제를 위해 프로그램에 참여했다.", "19세 소녀 환자는 아버지가 돌아가신 후 어려운 시간을 보냈다.", "그 소녀 환자는 현재 자신의 사업을 시작했다."],
  ans: 3,
  det: {
    ref: `[원문] a nineteen-year-old girl, was going through a difficult time after her <b>mom</b> passed away [해석] 19세 소녀는 <b>엄마</b>가 돌아가신 후 어려운 시간을 보내고 있었다. ▶ ④번은 '아버지(father)'라고 했지만, 원문에서는 '엄마(mom)'가 돌아가셨다고 했으므로 불일치합니다.`,
    correct: `① 본명 Judith Moyo: 'my name is Judith Moyo'와 일치 ✅<br>② 76세, 약 8년간 봉사: 'I'm 76 years old ... for about eight years'와 일치 ✅<br>③ 정신건강 문제를 위해 참여: 'many people in my community struggle with mental health problems'와 일치 ✅<br>④ 아버지가 돌아가심: 원문은 'her <b>mom</b> passed away' — 아버지가 아니라 어머니 ❌ (불일치)<br>⑤ 자신의 사업 시작: 'she has even started her own business'와 일치 ✅`,
    wrongs: [],
    tip: `🔑 <b>불일치 문제 풀이법</b>: 인물 관계(mom vs. dad), 숫자, 시간 표현을 꼼꼼히 대조하라! ▶ pass away: 돌아가시다(die의 완곡 표현) / back on track: 정상 궤도로 돌아온 / go through: ~을 겪다, 경험하다`
  }
},
{
  id: 12, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: '빈칸(구)',
  passage: `One of my patients had become severely depressed. However, she couldn't get help because she was unable to afford the bus ride to the hospital. When the Friendship Bench program started in 2006, there were only eleven psychiatrists serving Zimbabwe's population of over twelve million people. I needed to find a way to bring ________________. The program was created as a way to provide accessible mental health services.`,
  stem: `다음 빈칸에 들어갈 말로 가장 적절한 것은?`,

  ans: 0,
  det: {
    ref: `[원문] I needed to find a way to bring <b>psychiatry into the community</b>. [해석] 나는 <b>정신의학을 지역사회로 가져올</b> 방법을 찾아야 했다. ▶ 정신과 의사가 부족하고 환자들이 병원까지 갈 수 없는 상황에서, 해결책은 정신의학 서비스를 지역사회로 가져오는 것입니다.`,
    correct: `① psychiatry into the community: 정신과 의사 부족 + 교통비 부담 → 정신의학을 지역사회로 → 다음 문장의 accessible mental health services와 자연스럽게 연결 ✅<br>② more hospitals into rural areas: 병원 건설은 글에서 제시된 해결책이 아님 ❌<br>③ foreign doctors to Zimbabwe: 외국 의사 초빙은 언급되지 않음 ❌<br>④ bus services to every patient: 교통 서비스 제공은 글의 해결책이 아님 ❌<br>⑤ technology into traditional medicine: 기술과 전통 의학은 글의 맥락과 무관 ❌`,
    wrongs: [],
    tip: `🔑 <b>빈칸 추론 전략</b>: 빈칸 앞뒤 문장의 논리적 흐름을 파악하라! [앞] 의사 부족 + 교통비 문제 → [빈칸] 해결 방향 → [뒤] accessible 서비스 제공. ▶ bring A into B: A를 B에 도입하다, 가져오다`
  }
},
{
  id: 13, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: '빈칸(문장)',
  passage: `When the sessions with the grandmothers are over, patients are encouraged to join a community support group made up of former patients of the program. The members of these groups can easily relate to and support one another. This is because ________________________________________.`,
  stem: `다음 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch: ["most of them come from the same community and have experienced similar struggles", "the grandmothers provide them with financial assistance after the sessions", "they are required by law to participate in follow-up programs", "the government funds all community support groups in Zimbabwe", "professional psychiatrists supervise every group meeting"],
  ans: 0,
  det: {
    ref: `[원문] This is because most of them <b>come from the same community and have experienced similar struggles</b>. [해석] 이것은 그들 대부분이 <b>같은 지역사회 출신이고 비슷한 어려움을 경험했기</b> 때문이다. ▶ 'This is because'는 앞 문장의 이유를 설명하는 구문입니다. 왜 서로 쉽게 공감(relate to)할 수 있는가? → 같은 지역, 비슷한 경험을 공유하기 때문.`,
    correct: `① 같은 지역사회 출신이고 비슷한 어려움 경험: 앞 문장 'easily relate to and support one another'의 이유로 자연스러움 ✅<br>② 재정적 지원 제공: 할머니의 역할은 정서적 지지이며 재정 지원은 언급 없음 ❌<br>③ 법적 참여 의무: 프로그램은 자발적(volunteer)이며 법적 의무 언급 없음 ❌<br>④ 정부가 모든 지원 그룹 지원: 정부 지원은 글에서 언급되지 않음 ❌<br>⑤ 전문 정신과 의사가 감독: 프로그램의 핵심은 비전문가(할머니)의 역할이며 의사 감독 언급 없음 ❌`,
    wrongs: [],
    tip: `🔑 <b>'This is because ~' 빈칸 전략</b>: because 뒤에는 앞 문장의 '이유'가 와야 함. 앞 문장(쉽게 공감) → 이유(같은 지역+비슷한 경험) ▶ relate to: ~에 공감하다 / make up of: ~로 구성되다 / struggle: 어려움, 고난`
  }
},
{
  id: 14, type: '함축', diff: '보통', pts: 5, fmt: 'mc',
  note: '함축',
  passage: `I joined the program because many people in my community struggle with mental health problems, and I wanted to do something about it. I knew that I could help heal their wounded hearts by supporting them. Seeking help for mental health problems is nothing to be ashamed of. I've seen how it can make a difference in people's lives.`,
  stem: `다음 글에서 Grandma Moyo가 'I knew that I could help heal their wounded hearts by supporting them.'이라고 말한 의도로 가장 적절한 것은?`,
  ch: ["정신건강 문제에 대한 의학적 연구가 더 필요하다는 것을 강조하려고", "정서적 지지를 통해 마음의 상처를 치유할 수 있다는 확신을 표현하려고", "물질적 도움이 정신건강 치료의 핵심이라는 점을 주장하려고", "자신의 심장 질환 치료 경험을 공유하려고", "전문 의사만이 정신건강 문제를 해결할 수 있다는 점을 인정하려고"],
  ans: 1,
  det: {
    ref: `[원문] I knew that I could help <b>heal their wounded hearts</b> by <b>supporting</b> them. [해석] 나는 그들을 <b>지지함으로써</b> 그들의 <b>상처 입은 마음을 치유</b>하는 데 도움이 될 수 있다는 것을 알았다. ▶ 'wounded hearts'는 정신적·감정적 상처를 비유한 표현이고, 'supporting'은 정서적 지지를 의미합니다. 따라서 정서적 지지를 통해 마음의 상처를 치유할 수 있다는 확신을 나타냅니다.`,
    correct: `① 의학적 연구 필요성 강조: 연구가 아닌 실질적 지원 활동에 대한 발언 ❌<br>② 정서적 지지를 통한 마음 치유 확신: wounded hearts(마음의 상처) + supporting(지지) = 정서적 지지로 치유 가능하다는 확신 ✅<br>③ 물질적 도움이 핵심: supporting은 물질적이 아닌 정서적 지지를 의미 ❌<br>④ 심장 질환 치료 경험: wounded hearts는 실제 심장이 아닌 '마음의 상처' 비유 ❌<br>⑤ 전문 의사만 해결 가능: Grandma Moyo 자신이 비전문가로서 도울 수 있다고 말하고 있음 ❌`,
    wrongs: [],
    tip: `🔑 <b>함축 의미 파악</b>: wounded hearts는 비유적 표현(figurative language)으로 '마음의 상처'를 뜻함. 문자적 의미(심장 부상)와 구별! ▶ heal: 치유하다 / wound: 상처를 입히다 / be ashamed of: ~을 부끄러워하다 ▶ make a difference: 변화를 만들다, 차이를 가져오다`
  }
},
{
  id: 15, type: '순서', diff: '보통', pts: 5, fmt: 'mc',
  note: '순서배열',
  passage: `<b>[주어진 글]</b> The idea came from an experience I had as a psychiatrist.<br><br><b>(A)</b> This shocked me, as I had never considered such a problem before. In fact, it is difficult for many people in Zimbabwe to pay for transportation and receive medical treatment.<br><br><b>(B)</b> One of my patients had become severely depressed. However, she couldn't get help because she was unable to afford the bus ride to the hospital.<br><br><b>(C)</b> Furthermore, there has been a lack of psychiatrists in the country for many years. I needed to find a way to bring psychiatry into the community.`,
  stem: `주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?`,
  ch: ["(A) - (B) - (C)", "(A) - (C) - (B)", "(B) - (A) - (C)", "(B) - (C) - (A)", "(C) - (A) - (B)"],

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn" onclick="shareResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;
r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}
h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;
if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;
if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;
h+=`</div></div>`;});h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);window._lastResult=r;window._lastElapsed=elapsed;}
function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
</script>
