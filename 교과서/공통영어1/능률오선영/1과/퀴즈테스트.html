<style>
:root{--o:#E8772E;--od:#B85A1A;--ol:#F5A623;--oxl:#FFF3E8;--oxxl:#FFFAF5;--bg:#F6F2EE;--text:#1E1B18;--tm:#6B6560;--tl:#A09890;--g:#1A9960;--gl:#E6F9F0;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--p:#7C4DFF;--pl:#F3EEFF;--sky:#0EA5E9;--skyl:#E8F6FF;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s cubic-bezier(.4,0,.2,1);}

body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}

.btn{padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--tr);width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 6px 20px rgba(232,119,46,.3);margin-top:12px;}.btn-primary:hover{transform:translateY(-1px);}

.history-badge{background:var(--oxl);color:var(--o);font-weight:800;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;}

.history-item .hi-left .hi-name{font-weight:700;font-size:13px;}.history-item .hi-left .hi-meta{font-size:11px;color:var(--tl);}

.topbar-left{display:flex;align-items:center;gap:10px;}.topbar-dot{width:8px;height:8px;background:var(--o);border-radius:50%;}
.topbar-info{font-size:13px;color:var(--tm);font-weight:600;}.topbar-info span{color:var(--o);font-weight:800;}
.timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;}.timer.warn{color:var(--o);}.timer.danger{color:var(--r);animation:pulse .6s infinite;}

.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,.04);}

.q-type-tag{font-size:11px;font-weight:800;padding:4px 12px;border-radius:14px;}
.tag-어법{background:var(--rl);color:var(--r);}.tag-어휘{background:var(--bl);color:var(--b);}.tag-대의{background:var(--gl);color:var(--g);}.tag-일치{background:var(--oxl);color:var(--od);}.tag-빈칸{background:var(--pl);color:var(--p);}.tag-함축{background:#FFF0F5;color:#D946A0;}.tag-순서{background:var(--skyl);color:var(--sky);}.tag-무관{background:#F0FDF4;color:#16A34A;}.tag-서술형{background:var(--gl);color:var(--g);}.tag-지칭{background:#FEF3C7;color:#D97706;}.tag-TF{background:#E0E7FF;color:#4338CA;}.tag-불일치{background:var(--oxl);color:var(--od);}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#f5f1ed;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--o);font-weight:800;}
.q-body{padding:22px;}
.q-passage{background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-left:4px solid var(--o);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-passage .label{font-size:11px;font-weight:800;color:var(--o);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.q-passage u{text-decoration-color:var(--o);text-decoration-thickness:2px;text-underline-offset:3px;}
.q-stem{font-size:15px;font-weight:700;margin-bottom:18px;line-height:1.7;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #ebe7e3;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;position:relative;overflow:hidden;}
.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}
.choice-btn.selected{border-color:var(--o);box-shadow:0 0 0 3px rgba(232,119,46,.12);background:var(--oxxl);}
.c-num{min-width:26px;height:26px;background:#f0ece8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}
.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #e0dcd8;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}
.written-input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(232,119,46,.08);}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:65%;}
.nav-dot{width:28px;height:28px;border-radius:50%;background:#ebe7e3;cursor:pointer;border:none;font-size:10px;font-weight:800;color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:var(--tr);}
.nav-dot.current{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 3px 10px rgba(232,119,46,.3);transform:scale(1.08);}

.nav-btn{padding:9px 18px;background:#fff;border:2px solid #e0dcd8;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#f0ece8;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(232,119,46,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #ebe7e3;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F8F5F0;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}
</style>
</head>

<script>
const EI={"subject":"공통영어1","pub":"능률(오선영)","lesson":"1과","title":"Discovering Yourself through Challenges","total":100,"time":1200,"histKey":"quizH_능률오선영_1_20","qCount":20};
const Q=[{id:1,type:'어법',diff:'보통',pts:5,fmt:'mc',note:'어법 ⓐ~ⓔ',passage:`She wanted us to start the semester by <u>ⓐ pushing</u> ourselves out of our comfort zones and <u>ⓑ learning</u> more about ourselves. To help us <u>ⓒ do</u> so, she gave us an assignment to challenge ourselves in three different ways. She told us that we should <u>ⓓ sharing</u> our experiences with our classmates when we <u>ⓔ finished</u> the challenges.`,stem:`다음 글의 밑줄 친 ⓐ~ⓔ 중에서 어법상 어색한 것을 고르시오.`,ch:[`ⓐ pushing`,`ⓑ learning`,`ⓒ do`,`ⓓ sharing`,`ⓔ finished`],ans:3,det:{ref:`[원문] She told us that we should <b>share</b> our experiences with our classmates when we finished the challenges. [해석] 그녀는 우리에게 도전을 끝냈을 때 급우들과 경험을 <b>공유해야 한다</b>고 말했다. 조동사 should 뒤에는 반드시 동사원형이 와야 하므로 sharing(동명사/현재분사)은 어법에 맞지 않고 share(동사원형)로 고쳐야 한다.`,correct:`ⓐ pushing: 전치사 by 뒤에 동명사(v-ing) → pushing ✅ / ⓑ learning: 등위접속사 and로 pushing과 병렬 연결 → learning ✅ / ⓒ do: help + 목적어 + 동사원형(원형부정사) → do ✅ / ⓓ sharing: 조동사 should 뒤에는 동사원형이 와야 함 → sharing ❌ → share가 올바름 / ⓔ finished: when절의 과거시제 동사 → finished ✅`,wrongs:[],tip:`🔑 조동사(should/can/will/may/must) + 동사원형: should share (○) / should sharing (✕). 비교: 전치사(by/in/of) + 동명사(v-ing). help + O + 원형부정사/to부정사 둘 다 가능.`}},
{id:2,type:'어법',diff:'어려움',pts:6,fmt:'mc',note:'어법 A/B/C',passage:`Going to the theater alone was something I had never done before. So, for the first challenge, I decided to give it a try. It was nice (A) <b>[to choose / choosing]</b> the movie and the seat on my own. I saw the experience as a good opportunity (B) <b>[to watch / watching]</b> something different, so I chose a historical drama (C) <b>[that / what]</b> I had been curious about.`,stem:`다음 글의 괄호 (A), (B), (C)에서 어법에 맞는 표현을 골라 바르게 짝지은 것을 고르시오.`,ch:[`to choose – to watch – that`,`to choose – watching – what`,`choosing – to watch – that`,`choosing – watching – what`,`to choose – to watch – what`],ans:0,det:{ref:`[원문] It was nice <b>to choose</b> the movie... / a good opportunity <b>to watch</b> something different / a historical drama <b>that</b> I had been curious about [해석] 영화와 좌석을 직접 <b>고르는 것</b>은 좋았다. / 다른 것을 <b>볼</b> 좋은 기회 / 궁금해했던 역사 드라마. (A) 가주어 It ~ 진주어 to-v 구문이므로 to choose가 적절. (B) opportunity는 to부정사를 형용사적으로 수식받는 명사 → to watch. (C) a historical drama(선행사) + 관계대명사 → that이 적절. what은 선행사를 포함하므로 앞에 명사가 올 수 없다.`,correct:`① to choose – to watch – that: (A) It is nice to-v(가주어-진주어) ✅ (B) opportunity to-v(형용사적 용법) ✅ (C) drama that(선행사+관계대명사) ✅ → 정답 / ② to choose – watching – what: (B) opportunity + watching ❌ / ③ choosing – to watch – that: (A) It is nice choosing ❌ (가주어 It 구문에는 to-v) / ④ choosing – watching – what: (A)(B)(C) 모두 ❌ / ⑤ to choose – to watch – what: (C) drama + what ❌ (선행사가 있으면 that/which)`,wrongs:[],tip:`🔑 ① 가주어 It ~ 진주어 to-v: It is + 형용사 + to-v ② opportunity/chance/ability + to-v (형용사적 용법) ③ 선행사 + that/which (관계대명사) vs. what (선행사 포함, 앞에 명사 불가)`}},
{id:3,type:'어법',diff:'어려움',pts:6,fmt:'mc',note:'어법 ⓐ~ⓓ',passage:`Ever since I was a child, I've always been afraid of water. So I have never enjoyed water activities or <u>ⓐ felt</u> comfortable while doing them. One day, I came across a video clip of my cousin <u>ⓑ surfing</u> at an indoor pool on social media. She assured me that it <u>ⓒ was not</u> too hard, so I signed up for a beginner course. After some help from the instructor, I learned how to balance properly and even managed <u>ⓓ surfing</u> a few waves!`,stem:`다음 글의 밑줄 친 ⓐ~ⓓ 중에서 어법상 어색한 것을 고르시오.`,ch:[`ⓐ felt`,`ⓑ surfing`,`ⓒ was not`,`ⓓ surfing`],ans:3,det:{ref:`[원문] I even managed <b>to surf</b> a few waves! [해석] 나는 심지어 파도 몇 개를 <b>타는 데 성공했다</b>! manage는 to부정사를 목적어로 취하는 동사이므로 managed surfing은 어법에 맞지 않고 managed to surf가 올바르다.`,correct:`ⓐ felt: have never enjoyed ... or felt — 등위접속사 or로 enjoyed와 병렬, 현재완료의 과거분사 ✅ / ⓑ surfing: a video clip of my cousin surfing — 지각 표현, cousin이 서핑하는 동영상(목적격보어 현재분사) ✅ / ⓒ was not: assured me that it was not too hard — that절 내부 과거시제 ✅ / ⓓ surfing: managed surfing ❌ → manage + to-v가 올바른 어법. managed to surf ✅`,wrongs:[],tip:`🔑 manage + to-v (○) / manage + v-ing (✕). to부정사만 목적어로 취하는 동사: want, hope, decide, expect, manage, refuse, promise. 비교: enjoy/finish/mind/avoid + v-ing (동명사만 목적어).`}},
{id:4,type:'어휘',diff:'보통',pts:5,fmt:'mc',note:'어휘 A/B/C',passage:`At first, it felt a bit (A) <b>[awkward / natural]</b> and lonely to sit in the theater by myself. But once the movie started, I became completely (B) <b>[absorbed / distracted]</b> in the story. It was so satisfying just to focus on the movie itself. This experience made me (C) <b>[realize / forget]</b> that I sometimes enjoy doing things alone.`,stem:`다음 글의 괄호 (A), (B), (C)에서 문맥에 맞는 낱말을 골라 바르게 짝지은 것을 고르시오.`,ch:[`awkward – absorbed – realize`,`awkward – distracted – forget`,`natural – absorbed – realize`,`natural – distracted – realize`,`awkward – absorbed – forget`],ans:0,det:{ref:`[원문] At first, it felt a bit <b>awkward</b> and lonely ... I became completely <b>absorbed</b> in the story ... This experience made me <b>realize</b> that I sometimes enjoy doing things alone. [해석] 처음에는 혼자 극장에 앉아 있는 것이 약간 <b>어색하고</b> 외로웠다. 하지만 영화가 시작되자 나는 이야기에 완전히 <b>몰입했다</b>. 이 경험은 나에게 혼자 하는 것을 즐기기도 한다는 것을 <b>깨닫게</b> 해 주었다.`,correct:`① awkward – absorbed – realize: (A) 혼자 앉아 있어 '어색한(awkward)' ✅ (B) 이야기에 '몰입된(absorbed)' ✅ (C) '깨달았다(realize)' ✅ → 정답 / ② awkward – distracted – forget: (B) distracted(산만한)은 문맥 반대 ❌ / ③ natural – absorbed – realize: (A) natural은 '어색하고 외로웠다'와 불일치 ❌ / ④ natural – distracted – realize: (A)(B) 모두 불일치 ❌ / ⑤ awkward – absorbed – forget: (C) forget은 깨달음의 문맥과 반대 ❌`,wrongs:[],tip:`🔑 awkward(어색한) ↔ natural/comfortable. absorbed in(~에 몰입한) ↔ distracted(산만한). realize(깨닫다) ≈ recognize ↔ forget(잊다).`}},
{id:5,type:'어휘',diff:'어려움',pts:6,fmt:'mc',note:'어휘 부적절',passage:`Of all the challenges I chose for myself, the third one made me the most ① <u>nervous</u>: changing my hairstyle. For many years, I had kept the same hairstyle because I had been ② <u>confident</u> about my forehead. I had always thought it was large, and I didn't want to draw attention to it. Since I was feeling ③ <u>encouraged</u> after the first two challenges, I went to a hair salon and talked to the stylist. He listened to my ④ <u>concerns</u> and helped me find a shorter hairstyle that ⑤ <u>suited</u> me.`,stem:`다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 적절하지 않은 것을 고르시오.`,ch:[`① nervous`,`② confident`,`③ encouraged`,`④ concerns`,`⑤ suited`],ans:1,det:{ref:`[원문] I had kept the same hairstyle because I had been <b>worried</b> about my forehead. [해석] 나는 이마에 대해 <b>걱정했기 때문에</b> 같은 헤어스타일을 유지해 왔다. 원문에서는 worried(걱정하는)인데 ②번에 confident(자신감 있는)로 바뀌어 있다. 이마가 크다고 걱정해서 같은 머리를 유지했다는 문맥에서 confident는 의미가 정반대이므로 부적절하다.`,correct:`① nervous: 세 번째 도전이 가장 '긴장되는' → 문맥 적절 ✅ / ② confident: 이마에 대해 '걱정했기 때문에' 같은 스타일 유지 → confident(자신감 있는)은 문맥과 반대 ❌ → worried가 원문 / ③ encouraged: 첫 두 도전 후 '용기가 생겨서' ✅ / ④ concerns: 고민(걱정)을 들어주었다 ✅ / ⑤ suited: 어울리는 헤어스타일 ✅`,wrongs:[],tip:`🔑 worried(걱정하는) ↔ confident(자신감 있는). 문맥 단서: 이마가 크다고 생각 + 주목받고 싶지 않았다 → 부정적 감정(worried). nervous ≈ anxious ≈ worried. suit(어울리다) ≈ fit, match.`}},
{id:6,type:'어휘',diff:'보통',pts:5,fmt:'mc',note:'어휘 부적절',passage:`At the beginning of the lesson, it was hard just to stand up on the board. After some help from the instructor, however, I learned how to balance properly and even managed to surf a few waves! It gave me such a rush of ① <u>excitement</u>. Being in the water wasn't as ② <u>bad</u> as I had thought. While the experience didn't completely change my mind about water sports, it did help me ③ <u>ignore</u> my sense of adventure. Through these experiences, we all realized how ④ <u>important</u> it is to push ourselves to try new things. We gained different ⑤ <u>perspectives</u> on life.`,stem:`다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 적절하지 않은 것을 고르시오.`,ch:[`① excitement`,`② bad`,`③ ignore`,`④ important`,`⑤ perspectives`],ans:2,det:{ref:`[원문] it did help me <b>discover</b> my sense of adventure. [해석] 그것은 나의 모험심을 <b>발견하는 데</b> 도움이 되었다. 원문에서는 discover(발견하다)인데 ③번에 ignore(무시하다)로 바뀌어 있다. 서핑 경험이 모험심을 '발견'하게 해 주었다는 긍정적 문맥에서 ignore(무시하다)는 부적절하다.`,correct:`① excitement: 파도를 타면서 흥분의 전율 → 문맥 적절 ✅ / ② bad: 물에 있는 것이 생각만큼 나쁘지 않았다 ✅ / ③ ignore: 모험심을 '무시하다'는 문맥과 반대 ❌ → 원문은 discover(발견하다) / ④ important: 새로운 것을 시도하는 것이 '중요한지' ✅ / ⑤ perspectives: 다양한 '관점'을 얻었다 ✅`,wrongs:[],tip:`🔑 discover(발견하다) ≈ find out, uncover ↔ ignore(무시하다). sense of adventure = 모험심. a rush of excitement = 흥분의 전율. perspective(관점) ≈ viewpoint.`}},
{id:7,type:'대의',diff:'보통',pts:5,fmt:'mc',note:'주제',passage:`"To grow into a better version of ourselves, we should not stay as we are." That was the first thing our teacher said to us on the first day of school. She wanted us to start the semester by pushing ourselves out of our comfort zones and learning more about ourselves. To help us do so, she gave us an assignment to challenge ourselves in three different ways. Through these experiences, we all realized how important it is to push ourselves to try new things. We gained different perspectives on life and had a lot of fun, too!`,stem:`다음 글의 주제로 가장 적절한 것을 고르시오.`,ch:[`the importance of keeping familiar routines`,`benefits of stepping out of comfort zones`,`ways to improve academic performance`,`how to maintain good relationships with classmates`,`the role of teachers in students' daily lives`],ans:1,det:{ref:`[원문] She wanted us to start the semester by pushing ourselves out of our comfort zones ... We all realized how important it is to push ourselves to try new things. [해석] 선생님은 우리가 안전지대를 벗어나 자신에 대해 더 많이 배우길 원했다. 우리 모두 새로운 것을 시도하는 것이 얼마나 중요한지 깨달았다.`,correct:`① keeping familiar routines: 익숙한 루틴 유지 → 글 내용과 정반대 ❌ / ② benefits of stepping out of comfort zones: 안전지대를 벗어나는 것의 이점 → 핵심 주제 ✅ / ③ academic performance: 학업 성적 → 언급 없음 ❌ / ④ relationships with classmates: 급우 관계 → 주제 아님 ❌ / ⑤ role of teachers: 교사 역할 → 도입부에만 등장 ❌`,wrongs:[],tip:`🔑 주제 찾기: 첫 문장(주제문) + 마지막 문장(요약)에 주목. comfort zone = 안전지대. step out of = 벗어나다.`}},
{id:8,type:'대의',diff:'보통',pts:5,fmt:'mc',note:'제목',passage:`I learned a lot about myself through this assignment, and I found out that my classmates did, too. One of them tried new foods from different countries, while another joined a creative writing club. Through these experiences, we all realized how important it is to push ourselves to try new things. We gained different perspectives on life and had a lot of fun, too! We never know what we're capable of until we try!`,stem:`다음 글의 제목으로 가장 적절한 것을 고르시오.`,ch:[`The Secret to Academic Success`,`Discover Yourself by Taking on Challenges`,`Why Friends Matter More Than Anything`,`Learning to Be Patient with Others`,`The Dangers of Trying New Things`],ans:1,det:{ref:`[원문] I learned a lot about myself ... We never know what we're capable of until we try! [해석] 나는 이 과제를 통해 나 자신에 대해 많은 것을 배웠다. 시도하기 전까지 무엇을 할 수 있는지 모른다!`,correct:`① Academic Success → 학업 이야기 아님 ❌ / ② Discover Yourself by Taking on Challenges → 도전을 통한 자기발견 = 핵심 ✅ / ③ Why Friends Matter → 주제 아님 ❌ / ④ Learning to Be Patient → 언급 없음 ❌ / ⑤ Dangers of Trying New Things → 글과 정반대 ❌`,wrongs:[],tip:`🔑 제목: 글의 핵심을 함축적으로 표현. 키워드: challenges(도전) + discover yourself(자기발견). capable of = ~할 수 있는. take on a challenge = 도전에 맞서다.`}},
{id:9,type:'대의',diff:'어려움',pts:6,fmt:'mc',note:'시사점',passage:`This experience made me realize that I sometimes enjoy doing things alone. After the movie, I promised myself that I would try to make my own choices more often. While the experience didn't completely change my mind about water sports, it did help me discover my sense of adventure. I didn't expect that stepping out of my comfort zone would have such a positive effect on how I felt about myself.`,stem:`다음 글이 시사하는 바로 가장 적절한 것을 고르시오.`,ch:[`Doing things alone always leads to loneliness.`,`Small challenges can lead to meaningful self-discovery.`,`It is best to avoid things that make us uncomfortable.`,`People should focus on what they are already good at.`,`Changing one's appearance is the most effective way to gain confidence.`],ans:1,det:{ref:`[원문] I didn't expect that stepping out of my comfort zone would have such a <b>positive effect</b> on how I felt about myself. [해석] 안전지대를 벗어나는 것이 나 자신에 대한 감정에 그렇게 <b>긍정적인 영향</b>을 줄 줄 몰랐다.`,correct:`① 혼자 하면 항상 외롭다 → 혼자 하는 것을 즐기기도 한다고 깨달음 ❌ / ② 작은 도전이 의미 있는 자기발견으로 → 세 가지 도전 모두 자기 이해로 연결 ✅ / ③ 불편한 것을 피하라 → 글과 정반대 ❌ / ④ 이미 잘하는 것에 집중 → 새로운 것 시도와 반대 ❌ / ⑤ 외모 변화가 가장 효과적 → 세 도전 중 하나일 뿐 ❌`,wrongs:[],tip:`🔑 시사점: 구체적 사례 → 일반적 교훈. positive effect(긍정적 영향), self-discovery(자기발견). step out of comfort zone = 안전지대를 벗어나다.`}},
{id:10,type:'일치',diff:'쉬움',pts:3,fmt:'mc',note:'일치',passage:`Going to the theater alone was something I had never done before. So, for the first challenge, I decided to give it a try. It was nice to choose the movie and the seat on my own. I didn't have to worry about anyone else's preferences. I saw the experience as a good opportunity to watch something different, so I chose a historical drama that I had been curious about.`,stem:`다음 글의 내용과 일치하는 것을 고르시오.`,ch:[`필자는 이전에 혼자 극장에 가 본 적이 있다.`,`필자는 친구가 고른 영화를 함께 보았다.`,`필자는 첫 번째 도전으로 혼자 영화 보기를 선택했다.`,`필자는 평소 즐겨 보던 액션 영화를 선택했다.`,`필자는 좌석을 다른 사람이 골라 주었다.`],ans:2,det:{ref:`[원문] Going to the theater alone was something I had never done before. So, for the first challenge, I decided to give it a try. [해석] 혼자 극장에 가는 것은 전에 한 번도 해 본 적이 없는 것이었다. 그래서 첫 번째 도전으로 한번 해 보기로 결심했다.`,correct:`① 이전에 혼자 극장에 가 본 적 있다 → had never done before ❌ / ② 친구가 고른 영화를 함께 보았다 → choose on my own ❌ / ③ 첫 번째 도전으로 혼자 영화 보기 → 원문과 일치 ✅ / ④ 액션 영화를 선택 → chose a historical drama ❌ / ⑤ 좌석을 다른 사람이 골라 줌 → choose the seat on my own ❌`,wrongs:[],tip:`🔑 일치: 선지와 원문 하나하나 대조. give it a try = 한번 해 보다. on my own = 혼자서 ≈ by myself.`}},
{id:11,type:'불일치',diff:'보통',pts:5,fmt:'mc',note:'불일치',passage:`Ever since I was a child, I've always been afraid of water. So I have never enjoyed water activities or felt comfortable while doing them. One day, I came across a video clip of my cousin surfing at an indoor pool on social media. It looked fun, and I liked the fact that it took place in a shallow pool, not in the ocean. I messaged my cousin about it. She assured me that it wasn't too hard, so I signed up for a beginner course.`,stem:`다음 글의 내용과 일치하지 않는 것을 고르시오.`,ch:[`필자는 어릴 때부터 물을 무서워했다.`,`필자는 SNS에서 사촌이 서핑하는 영상을 보았다.`,`서핑은 바다가 아니라 실내 수영장에서 이루어졌다.`,`사촌은 서핑이 매우 어려울 것이라고 경고했다.`,`필자는 초보자 과정에 등록했다.`],ans:3,det:{ref:`[원문] She <b>assured</b> me that it <b>wasn't too hard</b>. [해석] 사촌은 그것이 <b>너무 어렵지 않다</b>고 <b>안심시켰다</b>. ④번은 '매우 어려울 것이라고 경고했다'로 원문과 정반대이므로 불일치한다.`,correct:`① 어릴 때부터 물을 무서워 → afraid of water ✅ 일치 / ② SNS에서 사촌 서핑 영상 → came across on social media ✅ 일치 / ③ 실내 수영장 → indoor pool, not in the ocean ✅ 일치 / ④ 매우 어려울 것이라고 경고 → assured it wasn't too hard ❌ 불일치 / ⑤ 초보자 과정 등록 → signed up for a beginner course ✅ 일치`,wrongs:[],tip:`🔑 불일치: 반대 의미로 바꾼 선지 주의! assure(안심시키다) ↔ warn(경고하다). come across = 우연히 발견하다. sign up for = 등록하다.`}},
{id:12,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',note:'빈칸(구)',passage:`At first, it felt a bit awkward and lonely to sit in the theater by myself. But once the movie started, I became completely absorbed in the story. It was so satisfying just to focus on the movie itself. There was nothing to distract me! This experience made me realize that I sometimes enjoy doing things alone. After the movie, I promised myself that I would try to __________ more often and enjoy more activities by myself in the future.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,ch:[`follow other people's opinions`,`make my own choices`,`avoid going to the theater`,`rely on my friends for fun`,`stay within my comfort zone`],ans:1,det:{ref:`[원문] I promised myself that I would try to <b>make my own choices</b> more often. [해석] 나는 앞으로 더 자주 <b>나만의 선택을 하겠다</b>고 스스로에게 약속했다.`,correct:`① follow other people's opinions → 혼자 결정하는 문맥과 반대 ❌ / ② make my own choices → 원문 일치 ✅ / ③ avoid going to the theater → 극장 경험이 좋았으므로 반대 ❌ / ④ rely on my friends → 혼자 하는 것을 즐긴다는 문맥과 불일치 ❌ / ⑤ stay within my comfort zone → 안전지대를 벗어나는 주제와 반대 ❌`,wrongs:[],tip:`🔑 빈칸: 앞뒤 문맥 단서. 'on my own' + 'by myself' → 스스로 선택. make one's own choice = 스스로 결정하다.`}},
{id:13,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',note:'빈칸(문장)',passage:`Of all the challenges I chose for myself, the third one made me the most nervous: changing my hairstyle. For many years, I had kept the same hairstyle because I had been worried about my forehead. Since I was feeling confident after the first two challenges, I went to a hair salon. The next day at school, my classmates were a bit surprised. But overall, the reactions were positive. I realized that trying a different look wasn't as difficult as I thought it would be. In fact, __________.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,ch:[`it made me want to go back to my old hairstyle`,`my classmates didn't notice any change at all`,`it made me feel more confident about myself`,`the stylist couldn't find a style that suited me`,`I decided never to change my appearance again`],ans:2,det:{ref:`[원문] In fact, <b>it made me feel more confident about myself</b>. [해석] 사실, 그것은 나를 <b>나 자신에 대해 더 자신감을 갖게</b> 해 주었다.`,correct:`① 이전 스타일로 돌아가고 싶었다 → 긍정적 반응이 있었으므로 부적절 ❌ / ② 급우들이 변화를 알아채지 못함 → 'a bit surprised'와 모순 ❌ / ③ 더 자신감을 갖게 되었다 → 'In fact'로 강화되는 표현 ✅ / ④ 스타일리스트가 찾지 못함 → 'helped me find'와 모순 ❌ / ⑤ 다시는 바꾸지 않겠다 → 긍정적 결과와 반대 ❌`,wrongs:[],tip:`🔑 'In fact'는 앞 내용을 강화/구체화. 앞: 어렵지 않았다 → 뒤: 오히려 자신감이 생겼다. confident about oneself = 자신에 대해 자신감 있는.`}},
{id:14,type:'함축',diff:'보통',pts:5,fmt:'mc',note:'함축',passage:`Through these experiences, we all realized how important it is to push ourselves to try new things. We gained different perspectives on life and had a lot of fun, too! My classmates and I even talked about setting more challenges for ourselves. There are always more things that we can discover about ourselves, and it's exciting to keep learning and growing. <u>We never know what we're capable of until we try!</u>`,stem:`다음 글에서 밑줄 친 "We never know what we're capable of until we try!"가 의미하는 바로 가장 적절한 것을 고르시오.`,ch:[`실패를 두려워하면 아무것도 할 수 없다.`,`시도해 보기 전에는 자신의 잠재력을 알 수 없다.`,`남들과 경쟁해야 실력이 향상된다.`,`노력 없이 성공할 수 있는 것은 없다.`,`능력은 타고나는 것이지 만들어지는 것이 아니다.`],ans:1,det:{ref:`[원문] We never know what we're <b>capable of</b> until we try! [해석] 우리는 <b>시도하기 전까지</b> 우리가 무엇을 <b>할 수 있는지</b> 결코 알지 못한다!`,correct:`① 실패를 두려워하면 → 두려움보다 잠재력 발견에 초점 ❌ / ② 시도해 보기 전에는 잠재력을 알 수 없다 → capable of + until we try = 잠재력 발견 ✅ / ③ 남들과 경쟁해야 → 경쟁 언급 없음 ❌ / ④ 노력 없이 성공 → 시도와 발견의 문맥 ❌ / ⑤ 능력은 타고나는 것 → 시도를 통해 발견한다는 글과 반대 ❌`,wrongs:[],tip:`🔑 함축: 키워드 분석. capable of = 할 수 있는(잠재력). until we try = 시도하기 전까지. 핵심: 도전/시도 → 숨겨진 잠재력 발견.`}},
{id:15,type:'순서',diff:'보통',pts:5,fmt:'mc',note:'순서',passage:`<b>[주어진 글]</b> Ever since I was a child, I've always been afraid of water. So I have never enjoyed water activities or felt comfortable while doing them.<br><br><b>(A)</b> She assured me that it wasn't too hard, so I signed up for a beginner course. At the beginning of the lesson, it was hard just to stand up on the board.<br><br><b>(B)</b> One day, I came across a video clip of my cousin surfing at an indoor pool on social media. It looked fun, and I liked the fact that it took place in a shallow pool, not in the ocean. I messaged my cousin about it.<br><br><b>(C)</b> After some help from the instructor, however, I learned how to balance properly and even managed to surf a few waves! It gave me such a rush of excitement.`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것을 고르시오.`,ch:[`(A)-(B)-(C)`,`(A)-(C)-(B)`,`(B)-(A)-(C)`,`(B)-(C)-(A)`,`(C)-(A)-(B)`],ans:2,det:{ref:`[흐름] 주어진 글: 물이 무서웠다 → (B) SNS에서 사촌 서핑 영상 발견, 사촌에게 연락 → (A) 사촌이 안심시켜 등록, 처음에는 어려웠음 → (C) 강사 도움으로 성공, 흥분의 전율`,correct:`① (A)-(B)-(C): She(사촌)가 갑자기 등장 → 소개 없이 불가 ❌ / ② (A)-(C)-(B): 마찬가지 ❌ / ③ (B)-(A)-(C): (B) 발견+연락 → (A) 답변+등록+어려움 → (C) 극복+성공 ✅ / ④ (B)-(C)-(A): 시간 순서 역행 ❌ / ⑤ (C)-(A)-(B): 시간 순서 역행 ❌`,wrongs:[],tip:`🔑 순서 배열: 지시어(She→사촌), 시간 순서, 논리적 흐름 추적. however는 앞의 어려움과 대조.`}},
{id:16,type:'무관',diff:'쉬움',pts:3,fmt:'mc',note:'무관문장',passage:`① I learned a lot about myself through this assignment, and I found out that my classmates did, too. ② One of them tried new foods from different countries, while another joined a creative writing club. ③ <u>The school cafeteria recently changed its menu to include more international dishes.</u> ④ Through these experiences, we all realized how important it is to push ourselves to try new things. ⑤ We gained different perspectives on life and had a lot of fun, too!`,stem:`다음 글에서 전체 흐름과 관계없는 문장을 고르시오.`,ch:[`①`,`②`,`③`,`④`,`⑤`],ans:2,det:{ref:`[해석] ③ <b>학교 구내식당이 최근 메뉴를 바꿔 국제 요리를 더 많이 포함시켰다.</b> → 개인의 도전과 자기발견이라는 글의 흐름과 무관하다.`,correct:`① 과제를 통한 자기발견 → 주제 일치 ✅ / ② 급우들의 다양한 도전 → 주제 뒷받침 ✅ / ③ 학교 구내식당 메뉴 변경 → 개인의 도전과 무관 ❌ 무관 / ④ 새로운 것 시도의 중요성 → 주제 강화 ✅ / ⑤ 다양한 관점과 즐거움 → 주제 마무리 ✅`,wrongs:[],tip:`🔑 무관 문장: 주제(도전→자기발견)와 관련 없는 '학교 시설/메뉴' 이야기. 'international dishes'가 ②의 'new foods'와 비슷해 보이지만 주체가 '학교 구내식당'이므로 무관.`}},
{id:17,type:'TF',diff:'쉬움',pts:3,fmt:'mc',note:'T/F',passage:`The next day at school, my classmates were a bit surprised. But overall, the reactions were positive. I realized that trying a different look wasn't as difficult as I thought it would be. In fact, it made me feel more confident about myself. I didn't expect that stepping out of my comfort zone would have such a positive effect on how I felt about myself.`,stem:`다음 글의 내용으로 보아, 아래 문장이 맞으면 T, 틀리면 F를 고르시오.<br><br>📌 <b>"필자는 세 번째 도전 후에 자신의 외모에 대해 더 자신감을 갖게 되었다."</b>`,ch:[`T (맞다)`,`F (틀리다)`],ans:0,det:{ref:`[원문] it made me feel <b>more confident about myself</b>. [해석] 그것은 나를 <b>나 자신에 대해 더 자신감 있게</b> 만들어 주었다. 따라서 T(맞다)이다.`,correct:`T(맞다): 원문에 'more confident about myself' 명시 → 외모 변화 후 자신감 향상 ✅ / F(틀리다): 원문과 일치하므로 ❌`,wrongs:[],tip:`🔑 T/F: 핵심 키워드 대조. '자신감(confident)' + '세 번째 도전 후' → 원문 정확히 일치. positive effect = 긍정적 영향.`}},
{id:18,type:'서술형',diff:'보통',pts:5,fmt:'written',note:'서술형 요약',passage:`"To grow into a better version of ourselves, we should not stay as we are." She wanted us to start the semester by pushing ourselves out of our comfort zones and learning more about ourselves. She gave us an assignment to challenge ourselves in three different ways. There are always more things that we can discover about ourselves.`,stem:`다음 글을 읽고, 빈칸에 들어갈 알맞은 영어 단어를 주어진 조건에 맞게 쓰시오.<br><br>📌 <b>조건:</b> 본문에 사용된 단어를 활용할 것<br>📌 <b>보기:</b> comfort / discover / challenges<br><br>▸ Through the three ________, the writer was able to step out of her ________ zone and ________ new things about herself.`,wa:`challenges, comfort, discover`,accept:[`challenges, comfort, discover`,`challenges,comfort,discover`,`challenges / comfort / discover`,`challenges comfort discover`,`Challenges, Comfort, Discover`,`challenges , comfort , discover`],det:{ref:`[원문] challenge ourselves ... comfort zones ... discover about ourselves [해석] 세 가지 도전을 통해 안전지대를 벗어나 자신에 대한 새로운 것을 발견할 수 있었다.`,correct:`첫 번째 빈칸: three ________는 challenges ✅ / 두 번째 빈칸: ________ zone은 comfort ✅ / 세 번째 빈칸: ________ new things는 discover ✅`,wrongs:[],tip:`🔑 요약형 서술: 본문 핵심 키워드 파악. challenge → challenges(복수), comfort zone, discover(발견하다). step out of = 벗어나다.`}},
{id:19,type:'서술형',diff:'어려움',pts:7,fmt:'written',note:'서술형 영작',passage:`I didn't expect that stepping out of my comfort zone would have such a positive effect on how I felt about myself.`,stem:`다음 <조건>에 맞게 괄호 안의 단어를 활용하여 영작하시오.<br><br>📌 <b>조건:</b><br>- 주어진 단어를 모두 사용하고 필요시 어형을 변환할 것<br>- 총 10단어 내외로 작성할 것<br><br>📌 <b>보기:</b> expect / step out of / positive effect<br><br>▸ 한글: "나는 안전지대를 벗어나는 것이 그렇게 긍정적인 영향을 줄 줄 <u>예상하지 못했다</u>."`,wa:`I didn't expect stepping out of my comfort zone to have such a positive effect.`,accept:[`I didn't expect stepping out of my comfort zone to have such a positive effect.`,`I did not expect stepping out of my comfort zone to have such a positive effect.`,`I didn't expect that stepping out of my comfort zone would have such a positive effect.`,`I did not expect that stepping out of my comfort zone would have such a positive effect.`,`i didn't expect stepping out of my comfort zone to have such a positive effect`,`I didn't expect stepping out of my comfort zone to have such a positive effect`],det:{ref:`[원문] I didn't expect that stepping out of my comfort zone would have such a positive effect. [해석] 나는 안전지대를 벗어나는 것이 그렇게 긍정적인 영향을 줄 줄 예상하지 못했다.`,correct:`핵심 구문: didn't expect + stepping out of my comfort zone + positive effect. expect + that + S + would + V 또는 expect + O + to-V 구문 모두 가능.`,wrongs:[],tip:`🔑 expect + that절 / expect + O + to-v. step out of → stepping out of(동명사). positive effect = 긍정적 영향. such a + 형용사 + 명사.`}},
{id:20,type:'서술형',diff:'쉬움',pts:3,fmt:'written',note:'서술형 어형',passage:`At the beginning of the lesson, it was hard just to stand up on the board. After some help from the instructor, however, I learned how to balance properly and even managed ________(surf) a few waves! It gave me such a rush of excitement.`,stem:`다음 괄호 안의 단어를 어법에 맞게 변형하여 쓰시오.<br><br>▸ I learned how to balance properly and even managed ________(surf) a few waves!`,wa:`to surf`,accept:[`to surf`,`To surf`,`to Surf`,`To Surf`],det:{ref:`[원문] managed <b>to surf</b> a few waves! [해석] 파도 몇 개를 <b>타는 데 성공했다</b>! manage + to-v가 올바른 어법.`,correct:`manage + to-v = '~하는 데 성공하다'. managed to surf ✅ / managed surfing ✕ / managed surf ✕`,wrongs:[],tip:`🔑 manage + to-v (○) / manage + v-ing (✕). to부정사만 목적어: want, hope, decide, expect, manage, refuse, promise, afford, agree.`}}];
const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn" onclick="shareResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;
r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}
h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;
if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;
if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;
h+=`</div></div>`;});h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);window._lastResult=r;window._lastElapsed=elapsed;}
function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`🎯 온라인퀴즈 TEST 결과\n${EI.subject} · ${EI.pub} · ${EI.lesson}\n${nm} · ${lv.icon}${lv.name} · ${r.score}점/100점 ${pass?'✅통과':'❌미통과'}\n✅${r.correct} ❌${r.wrong} ⬜${r.unanswered}`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{toast('복사에 실패했습니다.');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
</script>
</body>
</html>
