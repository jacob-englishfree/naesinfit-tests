<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인퀴즈 TEST - 공통영어1 능률(오선영) 4과</title>
<style>
:root{--o:#E8772E;--od:#B85A1A;--ol:#F5A623;--oxl:#FFF3E8;--oxxl:#FFFAF5;--bg:#F6F2EE;--text:#1E1B18;--tm:#6B6560;--tl:#A09890;--g:#1A9960;--gl:#E6F9F0;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--p:#7C4DFF;--pl:#F3EEFF;--sky:#0EA5E9;--skyl:#E8F6FF;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#d0ccc8;border-radius:3px;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.012;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
#startScreen{align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#FFFAF5,#F6F2EE 40%,#FFF3E8);position:relative;}
.start-container{max-width:460px;width:100%;position:relative;z-index:1;}
.brand-badge{background:linear-gradient(135deg,var(--o),var(--ol));color:#fff;font-size:12px;font-weight:800;padding:7px 16px;border-radius:24px;letter-spacing:.8px;box-shadow:0 4px 14px rgba(232,119,46,.25);display:inline-block;margin-bottom:20px;}
.start-title{font-size:36px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}.start-title span{background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.start-subtitle{font-size:14px;color:var(--tm);margin-bottom:30px;font-weight:500;}
.info-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.info-card-header{background:linear-gradient(135deg,var(--o),var(--ol));padding:14px 20px;color:#fff;font-size:13px;font-weight:700;}
.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #f5f1ed;}.info-row:last-child{border:none;}.info-label{color:var(--tm);font-weight:500;}.info-value{font-weight:700;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}.chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid #ebe7e3;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:600;color:var(--tm);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.input-group{margin-bottom:14px;}.input-group label{display:block;font-size:12px;font-weight:700;color:var(--tm);margin-bottom:6px;}
.input-group input,.input-group select{width:100%;padding:13px 16px;border:2px solid #e8e4e0;border-radius:var(--rs);font-size:15px;font-family:inherit;background:#fff;transition:var(--tr);}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(232,119,46,.1);}
.input-row{display:flex;gap:10px;}
.btn{padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--tr);width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 6px 20px rgba(232,119,46,.3);margin-top:12px;}.btn-primary:hover{transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid #e0dcd8;color:var(--tm);margin-top:8px;font-size:14px;padding:12px;}.btn-outline:hover{border-color:var(--o);color:var(--o);}
.history-badge{background:var(--oxl);color:var(--o);font-weight:800;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;}
#historyPanel{display:none;margin-top:14px;}
.history-item{background:var(--card);border:1.5px solid #ebe7e3;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.history-item .hi-left .hi-name{font-weight:700;font-size:13px;}.history-item .hi-left .hi-meta{font-size:11px;color:var(--tl);}
.history-item .hi-right .hi-score{font-size:20px;font-weight:900;color:var(--o);}.history-item .hi-right .hi-level{font-size:10px;color:var(--tm);text-align:right;}
#examScreen{min-height:100vh;}
.exam-topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:10px;}.topbar-dot{width:8px;height:8px;background:var(--o);border-radius:50%;}
.topbar-info{font-size:13px;color:var(--tm);font-weight:600;}.topbar-info span{color:var(--o);font-weight:800;}
.timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;}.timer.warn{color:var(--o);}.timer.danger{color:var(--r);animation:pulse .6s infinite;}
@keyframes pulse{50%{opacity:.3;}}
.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.q-header{display:flex;align-items:center;gap:10px;padding:16px 22px;background:linear-gradient(135deg,#FFFAF5,#FFF6EE);border-bottom:1px solid #f0ece8;}
.q-num{width:36px;height:36px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;box-shadow:0 3px 8px rgba(232,119,46,.25);}
.q-type-tag{font-size:11px;font-weight:800;padding:4px 12px;border-radius:14px;}
.tag-어법{background:var(--rl);color:var(--r);}.tag-어휘{background:var(--bl);color:var(--b);}.tag-대의{background:var(--gl);color:var(--g);}.tag-일치{background:var(--oxl);color:var(--od);}.tag-빈칸{background:var(--pl);color:var(--p);}.tag-함축{background:#FFF0F5;color:#D946A0;}.tag-순서{background:var(--skyl);color:var(--sky);}.tag-무관{background:#F0FDF4;color:#16A34A;}.tag-서술형{background:var(--gl);color:var(--g);}.tag-지칭{background:#FEF3C7;color:#D97706;}.tag-TF{background:#E0E7FF;color:#4338CA;}.tag-불일치{background:var(--oxl);color:var(--od);}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#f5f1ed;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--o);font-weight:800;}
.q-body{padding:22px;}
.q-passage{background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-left:4px solid var(--o);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-passage .label{font-size:11px;font-weight:800;color:var(--o);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.q-passage u{text-decoration-color:var(--o);text-decoration-thickness:2px;text-underline-offset:3px;}
.q-stem{font-size:15px;font-weight:700;margin-bottom:18px;line-height:1.7;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #ebe7e3;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;position:relative;overflow:hidden;}
.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}
.choice-btn.selected{border-color:var(--o);box-shadow:0 0 0 3px rgba(232,119,46,.12);background:var(--oxxl);}
.c-num{min-width:26px;height:26px;background:#f0ece8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}
.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #e0dcd8;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}
.written-input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(232,119,46,.08);}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:65%;}
.nav-dot{width:28px;height:28px;border-radius:50%;background:#ebe7e3;cursor:pointer;border:none;font-size:10px;font-weight:800;color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:var(--tr);}
.nav-dot.current{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 3px 10px rgba(232,119,46,.3);transform:scale(1.08);}
.nav-dot.answered{background:var(--g);color:#fff;}
.nav-btn{padding:9px 18px;background:#fff;border:2px solid #e0dcd8;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#f0ece8;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(232,119,46,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #ebe7e3;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F8F5F0;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}
</style>
</head>
<body>
<div class="grain"></div><div class="toast" id="toast"></div>
<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">🎯 내신핏</div>
  <h1 class="start-title">온라인퀴즈 <span>TEST</span></h1>
  <p class="start-subtitle">능률(오선영) 4과 · Pictures Worth a Thousand Words</p>
  <div class="info-card"><div class="info-card-header">📚 시험 정보</div><div class="info-rows">
    <div class="info-row"><span class="info-label">과목</span><span class="info-value">공통영어1</span></div>
    <div class="info-row"><span class="info-label">출판사</span><span class="info-value">능률(오선영)</span></div>
    <div class="info-row"><span class="info-label">단원</span><span class="info-value">4과 Pictures Worth a Thousand Words</span></div>
  </div></div>
  <div class="chip-row"><div class="chip">📝 20문항</div><div class="chip">⏱️ 20분</div><div class="chip">✅ 80점 이상 통과</div><div class="chip">📊 100점 만점</div></div>
  <div class="input-group"><label>이름 *</label><input type="text" id="inpName" placeholder="이름을 입력하세요"></div>
  <div class="input-row"><div class="input-group" style="flex:1"><label>학교</label><input type="text" id="inpSchool" placeholder="선택"></div><div class="input-group" style="flex:.6"><label>학년</label><select id="inpGrade"><option>고1</option><option selected>고2</option><option>고3</option></select></div></div>
  <button class="btn btn-primary" onclick="startExam()">시험 시작하기 →</button>
  <button class="btn btn-outline" onclick="toggleHistory()">📋 시험 기록 보기 <span class="history-badge" id="hCount">0</span></button>
  <div id="historyPanel"></div>
</div>
</div>
<div id="examScreen" class="screen">
  <div class="exam-topbar"><div class="topbar-left"><div class="topbar-dot"></div><div class="topbar-info">공통영어1 · 능률(오선영) · <span>4과</span></div></div><div class="timer" id="timer">20:00</div><button class="btn-submit" onclick="submitExam()">제출하기</button></div>
  <div class="exam-scroll" id="examScroll"></div>
  <div class="exam-nav"><button class="nav-btn" onclick="scrollToQ(S.cur-1)">←</button><div class="nav-dots" id="navDots"></div><button class="nav-btn" onclick="scrollToQ(S.cur+1)">→</button></div>
</div>
<div id="resultScreen" class="screen"></div>
<script>

{"id": 1, "type": "어법", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "As quickly as a camera captures a scene, an image can grab hold of our emotions. Through speech or written text, it can be difficult <u>ⓐ to convey</u> a complex message quickly. Yet photographs can change people's hearts and minds in an instant. And when the magic of photography <u>ⓑ sparks</u> an emotional reaction in a great number of people, it can change history. In the 1880s, industry began <u>ⓒ to grow</u> rapidly along the Cuyahoga River. This industrial growth <u>ⓓ provided</u> steady jobs to people in the area. Meanwhile, steel mills and factories started <u>ⓔ dump</u> large amounts of waste into the river.", "stem": "다음 글의 밑줄 친 ⓐ~ⓔ 중에서 어법상 <b>어색한 것</b>을 고르시오.", "ch": ["ⓐ", "ⓑ", "ⓒ", "ⓓ", "ⓔ"], "ans": 4, "det": {"ref": "[원문] steel mills and factories started dump large amounts of waste into the river. [해석] 제철소와 공장들이 대량의 폐기물을 강에 버리기 시작했다. start는 to부정사 또는 동명사를 목적어로 취하는 동사입니다. dump(동사원형)는 올 수 없으므로 <b>dumping</b> 또는 <b>to dump</b>로 고쳐야 합니다.", "correct": "ⓐ to convey: 가주어 it ~ 진주어 to convey 구문으로 'It is difficult to convey'는 올바른 형태 ✅ ⓑ sparks: 주어 the magic of photography(단수) → 단수동사 sparks ✅ ⓒ to grow: begin + to-v / v-ing 모두 가능, to grow 적절 ✅ ⓓ provided: 과거 시제로 과거 사실 서술, 주어 growth(단수) → provided ✅ ⓔ dump: start + to-v / v-ing 가능하지만 동사원형 불가 → dumping 또는 to dump여야 함 ❌", "wrongs": [], "tip": "🔑 start / begin + to-v 또는 v-ing: start to dump (○) / start dumping (○) / start dump (✕). 비교: want, hope, wish 등은 to-v만 가능. enjoy, finish, mind 등은 v-ing만 가능."}},
{"id": 2, "type": "어법", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "", "passage": "However, it wasn't long before the 1969 fire became famous. This was thanks to an article (A) <u>[published / publishing]</u> in Time magazine that year. The article featured a shocking photograph of flames and smoke (B) <u>[rising / risen]</u> from the river. But this was not a photograph of the 1969 fire, (C) <u>[which / what]</u> was put out so quickly that nobody took a picture of it.", "stem": "다음 글의 (A), (B), (C)에서 어법에 맞는 표현으로 가장 적절한 것을 고르시오.", "ch": ["published – rising – which", "publishing – rising – which", "published – risen – what", "publishing – risen – which", "published – rising – what"], "ans": 0, "det": {"ref": "[원문] (A) an article published in Time magazine (B) flames and smoke rising from the river (C) the 1969 fire, which was put out so quickly [해석] (A) 타임지에 <b>게재된</b> 기사 — article과 publish는 수동 관계(기사가 게재되는 것)이므로 과거분사 published. (B) 강에서 <b>피어오르는</b> 화염과 연기 — flames/smoke와 rise는 능동 관계(화염이 피어오르는 것)이므로 현재분사 rising. (C) 앞의 the 1969 fire를 선행사로 받는 계속적 용법의 관계대명사 which가 적절합니다. what은 선행사를 포함하므로 콤마 뒤에 올 수 없습니다.", "correct": "① published – rising – which ✅ 모든 어법 규칙에 부합 ② publishing ❌ article은 게재되는 대상(수동)이므로 현재분사 부적절 ③ risen ❌ 자동사 rise의 과거분사지만, 여기서는 '피어오르고 있는' 능동적 동작을 나타내므로 현재분사 rising이 적절; what은 선행사 포함이라 콤마 뒤 불가 ④ publishing – risen ❌ (A)(B) 모두 오류 ⑤ what ❌ 선행사 the 1969 fire가 있으므로 which가 적절", "wrongs": [], "tip": "🔑 과거분사(수동·완료) vs. 현재분사(능동·진행): 수식 명사와의 관계 파악이 핵심. 관계대명사 which vs. what: which는 선행사 필요 + 콤마 뒤 계속적 용법 가능 / what은 선행사 포함(= the thing which)이므로 콤마 뒤 불가."}},
{"id": 3, "type": "어법", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "", "passage": "Lewis Hine, a teacher and photographer, wanted to reveal how cruel this system was. So he quit his teaching job and started to work for the National Child Labor Committee as an investigative photographer. He gained access to factories by <u>ⓐ pretending</u> to have different jobs like insurance agent or fire inspector. Once inside, he would photograph the children <u>ⓑ working</u> there. He would also ask their names and ages and record information about their <u>ⓒ living</u> and working conditions. From 1908 to 1912, he secretly gathered information and took photographs to expose factory owners who <u>ⓓ was taking</u> advantage of helpless children.", "stem": "다음 글의 밑줄 친 ⓐ~ⓓ 중에서 어법상 <b>어색한 것</b>을 고르시오.", "ch": ["ⓐ", "ⓑ", "ⓒ", "ⓓ"], "ans": 3, "det": {"ref": "[원문] factory owners who was taking advantage of helpless children [해석] 무력한 아이들을 이용하고 있던 공장 소유주들. 선행사 factory owners(복수)이므로 관계대명사절의 동사도 복수형이어야 합니다. 따라서 was taking이 아닌 <b>were taking</b>이 와야 합니다.", "correct": "ⓐ pretending: 전치사 by 뒤에 동명사(v-ing)가 오는 것은 올바른 형태 ✅ ⓑ working: the children working there에서 현재분사가 children을 수식(일하고 있는 아이들) ✅ ⓒ living: living and working conditions에서 현재분사의 형용사적 용법(생활·근무 조건) ✅ ⓓ was taking: 선행사 factory owners(복수) → 관계대명사절 동사는 were taking이어야 함 ❌", "wrongs": [], "tip": "🔑 관계대명사절의 동사는 선행사의 수에 일치: owners(복수) → who were / owner(단수) → who was. take advantage of = ~을 이용하다(≈exploit, make use of)."}},
{"id": 4, "type": "어휘", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "Around that time, the attitudes of Americans toward environmental problems were starting to change. More and more people were becoming (A) <u>[aware / ignorant]</u> of the need to protect the environment, and the shocking image of the burning river (B) <u>[sparked / extinguished]</u> public anger about water pollution. As a result, the Cuyahoga River fire of 1969 became a (C) <u>[symbol / solution]</u> of pollution.", "stem": "다음 글의 (A), (B), (C)에서 문맥에 맞는 낱말로 가장 적절한 것을 고르시오.", "ch": ["aware – sparked – symbol", "ignorant – sparked – symbol", "aware – extinguished – symbol", "aware – sparked – solution", "ignorant – extinguished – solution"], "ans": 0, "det": {"ref": "[원문] More and more people were becoming aware of the need to protect the environment, and the shocking image sparked public anger about water pollution. The Cuyahoga River fire of 1969 became a symbol of pollution. [해석] 점점 더 많은 사람들이 환경 보호의 필요성을 <b>인식하게</b> 되었고, 불타는 강의 충격적인 이미지가 수질 오염에 대한 대중의 분노를 <b>촉발했다</b>. 쿠야호가 강 화재는 오염의 <b>상징</b>이 되었다.", "correct": "① aware – sparked – symbol ✅ 환경 인식 증가 + 분노 촉발 + 오염의 상징이라는 흐름에 모두 부합 ② ignorant(무지한) ❌ 사람들이 환경 보호를 인식해가는 맥락과 반대 ③ extinguished(진화시켰다) ❌ 이미지가 분노를 '촉발'했지 '진화'한 것이 아님 ④ solution(해결책) ❌ 화재가 오염의 '해결책'이 아니라 '상징' ⑤ 모두 문맥 반대 ❌", "wrongs": [], "tip": "🔑 aware(인식하는, ≈conscious, informed) ↔ ignorant(무지한) / spark(촉발하다, ≈trigger, ignite) ↔ extinguish(진화하다, 소멸시키다) / symbol(상징) ↔ solution(해결책). become aware of = ~을 인식하게 되다."}},
{"id": 5, "type": "어휘", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "", "passage": "Hine's photographs captured young children doing all sorts of jobs. These included picking vegetables, weaving baskets, and even handling ① <u>dangerous</u> equipment. What is more, the children's faces showed the ② <u>tragic</u> impact of hard labor. When people saw the children's ③ <u>joyless</u> expressions, they could not help but feel ④ <u>indifferent</u>. The pictures were later shown in exhibitions, lectures, magazine articles, and so on. As a result, the public realized just how ⑤ <u>serious</u> the situation was.", "stem": "다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 <b>적절하지 않은 것</b>을 고르시오.", "ch": ["①", "②", "③", "④", "⑤"], "ans": 3, "det": {"ref": "[원문] When people saw the children's joyless expressions, they could not help but feel heartbroken. [해석] 사람들이 아이들의 기쁨 없는 표정을 보았을 때, 가슴이 아프지 않을 수 없었다. 원문에서는 heartbroken(가슴 아픈)이 쓰였으나, ④에 indifferent(무관심한)가 사용되어 문맥과 맞지 않습니다. 아이들의 슬픈 표정을 보고 '무관심'을 느끼는 것은 글의 흐름과 반대입니다.", "correct": "① dangerous(위험한): 위험한 장비를 다루는 아동 노동 → 적절 ✅ ② tragic(비극적인): 고된 노동의 비극적인 영향 → 적절 ✅ ③ joyless(기쁨 없는): 아이들의 기쁨 없는 표정 → 적절 ✅ ④ indifferent(무관심한): 원문 heartbroken(가슴 아픈) → 아이들의 고통스러운 표정에 '무관심'은 문맥과 반대 ❌ ⑤ serious(심각한): 상황이 얼마나 심각한지 깨달음 → 적절 ✅", "wrongs": [], "tip": "🔑 heartbroken(가슴이 찢어지는, ≈devastated, grief-stricken) ↔ indifferent(무관심한, ≈unconcerned, apathetic). cannot help but + 동사원형 = ~하지 않을 수 없다(= cannot help v-ing)."}},
{"id": 6, "type": "어휘", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "In June 1969, the ① <u>polluted</u> river caught fire. The likely cause was a burning flare falling from a train, which set fire to oil-soaked waste beneath a bridge. At that time, few people in Cleveland ② <u>cared</u>. This was because fires had been ③ <u>recorded</u> on the Cuyahoga more than ten times before, and some of them had been much ④ <u>worse</u>. However, it wasn't long before the 1969 fire became ⑤ <u>forgotten</u>.", "stem": "다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 <b>적절하지 않은 것</b>을 고르시오.", "ch": ["①", "②", "③", "④", "⑤"], "ans": 4, "det": {"ref": "[원문] However, it wasn't long before the 1969 fire became famous. [해석] 하지만, 1969년 화재가 유명해지기까지 오래 걸리지 않았다. 원문에서는 famous(유명한)가 쓰였으나, ⑤에 forgotten(잊힌)이 사용되어 문맥에 맞지 않습니다. 타임지 기사 덕분에 '유명해진' 것이지 '잊힌' 것이 아닙니다.", "correct": "① polluted(오염된): 오염된 강이 불에 탔다 → 적절 ✅ ② cared(관심을 가졌다): few(거의 없는)와 함께 '관심을 가진 사람이 거의 없었다' → 적절 ✅ ③ recorded(기록된): 화재가 10번 이상 기록됨 → 적절 ✅ ④ worse(더 나쁜): 일부 화재가 훨씬 더 심했다 → 적절 ✅ ⑤ forgotten(잊힌): 원문 famous(유명한) → '잊힌'은 문맥과 반대 ❌", "wrongs": [], "tip": "🔑 famous(유명한, ≈well-known, renowned) ↔ forgotten(잊힌, ≈overlooked, neglected). It wasn't long before ~ = ~하기까지 오래 걸리지 않았다(= soon). However가 역접 연결어이므로 앞 문장(관심 없었음)과 반대 내용(유명해짐)이 와야 합니다."}},
{"id": 7, "type": "대의", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "As quickly as a camera captures a scene, an image can grab hold of our emotions. Through speech or written text, it can be difficult to convey a complex message quickly. Yet photographs can change people's hearts and minds in an instant. And when the magic of photography sparks an emotional reaction in a great number of people, it can change history. These examples show that photographs can bring meaningful change to society. They prove that, sometimes, a picture truly is worth a thousand words.", "stem": "다음 글의 주제로 가장 적절한 것을 고르시오.", "ch": ["the technical development of camera equipment over time", "the power of photographs to change people's minds and society", "the negative effects of media on public opinion", "the importance of artistic expression in modern photography", "the role of journalists in recording historical events"], "ans": 1, "det": {"ref": "[원문] photographs can change people's hearts and minds in an instant ... photographs can bring meaningful change to society ... a picture truly is worth a thousand words. [해석] 사진이 사람들의 마음을 바꾸고 사회에 의미 있는 변화를 가져올 수 있다는 것이 핵심 주제입니다.", "correct": "① camera equipment development ❌ 카메라 장비의 기술 발전은 미언급 ② 사진의 힘으로 사람의 마음과 사회를 바꾸는 것 ✅ 핵심 주제 정확히 포괄 ③ negative effects of media ❌ 미디어의 부정적 효과가 아닌 긍정적 변화를 다룸 ④ artistic expression ❌ 예술적 표현이 아닌 사회적 영향력이 핵심 ⑤ role of journalists ❌ 기자의 역할이 아닌 사진 자체의 힘이 주제", "wrongs": [], "tip": "🔑 주제 파악: 도입부(photographs can change hearts and minds)와 결론부(a picture is worth a thousand words)에서 반복되는 핵심 메시지에 주목하세요."}},
{"id": 8, "type": "대의", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "In the 19th century, the Industrial Revolution led to a dramatic increase in factory production in the United States. The demand for workers increased, and many new positions were filled by children. By 1900, about twenty percent of all children in the United States were employed, and some of those working in factories were only four years old. Lewis Hine, a teacher and photographer, wanted to reveal how cruel this system was. Hine's photographs captured young children doing all sorts of jobs. When people saw the children's joyless expressions, they could not help but feel heartbroken. As a result, the public realized just how serious the situation was. Soon, many states passed stronger laws to ban the employment of children.", "stem": "다음 글의 제목으로 가장 적절한 것을 고르시오.", "ch": ["How One Photographer's Lens Fought Child Labor", "The Rise of Factory Production in 19th Century America", "Why Children Make Better Factory Workers Than Adults", "The History of Photography as an Art Form", "Economic Benefits of the Industrial Revolution"], "ans": 0, "det": {"ref": "[원문] Lewis Hine wanted to reveal how cruel this system was ... Hine's photographs captured young children ... the public realized ... many states passed stronger laws to ban the employment of children. [해석] Lewis Hine이라는 사진작가가 아동 노동의 잔혹함을 사진으로 폭로하여 법적 변화를 이끌어낸 이야기입니다.", "correct": "① 한 사진작가의 렌즈가 아동 노동과 싸운 방법 ✅ Hine의 사진 → 아동 노동 폐지 법안이라는 핵심 내용을 포괄 ② 19세기 공장 생산의 성장 ❌ 배경 정보일 뿐 핵심 아님 ③ 왜 아이들이 더 좋은 노동자인가 ❌ 글의 메시지와 완전히 반대 ④ 예술로서의 사진 역사 ❌ 예술이 아닌 사회적 영향력이 핵심 ⑤ 산업혁명의 경제적 이점 ❌ 부분적 배경에 불과", "wrongs": [], "tip": "🔑 제목 파악: 핵심 인물(Hine) + 핵심 수단(사진) + 핵심 결과(아동 노동 법안)를 모두 아우르는 선지가 정답. 배경 정보만 다루는 선지는 오답!"}},
{"id": 9, "type": "대의", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "", "passage": "The article featured a shocking photograph of flames and smoke rising from the river. But this was not a photograph of the 1969 fire, which was put out so quickly that nobody took a picture of it. In fact, it was a picture of a much worse fire that had occurred on the river several years earlier. Still, the image had a great impact on people. The shocking image of the burning river sparked public anger about water pollution. As a result, the Cuyahoga River fire of 1969 became a symbol of pollution.", "stem": "다음 글이 시사하는 바로 가장 적절한 것을 고르시오.", "ch": ["한 장의 강렬한 이미지가 사실 관계와 무관하게 대중의 인식을 바꿀 수 있다.", "환경 오염 문제는 정확한 데이터로만 해결할 수 있다.", "언론은 항상 사실만을 보도해야 한다.", "사진보다 글이 더 효과적인 커뮤니케이션 수단이다.", "과거의 사건은 현재에 아무런 영향을 미치지 않는다."], "ans": 0, "det": {"ref": "[원문] this was not a photograph of the 1969 fire ... it was a picture of a much worse fire that had occurred several years earlier. Still, the image had a great impact on people. [해석] 1969년 화재의 사진이 아니라 수년 전의 더 심한 화재 사진이었지만, 그럼에도 이미지는 사람들에게 큰 영향을 미쳤습니다. 즉, 사진이 정확히 어떤 사건의 것인지와 무관하게, 강렬한 이미지 자체가 대중의 인식을 바꿀 수 있다는 시사점입니다.", "correct": "① 강렬한 이미지가 사실 관계와 무관하게 대중 인식을 바꿀 수 있다 ✅ 다른 화재 사진이지만 큰 영향을 미친 사례가 직접적 근거 ② 정확한 데이터로만 해결 ❌ 사진(이미지)의 힘을 강조하는 글과 반대 ③ 사실만 보도해야 한다 ❌ 글은 사실과 다른 사진이 영향을 미쳤다는 점을 서술 ④ 글이 더 효과적 ❌ 사진의 효과를 강조하는 글 ⑤ 과거 사건은 영향 없음 ❌ 과거 사진이 현재에 큰 영향을 미침", "wrongs": [], "tip": "🔑 시사점: 핵심 역설(다른 화재 사진이었지만 큰 영향)에 주목하세요. 이미지의 감정적 힘이 사실적 정확성보다 더 강력할 수 있다는 메시지입니다."}},
{"id": 10, "type": "일치", "diff": "쉬움", "pts": 3, "fmt": "mc", "note": "", "passage": "In the 19th century, the Industrial Revolution led to a dramatic increase in factory production in the United States. The demand for workers increased, and many new positions were filled by children. By 1900, about twenty percent of all children in the United States were employed, and some of those working in factories were only four years old. The work was difficult and dangerous, leaving many child laborers with health problems. Factory owners turned to child labor for several reasons. For example, children could be paid less than adult workers. They were also less likely to go on strike.", "stem": "다음 글의 내용과 <b>일치하는 것</b>을 고르시오.", "ch": ["1900년까지 미국 아동의 약 50%가 고용되어 있었다.", "공장에서 일하는 아동 중 일부는 겨우 네 살이었다.", "아동 노동자들은 성인보다 더 높은 임금을 받았다.", "아동 노동은 산업혁명 이전에 이미 금지되어 있었다.", "공장주들은 아동 노동을 도덕적 이유로 반대했다."], "ans": 1, "det": {"ref": "[원문] some of those working in factories were only four years old [해석] 공장에서 일하는 아이들 중 일부는 겨우 네 살이었다. 이 내용은 지문과 정확히 일치합니다.", "correct": "① 약 50% ❌ 지문: about twenty percent(약 20%) ② 겨우 네 살 ✅ 지문의 only four years old와 일치 ③ 더 높은 임금 ❌ 지문: children could be paid less(더 적게 받음) ④ 산업혁명 이전에 금지 ❌ 산업혁명으로 오히려 아동 노동이 증가 ⑤ 도덕적 이유로 반대 ❌ 공장주들이 아동 노동을 활용한 이유를 설명", "wrongs": [], "tip": "🔑 일치 문제: 숫자(twenty percent, four years old)와 비교 관계(less than adult workers)를 정확히 대조하세요. 50% vs. 20% 같은 숫자 변형 함정에 주의!"}},
{"id": 11, "type": "불일치", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "Lewis Hine, a teacher and photographer, wanted to reveal how cruel this system was. So he quit his teaching job and started to work for the National Child Labor Committee as an investigative photographer. He gained access to factories by pretending to have different jobs like insurance agent or fire inspector. Once inside, he would photograph the children working there. He would also ask their names and ages and record information about their living and working conditions. From 1908 to 1912, he secretly gathered information and took photographs to expose factory owners who were taking advantage of helpless children.", "stem": "다음 글의 내용과 <b>일치하지 않는 것</b>을 고르시오.", "ch": ["Lewis Hine은 교사이자 사진작가였다.", "Hine은 National Child Labor Committee에서 일했다.", "Hine은 공장주의 허가를 받고 공장에 들어갔다.", "Hine은 아이들의 이름과 나이를 물어보았다.", "Hine은 1908년부터 1912년까지 비밀리에 정보를 수집했다."], "ans": 2, "det": {"ref": "[원문] He gained access to factories by pretending to have different jobs like insurance agent or fire inspector. [해석] 그는 보험 설계사나 소방 검사관 같은 다른 직업을 가진 척하며 공장에 접근했습니다. 즉, 공장주의 허가를 받은 것이 아니라 <b>신분을 위장하여</b> 들어간 것입니다.", "correct": "① 교사이자 사진작가 ✅ a teacher and photographer와 일치 ② NCLC에서 일했다 ✅ started to work for the NCLC와 일치 ③ 공장주의 허가를 받고 들어갔다 ❌ pretending to have different jobs(위장)했으므로 허가가 아님 → 불일치! ④ 이름과 나이를 물어봄 ✅ ask their names and ages와 일치 ⑤ 1908~1912년 비밀 수집 ✅ From 1908 to 1912, he secretly gathered와 일치", "wrongs": [], "tip": "🔑 불일치 문제: 방법(by pretending = 위장하여)을 정확히 파악하세요. '허가를 받고'와 '위장하여'는 완전히 다른 의미입니다. gain access to = ~에 접근하다."}},
{"id": 12, "type": "빈칸", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "", "passage": "In the 1880s, industry began to grow rapidly along the Cuyahoga River in the city of Cleveland. This industrial growth provided steady jobs to people in the area. Meanwhile, steel mills and factories started dumping large amounts of waste into the river. Although the river became polluted, most people simply regarded this as _______________.", "stem": "다음 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.", "ch": ["a sign of the area's economic success", "a serious threat to public health", "a reason to shut down all factories", "evidence of government failure", "a warning about future disasters"], "ans": 0, "det": {"ref": "[원문] Although the river became polluted, most people simply regarded this as a sign of the area's economic success. [해석] 강이 오염되었지만, 대부분의 사람들은 이를 단순히 지역의 경제적 성공의 징표로 여겼습니다. 산업 성장이 일자리를 제공했기 때문에 오염을 경제적 번영의 부작용 정도로 치부한 것입니다.", "correct": "① a sign of the area's economic success ✅ 원문과 일치, 오염을 경제적 성공의 징표로 봄 ② a serious threat to public health ❌ 사람들이 심각하게 여기지 않았다는 맥락과 반대 ③ a reason to shut down factories ❌ 공장 폐쇄를 고려하지 않았음 ④ evidence of government failure ❌ 정부 실패의 증거라는 내용 없음 ⑤ a warning about future disasters ❌ 경고로 받아들이지 않았다는 것이 핵심", "wrongs": [], "tip": "🔑 빈칸 문제: Although(양보)가 단서입니다. 강이 오염되었지만(부정) → 경제적 성공의 징표로 여겼다(의외의 긍정적 해석). regard A as B = A를 B로 여기다(≈consider, view)."}},
{"id": 13, "type": "빈칸", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "", "passage": "Factory owners turned to child labor for several reasons. For example, children could be paid less than adult workers. They were also less likely to go on strike. Lewis Hine, a teacher and photographer, wanted to reveal how cruel this system was. So he quit his teaching job and started to work for the National Child Labor Committee as an investigative photographer. This shows that _______________.", "stem": "다음 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.", "ch": ["one person's dedication can spark a movement against injustice", "factory owners always treated children with kindness", "photography was only a hobby for Lewis Hine", "child labor was beneficial for children's education", "the government solved the problem without public pressure"], "ans": 0, "det": {"ref": "[원문] Lewis Hine wanted to reveal how cruel this system was. So he quit his teaching job and started to work for the NCLC. [해석] Hine은 이 시스템이 얼마나 잔인한지 폭로하고 싶어서 교직을 그만두고 조사 사진작가로 일하기 시작했습니다. 한 개인의 헌신이 불의에 대한 운동을 촉발할 수 있다는 것을 보여줍니다.", "correct": "① 한 사람의 헌신이 불의에 대한 운동을 촉발 ✅ Hine이 교직을 그만두고 사진작가로 전환한 행동이 직접적 근거 ② 공장주가 항상 친절 ❌ 잔인한 시스템이라고 서술 ③ 취미에 불과 ❌ 직업을 바꿔가며 전념한 것 ④ 교육에 유익 ❌ 건강 문제를 남겼다고 서술 ⑤ 정부가 대중 압력 없이 해결 ❌ 사진이 대중을 움직여 법이 바뀐 것", "wrongs": [], "tip": "🔑 빈칸 문제: Hine의 행동(교직 포기 → 조사 사진작가 전환)에서 '개인의 헌신'이라는 키워드를 도출하세요. quit his teaching job이 헌신의 구체적 증거입니다."}},
{"id": 14, "type": "함축", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "These examples show that photographs can bring meaningful change to society. They prove that, sometimes, <u>a picture truly is worth a thousand words</u>.", "stem": "다음 글에서 밑줄 친 \"<b>a picture truly is worth a thousand words</b>\"가 의미하는 바로 가장 적절한 것을 고르시오.", "ch": ["한 장의 사진이 수많은 말보다 더 강력한 메시지를 전달할 수 있다.", "좋은 사진을 찍으려면 천 마디의 설명이 필요하다.", "사진보다 글이 항상 더 효과적인 소통 수단이다.", "사진은 예술적 가치만 가지며 사회적 영향력은 없다.", "사진 한 장의 가격이 천 단어의 글보다 비싸다."], "ans": 0, "det": {"ref": "[원문] These examples show that photographs can bring meaningful change to society. They prove that, sometimes, a picture truly is worth a thousand words. [해석] 이 예시들은 사진이 사회에 의미 있는 변화를 가져올 수 있음을 보여줍니다. 때로는 한 장의 사진이 정말로 천 마디 말의 가치가 있다는 것을 증명합니다. 이 관용표현은 사진 한 장이 긴 설명보다 더 강력한 메시지를 전달할 수 있다는 뜻입니다.", "correct": "① 사진이 수많은 말보다 더 강력한 메시지 전달 ✅ 관용표현의 정확한 의미 + 글의 핵심 메시지 ② 천 마디 설명이 필요 ❌ 의미 전도 — 사진이 설명을 대체한다는 뜻 ③ 글이 항상 더 효과적 ❌ 글 전체가 사진의 힘을 강조 ④ 사회적 영향력 없음 ❌ meaningful change to society와 반대 ⑤ 가격 비교 ❌ worth는 '가치가 있는'이지 가격이 아님", "wrongs": [], "tip": "🔑 A picture is worth a thousand words는 영어 관용표현으로, '한 장의 사진이 천 마디 말만큼의 가치가 있다' = 시각적 이미지의 강력한 전달력을 의미합니다. worth = ~의 가치가 있는(≈valuable)."}},
{"id": 15, "type": "순서", "diff": "보통", "pts": 5, "fmt": "mc", "note": "", "passage": "<b>주어진 글:</b> In June 1969, the polluted river caught fire. The likely cause was a burning flare falling from a train, which set fire to oil-soaked waste beneath a bridge. At that time, few people in Cleveland cared.<br><br>(A) The article featured a shocking photograph of flames and smoke rising from the river. But this was not a photograph of the 1969 fire, which was put out so quickly that nobody took a picture of it.<br><br>(B) This was because fires had been recorded on the Cuyahoga more than ten times before, and some of them had been much worse. However, it wasn't long before the 1969 fire became famous.<br><br>(C) This was thanks to an article published in Time magazine that year. Still, the image had a great impact on people.", "stem": "주어진 글 다음에 이어질 글의 순서로 가장 적절한 것을 고르시오.", "ch": ["(A)–(B)–(C)", "(B)–(A)–(C)", "(B)–(C)–(A)", "(C)–(A)–(B)", "(C)–(B)–(A)"], "ans": 2, "det": {"ref": "[해석] 주어진 글: 1969년 강에 불이 났고, 클리블랜드 사람들은 거의 관심을 갖지 않았다. → (B) 이는 쿠야호가 강에 10번 이상 화재가 기록되었기 때문. 그러나 1969년 화재가 유명해지기까지 오래 걸리지 않았다. → (C) 이는 타임지 기사 덕분. → (A) 기사에는 충격적인 사진이 실렸는데, 1969년 화재 사진이 아니었다. 그래도 큰 영향을 미쳤다. 원인→결과→상세 설명 순서.", "correct": "① (A)-(B)-(C) ❌ 사진 설명이 먼저 나오면 맥락 부족 ② (B)-(A)-(C) ❌ (C)가 마지막이면 'thanks to an article'의 연결이 어색 ③ (B)-(C)-(A) ✅ 이유(B) → 유명해진 계기(C) → 사진 상세 설명(A) ④ (C)-(A)-(B) ❌ This was because의 지시 대상 부재 ⑤ (C)-(B)-(A) ❌ This의 연결이 부자연스러움", "wrongs": [], "tip": "🔑 순서: (B)의 'This was because'가 주어진 글의 'few people cared'에 대한 이유를 설명하므로 (B)가 가장 먼저. (C)의 'This was thanks to'가 (B)의 'became famous'를 받으므로 (C)가 다음. 지시어(This)의 연결을 추적하세요."}},
{"id": 16, "type": "무관", "diff": "쉬움", "pts": 3, "fmt": "mc", "note": "", "passage": "① Hine's photographs captured young children doing all sorts of jobs. ② These included picking vegetables, weaving baskets, and even handling dangerous equipment. ③ Modern digital cameras can take thousands of photos without running out of storage space. ④ What is more, the children's faces showed the tragic impact of hard labor. ⑤ When people saw the children's joyless expressions, they could not help but feel heartbroken.", "stem": "다음 글에서 전체 흐름과 <b>관계 없는</b> 문장을 고르시오.", "ch": ["①", "②", "③", "④", "⑤"], "ans": 2, "det": {"ref": "[해석] ① Hine의 사진은 다양한 일을 하는 어린 아이들을 포착했다. ② 여기에는 채소 따기, 바구니 짜기, 위험한 장비 다루기 등이 포함되었다. ③ 현대 디지털 카메라는 저장 공간이 부족해지지 않고 수천 장의 사진을 찍을 수 있다. ④ 게다가, 아이들의 얼굴에는 고된 노동의 비극적 영향이 드러났다. ⑤ 사람들은 아이들의 기쁨 없는 표정을 보고 가슴이 아프지 않을 수 없었다. ③은 현대 카메라 기술에 관한 내용으로, Hine의 아동 노동 사진이라는 흐름과 무관합니다.", "correct": "① Hine의 사진이 아동 노동을 포착 → 주제 직결 ✅ ② 구체적인 작업 종류 나열 → ①의 상세 설명 ✅ ③ 현대 디지털 카메라의 저장 능력 → 아동 노동·Hine의 사진과 무관 ❌ ④ 아이들 얼굴의 비극적 영향 → 사진의 내용 설명 ✅ ⑤ 사람들의 감정적 반응 → 사진의 효과 ✅", "wrongs": [], "tip": "🔑 무관문장: 같은 '사진' 소재라도 맥락이 다르면(Hine의 아동 노동 사진 vs. 현대 디지털 카메라) 무관문장입니다. 시대와 주제를 함께 확인하세요."}},
{"id": 17, "type": "지칭", "diff": "쉬움", "pts": 3, "fmt": "mc", "note": "", "passage": "The pictures were later shown in exhibitions, lectures, magazine articles, and so on. As a result, the public realized just how serious the situation was. Soon, many states passed stronger laws to ban the employment of children. In 1938, the United States Congress passed an act that made it illegal for children under sixteen to work in factories during school hours.", "stem": "다음 문장이 본문의 내용과 일치하면 T, 일치하지 않으면 F를 고르시오.<br><br><b>\"In 1938, the United States Congress passed an act that made it illegal for children under fourteen to work in factories during school hours.\"</b>", "ch": ["T (일치)", "F (불일치)"], "ans": 1, "det": {"ref": "[원문] made it illegal for children under sixteen to work in factories during school hours [해석] 16세 미만의 아동이 수업 시간에 공장에서 일하는 것을 불법으로 만들었다. 제시된 문장은 'under fourteen(14세 미만)'이라고 했으나, 원문은 'under sixteen(16세 미만)'이므로 <b>불일치(F)</b>입니다.", "correct": "제시문: under fourteen ≠ 원문: under sixteen. 나이 기준이 다르므로 F ❌. 나머지 내용(1938년, 수업 시간, 공장 노동 불법)은 일치하지만 나이 기준이 14세가 아니라 16세입니다.", "wrongs": [], "tip": "🔑 T/F: 숫자(fourteen vs. sixteen)를 정확히 대조하세요. 대부분의 정보가 맞더라도 하나의 숫자만 바꿔놓는 함정에 주의! under sixteen = 16세 미만."}},
{"id": 18, "type": "서술형", "diff": "보통", "pts": 5, "fmt": "written", "note": "", "passage": "More and more people were becoming aware of the need to protect the environment, and the shocking image of the burning river sparked public anger about water pollution. As a result, the Cuyahoga River fire of 1969 became a symbol of pollution. A national environmental awareness event was held on April 22, 1970, which later became known as the first Earth Day.", "stem": "다음 글을 읽고, 빈칸에 들어갈 적절한 단어를 <보기>에서 골라 쓰시오.<br><br><b>[조건]</b><br>• 반드시 <보기>의 단어를 사용할 것<br>• 한 단어로 쓸 것<br><br><b>[보기]</b> symbol / solution / cause<br><br>As a result, the Cuyahoga River fire of 1969 became a __________ of pollution.", "wa": "symbol", "accept": ["symbol", "Symbol", "SYMBOL"], "det": {"ref": "[원문] the Cuyahoga River fire of 1969 became a symbol of pollution [해석] 1969년 쿠야호가 강 화재는 오염의 <b>상징</b>이 되었다. symbol은 '상징'이라는 뜻으로, 특정 사건이 더 큰 문제를 대표하게 된다는 의미입니다.", "correct": "정답: symbol ✅ '상징' — 화재가 오염 문제 전체를 대표하는 사건이 됨. solution(해결책) ❌ — 화재가 오염의 해결책이 된 것이 아님. cause(원인) ❌ — 화재가 오염의 원인이 아니라 오염의 상징이 됨.", "wrongs": [], "tip": "🔑 symbol(상징, ≈emblem, representation) vs. solution(해결책) vs. cause(원인). become a symbol of = ~의 상징이 되다. 화재는 오염의 '원인'이 아니라 오염 문제를 대표하는 '상징'이 된 것입니다."}},
{"id": 19, "type": "서술형", "diff": "어려움", "pts": 7, "fmt": "written", "note": "", "passage": "These examples show that photographs can bring meaningful change to society. They prove that, sometimes, a picture truly is worth a thousand words.", "stem": "다음 <조건>에 맞게 주어진 우리말을 영작하시오.<br><br><b>[조건]</b><br>• 아래 <보기>의 단어를 모두 사용하여 한 문장으로 작성할 것<br>• 필요시 단어의 형태를 변형할 것<br><br><b>[보기]</b> photograph / bring / meaningful / change / society<br><br><b>[우리말]</b> 이 예시들은 사진이 사회에 의미 있는 변화를 가져올 수 있음을 보여준다.", "wa": "These examples show that photographs can bring meaningful change to society.", "accept": ["These examples show that photographs can bring meaningful change to society.", "these examples show that photographs can bring meaningful change to society.", "These examples show that photographs can bring meaningful change to society", "These examples show that a photograph can bring meaningful change to society.", "These examples show that photographs can bring meaningful changes to society."], "det": {"ref": "[원문] These examples show that photographs can bring meaningful change to society. [해석] 이 예시들은 사진이 사회에 의미 있는 변화를 가져올 수 있음을 보여준다. show that + 주어 + 동사(명사절)의 구조이며, bring change to = ~에 변화를 가져오다라는 구문이 핵심입니다.", "correct": "핵심 구문 분석: (1) These examples show that ~ = 이 예시들은 ~을 보여준다 (show + that절) (2) photographs can bring = 사진이 가져올 수 있다 (can + 동사원형) (3) meaningful change = 의미 있는 변화 (형용사 + 명사) (4) to society = 사회에 (전치사 to + 명사)", "wrongs": [], "tip": "🔑 show that + S + V: ~임을 보여주다(= demonstrate, prove, indicate). bring change to ~: ~에 변화를 가져오다. photograph → photographs(복수형 주의). meaningful(의미 있는, ≈significant, impactful)."}},
{"id": 20, "type": "서술형", "diff": "쉬움", "pts": 3, "fmt": "written", "note": "", "passage": "What is more, the children's faces showed the tragic impact of hard labor. When people saw the children's joyless expressions, they could not help but feel heartbroken.", "stem": "다음 괄호 안의 단어를 문맥에 맞게 올바른 형태로 고쳐 쓰시오.<br><br>When people saw the children's joyless expressions, they could not help but <b>(feel)</b> heartbroken.", "wa": "feel", "accept": ["feel", "Feel", "FEEL"], "det": {"ref": "[원문] they could not help but feel heartbroken [해석] 그들은 가슴이 아프지 않을 수 없었다. cannot help but + 동사원형 구문에서 but 뒤에는 동사원형이 옵니다. 따라서 feel(동사원형)이 그대로 정답입니다.", "correct": "cannot help but + 동사원형: feel(동사원형) ✅ 그대로 사용. feeling ❌ → but 뒤에 동명사 불가. felt ❌ → but 뒤에 과거형 불가. 비교: cannot help + v-ing(= cannot help but + 동사원형).", "wrongs": [], "tip": "🔑 cannot help but + 동사원형 = cannot help + v-ing = ~하지 않을 수 없다. 예: cannot help but feel = cannot help feeling. but 뒤에는 반드시 동사원형! 이 구문은 '불가피한 감정/행동'을 표현할 때 씁니다."}}

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn" onclick="shareResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;h+=`</div></div>`;});h+=`</div></div>`;document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);window._lastResult=r;window._lastElapsed=elapsed;}
function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n🎯 온라인퀴즈 TEST 결과\n━━━━━━━━━━━━━━━━━━━━\n\n📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n📖 ${EI.title}\n\n`;txt+=`📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n🎯 내신핏 온라인퀴즈 TEST\n━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{toast('결과 공유 실패');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
</script>
