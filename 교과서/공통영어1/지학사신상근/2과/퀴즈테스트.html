<style>

const Q=[
{id:1,type:'어법',diff:'보통',pts:5,fmt:'mc',note:'관용어 도입+아킬레스',passage:`Idioms pose a special challenge in language learning because their meanings are different from the words <u>ⓐ that</u> make them up. <u>ⓑ Learning</u> their origins will make it easier to understand <u>ⓒ what</u> they mean and to figure out how to use them. According to Homer, the Ancient Greek poet, the Greeks and Trojans had a war <u>ⓓ that lasted</u> ten years. This war eventually became <u>ⓔ knowing</u> as the Trojan War, where Achilles became the most famous hero.`,stem:'다음 글의 밑줄 친 ⓐ~ⓔ 중에서 어법상 어색한 것을 고르시오.',ch:['ⓐ that','ⓑ Learning','ⓒ what','ⓓ that lasted','ⓔ knowing'],ans:4,det:{ref:'[원문] This war eventually became <b>known</b> as the Trojan War. [해석] 이 전쟁은 후에 트로이 전쟁으로 <b>알려지게</b> 되었다. become은 2형식 동사로 보어를 취하며, "~로 알려지다"라는 수동 의미이므로 과거분사 known이 와야 합니다. knowing(현재분사)은 능동적 의미이므로 어법에 맞지 않습니다.',correct:'ⓐ that: 주격 관계대명사, 선행사 the words 수식 → make의 주어 역할 ✅<br>ⓑ Learning: 동명사 주어, 문장 주어 역할 ✅<br>ⓒ what: 명사절 접속사, understand의 목적어절 ✅<br>ⓓ that lasted: 주격 관계대명사 + 동사, 선행사 a war 수식 ✅<br>ⓔ knowing: become + 보어(수동) → 과거분사 <b>known</b> 필요 ❌',wrongs:[],tip:'🔑 become + p.p.: become known(알려지다), become interested(흥미를 갖다). 현재분사(~ing)=능동·진행 / 과거분사(p.p.)=수동·완료. ≈ be known as(~로 알려지다)'}},

{id:2,type:'어법',diff:'어려움',pts:6,fmt:'mc',note:'아킬레스의 발뒤꿈치',passage:`When Achilles was born, his mother, a goddess of water, attempted to make him immortal. She dipped him in the magical River Styx. (A) [<b>Wherever / Whatever</b>] the water touched, the part touched would become indestructible. However, because she held him upside down by one of his heels, Achilles' heel (B) [<b>remained / remaining</b>] dry. Achilles grew up to be a great warrior and survived many great battles. However, during the Trojan War, Paris, a prince of Troy, shot a poisoned arrow that (C) [<b>struck / was struck</b>] Achilles' heel, which led to his death.`,stem:'(A), (B), (C)의 각 네모 안에서 어법에 맞는 표현으로 가장 적절한 것을 고르시오.',ch:['(A) Wherever – (B) remained – (C) struck','(A) Whatever – (B) remained – (C) struck','(A) Wherever – (B) remaining – (C) was struck','(A) Whatever – (B) remaining – (C) struck','(A) Wherever – (B) remained – (C) was struck'],ans:0,det:{ref:'[원문] (A) <b>Wherever</b> the water touched ~ (B) heel <b>remained</b> dry (C) arrow that <b>struck</b> Achilles\' heel [해석] (A) 물이 닿은 곳은 <b>어디든</b> (B) 발뒤꿈치는 마른 채로 <b>남았다</b> (C) 아킬레스의 발뒤꿈치를 <b>맞힌</b> 독화살',correct:'(A) Wherever: 장소 복합관계부사 + 완전한 절 ✅ / Whatever: 불완전한 절 필요 ❌<br>(B) remained: 본동사 역할 ✅ / remaining: 분사는 본동사 불가 ❌<br>(C) struck: 화살(주어)이 맞히다(능동) ✅ / was struck: 수동태 부적절 ❌',wrongs:[],tip:'🔑 Wherever(장소)+완전한 절 / Whatever(사물)+불완전한 절. remain+형용사(보어). 관계대명사절 능동/수동: 선행사=주체→능동, 선행사=대상→수동.'}},

{id:3,type:'어법',diff:'어려움',pts:6,fmt:'mc',note:'고르디우스의 매듭',passage:`Greek legend tells of the Gordian Knot, <u>ⓐ which</u> was tied by a king named Gordius. The knot was so complex that no one was able to untie it. A prophet said <u>ⓑ whoever</u> could untie the knot would become the ruler of Asia. For hundreds of years, people <u>ⓒ unsuccessfully</u> tried to untie the knot. Then, Alexander the Great came along. He tried to untie it, and it just got <u>ⓓ tightly</u>.`,stem:'다음 글의 밑줄 친 ⓐ~ⓓ 중에서 어법상 어색한 것을 고르시오.',ch:['ⓐ which','ⓑ whoever','ⓒ unsuccessfully','ⓓ tightly'],ans:3,det:{ref:'[원문] it just got <b>tighter</b>. [해석] 그것은 단지 더 <b>꽉 묶여만</b> 갔다. get은 2형식 동사(보어 필요)이며 비교 의미이므로 형용사 비교급 tighter가 필요합니다.',correct:'ⓐ which: 계속적 용법 관계대명사, 선행사 the Gordian Knot 수식 ✅<br>ⓑ whoever: 복합관계대명사, said의 목적어절 주어 ✅<br>ⓒ unsuccessfully: 부사, 동사 tried 수식 ✅<br>ⓓ tightly: get+형용사(보어) 구조 → 비교급 <b>tighter</b> 필요 ❌',wrongs:[],tip:'🔑 get+형용사(보어): get tighter(더 조여지다), get better(나아지다). 부사(tightly)는 보어 불가. tight→tighter(형용사 비교급).'}},

{id:4,type:'어휘',diff:'보통',pts:5,fmt:'mc',note:'콩을 쏟다',passage:`In ancient Greece, people often discussed important matters and made decisions through voting. They cast votes by dropping a white or black bean into a clay jar. White beans were used for (A) [<b>positive / negative</b>] votes, and black beans for (B) [<b>positive / negative</b>] votes. These votes were cast in (C) [<b>secret / public</b>], so if someone knocked over the jar, they spilled the beans and revealed the results of the vote prematurely.`,stem:'(A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것을 고르시오.',ch:['(A) positive – (B) negative – (C) secret','(A) negative – (B) positive – (C) secret','(A) positive – (B) negative – (C) public','(A) negative – (B) positive – (C) public','(A) positive – (B) positive – (C) secret'],ans:0,det:{ref:'[원문] White beans: <b>positive</b> votes / black beans: <b>negative</b> votes / cast in <b>secret</b>. [해석] 흰색 콩=찬성, 검은색 콩=반대, 비밀 투표.',correct:'(A) positive: 흰색 콩 = 찬성 ✅ / negative ❌<br>(B) negative: 검은색 콩 = 반대 ✅ / positive ❌<br>(C) secret: 비밀 투표이므로 쏟으면 결과 노출 ✅ / public ❌',wrongs:[],tip:'🔑 positive ≈ favorable(찬성) ↔ negative ≈ opposing(반대). in secret ≈ secretly(비밀리에) ↔ in public(공개적으로). prematurely = 너무 이르게.'}},

{id:5,type:'어휘',diff:'어려움',pts:6,fmt:'mc',note:'트로이 목마',passage:`Even after the death of Achilles, the Trojan War reached a point where no one could win. One day, the Greeks came up with an idea. They built a big wooden horse and left it outside the city of Troy. They ① <u>pretended</u> to leave the horse behind as a gift for the Trojans. The Trojans thought they had won, so they ② <u>pulled</u> the horse inside their city gates. However, the Greeks had ③ <u>hidden</u> their soldiers inside the horse. That night, the soldiers came out of the horse and ④ <u>closed</u> the gates to let in the Greek army waiting outside. This ⑤ <u>allowed</u> the Greeks to win the war.`,stem:'밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 적절하지 않은 것을 고르시오.',ch:['① pretended','② pulled','③ hidden','④ closed','⑤ allowed'],ans:3,det:{ref:'[원문] soldiers came out and <b>opened</b> the gates to let in the Greek army [해석] 병사들이 성문을 <b>열어</b> 그리스군을 들여보냄.',correct:'① pretended: 선물인 척 → 적절 ✅<br>② pulled: 성문 안으로 끌어들임 → 적절 ✅<br>③ hidden: 병사를 숨김 → 적절 ✅<br>④ closed: let in(들여보내다)하려면 <b>opened</b>가 적절 ❌<br>⑤ allowed: 승리를 가능하게 함 → 적절 ✅',wrongs:[],tip:'🔑 open ↔ close: let in(들여보내다)이면 문을 열어야 함. pretend to-v = ~인 척하다. come up with = 생각해내다. allow + O + to-v = 가능하게 하다.'}},

{id:6,type:'어휘',diff:'보통',pts:5,fmt:'mc',note:'결론 관용어 학습',passage:`Idioms are an important part of everyday English, and they make the language ① <u>rich</u> and colorful. When you run into idioms that are 'Greek to you,' take the time to study their ② <u>origins</u>. It is a fun way to ③ <u>increase</u> your understanding of English, and it can also help you to ④ <u>forget</u> them and use them in the ⑤ <u>appropriate</u> situations going forward.`,stem:'밑줄 친 ①~⑤ 중에서 문맥상 낱말의 쓰임이 적절하지 않은 것을 고르시오.',ch:['① rich','② origins','③ increase','④ forget','⑤ appropriate'],ans:3,det:{ref:'[원문] help you to <b>remember</b> them [해석] 그것들을 <b>기억하고</b> 적절한 상황에서 사용하는 데 도움.',correct:'① rich: 언어를 풍부하게 → 적절 ✅<br>② origins: 기원 공부 → 적절 ✅<br>③ increase: 이해를 높이다 → 적절 ✅<br>④ forget: 기억하다가 맞음 → <b>remember</b> ❌<br>⑤ appropriate: 적절한 상황 → 적절 ✅',wrongs:[],tip:'🔑 remember ≈ recall(기억하다) ↔ forget(잊다). run into ≈ encounter(마주치다). appropriate ≈ suitable(적절한). going forward ≈ from now on(앞으로).'}},

{id:7,type:'대의',diff:'보통',pts:5,fmt:'mc',note:'도입부 주제',passage:`Have you heard the expression, 'It's Greek to me'? It means 'I can't understand what you are saying because it sounds like a foreign language to me.' You may wonder why it is not French or Italian but Greek. The reason is that the Ancient Greeks had an enormous influence on Western culture. Greece was the birthplace of Classical Western civilization, and therefore, also left us with some pretty great idioms. Idioms pose a special challenge in language learning because their meanings are different from the words that make them up. Learning their origins will make it easier to understand what they mean and to figure out how to use them.`,stem:'다음 글의 주제로 가장 적절한 것을 고르시오.',ch:['the importance of learning foreign languages','the Greek origins of English idioms and the value of studying their roots','the reasons why Greek is the hardest Western language','the influence of French and Italian on English vocabulary','how to become fluent in Ancient Greek'],ans:1,det:{ref:'[원문] Ancient Greeks had an enormous influence ~ Learning their origins will make it easier. [해석] 고대 그리스의 영향 + 기원 학습의 가치가 핵심.',correct:'① 외국어 학습 중요성 → 핵심 주제 아님 ❌<br>② 그리스 기원 관용어 + 기원 학습 가치 → 정확 ✅<br>③ 그리스어가 가장 어렵다 → 언급 없음 ❌<br>④ 프랑스어·이탈리아어 영향 → 언급 없음 ❌<br>⑤ 고대 그리스어 유창 → 무관 ❌',wrongs:[],tip:'🔑 주제 파악: 반복 키워드(idioms, origins, Greek) 추적. enormous = 엄청난. pose a challenge = 도전을 제기하다. figure out = 파악하다.'}},

{id:8,type:'대의',diff:'보통',pts:5,fmt:'mc',note:'아킬레스의 발뒤꿈치 제목',passage:`According to Homer, the Greeks and Trojans had a war that lasted ten years. When Achilles was born, his mother attempted to make him immortal. She dipped him in the magical River Styx. However, because she held him upside down by one of his heels, Achilles' heel remained dry. This became his only weak spot. During the Trojan War, Paris shot a poisoned arrow that struck Achilles' heel, which led to his death. This is why the idiom 'Achilles' heel' refers to a fatal weakness, especially in a situation where all other parts are strong.`,stem:'다음 글의 제목으로 가장 적절한 것을 고르시오.',ch:["Achilles' Heel: From Myth to Idiom",'The Greatest Warriors of Ancient Greece','How to Win Every Battle Like Achilles','The Magic of the River Styx','Paris: The True Hero of the Trojan War'],ans:0,det:{ref:'[해석] 아킬레스 신화에서 관용어가 탄생한 과정 설명.',correct:"① Achilles' Heel: From Myth to Idiom → 신화→관용어 과정 포괄 ✅<br>② Greatest Warriors → 한 명의 이야기, 관용어가 핵심 ❌<br>③ Win Every Battle → 무관 ❌<br>④ Magic of River Styx → 부분 소재 ❌<br>⑤ Paris: True Hero → 관점 불일치 ❌",wrongs:[],tip:'🔑 제목: 글 전체를 아우르는 포괄적 표현. myth ≈ legend(신화). fatal ≈ deadly(치명적인). idiom = 관용어.'}},

{id:9,type:'대의',diff:'어려움',pts:6,fmt:'mc',note:'고르디우스의 매듭 시사점',passage:`Greek legend tells of the Gordian Knot, which was tied by a king named Gordius. The knot was so complex that no one was able to untie it. A prophet said whoever could untie the knot would become the ruler of Asia. For hundreds of years, people unsuccessfully tried to untie the knot. Then, Alexander the Great came along. He tried to untie it, and it just got tighter. After thinking for a while, he drew his sword and cut the knot in half! He explained, 'It doesn't matter how the knot was untied. The important thing is that it's undone.'`,stem:'다음 글에서 얻을 수 있는 시사점으로 가장 적절한 것을 고르시오.',ch:['Complex problems sometimes require unconventional, bold solutions.','Patience is always the best way to solve any problem.','Only rulers have the ability to solve difficult problems.','Physical strength is more important than intelligence.','Following traditional methods always leads to success.'],ans:0,det:{ref:'[해석] 수백 년간 실패한 전통적 방법 대신 칼로 잘라 해결 → 파격적 해결책의 가치.',correct:'① 복잡한 문제에 파격적·대담한 해결책 필요 → 핵심 시사점 ✅<br>② 인내가 최선 → 수백 년 인내했지만 실패 ❌<br>③ 왕만 가능 → 그런 메시지 아님 ❌<br>④ 물리적 힘 > 지성 → 창의적 사고의 결과 ❌<br>⑤ 전통적 방법 = 성공 → 정반대 ❌',wrongs:[],tip:'🔑 unconventional ≈ innovative(파격적) ↔ conventional(전통적). bold ≈ daring(대담한). cutting the Gordian knot = 복잡한 문제의 단순한 해결책.'}},

{id:10,type:'일치',diff:'쉬움',pts:3,fmt:'mc',note:'아킬레스 세부사항',passage:`When Achilles was born, his mother, a goddess of water, attempted to make him immortal. She dipped him in the magical River Styx. Wherever the water touched, the part touched would become indestructible. However, because she held him upside down by one of his heels, Achilles' heel remained dry. This became his only weak spot. Achilles grew up to be a great warrior and survived many great battles.`,stem:'다음 글의 내용과 일치하는 것을 고르시오.',ch:["Achilles' mother was a goddess of fire.",'Achilles was dipped in the River Nile.',"Achilles' entire body became indestructible.","Achilles' heel remained dry because his mother held him by it.",'Achilles lost every battle he fought in.'],ans:3,det:{ref:'[원문] she held him upside down by one of his heels → heel remained dry [해석] 발뒤꿈치를 잡고 담갔기에 마른 채로 남음.',correct:'① goddess of fire → 본문: goddess of <b>water</b> ❌<br>② River Nile → 본문: River <b>Styx</b> ❌<br>③ entire body → 발뒤꿈치 제외 ❌<br>④ heel remained dry because held by it → 본문 일치 ✅<br>⑤ lost every battle → survived many battles ❌',wrongs:[],tip:'🔑 일치 문제: 핵심어 변형 주의 (water↔fire, Styx↔Nile). immortal=불멸의. indestructible=파괴 불가. dip=담그다.'}},

{id:11,type:'불일치',diff:'보통',pts:5,fmt:'mc',note:'콩을 쏟다 세부사항',passage:`In ancient Greece, people often discussed important matters and made decisions through voting. They cast votes by dropping a white or black bean into a clay jar. White beans were used for positive votes, and black beans for negative votes. These votes were cast in secret, so if someone knocked over the jar, whether by accident or on purpose, they spilled the beans and revealed the results of the vote prematurely. Because of this origin, the phrase 'spill the beans' came to mean 'reveal information that was meant to be kept secret.'`,stem:'다음 글의 내용과 일치하지 않는 것을 고르시오.',ch:['Ancient Greeks voted by dropping beans into a clay jar.','White beans represented positive votes.','The voting was conducted in public.','Knocking over the jar would reveal the vote results early.','\"Spill the beans\" means to reveal secret information.'],ans:2,det:{ref:'[원문] votes were cast in <b>secret</b> [해석] 비밀 투표 → in public(공개)은 불일치.',correct:'① 콩을 넣어 투표 → 본문 일치 ✅<br>② 흰색=찬성 → 본문 일치 ✅<br>③ in public → 본문: in <b>secret</b> → 불일치 ❌<br>④ 그릇 넘어뜨리면 결과 노출 → 본문 일치 ✅<br>⑤ 비밀 정보 드러내기 → 본문 일치 ✅',wrongs:[],tip:'🔑 in secret(비밀) ↔ in public(공개). on purpose ≈ intentionally(고의로) ↔ by accident(우연히). prematurely = 너무 이르게.'}},

{id:12,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',note:'아킬레스 관용어 의미',passage:`This is why the idiom 'Achilles' heel' refers to ________________, especially in a situation where all other parts are strong. When Achilles was born, his mother attempted to make him immortal by dipping him in the magical River Styx. Wherever the water touched, the part touched would become indestructible. However, she held him by one of his heels, so it remained dry and became his only weak spot.`,stem:'다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.',ch:['a legendary origin story',"an unbeatable warrior\'s strength",'a fatal weakness','the power of magical water','an ancient Greek tradition'],ans:2,det:{ref:'[원문] refers to <b>a fatal weakness</b> [해석] 치명적인 약점. 다른 모든 부분이 강한 가운데 유일한 약점.',correct:'① origin story → 관용어 "의미" 설명 자리에 부적절 ❌<br>② warrior\'s strength → 약점을 설명해야 함 ❌<br>③ a fatal weakness → "all other parts are strong"과 대비 ✅<br>④ magical water → 배경 소재 ❌<br>⑤ Greek tradition → 의미와 무관 ❌',wrongs:[],tip:'🔑 빈칸 단서: "all other parts are strong" → 강한 가운데 유일한 약점. fatal ≈ deadly(치명적). weakness ≈ vulnerability(약점) ↔ strength(강점).'}},

{id:13,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',note:'트로이 목마 관용어 의미',passage:`Nowadays, people use the idiom 'Trojan horse' to describe ________________. The Greeks built a big wooden horse and left it outside the city of Troy. They pretended to leave the horse behind as a gift for the Trojans. However, the Greeks had hidden their soldiers inside the horse. That night, the soldiers came out and opened the gates to let in the Greek army.`,stem:'다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.',ch:['a generous gift given to celebrate a victory',"a trick or scheme used to hide someone\'s true purpose or intention",'an ancient weapon used in battle','a symbol of friendship between two nations','a method of building strong city walls'],ans:1,det:{ref:'[원문] describe <b>a trick or scheme that is used to hide someone\'s true purpose or intention</b> [해석] 진짜 목적을 숨긴 속임수.',correct:'① generous gift → 실제로는 속임수 ❌<br>② trick or scheme to hide true purpose → 선물인 척한 기만 ✅<br>③ ancient weapon → 무기가 아닌 계략 ❌<br>④ friendship symbol → 기만의 도구 ❌<br>⑤ building city walls → 무관 ❌',wrongs:[],tip:'🔑 trick ≈ scheme ≈ stratagem(속임수). hide ≈ conceal(숨기다) ↔ reveal(드러내다). intention ≈ purpose(의도). pretend = ~인 척하다.'}},

{id:14,type:'함축',diff:'보통',pts:5,fmt:'mc',note:'고르디우스의 매듭',passage:`The Gordian Knot was so complex that no one was able to untie it. For hundreds of years, people unsuccessfully tried to untie the knot. Then, Alexander the Great came along. He tried to untie it, and it just got tighter. After thinking for a while, he drew his sword and cut the knot in half! Everyone was shocked because that was not what they had expected. He explained, <u>'It doesn't matter how the knot was untied. The important thing is that it's undone.'</u>`,stem:'밑줄 친 문장이 함축하는 의미로 가장 적절한 것을 고르시오.',ch:['The process matters more than the result.','What counts is achieving the goal, regardless of the method.','Destroying something is always wrong.','Traditional methods should always be preferred.','Thinking carefully is a waste of time.'],ans:1,det:{ref:'[원문] "It doesn\'t matter how ~ The important thing is that it\'s undone." [해석] 방법은 중요하지 않고, 결과(풀린 것)가 중요.',correct:'① 과정 > 결과 → 정반대 ❌<br>② 방법 무관, 목표 달성이 중요 → 정확 ✅<br>③ 파괴가 항상 잘못 → 긍정적 평가 ❌<br>④ 전통적 방법 선호 → 전통 포기 ❌<br>⑤ 깊이 생각=시간 낭비 → thinking한 후 행동 ❌',wrongs:[],tip:'🔑 "It doesn\'t matter how" = 방법 무관. What counts ≈ What matters(중요한 것). regardless of = ~에 관계없이.'}},

{id:15,type:'순서',diff:'보통',pts:5,fmt:'mc',note:'트로이 목마 순서',passage:`<b>[주어진 글]</b> Even after the death of Achilles, the Trojan War reached a point where no one could win. One day, the Greeks came up with an idea.<br><br><b>(A)</b> However, the Greeks had hidden their soldiers inside the horse. That night, the soldiers came out of the horse and opened the gates to let in the Greek army waiting outside.<br><b>(B)</b> They built a big wooden horse and left it outside the city of Troy. They pretended to leave the horse behind as a gift for the Trojans.<br><b>(C)</b> The Trojans thought they had won, so they pulled the horse inside their city gates.`,stem:'주어진 글 다음에 이어질 글의 순서로 가장 적절한 것을 고르시오.',ch:['(A) – (B) – (C)','(A) – (C) – (B)','(B) – (A) – (C)','(B) – (C) – (A)','(C) – (B) – (A)'],ans:3,det:{ref:'[순서] 아이디어 → (B) 목마 제작·선물인 척 → (C) 트로이인 끌어들임 → (A) 병사 기습.',correct:'① A-B-C: 시간 역행 ❌<br>② A-C-B: 완전 역순 ❌<br>③ B-A-C: 병사가 먼저 나옴 ❌<br>④ B-C-A: 제작→발견→기습 시간순 ✅<br>⑤ C-B-A: 비논리적 ❌',wrongs:[],tip:'🔑 순서: 주어진 글 마지막(an idea)에 연결 → (B). (C)의 "thought they had won"은 (B) 이후. (A)의 "However"는 (C) 뒤집기.'}},

{id:16,type:'무관',diff:'쉬움',pts:3,fmt:'mc',note:'결론 무관문장',passage:`① Idioms are an important part of everyday English, and they make the language rich and colorful. ② When you run into idioms that are 'Greek to you,' take the time to study their origins. ③ Ancient Greece was famous for its contributions to mathematics and philosophy. ④ It is a fun way to increase your understanding of English, and it can also help you to remember them. ⑤ Learning their origins helps you use them in the appropriate situations going forward.`,stem:'다음 글에서 전체 흐름과 관계없는 문장을 고르시오.',ch:['①','②','③','④','⑤'],ans:2,det:{ref:'[해석] ③ 고대 그리스의 수학·철학 기여 → 관용어 학습 주제와 무관.',correct:'① 관용어=영어의 중요한 부분 → 주제 부합 ✅<br>② 기원 공부하라 → 주제 부합 ✅<br>③ 수학·철학 기여 → 관용어 학습과 무관 ❌<br>④ 이해를 높이는 방법 → 주제 부합 ✅<br>⑤ 적절한 상황에서 사용 → 주제 부합 ✅',wrongs:[],tip:'🔑 핵심 주제: 관용어 기원 학습의 가치. contributions=기여. mathematics=수학. philosophy=철학 → 관용어 학습과 별개 영역.'}},

{id:17,type:'지칭',diff:'쉬움',pts:3,fmt:'mc',note:'아킬레스 지칭',passage:`When Achilles was born, his mother, a goddess of water, attempted to make him immortal. <u>She</u> dipped him in the magical River Styx. Wherever the water touched, the part touched would become indestructible. However, during the Trojan War, Paris, a prince of Troy, shot a poisoned arrow that struck Achilles' heel. <u>He</u> was the one who finally brought down the great warrior.`,stem:'밑줄 친 she와 he가 가리키는 대상이 바르게 짝지어진 것을 고르시오.',ch:["she: Achilles' mother – he: Achilles",'she: a goddess of fire – he: Paris',"she: Achilles' mother – he: Paris",'she: Paris – he: Achilles',"she: a goddess of water – he: Homer"],ans:2,det:{ref:'[해석] She = 아킬레스의 어머니(물의 여신) / He = 파리스(독화살을 쏜 왕자).',correct:"① he: Achilles → 자기 자신을 쓰러뜨린 것 아님 ❌<br>② she: goddess of fire → water ❌<br>③ she: Achilles' mother ✅ / he: Paris ✅ → 정답<br>④ she: Paris → 남성 ❌<br>⑤ he: Homer → 시인, 전쟁 참가자 아님 ❌",wrongs:[],tip:'🔑 대명사 → 가장 가까운 선행사. She→his mother. He→Paris. bring down ≈ defeat(쓰러뜨리다).'}},

{id:18,type:'서술형',diff:'보통',pts:5,fmt:'written',note:'아킬레스 요약',passage:`When Achilles was born, his mother attempted to make him immortal. She dipped him in the magical River Styx. However, because she held him upside down by one of his heels, Achilles' heel remained dry. This became his only weak spot. The idiom 'Achilles' heel' refers to a fatal __________, especially in a situation where all other parts are strong.`,stem:'다음 빈칸에 들어갈 단어를 본문에서 찾아 한 단어로 쓰시오.<br><br><b>[보기]</b> weakness / strength / immortal / mortal',wa:'weakness',accept:['weakness','Weakness','WEAKNESS',' weakness','weakness '],det:{ref:'[원문] refers to a fatal <b>weakness</b> [해석] 치명적인 <b>약점</b>.',correct:'weakness: fatal weakness(치명적 약점)로 본문 직접 등장 ✅<br>strength: 반대 의미 ❌<br>immortal/mortal: 형용사, 명사 자리 부적절 ❌',wrongs:[],tip:'🔑 fatal weakness = 치명적 약점. fatal ≈ deadly. weakness ≈ vulnerability ↔ strength. 빈칸 앞 관사(a)+형용사(fatal) → 명사 추론.'}},

{id:19,type:'서술형',diff:'어려움',pts:7,fmt:'written',note:'고르디우스 영작',passage:`From that day on, the idiom 'cutting the Gordian knot' has been commonly used to describe a simple solution to a complex problem.`,stem:'다음 우리말과 일치하도록 주어진 단어를 사용하여 영작하시오.<br><br><b>[조건]</b> 주어진 단어를 모두 사용, 필요시 어형 변환. 10단어 내외.<br><b>[보기]</b> <code>cut / Gordian / knot / describe / solution / complex</code><br><br><b>[우리말]</b> "고르디우스의 매듭을 자르다"는 복잡한 문제에 대한 간단한 해결책을 묘사하는 데 사용된다.',wa:'Cutting the Gordian knot is used to describe a simple solution to a complex problem.',accept:['Cutting the Gordian knot is used to describe a simple solution to a complex problem.','Cutting the Gordian knot is used to describe a simple solution to a complex problem','cutting the Gordian knot is used to describe a simple solution to a complex problem.','cutting the Gordian knot is used to describe a simple solution to a complex problem','cutting the gordian knot is used to describe a simple solution to a complex problem','cutting the gordian knot is used to describe a simple solution to a complex problem.','Cutting the gordian knot is used to describe a simple solution to a complex problem.','Cutting the gordian knot is used to describe a simple solution to a complex problem'],det:{ref:'[원문] cutting the Gordian knot has been commonly used to describe a simple solution to a complex problem. [해석] 복잡한 문제에 대한 간단한 해결책을 묘사하는 데 사용된다.',correct:'모범답안: Cutting the Gordian knot is used to describe a simple solution to a complex problem.<br>동명사 주어(Cutting~) + is used to-v + describe + a simple solution to a complex problem. 6개 단어 모두 사용 ✅',wrongs:[],tip:'🔑 be used to-v = ~하는 데 사용되다(수동). 주의: be used to v-ing(익숙하다) / used to-v(~하곤 했다). 동명사 주어 = 단수 취급. complex ≈ complicated ↔ simple.'}},

{id:20,type:'서술형',diff:'쉬움',pts:3,fmt:'written',note:'어형변환 동명사',passage:`Idioms pose a special challenge in language learning because their meanings are different from the words that make them up. (Learn) __________ their origins will make it easier to understand what they mean.`,stem:'다음 괄호 안의 단어를 문맥에 맞는 어형으로 바꿔 한 단어로 쓰시오.',wa:'Learning',accept:['Learning','learning','LEARNING',' Learning','Learning '],det:{ref:'[원문] <b>Learning</b> their origins will make it easier. [해석] 기원을 <b>배우는 것</b>은 이해하는 것을 더 쉽게 해 준다.',correct:'Learning: 동명사 주어, 문장 주어 역할 ✅<br>Learn(동사원형): 주어 자리 불가 ❌<br>Learned: 주어 역할 불가 ❌',wrongs:[],tip:'🔑 동명사 주어: V-ing+...+동사 = "~하는 것은". 단수 취급 → will make. make it+형용사+to-v: 가목적어 it 구문.'}}
];

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn" onclick="shareResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;
r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}
h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;
if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;
if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;
h+=`</div></div>`;});h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);window._lastResult=r;window._lastElapsed=elapsed;}
function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
</script>
