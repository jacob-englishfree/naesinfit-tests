<style>

.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.level-range{font-size:13px;color:var(--tm);margin-top:4px;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:#FAFDFB;border-radius:var(--rs);border:1px solid #dde8df;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:var(--gxl);}.info-cell.highlight .ic-value{color:var(--g);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:60px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#e8efe9;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;padding:16px;background:var(--gxl);border-radius:var(--rs);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #d0dcd2;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--g);color:var(--g);}.act-btn.primary{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.rev-card{border:1.5px solid #dde8df;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:#FAFDFB;display:flex;align-items:center;gap:12px;cursor:pointer;}.rev-header:hover{background:#F0F8F1;}.rev-icon{font-size:18px;margin-left:auto;transition:transform .2s;}.rev-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 18px;}.rev-body.open{max-height:3000px;padding:20px 18px;}
.expl-tag{display:inline-flex;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.tip{background:var(--gxl);color:var(--gd);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);margin-bottom:10px;}.expl-box.ans-b{border-left:3px solid var(--g);}.expl-box.tip-b{border-left:3px solid var(--g);background:var(--gxl);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}}
</style>

<script>
const EI={"subject":"공통영어1","pub":"동아(이병민)","lesson":"4과","title":"Why You Buy What You Buy","total":100,"time":1200,"totalQ":20,"histKey":"wordTest_dong_4"};

const Q=[
{id:1,type:`(A)(B)(C) 조합형`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`(A) wisely − (B) rational − (C) influenced`,`(A) wisely − (B) irrational − (C) influenced`,`(A) foolishly − (B) rational − (C) unaffected`,`(A) foolishly − (B) irrational − (C) influenced`,`(A) wisely − (B) rational − (C) unaffected`],passage:`Do you think that you spend money (A)[<b>wisely / foolishly</b>]? The truth is that most people are not as (B)[<b>rational / irrational</b>] as they think. This is because human beings are easily (C)[<b>influenced / unaffected</b>] by psychological factors.`,stem:`다음 글의 빈칸 (A), (B), (C)에 들어갈 말로 가장 적절한 것은?`,det:{korean:`여러분은 돈을 <b>현명하게</b> 쓴다고 생각하나요? 사실은 대부분의 사람이 자신들이 생각하는 만큼 <b>합리적</b>이지 않습니다. 인간은 심리적인 요인들에 의해 쉽게 <b>영향을 받기</b> 때문이죠.`,analysis:`✅ ① wisely(현명하게), rational(합리적인), influenced(영향 받는) — 모두 원문과 일치<br>❌ ② irrational은 '비합리적인'으로 원문(rational)과 반대<br>❌ ③ foolishly는 '어리석게'로 원문(wisely)과 반대<br>❌ ④ foolishly가 원문과 반대<br>❌ ⑤ unaffected는 '영향받지 않는'으로 원문(influenced)과 반대`,tip:`wisely ↔ foolishly, rational ↔ irrational, influenced ↔ unaffected 반의어 쌍을 기억하세요.`}},
{id:2,type:`(A)(B)(C) 조합형`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`(A) features − (B) deny − (C) thrilled`,`(A) flaws − (B) justify − (C) reluctant`,`(A) features − (B) justify − (C) reluctant`,`(A) features − (B) justify − (C) thrilled`,`(A) flaws − (B) deny − (C) thrilled`],passage:`He went on to talk about the (A)[<b>features / flaws</b>] of the tablet and continued to (B)[<b>justify / deny</b>] why the tablet was worth buying. At the end, he said, 'I am (C)[<b>thrilled / reluctant</b>] to announce to you that the pricing starts not at $999 but at just $499.' The crowd went wild.`,stem:`다음 글의 빈칸 (A), (B), (C)에 들어갈 말로 가장 적절한 것은?`,det:{korean:`그는 이어서 태블릿의 <b>기능</b>에 관해 이야기했고 왜 그것이 구매할 가치가 있는지 계속해서 <b>정당화</b>했습니다. 마지막에 그는 '가격이 $999가 아니라 $499부터 시작된다는 것을 알려 드리게 되어 매우 <b>기쁩니다</b>'라고 말했습니다.`,analysis:`❌ ① deny(부정하다)는 justify(정당화하다)의 반의어<br>❌ ② flaws(결함)는 features(기능)의 반의어<br>❌ ③ reluctant(꺼리는)은 thrilled(매우 기쁜)의 반의어<br>✅ ④ features(기능), justify(정당화하다), thrilled(매우 기쁜) — 모두 원문과 일치<br>❌ ⑤ flaws, deny가 원문과 반대`,tip:`features(기능) ↔ flaws(결함), justify(정당화하다) ↔ deny(부정하다), thrilled(매우 기쁜) ↔ reluctant(꺼리는)`}},
{id:3,type:`(A)(B)(C) 조합형`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`(A) equal − (B) exactly − (C) trade`,`(A) unequal − (B) roughly − (C) keep`,`(A) equal − (B) exactly − (C) keep`,`(A) unequal − (B) exactly − (C) trade`,`(A) equal − (B) roughly − (C) trade`],passage:`This group showed an (A)[<b>equal / unequal</b>] preference for the two items. About half of the group chose the chocolate bar, and the other half chose the coffee mug. This suggested that (B)[<b>roughly / exactly</b>] half of the first and second groups would (C)[<b>trade / keep</b>] their items.`,stem:`다음 글의 빈칸 (A), (B), (C)에 들어갈 말로 가장 적절한 것은?`,det:{korean:`이 그룹은 두 물건에 대해 <b>균등한</b> 선호도를 보였습니다. 그룹의 절반 정도가 초콜릿 바를 선택했고, 다른 절반은 커피 머그잔을 선택했습니다. 이는 첫 번째와 두 번째 그룹의 <b>대략</b> 절반 정도가 그들의 물건을 서로 <b>바꿀</b> 것이라는 걸 암시했죠.`,analysis:`❌ ① exactly(정확히)는 roughly(대략)와 의미가 다름<br>❌ ② unequal(불균등한)은 equal(균등한)의 반의어<br>❌ ③ exactly, keep 모두 원문과 다름<br>❌ ④ unequal이 원문과 반대<br>✅ ⑤ equal(균등한), roughly(대략), trade(교환하다) — 모두 원문과 일치`,tip:`equal ↔ unequal, roughly ↔ exactly, trade ↔ keep 반의어 쌍 정리!`}},
{id:4,type:`문맥상 부적절한 어휘`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`affordable`,`comparison`,`disadvantage`,`rely`,`decisions`],passage:`The crowd went wild. The tablet suddenly seemed ①<u>affordable</u> to everyone. He put the $999 price tag in people's minds at the beginning so that the $499 price would seem a lot cheaper in ②<u>comparison</u>. Steve Jobs used something called the anchoring effect to his ③<u>disadvantage</u> here. It works because people tend to ④<u>rely</u> on the first piece of information they receive when making ⑤<u>decisions</u>.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`청중들은 열광했습니다. 그 태블릿은 갑자기 모든 사람들에게 ①<b>구매할 만한 가격</b>으로 보였습니다. $499 가격이 ②<b>비교</b>해서 훨씬 저렴해 보이도록 초반에 $999를 각인시켰습니다. 스티브 잡스는 닻 내림 효과를 자신에게 ③<b>불리하게[→유리하게]</b> 이용했습니다. 사람들이 ④<b>의존</b>하는 경향이 있기 때문에 ⑤<b>결정</b>을 내릴 때 가능한 것이죠.`,analysis:`✅ ① affordable(구매할 만한) — 원문 일치<br>✅ ② comparison(비교) — 원문 일치<br>❌ ③ disadvantage(불리함) → 원문은 <b>advantage(유리함)</b>. 잡스가 앵커링 효과를 '유리하게' 이용한 것이므로 disadvantage는 부적절<br>✅ ④ rely(의존하다) — 원문 일치<br>✅ ⑤ decisions(결정) — 원문 일치`,tip:`advantage(유리함) ↔ disadvantage(불리함) 반의어 쌍을 기억하세요.`}},
{id:5,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:1,ch:[`use`,`refuse`,`ownership`,`temporary`,`willing`],passage:`Companies often ①<u>use</u> the endowment effect as a marketing strategy. For example, many media streaming companies ②<u>refuse</u> free trials to customers. Once customers use the free trial, they feel ③<u>ownership</u> of that service, even if it's ④<u>temporary</u>. Consequently, they are likely to value it more and are ⑤<u>willing</u> to pay to continue to own it.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`기업들은 마케팅 전략으로 보유 효과를 자주 ①<b>이용</b>합니다. 예를 들어, 다수의 미디어 스트리밍 회사들은 고객들에게 무료 체험을 ②<b>거부[→제공]</b>합니다. 한 번 무료 체험을 하면 고객들은 그 서비스에 대한 ③<b>소유권</b>을 느낍니다. 그것이 ④<b>일시적</b>인 것임에도요. 결과적으로 그것을 계속 소유하기 위해 ⑤<b>기꺼이</b> 돈을 지불합니다.`,analysis:`✅ ① use(이용하다) — 원문 일치<br>❌ ② refuse(거부하다) → 원문은 <b>offer(제공하다)</b>. 스트리밍 회사가 무료 체험을 '제공'하는 것이므로 refuse는 부적절<br>✅ ③ ownership(소유권) — 원문 일치<br>✅ ④ temporary(일시적인) — 원문 일치<br>✅ ⑤ willing(기꺼이 하는) — 원문 일치`,tip:`offer(제공하다) ↔ refuse(거부하다) 반의어 쌍. 문맥상 무료 체험을 '제공'하는 것이 자연스럽습니다.`}},
{id:6,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`presented`,`drawn`,`original`,`unreasonable`,`encourage`],passage:`Look at the two pairs of sneakers. They both are $50, but the way their price is ①<u>presented</u> is different. Naturally, people are more ②<u>drawn</u> to the second pair. This is because the ③<u>original</u> price serves as an anchor, making the discounted price appear more ④<u>unreasonable</u> in comparison. It is common for stores to use this kind of price anchoring as a way to ⑤<u>encourage</u> purchases.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`운동화 두 켤레를 보세요. 두 제품 모두 $50인데 가격이 ①<b>제시되는</b> 방식은 다릅니다. 사람들은 자연스럽게 두 번째에 더 ②<b>끌립니다</b>. ③<b>원래</b> 가격이 닻 역할을 하여 할인 가격을 더 ④<b>비합리적으로[→합리적으로]</b> 보이게 만들기 때문입니다. 이런 가격 앵커링으로 구매를 ⑤<b>장려</b>하는 것은 흔한 일입니다.`,analysis:`✅ ① presented(제시된) — 원문 일치<br>✅ ② drawn(끌리는) — 원문 일치<br>✅ ③ original(원래의) — 원문 일치<br>❌ ④ unreasonable(비합리적인) → 원문은 <b>reasonable(합리적인)</b>. 할인 가격이 '합리적으로' 보이게 만드는 것이므로 unreasonable은 부적절<br>✅ ⑤ encourage(장려하다) — 원문 일치`,tip:`reasonable(합리적인) ↔ unreasonable(비합리적인). 앵커링은 할인 가격을 더 '합리적'으로 보이게 하는 효과입니다.`}},
{id:7,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`supposed`,`assumed`,`denied`,`announced`],passage:`In 2010, Steve Jobs introduced the tablet computer to the world. During the presentation, he said, 'We're going to price it under a thousand dollars,' which most people __________ meant $999. He went on to talk about the features of the tablet and continued to justify why the tablet was worth buying.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`2010년에 스티브 잡스는 태블릿 컴퓨터를 세상에 선보였습니다. 발표 중에 그는 '1,000달러 이하로 가격을 책정하겠습니다'라고 말했고, 대부분의 사람들은 그것이 $999를 의미한다고 <b>추측했습니다</b>.`,analysis:`❌ ① supposed — '가정하다'라는 뜻이지만 문맥상 부자연스러움<br>✅ ② assumed — '추측하다, 짐작하다'로 원문과 일치<br>❌ ③ denied — '부정하다'는 문맥과 맞지 않음<br>❌ ④ announced — '발표하다'는 청중이 아닌 잡스의 행동`,tip:`assume = ~라고 추측하다/짐작하다. suppose와 비슷하지만 assume이 '근거 없이 당연히 여기다'의 뉘앙스가 강합니다.`}},
{id:8,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`appeal`,`apply`,`attach`,`attend`],passage:`As we've seen, our spending can be influenced by factors that __________ to our emotions and mind. I hope this short lecture gave you a chance to reflect on your own spending and helped you understand the reasons behind irrational purchasing decisions.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`지금까지 보았듯, 우리의 소비는 우리의 감정과 마음에 <b>호소하는</b> 요인들의 영향을 받을 수 있습니다. 이 강의가 여러분의 소비를 되돌아보는 기회가 되었기를 바랍니다.`,analysis:`✅ ① appeal — 'appeal to = ~에 호소하다'로 원문과 일치<br>❌ ② apply — 'apply to = ~에 적용하다'는 문맥과 맞지 않음<br>❌ ③ attach — 'attach to = ~에 부착하다'는 문맥과 맞지 않음<br>❌ ④ attend — 'attend to = ~에 주의를 기울이다'는 문맥과 맞지 않음`,tip:`appeal to = ~에 호소하다. 감정이나 마음에 '호소하다'라는 표현을 기억하세요.`}},
{id:9,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`reward`,`receipt`,`revenue`,`refund`],passage:`Say that a company is offering free returns on a smartwatch within 30 days of purchase. It seems like a good deal, since you can get a __________ even after using the item. But once you take this deal and establish ownership of the watch, it is unlikely that you will return it.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`어떤 회사에서 스마트워치 구매 후 30일 이내에 무료 반품을 해 준다고 가정해 봅시다. 제품을 사용한 후에도 <b>환불</b>을 받을 수 있기 때문에 좋은 거래처럼 보입니다.`,analysis:`❌ ① reward — '보상'은 반품 맥락과 맞지 않음<br>❌ ② receipt — '영수증'은 반품 후 돌려받는 것이 아님<br>❌ ③ revenue — '수익'은 기업 관점이므로 부적절<br>✅ ④ refund — '환불'로 원문과 일치. 무료 반품 후 돈을 돌려받는 것`,tip:`refund(환불), reward(보상), receipt(영수증), revenue(수익) — re- 접두사 단어들을 구별하세요!`}},
{id:10,type:`동의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`controls`,`confuses`,`relates to`,`worries`],passage:`Good afternoon, students. Today, I'd like to talk about a topic that <u>concerns</u> us all: Money! Do you think that you spend money wisely? The truth is that most people are not as rational as they think.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>가까운</b> 것은?`,det:{korean:`안녕하세요, 학생 여러분. 오늘은 우리 모두와 <b>관련된</b> 주제에 대해 이야기하려 합니다. 바로 돈입니다!`,analysis:`❌ ① controls — '통제하다'는 문맥과 맞지 않음<br>❌ ② confuses — '혼란스럽게 하다'는 문맥과 맞지 않음<br>✅ ③ relates to — '~와 관련되다'로 concern(관련되다)과 동의어<br>❌ ④ worries — concern이 '걱정하다'의 뜻도 있지만 여기서는 '관련되다'의 의미`,tip:`concern은 다의어! ① 관련되다(= relate to) ② 걱정하다(= worry). 문맥에 따라 의미가 달라집니다.`}},
{id:11,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`describe`,`demonstrate`,`imagine`,`investigate`],passage:`The truth is that most people are not as rational as they think. This is because human beings are easily influenced by psychological factors. Let me <u>illustrate</u> my point through the following examples.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>가까운</b> 것은?`,det:{korean:`사실은 대부분의 사람이 자신들이 생각하는 만큼 합리적이지 않습니다. 인간은 심리적 요인에 의해 쉽게 영향을 받기 때문이죠. 다음 사례들을 통해 제 의견을 <b>설명해</b> 보도록 하겠습니다.`,analysis:`❌ ① describe — '묘사하다'는 유사하지만 '예시로 설명하다'와 약간 다름<br>✅ ② demonstrate — '예를 들어 보여주다/설명하다'로 illustrate와 가장 가까움<br>❌ ③ imagine — '상상하다'는 의미가 다름<br>❌ ④ investigate — '조사하다'는 의미가 다름`,tip:`illustrate = (예시로) 설명하다, 보여주다 ≒ demonstrate. 그림(illustration)을 통해 보여준다고 연상하세요.`}},
{id:12,type:`동의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`examine`,`destroy`,`predict`,`form`],passage:`Say that a company is offering free returns on a smartwatch within 30 days of purchase. It seems like a good deal, since you can get a refund even after using the item. But once you take this deal and <u>establish</u> ownership of the watch, it is unlikely that you will return it.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>가까운</b> 것은?`,det:{korean:`어떤 회사에서 스마트워치 구매 후 30일 이내에 무료 반품을 해 준다고 가정해 봅시다. 하지만 이 거래를 받아들이고 시계의 소유권을 <b>형성하게</b> 되면 반품할 가능성은 낮아집니다.`,analysis:`❌ ① examine — '조사하다'는 의미가 다름<br>❌ ② destroy — '파괴하다'는 establish의 반의어에 가까움<br>❌ ③ predict — '예측하다'는 의미가 다름<br>✅ ④ form — '형성하다'로 establish(확립하다/형성하다)와 가장 가까움`,tip:`establish = 확립하다, 형성하다, 설립하다 ≒ form, set up. 소유권을 '확립/형성'한다는 맥락입니다.`}},
{id:13,type:`반의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`disregard`,`appreciate`,`treasure`,`cherish`],passage:`This is because people <u>value</u> something more when they own it. This is the basic idea of the endowment effect. People are less likely to give up what they already have or trade it for something else.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`이는 사람들이 자신이 무언가를 소유했을 때 그것을 더 <b>가치 있게 여기기</b> 때문입니다. 이것이 보유 효과의 기본 개념입니다.`,analysis:`✅ ① disregard — '무시하다'로 value(가치 있게 여기다)와 <b>반의어</b> → 정답<br>❌ ② appreciate — '소중히 여기다'로 value와 유의어<br>❌ ③ treasure — '소중히 여기다'로 value와 유의어<br>❌ ④ cherish — '소중히 여기다'로 value와 유의어`,tip:`value(가치 있게 여기다) ≒ appreciate, treasure, cherish ↔ disregard(무시하다), neglect(소홀히 하다)`}},
{id:14,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`unreasonable`,`senseless`,`logical`,`absurd`],passage:`As we've seen, our spending can be influenced by factors that appeal to our emotions and mind. I hope this short lecture gave you a chance to reflect on your own spending and helped you understand the reasons behind <u>irrational</u> purchasing decisions.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`이 짧은 강의가 여러분의 소비를 되돌아보는 기회가 되고, <b>비합리적인</b> 구매 결정의 이유를 이해하는 데 도움이 되었기를 바랍니다.`,analysis:`❌ ① unreasonable — '비합리적인'으로 irrational과 유의어<br>❌ ② senseless — '무분별한'으로 irrational과 유의어<br>✅ ③ logical — '논리적인'으로 irrational(비합리적인)과 <b>반의어</b> → 정답<br>❌ ④ absurd — '터무니없는'으로 irrational과 유의어`,tip:`irrational(비합리적인) ≒ unreasonable, senseless, absurd ↔ logical(논리적인), rational(합리적인)`}},
{id:15,type:`다의어 문맥적 의미`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`You need to deal with stress in a healthy way.`,`The government made a deal with the opposition party.`,`She had to deal with angry customers all day.`,`Teachers deal with various student issues daily.`,`He got a great deal on his new laptop.`],passage:`A free-return policy is another example. Say that a company is offering free returns on a smartwatch within 30 days of purchase. It seems like a good <b>deal</b>, since you can get a refund even after using the item.`,stem:`다음 글에서 쓰인 <b>deal</b>의 의미와 <b>같은</b> 의미로 쓰인 것을 고르시오.`,det:{korean:`무료 반품 정책은 또 다른 예입니다. 제품을 사용한 후에도 환불을 받을 수 있기 때문에 좋은 <b>거래(조건)</b>처럼 보입니다.`,analysis:`본문의 deal = '거래, 좋은 조건'이라는 <b>명사</b> 의미<br>❌ ① deal with = '다루다, 처리하다' (동사구)<br>❌ ② deal = '합의, 협정' (명사이지만 의미가 다름)<br>❌ ③ deal with = '다루다' (동사구)<br>❌ ④ deal with = '다루다' (동사구)<br>✅ ⑤ deal = '(가격이) 좋은 거래/조건' — 본문과 동일한 의미`,tip:`deal의 주요 의미: ① (명사) 거래, 좋은 조건 (a good deal) ② (명사) 합의 (make a deal) ③ (동사) deal with = 다루다, 처리하다`}},
{id:16,type:`영영풀이 매칭`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`purchase`,`strategy`,`preference`,`budget`],passage:`<i>"the amount of money that is available for, or assigned to, a particular purpose such as spending"</i><br><br>[참고] That's too expensive, as you don't want to spend more than $50. Soon after, you see a similar jacket from a different brand with a $70 price tag. You think it's affordable, even though the price is still beyond your __________.`,stem:`다음 영영 정의에 해당하는 단어를 고르시오.`,det:{korean:`너무 비싸서 $50 이상 쓰고 싶지 않습니다. 곧이어 $70짜리 비슷한 재킷을 봅니다. 그 가격은 여전히 <b>예산</b>을 초과하지만 적당하다고 생각합니다.`,analysis:`❌ ① purchase — '구매'는 영영 정의와 맞지 않음<br>❌ ② strategy — '전략'은 영영 정의와 맞지 않음<br>❌ ③ preference — '선호'는 영영 정의와 맞지 않음<br>✅ ④ budget — '예산, 쓸 수 있는 금액'으로 영영 정의와 일치`,tip:`budget = 예산, 지출 계획. 'beyond one's budget' = 예산을 초과하여`}},
{id:17,type:`어형 변환 (서술형)`,diff:`보통`,pts:5,fmt:"written",wa:`discounted`,accept:[`discounted`],passage:`Naturally, people are more drawn to the second pair. This is because the original price serves as an anchor, making the (discount) __________ price appear more reasonable in comparison. It is common for stores to use this kind of price anchoring as a way to encourage purchases.`,stem:`다음 괄호 안의 단어를 문맥에 맞게 변형하여 빈칸에 쓰시오.`,det:{korean:`사람들은 자연스럽게 두 번째에 더 끌립니다. 원래 가격이 닻 역할을 하여 <b>할인된</b> 가격을 더 합리적으로 보이게 만들기 때문입니다.`,analysis:`discount(할인, 할인하다) → <b>discounted</b>(할인된) : 과거분사형으로 'price'를 수식하는 형용사 역할. '할인된 가격'이라는 의미가 되어야 합니다.`,tip:`discount → discounted(할인된, 과거분사 형용사). discounted price = 할인된 가격, 명사를 수식하는 과거분사!`}},
{id:18,type:`어형 변환 (서술형)`,diff:`어려움`,pts:6,fmt:"written",wa:`Consequently`,accept:[`Consequently`,`consequently`],passage:`Companies often use the endowment effect as a marketing strategy. For example, many media streaming companies offer free trials to customers. Once customers use the free trial, they feel ownership of that service, even if it's temporary. (Consequence) __________, they are likely to value it more and are willing to pay to continue to own it.`,stem:`다음 괄호 안의 단어를 문맥에 맞게 변형하여 빈칸에 쓰시오.`,det:{korean:`한 번 무료 체험을 하면 고객들은 그 서비스에 대한 소유권을 느낍니다. <b>결과적으로</b>, 그것을 좀 더 가치 있게 여기고 기꺼이 돈을 지불합니다.`,analysis:`Consequence(결과, 명사) → <b>Consequently</b>(결과적으로, 부사) : 문장 앞에서 접속부사로 쓰여 앞 문장과의 인과 관계를 나타냅니다.`,tip:`consequence(명사: 결과) → consequently(부사: 결과적으로). 접속부사로 쓰일 때 뒤에 콤마(,)가 옵니다!`}},
{id:19,type:`빈칸 문맥 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`the anchoring effect`,`the endowment effect`,`the placebo effect`,`the halo effect`],passage:`He put the $999 price tag in people's minds at the beginning so that the $499 price would seem a lot cheaper in comparison. Steve Jobs used something called __________ to his advantage here. It works because people tend to rely on the first piece of information they receive when making decisions.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`$499 가격이 비교적 훨씬 저렴해 보이도록 초반에 $999 가격표를 사람들의 마음에 각인시켰습니다. 스티브 잡스는 여기에서 <b>닻 내림 효과</b>라는 것을 유리하게 이용했습니다.`,analysis:`✅ ① the anchoring effect — '닻 내림 효과'. 처음 정보($999)가 이후 판단에 영향 → 원문과 일치<br>❌ ② the endowment effect — '보유 효과'는 소유와 관련된 효과<br>❌ ③ the placebo effect — '위약 효과'는 의학 용어<br>❌ ④ the halo effect — '후광 효과'는 한 특성이 전체 평가에 영향`,tip:`anchoring effect(닻 내림 효과): 처음 제시된 정보(anchor)가 이후 판단의 기준이 되는 심리 효과`}},
{id:20,type:`빈칸 문맥 완성`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`certain`,`possible`,`unlikely`,`obvious`],passage:`A free-return policy is another example. Say that a company is offering free returns on a smartwatch within 30 days of purchase. It seems like a good deal, since you can get a refund even after using the item. But once you take this deal and establish ownership of the watch, it is __________ that you will return it.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`어떤 회사에서 스마트워치 구매 후 30일 이내에 무료 반품을 해 준다고 가정해 봅시다. 하지만 이 거래를 받아들이고 시계의 소유권을 갖게 되면, 여러분이 그것을 반품할 가능성은 <b>낮습니다</b>.`,analysis:`❌ ① certain — '확실한'은 문맥과 반대 (반품 가능성이 높다는 뜻)<br>❌ ② possible — '가능한'은 보유 효과의 핵심을 나타내지 못함<br>✅ ③ unlikely — '가능성이 낮은'으로 원문과 일치. 소유권 형성 후 반품 가능성 낮음<br>❌ ④ obvious — '명백한'은 문맥과 맞지 않음`,tip:`unlikely = 가능성이 낮은. 보유 효과 때문에 소유한 것은 쉽게 포기하지 않는다는 핵심 개념!`}}
];


let S={cur:0,ans:new Array(EI.totalQ).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,levelIcon:getLevel(r.score).icon});if(h.length>10)h.splice(0,h.length-10);try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 시험 기록이 없습니다.</p>';else p.innerHTML=h.slice().reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time} · ${r.grade}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.levelIcon} ${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'전설',icon:'🐉',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'챔피언',icon:'🏆',range:'90~94',msg:'최상위권!'};if(s>=80)return{name:'다이아몬드',icon:'💎',range:'80~89',msg:'통과! 취약 유형만 복습하면 최상위!'};if(s>=70)return{name:'빛나는별',icon:'🌟',range:'70~79',msg:'통과까지 조금만 더!'};if(s>=60)return{name:'별',icon:'⭐',range:'60~69',msg:'기본기 탄탄! 본문 복습 후 재도전!'};if(s>=40)return{name:'나무',icon:'🌲',range:'40~59',msg:'성장 중!'};return{name:'새싹',icon:'🌱',range:'0~39',msg:'단어 암기부터 시작!'};}
function fmtTime(s){return Math.floor(s/60)+'분 '+(s%60)+'초';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(EI.totalQ).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
const typeTag={'(A)(B)(C) 조합형':'tag-combo','문맥상 부적절한 어휘':'tag-wrong','빈칸 어휘 완성':'tag-blank','동의어 고르기':'tag-syn','반의어 고르기':'tag-ant','다의어 문맥적 의미':'tag-poly','영영풀이 매칭':'tag-eng','어형 변환 (서술형)':'tag-morph','빈칸 문맥 완성':'tag-ctx'};
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc=typeTag[q.type]||'';h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body">`;if(q.passage)h+=`<div class="q-passage">${q.passage}</div>`;h+=`<div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){const mk=q.ch.length===5?'①②③④⑤':'①②③④';h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${mk[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:EI.totalQ},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('answered',S.ans[i]!==null));}
function scrollToQ(i){if(i<0||i>=EI.totalQ)return;S.cur=i;document.getElementById('qc-'+i).scrollIntoView({behavior:'smooth',block:'center'});}
function sel(qi,ci){document.querySelectorAll('.choice-btn[data-q="'+qi+'"]').forEach(b=>b.classList.remove('selected'));document.querySelector('.choice-btn[data-q="'+qi+'"][data-c="'+ci+'"]').classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById('w-'+qi).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase();if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase());if(!ok&&q.wa)ok=u===q.wa.toLowerCase();}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok});});return{score,correct,wrong,unanswered,details};}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100);const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={total:0,ok:0};typeMap[t].total++;if(d.ok)typeMap[t].ok++;});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.ok===v.total).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.ok<v.total).map(([k])=>k);let h='';
h+=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/${EI.total}</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong></span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교 / 학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 / ${EI.total}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간 / 통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.ok/d.total*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type.replace(/\(.+?\)/g,'').trim().slice(0,6)}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});
if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t.slice(0,8)}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t.slice(0,8)}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽!</h4><p>다른 단원도 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>틀린 유형 집중 복습으로 만점까지!</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기부터!</h4><p>지문 해석을 완벽히 이해한 뒤 재도전!</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="copyResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유하기</span></button><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);margin-left:8px">클릭하여 펼치기</span></div>`;r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const mk=d.q.ch&&d.q.ch.length===5?'①②③④⑤':'①②③④';const ua=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const ca=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;const open=!d.ok;h+=`<div class="rev-card"><div class="rev-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.rev-icon').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><span style="font-weight:800">${icon} ${d.q.id}번</span><span style="font-size:12px;color:var(--tm)">[${d.q.type.slice(0,6)}] ${d.q.pts}점</span><span class="rev-icon">▼</span></div><div class="rev-body${open?' open':''}"><div style="display:flex;gap:10px;margin-bottom:14px"><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;${d.ok?'background:var(--gl);color:var(--g)':'background:var(--rl);color:var(--r)'}"><div style="font-size:11px;opacity:.7">내 답</div>${ua}</div><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;background:var(--gl);color:var(--g)"><div style="font-size:11px;opacity:.7">정답</div>${ca}</div></div><div class="expl-tag ans">🇰🇷 해석</div><div class="expl-box ans-b">${d.q.det.korean}</div><div class="expl-tag tip">📋 분석</div><div class="expl-box">${d.q.det.analysis}</div><div class="expl-tag tip">💡 팁</div><div class="expl-box tip-b">${d.q.det.tip}</div></div></div>`;});h+=`</div></div>`;document.getElementById('resultScreen').innerHTML=h;}
function copyResult(){const r=grade(),lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100),nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,elapsed=Math.floor((Date.now()-S.start)/1000),pass=r.score>=80;const mk5='①②③④⑤',mk4='①②③④';const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,w:[]};typeMap[t].t++;if(d.ok)typeMap[t].o++;else typeMap[t].w.push(d.q.id);});
let txt=`📝 온라인단어 TEST 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🏆 점수: ${r.score} / ${EI.total}점 (${pct}%)\n${lv.icon} 레벨: ${lv.name}\n${pass?'🎉 통과!':'📚 미통과'}\n\n✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n⏱️ 소요시간: ${fmtTime(elapsed)}\n\n━━ 📊 문항별 결과 ━━\n`;
r.details.forEach(d=>{const mark=d.ok?'✅':'❌';const mk=d.q.ch&&d.q.ch.length===5?mk5:mk4;const ans=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const cor=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;txt+=`${mark} ${d.q.id}번 [${d.q.type.slice(0,6)}] ${d.q.pts}점 — 내답:${ans} 정답:${cor}\n`;});
txt+=`\n━━ 📈 유형별 분석 ━━\n`;Object.entries(typeMap).forEach(([t,v])=>{const p=Math.round(v.o/v.t*100);const ic=p===100?'🟢':(p>0?'🟡':'🔴');txt+=`${ic} ${t.slice(0,6)}: ${v.o}/${v.t} (${p}%)`;if(v.w.length)txt+=` ← 틀린:${v.w.join(',')}번`;txt+=`\n`;});
txt+=`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n#온라인단어TEST #영어내신`;
navigator.clipboard.writeText(txt).then(()=>toast('📋 상세 결과가 복사되었습니다!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('📋 복사되었습니다!');}catch(e){toast('복사 실패');}document.body.removeChild(ta);});}
function retake(){startExam();}
function goHome(){showScreen('startScreen');updateHCount();}
window.addEventListener('beforeunload',e=>{if(S.ti){e.preventDefault();e.returnValue='';}});

</script>
</body>
</html>
