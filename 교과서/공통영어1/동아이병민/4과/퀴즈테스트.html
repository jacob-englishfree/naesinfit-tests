  note:'어법 ⓐ~ⓔ',
  passage:`In 2010, Steve Jobs <u>ⓐ introduced</u> the tablet computer to the world. During the presentation, he said, &quot;We&rsquo;re going to price it under a thousand dollars,&quot; <u>ⓑ which</u> most people assumed meant $999. He went on to talk about the features of the tablet and continued <u>ⓒ justifying</u> why the tablet was worth buying. At the end, he said, &quot;I am thrilled <u>ⓓ to announce</u> to you that the pricing starts not at $999 but at just $499.&quot; The crowd went wild. He put the $999 price tag in people&rsquo;s minds at the beginning so that the $499 price <u>ⓔ would seem</u> a lot cheaper in comparison.`,
  stem:`다음 글의 밑줄 친 ⓐ~ⓔ 중, 어법상 <b>어색한 것</b>을 고르시오.`,
  ch:["ⓐ introduced", "ⓑ which", "ⓒ justifying", "ⓓ to announce", "ⓔ would seem"],
  ans:2,
  det:{
    ref:`[원문] He went on to talk about the features of the tablet and continued <b>to justify</b> why the tablet was worth buying. [해석] 그는 이어서 태블릿의 기능에 관해 이야기했고 왜 그것이 구매할 가치가 있는지 계속해서 보여 주었습니다. continue는 to-v와 v-ing 모두 가능하지만, 원문에서는 'continued to justify'가 올바른 표현입니다. 그러나 이 문항에서 'justifying'은 'to justify'로 고쳐야 원문과 일치합니다.`,
    correct:`ⓐ introduced: Steve Jobs가 주어, 과거시제 동사 → 올바름 ✅ | ⓑ which: 앞 절 전체를 선행사로 받는 관계대명사(계속적 용법) → 올바름 ✅ | ⓒ justifying: continued 뒤에 to justify(원문)가 와야 함. continue + to-v = '계속 ~하다'. 원문은 'continued to justify'이므로 justifying → to justify ❌ | ⓓ to announce: be thrilled to-v '~하게 되어 기쁘다' 감정형용사 + to부정사 → 올바름 ✅ | ⓔ would seem: so that + S + 조동사 과거형 '~하도록' 목적의 부사절 → 올바름 ✅`,
    wrongs:[],
    tip:`🔑 continue + to-v / v-ing: 둘 다 가능하지만 원문 일치 여부 확인 필수. 원문은 'continued to justify'. 비교: stop + to-v(~하려고 멈추다) vs. stop + v-ing(~을 그만두다)는 의미 차이가 큼.`
  }
},
{
  id:2, type:'어법', diff:'어려움', pts:6, fmt:'mc',
  note:'어법 A/B/C',
  passage:`In an experiment, one group of students was given a coffee mug and a second group a chocolate bar. Both groups were told they could exchange their items. A third group wasn&rsquo;t given anything and was told to choose either a chocolate bar or a coffee mug. This group showed an equal preference for the two items. This suggested that roughly half of the first and second groups (A) <b>[would trade / will trade]</b> their items. But that&rsquo;s not (B) <b>[what / that]</b> happened. Only about 10 percent of the students in the first and second groups were willing to make the exchange. This is because people value something more when they (C) <b>[own / are owned]</b> it.`,
  stem:`다음 글의 (A), (B), (C)에서 어법에 맞는 표현으로 가장 적절한 것을 고르시오.`,
  ch:["(A) would trade – (B) what – (C) own", "(A) would trade – (B) that – (C) own", "(A) will trade – (B) what – (C) own", "(A) will trade – (B) that – (C) are owned", "(A) would trade – (B) what – (C) are owned"],
  ans:0,
  det:{
    ref:`[원문] This suggested that roughly half ~ <b>would trade</b> their items. But that's not <b>what</b> happened. ~ people value something more when they <b>own</b> it. [해석] 이는 첫 번째와 두 번째 그룹의 절반 정도가 물건을 교환할 것이라는 걸 암시했습니다. 하지만 그런 일은 일어나지 않았습니다. 사람들이 무언가를 소유했을 때 그것을 더 가치 있게 여기기 때문입니다.`,
    correct:`① (A) would trade – (B) what – (C) own ✅ 정답: (A) suggested(과거)에 이어 시제 일치로 would trade, (B) what = the thing that, 선행사 포함 관계대명사, (C) own은 타동사로 '소유하다' 능동 | ② would trade – that – own ❌: that은 선행사가 없어 불가 | ③ will trade – what – own ❌: 과거 시점 추측이므로 will 부적절 | ④ will trade – that – are owned ❌: 시제·관계사·태 모두 오류 | ⑤ would trade – what – are owned ❌: they own it(능동)이 올바름, 수동태 불가`,
    wrongs:[],
    tip:`🔑 시제 일치: 주절 과거(suggested) → 종속절 would(과거 추측). what = the thing which(선행사 포함 관계대명사). own은 상태동사로 수동태 불가 — They own it. (○) / It is owned by them. (△ 가능하나 문맥상 부자연스러움)`
  }
},
{
  id:3, type:'어법', diff:'어려움', pts:6, fmt:'mc',
  note:'어법 ⓐ~ⓓ',
  passage:`Companies often use the endowment effect as a marketing strategy. For example, many media streaming companies offer free trials to customers. Once customers use the free trial, they feel ownership of that service, even if <u>ⓐ it&rsquo;s</u> temporary. <u>ⓑ Consequently</u>, they are likely to value it more and are willing to pay to continue <u>ⓒ owning</u> it. A free-return policy is another example. Say that a company is offering free returns on a smartwatch within 30 days of purchase. It seems like a good deal, since you can get a refund even after <u>ⓓ used</u> the item.`,
  stem:`다음 글의 밑줄 친 ⓐ~ⓓ 중, 어법상 <b>어색한 것</b>을 고르시오.`,
  ch:["ⓐ it's", "ⓑ Consequently", "ⓒ owning", "ⓓ used"],
  ans:3,
  det:{
    ref:`[원문] since you can get a refund even after <b>using</b> the item [해석] 제품을 사용한 후에도 환불을 받을 수 있기 때문에 좋은 거래처럼 보입니다. 전치사 after 뒤에는 동명사(v-ing)가 와야 합니다. used(과거형/과거분사)는 전치사의 목적어가 될 수 없으므로 using으로 고쳐야 합니다.`,
    correct:`ⓐ it's: it is의 축약형, 주격 보어 temporary 앞 be동사 → 올바름 ✅ | ⓑ Consequently: '결과적으로'라는 부사, 앞 문장의 결과를 이끔 → 올바름 ✅ | ⓒ owning: continue + v-ing '계속 소유하다' → 올바름 ✅ | ⓓ used: 전치사 after의 목적어로 동명사 필요 → used ❌ → using ✅`,
    wrongs:[],
    tip:`🔑 전치사 + 동명사(v-ing): after using (○) / after used (✕). 전치사(after, before, by, without 등) 뒤에는 반드시 명사/동명사가 온다. 비교: after being used(수동 동명사) = '사용된 후에'도 가능하나, 여기서는 주어(you)가 직접 사용하는 능동 의미.`
  }
},
{
  id:4, type:'어휘', diff:'보통', pts:5, fmt:'mc',
  note:'어휘 A/B/C',
  passage:`Do you think that you spend money (A) <b>[wisely / wastefully]</b>? The truth is that most people are not as rational as they think. This is because human beings are easily influenced by (B) <b>[psychological / physical]</b> factors. Steve Jobs used something called the anchoring effect to his advantage. It works because people tend to (C) <b>[rely on / give up]</b> the first piece of information they receive when making decisions.`,
  stem:`다음 글의 (A), (B), (C)에서 문맥에 맞는 낱말로 가장 적절한 것을 고르시오.`,
  ch:["(A) wisely – (B) psychological – (C) rely on", "(A) wastefully – (B) psychological – (C) rely on", "(A) wisely – (B) physical – (C) rely on", "(A) wisely – (B) psychological – (C) give up", "(A) wastefully – (B) physical – (C) give up"],
  ans:0,
  det:{
    ref:`[원문] Do you think that you spend money <b>wisely</b>? ~ easily influenced by <b>psychological</b> factors. ~ people tend to <b>rely on</b> the first piece of information [해석] 돈을 현명하게 쓴다고 생각하나요? 심리적 요인에 쉽게 영향받습니다. 사람들은 처음 접하는 정보에 의존하는 경향이 있습니다.`,
    correct:`① wisely – psychological – rely on ✅ 정답: 원문과 완전 일치. wisely(현명하게), psychological(심리적인), rely on(~에 의존하다) | ② wastefully ❌: 문맥상 '낭비적으로'가 아닌 '현명하게'가 질문의 흐름에 맞음 | ③ physical ❌: '신체적' 요인이 아닌 '심리적' 요인 | ④ give up ❌: '포기하다'는 문맥과 반대 | ⑤ 모두 오류`,
    wrongs:[],
    tip:`🔑 wisely(현명하게) ↔ wastefully(낭비적으로). psychological(심리적인) ↔ physical(신체적인). rely on(~에 의존하다) ≈ depend on ↔ give up(포기하다). 문맥 흐름: 현명하게 쓴다고 생각? → 사실 심리적 요인에 영향 → 첫 정보에 의존.`
  }
},
{
  id:5, type:'어휘', diff:'어려움', pts:6, fmt:'mc',
  note:'어휘 부적절',
  passage:`Let&rsquo;s say you are shopping for a new jacket and the first one you see is priced at $100. That&rsquo;s too expensive, as you don&rsquo;t want to spend more than $50. Soon after, you see a similar jacket from a different brand with a $70 price tag. You think it&rsquo;s ① <u>affordable</u>, even though the price is still beyond your budget. This is because the first piece of information acts as an ② <u>anchor</u> that influences your decisions later. Look at the two pairs of sneakers. They both are $50, but the way their price is presented is different. Naturally, people are more ③ <u>drawn</u> to the second pair. This is because the original price serves as an anchor, making the ④ <u>discounted</u> price appear more ⑤ <u>unreasonable</u> in comparison.`,
  stem:`다음 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 <b>적절하지 않은 것</b>을 고르시오.`,
  ch:["① affordable", "② anchor", "③ drawn", "④ discounted", "⑤ unreasonable"],
  ans:4,
  det:{
    ref:`[원문] making the discounted price appear more <b>reasonable</b> in comparison [해석] 할인된 가격을 상대적으로 더 <b>합리적으로</b> 보이게 만들기 때문입니다. 원문은 reasonable(합리적인)인데, ⑤는 unreasonable(비합리적인)로 문맥과 반대되는 의미입니다.`,
    correct:`① affordable(적당한 가격의): $70을 $100과 비교해 적당하다고 느낌 → 문맥 적절 ✅ | ② anchor(닻): 첫 정보가 닻 역할 → 문맥 적절 ✅ | ③ drawn(끌리는): be drawn to '~에 끌리다' → 문맥 적절 ✅ | ④ discounted(할인된): 원래 가격 대비 할인된 가격 → 문맥 적절 ✅ | ⑤ unreasonable(비합리적인): 원문은 reasonable(합리적인). 닻 효과로 할인가가 더 합리적으로 보이는 것이므로 unreasonable은 부적절 ❌`,
    wrongs:[],
    tip:`🔑 reasonable(합리적인) ↔ unreasonable(비합리적인). 닻 내림 효과의 핵심: 높은 원래 가격(닻) → 할인 가격이 더 '합리적으로(reasonable)' 보이게 함. affordable ≈ reasonably priced(적당한 가격의). be drawn to ≈ be attracted to(~에 끌리다).`
  }
},
{
  id:6, type:'어휘', diff:'보통', pts:5, fmt:'mc',
  note:'어휘 부적절',
  passage:`In an experiment, one group of students was given a coffee mug and a second group a chocolate bar. A third group showed an ① <u>equal</u> preference for the two items. This suggested that roughly half of the first and second groups would ② <u>trade</u> their items. But only about 10 percent were willing to make the exchange. This is because people value something more when they ③ <u>own</u> it. People are less likely to ④ <u>give up</u> what they already have. Companies often use the endowment effect as a marketing ⑤ <u>obstacle</u>.`,
  stem:`다음 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 <b>적절하지 않은 것</b>을 고르시오.`,
  ch:["① equal", "② trade", "③ own", "④ give up", "⑤ obstacle"],
  ans:4,
  det:{
    ref:`[원문] Companies often use the endowment effect as a marketing <b>strategy</b>. [해석] 기업들은 마케팅 <b>전략</b>으로 보유 효과를 자주 이용합니다. 원문은 strategy(전략)인데, ⑤는 obstacle(장애물)로 문맥과 맞지 않습니다.`,
    correct:`① equal(동등한): 세 번째 그룹이 두 물건에 동등한 선호를 보임 → 적절 ✅ | ② trade(교환하다): 절반 정도가 교환할 것이라고 추측 → 적절 ✅ | ③ own(소유하다): 소유할 때 더 가치 있게 여김 → 적절 ✅ | ④ give up(포기하다): 이미 가진 것을 포기할 가능성 낮음 → 적절 ✅ | ⑤ obstacle(장애물): 원문은 strategy(전략). 기업이 보유 효과를 마케팅 '전략'으로 사용 → obstacle 부적절 ❌`,
    wrongs:[],
    tip:`🔑 strategy(전략) ↔ obstacle(장애물). 기업 입장에서 보유 효과는 마케팅에 활용하는 '전략'이지, '장애물'이 아닙니다. 유의어: strategy ≈ tactic ≈ approach. 반의어: strategy ↔ obstacle ↔ hindrance.`
  }
},
{
  id:7, type:'대의', diff:'보통', pts:5, fmt:'mc',
  note:'주제',
  passage:`Do you think that you spend money wisely? The truth is that most people are not as rational as they think. This is because human beings are easily influenced by psychological factors. Steve Jobs used something called the anchoring effect to his advantage. It works because people tend to rely on the first piece of information they receive when making decisions. Companies often use the endowment effect as a marketing strategy. People value something more when they own it, and they are less likely to give up what they already have.`,
  stem:`다음 글의 주제로 가장 적절한 것을 고르시오.`,
  ch:["the importance of saving money for the future", "psychological factors that influence consumer spending", "how companies develop new marketing technologies", "the difference between rational and emotional thinking", "ways to become a smarter shopper online"],
  ans:1,
  det:{
    ref:`[원문] most people are not as rational as they think. This is because human beings are easily influenced by psychological factors. [해석] 대부분의 사람이 자신들이 생각하는 만큼 합리적이지 않습니다. 인간은 심리적인 요인들에 의해 쉽게 영향을 받기 때문이죠. 이 글은 닻 내림 효과와 보유 효과라는 심리적 요인이 소비 행동에 미치는 영향을 설명합니다.`,
    correct:`① 미래를 위한 저축의 중요성 ❌: 저축은 언급되지 않음 | ② 소비자 지출에 영향을 미치는 심리적 요인 ✅ 정답: 닻 내림 효과 + 보유 효과라는 심리적 요인이 구매 결정에 미치는 영향이 핵심 | ③ 새로운 마케팅 기술 개발 ❌: 기술 개발이 아닌 심리적 원리 | ④ 합리적 사고와 감정적 사고의 차이 ❌: 차이 비교가 아닌 비합리적 소비의 원인 설명 | ⑤ 온라인 쇼핑 전략 ❌: 온라인 쇼핑 한정이 아님`,
    wrongs:[],
    tip:`🔑 주제 파악 전략: 반복 키워드를 찾기 → psychological factors, anchoring effect, endowment effect가 반복 → '심리적 요인이 소비에 미치는 영향'이 주제. 주제문은 보통 첫 문단에 등장: 'human beings are easily influenced by psychological factors'.`
  }
},
{
  id:8, type:'대의', diff:'보통', pts:5, fmt:'mc',
  note:'제목',
  passage:`The truth is that most people are not as rational as they think. This is because human beings are easily influenced by psychological factors. Steve Jobs put the $999 price tag in people&rsquo;s minds at the beginning so that the $499 price would seem a lot cheaper in comparison. People value something more when they own it. This is the basic idea of the endowment effect. As we&rsquo;ve seen, our spending can be influenced by factors that appeal to our emotions and mind.`,
  stem:`다음 글의 제목으로 가장 적절한 것을 고르시오.`,

    correct:`① Steve Jobs: 마케팅 천재 ❌: 잡스는 예시일 뿐, 글의 주인공이 아님 | ② 구매 뒤에 숨겨진 심리학 ✅ 정답: anchoring effect + endowment effect로 구매의 심리적 원리를 설명 | ③ 소비 사회에서 돈 절약법 ❌: 절약 방법은 다루지 않음 | ④ 소유가 우리를 행복하게 하는 이유 ❌: 행복이 아니라 비합리적 판단의 원인 | ⑤ 적정 가격 설정의 과학 ❌: 가격 설정이 아닌 소비자 심리`,
    wrongs:[],
    tip:`🔑 제목은 글 전체를 포괄하는 키워드 포함 필요. 'Hidden Psychology' + 'Purchases'가 닻 내림 효과와 보유 효과를 포괄. 제목 선택 시 지나치게 구체적인 선지(Steve Jobs, Price Setting)는 제외.`
  }
},
{
  id:9, type:'대의', diff:'어려움', pts:6, fmt:'mc',
  note:'시사점',
  passage:`The truth is that most people are not as rational as they think. He put the $999 price tag in people&rsquo;s minds at the beginning so that the $499 price would seem a lot cheaper in comparison. Steve Jobs used something called the anchoring effect to his advantage. People value something more when they own it. Companies often use the endowment effect as a marketing strategy. I hope this short lecture gave you a chance to reflect on your own spending and helped you understand the reasons behind irrational purchasing decisions.`,
  stem:`다음 글이 시사하는 바로 가장 적절한 것을 고르시오.`,
  ch:["기업의 마케팅 전략은 소비자의 이익을 최우선으로 한다.", "합리적 소비를 위해서는 자신의 심리적 편향을 인식해야 한다.", "가격이 높을수록 제품의 품질이 좋다는 것은 사실이다.", "무료 체험은 소비자에게 항상 경제적으로 유리하다.", "소유한 물건을 쉽게 포기하는 것이 현명한 소비 습관이다."],
  ans:1,
  det:{
    ref:`[원문] I hope this short lecture gave you a chance to <b>reflect on your own spending</b> and helped you understand the reasons behind <b>irrational purchasing decisions</b>. [해석] 이 짧은 강의가 여러분의 소비를 되돌아보는 기회가 되고 비합리적인 구매 결정의 이유를 이해하는 데 도움이 되었기를 바랍니다.`,
    correct:`① 기업이 소비자 이익 최우선 ❌: 오히려 기업이 심리를 이용한다고 설명 | ② 심리적 편향 인식 필요 ✅ 정답: 글의 결론에서 '소비를 되돌아보고 비합리적 구매의 이유를 이해하라'고 권유 | ③ 높은 가격 = 좋은 품질 ❌: 가격과 품질의 관계는 언급 없음 | ④ 무료 체험이 항상 유리 ❌: 오히려 무료 체험이 소비자를 유인하는 전략이라고 경고 | ⑤ 쉽게 포기하는 것이 현명 ❌: 보유 효과 설명일 뿐, 포기를 권하지 않음`,
    wrongs:[],
    tip:`🔑 시사점 문제 풀이법: 글의 마지막 문장(결론)에 주목! 'reflect on your own spending' + 'understand the reasons behind irrational purchasing decisions' → 심리적 편향을 알고 소비를 성찰하라는 메시지.`
  }
},
{
  id:10, type:'일치', diff:'쉬움', pts:3, fmt:'mc',
  note:'일치',
  passage:`In 2010, Steve Jobs introduced the tablet computer to the world. During the presentation, he said, &quot;We&rsquo;re going to price it under a thousand dollars,&quot; which most people assumed meant $999. He went on to talk about the features of the tablet and continued to justify why the tablet was worth buying. At the end, he said, &quot;I am thrilled to announce to you that the pricing starts not at $999 but at just $499.&quot; The crowd went wild. The tablet suddenly seemed affordable to everyone.`,
  stem:`다음 글의 내용과 <b>일치하는</b> 것을 고르시오.`,
  ch:["Steve Jobs는 2012년에 태블릿 컴퓨터를 소개했다.", "태블릿의 최종 발표 가격은 $999였다.", "청중들은 $499라는 가격에 열광적으로 반응했다.", "Steve Jobs는 태블릿의 기능에 대해 언급하지 않았다.", "태블릿의 가격은 대부분의 사람들에게 비싸게 느껴졌다."],
  ans:2,
  det:{
    ref:`[원문] The crowd went wild. The tablet suddenly seemed affordable to everyone. [해석] 청중들은 열광했습니다. 그 태블릿은 갑자기 모든 사람들에게 구매할 만한 가격으로 보였습니다.`,
    correct:`① 2012년 소개 ❌: 원문은 '2010년' | ② 최종 가격 $999 ❌: 최종 가격은 '$499' | ③ $499에 열광 ✅: 'The crowd went wild' = 청중이 열광함 | ④ 기능 언급 안 함 ❌: 'went on to talk about the features' | ⑤ 비싸게 느껴짐 ❌: 'seemed affordable'(적당한 가격으로 보였음)`,
    wrongs:[],
    tip:`🔑 일치 문제: 숫자(연도, 가격)와 감정 표현에 주목. 2010년(○) vs 2012년(✕), $499(최종가) vs $999(처음 제시가). went wild = 열광했다.`
  }
},
{
  id:11, type:'일치', diff:'보통', pts:5, fmt:'mc',
  note:'불일치',
  passage:`In an experiment, one group of students was given a coffee mug and a second group a chocolate bar. Both groups were told they could exchange their items. A third group wasn&rsquo;t given anything and was told to choose either a chocolate bar or a coffee mug. This group showed an equal preference for the two items. About half of the group chose the chocolate bar, and the other half chose the coffee mug. But only about 10 percent of the students in the first and second groups were willing to make the exchange. This is because people value something more when they own it.`,
  stem:`다음 글의 내용과 <b>일치하지 않는</b> 것을 고르시오.`,
  ch:["첫 번째 그룹 학생들에게 커피 머그잔이 주어졌다.", "두 번째 그룹 학생들에게 초콜릿 바가 주어졌다.", "세 번째 그룹은 두 물건에 대해 균등한 선호를 보였다.", "첫 번째와 두 번째 그룹의 약 절반이 교환에 응했다.", "사람들은 소유한 물건을 더 가치 있게 여긴다."],
  ans:3,
  det:{
    ref:`[원문] Only about <b>10 percent</b> of the students in the first and second groups were willing to make the exchange. [해석] 첫 번째와 두 번째 그룹의 학생 중 약 <b>10퍼센트</b>만이 교환할 의향이 있었습니다. 절반이 아니라 10%만 교환에 응했으므로 ④는 불일치.`,
    correct:`① 커피 머그잔 → 첫 번째 그룹 ✅ 일치 | ② 초콜릿 바 → 두 번째 그룹 ✅ 일치 | ③ 균등한 선호 ✅ 일치: 'showed an equal preference' | ④ 약 절반이 교환 ❌ 불일치: 실제로는 '약 10%만' 교환 의향 | ⑤ 소유물 가치 ✅ 일치: 'people value something more when they own it'`,
    wrongs:[],
    tip:`🔑 불일치 문제 핵심: 숫자 함정에 주의! 세 번째 그룹의 '절반'이 선택한 것과, 첫·둘째 그룹의 '10%만' 교환한 것을 혼동하도록 설계. suggested(암시)된 것 vs. 실제 결과를 구분해야 함.`
  }
},
{
  id:12, type:'빈칸', diff:'어려움', pts:6, fmt:'mc',
  note:'빈칸(구)',
  passage:`Steve Jobs said, &quot;We&rsquo;re going to price it under a thousand dollars.&quot; He went on to talk about the features of the tablet and continued to justify why it was worth buying. At the end, he announced the price was just $499. The crowd went wild. He put the $999 price tag in people&rsquo;s minds at the beginning so that the $499 price would seem a lot cheaper in comparison. Steve Jobs used something called the anchoring effect to his advantage. It works because people tend to ______________ when making decisions.`,
  stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,
  ch:["compare products from different brands", "rely on the first piece of information they receive", "ignore the opinions of other consumers", "choose the most expensive option available", "wait for a better deal before purchasing"],
  ans:1,
  det:{
    ref:`[원문] It works because people tend to <b>rely on the first piece of information they receive</b> when making decisions. [해석] 사람들이 결정을 내릴 때 <b>처음 접하는 정보에 의존하는</b> 경향이 있기 때문에 가능한 것이죠.`,
    correct:`① 다른 브랜드 비교 ❌: 브랜드 비교가 아닌 첫 정보 의존 | ② 처음 접하는 정보에 의존 ✅ 정답: 원문 직접 인용, 닻 내림 효과의 핵심 원리 | ③ 다른 소비자 의견 무시 ❌: 타인 의견은 무관 | ④ 가장 비싼 옵션 선택 ❌: 비싼 것을 선택하는 것이 아닌, 첫 가격 기준으로 판단 | ⑤ 더 나은 거래를 기다림 ❌: 기다리는 것이 아닌 첫 정보에 고정`,
    wrongs:[],
    tip:`🔑 빈칸(구) 풀이: 빈칸 앞뒤 문맥 확인. 앞: '$999를 먼저 제시 → $499가 저렴해 보임' → 뒤: 'when making decisions' → 첫 정보에 의존하는 경향 = anchoring effect의 정의. rely on ≈ depend on(~에 의존하다).`
  }
},
{
  id:13, type:'빈칸', diff:'어려움', pts:6, fmt:'mc',
  note:'빈칸(문장)',
  passage:`Companies often use the endowment effect as a marketing strategy. For example, many media streaming companies offer free trials to customers. Once customers use the free trial, they feel ownership of that service, even if it&rsquo;s temporary. Consequently, they are likely to value it more and are willing to pay to continue to own it. A free-return policy is another example. Say that a company is offering free returns on a smartwatch within 30 days of purchase. But once you take this deal and establish ownership of the watch, it is unlikely that you will return it. In other words, __________________________________.`,
  stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,
  ch:["companies lose money by offering generous return policies", "free trials help customers compare different brands more easily", "once people feel they own something, they become reluctant to let it go", "consumers always make rational decisions based on product quality", "ownership of a product decreases its perceived value over time"],
  ans:2,
  det:{
    ref:`[원문] People are less likely to give up what they already have or trade it for something else. / people value something more when they own it. [해석] 사람들은 이미 가진 것을 포기하거나 다른 것으로 교환할 가능성이 낮습니다. 소유하면 더 가치 있게 여깁니다. 빈칸은 무료 체험과 무료 반품 두 예시를 요약하는 문장입니다.`,
    correct:`① 기업이 반품으로 손해 ❌: 기업 손실이 아닌 소비자 심리 | ② 무료 체험이 브랜드 비교에 도움 ❌: 비교가 아닌 소유감 형성이 핵심 | ③ 소유감 형성 → 포기 꺼림 ✅ 정답: 보유 효과의 핵심 → 소유감이 생기면 놓기 싫어함 | ④ 합리적 결정 ❌: 글 전체가 비합리적 결정을 설명 | ⑤ 소유가 가치 감소 ❌: 정반대, 소유하면 가치가 증가`,
    wrongs:[],
    tip:`🔑 빈칸(문장) 풀이: 'In other words(다시 말해)' = 앞 내용을 요약·재진술. 무료 체험 → 소유감 → 계속 결제 / 무료 반품 → 소유감 → 반품 안 함 → 공통점: '소유감이 생기면 포기를 꺼림'. reluctant(꺼리는) ≈ unwilling.`
  }
},
{
  id:14, type:'함축', diff:'보통', pts:5, fmt:'mc',
  note:'함축',
  passage:`He said, &quot;We&rsquo;re going to price it under a thousand dollars.&quot; He went on to talk about the features of the tablet and continued to justify why the tablet was worth buying. At the end, he said, &quot;I am thrilled to announce to you that the pricing starts not at $999 but at just $499.&quot; <u><b>The crowd went wild.</b></u> The tablet suddenly seemed affordable to everyone. He put the $999 price tag in people&rsquo;s minds at the beginning so that the $499 price would seem a lot cheaper in comparison.`,
  stem:`다음 글의 밑줄 친 &quot;The crowd went wild&quot;가 의미하는 바로 가장 적절한 것을 고르시오.`,
  ch:["청중들이 제품의 품질에 실망했다.", "청중들이 예상보다 훨씬 낮은 가격에 흥분하며 열광했다.", "청중들이 발표 내용을 이해하지 못해 혼란스러워했다.", "청중들이 제품을 즉시 구매하기 위해 줄을 섰다.", "청중들이 $999라는 가격에 불만을 표시했다."],
  ans:1,
  det:{
    ref:`[원문] The crowd <b>went wild</b>. The tablet suddenly seemed <b>affordable</b> to everyone. [해석] 청중들은 <b>열광했습니다</b>. 태블릿은 갑자기 모든 사람들에게 <b>적당한 가격</b>으로 보였습니다. 'go wild'는 '열광하다, 흥분하다'라는 뜻의 관용 표현입니다.`,
    correct:`① 품질 실망 ❌: 열광의 반대 | ② 예상보다 낮은 가격에 열광 ✅ 정답: $999를 예상했는데 $499로 발표 → 열광 | ③ 혼란 ❌: wild는 열광이지 혼란이 아님 | ④ 즉시 구매 ❌: 줄을 섰다는 내용 없음 | ⑤ $999에 불만 ❌: 불만이 아닌 $499 발표 후 열광`,
    wrongs:[],
    tip:`🔑 go wild = 열광하다, 흥분하다(≈ go crazy with excitement). 문맥: $999 예상 → $499 발표 → affordable → 열광. 함축 문제에서는 밑줄 친 표현의 앞뒤 문장이 핵심 단서!`
  }
},
{
  id:15, type:'순서', diff:'보통', pts:5, fmt:'mc',
  note:'순서배열',
  passage:`Companies often use the endowment effect as a marketing strategy.<br><br>(A) Consequently, they are likely to value it more and are willing to pay to continue to own it.<br>(B) For example, many media streaming companies offer free trials to customers.<br>(C) Once customers use the free trial, they feel ownership of that service, even if it&rsquo;s temporary.`,
  stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것을 고르시오.`,
  ch:["(A)-(B)-(C)", "(B)-(A)-(C)", "(B)-(C)-(A)", "(C)-(A)-(B)", "(C)-(B)-(A)"],
  ans:2,
  det:{
    ref:`[원문] Companies often use the endowment effect as a marketing strategy. → (B) For example, many media streaming companies offer free trials to customers. → (C) Once customers use the free trial, they feel ownership of that service, even if it's temporary. → (A) Consequently, they are likely to value it more and are willing to pay to continue to own it. [해석] 보유 효과를 전략으로 사용 → (B) 예: 무료 체험 제공 → (C) 무료 체험 → 소유감 → (A) 결과적으로 더 가치 있게 여기고 계속 결제.`,
    correct:`① (A)-(B)-(C) ❌: Consequently가 맨 앞에 오면 인과 연결 불가 | ② (B)-(A)-(C) ❌: 무료 체험 직후 결과가 오면 소유감 설명 누락 | ③ (B)-(C)-(A) ✅ 정답: 예시 → 소유감 형성 → 결과(계속 결제) 순서 | ④ (C)-(A)-(B) ❌: 예시(B)가 먼저 와야 함 | ⑤ (C)-(B)-(A) ❌: For example(B)이 주어진 문장 직후에 와야 자연스러움`,
    wrongs:[],
    tip:`🔑 순서 배열 단서어: 'For example(B)' → 주어진 문장(전략) 바로 뒤. 'Once(C)' → B의 무료 체험 이후. 'Consequently(A)' → C의 결과. 논리 흐름: 전략 소개 → 구체적 예시 → 과정 설명 → 결과.`
  }
},
{
  id:16, type:'무관', diff:'쉬움', pts:3, fmt:'mc',
  note:'무관문장',
  passage:`① The truth is that most people are not as rational as they think. ② This is because human beings are easily influenced by psychological factors. ③ Regular physical exercise has been proven to improve mental health and reduce stress. ④ Steve Jobs used the anchoring effect to make the tablet seem more affordable. ⑤ As we&rsquo;ve seen, our spending can be influenced by factors that appeal to our emotions and mind.`,
  stem:`다음 글에서 전체 흐름과 <b>관계 없는</b> 문장을 고르시오.`,
  ch:["①", "②", "③", "④", "⑤"],
  ans:2,
  det:{
    ref:`[해석] ① 대부분의 사람이 합리적이지 않다. ② 심리적 요인에 영향받기 때문. ③ <b>규칙적인 운동이 정신 건강을 개선한다.</b> ④ 잡스가 닻 효과 사용. ⑤ 소비는 감정에 호소하는 요인에 영향받을 수 있다. ③은 운동과 건강에 관한 내용으로, 소비 심리와 무관합니다.`,
    correct:`① 합리적이지 않음 → 글의 주제 도입 ✅ | ② 심리적 요인 → 이유 설명 ✅ | ③ 운동과 건강 ❌ 무관: 소비 심리와 관련 없는 건강 정보 | ④ 닻 효과 → 구체적 예시 ✅ | ⑤ 감정과 소비 → 결론 ✅`,
    wrongs:[],
    tip:`🔑 무관 문장 찾기: 글의 핵심 키워드(소비, 심리, 비합리적 구매)와 관련 없는 문장 찾기. ③의 'physical exercise', 'mental health'는 소비 심리와 무관한 건강 주제.`
  }
},
{
  id:17, type:'지칭', diff:'쉬움', pts:3, fmt:'mc',
  note:'T/F',
  passage:`A free-return policy is another example. Say that a company is offering free returns on a smartwatch within 30 days of purchase. It seems like a good deal, since you can get a refund even after using the item. But once you take this deal and establish ownership of the watch, <u><b>it</b></u> is unlikely that you will return it.`,
  stem:`다음 글의 내용으로 보아, 밑줄 친 &quot;it&quot;이 가리키는 것이 <b>the smartwatch</b>인지 판단하시오.`,
  ch:["T (the smartwatch를 가리킨다)", "F (the smartwatch를 가리키지 않는다)"],
  ans:1,
  det:{
    ref:`[원문] <b>it</b> is unlikely that you will return it [해석] 여러분이 그것을 반품할 가능성은 낮습니다. 여기서 밑줄 친 'it'은 가주어(형식주어)로, 뒤의 that절(that you will return it)을 대신합니다. the smartwatch를 가리키는 것이 아닙니다.`,
    correct:`T ❌: 밑줄 친 it은 가주어(formal subject). 진주어는 'that you will return it'(네가 그것을 반품하는 것). | F ✅ 정답: it = 가주어. 문장 구조: It(가주어) is unlikely that S + V(진주어). 참고로 문장 끝의 'it'(return it)이 the smartwatch를 가리킴.`,
    wrongs:[],
    tip:`🔑 가주어 it 구문: It is + 형용사 + that S + V. It(가주어) is unlikely that you will return it(대명사=smartwatch). 두 개의 it을 구분! 앞의 it = 가주어, 뒤의 it = the smartwatch(대명사).`
  }
},
{
  id:18, type:'서술', diff:'보통', pts:5, fmt:'written',
  note:'서술형 요약',
  passage:`Steve Jobs used something called the anchoring effect to his advantage. It works because people tend to rely on the first piece of information they receive when making decisions. People value something more when they own it. This is the basic idea of the endowment effect.`,
  stem:`다음 글을 읽고, 빈칸에 들어갈 적절한 <b>한 단어</b>를 본문에서 찾아 쓰시오.<br><br>[조건] 본문에 사용된 단어 그대로 쓸 것<br><br>[보기] The anchoring effect works because people tend to rely on the first piece of information they receive. The endowment effect means people value something more when they __________ it.`,
  wa:`own`,

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
