<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공통영어1 동아(이병민) 3과 온라인퀴즈TEST 20문항</title>
<style>:root{--o:#E8772E;--od:#B85A1A;--ol:#F5A623;--oxl:#FFF3E8;--oxxl:#FFFAF5;--bg:#F6F2EE;--text:#1E1B18;--tm:#6B6560;--tl:#A09890;--g:#1A9960;--gl:#E6F9F0;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--p:#7C4DFF;--pl:#F3EEFF;--sky:#0EA5E9;--skyl:#E8F6FF;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#d0ccc8;border-radius:3px;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.012;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
#startScreen{align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#FFFAF5,#F6F2EE 40%,#FFF3E8);position:relative;}
.start-container{max-width:460px;width:100%;position:relative;z-index:1;}
.brand-badge{background:linear-gradient(135deg,var(--o),var(--ol));color:#fff;font-size:12px;font-weight:800;padding:7px 16px;border-radius:24px;letter-spacing:.8px;box-shadow:0 4px 14px rgba(232,119,46,.25);display:inline-block;margin-bottom:20px;}
.start-title{font-size:36px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}.start-title span{background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.start-subtitle{font-size:14px;color:var(--tm);margin-bottom:30px;font-weight:500;}
.info-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.info-card-header{background:linear-gradient(135deg,var(--o),var(--ol));padding:14px 20px;color:#fff;font-size:13px;font-weight:700;}
.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #f5f1ed;}.info-row:last-child{border:none;}.info-label{color:var(--tm);font-weight:500;}.info-value{font-weight:700;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}.chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid #ebe7e3;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:600;color:var(--tm);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.input-group{margin-bottom:14px;}.input-group label{display:block;font-size:12px;font-weight:700;color:var(--tm);margin-bottom:6px;}
.input-group input,.input-group select{width:100%;padding:13px 16px;border:2px solid #e8e4e0;border-radius:var(--rs);font-size:15px;font-family:inherit;background:#fff;transition:var(--tr);}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(232,119,46,.1);}
.input-row{display:flex;gap:10px;}
.btn{padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--tr);width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 6px 20px rgba(232,119,46,.3);margin-top:12px;}.btn-primary:hover{transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid #e0dcd8;color:var(--tm);margin-top:8px;font-size:14px;padding:12px;}.btn-outline:hover{border-color:var(--o);color:var(--o);}
.history-badge{background:var(--oxl);color:var(--o);font-weight:800;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;}
#historyPanel{display:none;margin-top:14px;}
.history-item{background:var(--card);border:1.5px solid #ebe7e3;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.history-item .hi-left .hi-name{font-weight:700;font-size:13px;}.history-item .hi-left .hi-meta{font-size:11px;color:var(--tl);}
.history-item .hi-right .hi-score{font-size:20px;font-weight:900;color:var(--o);}.history-item .hi-right .hi-level{font-size:10px;color:var(--tm);text-align:right;}
#examScreen{min-height:100vh;}
.exam-topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:10px;}.topbar-dot{width:8px;height:8px;background:var(--o);border-radius:50%;}
.topbar-info{font-size:13px;color:var(--tm);font-weight:600;}.topbar-info span{color:var(--o);font-weight:800;}
.timer{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;}.timer.warn{color:var(--o);}.timer.danger{color:var(--r);animation:pulse .6s infinite;}
@keyframes pulse{50%{opacity:.3;}}
.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,.04);}
.q-header{display:flex;align-items:center;gap:10px;padding:16px 22px;background:linear-gradient(135deg,#FFFAF5,#FFF6EE);border-bottom:1px solid #f0ece8;}
.q-num{width:36px;height:36px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;box-shadow:0 3px 8px rgba(232,119,46,.25);}
.q-type-tag{font-size:11px;font-weight:800;padding:4px 12px;border-radius:14px;}
.tag-어법{background:var(--rl);color:var(--r);}.tag-어휘{background:var(--bl);color:var(--b);}.tag-대의{background:var(--gl);color:var(--g);}.tag-일치{background:var(--oxl);color:var(--od);}.tag-빈칸{background:var(--pl);color:var(--p);}.tag-함축{background:#FFF0F5;color:#D946A0;}.tag-순서{background:var(--skyl);color:var(--sky);}.tag-무관{background:#F0FDF4;color:#16A34A;}.tag-서술형{background:var(--gl);color:var(--g);}.tag-지칭{background:#FEF3C7;color:#D97706;}.tag-TF{background:#E0E7FF;color:#4338CA;}.tag-불일치{background:var(--oxl);color:var(--od);}
.q-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}.q-diff{font-size:11px;color:var(--tl);font-weight:600;background:#f5f1ed;padding:3px 10px;border-radius:10px;}.q-pts{font-size:12px;color:var(--o);font-weight:800;}
.q-body{padding:22px;}
.q-passage{background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-left:4px solid var(--o);padding:16px 18px;margin-bottom:18px;border-radius:0 var(--rs) var(--rs) 0;font-size:13.5px;line-height:1.95;}
.q-passage .label{font-size:11px;font-weight:800;color:var(--o);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.q-passage u{text-decoration-color:var(--o);text-decoration-thickness:2px;text-underline-offset:3px;}
.q-stem{font-size:15px;font-weight:700;margin-bottom:18px;line-height:1.7;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid #ebe7e3;border-radius:var(--rs);cursor:pointer;transition:var(--tr);background:#fff;text-align:left;font-family:inherit;font-size:14px;line-height:1.6;position:relative;overflow:hidden;}
.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}
.choice-btn.selected{border-color:var(--o);box-shadow:0 0 0 3px rgba(232,119,46,.12);background:var(--oxxl);}
.c-num{min-width:26px;height:26px;background:#f0ece8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}
.choice-btn.selected .c-num{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;}
.written-input{width:100%;padding:14px 16px;border:2px solid #e0dcd8;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}
.written-input:focus{outline:none;border-color:var(--o);box-shadow:0 0 0 4px rgba(232,119,46,.08);}
.cond-box{background:linear-gradient(135deg,#F8F6F3,#F3F0EC);border:1.5px solid #e0dcd8;border-radius:var(--rs);padding:16px;margin-bottom:16px;}.cond-box .ct{font-weight:800;color:var(--od);margin-bottom:8px;font-size:13px;}.cond-box ul{margin-left:18px;margin-bottom:10px;}.cond-box li{margin-bottom:3px;font-size:13px;}
.bogi-label{font-size:11px;color:var(--tl);font-weight:800;margin-bottom:4px;}.bogi-box{background:#fff;border:1.5px solid #d8d4d0;border-radius:var(--rxs);padding:12px;text-align:center;font-weight:700;font-size:14px;}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:65%;}
.nav-dot{width:28px;height:28px;border-radius:50%;background:#ebe7e3;cursor:pointer;border:none;font-size:10px;font-weight:800;color:var(--tm);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:var(--tr);}
.nav-dot.current{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;box-shadow:0 3px 10px rgba(232,119,46,.3);transform:scale(1.08);}
.nav-dot.answered{background:var(--g);color:#fff;}
.nav-btn{padding:9px 18px;background:#fff;border:2px solid #e0dcd8;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}
.r-hero{padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden;}.r-hero.pass{background:linear-gradient(160deg,#E8F7F0,#D1FAE5,#E6F9F0);}.r-hero.fail{background:linear-gradient(160deg,#FFF3E8,#FFEAEA,#FFF0F0);}
.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--o),var(--od));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#f0ece8;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(232,119,46,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #ebe7e3;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F8F5F0;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}</style>
</head>
<body>
<div class="grain"></div><div class="toast" id="toast"></div>

<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">🎯 내신핏</div>
  <h1 class="start-title">온라인퀴즈 <span>TEST</span></h1>
  <p class="start-subtitle">동아(이병민) 3과 · Wishful Recycling</p>
  <div class="info-card"><div class="info-card-header">📚 시험 정보</div><div class="info-rows">
    <div class="info-row"><span class="info-label">과목</span><span class="info-value">공통영어1</span></div>
    <div class="info-row"><span class="info-label">출판사</span><span class="info-value">동아(이병민)</span></div>
    <div class="info-row"><span class="info-label">단원</span><span class="info-value">3과 Wishful Recycling</span></div>
  </div></div>
  <div class="chip-row"><div class="chip">📝 20문항</div><div class="chip">⏱️ 20분</div><div class="chip">✅ 80점 이상 통과</div><div class="chip">📊 100점 만점</div></div>
  <div class="input-group"><label>이름 *</label><input type="text" id="inpName" placeholder="이름을 입력하세요"></div>
  <div class="input-row"><div class="input-group" style="flex:1"><label>학교</label><input type="text" id="inpSchool" placeholder="선택"></div><div class="input-group" style="flex:.6"><label>학년</label><select id="inpGrade"><option>고1</option><option>고2</option><option>고3</option></select></div></div>
  <button class="btn btn-primary" onclick="startExam()">시험 시작하기 →</button>
  <button class="btn btn-outline" onclick="toggleHistory()">📋 시험 기록 보기 <span class="history-badge" id="hCount">0</span></button>
  <div id="historyPanel"></div>
</div>
</div>

<div id="examScreen" class="screen">
  <div class="exam-topbar"><div class="topbar-left"><div class="topbar-dot"></div><div class="topbar-info">공통영어1 · 동아(이병민) · <span>3과</span></div></div><div class="timer" id="timer">20:00</div><button class="btn-submit" onclick="submitExam()">제출하기</button></div>
  <div class="exam-scroll" id="examScroll"></div>
  <div class="exam-nav"><button class="nav-btn" onclick="scrollToQ(S.cur-1)">←</button><div class="nav-dots" id="navDots"></div><button class="nav-btn" onclick="scrollToQ(S.cur+1)">→</button></div>
</div>

<div id="resultScreen" class="screen"></div>

<script>
const EI={"subject":"공통영어1","pub":"동아(이병민)","lesson":"3과","title":"Wishful Recycling","total":100,"time":1200,"histKey":"quizH_donga_3_20","qCount":20};
const Q = [{"id": 1, "type": "어법", "diff": "보통", "pts": 5, "fmt": "mc", "note": "어법 ⓐ~ⓔ", "passage": "Most people agree with the idea that recycling is an easy way to make a positive impact on the planet. It makes you feel good about yourself, too. But your efforts may sometimes be <u>ⓐ harming</u> the environment instead. Imagine the following situation. On your way home from school, someone <u>ⓑ hands</u> you a piece of paper. You glance at the shiny flyer <u>ⓒ advertising</u> a new study café. As you are about to throw it into the garbage, you decide <u>ⓓ putting</u> it into the recycling bin instead. What just happened is a case of wishcycling. It is the act of <u>ⓔ trying</u> to recycle something that should not be recycled.", "stem": "다음 글의 밑줄 친 ⓐ~ⓔ 중 어법상 <b>어색한 것</b>을 고르시오.", "ch": ["ⓐ harming", "ⓑ hands", "ⓒ advertising", "ⓓ putting", "ⓔ trying"], "ans": 3, "det": {"ref": "[원문] you decide <b>putting</b> it into the recycling bin instead → [해석] 당신은 그러는 대신 재활용품 수거함에 넣기로 <b>결정한다</b>. decide는 to부정사를 목적어로 취하는 동사이므로 putting(동명사)은 어법에 맞지 않습니다. <b>to put</b>으로 고쳐야 합니다.", "correct": "ⓐ harming: 조동사 may 뒤 be + v-ing(진행형) → 'may be harming'은 진행의 의미로 적절 ✅<br>ⓑ hands: 주어 someone(3인칭 단수) + 현재시제 → hands 적절 ✅<br>ⓒ advertising: 현재분사가 flyer를 수식(~을 광고하는 전단지) → 적절 ✅<br>ⓓ putting: decide + to-v(to부정사)가 올바른 형태 → putting ❌ → <b>to put</b> ✅<br>ⓔ trying: the act of + v-ing(동명사) → trying 적절 ✅", "wrongs": [], "tip": "🔑 decide + to-v: decide to put (○) / decide putting (✕). 비교: enjoy, finish, mind + v-ing (동명사만 취하는 동사). to부정사를 목적어로 취하는 동사: decide, want, hope, expect, plan, promise, refuse 등."}}, {"id": 2, "type": "어법", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "어법 A/B/C 선택", "passage": "The biggest problem with wishcycling is that it creates more waste. For example, if you wishcycle a greasy pizza box, it can soak clean paper products with oil. Then everything in the recycling bin will become non-recyclable and end up in a landfill. Creating more waste is not the only problem, however. Wishcycling also leads to costly delays. To process recyclable items, non-recyclable items must be (A) <b>[sorted / sorting]</b> out first. The more non-recyclable items are mixed with recyclable items, the (B) <b>[longer / more long]</b> it will take to pick them out. Wishcycled items can also damage the sorting machines, (C) <b>[causing / caused]</b> them to be temporarily shut down for repairs.", "stem": "다음 글의 괄호 (A), (B), (C)에서 어법에 맞는 표현으로 가장 적절한 것을 고르시오.", "ch": ["sorted – longer – causing", "sorted – more long – causing", "sorting – longer – caused", "sorted – longer – caused", "sorting – more long – causing"], "ans": 0, "det": {"ref": "[원문] (A) non-recyclable items must be <b>sorted</b> out first → [해석] 재활용할 수 없는 물건들이 먼저 <b>선별되어야</b> 한다. 조동사 must + be + p.p.(수동태).<br>(B) the <b>longer</b> it will take → [해석] 더 오랜 시간이 걸릴 것이다. 'the + 비교급, the + 비교급' 구문에서 long의 비교급은 longer.<br>(C) <b>causing</b> them to be temporarily shut down → [해석] 기계를 일시적으로 멈추게 하는 원인이 된다. 분사구문으로 앞 문장의 결과를 나타내는 현재분사 causing이 적절.", "correct": "① sorted – longer – causing: (A) must be sorted(수동태) ✅, (B) the longer(비교급) ✅, (C) causing(결과 분사구문) ✅ → <b>정답</b> ✅<br>② sorted – more long – causing: (B) more long ❌ → longer가 올바른 비교급<br>③ sorting – longer – caused: (A) must be sorting ❌ → 수동태 must be sorted 필요<br>④ sorted – longer – caused: (C) caused ❌ → 결과를 나타내는 분사구문은 능동(causing)<br>⑤ sorting – more long – causing: (A), (B) 모두 어색 ❌", "wrongs": [], "tip": "🔑 (1) must be p.p. (수동태): items must be sorted out. (2) the 비교급, the 비교급: the longer ~ the longer ~. long→longer (○) / more long (✕). (3) 결과 분사구문: ~, causing ... (~하여 …을 야기하다). 주어(items)가 cause하는 능동 관계이므로 causing."}}, {"id": 3, "type": "어법", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "어법 ⓐ~ⓓ", "passage": "With a little effort, we can put an end to wishcycling. First, make sure your recyclables are empty, clean, and dry. Shake out any <u>ⓐ remaining</u> liquid from bottles and jars. After that, wash them out and wait for them <u>ⓑ to dry</u>. You also need to remove the labels. Second, learn about the meanings of various recycling symbols. They tell you about the material of the item and <u>ⓒ that</u> it can be recycled or not. Have you ever seen a recycling symbol with the number &ldquo;7&rdquo; and the word &ldquo;other&rdquo; under it? This symbol means the product is made of two different materials and <u>ⓓ will be</u> difficult to recycle.", "stem": "다음 글의 밑줄 친 ⓐ~ⓓ 중 어법상 <b>어색한 것</b>을 고르시오.", "ch": ["ⓐ remaining", "ⓑ to dry", "ⓒ that", "ⓓ will be"], "ans": 2, "det": {"ref": "[원문] They tell you about the material of the item and <b>that</b> it can be recycled or not. → [해석] 그것들은 해당 물건의 재료와 그것이 재활용될 수 있는지 <b>아닌지</b>를 알려 준다. 'whether(~인지 아닌지)' + or not 구문이 와야 하므로 that은 어색합니다. <b>whether</b>로 고쳐야 합니다.", "correct": "ⓐ remaining: 현재분사가 liquid를 수식(남아 있는 액체) → 적절 ✅<br>ⓑ to dry: wait for + 목적어 + to-v(5형식) → 'wait for them to dry' 적절 ✅<br>ⓒ that: '~인지 아닌지(or not)'의 의미이므로 접속사 whether가 필요 → that ❌ → <b>whether</b> ✅<br>ⓓ will be: 주어 the product + will be + 형용사(difficult) → 적절 ✅", "wrongs": [], "tip": "🔑 whether vs. that: 'or not'이 함께 쓰이면 반드시 whether. that은 'or not'과 함께 쓸 수 없음. 비교: I don't know <b>whether</b> it is true or not. (○) / I don't know <b>that</b> it is true or not. (✕). 또한 전치사(about) 뒤에도 whether 사용."}}, {"id": 4, "type": "어휘", "diff": "보통", "pts": 5, "fmt": "mc", "note": "어휘 A/B/C 흐름", "passage": "Wishcycling is the act of trying to recycle something that should not be recycled. Wishcycling is usually done with good (A) <b>[intentions / inventions]</b>, but it often causes more harm than good. The biggest problem with wishcycling is that it creates more waste. For example, if you wishcycle a greasy pizza box, it can soak clean paper products with oil. Then everything in the recycling bin will become (B) <b>[non-recyclable / renewable]</b> and end up in a landfill. Creating more waste is not the only problem, however. Wishcycling also leads to costly (C) <b>[delays / displays]</b>.", "stem": "다음 글의 괄호 (A), (B), (C)에서 문맥에 맞는 낱말로 가장 적절한 것을 고르시오.", "ch": ["intentions – non-recyclable – delays", "inventions – non-recyclable – delays", "intentions – renewable – displays", "inventions – renewable – delays", "intentions – non-recyclable – displays"], "ans": 0, "det": {"ref": "[원문] (A) done with good <b>intentions</b> → [해석] 좋은 <b>의도</b>로 행해진다. intention(의도) vs. invention(발명).<br>(B) will become <b>non-recyclable</b> → [해석] 재활용할 수 <b>없게</b> 된다. non-recyclable(재활용 불가능한) vs. renewable(재생 가능한).<br>(C) leads to costly <b>delays</b> → [해석] 비용이 많이 드는 <b>지연</b>을 초래한다. delay(지연) vs. display(전시).", "correct": "① intentions – non-recyclable – delays: 모든 문맥에 적절 → <b>정답</b> ✅<br>② inventions(발명) – non-recyclable – delays: (A) invention은 '발명'으로 문맥 부적절 ❌<br>③ intentions – renewable(재생 가능한) – displays: (B) 기름에 오염되어 재활용 '불가'가 되는 맥락이므로 renewable 부적절 ❌<br>④ inventions – renewable – delays: (A), (B) 모두 부적절 ❌<br>⑤ intentions – non-recyclable – displays(전시): (C) 비용이 많이 드는 '지연'이 맥락에 맞음, display 부적절 ❌", "wrongs": [], "tip": "🔑 intention(의도) ≈ purpose, aim ↔ invention(발명). delay(지연) ≈ postponement ↔ display(전시, 진열). non-recyclable(재활용 불가) ↔ recyclable(재활용 가능) ↔ renewable(재생 가능한). 접두사 non-은 '~이 아닌'의 의미."}}, {"id": 5, "type": "어휘", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "어휘 부적절", "passage": "With a little effort, we can put an end to wishcycling. First, make sure your recyclables are empty, clean, and dry. Shake out any remaining liquid from bottles and jars. After that, wash them out and wait for them to dry. You also need to remove the labels. Now they are ready to be tossed in the recycling bin. This simple process will ① <u>ensure</u> that all the items in the recycling bin can be recycled. Second, learn about the meanings of various recycling symbols. They tell you about the ② <u>material</u> of the item and whether it can be recycled or not. Checking the recycling symbols like this will help you ③ <u>stop</u> wishcycling. Third, check the recycling guidelines for your ④ <u>global</u> area. Different areas have different rules on what can be recycled. Lastly, don't recycle an item when in ⑤ <u>doubt</u>.", "stem": "다음 글의 밑줄 친 ①~⑤ 중 문맥상 낱말의 쓰임이 <b>적절하지 않은 것</b>을 고르시오.", "ch": ["① ensure", "② material", "③ stop", "④ global", "⑤ doubt"], "ans": 3, "det": {"ref": "[원문] check the recycling guidelines for your <b>④ global</b> area → [해석] 여러분의 <b>지역</b> 재활용 지침을 확인해라. 원문에서는 local(지역의)이 쓰였으므로, global(세계적인)은 문맥상 부적절합니다. <b>local</b>로 바꿔야 합니다.", "correct": "① ensure(보장하다): '재활용품 수거함의 모든 물건이 재활용될 수 있게 해 준다'는 맥락에 적절 ✅<br>② material(재료): '해당 물건의 재료'라는 맥락에 적절 ✅<br>③ stop(멈추다): '위시사이클링을 멈추는 데 도움이 된다'는 맥락에 적절 ✅<br>④ global(세계적인): 원문은 'local area(지역)'인데 global은 반대 의미 → 문맥 부적절 ❌<br>⑤ doubt(의심): 'when in doubt(의심스러울 때)'는 맥락에 적절 ✅", "wrongs": [], "tip": "🔑 local(지역의) ↔ global(세계적인). 지문에서 'Different areas have different rules'라고 했으므로, 지역마다 규정이 다르다는 맥락 → local이 자연스러움. 유사 표현: local government(지방 정부), local community(지역 사회)."}}, {"id": 6, "type": "어휘", "diff": "보통", "pts": 5, "fmt": "mc", "note": "어휘 부적절", "passage": "Lastly, don't recycle an item when in doubt. Even after you check the symbols and guidelines, you might still be ① <u>unsure</u> whether it is recyclable. In that case, you should put it in the trash. You might feel ② <u>bad</u> that you may be throwing away a recyclable item. However, doing so may actually be ③ <u>worse</u> for the environment. Take ④ <u>comfort</u> in the fact that you are not wishcycling. We all know that living without producing trash is ⑤ <u>impossible</u>. The good news is that about 75 percent of our waste can be recycled when it is done properly.", "stem": "다음 글의 밑줄 친 ①~⑤ 중 문맥상 낱말의 쓰임이 <b>적절하지 않은 것</b>을 고르시오.", "ch": ["① unsure", "② bad", "③ worse", "④ comfort", "⑤ impossible"], "ans": 2, "det": {"ref": "[원문] doing so may actually be <b>③ worse</b> for the environment → [해석] 그렇게 하는 것이 실제로 환경에 <b>더 나쁠</b> 수 있다. 원문에서는 'better(더 나은)'이 쓰였습니다. 의심스러울 때 쓰레기통에 버리는 것이 환경에 '더 이로울 수 있다'는 맥락이므로 worse(더 나쁜)는 부적절합니다.", "correct": "① unsure(확신하지 못하는): '재활용할 수 있는지 확신하지 못할 수 있다' → 적절 ✅<br>② bad(불편한): '마음이 불편할 수도 있다' → 적절 ✅<br>③ worse(더 나쁜): 원문은 better(더 나은). 쓰레기통에 버리는 것이 환경에 '더 이로울' 수 있다는 맥락 → worse 부적절 ❌<br>④ comfort(안도): '위시사이클링을 하지 않는다는 사실에 안도해라' → 적절 ✅<br>⑤ impossible(불가능한): '쓰레기를 만들지 않고 사는 것이 불가능하다' → 적절 ✅", "wrongs": [], "tip": "🔑 better(더 나은) ↔ worse(더 나쁜). 지문의 논리: 의심스러우면 버려라 → 환경에 더 이롭다(better) → 위시사이클링을 하지 않으니까. 반의어 함정에 주의!"}}, {"id": 7, "type": "주제", "diff": "보통", "pts": 5, "fmt": "mc", "note": "주제", "passage": "Most people agree with the idea that recycling is an easy way to make a positive impact on the planet. But your efforts may sometimes be harming the environment instead. Wishcycling is the act of trying to recycle something that should not be recycled. Wishcycling is usually done with good intentions, but it often causes more harm than good. The biggest problem with wishcycling is that it creates more waste. Wishcycling also leads to costly delays. To process recyclable items, non-recyclable items must be sorted out first. Wishcycled items can also damage the sorting machines, causing them to be temporarily shut down for repairs.", "stem": "다음 글의 <b>주제</b>로 가장 적절한 것을 고르시오.", "ch": ["재활용품 분류 기계의 작동 원리", "위시사이클링의 정의와 그로 인한 문제점", "환경 보호를 위한 정부 차원의 재활용 정책", "쓰레기 매립지의 환경 오염 실태", "종이 재활용 과정에서의 기름 오염 해결법"], "ans": 1, "det": {"ref": "[해석] 이 글은 위시사이클링(wishcycling)이 무엇인지 정의하고, 그것이 야기하는 문제점(더 많은 쓰레기 생성, 비용이 드는 지연, 분류 기계 손상)을 설명하고 있습니다.", "correct": "① 재활용품 분류 기계의 작동 원리: 기계 손상은 언급되지만 작동 원리는 다루지 않음 ❌<br>② 위시사이클링의 정의와 그로 인한 문제점: 글의 전체 내용과 일치 → <b>정답</b> ✅<br>③ 환경 보호를 위한 정부 차원의 재활용 정책: 정부 정책은 언급되지 않음 ❌<br>④ 쓰레기 매립지의 환경 오염 실태: 매립지는 예시로만 언급, 주제가 아님 ❌<br>⑤ 종이 재활용 과정에서의 기름 오염 해결법: 기름 오염은 예시일 뿐, 해결법은 다루지 않음 ❌", "wrongs": [], "tip": "🔑 주제 찾기 전략: 반복 키워드(wishcycling, problem, harm, waste)를 통해 핵심 주제를 파악. 구체적 예시(피자 박스, 기름 오염)는 주제가 아닌 뒷받침 근거."}}, {"id": 8, "type": "제목", "diff": "보통", "pts": 5, "fmt": "mc", "note": "제목", "passage": "With a little effort, we can put an end to wishcycling. First, make sure your recyclables are empty, clean, and dry. Second, learn about the meanings of various recycling symbols. They tell you about the material of the item and whether it can be recycled or not. Third, check the recycling guidelines for your local area. Different areas have different rules on what can be recycled. Lastly, don't recycle an item when in doubt. We all know that living without producing trash is impossible. The good news is that about 75 percent of our waste can be recycled when it is done properly. This is why we need to stop wishcycling and start recycling.", "stem": "다음 글의 <b>제목</b>으로 가장 적절한 것을 고르시오.", "ch": ["Recycling Symbols: A Global Standard", "Four Steps to Stop Wishcycling", "Why Recycling Is Impossible", "The Hidden Cost of Landfills", "New Technology for Waste Sorting"], "ans": 1, "det": {"ref": "[해석] 이 글은 위시사이클링을 멈추기 위한 네 가지 방법(비우고 깨끗이, 재활용 기호 확인, 지역 지침 확인, 의심스러우면 버리기)을 순서대로 제시하고 있습니다.", "correct": "① Recycling Symbols: A Global Standard: 재활용 기호는 방법 중 하나일 뿐, 글 전체의 제목으로 부적절 ❌<br>② Four Steps to Stop Wishcycling: 네 가지 단계(First~Lastly)를 제시하며 위시사이클링 중단을 촉구 → <b>정답</b> ✅<br>③ Why Recycling Is Impossible: 불가능하다는 것이 아니라 올바른 재활용을 촉구함 ❌<br>④ The Hidden Cost of Landfills: 매립지 비용은 주제가 아님 ❌<br>⑤ New Technology for Waste Sorting: 새 기술은 언급되지 않음 ❌", "wrongs": [], "tip": "🔑 제목 찾기 전략: 글의 구조를 파악(First, Second, Third, Lastly → 4단계). 포괄적이면서 구체적인 선지 선택. '모든 문단을 아우르는가?' 체크."}}, {"id": 9, "type": "시사점", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "시사점", "passage": "Wishcycling is usually done with good intentions, but it often causes more harm than good. The biggest problem with wishcycling is that it creates more waste. Wishcycling also leads to costly delays. Lastly, don't recycle an item when in doubt. You might feel bad that you may be throwing away a recyclable item. However, doing so may actually be better for the environment. Take comfort in the fact that you are not wishcycling. The good news is that about 75 percent of our waste can be recycled when it is done properly. This is why we need to stop wishcycling and start recycling.", "stem": "다음 글이 시사하는 바로 가장 적절한 것을 고르시오.", "ch": ["재활용에 대한 확신이 없으면 버리지 않는 것이 낫다.", "좋은 의도만으로는 올바른 재활용을 보장할 수 없다.", "재활용보다 쓰레기 자체를 줄이는 것이 더 중요하다.", "재활용 기호가 없는 제품은 모두 일반 쓰레기로 분류해야 한다.", "지역마다 재활용 규정이 달라 통일된 기준이 필요하다."], "ans": 1, "det": {"ref": "[해석] 위시사이클링은 좋은 의도로 행해지지만 오히려 해를 끼친다는 내용에서, <b>좋은 의도만으로는 올바른 재활용을 보장할 수 없으며</b>, 정확한 지식과 실천이 필요하다는 시사점을 도출할 수 있습니다.", "correct": "① 확신이 없으면 버리지 않는 것이 낫다: 원문은 '확신이 없으면 쓰레기통에 버려라'이므로 반대 ❌<br>② 좋은 의도만으로는 올바른 재활용을 보장할 수 없다: 'good intentions … more harm than good' → 의도 ≠ 결과 → <b>정답</b> ✅<br>③ 재활용보다 쓰레기를 줄이는 것이 중요하다: 쓰레기 감량은 언급되지 않음 ❌<br>④ 기호가 없는 제품은 모두 일반 쓰레기: 과도한 일반화 ❌<br>⑤ 통일된 기준이 필요하다: 글의 시사점이 아님 ❌", "wrongs": [], "tip": "🔑 시사점 문제: 글의 핵심 메시지를 추상화. '좋은 의도(good intentions)' + '해로움(more harm than good)' → 의도와 결과의 괴리가 핵심 시사점."}}, {"id": 10, "type": "일치", "diff": "쉬움", "pts": 3, "fmt": "mc", "note": "일치", "passage": "Imagine the following situation. On your way home from school, someone hands you a piece of paper. You glance at the shiny flyer advertising a new study café. As you are about to throw it into the garbage, you decide to put it into the recycling bin instead. You think flyers can be recycled because they're made of paper. What just happened is a case of wishcycling. It is the act of trying to recycle something that should not be recycled. Wishcycling is usually done with good intentions, but it often causes more harm than good.", "stem": "다음 글의 내용과 <b>일치하는 것</b>을 고르시오.", "ch": ["전단지를 쓰레기통에 버렸다.", "전단지는 새로운 서점을 광고하고 있었다.", "반짝이는 전단지는 재활용이 가능하다.", "전단지를 재활용품 수거함에 넣은 것은 위시사이클링의 사례이다.", "위시사이클링은 나쁜 의도로 행해진다."], "ans": 3, "det": {"ref": "[원문] What just happened is a case of wishcycling. → [해석] 방금 일어난 일(전단지를 재활용품 수거함에 넣은 것)은 위시사이클링의 사례이다.", "correct": "① 전단지를 쓰레기통에 버렸다: 쓰레기통이 아닌 재활용품 수거함에 넣었음 ❌<br>② 새로운 서점을 광고: 'a new study café(스터디 카페)'를 광고함 ❌<br>③ 반짝이는 전단지는 재활용 가능: 재활용이 안 되는 것을 재활용하려 한 사례 ❌<br>④ 전단지를 재활용품 수거함에 넣은 것은 위시사이클링의 사례: 원문과 일치 → <b>정답</b> ✅<br>⑤ 나쁜 의도로 행해진다: 'good intentions(좋은 의도)'로 행해짐 ❌", "wrongs": [], "tip": "🔑 일치 문제 풀이: 각 선지를 원문과 하나씩 대조. 키워드 변형에 주의(study café ≠ bookstore, good ≠ bad)."}}, {"id": 11, "type": "불일치", "diff": "보통", "pts": 5, "fmt": "mc", "note": "불일치", "passage": "The biggest problem with wishcycling is that it creates more waste. For example, if you wishcycle a greasy pizza box, it can soak clean paper products with oil. Then everything in the recycling bin will become non-recyclable and end up in a landfill. Wishcycling also leads to costly delays. To process recyclable items, non-recyclable items must be sorted out first. The more non-recyclable items are mixed with recyclable items, the longer it will take to pick them out. Wishcycled items can also damage the sorting machines, causing them to be temporarily shut down for repairs.", "stem": "다음 글의 내용과 <b>일치하지 않는 것</b>을 고르시오.", "ch": ["위시사이클링의 가장 큰 문제는 더 많은 쓰레기를 만드는 것이다.", "기름진 피자 박스가 깨끗한 종이 제품을 오염시킬 수 있다.", "위시사이클링은 비용이 드는 지연을 초래한다.", "재활용 불가 물건이 섞일수록 분류 시간이 단축된다.", "위시사이클 된 물건이 분류 기계를 손상시킬 수 있다."], "ans": 3, "det": {"ref": "[원문] The more non-recyclable items are mixed with recyclable items, the <b>longer</b> it will take to pick them out. → [해석] 재활용할 수 없는 물건들이 더 많이 섞여 있을수록, 골라내는 데 더 <b>오랜 시간</b>이 걸린다. '시간이 단축된다'는 원문과 반대입니다.", "correct": "① 가장 큰 문제는 더 많은 쓰레기: 'The biggest problem … creates more waste' → 일치 ✅<br>② 피자 박스가 종이 제품 오염: 'soak clean paper products with oil' → 일치 ✅<br>③ 비용이 드는 지연 초래: 'leads to costly delays' → 일치 ✅<br>④ 섞일수록 분류 시간 단축: 원문은 'the longer it will take(더 오래 걸린다)' → <b>불일치</b> ✅ → 정답<br>⑤ 분류 기계 손상 가능: 'damage the sorting machines' → 일치 ✅", "wrongs": [], "tip": "🔑 불일치 문제: 반의어 함정 주의! longer(더 오래) ↔ shorter(더 짧게). the 비교급, the 비교급 구문에서 방향성(증가/감소)을 정확히 파악."}}, {"id": 12, "type": "빈칸(구)", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "빈칸(구)", "passage": "Most people agree with the idea that recycling is an easy way to make a positive impact on the planet. It makes you feel good about yourself, too. But your efforts may sometimes be harming the environment instead. How can this be? Well, it is because you might be a wishcycler. Wishcycling is the act of trying to recycle something that should not be recycled. Wishcycling is usually done with ________________, but it often causes more harm than good.", "stem": "다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.", "ch": ["advanced technology", "good intentions", "strict regulations", "scientific knowledge", "financial support"], "ans": 1, "det": {"ref": "[원문] Wishcycling is usually done with <b>good intentions</b>, but it often causes more harm than good. → [해석] 위시사이클링은 대개 <b>좋은 의도</b>로 행해지지만, 종종 이로움보다는 해로움을 야기한다. 'but(하지만)'으로 역접이 이어지므로 '좋은 의도'와 '해로움'의 대비가 핵심.", "correct": "① advanced technology(첨단 기술): 기술과 무관한 맥락 ❌<br>② good intentions(좋은 의도): but절과의 역접 관계 성립(좋은 의도 ↔ 더 큰 해) → <b>정답</b> ✅<br>③ strict regulations(엄격한 규정): 개인 행동에 대한 글이므로 규정 부적절 ❌<br>④ scientific knowledge(과학 지식): 지식이 있으면 해를 끼치지 않을 것이므로 역접 부적절 ❌<br>⑤ financial support(재정 지원): 맥락과 무관 ❌", "wrongs": [], "tip": "🔑 빈칸 문제 전략: 접속사(but)에 주목. 역접 → 빈칸과 뒷내용이 대조 관계. good intentions(긍정) ↔ more harm than good(부정). intention(의도) ≈ purpose, aim."}}, {"id": 13, "type": "빈칸(문장)", "diff": "어려움", "pts": 6, "fmt": "mc", "note": "빈칸(문장)", "passage": "Lastly, don't recycle an item when in doubt. Even after you check the symbols and guidelines, you might still be unsure whether it is recyclable. In that case, you should put it in the trash. You might feel bad that you may be throwing away a recyclable item. However, doing so may actually be better for the environment. __________________________________. We all know that living without producing trash is impossible. The good news is that about 75 percent of our waste can be recycled when it is done properly.", "stem": "다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.", "ch": ["Take comfort in the fact that you are not wishcycling", "You can always find out by searching online", "Recycling everything is the safest option", "The government should provide clearer guidelines", "Most people don't know the difference between recyclable and non-recyclable items"], "ans": 0, "det": {"ref": "[원문] <b>Take comfort in the fact that you are not wishcycling.</b> → [해석] 여러분이 위시사이클링을 하지 않는다는 사실에 <b>안도해라</b>. 의심스러울 때 버리는 것이 환경에 낫다는 앞 문장의 논리를 이어받아, '위시사이클링을 하지 않는다는 사실에 안도하라'는 위로의 문장이 빈칸에 적절합니다.", "correct": "① Take comfort … not wishcycling: 앞 문장(환경에 더 이롭다)의 논리적 귀결로 위안을 주는 문장 → <b>정답</b> ✅<br>② 온라인 검색: 이미 기호와 지침을 확인한 후의 상황이므로 부적절 ❌<br>③ 모든 것을 재활용: 글의 메시지와 정반대(의심스러우면 버려라) ❌<br>④ 정부가 더 명확한 지침을: 개인의 행동에 초점을 둔 글이므로 흐름 이탈 ❌<br>⑤ 대부분의 사람들이 차이를 모른다: 글의 흐름과 무관한 일반 진술 ❌", "wrongs": [], "tip": "🔑 빈칸(문장) 전략: 빈칸 앞뒤 문장의 논리적 흐름 파악. 앞: '환경에 더 이롭다' → 빈칸: '안도해라' → 뒤: '쓰레기 없이 살 수 없다' → 위안(comfort)과 현실 인정의 흐름."}}, {"id": 14, "type": "함축", "diff": "보통", "pts": 5, "fmt": "mc", "note": "함축", "passage": "Most people agree with the idea that recycling is an easy way to make a positive impact on the planet. It makes you feel good about yourself, too. But your efforts may sometimes be harming the environment instead. Wishcycling is the act of trying to recycle something that should not be recycled. Wishcycling is usually done with good intentions, but it often causes <u><b>more harm than good</b></u>.", "stem": "다음 글에서 밑줄 친 <b>\"more harm than good\"</b>이 의미하는 바로 가장 적절한 것을 고르시오.", "ch": ["재활용이 불가능한 물건의 수가 증가한다.", "좋은 의도에도 불구하고 결과적으로 해로운 영향이 더 크다.", "재활용 비용이 일반 쓰레기 처리 비용보다 높다.", "환경 보호에 대한 관심이 줄어든다.", "재활용 규정이 너무 복잡하여 혼란을 야기한다."], "ans": 1, "det": {"ref": "[원문] it often causes <b>more harm than good</b> → [해석] 이로움보다는 <b>해로움을 더 많이 야기한다</b>. 즉, 좋은 의도로 행한 위시사이클링이 결과적으로 환경에 부정적인 영향을 더 크게 미친다는 의미입니다.", "correct": "① 재활용 불가 물건 수 증가: 구체적 현상이지 표현의 함축이 아님 ❌<br>② 좋은 의도에도 결과적으로 해로운 영향이 더 크다: 'good intentions + but + more harm than good' 의 핵심 의미 → <b>정답</b> ✅<br>③ 재활용 비용이 더 높다: 비용 비교는 직접 언급되지 않음 ❌<br>④ 환경 보호 관심 감소: 글에서 다루지 않은 내용 ❌<br>⑤ 규정이 복잡하여 혼란: 규정 복잡성은 이 맥락의 주제가 아님 ❌", "wrongs": [], "tip": "🔑 함축 의미 파악: more harm than good = 이로움(good)보다 해로움(harm)이 크다. 'good intentions(좋은 의도)'과 대비시켜 '의도와 결과의 괴리'를 나타냄. 관용표현: do more harm than good(득보다 실이 많다)."}}, {"id": 15, "type": "순서배열", "diff": "보통", "pts": 5, "fmt": "mc", "note": "순서배열", "passage": "<b>주어진 글:</b> With a little effort, we can put an end to wishcycling. First, make sure your recyclables are empty, clean, and dry.<br><br><b>(A)</b> This simple process will ensure that all the items in the recycling bin can be recycled. Second, learn about the meanings of various recycling symbols.<br><br><b>(B)</b> Shake out any remaining liquid from bottles and jars. After that, wash them out and wait for them to dry. You also need to remove the labels.<br><br><b>(C)</b> They tell you about the material of the item and whether it can be recycled or not. Checking the recycling symbols like this will help you stop wishcycling.", "stem": "주어진 글 다음에 이어질 글의 순서로 가장 적절한 것을 고르시오.", "ch": ["(A)-(B)-(C)", "(A)-(C)-(B)", "(B)-(A)-(C)", "(B)-(C)-(A)", "(C)-(A)-(B)"], "ans": 2, "det": {"ref": "[해석] 주어진 글: 재활용품이 비어 있고 깨끗한지 확인해라 → (B) 병에서 액체를 털어내고 씻어 말려라. 라벨도 제거해라. → (A) 이 간단한 과정으로 모든 물건이 재활용 가능해진다. 둘째, 재활용 기호의 의미를 배워라. → (C) 기호는 재료와 재활용 가능 여부를 알려준다.", "correct": "주어진 글의 'First, make sure … empty, clean, and dry' → (B)가 구체적 방법(shake, wash, dry, remove labels) 제시 → (A) 'This simple process'가 (B)를 가리킴 + 'Second' → (C) 'They'가 (A)의 'recycling symbols'를 가리킴<br><br>① (A)-(B)-(C): This simple process가 가리킬 선행 내용 없음 ❌<br>② (A)-(C)-(B): 순서 부적절 ❌<br>③ (B)-(A)-(C): 논리적 흐름 완벽 → <b>정답</b> ✅<br>④ (B)-(C)-(A): They가 가리킬 대상 없음 ❌<br>⑤ (C)-(A)-(B): They가 가리킬 대상 없음 ❌", "wrongs": [], "tip": "🔑 순서배열 전략: ① 지시어(This, They) 추적, ② 담화 표지(First, Second) 활용. 'This simple process' → 앞에 구체적 과정 필요 → (B). 'They' → 앞에 복수명사(recycling symbols) 필요 → (A) 뒤에 (C)."}}, {"id": 16, "type": "무관문장", "diff": "쉬움", "pts": 3, "fmt": "mc", "note": "무관문장", "passage": "The biggest problem with wishcycling is that it creates more waste. ① For example, if you wishcycle a greasy pizza box, it can soak clean paper products with oil. ② Then everything in the recycling bin will become non-recyclable and end up in a landfill. ③ Pizza is one of the most popular foods in the world, with billions of servings consumed every year. ④ Creating more waste is not the only problem, however. ⑤ Wishcycling also leads to costly delays.", "stem": "다음 글에서 전체 흐름과 <b>관계 없는</b> 문장을 고르시오.", "ch": ["①", "②", "③", "④", "⑤"], "ans": 2, "det": {"ref": "[해석] ③ '피자는 세계에서 가장 인기 있는 음식 중 하나이며 매년 수십억 인분이 소비된다.'는 피자의 인기에 대한 내용으로, 위시사이클링이 만드는 쓰레기 문제와 <b>관계없는 문장</b>입니다.", "correct": "① 기름진 피자 박스가 종이를 오염시키는 예시 → 위시사이클링 문제와 관련 ✅<br>② 수거함의 모든 것이 재활용 불가 → 위시사이클링 결과 ✅<br>③ 피자의 세계적 인기와 소비량 → 위시사이클링 주제와 <b>무관</b> ❌ → 정답<br>④ 쓰레기 증가만이 유일한 문제가 아님 → 주제 연결 ✅<br>⑤ 비용이 드는 지연 초래 → 위시사이클링 문제 ✅", "wrongs": [], "tip": "🔑 무관문장 전략: 글의 주제(위시사이클링의 문제점)에서 벗어나는 문장 찾기. ③은 '피자의 인기'라는 전혀 다른 주제를 다루고 있어 흐름을 방해함."}}, {"id": 17, "type": "지칭", "diff": "쉬움", "pts": 3, "fmt": "mc", "note": "지칭 T/F", "passage": "First, make sure your recyclables are empty, clean, and dry. Shake out any remaining liquid from bottles and jars. After that, wash <u><b>them</b></u> out and wait for them to dry. You also need to remove the labels. Now they are ready to be tossed in the recycling bin.", "stem": "다음 글에서 밑줄 친 <b>them</b>이 가리키는 대상으로 적절한 것을 고르시오.", "ch": ["bottles and jars", "labels"], "ans": 0, "det": {"ref": "[원문] Shake out any remaining liquid from <b>bottles and jars</b>. After that, wash <b>them</b> out → [해석] 병이나 용기에서 남아 있는 액체를 털어 내라. 그런 다음에 <b>그것들을(= bottles and jars)</b> 물로 헹구어라. them은 바로 앞 문장의 bottles and jars를 가리킵니다.", "correct": "T (bottles and jars): 앞 문장에서 'from bottles and jars'를 언급하고, 바로 다음 문장에서 'wash them out'이라고 했으므로 them = bottles and jars ✅ → <b>정답</b><br>F (labels): labels는 'them'이 언급된 후에 나오며(You also need to remove the labels), 시간순으로 bottles and jars를 씻은 뒤 라벨을 제거하므로 부적절 ❌", "wrongs": [], "tip": "🔑 지칭 추적: 대명사 them은 보통 직전 문장의 복수명사를 가리킴. 'from bottles and jars → wash them' → them = bottles and jars. 문맥의 시간 순서도 확인(털어내기 → 씻기 → 말리기 → 라벨 제거)."}}, {"id": 18, "type": "서술형", "diff": "보통", "pts": 5, "fmt": "written", "note": "서술형 요약", "passage": "Wishcycling is the act of trying to recycle something that should not be recycled. Wishcycling is usually done with good intentions, but it often causes more harm than good. The biggest problem with wishcycling is that it creates more waste. Wishcycling also leads to costly delays and can damage sorting machines.<br><br><b>[요약문]</b><br>Wishcycling, done with good intentions, creates more <u>&nbsp;&nbsp;(A)&nbsp;&nbsp;</u> and leads to costly <u>&nbsp;&nbsp;(B)&nbsp;&nbsp;</u>.<br><br><b>[조건]</b> 본문에서 각각 한 단어를 찾아 쓸 것.", "stem": "다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A)와 (B)에 들어갈 말을 <b>본문에서 찾아</b> 쓰시오.", "wa": "waste, delays", "accept": ["WASTE", "waste", "waste, delays", "waste delays", "waste / delays", "delays", "WASTE, DELAYS", "DELAYS"], "det": {"ref": "[원문] it creates more <b>waste</b> / leads to costly <b>delays</b> → [해석] 위시사이클링은 더 많은 <b>쓰레기(waste)</b>를 만들고 비용이 드는 <b>지연(delays)</b>을 초래한다.", "correct": "(A) waste: 'The biggest problem … creates more waste'에서 직접 도출 ✅<br>(B) delays: 'leads to costly delays'에서 직접 도출 ✅", "wrongs": [], "tip": "🔑 요약 서술형: 본문의 키워드를 정확히 찾아 쓰기. waste(쓰레기)와 delays(지연)는 위시사이클링의 두 가지 주요 문제점."}}, {"id": 19, "type": "서술형", "diff": "어려움", "pts": 7, "fmt": "written", "note": "서술형 영작", "passage": "<b>[조건]</b><br>• 아래 우리말을 영어로 옮길 것<br>• 주어진 단어를 모두 사용하되, 필요시 어형을 변환할 것<br>• 한 문장으로 작성할 것<br><br><b>[우리말]</b><br>재활용할 수 없는 물건들이 재활용 가능한 물건들과 더 많이 섞일수록, 그것들을 골라내는 데 더 오래 걸릴 것이다.<br><br><b>[보기]</b> the, more, non-recyclable, mix, recyclable, long, take, pick", "stem": "다음 <b>조건</b>에 맞게 주어진 단어를 활용하여 영작하시오.", "wa": "The more non-recyclable items are mixed with recyclable items, the longer it will take to pick them out.", "accept": ["THE MORE NON-RECYCLABLE ITEMS ARE MIXED WITH RECYCLABLE ITEMS, THE LONGER IT WILL TAKE TO PICK THEM OUT.", "The more non-recyclable items are mixed with recyclable items the longer it will take to pick them out.", "The more non-recyclable items are mixed with recyclable items, the longer it will take to pick them out.", "The more non-recyclable items are mixed with recyclable items / the longer it will take to pick them out.", "The more non-recyclable items are mixed with recyclable items", "the more non-recyclable items are mixed with recyclable items, the longer it will take to pick them out.", "the longer it will take to pick them out.", "THE MORE NON-RECYCLABLE ITEMS ARE MIXED WITH RECYCLABLE ITEMS", "THE LONGER IT WILL TAKE TO PICK THEM OUT.", "The more non-recyclable items are mixed with recyclable items, the longer it will take to pick them out", "the more non-recyclable items are mixed with recyclable items"], "det": {"ref": "[원문] The more non-recyclable items are mixed with recyclable items, the longer it will take to pick them out. → [해석] 재활용할 수 없는 물건들이 재활용 가능한 물건들과 더 많이 섞일수록, 그것들을 골라내는 데 더 오래 걸릴 것이다.", "correct": "'the + 비교급 ~, the + 비교급 ~' 구문 활용. 수동태(are mixed)와 비인칭주어 구문(it will take to-v) 포함. pick them out(골라내다)까지 정확히 작성해야 함.", "wrongs": [], "tip": "🔑 the 비교급, the 비교급: The more ~, the longer ~. mix → are mixed(수동태). take → it will take to pick them out. 어순 주의: The more + 주어 + 동사, the longer + it will take + to-v."}}, {"id": 20, "type": "서술형", "diff": "쉬움", "pts": 3, "fmt": "written", "note": "서술형 어형", "passage": "We all know that <u>(live)</u> without producing trash is impossible. The good news is that about 75 percent of our waste can be recycled when it is done properly.<br><br><b>[조건]</b> 괄호 안의 단어를 어법에 맞는 형태로 바꿔 쓸 것.", "stem": "다음 글의 괄호 안에서 문맥과 어법에 맞게 <b>어형을 변환</b>하여 쓰시오.", "wa": "living", "accept": ["living", "LIVING"], "det": {"ref": "[원문] We all know that <b>living</b> without producing trash is impossible. → [해석] 우리 모두는 쓰레기를 만들지 않고 <b>사는 것</b>이 불가능하다는 것을 알고 있다. that절의 주어로 동명사(living)가 와야 합니다.", "correct": "that절 내부: ______ without producing trash <b>is</b> impossible. 주어 자리에 동사원형 live는 올 수 없고, 동명사 living이 주어 역할을 해야 함. is(단수 동사)와 일치.", "wrongs": [], "tip": "🔑 동명사 주어: Living without ~ is impossible. 동명사(v-ing)가 주어로 쓰이면 단수 취급 → is. 비교: To live without ~ is const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금만 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;
r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}
h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;
if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;
if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;
h+=`</div></div>`;});h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
</script>
</body>
</html>
