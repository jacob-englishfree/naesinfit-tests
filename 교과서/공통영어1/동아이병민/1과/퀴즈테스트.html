<style>

.c-num{min-width:26px;height:26px;background:#f0ece8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}

.written-input{width:100%;padding:14px 16px;border:2px solid #e0dcd8;border-radius:var(--rs);font-size:15px;font-family:inherit;resize:none;min-height:56px;transition:var(--tr);}

.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}

.nav-btn{padding:9px 18px;background:#fff;border:2px solid #e0dcd8;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}

.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}

.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}

.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}

<div class="grain"></div><div class="toast" id="toast"></div>

<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">🎯 내신핏</div>

<script>
const EI={"subject":"공통영어1","pub":"동아(이병민)","lesson":"1과","title":"When Were You the Bravest?","total":100,"time":1200,"histKey":"quizH_donga_L1_20","qCount":20};

const Q = [
  {
    "id": 1,
    "type": "어법",
    "diff": "보통",
    "pts": 5,
    "fmt": "mc",
    "note": "어법 ⓐ~ⓔ",
    "passage": "One evening, I went to a convenience store to buy some snacks. No one was at the counter, so I thought the clerk <u>ⓐ was working</u> in the back. The telephone started <u>ⓑ ringing</u>, but no one came to answer it. I felt something was wrong. I looked over the counter and saw the clerk <u>ⓒ lying</u> on the floor. I immediately called 911 and <u>ⓓ explaining</u> the situation. The operator asked me <u>ⓔ to perform</u> CPR on the clerk until the paramedics arrived.",

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
