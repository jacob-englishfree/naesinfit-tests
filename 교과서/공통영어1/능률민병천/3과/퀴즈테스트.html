<style>

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}

.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}

@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid,.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}.nav-dots{max-width:55%;}}

<script>
const EI={"subject":"공통영어1","pub":"능률(민병천)","lesson":"3과","title":"Timing Is Everything","total":100,"time":1200,"histKey":"quizH_NE능률민병천_3_20","qCount":20};

const Q = [
  {
    id:1, type:'어법', diff:'보통', pts:5, fmt:'mc',
    note:'소화와 혈액순환',
    passage:`When you eat, blood <u>ⓐ rushes</u> to the digestive system to help break down the food and <u>ⓑ absorb</u> its nutrients. But when you start to exercise, blood moves from the digestive system to your muscles. This happens in order to <u>ⓒ supply</u> your muscles with the oxygen and nutrients they <u>ⓓ requires</u>. As a result, the digestion process is <u>ⓔ paused</u> until the blood returns.`,
    stem:'다음 글의 밑줄 친 ⓐ~ⓔ 중 어법상 어색한 것을 고르시오.',

    passage:`Carbohydrates in the food we eat are broken down into a kind of sugar called glucose. When this glucose is stored in parts of the body, such as the muscles and the liver, it is called glycogen. This is why exercising on a completely empty stomach—such as when you first wake up in the morning—can be such a challenge. Your blood sugar levels are low, and you don't have enough glycogen stored in your body.`,
    stem:'다음 글의 내용과 일치하는 것을 고르시오.',
    ch:['Glucose is a type of fat produced during exercise.','Glycogen is stored only in the brain and the heart.','Carbohydrates are broken down into glucose in the body.','Exercising on an empty stomach increases blood sugar levels.','Glycogen is a mineral found in vegetables and fruits.'],
    ans:2,
    det:{
      ref:'[원문] Carbohydrates in the food we eat are <b>broken down into</b> a kind of sugar called <b>glucose</b>. [해석] 우리가 먹는 음식 속 탄수화물은 포도당이라 불리는 일종의 당으로 분해된다.',
      correct:'① Glucose is a type of fat(포도당은 지방의 일종): 포도당은 당(sugar)이지 지방(fat)이 아님 ❌<br>② Glycogen is stored only in the brain and heart(글리코겐은 뇌와 심장에만 저장): 원문은 muscles and liver ❌<br>③ Carbohydrates are broken down into glucose(탄수화물이 포도당으로 분해): 원문 내용과 정확히 일치 ✅<br>④ Exercising on an empty stomach increases blood sugar(공복 운동이 혈당 상승): 원문은 혈당이 낮다고 함 ❌<br>⑤ Glycogen is a mineral(글리코겐은 미네랄): 글리코겐은 당(sugar)의 저장 형태 ❌',
      wrongs:[],
      tip:'🔑 일치 문제: 선택지의 핵심 명사가 원문과 동일한 의미로 쓰였는지 확인. glucose = sugar(당) ≠ fat(지방), mineral(미네랄). 저장 부위: muscles and liver.'
    }

  {
    id:11, type:'불일치', diff:'보통', pts:5, fmt:'mc',
    note:'운동 후 탄수화물 계산',
    passage:`For this reason, doctors recommend that people eat food containing carbohydrates within thirty minutes after working out. This replaces the muscle glycogen you have lost. Basically, you need between one and one and a half grams of carbohydrates for every kilogram you weigh. Let's do the math. If you weigh 60 kilograms, you should try to consume between 60 and 90 grams of carbohydrates after you exercise. This is equal to about one bowl of white rice or three bananas.`,
    stem:'다음 글의 내용과 일치하지 않는 것을 고르시오.',
    ch:['의사들은 운동 후 30분 이내에 탄수화물 섭취를 권장한다.','체중 1kg당 1~1.5g의 탄수화물이 필요하다.','60kg인 사람은 운동 후 60~90g의 탄수화물을 섭취해야 한다.','밥 한 공기는 약 90g의 탄수화물에 해당한다.','운동 후 탄수화물 섭취는 근육 글리코겐을 보충한다.'],
    ans:3,
    det:{
      ref:'[원문] This is equal to about one bowl of white rice or three bananas. [해석] 이것(60~90g)은 밥 한 공기 <b>또는</b> 바나나 세 개에 해당한다. 밥 한 공기 = 약 60~90g 범위. ④는 "약 90g"으로 단정하여 원문의 범위 표현과 불일치.',
      correct:'① 운동 후 30분 이내 탄수화물 섭취 권장: within thirty minutes after working out → 일치 ✅<br>② 체중 1kg당 1~1.5g: between one and one and a half grams for every kilogram → 일치 ✅<br>③ 60kg → 60~90g: 60 × 1 = 60, 60 × 1.5 = 90 → 일치 ✅<br>④ 밥 한 공기 = 약 90g: 원문은 60~90g = 밥 한 공기 or 바나나 3개. 밥 한 공기를 90g으로 단정하는 것은 원문의 범위 표현과 불일치 ❌<br>⑤ 탄수화물 → 글리코겐 보충: replaces the muscle glycogen → 일치 ✅',

      tip:'🔑 불일치 문제: 숫자·범위를 정확히 비교. 원문이 "60~90g = 밥 한 공기 or 바나나 3개"라고 범위로 제시한 것을 "약 90g"으로 단정하면 불일치. or(또는)와 and(그리고)의 차이에도 주의.'
    }

    id:13, type:'빈칸', diff:'어려움', pts:6, fmt:'mc',
    note:'글리코겐 소진 원인',
    passage:`This is because the body needs energy to exercise. The fuel that provides this energy is glycogen. Carbohydrates in the food we eat are broken down into a kind of sugar called glucose. When this glucose is stored in parts of the body, such as the muscles and the liver, it is called glycogen. This is why exercising on a completely empty stomach can be such a challenge. Your blood sugar levels are low, and you don't have enough glycogen stored in your body. If you exercise on an empty stomach, you will most likely lack energy. This is because __________________.`,

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}

function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
