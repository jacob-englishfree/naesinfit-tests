<style>
:root{--g:#16A34A;--gd:#14532D;--gl:#E8F5E9;--gxl:#F0FDF4;--gxxl:#F8FDF9;--bg:#F4F8F5;--text:#1A1A2E;--tm:#5A6A5E;--tl:#8A9A8E;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--o:#F59E0B;--ol:#FFF8E1;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s ease;}

body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}

.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #f0f5f1;}.info-row:last-child{border:none;}

.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;}

.tag-combo{background:var(--gl);color:#166534;}.tag-wrong{background:var(--rl);color:var(--r);}.tag-blank{background:#E0F7FA;color:#00838F;}.tag-syn{background:var(--bl);color:var(--b);}.tag-ant{background:var(--ol);color:#B45309;}.tag-poly{background:#FCE4EC;color:#C2185B;}.tag-eng{background:#E8F6FF;color:#0277BD;}.tag-morph{background:#FFF3E0;color:#E65100;}.tag-ctx{background:#EDE7F6;color:#5E35B1;}

.choice-btn:hover{border-color:var(--g);}.choice-btn.selected{border-color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,.12);background:var(--gxxl);}

.written-input{width:100%;padding:14px 16px;border:2px solid #d0dcd2;border-radius:var(--rs);font-size:15px;font-family:inherit;}.written-input:focus{outline:none;border-color:var(--g);}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 16px;display:flex;align-items:center;gap:5px;justify-content:center;z-index:100;overflow-x:auto;flex-wrap:wrap;}

.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.level-range{font-size:13px;color:var(--tm);margin-top:4px;}
.level-bar{margin-top:16px;height:8px;background:#e8efe9;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),#4ADE80);transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:#FAFDFB;border-radius:var(--rs);border:1px solid #dde8df;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:var(--gxl);}.info-cell.highlight .ic-value{color:var(--g);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:60px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#e8efe9;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;padding:16px;background:var(--gxl);border-radius:var(--rs);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #d0dcd2;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--g);color:var(--g);}.act-btn.primary{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.rev-card{border:1.5px solid #dde8df;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:#FAFDFB;display:flex;align-items:center;gap:12px;cursor:pointer;}.rev-header:hover{background:#F0F8F1;}.rev-icon{font-size:18px;margin-left:auto;transition:transform .2s;}.rev-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 18px;}.rev-body.open{max-height:3000px;padding:20px 18px;}
.expl-tag{display:inline-flex;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.tip{background:var(--gxl);color:var(--gd);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);margin-bottom:10px;}.expl-box.ans-b{border-left:3px solid var(--g);}.expl-box.tip-b{border-left:3px solid var(--g);background:var(--gxl);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}}
</style>

<body>
<div class="toast" id="toast"></div>
<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">📝 온라인단어 TEST</div>
  <h1 class="start-title">온라인단어 <span>TEST</span></h1>
  <p class="start-subtitle">NE능률(민병천) 4과 · AI: Opportunity or Threat? · 20문항</p>
  <div class="info-card"><div class="info-card-header">📚 시험 정보</div><div class="info-rows">
    <div class="info-row"><span class="info-label">과목</span><span class="info-value">공통영어1</span></div>
    <div class="info-row"><span class="info-label">출판사</span><span class="info-value">능률(민병천)</span></div>
    <div class="info-row"><span class="info-label">단원</span><span class="info-value">4과 AI: Opportunity or Threat?</span></div>
  </div></div>
  <div class="chip-row"><div class="chip">📝 20문항</div><div class="chip">⏱️ 20분</div><div class="chip">✅ 80점 이상 통과</div><div class="chip">📊 100점 만점</div></div>
  <div class="input-group"><label>이름 *</label><input type="text" id="inpName" placeholder="이름을 입력하세요"></div>
  <div class="input-row">
    <div class="input-group" style="flex:1"><label>학교</label><input type="text" id="inpSchool" placeholder="선택"></div>
    <div class="input-group" style="flex:.6"><label>학년</label><select id="inpGrade"><option>고1</option><option>고2</option><option>고3</option><option>중3</option></select></div>

<script>
const EI={"subject":"공통영어1","pub":"능률(민병천)","lesson":"4과","title":"AI: Opportunity or Threat?","total":100,"time":1200,"totalQ":20,"histKey":"wordTest_nle_4"};

const Q=[
{id:1,type:`(A)(B)(C) 조합형`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`(A) agreement – (B) potential – (C) numerous`,`(A) controversy – (B) limitation – (C) numerous`,`(A) controversy – (B) potential – (C) numerous`,`(A) controversy – (B) potential – (C) scarce`,`(A) agreement – (B) limitation – (C) scarce`],passage:`Recently, an artist used an artificial intelligence (AI) system to create the image above for an art contest. The image won first place in the digital arts category. This led to a (A)[<b>controversy / agreement</b>] in the art community. Some people complained that the artist simply provided the system with basic instructions and let it do all the work. They felt this wasn't fair to the rest of the artists in the contest. However, there were also people who were excited by the (B)[<b>potential / limitation</b>] of AI. Today, there are (C)[<b>numerous / scarce</b>] AI programs that can create various forms of art including images, songs, and novels.`,stem:`다음 글의 (A), (B), (C)에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`최근 한 예술가가 미술 대회를 위해 인공지능(AI) 시스템을 사용하여 위의 이미지를 만들었다. 그 이미지는 디지털 아트 부문에서 1위를 차지했다. 이것은 예술 공동체에서 <b>논란(controversy)</b>으로 이어졌다. 일부 사람들은 그 예술가가 시스템에 기본적인 지시만 내리고 모든 일을 하게 했다고 불평했다. 그러나 AI의 <b>잠재력(potential)</b>에 흥분한 사람들도 있었다. 오늘날 이미지, 노래, 소설 등 다양한 형태의 예술을 만들 수 있는 <b>수많은(numerous)</b> AI 프로그램이 있다.`,analysis:`✅ ③ (A) controversy(논란) – (B) potential(잠재력) – (C) numerous(수많은): 문맥상 AI가 대회에서 우승하여 '논란'이 생겼고, AI의 '잠재력'에 흥분했으며, '수많은' 프로그램이 있다는 흐름이 적절합니다.<br>❌ ① agreement(동의)는 논란 상황과 반대<br>❌ ② limitation(한계)은 흥분의 대상으로 부적절<br>❌ ④ scarce(드문)는 numerous의 반의어<br>❌ ⑤ 모든 선택이 반대 의미`,tip:`controversy(논란)와 agreement(동의)는 반의어 관계입니다. potential(잠재력)과 limitation(한계)도 대비되는 개념입니다.`}},
{id:2,type:`(A)(B)(C) 조합형`,diff:`보통`,pts:5,fmt:"mc",ans:0,ch:[`(A) corresponding – (B) blend – (C) complex`,`(A) unrelated – (B) blend – (C) complex`,`(A) corresponding – (B) separate – (C) simple`,`(A) corresponding – (B) blend – (C) simple`,`(A) unrelated – (B) separate – (C) complex`],passage:`AI image generators create images based on our text requests. They do this by copying other images that were created by humans. The generators have the ability to analyze millions of images and their (A)[<b>corresponding / unrelated</b>] descriptions. This allows them to create works of art in a short time based on the provided instructions. Moreover, AI programs can mix the styles of existing images upon request. For example, you can (B)[<b>blend / separate</b>] a photograph of a cat with Johannes Vermeer's <i>Girl with a Pearl Earring</i>. A simple request was enough to create this (C)[<b>complex / simple</b>] and detailed image.`,stem:`다음 글의 (A), (B), (C)에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`AI 이미지 생성기는 우리의 텍스트 요청에 기반하여 이미지를 만든다. 생성기는 수백만 개의 이미지와 그에 <b>상응하는(corresponding)</b> 설명을 분석할 수 있다. 또한 AI 프로그램은 요청에 따라 기존 이미지의 스타일을 <b>혼합(blend)</b>할 수 있다. 간단한 요청으로 이 <b>복잡한(complex)</b> 이미지를 만들기에 충분했다.`,analysis:`✅ ① (A) corresponding(상응하는) – (B) blend(혼합하다) – (C) complex(복잡한): 이미지와 '상응하는' 설명을 분석하고, 스타일을 '혼합'하며, '복잡하고' 세밀한 이미지를 만든다는 흐름이 자연스럽습니다.<br>❌ ② unrelated(관련 없는)는 분석의 목적과 모순<br>❌ ③ separate(분리하다)는 mix와 반대<br>❌ ④ simple(단순한)은 detailed와 어울리지 않음<br>❌ ⑤ unrelated와 separate 모두 문맥에 부적절`,tip:`corresponding은 '상응하는, 대응하는'의 뜻으로, 이미지와 그 설명이 서로 짝을 이루는 관계를 나타냅니다.`}},
{id:3,type:`(A)(B)(C) 조합형`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`(A) reach – (B) dependent – (C) limitations`,`(A) exceed – (B) independent – (C) limitations`,`(A) reach – (B) independent – (C) advantages`,`(A) exceed – (B) dependent – (C) advantages`,`(A) exceed – (B) dependent – (C) limitations`],passage:`Since AI has the potential to learn skills and perform them better than humans, some people view it as a threat. They worry that AI will replace humans in more and more areas. On the other hand, others think that AI cannot (A)[<b>exceed / reach</b>] human imagination and that it is still (B)[<b>dependent / independent</b>] on human assistance. This is because the data that AI uses can have flaws or (C)[<b>limitations / advantages</b>]. A dependence on imperfect data with little diversity eventually limits the output of AI programs.`,stem:`다음 글의 (A), (B), (C)에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`AI가 기술을 배우고 인간보다 더 잘 수행할 잠재력이 있기 때문에, 일부 사람들은 AI를 위협으로 본다. 반면에 다른 사람들은 AI가 인간의 상상력을 <b>초월(exceed)</b>할 수 없으며 여전히 인간의 도움에 <b>의존적(dependent)</b>이라고 생각한다. 이는 AI가 사용하는 데이터에 결함이나 <b>한계(limitations)</b>가 있을 수 있기 때문이다.`,analysis:`✅ ⑤ (A) exceed(초월하다) – (B) dependent(의존적인) – (C) limitations(한계): AI가 인간 상상력을 '초월'할 수 없고, 인간 도움에 '의존적'이며, 데이터에 결함이나 '한계'가 있다는 논리가 일관됩니다.<br>❌ ① reach(도달하다)는 exceed보다 약한 표현<br>❌ ② independent(독립적인)는 문맥과 반대<br>❌ ③ advantages(장점)는 flaws와 어울리지 않음<br>❌ ④ advantages는 결함과 병렬 구조로 부적절`,tip:`exceed는 '초과하다, 능가하다'의 뜻입니다. dependent on은 '~에 의존하는'으로 반드시 전치사 on과 함께 씁니다.`}},
{id:4,type:`문맥상 부적절한 어휘`,diff:`쉬움`,pts:4,fmt:"mc",ans:3,ch:[`① digital`,`② complained`,`③ provided`,`④ unfair`,`⑤ excited`],passage:`Recently, an artist used an artificial intelligence (AI) system to create the image above for an art contest. The image won first place in the ①<u>digital</u> arts category. This led to a controversy in the art community. Some people ②<u>complained</u> that the artist simply ③<u>provided</u> the system with basic instructions and let it do all the work. They felt this wasn't ④<u>unfair</u> to the rest of the artists in the contest. However, there were also people who were ⑤<u>excited</u> by the potential of AI.`,stem:`다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`최근 한 예술가가 미술 대회를 위해 AI 시스템을 사용했다. 이미지는 ①<b>디지털</b> 아트 부문에서 1위를 차지했다. 일부 사람들은 그 예술가가 시스템에 기본 지시만 ③<b>제공하고</b> 모든 일을 시켰다고 ②<b>불평했다</b>. 그들은 이것이 나머지 예술가들에게 ④<b>불공정하지 않다(unfair → fair)</b>고 느꼈다. 그러나 AI의 잠재력에 ⑤<b>흥분한</b> 사람들도 있었다.`,analysis:`❌ ④ unfair → 원문은 <b>fair</b>입니다. 'wasn't fair(공정하지 않다)'가 올바른 표현인데, unfair로 바뀌면 'wasn't unfair(불공정하지 않다 = 공정하다)'가 되어 의미가 반대가 됩니다.<br>✅ ① digital: 디지털 아트 부문 — 적절<br>✅ ② complained: 불평했다 — 적절<br>✅ ③ provided: 제공했다 — 적절<br>✅ ⑤ excited: 흥분한 — 적절`,tip:`이중 부정에 주의하세요! wasn't unfair = was fair (공정했다)로, 원래 의미(공정하지 않았다)와 반대가 됩니다.`}},
{id:5,type:`문맥상 부적절한 어휘`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`① compose`,`② restrictions`,`③ produce`,`④ edit`,`⑤ possibilities`],passage:`AI programs may lead to changes not only in the art world but also in the music industry. These programs are already able to ①<u>compose</u> songs, and they give you many ②<u>restrictions</u>. For example, you can choose the style and key, such as C major or A minor. You can also set how long the song will be. Once you've entered the information, the program will ③<u>produce</u> a song that you can ④<u>edit</u> or use as it is. Furthermore, computer-generated imagery (commonly known as CGI) has opened up new ⑤<u>possibilities</u> in the music industry.`,stem:`다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`AI 프로그램은 예술 세계뿐만 아니라 음악 산업에서도 변화를 이끌 수 있다. 이 프로그램들은 이미 노래를 ①<b>작곡</b>할 수 있으며, 많은 ②<b>제한(restrictions → options)</b>을 제공한다. 스타일과 조성을 선택할 수 있고, 곡의 길이도 설정할 수 있다. 프로그램은 ④<b>편집</b>하거나 그대로 사용할 수 있는 노래를 ③<b>생산</b>한다. CGI는 음악 산업에서 새로운 ⑤<b>가능성</b>을 열었다.`,analysis:`❌ ② restrictions(제한) → 원문은 <b>options(선택지)</b>입니다. 스타일, 조성, 길이 등을 '선택'할 수 있다는 문맥이므로 restrictions는 부적절합니다.<br>✅ ① compose: 작곡하다 — 적절<br>✅ ③ produce: 만들어내다 — 적절<br>✅ ④ edit: 편집하다 — 적절<br>✅ ⑤ possibilities: 가능성 — 적절`,tip:`options(선택지)와 restrictions(제한)는 반의어 관계입니다. 문맥상 '많은 선택지를 준다'가 자연스럽습니다.`}},
{id:6,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:2,ch:[`① concerns`,`② imitate`,`③ strengths`,`④ diversity`,`⑤ boundaries`],passage:`There are also ①<u>concerns</u> that AI may ②<u>imitate</u> the styles of human artists without their consent. On the other hand, others think that AI cannot exceed human imagination and that it is still dependent on human assistance. This is because the data that AI uses can have ③<u>strengths</u> or limitations. A dependence on imperfect data with little ④<u>diversity</u> eventually limits the output of AI programs. Human imagination, on the other hand, has no limits or ⑤<u>boundaries</u>.`,stem:`다음 글의 밑줄 친 ①~⑤ 중에서 문맥상 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`AI가 인간 예술가의 스타일을 동의 없이 ②<b>모방</b>할 수 있다는 ①<b>우려</b>도 있다. 반면에 AI가 사용하는 데이터에는 ③<b>강점(strengths → flaws)</b>이나 한계가 있을 수 있다. 적은 ④<b>다양성</b>을 가진 불완전한 데이터에 대한 의존은 결국 AI 프로그램의 출력을 제한한다. 반면에 인간의 상상력에는 한계나 ⑤<b>경계</b>가 없다.`,analysis:`❌ ③ strengths(강점) → 원문은 <b>flaws(결함)</b>입니다. AI 데이터에 '결함이나 한계가 있다'는 문맥이므로 strengths(강점)는 부적절합니다.<br>✅ ① concerns: 우려 — 적절<br>✅ ② imitate: 모방하다 — 적절<br>✅ ④ diversity: 다양성 — 적절<br>✅ ⑤ boundaries: 경계 — 적절`,tip:`flaws(결함, 결점)는 defects, shortcomings와 유사어이고, strengths(강점)와는 반의어입니다.`}},
{id:7,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`artificial`,`various`,`digital`,`specific`],passage:`This led to a controversy in the art community. However, there were also people who were excited by the potential of AI. Today, there are numerous AI programs that can create __________ forms of art including images, songs, and novels.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`이것은 예술 공동체에서 논란으로 이어졌다. 그러나 AI의 잠재력에 흥분한 사람들도 있었다. 오늘날 이미지, 노래, 소설을 포함한 <b>다양한(various)</b> 형태의 예술을 만들 수 있는 수많은 AI 프로그램이 있다.`,analysis:`✅ ② various(다양한): images, songs, novels 등 여러 형태를 나열하므로 '다양한'이 적절합니다.<br>❌ ① artificial(인공적인): 예술의 형태를 수식하기에 부적절<br>❌ ③ digital(디지털의): 모든 형태가 디지털인 것은 아님<br>❌ ④ specific(특정한): 여러 예시를 나열하는 문맥과 맞지 않음`,tip:`various는 '다양한'의 뜻으로, 뒤에 복수명사가 옵니다. variety(다양성)의 형용사형입니다.`}},
{id:8,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`ignore`,`display`,`remove`,`analyze`],passage:`AI image generators create images based on our text requests. They do this by copying other images that were created by humans. The generators have the ability to __________ millions of images and their corresponding descriptions. This allows them to create works of art in a short time based on the provided instructions.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`AI 이미지 생성기는 우리의 텍스트 요청에 기반하여 이미지를 만든다. 생성기는 수백만 개의 이미지와 그에 상응하는 설명을 <b>분석(analyze)</b>할 수 있는 능력을 갖추고 있다. 이를 통해 제공된 지시에 기반하여 짧은 시간 안에 예술 작품을 만들 수 있다.`,analysis:`✅ ④ analyze(분석하다): 수백만 개의 이미지와 설명을 '분석'하여 예술 작품을 만든다는 문맥이 자연스럽습니다.<br>❌ ① ignore(무시하다): 이미지를 무시하면 작품을 만들 수 없음<br>❌ ② display(전시하다): 전시가 아닌 학습/분석 과정<br>❌ ③ remove(제거하다): 이미지를 제거하는 것은 문맥에 맞지 않음`,tip:`analyze(분석하다)는 명사형 analysis(분석)와 함께 자주 출제됩니다.`}},
{id:9,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`artistic`,`artificial`,`realistic`,`dramatic`],passage:`Furthermore, computer-generated imagery (commonly known as CGI) has opened up new possibilities in the music industry. Virtual influencers with extremely __________ faces, bodies, and voices have already released several songs. Some of them have many followers on social media, just like human singers.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`또한, 컴퓨터 생성 이미지(CGI)는 음악 산업에서 새로운 가능성을 열었다. 매우 <b>사실적인(realistic)</b> 얼굴, 몸, 목소리를 가진 가상 인플루언서들이 이미 여러 곡을 발매했다. 그들 중 일부는 인간 가수처럼 소셜 미디어에서 많은 팔로워를 보유하고 있다.`,analysis:`✅ ③ realistic(사실적인): 가상 인플루언서의 얼굴, 몸, 목소리가 '사실적'이라는 문맥이 자연스럽습니다.<br>❌ ① artistic(예술적인): 외모의 사실성과 무관<br>❌ ② artificial(인공적인): 가상이지만 '사실적으로 보인다'는 것이 핵심<br>❌ ④ dramatic(극적인): 얼굴과 목소리를 수식하기에 부적절`,tip:`realistic(사실적인)은 real(실제의) + -istic(~적인)으로 구성됩니다. 반의어는 unrealistic(비현실적인)입니다.`}},
{id:10,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:0,ch:[`elaborate`,`general`,`simple`,`rough`],passage:`Moreover, AI programs can mix the styles of existing images upon request. For example, you can blend a photograph of a cat with Johannes Vermeer's <i>Girl with a Pearl Earring</i>. A simple request was enough to create this complex and <u>detailed</u> image.`,stem:`다음 글의 밑줄 친 <u>detailed</u>와 의미가 가장 <b>가까운</b> 것을 고르시오.`,det:{korean:`또한, AI 프로그램은 요청에 따라 기존 이미지의 스타일을 혼합할 수 있다. 예를 들어, 고양이 사진과 베르메르의 <i>진주 귀걸이를 한 소녀</i>를 혼합할 수 있다. 간단한 요청으로 이 복잡하고 <b>세밀한(detailed)</b> 이미지를 만들기에 충분했다.`,analysis:`✅ ① elaborate(정교한, 세밀한): detailed와 의미가 가장 가깝습니다.<br>❌ ② general(일반적인): 세밀함의 반대 개념<br>❌ ③ simple(단순한): detailed와 반의어<br>❌ ④ rough(대략적인): detailed와 반의어`,tip:`detailed(세밀한, 상세한)의 동의어: elaborate, thorough, comprehensive. 반의어: rough, general, brief.`}},
{id:11,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`given up`,`held back`,`taken in`,`put out`],passage:`Virtual influencers with extremely realistic faces, bodies, and voices have already <u>released</u> several songs. Some of them have many followers on social media, just like human singers. These types of virtual musicians are able to speak and move realistically with the help of their human creators.`,stem:`다음 글의 밑줄 친 <u>released</u>와 의미가 가장 <b>가까운</b> 것을 고르시오.`,det:{korean:`매우 사실적인 얼굴, 몸, 목소리를 가진 가상 인플루언서들이 이미 여러 곡을 <b>발매(released)</b>했다. 그들 중 일부는 인간 가수처럼 소셜 미디어에서 많은 팔로워를 보유하고 있다. 이런 유형의 가상 뮤지션들은 인간 제작자의 도움으로 사실적으로 말하고 움직일 수 있다.`,analysis:`✅ ④ put out(발표하다, 내놓다): released(발매하다)와 의미가 가장 가깝습니다.<br>❌ ① given up(포기하다): released와 무관<br>❌ ② held back(억제하다): released의 반의어<br>❌ ③ taken in(받아들이다, 속이다): released와 무관`,tip:`release는 '발매하다, 공개하다'의 뜻입니다. put out, publish, issue 등이 유사한 표현입니다.`}},
{id:12,type:`동의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`immediately`,`suddenly`,`frequently`,`ultimately`],passage:`This is because the data that AI uses can have flaws or limitations. A dependence on imperfect data with little diversity <u>eventually</u> limits the output of AI programs. Human imagination, on the other hand, has no limits or boundaries.`,stem:`다음 글의 밑줄 친 <u>eventually</u>와 의미가 가장 <b>가까운</b> 것을 고르시오.`,det:{korean:`이는 AI가 사용하는 데이터에 결함이나 한계가 있을 수 있기 때문이다. 적은 다양성을 가진 불완전한 데이터에 대한 의존은 <b>결국(eventually)</b> AI 프로그램의 출력을 제한한다. 반면에 인간의 상상력에는 한계나 경계가 없다.`,analysis:`✅ ④ ultimately(궁극적으로, 결국): eventually(결국, 마침내)와 의미가 가장 가깝습니다.<br>❌ ① immediately(즉시): eventually와 반대 시간 개념<br>❌ ② suddenly(갑자기): 점진적 과정이 아닌 갑작스러움<br>❌ ③ frequently(자주): 빈도 부사로 eventually와 무관`,tip:`eventually(결국)의 동의어: ultimately, finally, in the end. '시간이 지나 마침내'라는 의미를 담고 있습니다.`}},
{id:13,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`substitute`,`maintain`,`take over`,`displace`],passage:`Since AI has the potential to learn skills and perform them better than humans, some people view it as a threat. They worry that AI will <u>replace</u> humans in more and more areas. There are also concerns that AI may imitate the styles of human artists without their consent.`,stem:`다음 글의 밑줄 친 <u>replace</u>와 의미가 가장 <b>먼</b> 것을 고르시오.`,det:{korean:`AI가 기술을 배우고 인간보다 더 잘 수행할 잠재력이 있기 때문에, 일부 사람들은 AI를 위협으로 본다. 그들은 AI가 점점 더 많은 분야에서 인간을 <b>대체(replace)</b>할 것이라고 걱정한다. AI가 인간 예술가의 스타일을 동의 없이 모방할 수 있다는 우려도 있다.`,analysis:`✅ ② maintain(유지하다): replace(대체하다)와 의미가 가장 멉니다. 대체하는 것과 유지하는 것은 반대 개념입니다.<br>❌ ① substitute(대신하다): replace의 유사어<br>❌ ③ take over(대신 맡다): replace의 유사어<br>❌ ④ displace(대체하다, 밀어내다): replace의 유사어`,tip:`replace(대체하다)의 동의어: substitute, take over, displace. 반의어: maintain, keep, preserve.`}},
{id:14,type:`반의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`diminish`,`enhance`,`increase`,`improve`],passage:`What kind of future do you think lies ahead of us? Will more people use AI programs to <u>boost</u> their creativity and productivity? Or will people grow tired of the limitations of AI tools?`,stem:`다음 글의 밑줄 친 <u>boost</u>와 의미가 가장 <b>먼</b> 것을 고르시오.`,det:{korean:`어떤 미래가 우리 앞에 놓여 있다고 생각하는가? 더 많은 사람들이 AI 프로그램을 사용하여 창의성과 생산성을 <b>높일(boost)</b> 것인가? 아니면 사람들이 AI 도구의 한계에 싫증을 낼 것인가?`,analysis:`✅ ① diminish(감소시키다): boost(높이다, 증진시키다)와 의미가 가장 멉니다.<br>❌ ② enhance(향상시키다): boost의 유사어<br>❌ ③ increase(증가시키다): boost의 유사어<br>❌ ④ improve(개선하다): boost의 유사어`,tip:`boost(증진시키다)의 동의어: enhance, increase, improve, promote. 반의어: diminish, reduce, decrease.`}},
{id:15,type:`다의어 문맥적 의미`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`[본문 참고] AI programs may <b>lead</b> to changes not only in the art world but also in the music industry.<br><br>① Lack of exercise can <b>lead</b> to serious health problems.<br>② AI programs may <b>lead</b> to changes in both the art world and the music industry.<br>③ Poor planning will <b>lead</b> to failure in the long run.<br>④ She was chosen to <b>lead</b> the research team on AI ethics.<br>⑤ Too much dependence on AI can <b>lead</b> to a loss of creativity.`,stem:`다음 밑줄 친 <b>lead</b>가 나머지 넷과 <b>다른</b> 의미로 쓰인 것은?`,det:{korean:`[본문] AI 프로그램은 예술 세계뿐만 아니라 음악 산업에서도 변화를 <b>초래할(lead to)</b> 수 있다.<br>① 운동 부족은 심각한 건강 문제를 <b>초래할</b> 수 있다.<br>② AI 프로그램은 변화를 <b>초래할</b> 수 있다.<br>③ 계획 부족은 실패를 <b>초래할</b> 것이다.<br>④ 그녀는 AI 윤리 연구팀을 <b>이끌도록</b> 선정되었다.<br>⑤ AI에 대한 과도한 의존은 창의성 상실을 <b>초래할</b> 수 있다.`,analysis:`✅ ④ lead the team: '팀을 이끌다'라는 의미로, 나머지 넷의 'lead to ~(~을 초래하다, ~으로 이어지다)'와 다릅니다.<br>①②③⑤ lead to: '~을 야기하다, ~으로 이어지다' (cause, result in)<br>④ lead: '이끌다, 지휘하다' (guide, direct)`,tip:`lead to + 명사 = '~을 초래하다' / lead + 사람/팀 = '~을 이끌다'. 다의어 문제에서는 전치사 유무에 주목하세요.`}},
{id:16,type:`영영풀이 매칭`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`compete`,`collaborate`,`compromise`,`communicate`],passage:`<i>to work together with another person or group in order to achieve or produce something</i><br><br>[본문 참고] What we need to do is figure out how to use AI tools ethically and think about how humans and AI can __________.`,stem:`다음 영영 풀이에 해당하는 단어로 가장 적절한 것을 고르시오.`,det:{korean:`<i>무언가를 달성하거나 만들어내기 위해 다른 사람이나 집단과 함께 일하다</i><br><br>[본문] 우리가 해야 할 일은 AI 도구를 윤리적으로 사용하는 방법을 알아내고, 인간과 AI가 어떻게 <b>협력(collaborate)</b>할 수 있는지 생각하는 것이다.`,analysis:`✅ ② collaborate(협력하다): 'work together to achieve something'이라는 영영 풀이와 정확히 일치합니다.<br>❌ ① compete(경쟁하다): 함께 일하는 것이 아닌 겨루는 것<br>❌ ③ compromise(타협하다): 양보를 통한 합의로, 함께 일하는 것과 다름<br>❌ ④ communicate(소통하다): 정보를 교환하는 것으로, 함께 일하는 것과 다름`,tip:`collaborate는 co-(함께) + labor(일하다)에서 유래한 단어입니다. cooperation(협력)도 비슷한 의미입니다.`}},
{id:17,type:`어형 변환 (서술형)`,diff:`쉬움`,pts:4,fmt:"written",wa:`extremely`,accept:[`extremely`],passage:`Virtual influencers with (extreme) __________ realistic faces, bodies, and voices have already released several songs. Some of them have many followers on social media, just like human singers. These types of virtual musicians are able to speak and move realistically with the help of their human creators.`,stem:`다음 글의 괄호 안에 주어진 단어를 문맥에 맞게 변형하여 빈칸에 쓰시오.`,det:{korean:`매우 사실적인 얼굴, 몸, 목소리를 가진 가상 인플루언서들이 이미 여러 곡을 발매했다. 그들 중 일부는 인간 가수처럼 소셜 미디어에서 많은 팔로워를 보유하고 있다. 이런 유형의 가상 뮤지션들은 인간 제작자의 도움으로 사실적으로 말하고 움직일 수 있다.`,analysis:`✅ extremely: 형용사 realistic을 수식하는 부사가 필요합니다. extreme(형용사) → extremely(부사)로 변환합니다.`,tip:`형용사를 수식하려면 부사가 필요합니다. extreme(극도의) → extremely(극도로). -ly를 붙여 부사로 만듭니다.`}},
{id:18,type:`어형 변환 (서술형)`,diff:`보통`,pts:5,fmt:"written",wa:`ethically`,accept:[`ethically`],passage:`What kind of future do you think lies ahead of us? AI provides many benefits and new opportunities. What we need to do is figure out how to use AI tools (ethical) __________ and think about how humans and AI can collaborate.`,stem:`다음 글의 괄호 안에 주어진 단어를 문맥에 맞게 변형하여 빈칸에 쓰시오.`,det:{korean:`어떤 미래가 우리 앞에 놓여 있다고 생각하는가? AI는 많은 이점과 새로운 기회를 제공한다. 우리가 해야 할 일은 AI 도구를 <b>윤리적으로(ethically)</b> 사용하는 방법을 알아내고 인간과 AI가 어떻게 협력할 수 있는지 생각하는 것이다.`,analysis:`✅ ethically: 동사 use를 수식하는 부사가 필요합니다. ethical(형용사) → ethically(부사)로 변환합니다. 'AI 도구를 윤리적으로 사용하다'라는 의미입니다.`,tip:`ethical(윤리적인, 형용사) → ethically(윤리적으로, 부사). 동사를 수식할 때는 부사를 사용합니다.`}},
{id:19,type:`빈칸 문맥 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`materials`,`images`,`instructions`,`programs`],passage:`Recently, an artist used an artificial intelligence (AI) system to create the image above for an art contest. The image won first place in the digital arts category. Some people complained that the artist simply provided the system with basic __________ and let it do all the work.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`최근 한 예술가가 미술 대회를 위해 AI 시스템을 사용했다. 이미지는 디지털 아트 부문에서 1위를 차지했다. 일부 사람들은 그 예술가가 시스템에 기본적인 <b>지시(instructions)</b>만 제공하고 모든 일을 시켰다고 불평했다.`,analysis:`✅ ③ instructions(지시, 명령): 시스템에 기본적인 '지시'를 제공하고 나머지는 AI가 했다는 문맥이 자연스럽습니다.<br>❌ ① materials(재료): AI 시스템에 '재료'를 제공한다는 표현은 부자연스러움<br>❌ ② images(이미지): 이미지를 만드는 것이 목적이므로 모순<br>❌ ④ programs(프로그램): 시스템에 프로그램을 제공한다는 것은 문맥에 맞지 않음`,tip:`instructions는 '지시, 설명'의 뜻으로, AI에 명령어(prompt)를 입력하는 상황을 설명합니다.`}},
{id:20,type:`빈칸 문맥 완성`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`diversity`,`quantity`,`accuracy`,`quality`],passage:`On the other hand, others think that AI cannot exceed human imagination and that it is still dependent on human assistance. This is because the data that AI uses can have flaws or limitations. A dependence on imperfect data with little __________ eventually limits the output of AI programs.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,det:{korean:`반면에 다른 사람들은 AI가 인간의 상상력을 초월할 수 없으며 여전히 인간의 도움에 의존적이라고 생각한다. 이는 AI가 사용하는 데이터에 결함이나 한계가 있을 수 있기 때문이다. 적은 <b>다양성(diversity)</b>을 가진 불완전한 데이터에 대한 의존은 결국 AI 프로그램의 출력을 제한한다.`,analysis:`✅ ① diversity(다양성): 'little diversity(적은 다양성)'를 가진 불완전한 데이터가 AI 출력을 제한한다는 문맥이 원문과 일치합니다.<br>❌ ② quantity(양): 데이터의 양이 아닌 다양성이 핵심<br>❌ ③ accuracy(정확성): imperfect가 이미 불완전함을 나타내므로 중복적<br>❌ ④ quality(품질): imperfect가 이미 품질 문제를 암시하므로 중복적`,tip:`diversity(다양성)는 diverse(다양한)의 명사형입니다. AI 데이터의 다양성 부족이 한계를 만든다는 것이 본문의 핵심 논점입니다.`}}
];


let S={cur:0,ans:new Array(EI.totalQ).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,levelIcon:getLevel(r.score).icon});if(h.length>10)h.splice(0,h.length-10);try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 시험 기록이 없습니다.</p>';else p.innerHTML=h.slice().reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time} · ${r.grade}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.levelIcon} ${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'전설',icon:'🐉',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'챔피언',icon:'🏆',range:'90~94',msg:'최상위권!'};if(s>=80)return{name:'다이아몬드',icon:'💎',range:'80~89',msg:'통과! 취약 유형만 복습하면 최상위!'};if(s>=70)return{name:'빛나는별',icon:'🌟',range:'70~79',msg:'통과까지 조금만 더!'};if(s>=60)return{name:'별',icon:'⭐',range:'60~69',msg:'기본기 탄탄! 본문 복습 후 재도전!'};if(s>=40)return{name:'나무',icon:'🌲',range:'40~59',msg:'성장 중!'};return{name:'새싹',icon:'🌱',range:'0~39',msg:'단어 암기부터 시작!'};}
function fmtTime(s){return Math.floor(s/60)+'분 '+(s%60)+'초';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(EI.totalQ).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
const typeTag={'(A)(B)(C) 조합형':'tag-combo','문맥상 부적절한 어휘':'tag-wrong','빈칸 어휘 완성':'tag-blank','동의어 고르기':'tag-syn','반의어 고르기':'tag-ant','다의어 문맥적 의미':'tag-poly','영영풀이 매칭':'tag-eng','어형 변환 (서술형)':'tag-morph','빈칸 문맥 완성':'tag-ctx'};
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc=typeTag[q.type]||'';h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body">`;if(q.passage)h+=`<div class="q-passage">${q.passage}</div>`;h+=`<div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){const mk=q.ch.length===5?'①②③④⑤':'①②③④';h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${mk[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:EI.totalQ},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('answered',S.ans[i]!==null));}
function scrollToQ(i){if(i<0||i>=EI.totalQ)return;S.cur=i;document.getElementById('qc-'+i).scrollIntoView({behavior:'smooth',block:'center'});}
function sel(qi,ci){document.querySelectorAll('.choice-btn[data-q="'+qi+'"]').forEach(b=>b.classList.remove('selected'));document.querySelector('.choice-btn[data-q="'+qi+'"][data-c="'+ci+'"]').classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById('w-'+qi).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase();if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase());if(!ok&&q.wa)ok=u===q.wa.toLowerCase();}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok});});return{score,correct,wrong,unanswered,details};}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100);const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={total:0,ok:0};typeMap[t].total++;if(d.ok)typeMap[t].ok++;});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.ok===v.total).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.ok<v.total).map(([k])=>k);let h='';
h+=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/${EI.total}</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong></span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교 / 학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 / ${EI.total}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간 / 통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.ok/d.total*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type.replace(/\(.+?\)/g,'').trim().slice(0,6)}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});
if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t.slice(0,8)}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t.slice(0,8)}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽!</h4><p>다른 단원도 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>틀린 유형 집중 복습으로 만점까지!</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기부터!</h4><p>지문 해석을 완벽히 이해한 뒤 재도전!</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="copyResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유하기</span></button><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);margin-left:8px">클릭하여 펼치기</span></div>`;r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const mk=d.q.ch&&d.q.ch.length===5?'①②③④⑤':'①②③④';const ua=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const ca=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;const open=!d.ok;h+=`<div class="rev-card"><div class="rev-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.rev-icon').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><span style="font-weight:800">${icon} ${d.q.id}번</span><span style="font-size:12px;color:var(--tm)">[${d.q.type.slice(0,6)}] ${d.q.pts}점</span><span class="rev-icon">▼</span></div><div class="rev-body${open?' open':''}"><div style="display:flex;gap:10px;margin-bottom:14px"><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;${d.ok?'background:var(--gl);color:var(--g)':'background:var(--rl);color:var(--r)'}"><div style="font-size:11px;opacity:.7">내 답</div>${ua}</div><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;background:var(--gl);color:var(--g)"><div style="font-size:11px;opacity:.7">정답</div>${ca}</div></div><div class="expl-tag ans">🇰🇷 해석</div><div class="expl-box ans-b">${d.q.det.korean}</div><div class="expl-tag tip">📋 분석</div><div class="expl-box">${d.q.det.analysis}</div><div class="expl-tag tip">💡 팁</div><div class="expl-box tip-b">${d.q.det.tip}</div></div></div>`;});h+=`</div></div>`;document.getElementById('resultScreen').innerHTML=h;}
function copyResult(){const r=grade(),lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100),nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,elapsed=Math.floor((Date.now()-S.start)/1000),pass=r.score>=80;const mk5='①②③④⑤',mk4='①②③④';const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,w:[]};typeMap[t].t++;if(d.ok)typeMap[t].o++;else typeMap[t].w.push(d.q.id);});
let txt=`📝 온라인단어 TEST 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🏆 점수: ${r.score} / ${EI.total}점 (${pct}%)\n${lv.icon} 레벨: ${lv.name}\n${pass?'🎉 통과!':'📚 미통과'}\n\n✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n⏱️ 소요시간: ${fmtTime(elapsed)}\n\n━━ 📊 문항별 결과 ━━\n`;
r.details.forEach(d=>{const mark=d.ok?'✅':'❌';const mk=d.q.ch&&d.q.ch.length===5?mk5:mk4;const ans=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const cor=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;txt+=`${mark} ${d.q.id}번 [${d.q.type.slice(0,6)}] ${d.q.pts}점 — 내답:${ans} 정답:${cor}\n`;});
txt+=`\n━━ 📈 유형별 분석 ━━\n`;Object.entries(typeMap).forEach(([t,v])=>{const p=Math.round(v.o/v.t*100);const ic=p===100?'🟢':(p>0?'🟡':'🔴');txt+=`${ic} ${t.slice(0,6)}: ${v.o}/${v.t} (${p}%)`;if(v.w.length)txt+=` ← 틀린:${v.w.join(',')}번`;txt+=`\n`;});
txt+=`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n#온라인단어TEST #영어내신`;
navigator.clipboard.writeText(txt).then(()=>toast('📋 상세 결과가 복사되었습니다!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('📋 복사되었습니다!');}catch(e){toast('복사 실패');}document.body.removeChild(ta);});}
function retake(){startExam();}
function goHome(){showScreen('startScreen');updateHCount();}
window.addEventListener('beforeunload',e=>{if(S.ti){e.preventDefault();e.returnValue='';}});

</script>
</body>
</html>
