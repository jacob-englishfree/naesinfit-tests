const Q=[
{id:1, type:'어법', diff:'보통', pts:5, fmt:'mc', note:'청소년 분노의 원인',
 passage:`다음 글의 밑줄 친 ⓐ~ⓔ 중, 어법상 <u>어색한 것</u>을 고르시오.<br><br>As a teen, you may feel like an adult, but your brain is still growing. In your brain, there is a part ⓐ<u>that</u> is responsible for solving problems and controlling your emotions. In your teen years, this part is still in development. The changes in your brain lead you toward independence, social engagement, and creativity. At the same time, however, you may feel ⓑ<u>confusing</u> about who you are. You may also be more sensitive to unfairness. Furthermore, your body is ⓒ<u>flowing</u> with hormones. This ⓓ<u>significantly</u> affects your mood. The combination of these factors ⓔ<u>intensifies</u> your strong emotions.`,
 stem:'위 글의 밑줄 친 ⓐ~ⓔ 중, 어법상 어색한 것은?',
 ch:['ⓐ','ⓑ','ⓒ','ⓓ','ⓔ'], ans:1,
 det:{ref:'[원문] you may feel <b>confusing</b> about who you are → [해석] 당신은 자신이 누구인지에 대해 혼란스러워할 수 있다.',
  correct:'[풀이] feel은 2형식 감각동사로 주어의 상태를 나타내는 보어가 필요하다. 주어 you(사람)가 "혼란을 느끼는" 상태이므로, 감정을 나타내는 과거분사 <b>confused</b>가 적절하다. confusing은 "혼란을 주는"이라는 능동의 의미로 사물 주어에 쓰인다.',
  wrongs:['ⓐ that: 주격 관계대명사로 a part를 선행사로 받아 주어 역할을 하므로 적절','ⓒ flowing: 현재분사로 "~로 넘치고 있다"의 진행 의미. be flowing with는 적절한 표현','ⓓ significantly: 동사 affects를 수식하는 부사로 적절','ⓔ intensifies: 주어 The combination(단수)에 호응하는 3인칭 단수 동사로 적절'],
  tip:'[핵심] 감정 분사 구별: -ed(감정을 느끼는 주체=사람), -ing(감정을 일으키는 대상=사물). feel confused(혼란을 느끼다) vs feel confusing(×)'
}},

{id:2, type:'어법', diff:'어려움', pts:6, fmt:'mc', note:'분노 관리법',
 passage:`다음 글의 (A), (B), (C)에서 어법에 맞는 표현을 골라 바르게 짝지은 것을 고르시오.<br><br>It is natural to feel angry from time to time; it doesn't mean there is something wrong with you. Anger can sometimes be a useful tool. For example, an angry but open conversation can resolve a conflict between friends. The important thing is (A) <u>[managing / to manage]</u> your anger so that it does not turn into aggressive or violent behavior. This does not mean that you should stop yourself from (B) <u>[feeling / to feel]</u> angry. Rather, you should express it in a productive way. Ask yourself some questions about your angry feelings. This can help you (C) <u>[to understand / understanding]</u> your anger better.`,
 stem:'(A), (B), (C)의 괄호 안에서 어법에 맞는 표현으로 가장 적절한 것은?',
 ch:['managing - feeling - to understand','managing - to feel - understanding','to manage - feeling - to understand','to manage - to feel - understanding','to manage - feeling - understanding'], ans:2,
 det:{ref:'[원문] The important thing is <b>to manage</b> your anger / stop yourself from <b>feeling</b> angry / help you <b>to understand</b> your anger<br>[해석] 중요한 것은 분노를 관리하는 것이다 / 화를 느끼는 것을 멈춰야 한다는 뜻이 아니다 / 분노를 더 잘 이해하는 데 도움이 될 수 있다',
  correct:'[풀이] (A) "The important thing is to manage"에서 주어 The important thing에 대한 보어로 to부정사(명사적 용법)가 적절. (B) "stop oneself from ~ing" 구문에서 전치사 from의 목적어로 동명사 feeling이 적절. (C) "help + 목적어 + (to) 동사원형" 구문에서 to understand가 적절.',
  wrongs:['① managing은 동명사 보어로 문법적으로 가능하나, "The important thing is to V" 구문이 원문','② to feel은 전치사 from 뒤에 올 수 없음. 전치사 뒤에는 동명사만 가능','④ to feel은 from 뒤에 불가','⑤ understanding은 help의 목적격 보어로 부적절. help+O+to V/V 구문'],
  tip:'[핵심] stop A from -ing(A가 ~하는 것을 막다), help+O+(to) V(O가 ~하도록 돕다), The important thing is to V(중요한 것은 ~하는 것이다)'
}},

{id:3, type:'어법', diff:'어려움', pts:6, fmt:'mc', note:'대처 전략',
 passage:`다음 글의 밑줄 친 ⓐ~ⓓ 중, 어법상 <u>어색한 것</u>을 고르시오.<br><br>In some cases, the strategies ⓐ<u>mentioned</u> above may not be enough, so you may need to find proper coping skills for your personal situation. Without the right coping skills, you may find yourself ⓑ<u>becoming</u> verbally or even physically aggressive. Explore various strategies to discover ⓒ<u>that</u> is best for you, such as taking a walk, drawing a picture, or writing down things that come to your mind. You can also try to find possible solutions to a problem and then compare the advantages and disadvantages of ⓓ<u>each one</u>.`,
 stem:'위 글의 밑줄 친 ⓐ~ⓓ 중, 어법상 어색한 것은?',
 ch:['ⓐ','ⓑ','ⓒ','ⓓ'], ans:2,
 det:{ref:'[원문] Explore various strategies to discover <b>that</b> is best for you → [해석] 다양한 전략을 탐색하여 당신에게 가장 좋은 것을 발견하라.',
  correct:'[풀이] discover의 목적어이면서 동시에 is의 주어 역할을 해야 하므로, 선행사를 포함하는 관계대명사 <b>what</b>이 적절하다. that은 접속사로 쓰이면 주어가 없는 불완전한 절을 이끌 수 없고, 지시대명사로는 discover의 목적어+is의 주어 기능을 동시에 할 수 없다.',
  wrongs:['ⓐ mentioned: 과거분사로 strategies를 뒤에서 수식. "위에서 언급된 전략들"로 적절','ⓑ becoming: find+O+~ing(O가 ~하는 것을 발견하다) 구문에서 현재분사 보어로 적절','ⓓ each one: "각각"이라는 의미의 대명사로 of 뒤에서 적절하게 사용됨'],
  tip:'[핵심] what vs that 구별: what = the thing which(선행사 포함, 불완전한 절), that = 접속사(완전한 절) 또는 지시대명사. discover 뒤에 주어가 빠진 불완전한 절이므로 what이 정답.'
}},

{id:4, type:'어휘', diff:'보통', pts:5, fmt:'mc', note:'분노의 신체적 징후',
 passage:`다음 글의 (A), (B), (C)에서 문맥에 맞는 낱말로 가장 적절한 것을 고르시오.<br><br>You need to learn how to deal with anger in a socially (A) <u>[appropriate / approximate]</u> way. Remember: anger is a feeling, but behavior is a choice. The first step is recognizing the physical signs of anger. It is possible to recognize those signs in (B) <u>[advance / advantage]</u>. They include an increased heart rate, a flushed face, and the clenching of your fists. When these things happen, take action to (C) <u>[reduce / reproduce]</u> your anger.`,
 stem:'(A), (B), (C)의 괄호 안에서 문맥에 맞는 낱말로 가장 적절한 것은?',
 ch:['appropriate - advance - reduce','appropriate - advantage - reproduce','approximate - advance - reproduce','approximate - advantage - reduce','appropriate - advance - reproduce'], ans:0,
 det:{ref:'[원문] in a socially <b>appropriate</b> way / recognize those signs in <b>advance</b> / take action to <b>reduce</b> your anger<br>[해석] 사회적으로 적절한 방법으로 / 그 징후를 미리 인식하다 / 분노를 줄이기 위한 조치를 취하다',
  correct:'[풀이] (A) appropriate(적절한): 분노를 사회적으로 "적절한" 방법으로 다루라는 맥락. (B) advance: in advance(미리, 사전에) 숙어표현. (C) reduce(줄이다): 분노를 "줄이기" 위한 조치를 취하라는 맥락.',
  wrongs:['approximate(대략적인)는 "적절한"의 의미와 무관','advantage(이점)는 in advantage라는 표현이 없음. in advance가 올바른 숙어','reproduce(재생산하다)는 분노를 "줄이다"의 맥락과 반대'],
  tip:'[핵심] in advance = 미리, 사전에 (숙어). appropriate(적절한) vs approximate(대략적인) 혼동 주의. reduce(줄이다) vs reproduce(재생산하다) 구별.'
}},

{id:5, type:'어휘', diff:'어려움', pts:6, fmt:'mc', note:'청소년 분노 원인',
 passage:`다음 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 <u>적절하지 않은 것</u>을 고르시오.<br><br>Do you ever find yourself suddenly feeling angry? One moment you're fine, and the next moment you're slamming doors or rolling your eyes at your parents. Some people may think you just have a bad attitude or are getting too upset about a small problem. However, these feelings don't ①<u>simply</u> come from stress about everyday life. As a teen, you may feel like an adult, but your brain is still growing. In your brain, there is a part that is responsible for solving problems and controlling your emotions. In your teen years, this part is still in development. The changes in your brain lead you toward independence, social engagement, and creativity. At the same time, however, you may feel confused about who you are. You may also be more ②<u>sensitive</u> to unfairness. Furthermore, your body is flowing with hormones. This significantly affects your mood. The ③<u>combination</u> of these factors ④<u>eases</u> your strong emotions.`,
 stem:'위 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 적절하지 않은 것은?',
 ch:['①','②','③','④','⑤ (없음 — 모두 적절)'], ans:3,
 det:{ref:'[원문] The combination of these factors <b>intensifies</b> your strong emotions. → [해석] 이러한 요인들의 조합이 당신의 강한 감정을 <b>강화시킨다</b>.',
  correct:'[풀이] 원문에서는 "intensifies(강화시키다)"를 사용하여 여러 요인이 합쳐져 강한 감정을 더 강하게 만든다는 의미이다. ④에서 eases(완화시키다)는 원문의 의미와 정반대이므로 적절하지 않다.',
  wrongs:['① simply(단순히): 이 감정들이 일상 스트레스에서 단순히 오는 것이 아니라는 부정의 맥락에서 적절','② sensitive(민감한): 불공정함에 더 민감해질 수 있다는 맥락에서 적절','③ combination(조합, 결합): 여러 요인의 결합이라는 맥락에서 적절'],
  tip:'[핵심] intensify(강화하다) ↔ ease(완화하다)는 반의어 관계. 내신에서는 원문의 핵심 동사를 반의어로 바꿔 출제하는 패턴이 빈출.'
}},

{id:6, type:'어휘', diff:'보통', pts:5, fmt:'mc', note:'분노 대처법',
 passage:`다음 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 <u>적절하지 않은 것</u>을 고르시오.<br><br>It is ①<u>natural</u> to feel angry from time to time; it doesn't mean there is something wrong with you. Anger can sometimes be a ②<u>useful</u> tool. For example, an angry but open conversation can ③<u>resolve</u> a conflict between friends. The important thing is to manage your anger so that it does not turn into ④<u>aggressive</u> or violent behavior. This does not mean that you should stop yourself from feeling angry. Rather, you should express it in a ⑤<u>destructive</u> way.`,
 stem:'위 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 적절하지 않은 것은?',
 ch:['①','②','③','④','⑤'], ans:4,
 det:{ref:'[원문] you should express it in a <b>productive</b> way → [해석] 당신은 그것을 <b>생산적인</b> 방법으로 표현해야 한다.',
  correct:'[풀이] 원문에서는 "productive(생산적인)"를 사용하여 분노를 건설적으로 표현하라는 의미이다. ⑤의 destructive(파괴적인)는 원문의 productive와 반대 의미이므로 적절하지 않다.',
  wrongs:['① natural(자연스러운): 화를 느끼는 것이 자연스럽다는 맥락에서 적절','② useful(유용한): 분노가 때때로 유용한 도구가 될 수 있다는 맥락에서 적절','③ resolve(해결하다): 갈등을 해결할 수 있다는 맥락에서 적절','④ aggressive(공격적인): 공격적이거나 폭력적인 행동으로 변하지 않도록이라는 맥락에서 적절'],
  tip:'[핵심] productive(생산적인) ↔ destructive(파괴적인) 반의어. in a productive way는 "건설적인 방식으로"라는 핵심 표현.'
}},

{id:7, type:'대의', diff:'보통', pts:5, fmt:'mc', note:'주제',
 passage:`다음 글의 주제로 가장 적절한 것을 고르시오.<br><br>Do you ever find yourself suddenly feeling angry? One moment you're fine, and the next moment you're slamming doors or rolling your eyes at your parents. Some people may think you just have a bad attitude or are getting too upset about a small problem. However, these feelings don't simply come from stress about everyday life. As a teen, you may feel like an adult, but your brain is still growing. In your brain, there is a part that is responsible for solving problems and controlling your emotions. In your teen years, this part is still in development. The changes in your brain lead you toward independence, social engagement, and creativity. At the same time, however, you may feel confused about who you are. You may also be more sensitive to unfairness. Furthermore, your body is flowing with hormones. This significantly affects your mood.`,
 stem:'위 글의 주제로 가장 적절한 것은?',
 ch:['청소년기 분노 감정의 생물학적 원인','부모와 자녀 간의 갈등 해결 방안','호르몬이 학업 성취에 미치는 영향','뇌 발달이 창의성에 미치는 긍정적 효과','청소년기 스트레스 관리를 위한 운동법'], ans:0,
 det:{ref:'[원문] your brain is still growing / this part is still in development / your body is flowing with hormones / This significantly affects your mood<br>[해석] 뇌가 여전히 성장 중이다 / 이 부분은 아직 발달 중이다 / 호르몬이 넘친다 / 이것이 기분에 상당한 영향을 미친다',
  correct:'[풀이] 글 전체가 청소년의 갑작스러운 분노가 단순한 스트레스가 아닌 뇌 발달과 호르몬 등 생물학적 요인에서 비롯됨을 설명하고 있다.',
  wrongs:['② 부모와의 갈등 해결 방안은 언급되지 않음','③ 호르몬과 학업 성취의 관계는 다루지 않음','④ 창의성에 대한 긍정적 효과는 부분적 언급일 뿐 주제가 아님','⑤ 운동법은 전혀 언급되지 않음'],
  tip:'[핵심] 주제 문제는 글 전체를 관통하는 핵심 내용을 찾아야 한다. 부분적 정보(창의성 등)에 혼동되지 않도록 주의.'
}},

{id:8, type:'대의', diff:'보통', pts:5, fmt:'mc', note:'제목',
 passage:`다음 글의 제목으로 가장 적절한 것을 고르시오.<br><br>It is natural to feel angry from time to time; it doesn't mean there is something wrong with you. Anger can sometimes be a useful tool. The important thing is to manage your anger so that it does not turn into aggressive or violent behavior. This does not mean that you should stop yourself from feeling angry. Rather, you should express it in a productive way. In some cases, the strategies mentioned above may not be enough, so you may need to find proper coping skills for your personal situation. By developing problem-solving skills, you will learn that there are many ways to solve a problem without getting angry. Anger is an emotion that we all experience. By managing your anger properly, you can be the boss of your feelings, not the other way around.`,
 stem:'위 글의 제목으로 가장 적절한 것은?',
 ch:['Be the Boss of Your Anger','Why Anger Is Always Harmful','How to Avoid All Negative Emotions','The Science Behind Teenage Brain Development','Stop Being Angry: A Complete Guide'], ans:0,
 det:{ref:'[원문] By managing your anger properly, you can be <b>the boss of your feelings</b>, not the other way around.<br>[해석] 분노를 적절히 관리함으로써, 감정의 주인이 될 수 있다.',
  correct:'[풀이] 글의 핵심 메시지는 분노를 없애는 것이 아니라 적절히 관리하여 감정의 주인이 되라는 것이다. "Be the Boss of Your Anger"가 이를 가장 잘 요약한다.',
  wrongs:['② 분노가 항상 해롭다고 하지 않음. 오히려 유용한 도구가 될 수 있다고 함','③ 모든 부정적 감정을 피하라는 내용이 아님','④ 뇌 발달 과학은 이 부분의 주된 내용이 아님','⑤ 화를 완전히 그만두라는 것이 아님. 느끼는 것을 멈추지 말라고 함'],
  tip:'[핵심] 제목 문제는 글의 핵심 키워드(manage, boss of feelings)를 포착하여 함축적으로 표현한 선지를 찾는다.'
}},

{id:9, type:'대의', diff:'어려움', pts:6, fmt:'mc', note:'시사점',
 passage:`다음 글의 시사점으로 가장 적절한 것을 고르시오.<br><br>You need to learn how to deal with anger in a socially appropriate way. Remember: anger is a feeling, but behavior is a choice. The first step is recognizing the physical signs of anger. It is possible to recognize those signs in advance. They include an increased heart rate, a flushed face, and the clenching of your fists. When these things happen, take action to reduce your anger. For example, you could try taking a break to organize your thoughts or ending a conversation before it gets too intense. In some cases, the strategies mentioned above may not be enough, so you may need to find proper coping skills for your personal situation. Explore various strategies to discover what is best for you.`,
 stem:'위 글이 시사하는 바로 가장 적절한 것은?',
 ch:['분노를 느끼는 것 자체를 억제하는 것이 최선의 방법이다.','분노의 신체적 징후를 사전에 인지하고 개인에 맞는 대처 전략을 능동적으로 찾아야 한다.','분노 조절은 전문가의 도움 없이는 불가능하다.','모든 사람에게 동일한 분노 대처법이 효과적이다.','대화를 완전히 중단하는 것이 분노 해소의 유일한 방법이다.'], ans:1,
 det:{ref:'[원문] recognizing the physical signs of anger / recognize those signs in advance / find proper coping skills for your personal situation / Explore various strategies to discover what is best for you<br>[해석] 분노의 신체적 징후를 인식하다 / 사전에 인식하다 / 개인 상황에 맞는 대처 기술을 찾다 / 다양한 전략을 탐색하다',
  correct:'[풀이] 글은 ①분노의 신체적 징후를 사전에 인지하고 ②개인 상황에 맞는 다양한 대처 전략을 능동적으로 탐색하라는 두 가지 핵심 메시지를 전달한다.',
  wrongs:['① 분노를 느끼는 것 자체를 억제하라는 내용이 아님. 오히려 feeling과 behavior를 구분함','③ 전문가 도움이 필수라는 내용 없음','④ "for your personal situation"이므로 개인별 차이를 강조함','⑤ 대화 중단은 하나의 예시일 뿐 유일한 방법이 아님'],
  tip:'[핵심] 시사점 문제는 글의 핵심 주장을 종합적으로 파악해야 한다. "anger is a feeling, but behavior is a choice"가 핵심 메시지.'
}},

{id:10, type:'일치', diff:'쉬움', pts:3, fmt:'mc', note:'일치하는 것',
 passage:`다음 글의 내용과 <u>일치하는 것</u>을 고르시오.<br><br>Do you ever find yourself suddenly feeling angry? One moment you're fine, and the next moment you're slamming doors or rolling your eyes at your parents. Some people may think you just have a bad attitude or are getting too upset about a small problem. However, these feelings don't simply come from stress about everyday life. As a teen, you may feel like an adult, but your brain is still growing. In your brain, there is a part that is responsible for solving problems and controlling your emotions. In your teen years, this part is still in development.`,
 stem:'위 글의 내용과 일치하는 것은?',
 ch:['청소년의 갑작스러운 분노는 단순히 일상 스트레스에서만 비롯된다.','십대의 뇌에서 문제 해결과 감정 조절을 담당하는 부분은 이미 완성되었다.','일부 사람들은 청소년이 사소한 문제에 너무 화를 낸다고 생각할 수 있다.','청소년은 자신이 어른처럼 느껴지지 않는다.','뇌의 변화는 청소년의 감정에 영향을 미치지 않는다.'], ans:2,
 det:{ref:'[원문] Some people may think you just have a bad attitude or are getting too upset about a <b>small problem</b>.<br>[해석] 어떤 사람들은 당신이 나쁜 태도를 가졌거나 <b>사소한 문제</b>에 너무 화를 낸다고 생각할 수 있다.',
  correct:'[풀이] ③ "일부 사람들은 청소년이 사소한 문제에 너무 화를 낸다고 생각할 수 있다"는 원문과 정확히 일치한다.',
  wrongs:['① 원문에서는 "don\'t simply come from stress"라고 하여 단순히 스트레스에서만 오는 것이 아니라고 함','② 원문에서 "this part is still in development(아직 발달 중)"이므로 완성되지 않았음','④ 원문에서 "you may feel like an adult(어른처럼 느낄 수 있다)"이므로 반대','⑤ 뇌의 변화가 감정에 영향을 미친다는 것이 글의 핵심'],
  tip:'[핵심] 일치 문제는 원문의 표현을 정확히 비교해야 한다. 부정어(don\'t, not)와 시제(still in development)에 주의.'
}},

{id:11, type:'불일치', diff:'보통', pts:5, fmt:'mc', note:'불일치하는 것',
 passage:`다음 글의 내용과 <u>일치하지 않는 것</u>을 고르시오.<br><br>The changes in your brain lead you toward independence, social engagement, and creativity. At the same time, however, you may feel confused about who you are. You may also be more sensitive to unfairness. Furthermore, your body is flowing with hormones. This significantly affects your mood. The combination of these factors intensifies your strong emotions. It is natural to feel angry from time to time; it doesn't mean there is something wrong with you. Anger can sometimes be a useful tool. For example, an angry but open conversation can resolve a conflict between friends.`,
 stem:'위 글의 내용과 일치하지 않는 것은?',
 ch:['뇌의 변화는 독립심, 사회적 참여, 창의성으로 이끈다.','청소년은 자신이 누구인지 혼란을 느낄 수 있다.','호르몬은 기분에 상당한 영향을 미친다.','분노는 항상 해로우므로 절대 느끼면 안 된다.','화가 나지만 열린 대화는 친구 간 갈등을 해결할 수 있다.'], ans:3,
 det:{ref:'[원문] It is <b>natural</b> to feel angry from time to time / Anger can sometimes be a <b>useful tool</b>.<br>[해석] 때때로 화를 느끼는 것은 자연스러운 것이다 / 분노는 때때로 유용한 도구가 될 수 있다.',
  correct:'[풀이] ④ "분노는 항상 해로우므로 절대 느끼면 안 된다"는 원문 내용과 반대. 원문에서는 분노를 느끼는 것이 자연스럽고, 때로는 유용한 도구가 될 수 있다고 함.',
  wrongs:['① lead you toward independence, social engagement, and creativity와 일치','② you may feel confused about who you are와 일치','③ This significantly affects your mood와 일치','⑤ an angry but open conversation can resolve a conflict와 일치'],
  tip:'[핵심] 불일치 문제에서 "항상", "절대", "모든" 같은 극단적 표현이 포함된 선지는 오답일 가능성이 높다.'
}},

{id:12, type:'빈칸', diff:'어려움', pts:6, fmt:'mc', note:'빈칸(구)',
 passage:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.<br><br>You need to learn how to deal with anger in a socially appropriate way. Remember: anger is a feeling, but behavior is a choice. The first step is recognizing the physical signs of anger. It is possible to recognize those signs in advance. They include an increased heart rate, a flushed face, and the clenching of your fists. When these things happen, take action to reduce your anger. For example, you could try taking a break to organize your thoughts or ending a conversation before it gets too intense. By learning to identify these warning signals, you can ______________________ before it controls you.`,
 stem:'위 글의 빈칸에 들어갈 말로 가장 적절한 것은?',
 ch:['avoid feeling any emotions at all','take control of your anger','increase your heart rate intentionally','ignore the physical signs of stress','stop having conversations with others'], ans:1,
 det:{ref:'[원문] take action to <b>reduce</b> your anger / you can be the <b>boss of your feelings</b><br>[해석] 분노를 줄이기 위한 조치를 취하다 / 감정의 주인이 될 수 있다',
  correct:'[풀이] 글의 흐름: 분노의 신체적 징후를 인식 → 사전에 조치 → 분노를 통제. "before it controls you"와 대비되는 표현으로 "take control of your anger(분노를 통제하다)"가 적절.',
  wrongs:['① 모든 감정을 느끼지 않는 것은 글의 메시지와 반대','③ 심박수를 의도적으로 높이는 것은 분노 감소와 반대','④ 신체적 징후를 무시하라는 것은 글의 핵심(인식하라)과 반대','⑤ 대화를 완전히 중단하라는 것은 글의 의도가 아님'],
  tip:'[핵심] 빈칸 문제는 앞뒤 맥락의 논리적 흐름을 파악한다. "before it controls you"와 대조되는 "take control"이 핵심 단서.'
}},

{id:13, type:'빈칸', diff:'어려움', pts:6, fmt:'mc', note:'빈칸(문장)',
 passage:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.<br><br>In some cases, the strategies mentioned above may not be enough, so you may need to find proper coping skills for your personal situation. Without the right coping skills, you may find yourself becoming verbally or even physically aggressive. Explore various strategies to discover what is best for you, such as taking a walk, drawing a picture, or writing down things that come to your mind. You can also try to find possible solutions to a problem and then compare the advantages and disadvantages of each one. ________________________________________.`,
 stem:'위 글의 빈칸에 들어갈 말로 가장 적절한 것은?',
 ch:['By developing problem-solving skills, you will learn that there are many ways to solve a problem without getting angry','However, it is impossible to control your anger once it starts','The only effective strategy is to completely avoid situations that make you angry','Professional help is always required to manage adolescent anger','Physical exercise is the most important coping skill for everyone'], ans:0,
 det:{ref:'[원문] By developing <b>problem-solving skills</b>, you will learn that there are <b>many ways to solve a problem</b> without getting angry.<br>[해석] 문제 해결 능력을 개발함으로써, 화를 내지 않고도 문제를 해결할 수 있는 많은 방법이 있다는 것을 배우게 될 것이다.',
  correct:'[풀이] 앞 문장에서 "가능한 해결책을 찾고 장단점을 비교"하라고 했으므로, 이어지는 결론으로 "문제 해결 능력을 개발하면 다양한 방법을 배우게 된다"가 논리적으로 적절.',
  wrongs:['② "불가능하다"는 글의 전체 톤(관리할 수 있다)과 반대','③ "완전히 피하라"는 극단적 표현으로 글의 메시지와 불일치','④ "항상 전문가 도움이 필요"는 글에서 언급하지 않음','⑤ "모든 사람에게 가장 중요"은 개인별 차이를 강조하는 글과 불일치'],
  tip:'[핵심] 빈칸(문장) 문제는 앞 문장과의 논리적 연결(원인-결과, 구체-일반)을 파악한다. 여기서는 "solutions → problem-solving skills"로 이어지는 일반화.'
}},

{id:14, type:'함축', diff:'보통', pts:5, fmt:'mc', note:'함축의미',
 passage:`다음 글의 밑줄 친 "you can be the boss of your feelings, not the other way around"가 의미하는 바로 가장 적절한 것을 고르시오.<br><br>Anger is an emotion that we all experience. By managing your anger properly, <u>you can be the boss of your feelings, not the other way around</u>. This is an important step in finding your true self and taking control of your life.`,
 stem:'위 글의 밑줄 친 부분이 의미하는 바로 가장 적절한 것은?',
 ch:['감정을 완전히 제거하면 진정한 자아를 찾을 수 있다.','분노를 적절히 관리하면 감정에 지배당하지 않고 감정을 주도할 수 있다.','다른 사람의 감정까지 통제할 수 있게 된다.','보스처럼 행동하면 분노를 느끼지 않게 된다.','감정을 표현하는 것이 항상 나쁜 것이다.'], ans:1,
 det:{ref:'[원문] you can be <b>the boss</b> of your feelings, <b>not the other way around</b><br>[해석] 감정의 <b>주인</b>이 될 수 있다, <b>반대가 아니라</b> (= 감정이 당신의 주인이 되는 것이 아니라)',
  correct:'[풀이] "the boss of your feelings"는 감정을 주도적으로 관리한다는 뜻이고, "not the other way around"는 감정에 의해 지배당하는 것의 반대를 의미한다. 즉, 분노를 잘 관리하면 감정의 주인이 될 수 있다는 뜻.',
  wrongs:['① 감정을 제거하라는 것이 아니라 관리하라는 것','③ 다른 사람의 감정 통제는 언급되지 않음','④ 보스처럼 행동하라는 비유가 아니라 감정의 주인이 되라는 비유','⑤ 감정 표현 자체가 나쁘다고 하지 않음'],
  tip:'[핵심] "not the other way around" = "그 반대가 아니라". A is the boss of B, not the other way around = A가 B를 통제한다, B가 A를 통제하는 것이 아니라.'
}},

{id:15, type:'순서', diff:'보통', pts:5, fmt:'mc', note:'순서배열',
 passage:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것을 고르시오.<br><br><b>[주어진 글]</b><br>You need to learn how to deal with anger in a socially appropriate way. Remember: anger is a feeling, but behavior is a choice.<br><br>(A) When these things happen, take action to reduce your anger. For example, you could try taking a break to organize your thoughts or ending a conversation before it gets too intense.<br><br>(B) The first step is recognizing the physical signs of anger. It is possible to recognize those signs in advance.<br><br>(C) They include an increased heart rate, a flushed face, and the clenching of your fists.`,
 stem:'주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?',
 ch:['(A) - (B) - (C)','(A) - (C) - (B)','(B) - (C) - (A)','(C) - (A) - (B)','(C) - (B) - (A)'], ans:2,
 det:{ref:'[원문] The first step → recognize those signs in advance → They include → When these things happen → take action<br>[해석] 첫 번째 단계 → 징후를 미리 인식 → 그것들은 포함한다 → 이런 일이 일어나면 → 조치를 취하다',
  correct:'[풀이] (B) "The first step"으로 시작하여 분노의 신체적 징후 인식을 언급 → (C) "They"가 (B)의 "physical signs"를 받아 구체적 징후 나열 → (A) "When these things happen"이 (C)의 징후들을 받아 대처법 제시. B→C→A가 논리적 순서.',
  wrongs:['① (A)의 "these things"가 앞에 언급된 징후 없이 등장할 수 없음','② (C)의 "They"가 가리킬 대상이 (A)에 없음','④ (C)의 "They"가 가리킬 대상이 주어진 글에 없음','⑤ 같은 이유로 부적절'],
  tip:'[핵심] 순서 배열의 핵심 단서: ① 지시어(They, these things) → 선행 명사 확인, ② 논리적 흐름(인식→구체화→조치), ③ 접속사와 연결어.'
}},

{id:16, type:'무관', diff:'쉬움', pts:3, fmt:'mc', note:'무관문장',
 passage:`다음 글에서 전체 흐름과 <u>관계없는 문장</u>을 고르시오.<br><br>It is natural to feel angry from time to time; it doesn't mean there is something wrong with you. ① Anger can sometimes be a useful tool. ② For example, an angry but open conversation can resolve a conflict between friends. ③ Regular physical exercise has been shown to improve academic performance in high school students. ④ The important thing is to manage your anger so that it does not turn into aggressive or violent behavior. ⑤ This does not mean that you should stop yourself from feeling angry.`,
 stem:'위 글에서 전체 흐름과 관계없는 문장은?',
 ch:['①','②','③','④','⑤'], ans:2,
 det:{ref:'[원문] ③ Regular physical exercise has been shown to improve academic performance in high school students.<br>[해석] 규칙적인 신체 운동이 고등학생의 학업 성취를 향상시키는 것으로 나타났다.',
  correct:'[풀이] 글의 흐름: 분노가 자연스럽다 → 유용한 도구 → 갈등 해결 예시 → [무관: 운동과 학업 성취] → 분노 관리의 중요성 → 감정 억제와 구별. ③은 분노 관리와 전혀 관련 없는 운동-학업 주제.',
  wrongs:['① 분노가 유용한 도구가 될 수 있다 → 글의 흐름에 적합','② 화가 난 대화로 갈등 해결 → ①의 구체적 예시로 적합','④ 분노 관리의 중요성 → 글의 핵심 주제로 적합','⑤ 감정 억제가 아니라는 보충 설명 → 흐름에 적합'],
  tip:'[핵심] 무관 문장 문제는 각 문장의 소재(키워드)를 글의 주제와 비교한다. 분노 관리가 주제인데 "운동+학업 성취"는 완전히 다른 소재.'
}},

{id:17, type:'TF', diff:'쉬움', pts:3, fmt:'mc', note:'내용 True/False',
 passage:`다음 글의 내용을 읽고 아래 설명이 맞으면 T, 틀리면 F를 고르시오.<br><br>As a teen, you may feel like an adult, but your brain is still growing. In your brain, there is a part that is responsible for solving problems and controlling your emotions. In your teen years, this part is still in development. The changes in your brain lead you toward independence, social engagement, and creativity. At the same time, however, you may feel confused about who you are.<br><br><b>설명: 십대의 뇌에서 문제 해결과 감정 조절을 담당하는 부분은 아직 발달 중이다.</b>`,
 stem:'위 설명이 글의 내용과 일치하면 T, 일치하지 않으면 F를 고르시오.',
 ch:['T','F'], ans:0,
 det:{ref:'[원문] In your brain, there is a part that is responsible for solving problems and controlling your emotions. In your teen years, <b>this part is still in development</b>.<br>[해석] 십대 시절에 이 부분은 <b>아직 발달 중이다</b>.',
  correct:'[풀이] 원문에서 "this part is still in development"라고 명시되어 있으므로, 설명은 글의 내용과 일치한다. 따라서 T가 정답.',
  wrongs:['F: 원문에 "still in development"라고 명확히 나와 있으므로 설명은 일치함'],
  tip:'[핵심] TF 문제에서는 원문의 핵심 표현("still in development")을 정확히 확인해야 한다.'
}},

{id:18, type:'서술형', diff:'보통', pts:5, fmt:'written', note:'요약 서술형',

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}

function getLevel(s){const p=s;if(p>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(p>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(p>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(p>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(p>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}

function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}

h+=`<div class="rs"><div class="rs-title">📋 시험 기록</div>`;const hist=getHistory();if(!hist.length)h+=`<p style="color:var(--tl)">기록 없음</p>`;else h+=hist.slice(-10).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date}·${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);}
function copyDetailedResult(){const nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);let txt=`━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🎯 내신핏 온라인퀴즈 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} ${EI.pub} ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n\n📊 점수: ${r.score}/100 (${r.score}%)\n✅ 정답 ${r.correct}/${QCOUNT} | ❌ 오답 ${r.wrong} | ⬜ 미응답 ${r.unanswered}\n🏅 레벨: ${lv.icon} ${lv.name}\n${r.score>=80?'🎉 통과!':'📚 미통과'}\n\n━━ 문항별 결과 ━━\n`;r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const at=d.q.fmt==='mc'?(d.ans!==null?(d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]):'미응답'):(d.ans||'미응답');const ct=d.q.fmt==='mc'?(d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]):d.q.wa;txt+=`${mk} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점 — 내답:${at} | 정답:${ct}\n`;});const tm={};r.details.forEach(d=>{const t=d.q.type;if(!tm[t])tm[t]={t:0,o:0};tm[t].t++;if(d.ok)tm[t].o++;});txt+=`\n━━ 유형별 ━━\n`;Object.entries(tm).forEach(([t,v])=>txt+=`${t}: ${v.o}/${v.t} (${Math.round(v.o/v.t*100)}%)\n`);txt+=`\n━━ 보완 피드백 ━━\n`;fb.forEach(f=>txt+=`${f}\n`);txt+=`━━━━━━━━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>toast('📄 상세 결과 복사 완료!')).catch(()=>toast('복사 실패'));}
function saveResultImage(){const nm=document.getElementById('inpName').value.trim(),r=grade(),lv=getLevel(r.score),fb=generateFeedback(r);const W=800,pad=40;const lines=[{t:'🎯 내신핏 온라인퀴즈 상세 결과',s:22,b:1,c:'#E8772E'},{t:''},{t:`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}`,s:14,c:'#555'},{t:`👤 ${nm} · ${new Date().toLocaleDateString('ko-KR')}`,s:14,c:'#555'},{t:''},{t:`📊 점수: ${r.score}/100`,s:20,b:1},{t:`✅${r.correct}/${QCOUNT} ❌${r.wrong} ⬜${r.unanswered}`,s:14,c:'#555'},{t:`🏅 ${lv.icon} ${lv.name} ${r.score>=80?'🎉 통과':'📚 미통과'}`,s:16,b:1,c:r.score>=80?'#1A9960':'#D63B3B'},{t:''}];r.details.forEach(d=>{const mk=d.ok?'✅':'❌';const ct=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;lines.push({t:`${mk} ${d.q.id}번[${d.q.type}]${d.q.pts}점 정답:${ct}`,s:12,c:d.ok?'#1A9960':'#D63B3B'});});lines.push({t:''});fb.forEach(f=>lines.push({t:f,s:11,c:'#444'}));lines.push({t:''},{t:'내신핏 · 온라인퀴즈 TEST',s:10,c:'#bbb'});let H=pad*2;lines.forEach(l=>{H+=(l.s||14)+10;});const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;const ctx=canvas.getContext('2d');ctx.scale(2,2);ctx.fillStyle='#FFF';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E8772E';ctx.fillRect(0,0,W,4);let y=pad+10;lines.forEach(l=>{const fs=l.s||14;ctx.font=`${l.b?'800':'500'} ${fs}px sans-serif`;ctx.fillStyle=l.c||'#222';if(l.t)ctx.fillText(l.t,pad,y);y+=fs+10;});ctx.fillStyle='#E8772E';ctx.fillRect(0,H-4,W,4);canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`퀴즈결과_${nm}_${new Date().toISOString().slice(0,10)}.png`;a.click();toast('🖼️ 이미지 저장 완료!');});}
