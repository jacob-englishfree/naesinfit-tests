<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--g:#16A34A;--gd:#14532D;--gl:#E8F5E9;--gxl:#F0FDF4;--gxxl:#F8FDF9;--bg:#F4F8F5;--text:#1A1A2E;--tm:#5A6A5E;--tl:#8A9A8E;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--o:#F59E0B;--ol:#FFF8E1;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s ease;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}

#startScreen{align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#F0FDF4,#E8F5E9 40%,#DCFCE7);}
.start-container{max-width:460px;width:100%;z-index:1;}
.brand-badge{display:inline-block;background:linear-gradient(135deg,var(--g),#0D9488);color:#fff;font-size:12px;font-weight:800;padding:7px 16px;border-radius:24px;margin-bottom:20px;}
.start-title{font-size:36px;font-weight:900;margin-bottom:4px;}.start-title span{background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.info-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
.info-card-header{background:linear-gradient(135deg,var(--g),#0D9488);padding:14px 20px;color:#fff;font-size:13px;font-weight:700;}
.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #f0f5f1;}.info-row:last-child{border:none;}

.chip{background:var(--card);border:1.5px solid #dde8df;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:600;color:var(--tm);}

.input-group input,.input-group select{width:100%;padding:13px 16px;border:2px solid #d0dcd2;border-radius:var(--rs);font-size:15px;font-family:inherit;background:#fff;transition:var(--tr);}

.btn{padding:16px;border:none;border-radius:var(--rs);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--tr);width:100%;}

.btn-outline{background:transparent;border:2px solid #c8d8ca;color:var(--tm);margin-top:8px;font-size:14px;padding:12px;}.btn-outline:hover{border-color:var(--g);color:var(--g);}

.exam-topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}

.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.exam-scroll{max-width:820px;margin:0 auto;padding:24px 20px 100px;}
.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;}

.q-num{width:36px;height:36px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;}

.tag-combo{background:var(--gl);color:#166534;}.tag-wrong{background:var(--rl);color:var(--r);}.tag-blank{background:#E0F7FA;color:#00838F;}.tag-syn{background:var(--bl);color:var(--b);}.tag-ant{background:var(--ol);color:#B45309;}.tag-poly{background:#FCE4EC;color:#C2185B;}.tag-eng{background:#E8F6FF;color:#0277BD;}.tag-morph{background:#FFF3E0;color:#E65100;}.tag-ctx{background:#EDE7F6;color:#5E35B1;}

.written-input{width:100%;padding:14px 16px;border:2px solid #d0dcd2;border-radius:var(--rs);font-size:15px;font-family:inherit;}.written-input:focus{outline:none;border-color:var(--g);}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 16px;display:flex;align-items:center;gap:5px;justify-content:center;z-index:100;overflow-x:auto;flex-wrap:wrap;}

.r-score{font-size:72px;font-weight:900;}.r-score sup{font-size:24px;color:var(--tl);}

.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.level-range{font-size:13px;color:var(--tm);margin-top:4px;}
.level-bar{margin-top:16px;height:8px;background:#e8efe9;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),#4ADE80);transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:#FAFDFB;border-radius:var(--rs);border:1px solid #dde8df;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:var(--gxl);}.info-cell.highlight .ic-value{color:var(--g);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:60px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#e8efe9;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;padding:16px;background:var(--gxl);border-radius:var(--rs);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #d0dcd2;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--g);color:var(--g);}.act-btn.primary{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.rev-card{border:1.5px solid #dde8df;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:#FAFDFB;display:flex;align-items:center;gap:12px;cursor:pointer;}.rev-header:hover{background:#F0F8F1;}.rev-icon{font-size:18px;margin-left:auto;transition:transform .2s;}.rev-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 18px;}.rev-body.open{max-height:3000px;padding:20px 18px;}
.expl-tag{display:inline-flex;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.tip{background:var(--gxl);color:var(--gd);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);margin-bottom:10px;}.expl-box.ans-b{border-left:3px solid var(--g);}.expl-box.tip-b{border-left:3px solid var(--g);background:var(--gxl);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}}
</style>

<body>
<div class="toast" id="toast"></div>

    <div class="info-row"><span class="info-label">단원</span><span class="info-value">4과 Fake or Fact, That Is the Question</span></div>
  </div></div>
  <div class="chip-row"><div class="chip">📝 20문항</div><div class="chip">⏱️ 20분</div><div class="chip">✅ 80점 이상 통과</div><div class="chip">📊 100점 만점</div></div>
  <div class="input-group"><label>이름 *</label><input type="text" id="inpName" placeholder="이름을 입력하세요"></div>

    <div class="input-group" style="flex:1"><label>학교</label><input type="text" id="inpSchool" placeholder="선택"></div>

<script>
const EI={"subject":"공통영어1","pub":"YBM(김은형)","lesson":"4과","title":"Fake or Fact, That Is the Question","total":100,"time":1200,"totalQ":20,"histKey":"wordTest_ybm_4"};

const Q=[
{id:1,type:`(A)(B)(C) 조합형`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`(A) appreciate – (B) special – (C) favorable`,`(A) manipulate – (B) ordinary – (C) critical`,`(A) manipulate – (B) special – (C) favorable`,`(A) appreciate – (B) ordinary – (C) critical`,`(A) manipulate – (B) ordinary – (C) favorable`],passage:`British writer Oobah Butler wanted to experiment with how easily one can (A)[<b>manipulate / appreciate</b>] public opinion online. He created a fake restaurant called The Shed at Dulwich. Butler set up an account for his "restaurant" on a popular online review site. He did not provide an exact address and wrote it was reservations only. He did this to make people think The Shed was a (B)[<b>special / ordinary</b>] restaurant. He faked photos of The Shed's food with shaving cream, whitening tablets, and even his own foot. He then asked his friends to write (C)[<b>favorable / critical</b>] fake reviews on the review site.`,stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`영국 작가 Oobah Butler는 온라인에서 여론을 얼마나 쉽게 <b>조작할</b> 수 있는지 실험하고 싶었다. 그는 The Shed at Dulwich라는 가짜 식당을 만들었다. Butler는 인기 있는 온라인 리뷰 사이트에 자신의 '식당' 계정을 개설했다. 그는 정확한 주소를 제공하지 않고 예약제라고 적었다. 그는 사람들이 The Shed가 <b>특별한</b> 식당이라고 생각하게 하기 위해 이렇게 했다. 그는 면도 크림, 미백 정제, 심지어 자신의 발로 The Shed의 음식 사진을 조작했다. 그런 다음 친구들에게 리뷰 사이트에 <b>호의적인</b> 가짜 리뷰를 써달라고 부탁했다.`,analysis:`✅ (A) manipulate(조작하다): 가짜 식당을 만들어 여론을 '조작'하는 맥락 / appreciate(감사하다)는 부적절<br>✅ (B) special(특별한): 예약제로 '특별한' 식당처럼 보이게 함 / ordinary(평범한)는 반대<br>✅ (C) favorable(호의적인): 가짜 '호의적' 리뷰를 부탁 / critical(비판적인)은 반대<br>❌ 나머지 조합은 문맥과 불일치`,tip:`manipulate는 '조작하다, 교묘히 다루다'라는 부정적 뉘앙스의 동사입니다. favorable은 '호의적인, 유리한'이라는 뜻입니다.`}},
{id:2,type:`(A)(B)(C) 조합형`,diff:`보통`,pts:5,fmt:"mc",ans:4,ch:[`(A) overlook – (B) detect – (C) misinforms`,`(A) evaluate – (B) ignore – (C) misinforms`,`(A) overlook – (B) ignore – (C) educates`,`(A) evaluate – (B) detect – (C) educates`,`(A) evaluate – (B) detect – (C) misinforms`],passage:`Butler's story shows that much of what we see on the Internet cannot be trusted. This emphasizes the importance of digital literacy. Digital literacy is about more than just using computers. It is the ability to use digital technology to find, (A)[<b>evaluate / overlook</b>], create, and communicate information. To become digitally literate, we need to develop an attitude and knowledge that enable us to (B)[<b>detect / ignore</b>] false information online. False information is any information that (C)[<b>misinforms / educates</b>] or deceives people.`,stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`Butler의 이야기는 우리가 인터넷에서 보는 것의 많은 부분을 신뢰할 수 없음을 보여준다. 이는 디지털 리터러시의 중요성을 강조한다. 디지털 리터러시는 단순히 컴퓨터를 사용하는 것 이상이다. 그것은 디지털 기술을 사용하여 정보를 찾고, <b>평가하고</b>, 만들고, 전달하는 능력이다. 디지털 문해력을 갖추려면 온라인에서 거짓 정보를 <b>탐지</b>할 수 있게 해주는 태도와 지식을 개발해야 한다. 거짓 정보란 사람들을 <b>잘못 알게 하거나</b> 속이는 모든 정보이다.`,analysis:`✅ (A) evaluate(평가하다): 정보를 찾고 '평가'하는 디지털 리터러시의 맥락 / overlook(간과하다)은 부적절<br>✅ (B) detect(탐지하다): 거짓 정보를 '탐지'하는 맥락 / ignore(무시하다)는 반대<br>✅ (C) misinforms(잘못 알게 하다): 거짓 정보가 사람들을 속이는 맥락 / educates(교육하다)는 반대<br>❌ ④번은 (C)만 틀려 혼동 유발 — 주의!`,tip:`evaluate는 '평가하다'로 디지털 리터러시의 핵심 능력입니다. detect는 '탐지하다, 감지하다'로 discover와 유사합니다.`}},
{id:3,type:`(A)(B)(C) 조합형`,diff:`어려움`,pts:6,fmt:"mc",ans:1,ch:[`(A) casually – (B) reliable – (C) real`,`(A) critically – (B) reliable – (C) real`,`(A) critically – (B) suspicious – (C) real`,`(A) critically – (B) reliable – (C) fabricated`,`(A) casually – (B) suspicious – (C) fabricated`],passage:`To avoid being deceived by false information, we need to develop a habit of (A)[<b>critically / casually</b>] evaluating what we see online. If you see a story that looks too good or too bad to be true, check the source first. Look at the website the story comes from. Does it look real? Are there spelling errors? Check that the story contains references and links to other information. Click on those links and see if the other information looks (B)[<b>reliable / suspicious</b>]. Websites with false information often do not have many (C)[<b>real / fabricated</b>] stories about other topics.`,stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`거짓 정보에 속지 않으려면 온라인에서 보는 것을 <b>비판적으로</b> 평가하는 습관을 길러야 한다. 너무 좋거나 너무 나빠서 사실이 아닌 것 같은 이야기를 보면 먼저 출처를 확인하라. 그 이야기가 나온 웹사이트를 살펴보라. 진짜처럼 보이는가? 맞춤법 오류가 있는가? 그 이야기에 다른 정보에 대한 참고 자료와 링크가 포함되어 있는지 확인하라. 그 링크를 클릭하여 다른 정보가 <b>신뢰할 만한지</b> 확인하라. 거짓 정보가 있는 웹사이트는 다른 주제에 대한 <b>실제</b> 기사가 많지 않은 경우가 많다.`,analysis:`✅ (A) critically(비판적으로): 거짓 정보를 피하기 위해 '비판적으로' 평가 / casually(대충)는 반대<br>✅ (B) reliable(신뢰할 만한): 링크의 정보가 '신뢰할 만한지' 확인 / suspicious(의심스러운)는 반대<br>✅ (C) real(실제의): 거짓 정보 사이트에는 '실제' 기사가 부족 / fabricated(조작된)는 반대<br>❌ ③번은 (B)만 틀려 혼동 유발 — critically와 suspicious의 어감 차이에 주의!`,tip:`critically는 '비판적으로'라는 뜻의 부사로, critical thinking(비판적 사고)과 함께 자주 쓰입니다. reliable은 '신뢰할 수 있는'으로 trustworthy와 유사합니다.`}},
{id:4,type:`문맥상 부적절한 어휘`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`Things quickly got, in Butler's words, "a little out of hand." From the lowest of the charts of the review site, The Shed ①<u>continuously</u> climbed the London rankings. He started getting e-mails and phone calls ②<u>requesting</u> reservations. Interest further ③<u>increased</u> when he told callers The Shed was "fully booked for the next six weeks." Even funnier, food suppliers started guessing The Shed's address and sent him ④<u>worthless</u> samples, and many job ⑤<u>applications</u> came in.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`상황이 Butler의 말에 따르면 '약간 통제 불능'이 되었다. 리뷰 사이트 차트의 최하위에서 The Shed는 ①<u>지속적으로</u> 런던 순위를 올렸다. 그는 예약을 ②<u>요청하는</u> 이메일과 전화를 받기 시작했다. The Shed가 '향후 6주간 예약이 꽉 찼다'고 말하자 관심이 더 ③<u>증가했다</u>. 더 웃긴 것은, 식품 공급업체들이 The Shed의 주소를 추측하여 ④<u>가치 없는</u> 샘플을 보내왔고, 많은 입사 ⑤<u>지원서</u>가 들어왔다.`,analysis:`✅ ① continuously(지속적으로): 최하위에서 계속 순위가 올랐으므로 적절<br>✅ ② requesting(요청하는): 예약을 요청하는 연락이 왔으므로 적절<br>✅ ③ increased(증가했다): 관심이 더 증가했으므로 적절<br>❌ ④ worthless(가치 없는): 원문은 <b>free(무료의)</b> → 공급업체가 무료 샘플을 보낸 것이므로 worthless는 부적절<br>✅ ⑤ applications(지원서): 입사 지원서가 들어왔으므로 적절`,tip:`free는 '무료의, 자유로운'이라는 다의어입니다. worthless(가치 없는)는 valuable(가치 있는)의 반의어입니다.`}},
{id:5,type:`문맥상 부적절한 어휘`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`Butler's story shows that much of what we see on the Internet cannot be ①<u>doubted</u>. This emphasizes the importance of digital literacy. Digital literacy is about more than just using computers. It is the ability to use digital technology to find, ②<u>evaluate</u>, create, and ③<u>communicate</u> information. To become digitally literate, we need to develop an attitude and knowledge that ④<u>enable</u> us to detect false information online. False information is any information that ⑤<u>misinforms</u> or deceives people.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`Butler의 이야기는 우리가 인터넷에서 보는 것의 많은 부분을 ①<u>의심할</u> 수 없음을 보여준다. 이는 디지털 리터러시의 중요성을 강조한다. 디지털 리터러시는 단순히 컴퓨터를 사용하는 것 이상이다. 그것은 디지털 기술을 사용하여 정보를 찾고, ②<u>평가하고</u>, 만들고, ③<u>전달하는</u> 능력이다. 디지털 문해력을 갖추려면 온라인에서 거짓 정보를 탐지할 수 있게 해주는 태도와 지식을 ④<u>개발해야</u> 한다. 거짓 정보란 사람들을 ⑤<u>잘못 알게 하거나</u> 속이는 모든 정보이다.`,analysis:`❌ ① doubted(의심할 수 없다): 원문은 <b>trusted(신뢰할 수 없다)</b> → '인터넷의 정보를 신뢰할 수 없다'가 올바른 맥락이므로 doubted는 부적절<br>✅ ② evaluate(평가하다): 정보를 평가하는 능력이므로 적절<br>✅ ③ communicate(전달하다): 정보를 전달하는 능력이므로 적절<br>✅ ④ enable(가능하게 하다): 태도와 지식이 탐지를 가능하게 하므로 적절<br>✅ ⑤ misinforms(잘못 알게 하다): 거짓 정보의 정의이므로 적절`,tip:`trust(신뢰하다)와 doubt(의심하다)는 반의어 관계입니다. 'cannot be trusted'는 '신뢰할 수 없다'라는 뜻입니다.`}},
{id:6,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:2,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`Sorting through the vast amount of information created and shared online is ①<u>challenging</u>. However, it is ②<u>important</u> that we know what false information is and how it ③<u>diminishes</u>. The better we ④<u>recognize</u> false information, the better we will be at ⑤<u>avoiding</u> it and helping others do the same.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <b>않은</b> 것은?`,det:{korean:`온라인에서 생성되고 공유되는 방대한 양의 정보를 분류하는 것은 ①<u>어렵다</u>. 그러나 거짓 정보가 무엇이고 어떻게 ③<u>줄어드는지</u> 아는 것이 ②<u>중요하다</u>. 거짓 정보를 더 잘 ④<u>인식할수록</u>, 그것을 ⑤<u>피하고</u> 다른 사람들도 그렇게 하도록 돕는 데 더 능숙해질 것이다.`,analysis:`✅ ① challenging(어려운): 방대한 정보를 분류하는 것이 어렵다는 맥락에 적절<br>✅ ② important(중요한): 거짓 정보를 아는 것이 중요하다는 맥락에 적절<br>❌ ③ diminishes(줄어들다): 원문은 <b>spreads(퍼지다)</b> → 거짓 정보가 어떻게 '퍼지는지' 아는 것이 맞으므로 diminishes는 부적절<br>✅ ④ recognize(인식하다): 거짓 정보를 인식한다는 맥락에 적절<br>✅ ⑤ avoiding(피하는): 거짓 정보를 피한다는 맥락에 적절`,tip:`spread(퍼지다)와 diminish(줄어들다)는 반의어 관계입니다. 거짓 정보가 '어떻게 퍼지는지(spreads)' 아는 것이 중요하다는 맥락을 파악해야 합니다.`}},
{id:7,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`profit`,`damage`,`interest`,`benefit`],passage:`Fortunately, The Shed incident was an experiment that caused little __________. However, false information can cause emotional or financial harm to people. For example, false information about a certain gender or belief group can stir up hatred against that group.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`다행히 The Shed 사건은 거의 <b>피해</b>를 주지 않은 실험이었다. 그러나 거짓 정보는 사람들에게 감정적이거나 재정적인 해를 끼칠 수 있다. 예를 들어, 특정 성별이나 신념 집단에 대한 거짓 정보는 그 집단에 대한 증오를 불러일으킬 수 있다.`,analysis:`✅ ② damage(피해): 실험이 거의 피해를 주지 않았다는 맥락에 적절<br>❌ ① profit(이익): 실험이 이익을 주지 않았다는 맥락이 아님<br>❌ ③ interest(관심): 문맥상 부자연스러움<br>❌ ④ benefit(혜택): 실험이 혜택을 주지 않았다는 맥락이 아님`,tip:`damage는 '피해, 손상'이라는 뜻으로 harm과 유사합니다. cause damage는 '피해를 주다'라는 표현입니다.`}},
{id:8,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`curiosity`,`respect`,`sympathy`,`hatred`],passage:`False information about a certain gender or belief group can stir up __________ against that group. It can cause fights between those who support the group and those who do not. In addition, misleading online reviews about questionable products often trick people into wasting money.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`특정 성별이나 신념 집단에 대한 거짓 정보는 그 집단에 대한 <b>증오</b>를 불러일으킬 수 있다. 그것은 그 집단을 지지하는 사람들과 그렇지 않은 사람들 사이에 싸움을 유발할 수 있다. 또한 의심스러운 제품에 대한 오해의 소지가 있는 온라인 리뷰는 종종 사람들을 속여 돈을 낭비하게 한다.`,analysis:`✅ ④ hatred(증오): 거짓 정보가 집단에 대한 '증오'를 불러일으킨다는 맥락에 적절<br>❌ ① curiosity(호기심): 싸움을 유발하는 맥락과 불일치<br>❌ ② respect(존경): 거짓 정보가 존경을 유발한다는 것은 부적절<br>❌ ③ sympathy(동정): 싸움이 일어나는 맥락과 불일치`,tip:`stir up은 '~을 불러일으키다, 자극하다'라는 뜻의 구동사입니다. hatred(증오)는 hate의 명사형입니다.`}},
{id:9,type:`빈칸 어휘 완성`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`vanish`,`remain`,`increase`,`appear`],passage:`Walking on the beach, you do not need to worry about footprints. They __________ with the waves. However, a "digital footprint"—the data trail left when you sign up, access, or send content—not only proves challenging to remove but enables tracking of your behavior, preferences, and opinions.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`해변을 걸을 때 발자국에 대해 걱정할 필요가 없다. 그것들은 파도와 함께 <b>사라진다</b>. 그러나 '디지털 발자국'—가입하거나, 접속하거나, 콘텐츠를 보낼 때 남는 데이터 흔적—은 제거하기 어려울 뿐만 아니라 당신의 행동, 선호, 의견의 추적을 가능하게 한다.`,analysis:`✅ ① vanish(사라지다): 해변의 발자국이 파도와 함께 '사라진다'는 맥락에 적절 — 뒤에 나오는 디지털 발자국과의 대비 포인트<br>❌ ② remain(남다): 해변 발자국은 파도로 사라지므로 부적절<br>❌ ③ increase(증가하다): 발자국이 증가한다는 것은 문맥상 부자연스러움<br>❌ ④ appear(나타나다): 이미 있는 발자국이 나타난다는 것은 부적절`,tip:`vanish는 '사라지다'라는 뜻으로 disappear와 유사합니다. 해변 발자국(사라짐)과 디지털 발자국(영구적)의 대비를 이해하는 것이 핵심입니다.`}},
{id:10,type:`동의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`accurate`,`helpful`,`deceptive`,`detailed`],passage:`However, false information can cause emotional or financial harm to people. For example, false information about a certain gender or belief group can stir up hatred against that group. In addition, <u>misleading</u> online reviews about questionable products often trick people into wasting money.`,stem:`다음 글의 밑줄 친 <u>misleading</u>과 의미가 가장 가까운 것은?`,det:{korean:`그러나 거짓 정보는 사람들에게 감정적이거나 재정적인 해를 끼칠 수 있다. 예를 들어, 특정 성별이나 신념 집단에 대한 거짓 정보는 그 집단에 대한 증오를 불러일으킬 수 있다. 또한 의심스러운 제품에 대한 <b>오해의 소지가 있는(misleading)</b> 온라인 리뷰는 종종 사람들을 속여 돈을 낭비하게 한다.`,analysis:`✅ ③ deceptive(기만적인): misleading과 '속이는, 오도하는'이라는 유사한 의미<br>❌ ① accurate(정확한): misleading의 반의어<br>❌ ② helpful(도움이 되는): 의미가 다름<br>❌ ④ detailed(상세한): 의미가 다름`,tip:`misleading은 '오해의 소지가 있는, 오도하는'이라는 뜻으로 mis-(잘못) + lead(이끌다)의 합성어입니다.`}},
{id:11,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:0,ch:[`misleads`,`informs`,`entertains`,`educates`],passage:`To become digitally literate, we need to develop an attitude and knowledge that enable us to detect false information online. False information is any information that misinforms or <u>deceives</u> people. It can be about anything such as health, the environment, and economics across many platforms.`,stem:`다음 글의 밑줄 친 <u>deceives</u>와 의미가 가장 가까운 것은?`,det:{korean:`디지털 문해력을 갖추려면 온라인에서 거짓 정보를 탐지할 수 있게 해주는 태도와 지식을 개발해야 한다. 거짓 정보란 사람들을 잘못 알게 하거나 <b>속이는(deceives)</b> 모든 정보이다. 그것은 건강, 환경, 경제 등 다양한 플랫폼에서 무엇이든 될 수 있다.`,analysis:`✅ ① misleads(오도하다): deceives와 '속이다, 기만하다'라는 유사한 의미<br>❌ ② informs(알리다): deceives의 반의어에 가까움<br>❌ ③ entertains(즐겁게 하다): 의미가 다름<br>❌ ④ educates(교육하다): 의미가 다름`,tip:`deceive는 '속이다, 기만하다'라는 뜻으로 cheat, trick, fool과 유사합니다. de-(반대) + ceive(잡다)의 어원입니다.`}},
{id:12,type:`동의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`limited`,`specific`,`minor`,`enormous`],passage:`Sorting through the <u>vast</u> amount of information created and shared online is challenging. However, it is important that we know what false information is and how it spreads. The better we recognize false information, the better we will be at avoiding it and helping others do the same.`,stem:`다음 글의 밑줄 친 <u>vast</u>와 의미가 가장 가까운 것은?`,det:{korean:`온라인에서 생성되고 공유되는 <b>방대한(vast)</b> 양의 정보를 분류하는 것은 어렵다. 그러나 거짓 정보가 무엇이고 어떻게 퍼지는지 아는 것이 중요하다. 거짓 정보를 더 잘 인식할수록, 그것을 피하고 다른 사람들도 그렇게 하도록 돕는 데 더 능숙해질 것이다.`,analysis:`✅ ④ enormous(거대한, 막대한): vast와 '매우 크고 방대한'이라는 유사한 의미<br>❌ ① limited(제한된): vast의 반의어<br>❌ ② specific(구체적인): 의미가 다름<br>❌ ③ minor(사소한): vast의 반의어에 가까움`,tip:`vast는 '광대한, 방대한'이라는 뜻으로 huge, immense, enormous와 유사합니다. a vast amount of는 '방대한 양의'라는 뜻입니다.`}},
{id:13,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`lasting`,`temporary`,`enduring`,`everlasting`],passage:`Your digital footprints from these activities may remain <u>permanent</u>. Even if you request a website or social media platform to remove your personal information, someone might have already collected your information with bad intent. Additionally, your negative online activity can potentially harm your reputation or career.`,stem:`다음 글의 밑줄 친 <u>permanent</u>와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`이러한 활동으로 인한 디지털 발자국은 <b>영구적(permanent)</b>으로 남을 수 있다. 웹사이트나 소셜 미디어 플랫폼에 개인 정보 삭제를 요청하더라도 누군가가 이미 나쁜 의도로 당신의 정보를 수집했을 수 있다. 또한 부정적인 온라인 활동은 잠재적으로 당신의 평판이나 경력에 해를 끼칠 수 있다.`,analysis:`✅ ② temporary(일시적인): permanent(영구적인)의 반의어 → 의미가 가장 멀다<br>❌ ① lasting(지속적인): permanent와 유사한 의미<br>❌ ③ enduring(오래 지속되는): permanent와 유사한 의미<br>❌ ④ everlasting(영원한): permanent와 유사한 의미`,tip:`permanent는 '영구적인'이라는 뜻으로 반의어는 temporary(일시적인)입니다. per-(완전히) + man-(머물다)의 어원입니다.`}},
{id:14,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`diverted`,`sidetracked`,`focused`,`disturbed`],passage:`If people had been digitally literate, they would not have been fooled by The Shed experiment so easily. Digitally literate people would have carefully considered information about The Shed without being <u>distracted</u> by other people's reactions. They would have been suspicious that the restaurant did not have an address.`,stem:`다음 글의 밑줄 친 <u>distracted</u>와 의미가 가장 <b>먼</b> 것은?`,det:{korean:`사람들이 디지털 문해력이 있었다면 The Shed 실험에 그렇게 쉽게 속지 않았을 것이다. 디지털 문해력이 있는 사람들은 다른 사람들의 반응에 <b>주의를 빼앗기지(distracted)</b> 않고 The Shed에 대한 정보를 주의 깊게 고려했을 것이다. 그들은 그 식당에 주소가 없다는 것을 의심했을 것이다.`,analysis:`✅ ③ focused(집중한): distracted(주의가 산만해진)의 반의어 → 의미가 가장 멀다<br>❌ ① diverted(주의를 돌린): distracted와 유사한 의미<br>❌ ② sidetracked(옆길로 빠진): distracted와 유사한 의미<br>❌ ④ disturbed(방해받은): distracted와 유사한 의미`,tip:`distracted는 dis-(멀리) + tract(끌다)에서 온 말로 '주의가 산만해진'이라는 뜻입니다. 반의어는 focused(집중한), concentrated(집중된)입니다.`}},
{id:15,type:`다의어 문맥적 의미`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`①, ④`,`②, ⑤`,`①, ③`,`②, ③`,`③, ⑤`],passage:`① She lost interest in the project after the first week.<br>② The bank offers 3% interest on savings accounts.<br>③ He has a financial interest in the company.<br>④ Public interest in the story grew rapidly.<br>⑤ The interest on the loan was higher than expected.`,stem:`다음 글에서 사용된 <b>interest</b>와 <b>같은 의미</b>로 쓰인 것을 고르시오.<br><br>📌 본문 참고: <i>"Interest further increased when he told callers The Shed was 'fully booked for the next six weeks.'"</i>`,det:{korean:`본문의 interest는 '<b>관심, 흥미</b>'라는 뜻으로 쓰였다.<br>① 그녀는 첫째 주 이후 그 프로젝트에 대한 <b>관심</b>을 잃었다. (관심) ✅<br>② 은행은 예금에 3%의 <b>이자</b>를 제공한다. (이자) ❌<br>③ 그는 그 회사에 재정적 <b>이해관계</b>가 있다. (이해관계) ❌<br>④ 그 이야기에 대한 대중의 <b>관심</b>이 빠르게 커졌다. (관심) ✅<br>⑤ 대출에 대한 <b>이자</b>가 예상보다 높았다. (이자) ❌`,analysis:`✅ ①번: '관심' — 본문과 같은 의미 (관심/흥미)<br>✅ ④번: '관심' — 본문과 같은 의미 (관심/흥미)<br>❌ ②번: '이자' — 금융 용어로 다른 의미<br>❌ ③번: '이해관계' — 사업적 이해관계로 다른 의미<br>❌ ⑤번: '이자' — 금융 용어로 다른 의미<br>→ 정답은 ①, ④`,tip:`interest는 대표적 다의어입니다: ① 관심/흥미 ② 이자 ③ 이해관계. 문맥에서 어떤 뜻인지 파악하는 것이 중요합니다.`}},
{id:16,type:`영영풀이 매칭`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`credibility`,`curiosity`,`creativity`,`capability`],passage:`You should then check the __________ of the content creator. If a story has no writer's name, this could be a sign that its content is questionable. If there is a name, find out what and where the person has reported before.`,stem:`다음 영영 풀이에 해당하는 단어로 가장 적절한 것은?<br><br><i>"the quality of being trusted and believed in"</i><br><br>📌 본문 참고: <i>"You should then check the __________ of the content creator."</i>`,det:{korean:`그런 다음 콘텐츠 제작자의 <b>신뢰성</b>을 확인해야 한다. 기사에 작성자 이름이 없다면 그 내용이 의심스럽다는 신호일 수 있다. 이름이 있다면 그 사람이 이전에 무엇을, 어디에서 보도했는지 알아보라.`,analysis:`✅ ① credibility(신뢰성): '신뢰받고 믿어지는 품질' — 영영 풀이와 정확히 일치<br>❌ ② curiosity(호기심): 알고 싶어 하는 강한 욕구<br>❌ ③ creativity(창의성): 새로운 것을 만들어내는 능력<br>❌ ④ capability(능력): 무언가를 할 수 있는 힘`,tip:`credibility는 credible(믿을 만한) + -ity(명사 접미사)로 구성된 단어입니다. '신뢰성, 신빙성'이라는 뜻입니다.`}},
{id:17,type:`어형 변환`,diff:`보통`,pts:5,fmt:"written",wa:`influential`,accept:[`influential`],passage:`False information is any information that misinforms or deceives people. It can be about anything such as health, the environment, and economics across many platforms. It can be (influence) __________, as The Shed incident shows.`,stem:`다음 글의 괄호 안에 주어진 단어를 문맥에 맞게 변형하여 빈칸에 쓰시오.`,det:{korean:`거짓 정보란 사람들을 잘못 알게 하거나 속이는 모든 정보이다. 그것은 건강, 환경, 경제 등 다양한 플랫폼에서 무엇이든 될 수 있다. The Shed 사건이 보여주듯이, 그것은 <b>영향력 있을(influential)</b> 수 있다.`,analysis:`✅ influential: influence(영향) → influential(영향력 있는) — be동사 뒤 보어 자리이므로 형용사형 필요<br>❌ influence(동사/명사), influenced(과거분사), influencing(현재분사)는 문맥에 부적절`,tip:`influence(명사/동사) → influential(형용사): -ial 접미사가 붙어 형용사가 됩니다. be동사 뒤 보어 자리에는 형용사가 옵니다.`}},
{id:18,type:`어형 변환`,diff:`어려움`,pts:6,fmt:"written",wa:`intentionally`,accept:[`intentionally`],passage:`There are two types of digital footprints. Active footprints, like social media posts, are (intention) __________ created data, while passive footprints, such as website cookies and mobile phone activity, occur without your direct involvement.`,stem:`다음 글의 괄호 안에 주어진 단어를 문맥에 맞게 변형하여 빈칸에 쓰시오.`,det:{korean:`디지털 발자국에는 두 가지 유형이 있다. 소셜 미디어 게시물과 같은 능동적 발자국은 <b>의도적으로(intentionally)</b> 생성된 데이터이고, 웹사이트 쿠키나 휴대전화 활동과 같은 수동적 발자국은 당신의 직접적인 관여 없이 발생한다.`,analysis:`✅ intentionally: intention(의도) → intentionally(의도적으로) — 동사 created를 수식하는 부사 자리이므로 부사형 필요<br>❌ intention(명사), intentional(형용사), intending(현재분사)는 문맥에 부적절`,tip:`intention(명사) → intentional(형용사) → intentionally(부사): -ally 접미사가 붙어 부사가 됩니다. 과거분사(created) 앞에서 수식하므로 부사가 필요합니다.`}},
{id:19,type:`빈칸 문맥 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:1,ch:[`footprints`,`preferences`,`passwords`,`addresses`],passage:`Walking on the beach, you do not need to worry about footprints. They vanish with the waves. However, a "digital footprint"—the data trail left when you sign up, access, or send content—not only proves challenging to remove but enables tracking of your behavior, __________, and opinions.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`해변을 걸을 때 발자국에 대해 걱정할 필요가 없다. 그것들은 파도와 함께 사라진다. 그러나 '디지털 발자국'—가입하거나, 접속하거나, 콘텐츠를 보낼 때 남는 데이터 흔적—은 제거하기 어려울 뿐만 아니라 당신의 행동, <b>선호(preferences)</b>, 의견의 추적을 가능하게 한다.`,analysis:`✅ ② preferences(선호): behavior(행동), opinions(의견)와 함께 추적 대상을 나열하는 맥락에 적절<br>❌ ① footprints(발자국): 앞에서 이미 언급된 개념으로 부적절<br>❌ ③ passwords(비밀번호): 추적 대상의 나열과 어울리지 않음<br>❌ ④ addresses(주소): 행동·의견과 병렬 나열에 부적합`,tip:`preference는 '선호, 취향'이라는 뜻으로 prefer(선호하다)의 명사형입니다. behavior, preferences, opinions는 디지털 추적의 대표적 대상입니다.`}},
{id:20,type:`빈칸 문맥 완성`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`footprints`,`information`,`reputation`,`privacy`],passage:`Even if you request a website or social media platform to remove your personal information, someone might have already collected your information with bad intent. Additionally, your negative online activity can potentially harm your __________ or career. It is important to manage and reduce your digital footprints.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`웹사이트나 소셜 미디어 플랫폼에 개인 정보 삭제를 요청하더라도 누군가가 이미 나쁜 의도로 당신의 정보를 수집했을 수 있다. 또한 부정적인 온라인 활동은 잠재적으로 당신의 <b>평판(reputation)</b>이나 경력에 해를 끼칠 수 있다. 디지털 발자국을 관리하고 줄이는 것이 중요하다.`,analysis:`✅ ③ reputation(평판): career(경력)와 병렬로 나열되어 '평판이나 경력에 해를 끼친다'는 맥락에 적절<br>❌ ① footprints(발자국): career와 병렬 구조에 부적합<br>❌ ② information(정보): 이미 앞 문장에서 다른 맥락으로 사용됨<br>❌ ④ privacy(개인정보): career와의 병렬 구조에서 reputation이 더 자연스러움`,tip:`reputation은 '평판, 명성'이라는 뜻으로 '~에 해를 끼치다'는 harm one's reputation으로 표현합니다.`}}
];


let S={cur:0,ans:new Array(EI.totalQ).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,levelIcon:getLevel(r.score).icon});if(h.length>10)h.splice(0,h.length-10);try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 시험 기록이 없습니다.</p>';else p.innerHTML=h.slice().reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time} · ${r.grade}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.levelIcon} ${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'전설',icon:'🐉',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'챔피언',icon:'🏆',range:'90~94',msg:'최상위권!'};if(s>=80)return{name:'다이아몬드',icon:'💎',range:'80~89',msg:'통과! 취약 유형만 복습하면 최상위!'};if(s>=70)return{name:'빛나는별',icon:'🌟',range:'70~79',msg:'통과까지 조금만 더!'};if(s>=60)return{name:'별',icon:'⭐',range:'60~69',msg:'기본기 탄탄! 본문 복습 후 재도전!'};if(s>=40)return{name:'나무',icon:'🌲',range:'40~59',msg:'성장 중!'};return{name:'새싹',icon:'🌱',range:'0~39',msg:'단어 암기부터 시작!'};}
function fmtTime(s){return Math.floor(s/60)+'분 '+(s%60)+'초';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(EI.totalQ).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
const typeTag={'(A)(B)(C) 조합형':'tag-combo','문맥상 부적절한 어휘':'tag-wrong','빈칸 어휘 완성':'tag-blank','동의어 고르기':'tag-syn','반의어 고르기':'tag-ant','다의어 문맥적 의미':'tag-poly','영영풀이 매칭':'tag-eng','어형 변환 (서술형)':'tag-morph','빈칸 문맥 완성':'tag-ctx'};
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc=typeTag[q.type]||'';h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body">`;if(q.passage)h+=`<div class="q-passage">${q.passage}</div>`;h+=`<div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){const mk=q.ch.length===5?'①②③④⑤':'①②③④';h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${mk[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:EI.totalQ},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('answered',S.ans[i]!==null));}
function scrollToQ(i){if(i<0||i>=EI.totalQ)return;S.cur=i;document.getElementById('qc-'+i).scrollIntoView({behavior:'smooth',block:'center'});}
function sel(qi,ci){document.querySelectorAll('.choice-btn[data-q="'+qi+'"]').forEach(b=>b.classList.remove('selected'));document.querySelector('.choice-btn[data-q="'+qi+'"][data-c="'+ci+'"]').classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById('w-'+qi).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase();if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase());if(!ok&&q.wa)ok=u===q.wa.toLowerCase();}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok});});return{score,correct,wrong,unanswered,details};}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100);const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={total:0,ok:0};typeMap[t].total++;if(d.ok)typeMap[t].ok++;});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.ok===v.total).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.ok<v.total).map(([k])=>k);let h='';
h+=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/${EI.total}</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong></span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교 / 학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 / ${EI.total}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간 / 통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.ok/d.total*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type.replace(/\(.+?\)/g,'').trim().slice(0,6)}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});
if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t.slice(0,8)}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t.slice(0,8)}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽!</h4><p>다른 단원도 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>틀린 유형 집중 복습으로 만점까지!</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기부터!</h4><p>지문 해석을 완벽히 이해한 뒤 재도전!</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="copyResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유하기</span></button><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);margin-left:8px">클릭하여 펼치기</span></div>`;r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const mk=d.q.ch&&d.q.ch.length===5?'①②③④⑤':'①②③④';const ua=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const ca=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;const open=!d.ok;h+=`<div class="rev-card"><div class="rev-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.rev-icon').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><span style="font-weight:800">${icon} ${d.q.id}번</span><span style="font-size:12px;color:var(--tm)">[${d.q.type.slice(0,6)}] ${d.q.pts}점</span><span class="rev-icon">▼</span></div><div class="rev-body${open?' open':''}"><div style="display:flex;gap:10px;margin-bottom:14px"><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;${d.ok?'background:var(--gl);color:var(--g)':'background:var(--rl);color:var(--r)'}"><div style="font-size:11px;opacity:.7">내 답</div>${ua}</div><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;background:var(--gl);color:var(--g)"><div style="font-size:11px;opacity:.7">정답</div>${ca}</div></div><div class="expl-tag ans">🇰🇷 해석</div><div class="expl-box ans-b">${d.q.det.korean}</div><div class="expl-tag tip">📋 분석</div><div class="expl-box">${d.q.det.analysis}</div><div class="expl-tag tip">💡 팁</div><div class="expl-box tip-b">${d.q.det.tip}</div></div></div>`;});h+=`</div></div>`;document.getElementById('resultScreen').innerHTML=h;}
function copyResult(){const r=grade(),lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100),nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,elapsed=Math.floor((Date.now()-S.start)/1000),pass=r.score>=80;const mk5='①②③④⑤',mk4='①②③④';const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,w:[]};typeMap[t].t++;if(d.ok)typeMap[t].o++;else typeMap[t].w.push(d.q.id);});
let txt=`📝 온라인단어 TEST 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🏆 점수: ${r.score} / ${EI.total}점 (${pct}%)\n${lv.icon} 레벨: ${lv.name}\n${pass?'🎉 통과!':'📚 미통과'}\n\n✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n⏱️ 소요시간: ${fmtTime(elapsed)}\n\n━━ 📊 문항별 결과 ━━\n`;
r.details.forEach(d=>{const mark=d.ok?'✅':'❌';const mk=d.q.ch&&d.q.ch.length===5?mk5:mk4;const ans=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const cor=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;txt+=`${mark} ${d.q.id}번 [${d.q.type.slice(0,6)}] ${d.q.pts}점 — 내답:${ans} 정답:${cor}\n`;});
txt+=`\n━━ 📈 유형별 분석 ━━\n`;Object.entries(typeMap).forEach(([t,v])=>{const p=Math.round(v.o/v.t*100);const ic=p===100?'🟢':(p>0?'🟡':'🔴');txt+=`${ic} ${t.slice(0,6)}: ${v.o}/${v.t} (${p}%)`;if(v.w.length)txt+=` ← 틀린:${v.w.join(',')}번`;txt+=`\n`;});
txt+=`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n#온라인단어TEST #영어내신`;
navigator.clipboard.writeText(txt).then(()=>toast('📋 상세 결과가 복사되었습니다!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('📋 복사되었습니다!');}catch(e){toast('복사 실패');}document.body.removeChild(ta);});}
function retake(){startExam();}
function goHome(){showScreen('startScreen');updateHCount();}
window.addEventListener('beforeunload',e=>{if(S.ti){e.preventDefault();e.returnValue='';}});

</script>
