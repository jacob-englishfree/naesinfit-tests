  note: '어법 ⓐ~ⓔ',

{

  note: '어법 A/B/C',
  passage: `Vincent painted the world-famous <i>Café Terrace at Night</i> in September 1888. He created this work while (A) <u>sitting / sat</u> outside the Café van Gogh at night. This was unusual because most painters did their night scenes from memory and worked during the daytime. As such, they used a lot of black paint. Vincent, however, believed that night scenes (B) <u>contained / containing</u> diverse and vibrant colors. Indeed, the <i>Café Terrace at Night</i> has such a rich harmony of yellows, blues, and oranges that Vincent did not have to use a single drop of black paint. Even today, there is still a café at the site (C) <u>where / which</u> Vincent painted.`,
  stem: `다음 글의 (A), (B), (C)에서 어법에 맞는 표현으로 가장 적절한 것을 고르시오.`,
  ch: ['(A) sitting - (B) contained - (C) where', '(A) sat - (B) contained - (C) which', '(A) sitting - (B) containing - (C) where', '(A) sat - (B) containing - (C) which', '(A) sitting - (B) contained - (C) which'],

    correct: '(A) sitting: while + V-ing(분사구문). 접속사 while 뒤에 주어 생략 후 현재분사 → sitting ✅ / sat ❌ (while 뒤 주어 없이 과거형 불가) // (B) contained: that절의 동사. believed(과거) → 시제 일치 → contained(과거) ✅ / containing(현재분사)은 절의 동사가 될 수 없음 ❌ // (C) where: 선행사 the site(장소) → 관계부사 where ✅ / which는 전치사 없이 장소 선행사 뒤에 부적절 ❌ (at which는 가능하지만 선택지에 없음)',

    tip: '🔑 (A) while + V-ing: 동시동작 분사구문. (B) believe(d) + that + S + V(과거): 시제 일치 원칙. (C) 장소 선행사 + where = 장소 선행사 + at/in which. 관계부사 vs 관계대명사 구별법: 뒤에 완전한 절 → where, 불완전한 절 → which.'

  passage: `The hospital closed in the 1980s, and the building reopened as a library and exhibition space, with a café and gift shops. The garden was renovated to resemble Vincent's painting as much as possible. Arles and its provincial countryside inspired Vincent to create brighter, more exciting landscapes. He had searched for brighter colors and softer light in Paris. In Arles, he found them. Today, more than 100 years later, this beautiful city remains just as attractive. The combination of Roman historic sites and Vincent's story creates a unique mood that will inspire you just as the city had inspired Vincent.`,
  stem: `다음 글을 통해 얻을 수 있는 시사점으로 가장 적절한 것을 고르시오.`,
  ch: ['예술적 유산은 장소의 정체성을 형성하고 시대를 초월한 영감을 줄 수 있다.', '고흐의 작품을 이해하려면 반드시 아를을 방문해야 한다.', '역사적 건물은 원래 용도를 유지하는 것이 가장 바람직하다.', '예술가의 정신 건강 문제는 작품의 질에 부정적 영향을 미친다.', '관광 산업 발전을 위해 유명 예술가의 흔적을 보존해야 한다.'],
  ans: 0,
  det: {
    ref: '[원문] The combination of Roman historic sites and Vincent\'s story creates a unique mood that will inspire you just as the city had inspired Vincent. [해석] 로마 유적지와 빈센트의 이야기가 결합되어, 도시가 빈센트에게 영감을 준 것처럼 여러분에게도 영감을 줄 독특한 분위기를 만듭니다. 핵심 시사점: 예술적 유산(Vincent\'s story)이 장소의 정체성을 만들고 시대를 초월한 영감을 준다.',
    correct: '① 예술적 유산이 장소의 정체성을 형성하고 시대를 초월한 영감을 줌 → Roman historic sites + Vincent\'s story + will inspire you ✅ / ② 반드시 방문해야 한다 → 과도한 일반화 ❌ / ③ 원래 용도 유지가 바람직 → 오히려 병원이 도서관·전시관으로 변환된 사례 ❌ / ④ 정신건강 문제가 작품 질에 부정적 영향 → 오히려 아름다운 풍경화를 그렸다고 서술 ❌ / ⑤ 관광 산업 발전 목적 → 관광이 아닌 \'영감\'이 핵심 ❌',
    wrongs: [],
    tip: '🔑 시사점 문제: 마지막 문장에 핵심 메시지 집중. \'will inspire you just as the city had inspired Vincent\' → 시대를 초월한(timeless) 영감. 시사점 = 구체적 사례에서 보편적 교훈을 도출.'
  }
},
{

    correct: '① 5시간(five hours)이 맞으며, 3시간이 아님 ❌ / ② 90 A.D.(서기 90년)이며 기원전(B.C.)이 아님 ❌ / ③ over 20,000 people → 2만 명 이상 수용 가능 ✅ / ④ every Sunday(매주 일요일)이며, sometimes(가끔) 갔음. 매일이 아님 ❌ / ⑤ 투우 자체가 아니라 colorful crowds(화려한 관중)를 특히 좋아했음 ❌',

},
{
  id: 11, type: '불일치', diff: '보통', pts: 5, fmt: 'mc',
  note: '불일치',
  passage: `Vincent painted the world-famous <i>Café Terrace at Night</i> in September 1888. He created this work while sitting outside the Café van Gogh at night. This was unusual because most painters did their night scenes from memory and worked during the daytime. As such, they used a lot of black paint. Vincent, however, believed that night scenes contained diverse and vibrant colors. Indeed, the <i>Café Terrace at Night</i> has such a rich harmony of yellows, blues, and oranges that Vincent did not have to use a single drop of black paint. Even today, there is still a café at the site of Vincent's painting. It was renovated in the 1990s and painted yellow to look like the café in the painting.`,
  stem: `다음 글의 내용과 일치하지 않는 것을 고르시오.`,
  ch: ['빈센트는 1888년 9월에 &lt;밤의 카페 테라스&gt;를 그렸다.', '대부분의 화가들은 기억에 의존하여 야경을 그렸다.', '빈센트는 야경에 다양하고 생동감 있는 색채가 있다고 믿었다.', '빈센트는 &lt;밤의 카페 테라스&gt;에 검은색 물감을 소량 사용했다.', '카페는 1990년대에 보수되어 노란색으로 칠해졌다.'],
  ans: 3,
  det: {
    ref: '[원문] Vincent did not have to use a single drop of black paint. [해석] 빈센트는 검은색 물감을 한 방울도 사용할 필요가 없었다. not a single drop = 단 한 방울도 ~않다. 즉, 검은색 물감을 전혀 사용하지 않았으므로 \'소량 사용했다\'는 내용과 일치하지 않습니다.',
    correct: '① 1888년 9월에 그림 → September 1888 ✅ (일치) / ② 기억에 의존하여 야경 작업 → from memory ✅ (일치) / ③ 야경에 다양하고 생동감 있는 색채 → diverse and vibrant colors ✅ (일치) / ④ 검은색 물감 소량 사용 → not a single drop(한 방울도 안 씀) ❌ (불일치!) / ⑤ 1990년대 보수, 노란색 도장 → renovated in the 1990s and painted yellow ✅ (일치)',
    wrongs: [],
    tip: '🔑 불일치 문제: 부정 표현에 주의! not a single = 단 하나도 ~않은. a single drop(한 방울)도 사용하지 않은 것이므로, \'소량 사용\'은 완전히 반대. 유사 표현: not a single word(한마디도 ~않은), not a single penny(한 푼도 ~않은).'
  }
},
{
  id: 12, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: '빈칸(구)',
  passage: `The picture illustrates a spring garden filled with flowers and trees with different colors and tones. The flowers are in full bloom, and the small trees are leafy. The big trees, however, have few leaves. This is rather odd given that the season is spring. Perhaps this contrast reflects _____________________ during the most difficult time of his life.`,

  ch: ['the painter\'s love for natural beauty', 'the painter\'s complex feelings', 'the changing seasons in Arles', 'the influence of other Impressionists', 'the unique climate of southern France'],
  ans: 1,
  det: {
    ref: '[원문] Perhaps this contrast reflects the painter\'s complex feelings during the most difficult time of his life. [해석] 아마도 이 대조는 인생에서 가장 힘든 시기를 보내던 화가의 복잡한 감정을 반영하는 것일 수도 있다. contrast(대조) = 만개한 꽃·무성한 작은 나무 vs 잎이 거의 없는 큰 나무. 이 대조가 화가의 내면 감정을 반영한다는 추론.',
    correct: '① 자연미에 대한 사랑 → 대조(contrast)와 가장 힘든 시기(most difficult time)를 설명하지 못함 ❌ / ② 화가의 복잡한 감정 → contrast(대조) + most difficult time(힘든 시기) 모두 연결 ✅ / ③ 아를의 계절 변화 → 봄인데 잎이 없는 것은 계절 변화가 아닌 심리적 표현 ❌ / ④ 다른 인상주의 화가의 영향 → 지문에 언급 없음 ❌ / ⑤ 남프랑스의 독특한 기후 → 기후가 아닌 심리적 대조가 핵심 ❌',
    wrongs: [],
    tip: '🔑 빈칸 추론: 빈칸 앞뒤 단서어 활용. 앞: this contrast(이 대조) + reflects(반영하다). 뒤: during the most difficult time(가장 힘든 시기). → 대조가 반영하는 것 = 힘든 시기의 복잡한 감정(complex feelings).'
  }
},
{
  id: 13, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: '빈칸(문장)',
  passage: `In contrast, red and yellow light are the least likely to impact our bodies. Exposure to red light in the evening can improve mental health by increasing the release of melatonin, which leads to better sleep at night. This improves people's cognitive abilities and overall mental health. Therefore, it can be concluded that _____________________.`,
  stem: `다음 글의 빈칸에 들어갈 말로 가장 적절한 것을 고르시오.`,

  det: {
    ref: '[원문 종합] 청색광은 수면 방해 → 적색광은 멜라토닌 증가로 수면 개선 → 인지능력·정신건강 향상. [해석] 따라서, 우리가 노출되는 빛의 종류와 색상이 웰빙에 상당한 영향을 미칠 수 있다고 결론지을 수 있다. 지문 전체가 빛의 색상별 다른 효과를 설명하므로, 결론은 \'빛의 종류·색상이 건강에 영향\'이라는 포괄적 진술.',
    correct: '① 모든 인공광이 해롭다 → 적색광은 오히려 이로움 ❌ / ② 빛의 종류와 색상이 웰빙에 영향 → 청색광(부정) + 적색광(긍정) 모두 포괄하는 결론 ✅ / ③ 멜라토닌이 가장 중요한 화학물질 → 과도한 일반화 ❌ / ④ 자기 전 모든 인공광 회피 → 적색광은 권장됨 ❌ / ⑤ 자연광이 항상 더 좋다 → 지문에서 비교하지 않음 ❌',
    wrongs: [],

  }
},
{

  note: '함축',
  passage: `Leaving behind the gray skies of Paris, he arrived in Arles in 1888. The town inspired an explosion of creativity. Vincent claimed, "<u>The whole future of art is to be found in the south of France.</u>" He worked enthusiastically and produced nearly 200 paintings in just fifteen months.`,
  stem: `다음 글에서 밑줄 친 "The whole future of art is to be found in the south of France"가 의미하는 바로 가장 적절한 것을 고르시오.`,
  ch: ['남프랑스의 미술관이 세계 최고 수준이다.', '남프랑스에서 새로운 미술 사조가 탄생할 것이다.', '남프랑스의 빛과 색채가 예술의 무한한 가능성을 품고 있다.', '파리보다 남프랑스가 예술가에게 더 많은 수입을 보장한다.', '남프랑스의 자연환경이 그림 재료로 적합하다.'],

{
  id: 15, type: '순서', diff: '보통', pts: 5, fmt: 'mc',
  note: '순서',
  passage: `Vincent painted the world-famous <i>Café Terrace at Night</i> in September 1888. He created this work while sitting outside the Café van Gogh at night.<br><br>(A) Indeed, the <i>Café Terrace at Night</i> has such a rich harmony of yellows, blues, and oranges that Vincent did not have to use a single drop of black paint.<br>(B) This was unusual because most painters did their night scenes from memory and worked during the daytime. As such, they used a lot of black paint.<br>(C) Vincent, however, believed that night scenes contained diverse and vibrant colors.`,

  ans: 3,
  det: {
    ref: '[해석] 도입: 빈센트가 밤에 카페 밖에 앉아 그림을 그렸다. → (B) 이것은 대부분의 화가가 기억에 의존해 야경을 그리고 검은 물감을 많이 사용했기 때문에 이례적이었다. → (C) 그러나 빈센트는 야경에 다양하고 생동감 있는 색채가 있다고 믿었다. → (A) 실제로, 노란색, 파란색, 주황색의 풍부한 조화 덕에 검은 물감 한 방울도 쓰지 않았다.',

},

r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
