<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--g:#16A34A;--gd:#14532D;--gl:#E8F5E9;--gxl:#F0FDF4;--gxxl:#F8FDF9;--bg:#F4F8F5;--text:#1A1A2E;--tm:#5A6A5E;--tl:#8A9A8E;--r:#D63B3B;--rl:#FFF0F0;--b:#3B6FD9;--bl:#EDF2FF;--o:#F59E0B;--ol:#FFF8E1;--card:#FFF;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:16px;--rs:10px;--rxs:6px;--tr:all .2s ease;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}

.info-rows{padding:4px 0;}.info-row{display:flex;justify-content:space-between;padding:11px 20px;font-size:14px;border-bottom:1px solid #f0f5f1;}.info-row:last-child{border:none;}

.topbar-left{display:flex;align-items:center;gap:10px;}.topbar-dot{width:8px;height:8px;background:var(--g);border-radius:50%;}

@keyframes pulse{50%{opacity:.3;}}
.btn-submit{padding:9px 22px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

.q-card{background:var(--card);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;}

.q-num{width:36px;height:36px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;}

.tag-combo{background:var(--gl);color:#166534;}.tag-wrong{background:var(--rl);color:var(--r);}.tag-blank{background:#E0F7FA;color:#00838F;}.tag-syn{background:var(--bl);color:var(--b);}.tag-ant{background:var(--ol);color:#B45309;}.tag-poly{background:#FCE4EC;color:#C2185B;}.tag-eng{background:#E8F6FF;color:#0277BD;}.tag-morph{background:#FFF3E0;color:#E65100;}.tag-ctx{background:#EDE7F6;color:#5E35B1;}

.written-input{width:100%;padding:14px 16px;border:2px solid #d0dcd2;border-radius:var(--rs);font-size:15px;font-family:inherit;}.written-input:focus{outline:none;border-color:var(--g);}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 16px;display:flex;align-items:center;gap:5px;justify-content:center;z-index:100;overflow-x:auto;flex-wrap:wrap;}

.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;}
.level-card{text-align:center;padding:30px 20px;}.level-icon{font-size:64px;margin-bottom:8px;animation:floatY 3s ease-in-out infinite;}@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.level-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gd),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.level-range{font-size:13px;color:var(--tm);margin-top:4px;}
.level-bar{margin-top:16px;height:8px;background:#e8efe9;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),#4ADE80);transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:#FAFDFB;border-radius:var(--rs);border:1px solid #dde8df;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:var(--gxl);}.info-cell.highlight .ic-value{color:var(--g);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:60px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#e8efe9;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;padding:16px;background:var(--gxl);border-radius:var(--rs);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #d0dcd2;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--g);color:var(--g);}.act-btn.primary{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}
.rev-card{border:1.5px solid #dde8df;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:#FAFDFB;display:flex;align-items:center;gap:12px;cursor:pointer;}.rev-header:hover{background:#F0F8F1;}.rev-icon{font-size:18px;margin-left:auto;transition:transform .2s;}.rev-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 18px;}.rev-body.open{max-height:3000px;padding:20px 18px;}
.expl-tag{display:inline-flex;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.tip{background:var(--gxl);color:var(--gd);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);margin-bottom:10px;}.expl-box.ans-b{border-left:3px solid var(--g);}.expl-box.tip-b{border-left:3px solid var(--g);background:var(--gxl);}
@media(max-width:640px){.start-title{font-size:28px;}.r-score{font-size:52px;}.action-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}.q-body{padding:16px;}}
</style>

<script>
const EI={"subject":"공통영어1","pub":"YBM(김은형)","lesson":"3과","title":"Why Fashion Needs to Be More Sustainable","total":100,"time":1200,"totalQ":20,"histKey":"wordTest_ybm_kim_3"};

const Q=[
{id:1,type:`(A)(B)(C) 조합형`,diff:`쉬움`,pts:4,fmt:"mc",ans:2,ch:[`(A) old-fashioned – (B) indifferent – (C) exciting`,`(A) trendy – (B) attached – (C) boring`,`(A) old-fashioned – (B) attached – (C) exciting`,`(A) trendy – (B) indifferent – (C) boring`,`(A) old-fashioned – (B) attached – (C) boring`],passage:`Jessi is a fashion blogger who loves unique, vibrant clothes. But guess what? She does not buy new clothes. Instead, she buys them secondhand. You may think secondhand clothes are (A)[<b>old-fashioned / trendy</b>], but by buying them, Jessi can try different styles. She also does not get too (B)[<b>attached / indifferent</b>] to any style or brand because there is always another (C)[<b>boring / exciting</b>] outfit waiting to be discovered.`,stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`Jessi는 독특하고 <b>화려한</b> 옷을 좋아하는 패션 블로거입니다. 그녀는 새 옷을 사지 않고 중고로 삽니다. 여러분은 중고 옷이 (A)<b>구식이라고</b> 생각할 수 있지만, Jessi는 다양한 스타일을 시도할 수 있습니다. 그녀는 어떤 스타일이나 브랜드에 너무 (B)<b>집착하지</b> 않습니다. 왜냐하면 항상 또 다른 (C)<b>신나는</b> 옷이 발견되기를 기다리고 있기 때문입니다.`,analysis:`✅ ③ (A) old-fashioned: 중고 옷에 대한 편견으로 '구식의'가 적절 / (B) attached: get attached to ~에 집착하다 / (C) exciting: '신나는' 옷이 기다린다는 긍정적 맥락 ❌ ① (B) indifferent 부적절 ❌ ② (A) trendy 부적절 ❌ ④ 전부 반대 ❌ ⑤ (C) boring 부적절`,tip:`get attached to: ~에 집착하다, 애착을 갖다`}},
{id:2,type:`(A)(B)(C) 조합형`,diff:`보통`,pts:5,fmt:"mc",ans:4,ch:[`(A) linear – (B) minimizing – (C) linear`,`(A) circular – (B) maximizing – (C) circular`,`(A) linear – (B) minimizing – (C) circular`,`(A) circular – (B) minimizing – (C) linear`,`(A) linear – (B) maximizing – (C) linear`],passage:`Worth over $3 trillion and making up 2% of the world's GDP, the fashion industry today has an almost entirely (A)[<b>linear / circular</b>] approach. The process moves in a straight line from design to consumption to disposal. Material extraction, textile manufacturing, the supply chain, design, sales, marketing, and other steps are guided by the aim of (B)[<b>maximizing / minimizing</b>] garment consumption without considering other issues. Due to (C)[<b>linear / circular</b>] fashion, the fashion industry negatively affects the environment.`,stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`3조 달러 이상의 가치를 지니며 세계 GDP의 2%를 차지하는 오늘날의 패션 산업은 거의 전적으로 (A)<b>선형적인</b> 접근 방식을 취하고 있습니다. 그 과정은 디자인에서 소비, 폐기로 일직선으로 이동합니다. 각 단계는 다른 문제를 고려하지 않고 의류 소비를 (B)<b>극대화</b>하는 것을 목표로 합니다. (C)<b>선형</b> 패션으로 인해 패션 산업은 환경에 부정적 영향을 미칩니다.`,analysis:`✅ ⑤ (A) linear: 'straight line(일직선)'이라는 단서로 '선형적' 확인 / (B) maximizing: 다른 문제를 고려하지 않고 소비를 '극대화'하는 것이 문제 / (C) linear: 선형 패션이 환경에 부정적 영향 ❌ ①~④ linear/circular, maximizing/minimizing 조합 오류`,tip:`linear(선형의) ↔ circular(순환적인): 본문의 핵심 대립 개념을 파악하자`}},
{id:3,type:`(A)(B)(C) 조합형`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`(A) significantly – (B) protects – (C) regenerated`,`(A) marginally – (B) protects – (C) abandoned`,`(A) significantly – (B) threatens – (C) regenerated`,`(A) marginally – (B) threatens – (C) abandoned`,`(A) significantly – (B) protects – (C) abandoned`],passage:`Circular fashion provides numerous benefits. First, extending the lifespan of fibers (A)[<b>significantly / marginally</b>] reduces textile waste, benefiting the environment. Second, circular processes utilize chemicals and materials safe for human health and the environment. This practice (B)[<b>protects / threatens</b>] the environment and consumer health. Third, materials are (C)[<b>regenerated / abandoned</b>] instead of being disposed of, which enables their long-term use.`,stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,det:{korean:`순환 패션은 수많은 이점을 제공합니다. 첫째, 섬유의 수명을 연장하면 섬유 폐기물이 (A)<b>상당히</b> 줄어 환경에 이익이 됩니다. 둘째, 순환 공정은 인체와 환경에 안전한 화학물질과 소재를 활용합니다. 이 관행은 환경과 소비자 건강을 (B)<b>보호합니다</b>. 셋째, 소재는 폐기되는 대신 (C)<b>재생</b>되어 장기적 사용이 가능합니다.`,analysis:`✅ ① (A) significantly: 폐기물이 '상당히' 줄어든다는 긍정적 맥락 / (B) protects: 안전한 소재가 건강을 '보호' / (C) regenerated: 폐기 대신 '재생'되어 장기 사용 가능 ❌ ②~⑤ 문맥과 논리적으로 불일치`,tip:`regenerate(재생하다) ↔ dispose of(폐기하다): 순환 패션의 핵심 원리`}},
{id:4,type:`문맥상 부적절한 어휘`,diff:`쉬움`,pts:4,fmt:"mc",ans:3,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`A circular economy is based on ①<u>limiting</u> waste, keeping resources and materials in use, and ②<u>reusing</u> them. In a circular model, we make, use, and reuse materials for as long as possible to ③<u>extract</u> their maximum value. Therefore, clothing and textiles are produced, used, and reused to ④<u>maximize</u> waste. It is a ⑤<u>renewable</u> approach to reduce the fashion industry's environmental impact.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <u>않은</u> 것은?`,det:{korean:`순환 경제는 폐기물을 ①<b>제한하고</b>, 자원과 소재를 사용 중인 상태로 유지하며, ②<b>재사용</b>하는 것에 기반합니다. 순환 모델에서 우리는 소재의 최대 가치를 ③<b>추출</b>하기 위해 가능한 한 오래 사용합니다. 따라서 의류와 섬유는 폐기물을 ④<b>최대화[→최소화(minimize)]</b>하기 위해 생산, 사용, 재사용됩니다. 이는 패션 산업의 환경적 영향을 줄이기 위한 ⑤<b>재생 가능한</b> 접근법입니다.`,analysis:`❌ ④ maximize(최대화하다) → minimize(최소화하다): 순환 패션의 목적은 폐기물을 '최소화'하는 것이므로 maximize는 부적절 ✅ ①②③⑤ 모두 문맥에 적절`,tip:`minimize(최소화하다) ↔ maximize(최대화하다): 반의어 쌍을 정확히 알아두자`}},
{id:5,type:`문맥상 부적절한 어휘`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`The rise of circular fashion is ①<u>facilitated</u> by new technology and ideas. Materials commonly used in clothing are not eco-friendly because they require ②<u>minimal</u> resources and often break down slowly. This creates a need for eco-friendly textile alternatives. Currently, companies are developing ③<u>recycled</u> fibers and fibers extracted from ④<u>agricultural</u> waste products like leaves, peels, and seeds. One company uses ⑤<u>nanotechnology</u> to make soft material from orange peels.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <u>않은</u> 것은?`,det:{korean:`순환 패션의 부상은 새로운 기술과 아이디어에 의해 ①<b>촉진됩니다</b>. 일반적으로 의류에 사용되는 소재는 ②<b>최소한의[→상당한(considerable)]</b> 자원을 필요로 하고 분해가 느리기 때문에 친환경적이지 않습니다. 현재 기업들은 ③<b>재활용</b> 섬유와 잎, 껍질, 씨앗 같은 ④<b>농업</b> 폐기물에서 추출한 섬유를 개발하고 있습니다. 한 회사는 ⑤<b>나노기술</b>을 사용하여 오렌지 껍질로 부드러운 소재를 만듭니다.`,analysis:`❌ ② minimal(최소한의) → considerable(상당한): 친환경적이지 않은 이유는 '상당한' 자원이 필요하기 때문이므로 minimal은 부적절 ✅ ①③④⑤ 모두 문맥에 적절`,tip:`considerable(상당한) ↔ minimal(최소한의): 원문의 맥락에서 자원이 많이 필요하다는 점에 주목`}},
{id:6,type:`문맥상 부적절한 어휘`,diff:`어려움`,pts:6,fmt:"mc",ans:4,ch:[`①`,`②`,`③`,`④`,`⑤`],passage:`Consumer activism involves consumers taking actions to ①<u>support</u> or protest certain products or companies based on their ethical, environmental, or social concerns. A boycott is a form of protest in which individuals ②<u>stop</u> purchasing products from a particular company to express their ③<u>objection</u> to its practices. In response to Greenpeace's campaign and growing public pressure, the company agreed to ④<u>cease</u> sourcing palm oil from companies linked with the destruction of forests and ⑤<u>reject</u> using sustainable palm oil by 2015.`,stem:`다음 글의 밑줄 친 낱말 중, 문맥상 낱말의 쓰임이 적절하지 <u>않은</u> 것은?`,det:{korean:`소비자 행동주의는 윤리적, 환경적, 사회적 관심사에 따라 특정 제품이나 기업을 ①<b>지지</b>하거나 항의하는 행동을 포함합니다. 불매운동은 개인이 기업의 관행에 대한 ③<b>반대</b>를 표현하기 위해 제품 구매를 ②<b>중단</b>하는 항의의 한 형태입니다. 그린피스의 캠페인과 여론 압력에 대응하여, 해당 기업은 산림 파괴와 관련된 업체로부터 팜유 ④<b>조달을 중단</b>하고 2015년까지 지속 가능한 팜유를 ⑤<b>거부[→사용하기로 약속(commit to)]</b>하기로 합의했습니다.`,analysis:`❌ ⑤ reject(거부하다) → commit to(~하기로 약속하다): 기업이 지속 가능한 팜유 사용을 '약속'한 것이므로 reject는 부적절 ✅ ①②③④ 모두 문맥에 적절`,tip:`commit to ~ing: ~하기로 약속/전념하다 ↔ reject: 거부하다`}},
{id:7,type:`빈칸 어휘 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`secondhand`,`expensive`,`imported`,`handmade`],passage:`Jessi is a fashion blogger who loves unique, vibrant clothes. But guess what? She does not buy new clothes. Instead, she buys them __________. You may think these clothes are old-fashioned, but by buying them, Jessi can try different styles.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`Jessi는 독특하고 화려한 옷을 좋아하는 패션 블로거입니다. 그런데 뭔지 아세요? 그녀는 새 옷을 사지 않습니다. 대신, 그녀는 옷을 <b>중고로</b> 삽니다. 여러분은 이런 옷이 구식이라고 생각할 수 있지만, 이렇게 사면 Jessi는 다양한 스타일을 시도할 수 있습니다.`,analysis:`✅ ① secondhand(중고의): 새 옷을 사지 않고 '대신(Instead)' 구매하므로 중고가 적절 ❌ ② expensive(비싼): 문맥과 무관 ❌ ③ imported(수입된): 근거 없음 ❌ ④ handmade(수제의): 근거 없음`,tip:`secondhand: 중고의, 간접적인 / buy ~ secondhand: 중고로 사다`}},
{id:8,type:`빈칸 어휘 완성`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`profits`,`designs`,`demands`,`emissions`],passage:`This 'make-to-order' method will cost more, but then less money will be spent on maintaining offline stores. And 3D technology will enable people to see how clothes will fit online without trying them on in a store. In the long run, innovation in production and sales will facilitate sustainable fashion and considerably reduce material waste and logistics __________.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`이 '주문 생산' 방식은 비용이 더 들겠지만, 오프라인 매장 유지에 들어가는 돈은 줄어들 것입니다. 3D 기술은 사람들이 매장에서 입어보지 않고도 온라인에서 옷이 어떻게 맞는지 볼 수 있게 해줄 것입니다. 장기적으로 생산과 판매의 혁신은 지속 가능한 패션을 촉진하고 소재 낭비와 물류 <b>배출량</b>을 상당히 줄일 것입니다.`,analysis:`✅ ④ emissions(배출량): 물류(logistics)와 자연스럽게 연결되며, 환경 영향을 줄인다는 맥락에 부합 ❌ ① profits(이윤): reduce와 어울리지 않는 맥락 ❌ ② designs(디자인): 문맥과 무관 ❌ ③ demands(수요): 물류와 어울리지 않음`,tip:`logistics emissions: 물류 배출량 — 운송 과정에서 발생하는 탄소 배출을 의미`}},
{id:9,type:`빈칸 어휘 완성`,diff:`어려움`,pts:6,fmt:"mc",ans:2,ch:[`profitable`,`reliable`,`accountable`,`visible`],passage:`If we want the fashion industry to adopt more sustainable practices, we must care about how clothes come to us. We should then demonstrate our concerns through what we buy. In this way, consumer activism empowers individuals to use their purchasing power and voices to promote positive change and hold businesses __________ for their actions.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`패션 산업이 더 지속 가능한 관행을 채택하길 원한다면, 옷이 어떻게 우리에게 오는지 관심을 가져야 합니다. 그런 다음 우리가 사는 것을 통해 우리의 관심사를 보여주어야 합니다. 이런 식으로 소비자 행동주의는 개인이 구매력과 목소리를 사용하여 긍정적 변화를 촉진하고 기업이 자신의 행동에 <b>책임을 지게</b> 할 수 있도록 합니다.`,analysis:`✅ ③ accountable(책임이 있는): hold ~ accountable for(~에 대해 책임을 묻다)는 소비자 행동주의의 핵심 목적 ❌ ① profitable(수익성 있는): 문맥과 무관 ❌ ② reliable(신뢰할 수 있는): 어울리지 않음 ❌ ④ visible(눈에 보이는): 문맥과 무관`,tip:`hold ~ accountable for: ~에 대해 책임을 묻다 — 소비자 행동주의의 핵심 표현`}},
{id:10,type:`동의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`ended`,`started`,`rejected`,`delayed`],passage:`In 2010, Greenpeace, an environmental support organization, <u>initiated</u> a campaign against a product of a food company, accusing the company of sourcing palm oil from companies involved in the destruction of forests. In response to Greenpeace's campaign and growing public pressure, the company agreed to cease sourcing palm oil from companies linked with the destruction of forests.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`2010년, 환경 지원 단체인 그린피스는 한 식품 회사의 제품에 대한 캠페인을 <b>시작했습니다(initiated)</b>. 해당 기업이 산림 파괴에 관련된 업체로부터 팜유를 조달한다고 비난했습니다. 그린피스의 캠페인과 커지는 여론 압력에 대응하여, 해당 기업은 산림 파괴와 관련된 업체로부터의 팜유 조달을 중단하기로 합의했습니다.`,analysis:`✅ ② started(시작했다): initiate는 '착수하다, 시작하다'라는 의미 ❌ ① ended(끝냈다): 반의어 ❌ ③ rejected(거절했다): 의미 다름 ❌ ④ delayed(미뤘다): 의미 다름`,tip:`initiate = start = begin = launch: 시작하다, 착수하다`}},
{id:11,type:`동의어 고르기`,diff:`쉬움`,pts:4,fmt:"mc",ans:0,ch:[`throwing away`,`wearing`,`purchasing`,`designing`],passage:`We can also reduce waste by <u>discarding</u> clothes responsibly. To be specific, we should buy only what we need and pass clothing on to someone who will wear it or to a thrift shop when discarding it.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`우리는 옷을 책임감 있게 <b>버림으로써(discarding)</b> 폐기물을 줄일 수도 있습니다. 구체적으로, 필요한 것만 사고 옷을 버릴 때는 입을 사람이나 중고 가게에 넘겨주어야 합니다.`,analysis:`✅ ① throwing away(버리기): discard는 '버리다, 폐기하다'라는 의미 ❌ ② wearing(입기): 의미 다름 ❌ ③ purchasing(구매하기): 의미 다름 ❌ ④ designing(디자인하기): 의미 다름`,tip:`discard = throw away = dispose of: 버리다, 폐기하다`}},
{id:12,type:`동의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:3,ch:[`disappeared`,`declined`,`collapsed`,`appeared`],passage:`Today, a new form of consumer activism, known as a buycott, has <u>emerged</u>. In a buycott, consumers actively support companies in accord with their values by consciously buying their products. In 2020, an ice cream brand gained attention for its support of climate action.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 가까운 것은?`,det:{korean:`오늘날, 바이콧(buycott)이라고 알려진 새로운 형태의 소비자 행동주의가 <b>등장했습니다(emerged)</b>. 바이콧에서는 소비자들이 자신의 가치관에 부합하는 기업의 제품을 의식적으로 구매하여 적극적으로 지지합니다. 2020년에 한 아이스크림 브랜드가 기후 행동 지지로 주목을 받았습니다.`,analysis:`✅ ④ appeared(나타나다): emerge는 '등장하다, 나타나다'라는 의미 ❌ ① disappeared(사라졌다): 반의어 ❌ ② declined(감소했다): 의미 다름 ❌ ③ collapsed(붕괴했다): 의미 다름`,tip:`emerge = appear = come into existence: 등장하다, 출현하다`}},
{id:13,type:`반의어 고르기`,diff:`보통`,pts:5,fmt:"mc",ans:2,ch:[`disturbing`,`shocking`,`comforting`,`frightening`],passage:`85% of textiles go into landfills, only 1% of the material is recycled, at least 500,000 tons of microfibers end up in the ocean. <u>Alarming</u> numbers like these will keep increasing if producers maintain the old system. It is clear that waste and pollution from the fashion industry must be reduced.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <u>먼</u> 것은?`,det:{korean:`섬유의 85%가 매립지로 가고, 소재의 1%만 재활용되며, 최소 50만 톤의 미세 섬유가 바다에 버려집니다. 이러한 <b>경각심을 주는(alarming)</b> 수치들은 생산자들이 기존 시스템을 유지하면 계속 증가할 것입니다. 패션 산업의 폐기물과 오염이 줄어야 한다는 것은 분명합니다.`,analysis:`✅ ③ comforting(위안이 되는): alarming(경각심을 주는)의 반의어 ❌ ① disturbing(불안하게 하는): 유사어 ❌ ② shocking(충격적인): 유사어 ❌ ④ frightening(두려운): 유사어`,tip:`alarming ≒ disturbing ≒ shocking ≒ frightening ↔ comforting(위안이 되는)`}},
{id:14,type:`반의어 고르기`,diff:`어려움`,pts:6,fmt:"mc",ans:1,ch:[`deliberately`,`unknowingly`,`intentionally`,`purposefully`],passage:`In a buycott, consumers actively support companies in accord with their values by <u>consciously</u> buying their products. Consumers who shared this value actively purchased the ice cream, enhancing its reputation and sales. This inspired other brands to consider their social and environmental responsibilities.`,stem:`다음 글의 밑줄 친 단어와 의미가 가장 <u>먼</u> 것은?`,det:{korean:`바이콧에서는 소비자들이 자신의 가치관에 부합하는 기업의 제품을 <b>의식적으로(consciously)</b> 구매하여 적극적으로 지지합니다. 이 가치를 공유한 소비자들은 적극적으로 아이스크림을 구매하여 명성과 매출을 높였습니다. 이것은 다른 브랜드들이 사회적, 환경적 책임을 고려하도록 영감을 주었습니다.`,analysis:`✅ ② unknowingly(무의식적으로): consciously(의식적으로)의 반의어 ❌ ① deliberately(의도적으로): 유사어 ❌ ③ intentionally(의도적으로): 유사어 ❌ ④ purposefully(목적의식적으로): 유사어`,tip:`consciously ≒ deliberately ≒ intentionally ≒ purposefully ↔ unknowingly(무의식적으로)`}},
{id:15,type:`다의어 문맥적 의미`,diff:`보통`,pts:5,fmt:"mc",ans:3,ch:[`① The factory will produce 500 new garments this week.`,`② This method helps produce less waste overall.`,`③ Local farms produce organic cotton for the fashion industry.`,`④ The officer asked him to produce a valid passport.`,`⑤ The new technology can produce eco-friendly fabrics.`],passage:`[본문 참고] These new fabrics <b>produce</b> less waste, last a long time, and break down easily. One company uses nanotechnology to make soft material from orange peels. Another makes fabrics from kapok tree seeds.`,stem:`다음 글의 밑줄 친 <b>produce</b>의 의미와 <u>다르게</u> 쓰인 것을 고르시오.`,det:{korean:`[본문] 이 새로운 직물은 폐기물을 덜 <b>만들어내고(produce)</b>, 오래가며, 쉽게 분해됩니다. 한 회사는 나노기술로 오렌지 껍질에서 부드러운 소재를 만듭니다. 또 다른 회사는 카폭 나무 씨앗에서 직물을 만듭니다.`,analysis:`✅ ④ produce a valid passport: '여권을 제시하다'라는 뜻으로, 나머지 넷의 '생산하다/만들어내다'와 다름 ❌ ①②③⑤ 모두 '생산하다/만들어내다'의 의미`,tip:`produce: ① 생산하다, 만들어내다 ② (문서 등을) 제시하다 — 다의어로 출제 빈도 높음`}},
{id:16,type:`영영풀이 매칭`,diff:`보통`,pts:5,fmt:"mc",ans:1,ch:[`activism`,`boycott`,`buycott`,`campaign`],passage:`<i>the act of refusing to buy products or services from a company or country as a way of protesting against its policies or actions</i><br><br>[참고] Consumer activism involves consumers taking actions to support or protest certain products or companies based on their ethical, environmental, or social concerns. A __________ is a form of protest in which individuals stop purchasing products from a particular company to express their objection to its practices.`,stem:`다음 영영풀이에 해당하는 단어로 가장 적절한 것은?`,det:{korean:`<b>영영풀이:</b> 기업이나 국가의 정책 또는 행동에 항의하는 방법으로 해당 기업의 제품이나 서비스 구매를 거부하는 행위`,analysis:`✅ ② boycott(불매운동): 영영풀이의 'refusing to buy'와 'protesting'이 boycott의 정의에 정확히 부합 ❌ ① activism(행동주의): 더 넓은 개념 ❌ ③ buycott(바이콧): 반대로 '구매'하여 지지하는 것 ❌ ④ campaign(캠페인): 조직적 활동 전반`,tip:`boycott(불매운동) ↔ buycott(구매 지지 운동): 소비자 행동주의의 두 가지 형태`}},
{id:17,type:`어형 변환 (서술형)`,diff:`쉬움`,pts:4,fmt:"written",wa:`creating`,accept:[`creating`],passage:`Jessi is a fashion blogger who loves unique, vibrant clothes. She does not buy new clothes. Instead, she buys them secondhand. Jessi's clothing habits are not just about (create) __________ a style; they are about saving the Earth.`,stem:`다음 글의 괄호 안에 주어진 단어를 문맥에 맞게 변형하여 쓰시오.`,det:{korean:`Jessi는 독특하고 화려한 옷을 좋아하는 패션 블로거입니다. 그녀는 새 옷을 사지 않습니다. 대신 중고로 삽니다. Jessi의 의류 습관은 단지 스타일을 <b>만드는(creating)</b> 것에 관한 것이 아니라 지구를 구하는 것에 관한 것입니다.`,analysis:`✅ creating: 전치사 about 뒤에 동명사(~ing)가 와야 하므로 create → creating`,tip:`about + 동명사(~ing): 전치사 뒤에는 동명사가 온다`}},
{id:18,type:`어형 변환 (서술형)`,diff:`보통`,pts:5,fmt:"written",wa:`destruction`,accept:[`destruction`],passage:`A boycott is a form of protest in which individuals stop purchasing products from a particular company to express their objection to its practices. In 2010, Greenpeace initiated a campaign against a product of a food company. In response to Greenpeace's campaign and growing public pressure, the company agreed to cease sourcing palm oil from companies linked with the (destroy) __________ of forests.`,stem:`다음 글의 괄호 안에 주어진 단어를 문맥에 맞게 변형하여 쓰시오.`,det:{korean:`불매운동은 개인이 기업의 관행에 대한 반대를 표현하기 위해 특정 기업의 제품 구매를 중단하는 항의의 한 형태입니다. 2010년 그린피스는 한 식품 회사의 제품에 대한 캠페인을 시작했습니다. 그린피스의 캠페인과 커지는 여론 압력에 대응하여, 해당 기업은 산림 <b>파괴(destruction)</b>와 관련된 업체로부터 팜유 조달을 중단하기로 합의했습니다.`,analysis:`✅ destruction: 관사 the와 전치사 of 사이에 명사가 필요하므로 destroy → destruction`,tip:`the + 명사 + of: 관사와 전치사 사이에는 명사형이 온다 (destroy → destruction)`}},
{id:19,type:`빈칸 문맥 완성`,diff:`쉬움`,pts:4,fmt:"mc",ans:3,ch:[`suddenly`,`rapidly`,`temporarily`,`gradually`],passage:`Circular fashion will not solve every problem in the fashion industry overnight. However, small steps in the right direction are better than nothing. Keeping things in the supply chain for as many cycles as possible is really important. By making small changes to our clothing habits today, the fashion industry will __________ improve.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`순환 패션이 패션 산업의 모든 문제를 하룻밤 사이에 해결하지는 못할 것입니다. 그러나 올바른 방향으로의 작은 걸음이 아무것도 하지 않는 것보다 낫습니다. 공급망에서 가능한 한 많은 순환을 유지하는 것이 정말 중요합니다. 오늘 우리의 의류 습관에 작은 변화를 줌으로써, 패션 산업은 <b>점진적으로</b> 개선될 것입니다.`,analysis:`✅ ④ gradually(점진적으로): 'small steps', 'small changes' 등의 단서로 점진적 변화가 적절 ❌ ① suddenly(갑자기): 문맥과 반대 ❌ ② rapidly(빠르게): 'overnight'에 해결 못 한다는 맥락과 불일치 ❌ ③ temporarily(일시적으로): 문맥과 무관`,tip:`gradually(점진적으로): small steps, small changes와 함께 자주 쓰이는 부사`}},
{id:20,type:`빈칸 문맥 완성`,diff:`어려움`,pts:6,fmt:"mc",ans:0,ch:[`inspired`,`forced`,`prevented`,`allowed`],passage:`In 2020, an ice cream brand gained attention for its support of climate action. Consumers who shared this value actively purchased the ice cream, enhancing its reputation and sales. This __________ other brands to consider their social and environmental responsibilities.`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,det:{korean:`2020년에 한 아이스크림 브랜드가 기후 행동 지지로 주목을 받았습니다. 이 가치를 공유한 소비자들은 적극적으로 아이스크림을 구매하여 명성과 매출을 높였습니다. 이것은 다른 브랜드들이 사회적, 환경적 책임을 고려하도록 <b>영감을 주었습니다</b>.`,analysis:`✅ ① inspired(영감을 주었다): 성공 사례가 다른 브랜드에 '영감'을 준다는 긍정적 맥락 ❌ ② forced(강요했다): 너무 강압적 ❌ ③ prevented(막았다): 문맥과 반대 ❌ ④ allowed(허락했다): 뉘앙스 부적절`,tip:`inspire A to B: A가 B하도록 영감을 주다 — 긍정적 영향을 나타내는 표현`}}
];


let S={cur:0,ans:new Array(EI.totalQ).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,levelIcon:getLevel(r.score).icon});if(h.length>10)h.splice(0,h.length-10);try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 시험 기록이 없습니다.</p>';else p.innerHTML=h.slice().reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time} · ${r.grade}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.levelIcon} ${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'전설',icon:'🐉',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'챔피언',icon:'🏆',range:'90~94',msg:'최상위권!'};if(s>=80)return{name:'다이아몬드',icon:'💎',range:'80~89',msg:'통과! 취약 유형만 복습하면 최상위!'};if(s>=70)return{name:'빛나는별',icon:'🌟',range:'70~79',msg:'통과까지 조금만 더!'};if(s>=60)return{name:'별',icon:'⭐',range:'60~69',msg:'기본기 탄탄! 본문 복습 후 재도전!'};if(s>=40)return{name:'나무',icon:'🌲',range:'40~59',msg:'성장 중!'};return{name:'새싹',icon:'🌱',range:'0~39',msg:'단어 암기부터 시작!'};}
function fmtTime(s){return Math.floor(s/60)+'분 '+(s%60)+'초';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(EI.totalQ).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
const typeTag={'(A)(B)(C) 조합형':'tag-combo','문맥상 부적절한 어휘':'tag-wrong','빈칸 어휘 완성':'tag-blank','동의어 고르기':'tag-syn','반의어 고르기':'tag-ant','다의어 문맥적 의미':'tag-poly','영영풀이 매칭':'tag-eng','어형 변환 (서술형)':'tag-morph','빈칸 문맥 완성':'tag-ctx'};
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc=typeTag[q.type]||'';h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body">`;if(q.passage)h+=`<div class="q-passage">${q.passage}</div>`;h+=`<div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){const mk=q.ch.length===5?'①②③④⑤':'①②③④';h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${mk[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:EI.totalQ},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('answered',S.ans[i]!==null));}
function scrollToQ(i){if(i<0||i>=EI.totalQ)return;S.cur=i;document.getElementById('qc-'+i).scrollIntoView({behavior:'smooth',block:'center'});}
function sel(qi,ci){document.querySelectorAll('.choice-btn[data-q="'+qi+'"]').forEach(b=>b.classList.remove('selected'));document.querySelector('.choice-btn[data-q="'+qi+'"][data-c="'+ci+'"]').classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById('w-'+qi).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase();if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase());if(!ok&&q.wa)ok=u===q.wa.toLowerCase();}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok});});return{score,correct,wrong,unanswered,details};}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100);const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={total:0,ok:0};typeMap[t].total++;if(d.ok)typeMap[t].ok++;});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.ok===v.total).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.ok<v.total).map(([k])=>k);let h='';
h+=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/${EI.total}</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong></span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교 / 학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 / ${EI.total}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간 / 통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.ok/d.total*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type.replace(/\(.+?\)/g,'').trim().slice(0,6)}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});
if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t.slice(0,8)}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t.slice(0,8)}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽!</h4><p>다른 단원도 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>틀린 유형 집중 복습으로 만점까지!</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기부터!</h4><p>지문 해석을 완벽히 이해한 뒤 재도전!</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="copyResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유하기</span></button><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);margin-left:8px">클릭하여 펼치기</span></div>`;r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const mk=d.q.ch&&d.q.ch.length===5?'①②③④⑤':'①②③④';const ua=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const ca=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;const open=!d.ok;h+=`<div class="rev-card"><div class="rev-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.rev-icon').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><span style="font-weight:800">${icon} ${d.q.id}번</span><span style="font-size:12px;color:var(--tm)">[${d.q.type.slice(0,6)}] ${d.q.pts}점</span><span class="rev-icon">▼</span></div><div class="rev-body${open?' open':''}"><div style="display:flex;gap:10px;margin-bottom:14px"><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;${d.ok?'background:var(--gl);color:var(--g)':'background:var(--rl);color:var(--r)'}"><div style="font-size:11px;opacity:.7">내 답</div>${ua}</div><div style="flex:1;padding:10px;border-radius:var(--rxs);text-align:center;font-weight:700;background:var(--gl);color:var(--g)"><div style="font-size:11px;opacity:.7">정답</div>${ca}</div></div><div class="expl-tag ans">🇰🇷 해석</div><div class="expl-box ans-b">${d.q.det.korean}</div><div class="expl-tag tip">📋 분석</div><div class="expl-box">${d.q.det.analysis}</div><div class="expl-tag tip">💡 팁</div><div class="expl-box tip-b">${d.q.det.tip}</div></div></div>`;});h+=`</div></div>`;document.getElementById('resultScreen').innerHTML=h;}
function copyResult(){const r=grade(),lv=getLevel(r.score),pct=Math.round(r.score/EI.total*100),nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,elapsed=Math.floor((Date.now()-S.start)/1000),pass=r.score>=80;const mk5='①②③④⑤',mk4='①②③④';const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,w:[]};typeMap[t].t++;if(d.ok)typeMap[t].o++;else typeMap[t].w.push(d.q.id);});
let txt=`📝 온라인단어 TEST 상세 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n👤 ${nm}${sc?' · '+sc:''} · ${gr}\n📅 ${new Date().toLocaleDateString('ko-KR')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🏆 점수: ${r.score} / ${EI.total}점 (${pct}%)\n${lv.icon} 레벨: ${lv.name}\n${pass?'🎉 통과!':'📚 미통과'}\n\n✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n⏱️ 소요시간: ${fmtTime(elapsed)}\n\n━━ 📊 문항별 결과 ━━\n`;
r.details.forEach(d=>{const mark=d.ok?'✅':'❌';const mk=d.q.ch&&d.q.ch.length===5?mk5:mk4;const ans=d.q.fmt==='mc'?(d.ans!==null?mk[d.ans]:'미응답'):(d.ans||'미응답');const cor=d.q.fmt==='mc'?mk[d.q.ans]:d.q.wa;txt+=`${mark} ${d.q.id}번 [${d.q.type.slice(0,6)}] ${d.q.pts}점 — 내답:${ans} 정답:${cor}\n`;});
txt+=`\n━━ 📈 유형별 분석 ━━\n`;Object.entries(typeMap).forEach(([t,v])=>{const p=Math.round(v.o/v.t*100);const ic=p===100?'🟢':(p>0?'🟡':'🔴');txt+=`${ic} ${t.slice(0,6)}: ${v.o}/${v.t} (${p}%)`;if(v.w.length)txt+=` ← 틀린:${v.w.join(',')}번`;txt+=`\n`;});
txt+=`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━\n#온라인단어TEST #영어내신`;
navigator.clipboard.writeText(txt).then(()=>toast('📋 상세 결과가 복사되었습니다!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('📋 복사되었습니다!');}catch(e){toast('복사 실패');}document.body.removeChild(ta);});}
function retake(){startExam();}
function goHome(){showScreen('startScreen');updateHCount();}
window.addEventListener('beforeunload',e=>{if(S.ti){e.preventDefault();e.returnValue='';}});

</script>
</body>
</html>
