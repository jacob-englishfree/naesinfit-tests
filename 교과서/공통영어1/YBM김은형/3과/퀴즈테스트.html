<script>
const EI={"subject":"공통영어1","pub":"YBM(김은형)","lesson":"3과","title":"Why Fashion Needs to Be More Sustainable","total":100,"time":1200,"histKey":"quizH_YBM_3과_20","qCount":20};

const Q = [
{
  id: 1, type: '어법', diff: '보통', pts: 5, fmt: 'mc',
  note: 'Jessi의 의류 습관',
  passage: `You may think secondhand clothes are old-fashioned, but by <u>ⓐ buying</u> them, Jessi can try different styles. She also does not get too <u>ⓑ attaching</u> to any style or brand because there is always another exciting outfit <u>ⓒ waiting</u> to be discovered. Jessi's clothing habits are not just about <u>ⓓ creating</u> a style; they are about <u>ⓔ saving</u> the Earth. The reason is that her actions help reduce the production and consumption of clothes.`,
  stem: `다음 글의 밑줄 친 ⓐ~ⓔ 중, 어법상 어색한 것은?`,
  ch: ['ⓐ','ⓑ','ⓒ','ⓓ','ⓔ'],
  ans: 1,
  det: {
    ref: `[원문] She also does not get too <b>attaching</b> to any style or brand → [해석] 그녀는 또한 어떤 스타일이나 브랜드에 너무 <b>집착하지 않는다</b>. 여기서 get은 '~하게 되다'라는 뜻의 연결동사(linking verb)로, 뒤에 형용사 보어가 와야 합니다. 현재분사 attaching은 형용사 역할을 하지 못하므로, 과거분사이자 형용사인 <b>attached</b>가 올바른 형태입니다. 'get attached to ~'는 '~에 애착을 갖게 되다'라는 관용 표현입니다.`,
    correct: `ⓐ buying: 전치사 by 뒤에 동명사(-ing)가 오는 것은 어법에 맞음 ✅<br>ⓑ attaching: get + 과거분사(attached)로 '~하게 되다' 표현 → attaching ❌ → <b>attached</b>로 고쳐야 함<br>ⓒ waiting: outfit을 수식하는 현재분사(능동적 의미: 기다리고 있는 옷) ✅<br>ⓓ creating: 전치사 about 뒤에 동명사(-ing) → 올바름 ✅<br>ⓔ saving: 전치사 about 뒤에 동명사(-ing) → 올바름 ✅`,
    wrongs: [],
    tip: `🔑 get + 과거분사: get attached(애착을 갖다), get married(결혼하다), get tired(피곤해지다), get excited(흥분하다). 'get + 현재분사'는 비문. 유의어: attached(≈ connected, devoted) ↔ detached(무관심한). 풀이 전략: get 뒤에 -ing가 왔다면 형용사(과거분사) 자리가 아닌지 반드시 확인!`
  }
},
{
  id: 2, type: '어법', diff: '어려움', pts: 6, fmt: 'mc',
  note: '선형 패션의 문제점',
  passage: `Worth over $3 trillion and (A) [<b>making</b> / <b>made</b>] up 2% of the world's GDP, the fashion industry today has an almost entirely linear approach. ... 85% of textiles go into landfills, only 1% of the material (B) [<b>is recycled</b> / <b>recycles</b>], ... Alarming numbers like these will keep (C) [<b>increasing</b> / <b>to increase</b>] if producers maintain the old system.`,
  stem: `다음 글의 (A), (B), (C)의 각 네모 안에서 어법에 맞는 표현으로 가장 적절한 것은?`,
  ch: ['making – is recycled – increasing','made – is recycled – increasing','making – recycles – increasing','making – is recycled – to increase','made – recycles – to increase'],
  ans: 0,
  det: {
    ref: `[원문] (A) Worth over $3 trillion and <b>making</b> up 2% of the world's GDP → [해석] 3조 달러 이상의 가치가 있고, 세계 GDP의 2%를 <b>차지하면서</b>. 분사구문의 주어는 the fashion industry(패션 산업)이며, 산업이 GDP를 '구성하는' 것이므로 능동의 현재분사 making이 적절합니다.<br>(B) only 1% of the material <b>is recycled</b> → [해석] 재료의 1%만이 <b>재활용된다</b>. material이 재활용 '되는' 것이므로 수동태 is recycled가 적절합니다.<br>(C) will keep <b>increasing</b> → [해석] 계속 <b>증가할 것이다</b>. keep + v-ing(계속 ~하다) 구문이므로 동명사 increasing이 적절합니다.`,
    correct: `① making – is recycled – increasing: (A) 능동 분사구문 ✅ (B) 수동태 ✅ (C) keep + v-ing ✅ → <b>정답</b><br>② made – is recycled – increasing: (A) 과거분사(수동)는 부적절 ❌ 산업이 GDP를 '구성하는' 것이므로 능동<br>③ making – recycles – increasing: (B) 주어 1% of the material은 재활용 '되는' 대상 → 능동태 부적절 ❌<br>④ making – is recycled – to increase: (C) keep 뒤에 to부정사 불가 ❌ → keep + v-ing<br>⑤ made – recycles – to increase: (A)(B)(C) 모두 부적절 ❌`,
    wrongs: [],
    tip: `🔑 분사구문 능동/수동 판별: 주어가 동작의 주체면 -ing(능동), 대상이면 p.p.(수동). keep + v-ing(계속 ~하다) cf. keep + O + from v-ing(~하지 못하게 하다). make up(≈ constitute, comprise, account for): ~을 구성하다/차지하다.`
  }
},
{
  id: 3, type: '어법', diff: '어려움', pts: 6, fmt: 'mc',
  note: '친환경 섬유 개발',
  passage: `Materials <u>ⓐ commonly</u> used in clothing are not eco-friendly because they require considerable resources and often break down slowly. Currently, companies are developing recycled fibers and fibers <u>ⓑ extracting</u> from agricultural waste products like leaves, peels, and seeds. One company uses nanotechnology to make soft material from orange peels. The trees grow well in poor soil without <u>ⓒ needing</u> much water. These new fabrics produce less waste, last a long time, and break down <u>ⓓ easily</u>.`,
  stem: `다음 글의 밑줄 친 ⓐ~ⓓ 중, 어법상 어색한 것은?`,
  ch: ['ⓐ','ⓑ','ⓒ','ⓓ'],
  ans: 1,
  det: {
    ref: `[원문] fibers <b>extracting</b> from agricultural waste products → [해석] 농업 폐기물에서 <b>추출된</b> 섬유. fibers(섬유)는 추출 '되는' 대상이므로 수동의 의미를 가진 과거분사 <b>extracted</b>가 와야 합니다. 현재분사 extracting은 능동의 의미('추출하는')로, 주어가 스스로 추출 행위를 하는 것이 아니므로 부적절합니다.`,
    correct: `ⓐ commonly: 과거분사 used를 수식하는 부사 → 올바름 ✅ ('흔히 사용되는 재료')<br>ⓑ extracting: fibers를 수식하는 분사로, fibers가 추출 '되는' 대상 → 수동의 과거분사 extracted가 필요 ❌ → <b>extracted</b>로 고쳐야 함<br>ⓒ needing: 전치사 without 뒤에 동명사(-ing) → 올바름 ✅ ('많은 물을 필요로 하지 않고')<br>ⓓ easily: 동사 break down을 수식하는 부사 → 올바름 ✅ ('쉽게 분해된다')`,
    wrongs: [],
    tip: `🔑 명사 뒤 분사 수식 판별법: 명사가 동작의 주체 → 현재분사(-ing), 명사가 동작의 대상 → 과거분사(p.p.). fibers extracted from ~(추출된 섬유) cf. fibers absorbing water(물을 흡수하는 섬유). extract(≈ derive, obtain) ↔ insert(삽입하다).`
  }
},
{
  id: 4, type: '어휘', diff: '보통', pts: 5, fmt: 'mc',
  note: '순환 경제의 원리',
  passage: `A circular economy is based on (A) [<b>limiting</b> / <b>expanding</b>] waste, keeping resources and materials in use, and reusing them. In a circular model, we make, use, and reuse materials for as long as possible to extract their (B) [<b>maximum</b> / <b>minimum</b>] value. Therefore, clothing and textiles are produced, used, and reused to (C) [<b>minimize</b> / <b>maximize</b>] waste.`,
  stem: `다음 글의 (A), (B), (C)의 각 네모 안에서 문맥에 맞는 낱말로 가장 적절한 것은?`,
  ch: ['limiting – maximum – minimize','expanding – maximum – minimize','limiting – minimum – minimize','limiting – maximum – maximize','expanding – minimum – maximize'],
  ans: 0,
  det: {
    ref: `[원문] A circular economy is based on <b>limiting</b> waste → [해석] 순환 경제는 폐기물을 <b>제한하는</b> 것에 기반한다. 순환 경제의 핵심은 폐기물 감소이므로 limiting(제한하는)이 적절합니다.<br>[원문] to extract their <b>maximum</b> value → [해석] <b>최대</b> 가치를 추출하기 위해. 가능한 한 오래 사용하여 최대 가치를 뽑아내는 것이므로 maximum이 적절합니다.<br>[원문] to <b>minimize</b> waste → [해석] 폐기물을 <b>최소화</b>하기 위해. 순환 패션의 목적은 폐기물 최소화이므로 minimize가 적절합니다.`,
    correct: `① limiting – maximum – minimize: 폐기물 '제한' + '최대' 가치 추출 + 폐기물 '최소화' → 문맥에 부합 ✅ <b>정답</b><br>② expanding – maximum – minimize: (A) 폐기물을 '확장'하는 것은 순환 경제와 모순 ❌<br>③ limiting – minimum – minimize: (B) '최소' 가치를 추출? → 가능한 한 오래 사용하므로 최대 가치 추출이 맞음 ❌<br>④ limiting – maximum – maximize: (C) 폐기물을 '최대화'? → 순환 경제의 목적과 정반대 ❌<br>⑤ expanding – minimum – maximize: (A)(B)(C) 모두 문맥과 반대 ❌`,
    wrongs: [],
    tip: `🔑 limit(≈ restrict, reduce, curb) ↔ expand(확대하다). maximize(≈ optimize, increase) ↔ minimize(최소화하다). 순환 경제 핵심 키워드: limit waste, maximize value, minimize waste. 문맥의 논리 흐름(폐기물 감소)을 파악하면 정답을 빠르게 찾을 수 있습니다.`
  }
},
{
  id: 5, type: '어휘', diff: '어려움', pts: 6, fmt: 'mc',
  note: '소비자 행동주의',
  passage: `Consumer activism involves consumers taking actions to support or ①<u>protest</u> certain products or companies based on their ethical concerns. A boycott is a form of protest in which individuals stop ②<u>purchasing</u> products from a particular company to express their ③<u>objection</u> to its practices. ... In response to Greenpeace's campaign and growing public pressure, the company agreed to ④<u>cease</u> sourcing palm oil from companies linked with the destruction of forests and commit to using ⑤<u>unsustainable</u> palm oil by 2015.`,
  stem: `다음 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 적절하지 않은 것은?`,
  ch: ['①','②','③','④','⑤'],
  ans: 4,
  det: {
    ref: `[원문] commit to using <b>unsustainable</b> palm oil by 2015 → [해석] 2015년까지 <b>지속 불가능한</b> 팜유를 사용하기로 약속했다. 그린피스의 캠페인에 대한 대응으로 회사가 삼림 파괴 관련 팜유 조달을 중단하고 '지속 가능한(sustainable)' 팜유를 사용하기로 약속한 것이므로, unsustainable은 문맥과 반대입니다. <b>sustainable</b>(지속 가능한)로 바꿔야 합니다.`,
    correct: `① protest: 소비자 행동주의에서 '항의하다'라는 의미로 문맥에 적절 ✅<br>② purchasing: 보이콧에서 '구매를 중단하다'이므로 purchasing은 적절 ✅<br>③ objection: 회사의 관행에 대한 '반대/이의'를 표현 → 문맥에 적절 ✅<br>④ cease: '중단하다'의 의미로, 팜유 조달을 중단 → 문맥에 적절 ✅<br>⑤ unsustainable: 삼림 파괴 중단 후 '지속 불가능한' 팜유 사용? → 문맥과 반대 ❌ → <b>sustainable</b>이 적절`,
    wrongs: [],
    tip: `🔑 sustainable(지속 가능한, ≈ eco-friendly, renewable) ↔ unsustainable(지속 불가능한). cease(≈ stop, halt, discontinue) ↔ commence(시작하다). commit to + v-ing(~하기로 약속하다/전념하다). 문맥 논리: 환경 캠페인 → 삼림 파괴 중단 → 지속 가능한 팜유 사용이 자연스러운 흐름.`
  }
},
{
  id: 6, type: '어휘', diff: '보통', pts: 5, fmt: 'mc',
  note: '순환 패션의 이점',
  passage: `Circular fashion provides ①<u>numerous</u> benefits. First, extending the lifespan of fibers significantly ②<u>reduces</u> textile waste, benefiting the environment. Second, circular processes utilize chemicals and materials ③<u>harmful</u> for human health and the environment. This practice ④<u>protects</u> the environment and consumer health. Third, materials are ⑤<u>regenerated</u> instead of being disposed of, which enables their long-term use.`,
  stem: `다음 글의 밑줄 친 ①~⑤ 중, 문맥상 낱말의 쓰임이 적절하지 않은 것은?`,
  ch: ['①','②','③','④','⑤'],
  ans: 2,
  det: {
    ref: `[원문] circular processes utilize chemicals and materials <b>harmful</b> for human health → [해석] 순환 공정은 인간 건강에 <b>유해한</b> 화학물질과 재료를 사용한다. 순환 패션의 '이점'을 설명하는 문맥에서, 유해한 물질을 사용한다는 것은 모순입니다. 원문은 <b>safe</b>(안전한)이며, 이것이 환경과 건강을 보호(protects)한다는 다음 문장과 자연스럽게 연결됩니다.`,
    correct: `① numerous: '수많은, 다수의' 이점 → 문맥에 적절 ✅<br>② reduces: 섬유의 수명 연장이 폐기물을 '줄인다' → 문맥에 적절 ✅<br>③ harmful: '유해한' → 순환 패션의 이점을 설명하는데 유해한 물질 사용? ❌ → <b>safe</b>(안전한)로 바꿔야 함<br>④ protects: 이 관행이 환경과 소비자 건강을 '보호한다' → 문맥에 적절 ✅<br>⑤ regenerated: 재료가 폐기 대신 '재생된다' → 문맥에 적절 ✅`,
    wrongs: [],
    tip: `🔑 safe(안전한, ≈ harmless, non-toxic) ↔ harmful(유해한, ≈ dangerous, detrimental). regenerate(≈ renew, restore, recycle) ↔ dispose of(폐기하다). 풀이 전략: 글의 전체 논리 흐름(순환 패션의 '이점')과 바로 다음 문장(protects)을 연결하면 harmful이 부적절함을 알 수 있음.`
  }
},
{
  id: 7, type: '대의', diff: '보통', pts: 5, fmt: 'mc',
  note: '순환 패션의 필요성',
  passage: `Due to linear fashion, the fashion industry negatively affects the environment. 85% of textiles go into landfills, only 1% of the material is recycled, at least 500,000 tons of microfibers end up in the ocean, and 93 billion cubic meters of water is required for textile production annually. Alarming numbers like these will keep increasing if producers maintain the old system. It is clear that waste and pollution from the fashion industry must be reduced. Linear fashion must change, and this could happen through circular fashion.`,
  stem: `다음 글의 주제로 가장 적절한 것은?`,
  ch: ['the need to shift from linear to circular fashion to reduce environmental damage','the economic benefits of investing in the global fashion industry','the technological advances making textile production cheaper','the role of consumers in promoting fast fashion trends','the history of how the fashion industry became a trillion-dollar business'],
  ans: 0,
  det: {
    ref: `[원문] Linear fashion must change, and this could happen through circular fashion. → [해석] 선형 패션은 반드시 바뀌어야 하며, 이것은 순환 패션을 통해 가능하다. 이 글은 선형 패션이 환경에 미치는 부정적 영향(매립, 미세 플라스틱, 수자원 소비)을 제시하고, 순환 패션으로의 전환이 필요하다고 주장합니다.`,
    correct: `① 환경 피해를 줄이기 위해 선형에서 순환 패션으로 전환할 필요성 → 글의 핵심 주제와 정확히 일치 ✅ <b>정답</b><br>② 글로벌 패션 산업 투자의 경제적 이점 → 경제적 이점이 아닌 환경 문제가 주제 ❌<br>③ 섬유 생산을 저렴하게 만드는 기술 발전 → 기술 발전은 핵심 주제가 아님 ❌<br>④ 패스트 패션 트렌드 촉진에서 소비자의 역할 → 패스트 패션 촉진이 아닌 순환 패션 전환이 주제 ❌<br>⑤ 패션 산업이 조 달러 산업이 된 역사 → 역사가 아닌 환경 문제와 해결책이 주제 ❌`,
    wrongs: [],
    tip: `🔑 주제 파악 전략: 글의 마지막 문장에 핵심 주장이 나오는 경우가 많음. 'must change' + 'through circular fashion'이 글의 핵심 메시지. linear(선형의, ≈ straight, one-way) ↔ circular(순환적인). shift(≈ transition, change, convert): 전환하다.`
  }
},
{
  id: 8, type: '대의', diff: '보통', pts: 5, fmt: 'mc',
  note: '순환 패션의 이점과 기술',
  passage: `Circular fashion is inspired by the principles of a circular economy and sustainable development. A circular economy is based on limiting waste, keeping resources and materials in use, and reusing them. ... Circular fashion provides numerous benefits. First, extending the lifespan of fibers significantly reduces textile waste. Second, circular processes utilize chemicals and materials safe for human health. Third, materials are regenerated instead of being disposed of, which enables their long-term use.`,
  stem: `다음 글의 제목으로 가장 적절한 것은?`,
  ch: ['Circular Fashion: A Sustainable Answer to the Textile Crisis','How Fast Fashion Dominates the Global Market','The Economic Cost of Recycling Old Clothes','Why Consumers Prefer Cheap Clothing Over Quality','The History of Textile Manufacturing Techniques'],
  ans: 0,
  det: {
    ref: `[원문] Circular fashion is inspired by the principles of a circular economy and sustainable development. → [해석] 순환 패션은 순환 경제와 지속 가능한 발전의 원칙에서 영감을 받았다. 이 글은 순환 패션의 정의, 원리, 그리고 환경·건강·자원 측면의 이점을 설명하고 있으므로, '섬유 위기에 대한 지속 가능한 해답으로서의 순환 패션'이 가장 적절한 제목입니다.`,
    correct: `① Circular Fashion: A Sustainable Answer to the Textile Crisis → 순환 패션의 정의+이점을 포괄하는 제목 ✅ <b>정답</b><br>② How Fast Fashion Dominates the Global Market → 패스트 패션이 아닌 순환 패션이 주제 ❌<br>③ The Economic Cost of Recycling Old Clothes → 재활용의 경제적 비용은 언급되지 않음 ❌<br>④ Why Consumers Prefer Cheap Clothing Over Quality → 소비자의 저가 의류 선호는 언급되지 않음 ❌<br>⑤ The History of Textile Manufacturing Techniques → 역사가 아닌 현재/미래의 지속 가능한 패션이 주제 ❌`,
    wrongs: [],
    tip: `🔑 제목 선택 전략: 제목은 글 전체를 포괄해야 함. 핵심 키워드(circular fashion, sustainable, benefits)가 모두 포함된 선지를 고르기. crisis(≈ problem, issue) ↔ solution(해결책). inspire(≈ motivate, influence): 영감을 주다.`
  }
},
{
  id: 9, type: '대의', diff: '어려움', pts: 6, fmt: 'mc',
  note: '소비자와 지속 가능한 패션',
  passage: `Another key to making fashion sustainable is the consumer: us. If we want the fashion industry to adopt more sustainable practices, we must care about how clothes come to us. We should then demonstrate our concerns through what we buy. The market, of course, will respond. We can also reduce waste by discarding clothes responsibly. ... Circular fashion will not solve every problem in the fashion industry overnight. However, small steps in the right direction are better than nothing.`,
  stem: `다음 글의 요지로 가장 적절한 것은?`,
  ch: ['소비자의 의식적인 구매와 책임 있는 폐기가 패션 산업의 지속 가능성을 이끌 수 있다.','패션 기업은 소비자의 요구와 무관하게 자체적으로 환경 정책을 수립해야 한다.','순환 패션은 모든 환경 문제를 즉시 해결할 수 있는 완벽한 해결책이다.','의류를 자주 교체하는 것이 경제 성장에 긍정적인 영향을 미친다.','지속 가능한 패션을 위해서는 정부의 강력한 규제가 가장 중요하다.'],
  ans: 0,
  det: {
    ref: `[원문] We should then demonstrate our concerns through what we buy. → [해석] 우리는 구매를 통해 우리의 관심을 보여주어야 한다. [원문] small steps in the right direction are better than nothing → [해석] 올바른 방향의 작은 걸음이 아무것도 하지 않는 것보다 낫다. 이 글은 소비자가 의식적인 구매와 책임 있는 폐기를 통해 패션 산업의 변화를 이끌 수 있다고 주장합니다.`,
    correct: `① 소비자의 의식적 구매+책임 있는 폐기 → 지속 가능성 → 글의 핵심 요지와 일치 ✅ <b>정답</b><br>② 기업이 소비자와 무관하게 정책 수립 → 글은 소비자의 역할을 강조하며 시장이 반응한다고 함 ❌<br>③ 순환 패션이 모든 문제를 즉시 해결 → 글에서 'will not solve every problem overnight'라고 명시 ❌<br>④ 의류 자주 교체가 경제 성장에 긍정적 → 글의 주장과 정반대 ❌<br>⑤ 정부 규제가 가장 중요 → 정부 규제는 전혀 언급되지 않음 ❌`,
    wrongs: [],
    tip: `🔑 요지 파악 전략: 필자의 주장/의견이 담긴 문장을 찾기. 'we must ~', 'we should ~' 등 당위 표현에 주목. demonstrate(≈ show, exhibit, display): 보여주다. discard(≈ throw away, dispose of, get rid of) ↔ keep(보관하다). overnight(하룻밤 만에, 즉시).`
  }
},
{
  id: 10, type: '일치', diff: '쉬움', pts: 3, fmt: 'mc',
  note: '친환경 섬유 기술',
  passage: `Currently, companies are developing recycled fibers and fibers extracted from agricultural waste products like leaves, peels, and seeds. One company uses nanotechnology to make soft material from orange peels. Another makes fabrics from kapok tree seeds. The trees grow well in poor soil without needing much water. These new fabrics produce less waste, last a long time, and break down easily.`,
  stem: `다음 글의 내용과 일치하는 것은?`,
  ch: ['한 회사는 나노기술을 사용하여 오렌지 껍질로 부드러운 소재를 만든다.','카폭 나무는 비옥한 토양과 많은 물을 필요로 한다.','새로운 직물들은 분해되는 데 오랜 시간이 걸린다.','현재 재활용 섬유를 개발하는 회사는 하나뿐이다.','농업 폐기물에서 추출한 섬유는 아직 개발 단계에 있지 않다.'],
  ans: 0,
  det: {
    ref: `[원문] One company uses nanotechnology to make soft material from orange peels. → [해석] 한 회사는 오렌지 껍질로 부드러운 소재를 만들기 위해 나노기술을 사용한다. 이 내용은 선지 ①과 정확히 일치합니다.`,
    correct: `① 나노기술로 오렌지 껍질에서 부드러운 소재 제작 → 원문과 일치 ✅ <b>정답</b><br>② 카폭 나무가 비옥한 토양과 많은 물 필요 → 원문: poor soil, without needing much water → 반대 ❌<br>③ 새 직물이 분해에 오래 걸림 → 원문: break down easily → 반대 ❌<br>④ 재활용 섬유 개발 회사가 하나뿐 → 원문: companies(복수) → 오류 ❌<br>⑤ 섬유가 아직 개발 단계에 있지 않음 → 원문: are developing → 개발 중 ❌`,
    wrongs: [],
    tip: `🔑 일치/불일치 문제 전략: 선지를 하나씩 원문과 대조. 반의어 함정(poor↔fertile, easily↔slowly)에 주의. nanotechnology: 나노기술. extract(≈ derive, obtain): 추출하다. agricultural waste(농업 폐기물, ≈ crop residue).`
  }
},
{
  id: 11, type: '불일치', diff: '보통', pts: 5, fmt: 'mc',
  note: '선형 패션의 환경 영향',
  passage: `Worth over $3 trillion and making up 2% of the world's GDP, the fashion industry today has an almost entirely linear approach. The process moves in a straight line from design to consumption to disposal. ... 85% of textiles go into landfills, only 1% of the material is recycled, at least 500,000 tons of microfibers end up in the ocean (equal to 50 billion plastic bottles), and 93 billion cubic meters of water is required for textile production annually.`,
  stem: `다음 글의 내용과 일치하지 않는 것은?`,
  ch: ['패션 산업은 3조 달러 이상의 가치가 있다.','섬유의 85%가 매립지로 간다.','재료의 약 10%가 재활용된다.','최소 50만 톤의 미세 섬유가 바다에 버려진다.','섬유 생산에 연간 930억 세제곱미터의 물이 필요하다.'],
  ans: 2,
  det: {
    ref: `[원문] only 1% of the material is recycled → [해석] 재료의 1%만이 재활용된다. 선지 ③은 '약 10%가 재활용된다'고 했으므로 원문(1%)과 일치하지 않습니다.`,
    correct: `① 패션 산업이 3조 달러 이상 → 원문: Worth over $3 trillion → 일치 ✅<br>② 섬유의 85%가 매립지 → 원문: 85% of textiles go into landfills → 일치 ✅<br>③ 재료의 약 10%가 재활용 → 원문: only 1% → 10%는 오류 ❌ <b>불일치 (정답)</b><br>④ 50만 톤의 미세 섬유가 바다에 → 원문: at least 500,000 tons of microfibers end up in the ocean → 일치 ✅<br>⑤ 연간 930억 세제곱미터의 물 필요 → 원문: 93 billion cubic meters of water → 일치 ✅`,
    wrongs: [],
    tip: `🔑 불일치 문제는 숫자 함정에 주의! 1% vs 10%처럼 비슷한 숫자를 바꾸는 경우가 많음. landfill(매립지). microfiber(미세 섬유). annually(≈ yearly, each year, per annum): 매년.`
  }
},
{
  id: 12, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: '순환 패션의 접근법',
  passage: `In a circular model, we make, use, and reuse materials for as long as possible to extract their maximum value. Therefore, clothing and textiles are produced, used, and reused to minimize waste. It is __________________ to reduce the fashion industry's environmental impact.`,
  stem: `다음 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch: ['a renewable approach','an outdated method','an expensive luxury','a temporary solution','a government regulation'],
  ans: 0,
  det: {
    ref: `[원문] It is <b>a renewable approach</b> to reduce the fashion industry's environmental impact. → [해석] 그것은 패션 산업의 환경적 영향을 줄이기 위한 <b>재생 가능한 접근법</b>이다. 순환 패션이 재료를 재사용하고 폐기물을 최소화하는 '재생 가능한' 방식이라는 문맥에서, renewable approach가 가장 적절합니다.`,
    correct: `① a renewable approach: 재생 가능한 접근법 → 순환(circular), 재사용(reuse)의 개념과 일치 ✅ <b>정답</b><br>② an outdated method: 구식 방법 → 순환 패션은 새로운 접근법 ❌<br>③ an expensive luxury: 값비싼 사치 → 비용에 대한 언급 없음 ❌<br>④ a temporary solution: 임시 해결책 → 장기적 사용(long-term use)을 강조하므로 부적절 ❌<br>⑤ a government regulation: 정부 규제 → 정부 규제는 언급되지 않음 ❌`,
    wrongs: [],
    tip: `🔑 빈칸 채우기 전략: 빈칸 앞뒤 문맥에서 핵심 단서를 찾기. reuse, minimize waste, circular → 'renewable(재생 가능한)'과 연결. renewable(≈ sustainable, recyclable) ↔ disposable(일회용의). approach(≈ method, way, strategy): 접근법.`
  }
},
{
  id: 13, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: '기술과 지속 가능한 패션',
  passage: `In addition to these manufacturing techniques, technology will improve in such a way that it may become normal to produce clothes only when people order them. This "make-to-order" method will cost more, but then less money will be spent on maintaining offline stores. And 3D technology will enable people to see how clothes will fit online without trying them on in a store. In the long run, ________________________________.`,
  stem: `다음 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch: ['innovation in production and sales will facilitate sustainable fashion and considerably reduce material waste and logistics emissions','consumers will completely abandon physical stores in favor of online shopping','the fashion industry will become less profitable due to higher production costs','traditional manufacturing methods will remain dominant despite new technologies','governments will impose strict regulations on all forms of clothing production'],
  ans: 0,
  det: {
    ref: `[원문] In the long run, <b>innovation in production and sales will facilitate sustainable fashion and considerably reduce material waste and logistics emissions</b>. → [해석] 장기적으로, <b>생산과 판매의 혁신이 지속 가능한 패션을 촉진하고 재료 낭비와 물류 배출을 상당히 줄일 것이다</b>. 주문 생산 방식과 3D 기술이라는 혁신적 기술을 소개한 뒤, 이러한 혁신이 결국 지속 가능한 패션을 가능하게 한다는 결론을 도출합니다.`,
    correct: `① 생산/판매 혁신이 지속 가능한 패션 촉진+폐기물/배출 감소 → 앞 문맥(주문 생산, 3D 기술)의 자연스러운 결론 ✅ <b>정답</b><br>② 소비자가 물리적 매장을 완전히 포기 → 'completely abandon'은 과도한 일반화 ❌<br>③ 높은 생산비용으로 수익성 감소 → 오프라인 매장 비용 절감도 언급되어 균형 있는 서술이 아님 ❌<br>④ 전통 제조 방법이 지배적 유지 → 새 기술이 표준이 된다는 글의 흐름과 반대 ❌<br>⑤ 정부가 엄격한 규제 부과 → 정부 규제는 언급되지 않음 ❌`,
    wrongs: [],
    tip: `🔑 빈칸(문장) 전략: 앞 문맥의 흐름을 요약/결론짓는 문장을 고르기. 'In the long run(장기적으로)'은 결론 신호. facilitate(≈ promote, enable, support): 촉진하다. considerably(≈ significantly, substantially): 상당히. logistics emissions: 물류 배출.`
  }
},
{
  id: 14, type: '함축', diff: '보통', pts: 5, fmt: 'mc',
  note: '패션과 지구 보호',
  passage: `By making small changes to our clothing habits today, the fashion industry will gradually improve. After all, <u>nothing is more fashionable than saving the planet</u>.`,
  stem: `다음 글의 밑줄 친 "nothing is more fashionable than saving the planet"이 의미하는 바로 가장 적절한 것은?`,
  ch: ['지구를 구하는 것이야말로 가장 세련된(가치 있는) 일이다.','유행을 따르는 것이 환경 보호보다 더 중요하다.','패션 산업은 환경 문제와 무관하다.','지구를 구하는 것은 비현실적인 이상이다.','최신 패션 트렌드를 따르는 것이 진정한 패션이다.'],
  ans: 0,
  det: {
    ref: `[원문] nothing is more fashionable than saving the planet → [해석] 지구를 구하는 것보다 더 패셔너블한 것은 없다. 이는 'nothing is more ~ than ...' 비교급 구문으로, '...보다 더 ~한 것은 없다 = ...이 가장 ~하다'라는 최상급 의미입니다. 'fashionable'을 단순히 '유행하는'이 아닌 '가치 있는, 세련된'이라는 확장된 의미로 사용하여, 환경 보호가 가장 가치 있는 행동임을 강조합니다.`,
    correct: `① 지구를 구하는 것이 가장 세련된(가치 있는) 일 → 비교급 구문의 최상급 의미를 정확히 반영 ✅ <b>정답</b><br>② 유행이 환경 보호보다 중요 → 글의 주장과 정반대 ❌<br>③ 패션 산업이 환경과 무관 → 글 전체가 패션과 환경의 관계를 다룸 ❌<br>④ 지구를 구하는 것이 비현실적 → 작은 변화로 가능하다는 글의 주장과 반대 ❌<br>⑤ 최신 트렌드가 진정한 패션 → fashionable의 확장된 의미를 놓친 해석 ❌`,
    wrongs: [],
    tip: `🔑 nothing is more A than B = B가 가장 A하다 (비교급을 이용한 최상급 표현). fashionable: 본래 '유행하는'이지만, 여기서는 '가치 있는, 바람직한'의 함축적 의미. 함축 문제 전략: 문자적 의미가 아닌, 글 전체 맥락에서의 비유적/확장적 의미를 파악할 것.`
  }
},
{
  id: 15, type: '순서', diff: '보통', pts: 5, fmt: 'mc',
  note: '바이콧의 사례',
  passage: `Consumer activism involves consumers taking actions to support or protest certain products or companies based on their ethical, environmental, or social concerns.<br><br>(A) In response to Greenpeace's campaign and growing public pressure, the company agreed to cease sourcing palm oil from companies linked with the destruction of forests.<br>(B) A boycott is a form of protest in which individuals stop purchasing products from a particular company to express their objection to its practices.<br>(C) For example, in 2010, Greenpeace initiated a campaign against a product of a food company, accusing the company of sourcing palm oil from companies involved in the destruction of forests.`,
  stem: `주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?`,
  ch: ['(B)-(C)-(A)','(A)-(B)-(C)','(C)-(A)-(B)','(B)-(A)-(C)','(A)-(C)-(B)'],
  ans: 0,
  det: {
    ref: `[주어진 글] 소비자 행동주의는 소비자들이 윤리적·환경적·사회적 관심에 기반하여 행동하는 것이다. → (B) 보이콧은 개인들이 기업의 관행에 반대하여 제품 구매를 중단하는 항의 형태이다. → (C) 예를 들어, 2010년에 그린피스는 한 식품 회사를 상대로 캠페인을 시작했다. → (A) 그린피스의 캠페인과 여론 압력에 대응하여 그 회사는 삼림 파괴 관련 팜유 조달을 중단하기로 합의했다.`,
    correct: `① (B)-(C)-(A): 보이콧 정의 → 구체적 사례 도입 → 사례의 결과 → 논리적 흐름 ✅ <b>정답</b><br>② (A)-(B)-(C): 결과가 먼저 나오고 원인이 뒤에 → 비논리적 ❌<br>③ (C)-(A)-(B): 사례 먼저 → 결과 → 보이콧 정의 → 정의가 마지막에 오는 것은 부자연스러움 ❌<br>④ (B)-(A)-(C): 보이콧 정의 → 갑자기 결과 → 원인 사례 → 시간 순서 역전 ❌<br>⑤ (A)-(C)-(B): 결과 → 사례 → 정의 → 완전히 역순 ❌`,
    wrongs: [],
    tip: `🔑 순서 배열 전략: ① 일반 → 구체(For example) → 결과(In response to) 순서. ② 지시어/연결어 단서: 'For example'은 앞에 일반적 설명이 필요, 'In response to'는 앞에 캠페인 언급이 필요. boycott(보이콧, 불매운동) ↔ buycott(바이콧, 구매운동). cease(≈ stop, halt): 중단하다.`
  }
},
{
  id: 16, type: '무관', diff: '쉬움', pts: 3, fmt: 'mc',
  note: '바이콧과 소비자 행동',
  passage: `① Today, a new form of consumer activism, known as a buycott, has emerged. ② In a buycott, consumers actively support companies in accord with their values by consciously buying their products. ③ The global textile industry employs over 300 million workers in developing countries. ④ In 2020, an ice cream brand gained attention for its support of climate action. ⑤ Consumers who shared this value actively purchased the ice cream, enhancing its reputation and sales.`,
  stem: `다음 글에서 전체 흐름과 관계없는 문장은?`,
  ch: ['①','②','③','④','⑤'],
  ans: 2,
  det: {
    ref: `[원문] ③ The global textile industry employs over 300 million workers in developing countries. → [해석] 글로벌 섬유 산업은 개발도상국에서 3억 명 이상의 노동자를 고용하고 있다. 이 문장은 섬유 산업의 고용에 관한 내용으로, '바이콧(buycott)'이라는 소비자 행동주의의 새로운 형태를 설명하는 글의 흐름과 관계가 없습니다.`,

function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}

function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}

function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}

r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
