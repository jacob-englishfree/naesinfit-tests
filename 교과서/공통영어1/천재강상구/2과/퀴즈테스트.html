<style>

.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}

.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}

<div id="startScreen" class="screen active">
<div class="start-container">

<script>
const EI={"subject":"공통영어1","pub":"천재(강상구)","lesson":"2과","title":"Mapping Our Voices","total":100,"time":1200,"histKey":"quizH_천재강_2과_20","qCount":20};

const Q = [
{
  id: 1, type: '어법', diff: '보통', pts: 5, fmt: 'mc',
  note: `어법 ⓐ~ⓔ`,
  passage: `Everyone has unique experiences, but many people remain <u>ⓐ isolated</u> and disconnected from what goes on outside their lives. Community mapping helps people look outside of themselves, connect with other members of their communities, and <u>ⓑ share</u> valuable experiences. Community mapping is a collective process. It enables members of a community <u>ⓒ to map</u> details of the places <u>ⓓ which</u> they live and other places they know about. Community mapping is also a unique and valuable tool as it can <u>ⓔ be used</u> in diverse ways.`,
  stem: `다음 글의 밑줄 친 ⓐ~ⓔ 중 어법상 어색한 것은?`,
  ch: ["ⓐ", "ⓑ", "ⓒ", "ⓓ", "ⓔ"],
  ans: 3,
  det: {
    ref: `[원문] the places <b>which</b> they live → the places <b>where</b> they live [해석] 그들이 살고 있는 장소들의 세부 사항을 지도에 표시할 수 있게 해 준다. <b>live</b>는 자동사이므로 뒤에 전치사가 필요합니다. 선행사 the places는 장소이므로 관계부사 <b>where</b>(= in which)를 써야 합니다. 관계대명사 which를 쓰려면 <b>in which</b>로 전치사를 동반해야 합니다.`,
    correct: `ⓐ isolated: remain + 형용사(보어) 구조. remain isolated(고립된 채로 남아 있다) ✅ ⓑ share: 병렬 구조 helps people (1) look outside ~, (2) connect with ~, and (3) share ~ → 동사원형 share ✅ ⓒ to map: enable + 목적어 + to-v 구조. enables members to map ✅ ⓓ which: 선행사 the places는 장소이고 live는 자동사 → 관계부사 where 또는 in which가 필요. which 단독 사용 ❌ ⓔ be used: 조동사 can 뒤 동사원형 + 수동태. can be used ✅`,

    tip: `🔑 관계대명사 vs 관계부사: 선행사가 장소이고, 뒤에 완전한 문장이 오면 where(= in which). 관계대명사 which 뒤에는 불완전한 문장이 온다. live in the places → the places where they live (○) / the places in which they live (○) / the places which they live (✕)`
  }
},
{
  id: 2, type: '어법', diff: '어려움', pts: 6, fmt: 'mc',
  note: `어법 A/B/C`,
  passage: `In the middle of a major disaster, community mapping can prove to be a very effective and important tool. The first responders to a disaster are often ordinary citizens. They can use maps to create and update data on health facilities, shelters, or even public roads. When community members work together at the time of a disaster, the (A) [<b>gathering / gathered</b>] information can be based on actual needs rather than guesses. This is particularly (B) [<b>critical / critically</b>] when every second counts. For example, community mapping helped (C) [<b>deal / to deal</b>] with the impact of Hurricane Sandy, one of the most destructive hurricanes to hit the United States.`,
  stem: `다음 글의 (A), (B), (C)에서 어법에 맞는 표현을 골라 바르게 짝지은 것은?`,
  ch: ["gathering – critical – deal", "gathering – critically – to deal", "gathered – critical – deal", "gathered – critically – deal", "gathered – critical – to deal"],
  ans: 2,
  det: {
    ref: `[원문] the <b>gathered</b> information / particularly <b>critical</b> / helped <b>deal</b> with [해석] 재난 시 지역 주민들이 함께 일하면, 수집된 정보는 추측이 아닌 실제 필요에 기반할 수 있다. 이것은 매초가 중요할 때 특히 결정적이다. 예를 들어, 커뮤니티 매핑은 허리케인 Sandy의 영향에 대처하는 데 도움이 되었다.`,
    correct: `(A) gathered: information은 수집 '되는' 대상이므로 과거분사 gathered(수집된) ✅ / gathering은 현재분사(수집하는)로 information이 스스로 수집하는 의미가 되어 부적절 ❌ (B) critical: be동사(is)의 보어 역할이므로 형용사 critical ✅ / critically는 부사로 보어 자리에 부적절 ❌ (C) deal: help + (to) 동사원형 구조에서 to 없이 동사원형 deal ✅ / to deal도 문법적으로 가능하지만, 선택지 조합상 ③이 정답`,
    wrongs: [],
    tip: `🔑 (A) 분사의 수식: 감정·심리 동사 외 일반 동사에서도 '~된' = 과거분사, '~하는' = 현재분사. gathered information(수집된 정보) ↔ gathering information(정보를 수집하는). (B) be + 형용사(보어) vs 부사: This is critical. (형용사 보어) (C) help + (to-)V: help는 원형부정사와 to부정사 모두 가능. help deal with = help to deal with`
  }
},
{
  id: 3, type: '어법', diff: '어려움', pts: 6, fmt: 'mc',
  note: `어법 ⓐ~ⓓ`,
  passage: `One of its main effects was energy failures. Residents in affected areas would wait for hours in line at gas stations, sometimes only <u>ⓐ to learn</u> that they were out of gasoline. In response to this problem, a group of high school students in New Jersey worked together to create an online community map, <u>ⓑ publishing</u> information on open gas stations with available fuel. The students gathered information from personal observations, calls to local gas stations, and updates from other social media users. The live data streams <u>ⓒ filling</u> a significant community information gap.`,
  stem: `다음 글의 밑줄 친 ⓐ~ⓓ 중 어법상 어색한 것은?`,
  ch: ["ⓐ", "ⓑ", "ⓒ", "ⓓ 없음"],
  ans: 2,
  det: {
    ref: `[원문] The live data streams <b>filling</b> a significant community information gap. → <b>filled</b> [해석] 실시간 데이터 스트림은 상당한 지역 사회 정보 공백을 메워 주었다. 이 문장의 주어 The live data streams에 대한 본동사가 필요합니다. filling(현재분사)은 동사 역할을 할 수 없으므로, 과거시제 동사 <b>filled</b>로 고쳐야 합니다.`,
    correct: `ⓐ to learn: only to-v(~하고서 결국 …하다)는 '기대에 어긋난 결과'를 나타내는 부사적 용법의 to부정사 → only to learn(결국 알게 되었다) ✅ ⓑ publishing: 분사구문으로 주절의 부가 설명(정보를 공개하면서). worked together to create ~, publishing ~ ✅ ⓒ filling: 이 문장에서 주어 The live data streams에 대한 본동사가 없음. filling은 분사(준동사)이므로 본동사 역할 불가 → filled(과거시제 동사)로 수정해야 함 ❌`,
    wrongs: [],
    tip: `🔑 준동사 vs 본동사 구별: 모든 절에는 반드시 본동사(finite verb)가 하나 있어야 한다. 현재분사(-ing)나 과거분사(-ed)는 단독으로 본동사가 될 수 없다. The data streams filled(○) / filling(✕). only to-v: '결국 ~하게 되다' (기대와 반대되는 결과)`
  }
},
{
  id: 4, type: '어휘', diff: '보통', pts: 5, fmt: 'mc',
  note: `어휘 A/B/C`,
  passage: `Mapping can also rally community members around the (A) [<b>assets / deficits</b>] of their community such as libraries, community centers, and parks. Heritage and cultural attractions, like landmarks, museums, and public artworks, are also good sources for community mapping. Through marking assets on a map, people become (B) [<b>aware / ignorant</b>] of the strengths and resources of their own community and build a strong bond with it. Also, these maps can (C) [<b>provide / deprive</b>] valuable data to be used for tourism or urban design.`,
  stem: `다음 글의 (A), (B), (C)에 들어갈 말로 적절한 것끼리 짝지은 것은?`,
  ch: ["assets – aware – provide", "assets – ignorant – provide", "deficits – aware – deprive", "deficits – ignorant – provide", "assets – aware – deprive"],
  ans: 0,
  det: {
    ref: `[원문] rally community members around the <b>assets</b> / become <b>aware</b> of the strengths / can <b>provide</b> valuable data [해석] 매핑은 또한 도서관, 커뮤니티 센터, 공원과 같은 지역 사회의 <b>자산</b> 주위로 구성원들을 결집시킬 수 있다. 지도에 자산을 표시함으로써, 사람들은 자신의 지역 사회의 강점과 자원을 <b>인식하게</b> 되고 유대감을 형성한다. 또한, 이 지도들은 관광이나 도시 설계에 사용될 귀중한 자료를 <b>제공할</b> 수 있다.`,
    correct: `① assets – aware – provide: 문맥상 도서관·공원 등은 지역 사회의 '자산(assets)'이고, 강점을 '인식(aware)' 하며, 귀중한 자료를 '제공(provide)' → 적절 ✅ ② assets – ignorant – provide: ignorant(무지한)은 문맥과 반대 ❌ ③ deficits – aware – deprive: deficits(결핍)는 문맥과 반대 ❌ ④ deficits – ignorant – provide: deficits + ignorant 이중 오류 ❌ ⑤ assets – aware – deprive: deprive(박탈하다)는 문맥과 반대 ❌`,
    wrongs: [],
    tip: `🔑 asset(자산) ↔ deficit(결핍, 적자). aware(인식하는) ↔ ignorant(무지한). provide(제공하다) ↔ deprive(박탈하다). become aware of ≈ recognize, realize. rally around: ~을 중심으로 결집하다`
  }
},
{
  id: 5, type: '어휘', diff: '어려움', pts: 6, fmt: 'mc',
  note: `어휘 부적절`,
  passage: `The mapping project Where in Wally (short for Walthamstow, UK) is a case in point. A team of architects ① <u>undertook</u> the project to find out what spots were loved by the locals. People told the team about their ② <u>treasured</u> places and the reasons why these places were special to them. The team then added the places to an online map and marked them in the real world with yellow tags. The map and tags ③ <u>discouraged</u> people to go on a treasure hunt and told them colorful stories about the corners of Walthamstow.`,
  stem: `다음 글의 밑줄 친 ①~⑤ 중 문맥상 낱말의 쓰임이 적절하지 않은 것은?`,
  ch: ["①", "②", "③", "④ 없음", "⑤ 없음"],
  ans: 2,
  det: {
    ref: `[원문] The map and tags <b>discouraged</b> people to go on a treasure hunt → <b>invited</b> [해석] 그 지도와 태그는 사람들이 보물찾기를 하도록 <b>초대했고</b>(invited) Walthamstow 곳곳에 대한 다채로운 이야기를 들려주었다. 문맥상 지도와 태그가 사람들을 보물찾기로 '이끌었다/초대했다'는 긍정적 의미여야 하므로, discouraged(단념시켰다)는 반대 의미로 부적절합니다.`,
    correct: `① undertook: undertake(착수하다, 떠맡다). 건축가 팀이 프로젝트를 '착수했다' → 문맥 적절 ✅ ② treasured: treasured(소중히 여기는). 사람들이 '소중히 여기는' 장소 → 문맥 적절 ✅ ③ discouraged: discourage(단념시키다). 지도와 태그가 보물찾기를 '단념시켰다' → 원문은 invited(초대했다)로 반대 의미 ❌ → invited로 바꿔야 적절`,
    wrongs: [],
    tip: `🔑 discourage(단념시키다) ↔ invite(초대하다), encourage(격려하다). undertake ≈ carry out, take on(착수하다). treasured ≈ cherished, valued(소중히 여기는). a case in point: 적절한 사례, 좋은 예`
  }
},
{
  id: 6, type: '어휘', diff: '보통', pts: 5, fmt: 'mc',
  note: `어휘 부적절`,
  passage: `A community mapping project doesn't have to be ① <u>ambitious</u> in scale. If the idea of mapping ② <u>overwhelms</u> you, start small. Although it may seem that you know all about the routes to school, students have ③ <u>identical</u> information from one another due to different experiences. How about making a map with your classmates? Each of you can trace routes that you frequently use and mark how ④ <u>comfortable</u> or safe you feel on those routes. With group participation and feedback, an ⑤ <u>informative</u> visual map of safe routes to school can be constructed.`,
  stem: `다음 글의 밑줄 친 ①~⑤ 중 문맥상 낱말의 쓰임이 적절하지 않은 것은?`,
  ch: ["①", "②", "③", "④", "⑤"],
  ans: 2,
  det: {
    ref: `[원문] students have <b>identical</b> information → <b>different</b> [해석] 학생들은 서로 다른 경험 때문에 서로 <b>다른(different)</b> 정보를 가지고 있다. 원문에서 'due to different experiences(다른 경험 때문에)'라고 했으므로 정보도 '다르다'가 자연스럽습니다. identical(동일한)은 문맥과 반대입니다.`,
    correct: `① ambitious: ambitious(야심 찬, 거창한). 거창한 규모일 필요 없다 → 문맥 적절 ✅ ② overwhelms: overwhelm(압도하다). 매핑이 부담스러우면 → 문맥 적절 ✅ ③ identical: identical(동일한). 서로 다른 경험 때문에 → 동일한 정보가 아니라 다른(different) 정보 ❌ ④ comfortable: comfortable(편안한). 경로에서 얼마나 편안하거나 안전한지 → 문맥 적절 ✅ ⑤ informative: informative(유익한, 정보를 주는). 유익한 시각 지도 → 문맥 적절 ✅`,
    wrongs: [],
    tip: `🔑 identical(동일한) ↔ different(다른). ambitious ≈ grand, large-scale(거창한). overwhelm ≈ overpower(압도하다). informative ≈ instructive, educational(유익한). 문맥 단서: 'due to different experiences' → 결과도 different여야 논리적`
  }
},
{
  id: 7, type: '대의', diff: '보통', pts: 5, fmt: 'mc',
  note: `주제`,
  passage: `Everyone has unique experiences, but many people remain isolated and disconnected from what goes on outside their lives. Community mapping helps people look outside of themselves, connect with other members of their communities, and share valuable experiences. Community mapping is a collective process. It enables members of a community to map details of the places where they live and other places they know about. Community mapping is also a unique and valuable tool as it can be used in diverse ways.`,
  stem: `다음 글의 주제로 가장 적절한 것은?`,
  ch: ["the importance of individual experiences in daily life", "the definition and value of community mapping as a collective tool", "the technological challenges of creating online maps", "the history of mapping techniques in ancient civilizations", "the disadvantages of community-based projects"],
  ans: 1,
  det: {
    ref: `[원문] Community mapping helps people look outside of themselves, connect with other members of their communities, and share valuable experiences. [해석] 커뮤니티 매핑은 사람들이 자기 자신 너머를 바라보고, 지역 사회의 다른 구성원들과 연결되며, 가치 있는 경험을 공유하도록 돕는다. 이 글은 커뮤니티 매핑이 무엇이며(정의), 집단 과정으로서 다양한 방식으로 사용될 수 있는 가치 있는 도구임(가치)을 설명하고 있다.`,
    correct: `① individual experiences: 개인 경험이 아닌 커뮤니티의 집단적 과정이 핵심 ❌ ② definition and value of community mapping: 커뮤니티 매핑의 정의(collective process)와 가치(diverse ways) → 주제 적절 ✅ ③ technological challenges: 기술적 어려움은 언급 없음 ❌ ④ history of mapping: 매핑의 역사는 언급 없음 ❌ ⑤ disadvantages: 단점이 아닌 장점을 설명 ❌`,
    wrongs: [],
    tip: `🔑 주제 파악 전략: 반복 키워드(community mapping, collective, connect, share)를 찾고, 글 전체를 아우르는 포괄적 선지를 선택. 지나치게 세부적이거나 언급되지 않은 내용은 배제`
  }
},
{
  id: 8, type: '대의', diff: '보통', pts: 5, fmt: 'mc',
  note: `제목`,
  passage: `The researchers participating in the Montreal Tree Project asked residents and public institutions around Concordia University for help. The researchers asked them to photograph the bark and leaves of the trees on their properties and submit the photos to the project's website for analysis. The project is now complete, and they say the results show the importance of having a diverse tree population in a city. Trees on private lands were found to be more diverse than those on public lands.`,

  }
},
{
  id: 9, type: '대의', diff: '어려움', pts: 6, fmt: 'mc',
  note: `시사점`,
  passage: `There isn't just one reason for, nor one method of, carrying out community mapping. The process is defined by the community itself, depending on what issues are raised and how the community members decide to deal with them. The most important thing in the process is that you have to work with others. Remember that, by its very nature, community mapping is a collective experience.`,
  stem: `다음 글에서 필자가 전달하고자 하는 시사점으로 가장 적절한 것은?`,
  ch: ["Community mapping should be led by professional cartographers.", "The success of community mapping depends on individual effort.", "Community mapping is fundamentally a collaborative process shaped by its participants.", "Government agencies should fund all community mapping projects.", "Technology is the most critical factor in community mapping."],
  ans: 2,
  det: {
    ref: `[원문] The most important thing in the process is that you have to <b>work with others</b>. Community mapping is a <b>collective experience</b>. [해석] 그 과정에서 가장 중요한 것은 다른 사람들과 함께 일해야 한다는 것이다. 커뮤니티 매핑은 본질적으로 집단적 경험이다. 필자는 커뮤니티 매핑이 참여자들에 의해 형성되는 근본적으로 협력적인 과정임을 강조하고 있다.`,
    correct: `① professional cartographers: 전문 지도 제작자가 이끌어야 한다는 내용 없음 ❌ ② individual effort: 개인 노력이 아닌 집단적 협력이 핵심 ❌ ③ collaborative process shaped by its participants: work with others + collective experience + defined by the community itself → 시사점 적절 ✅ ④ Government funding: 정부 자금 지원은 언급 없음 ❌ ⑤ Technology: 기술이 가장 중요하다는 내용 없음 ❌`,
    wrongs: [],
    tip: `🔑 시사점(implication) 파악: 글의 마지막 부분 'The most important thing'과 'by its very nature'에 핵심 메시지가 집약. collective(집단적) ≈ collaborative(협력적). defined by the community itself → shaped by its participants`
  }
},
{
  id: 10, type: '일치', diff: '쉬움', pts: 3, fmt: 'mc',
  note: `일치`,
  passage: `Community mapping helped deal with the impact of Hurricane Sandy, one of the most destructive hurricanes to hit the United States. One of its main effects was energy failures. Residents in affected areas would wait for hours in line at gas stations, sometimes only to learn that they were out of gasoline. In response to this problem, a group of high school students in New Jersey worked together to create an online community map, publishing information on open gas stations with available fuel.`,
  stem: `다음 글의 내용과 일치하는 것은?`,
  ch: ["Hurricane Sandy was a minor storm with little damage.", "Professional rescue teams created the online community map.", "High school students in New Jersey made an online map of open gas stations.", "All gas stations had enough fuel during Hurricane Sandy.", "The community map was published in a local newspaper."],
  ans: 2,
  det: {
    ref: `[원문] a group of <b>high school students in New Jersey</b> worked together to create an <b>online community map</b>, publishing information on <b>open gas stations</b> with available fuel. [해석] 뉴저지의 고등학생 한 그룹이 함께 협력하여 연료가 있는 영업 중인 주유소 정보를 공개하는 온라인 커뮤니티 지도를 만들었다.`,
    correct: `① minor storm: 'one of the most destructive hurricanes'이므로 소규모 폭풍이 아님 ❌ ② Professional rescue teams: 전문 구조대가 아닌 고등학생들이 만듦 ❌ ③ High school students in New Jersey: 원문과 일치 ✅ ④ enough fuel: 'out of gasoline(가솔린이 떨어진)'이므로 충분한 연료가 아님 ❌ ⑤ local newspaper: 신문이 아닌 온라인 지도에 공개 ❌`,
    wrongs: [],
    tip: `🔑 일치 문제 전략: 각 선지의 핵심 정보(주체, 행위, 대상)를 원문과 1:1 대조. destructive ≈ devastating(파괴적인). out of gasoline: 가솔린이 다 떨어진`
  }
},
{
  id: 11, type: '불일치', diff: '보통', pts: 5, fmt: 'mc',
  note: `불일치`,
  passage: `The mapping project Where in Wally (short for Walthamstow, UK) is a case in point. A team of architects undertook the project to find out what spots were loved by the locals. People told the team about their treasured places and the reasons why these places were special to them. The team then added the places to an online map and marked them in the real world with yellow tags. The map and tags invited people to go on a treasure hunt and told them colorful stories about the corners of Walthamstow.`,
  stem: `다음 글의 내용과 일치하지 않는 것은?`,
  ch: ["Where in Wally is a mapping project in Walthamstow, UK.", "A team of architects led the project.", "Locals shared their favorite places and reasons with the team.", "The places were marked with blue tags in the real world.", "The map invited people to go on a treasure hunt."],
  ans: 3,
  det: {
    ref: `[원문] marked them in the real world with <b>yellow tags</b>. [해석] 실제 세계에서 <b>노란색 태그</b>로 표시했다. 선지 ④는 blue tags(파란 태그)라고 했으므로 원문의 yellow tags(노란 태그)와 일치하지 않는다.`,
    correct: `① Walthamstow, UK: 'short for Walthamstow, UK' → 일치 ✅ ② team of architects: 'A team of architects undertook the project' → 일치 ✅ ③ shared favorite places and reasons: 'told the team about their treasured places and the reasons' → 일치 ✅ ④ blue tags: 원문은 'yellow tags' → 불일치 ❌ ⑤ treasure hunt: 'invited people to go on a treasure hunt' → 일치 ✅`,
    wrongs: [],
    tip: `🔑 불일치 문제: 색깔, 숫자, 장소명 등 세부 사항을 정확히 대조. yellow → blue 같은 단어 하나 바꾸기가 빈출 함정. case in point: 적절한 사례`
  }
},
{
  id: 12, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: `빈칸(구)`,
  passage: `In the middle of a major disaster, community mapping can prove to be a very effective and important tool. The first responders to a disaster are often ordinary citizens. They can use maps to create and update data on health facilities, shelters, or even public roads. When community members work together at the time of a disaster, the gathered information can be based on ______________ rather than guesses.`,
  stem: `다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch: ["theoretical frameworks", "actual needs", "government orders", "historical records", "personal opinions"],
  ans: 1,
  det: {
    ref: `[원문] the gathered information can be based on <b>actual needs</b> rather than guesses. [해석] 수집된 정보는 추측이 아닌 <b>실제 필요</b>에 기반할 수 있다. 재난 시 주민들이 직접 현장 정보를 수집하면 추측(guesses)이 아닌 실질적 필요(actual needs)에 근거한 정보가 된다.`,
    correct: `① theoretical frameworks: 이론적 틀은 재난 현장의 실시간 정보와 관련 없음 ❌ ② actual needs: rather than guesses(추측)의 대비 개념으로 '실제 필요' → 적절 ✅ ③ government orders: 정부 명령은 문맥과 무관 ❌ ④ historical records: 역사적 기록은 재난 시 실시간 정보와 대비되지 않음 ❌ ⑤ personal opinions: 개인 의견은 guesses와 유사한 범주로 대비 불가 ❌`,
    wrongs: [],
    tip: `🔑 빈칸(구) 전략: rather than(~보다는)은 대비 관계를 나타내는 핵심 단서. guesses(추측)의 반대 = actual needs(실제 필요). actual ≈ real, genuine(실제의) ↔ guessed, assumed(추측된)`
  }
},
{
  id: 13, type: '빈칸', diff: '어려움', pts: 6, fmt: 'mc',
  note: `빈칸(문장)`,
  passage: `Mapping can also rally community members around the assets of their community such as libraries, community centers, and parks. Heritage and cultural attractions, like landmarks, museums, and public artworks, are also good sources for community mapping. Through marking assets on a map, people become aware of the strengths and resources of their own community and build a strong bond with it. Also, _____________________________________________.`,
  stem: `다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch: ["community members may lose interest in mapping over time", "these maps can provide valuable data to be used for tourism or urban design", "individual mapping projects should replace group efforts", "the government should control all community mapping data", "traditional paper maps are more reliable than digital ones"],
  ans: 1,
  det: {
    ref: `[원문] Also, these maps can <b>provide valuable data to be used for tourism or urban design</b>. [해석] 또한, 이 지도들은 관광이나 도시 설계에 사용될 <b>귀중한 자료를 제공할</b> 수 있다. 앞 문장에서 자산을 표시하면 지역 사회의 강점을 인식하게 된다고 했고, Also로 추가 이점을 제시하므로 '귀중한 자료 제공'이 적절하다.`,
    correct: `① lose interest: 부정적 내용으로 Also(추가 장점)와 흐름 불일치 ❌ ② provide valuable data for tourism or urban design: 자산 매핑의 추가 이점으로 논리적 연결 ✅ ③ replace group efforts: 개인이 그룹을 대체한다는 내용은 collective의 취지에 반함 ❌ ④ government should control: 정부 통제는 글의 논지와 무관 ❌ ⑤ paper maps more reliable: 종이 지도 vs 디지털 비교는 없음 ❌`,
    wrongs: [],
    tip: `🔑 빈칸(문장) 전략: (1) 빈칸 앞의 연결어 Also(추가)에 주목 → 앞 내용과 같은 방향의 추가 이점이 와야 함. (2) 주어 these maps가 무엇을 하는지 파악. rally(결집시키다) → become aware(인식하게 되다) → provide data(자료 제공): 점층적 이점 나열`
  }
},
{
  id: 14, type: '함축', diff: '보통', pts: 5, fmt: 'mc',
  note: `함축`,
  passage: `Residents in affected areas would wait for hours in line at gas stations, sometimes only to learn that they were out of gasoline. In response to this problem, a group of high school students in New Jersey worked together to create an online community map, publishing information on open gas stations with available fuel. The students gathered information from personal observations, calls to local gas stations, and updates from other social media users. <u>The live data streams filled a significant community information gap.</u>`,
  stem: `다음 글의 밑줄 친 부분이 의미하는 바로 가장 적절한 것은?`,
  ch: ["The data was too much for the community to process.", "The real-time information met an urgent need for knowledge the community lacked.", "The students created a gap between online and offline communities.", "The live streams were entertaining but not useful.", "The information widened the divide between different communities."],
  ans: 1,
  det: {
    ref: `[원문] The live data streams <b>filled a significant community information gap</b>. [해석] 실시간 데이터 스트림은 <b>상당한 지역 사회 정보 공백을 메워 주었다</b>. 주유소 연료 정보가 부족한 상황에서 학생들이 제공한 실시간 데이터가 그 정보 부족(gap)을 해소(filled)했다는 의미.`,
    correct: `① too much to process: 정보가 너무 많다는 의미가 아님 ❌ ② met an urgent need for knowledge the community lacked: filled(메웠다) = met(충족했다), information gap(정보 공백) = knowledge the community lacked(지역사회에 부족한 지식) → 적절 ✅ ③ created a gap: fill(메우다)의 반대인 create(만들다)로 의미 반대 ❌ ④ entertaining but not useful: 유용한 정보였으므로 부적절 ❌ ⑤ widened the divide: fill(메우다)의 반대인 widen(넓히다)으로 의미 반대 ❌`,
    wrongs: [],
    tip: `🔑 fill a gap: 공백/부족을 메우다 ≈ meet a need(필요를 충족하다). information gap: 정보 부족/공백. live data streams: 실시간 데이터 흐름. significant ≈ considerable, substantial(상당한)`
  }
},
{
  id: 15, type: '순서', diff: '보통', pts: 5, fmt: 'mc',
  note: `순서`,
  passage: `The mapping project Where in Wally (short for Walthamstow, UK) is a case in point.<br><br>(A) The team then added the places to an online map and marked them in the real world with yellow tags.<br>(B) A team of architects undertook the project to find out what spots were loved by the locals.<br>(C) The map and tags invited people to go on a treasure hunt and told them colorful stories about the corners of Walthamstow. People told the team about their treasured places and the reasons why these places were special to them.`,
  stem: `주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?`,
  ch: ["(A)–(B)–(C)", "(A)–(C)–(B)", "(B)–(C)–(A)", "(B)–(A)–(C)", "(C)–(A)–(B)"],
  ans: 3,
  det: {
    ref: `[해석] 주어진 문장: Where in Wally 매핑 프로젝트는 적절한 사례이다. → (B) 건축가 팀이 지역 주민들이 사랑하는 장소를 알아내기 위해 프로젝트에 착수했다. 사람들이 팀에게 소중한 장소와 이유를 알려주었다. → (A) 팀은 그 장소들을 온라인 지도에 추가하고 실제 세계에서 노란 태그로 표시했다. → (C) 지도와 태그는 사람들을 보물찾기에 초대하고 Walthamstow 곳곳에 대한 이야기를 들려주었다.`,
    correct: `① (A)–(B)–(C): The team(A)이 먼저 나오면 어떤 팀인지 불명확 ❌ ② (A)–(C)–(B): 마찬가지로 The team 선행 지시 대상 없음 ❌ ③ (B)–(C)–(A): (C)에서 People told ~ 후에 (A) The team then이 오면 then의 시간순이 맞지 않음 ❌ ④ (B)–(A)–(C): (B)에서 프로젝트 소개+주민 의견 수집 → (A) then(그런 다음) 지도에 추가+태그 표시 → (C) 지도와 태그의 결과 설명 ✅ ⑤ (C)–(A)–(B): 결과가 먼저 나와 논리적이지 않음 ❌`,
    wrongs: [],
    tip: `🔑 순서배열 전략: (1) 지시어(The team, then, The map and tags)와 선행사의 연결 확인. (2) 시간순 단서: undertook(착수) → told(알려줌) → then added(추가) → invited(초대). (3) 일반→구체→결과 흐름 파악`
  }
},
{
  id: 16, type: '무관', diff: '쉬움', pts: 3, fmt: 'mc',
  note: `무관문장`,
  passage: `A community mapping project doesn't have to be ambitious in scale. ① If the idea of mapping overwhelms you, start small. ② Although it may seem that you know all about the routes to school, students have different information from one another due to different experiences. ③ Modern GPS technology has made it possible to track wildlife migration patterns across continents. ④ Each of you can trace routes that you frequently use and mark how comfortable or safe you feel on those routes. ⑤ With group participation and feedback, an informative visual map of safe routes to school can be constructed.`,
  stem: `다음 글에서 전체 흐름과 관계없는 문장은?`,
  ch: ["①", "②", "③", "④", "⑤"],
  ans: 2,
  det: {
    ref: `[해석] ③ '현대 GPS 기술은 대륙을 가로지르는 야생동물 이동 패턴을 추적하는 것을 가능하게 했다.' 이 문장은 야생동물 추적에 관한 내용으로, 학교 통학 경로 매핑이라는 글의 흐름과 무관하다.`,
    correct: `① 매핑이 부담되면 작게 시작하라 → 소규모 프로젝트 주제와 관련 ✅ ② 학생들은 서로 다른 경험으로 다른 정보를 가짐 → 통학 경로 매핑의 근거 ✅ ③ GPS 기술로 야생동물 이동 추적 → 통학 경로 매핑과 무관 ❌ ④ 자주 사용하는 경로를 추적하고 편안함/안전함 표시 → 통학 경로 매핑 ✅ ⑤ 그룹 참여와 피드백으로 안전 경로 지도 구축 → 통학 경로 매핑 ✅`,
    wrongs: [],
    tip: `🔑 무관문장 전략: 글의 중심 소재(school routes mapping)를 파악하고, 소재가 갑자기 바뀌는 문장(wildlife migration)을 찾기. 주변 문장과의 연결고리(지시어, 접속사)가 끊기는 문장이 무관문장`
  }
},
{
  id: 17, type: 'TF', diff: '쉬움', pts: 3, fmt: 'mc',
  note: `TF`,
  passage: `I moved to Walthamstow in 2000 and soon afterward was given a puppy by my parents. We had many happy times in Kitchener Road Park and met lots of other dog owners and dogs there. Walking in the park and getting to know people made us feel at home in the area, and some of the people we met became close friends.`,
  stem: `다음 글의 내용이 사실이면 T, 그렇지 않으면 F를 고르시오.<br><br>"Kitchener Road Park에서 글쓴이는 강아지 산책을 하며 이웃과 친해졌고, 그중 일부는 가까운 친구가 되었다."`,
  ch: ["T", "F"],
  ans: 0,
  det: {
    ref: `[원문] Walking in the park and getting to know people made us feel at home in the area, and <b>some of the people we met became close friends</b>. [해석] 공원에서 산책하고 사람들을 알아가면서 그 지역에서 편안하게 느끼게 되었고, 만났던 사람들 중 일부는 <b>가까운 친구가 되었다</b>. 제시문의 내용은 원문과 일치하므로 T(사실)이다.`,
    correct: `T: 원문에 (1) 강아지를 받았고(given a puppy), (2) 공원에서 다른 개 주인들을 만났으며(met lots of other dog owners), (3) 일부가 가까운 친구가 되었다(became close friends)고 명시 → 제시문과 일치 ✅ F: 제시문의 모든 내용이 원문과 일치하므로 F는 부적절 ❌`,
    wrongs: [],
    tip: `🔑 TF 문제 전략: 제시문의 각 정보를 원문과 하나씩 대조. feel at home: 편안하게 느끼다 ≈ feel comfortable. close friends: 가까운 친구`
  }
},
{
  id: 18, type: '서술형', diff: '보통', pts: 5, fmt: 'written',
  note: `서술형 요약`,
  passage: `Everyone has unique experiences, but many people remain isolated and disconnected from what goes on outside their lives. Community mapping helps people look outside of themselves, connect with other members of their communities, and share valuable experiences. Community mapping is a collective process.`,
  stem: `다음 글을 읽고, 주어진 조건에 맞게 빈칸을 완성하시오.<br><br><b>[조건]</b><br>• 본문의 내용을 바탕으로 빈칸에 들어갈 한 단어를 쓰시오.<br>• 첫 글자가 주어져 있습니다.<br><br><b>[요약문]</b><br>Community mapping is a c__________ process that helps people connect with their communities and share experiences.`,
  wa: `collective`,
  accept: ["collective", "Collective", "COLLECTIVE"],
  det: {
    ref: `[원문] Community mapping is a <b>collective</b> process. [해석] 커뮤니티 매핑은 <b>집단적인</b> 과정이다. 빈칸에는 c로 시작하는 단어 collective(집단적인)가 들어간다.`,
    correct: `요약문: 커뮤니티 매핑은 사람들이 지역사회와 연결되고 경험을 공유하도록 돕는 c____ 과정이다. 원문에서 'Community mapping is a collective process'라고 직접 명시. collective = 집단적인, 공동의 ✅`,
    wrongs: [],
    tip: `🔑 collective(집단적인) ≈ communal, cooperative, joint. ↔ individual(개인적인). 요약문의 빈칸 채우기: 원문의 핵심 키워드를 찾아 첫 글자 힌트와 맞는 단어를 찾기`
  }
},
{
  id: 19, type: '서술형', diff: '어려움', pts: 7, fmt: 'written',
  note: `서술형 영작`,
  passage: `Through marking assets on a map, people become aware of the strengths and resources of their own community and build a strong bond with it. Also, these maps can provide valuable data to be used for tourism or urban design.`,
  stem: `다음 조건을 참고하여, 주어진 단어를 모두 사용해 빈칸에 들어갈 영어 문장을 완성하시오.<br><br><b>[조건]</b><br>• 주어진 단어를 모두 사용하되, 필요시 어형을 변환하시오.<br>• 7단어 이상으로 작성하시오.<br><br><b>[보기]</b> provide / map / the / can / data / valuable<br><br><b>[문장]</b><br>Also, these ____________________________________________ for tourism or urban design.`,
  wa: `maps can provide valuable data to be used`,
  accept: ["maps can provide valuable data to be used", "Maps can provide valuable data to be used", "maps can provide the valuable data to be used", "maps can provide valuable data"],

function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}

function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}

function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`┌─────────────────────┐\n`;txt+=`│  📋 기본 정보\n`;txt+=`│  👤 이름: ${nm}\n`;if(sc)txt+=`│  🏫 학교: ${sc} · ${gr}\n`;else txt+=`│  🎓 학년: ${gr}\n`;txt+=`│  📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`│  ⏱️ 소요시간: ${fmtTime(elapsed)}\n`;txt+=`└─────────────────────┘\n\n`;txt+=`🏆 ── 성적 결과 ──────────\n\n`;txt+=`   ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`   📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n\n`;txt+=`   ✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`📊 ── 유형별 분석 ────────\n\n`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const bar='█'.repeat(Math.round(p/10))+'░'.repeat(10-Math.round(p/10));const icon=p===100?'🌟':p>=80?'✅':p>=50?'⚠️':'❌';txt+=`   ${icon} ${type}\t${bar} ${p}% (${d.o}/${d.t})\n`;});txt+=`\n`;const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);if(perfectTypes.length)txt+=`   🌟 만점 유형: ${perfectTypes.join(', ')}\n`;if(weakTypes.length)txt+=`   📌 보완 필요: ${weakTypes.join(', ')}\n`;txt+=`\n💬 ── 상세 피드백 ────────\n\n`;r.details.forEach(d=>{if(!d.ok){const icon=d.ans===null?'⬜':'❌';const ansInfo=d.q.fmt==='mc'?(d.ans!==null?'①②③④⑤'[d.ans]:'미응답'):(d.ans||'미응답');const correctAns=d.q.fmt==='mc'?'①②③④⑤'[d.q.ans]:d.q.wa;txt+=`   ${icon} ${d.q.id}번 [${d.q.type}] ${d.q.pts}점\n`;txt+=`      내 답: ${ansInfo} → 정답: ${correctAns}\n`;const tipClean=(d.q.det.tip||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').substring(0,80);if(tipClean)txt+=`      💡 ${tipClean}...\n`;txt+=`\n`;}});if(r.wrong===0&&r.unanswered===0)txt+=`   🎉 전 문항 정답! 완벽합니다!\n\n`;txt+=`📝 ── 학습 조언 ──────────\n\n`;if(r.score>=95)txt+=`   🏅 거의 완벽! 심화 문제에 도전하세요.\n`;else if(r.score>=80)txt+=`   📈 통과! ${weakTypes.join(', ')} 유형만 보강하면 최상위.\n`;else if(r.score>=60)txt+=`   💪 조금만 더! 오답 해설을 꼼꼼히 확인하세요.\n`;else txt+=`   📖 기본기부터! 지문 정독 → 문법·어휘 정리.\n`;txt+=`\n━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
