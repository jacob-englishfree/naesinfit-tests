<style>

.choices{display:flex;flex-direction:column;gap:8px;}

.choice-btn:hover{border-color:var(--o);transform:translateX(2px);}

.c-num{min-width:26px;height:26px;background:#f0ece8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--tm);flex-shrink:0;transition:var(--tr);}

.bogi-label{font-size:11px;color:var(--tl);font-weight:800;margin-bottom:4px;}.bogi-box{background:#fff;border:1.5px solid #d8d4d0;border-radius:var(--rxs);padding:12px;text-align:center;font-weight:700;font-size:14px;}
.exam-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.06);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;}

.nav-btn{padding:9px 18px;background:#fff;border:2px solid #e0dcd8;border-radius:var(--rxs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr);}.nav-btn:hover{border-color:var(--o);color:var(--o);}
#resultScreen{background:var(--bg);}

.r-badge{display:inline-block;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:800;margin-bottom:16px;}.r-badge.pass{background:linear-gradient(135deg,var(--g),#15A35A);color:#fff;box-shadow:0 4px 14px rgba(26,153,96,.25);}.r-badge.fail{background:linear-gradient(135deg,var(--r),#C42A2A);color:#fff;}
.r-score{font-size:72px;font-weight:900;letter-spacing:-2px;}.r-score sup{font-size:24px;color:var(--tl);font-weight:700;}
.r-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:13px;color:var(--tm);flex-wrap:wrap;}.r-stats strong{color:var(--text);font-weight:800;}.r-stats .stat-item{background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;}
.rc{max-width:740px;margin:0 auto;padding:0 20px 50px;}
.rs{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);}.rs-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}

.level-range{font-size:13px;color:var(--tm);margin-top:4px;}.level-bar{margin-top:16px;height:8px;background:#f0ece8;border-radius:4px;overflow:hidden;}.level-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 1.5s ease;}.level-msg{margin-top:12px;font-size:14px;color:var(--tm);line-height:1.6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-cell{padding:12px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);border-radius:var(--rs);border:1px solid #ebe7e3;}.info-cell .ic-label{font-size:11px;color:var(--tl);font-weight:700;margin-bottom:2px;}.info-cell .ic-value{font-size:15px;font-weight:800;}.info-cell.highlight{background:linear-gradient(135deg,var(--oxl),#FFF6EE);border-color:rgba(232,119,46,.15);}.info-cell.highlight .ic-value{color:var(--o);}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}.type-label{min-width:50px;font-size:12px;font-weight:700;color:var(--tm);text-align:right;}.type-track{flex:1;height:10px;background:#f0ece8;border-radius:5px;overflow:hidden;}.type-fill{height:100%;border-radius:5px;transition:width 1s ease;}.type-pct{min-width:36px;font-size:12px;font-weight:800;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}.tag-item{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;}.tag-item.good{background:var(--gl);color:var(--g);}.tag-item.weak{background:var(--rl);color:var(--r);}
.plan-card{display:flex;gap:14px;align-items:flex-start;padding:16px;background:linear-gradient(135deg,var(--oxxl),#FFF6EE);border-radius:var(--rs);border:1px solid rgba(232,119,46,.1);}.plan-icon{font-size:32px;flex-shrink:0;}.plan-text h4{font-size:15px;font-weight:800;margin-bottom:4px;}.plan-text p{font-size:13px;color:var(--tm);line-height:1.7;}
.rev-card{border:1.5px solid #ebe7e3;border-radius:var(--rs);margin-bottom:14px;overflow:hidden;}.rev-header{padding:14px 18px;background:linear-gradient(135deg,#FDFCFA,#FAF8F5);display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}.rev-header:hover{background:#F8F5F0;}.rev-icon{font-size:18px;margin-left:auto;}
.rev-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}.rev-body.open{padding:20px;max-height:3000px;}
.your-ans{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rxs);margin-bottom:14px;font-size:13px;font-weight:700;}.your-ans.right{background:var(--gl);color:#0D7A45;border:1px solid rgba(26,153,96,.15);}.your-ans.wrong{background:var(--rl);color:var(--r);border:1px solid rgba(214,59,59,.15);}
.expl-sec{margin-bottom:14px;}.expl-sec:last-child{margin-bottom:0;}.expl-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:6px;}.expl-tag.ans{background:var(--gl);color:var(--g);}.expl-tag.ref{background:var(--bl);color:var(--b);}.expl-tag.tip{background:var(--oxl);color:var(--od);}.expl-tag.wrng{background:var(--rl);color:var(--r);}.expl-tag.key{background:#FFF3E8;color:var(--od);}
.expl-box{font-size:13.5px;line-height:1.85;padding:14px 16px;background:#FAFAF8;border-radius:var(--rxs);border-left:3px solid #e0dcd8;}.expl-box.ans-b{border-left-color:var(--g);}.expl-box.ref-b{border-left-color:var(--b);}.expl-box.tip-b{border-left-color:var(--o);}.expl-box.wrng-b{border-left-color:var(--r);}.expl-box.key-b{border-left-color:var(--ol);background:var(--oxxl);}.expl-box b{color:var(--od);}.hl{background:linear-gradient(transparent 60%,rgba(232,119,46,.15) 60%);font-weight:700;}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.act-btn{padding:14px;border:2px solid #e0dcd8;border-radius:var(--rs);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;}.act-btn:hover{border-color:var(--o);color:var(--o);background:var(--oxxl);}.act-btn.primary{background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border-color:transparent;}.act-btn .act-icon{font-size:20px;}.act-btn .act-label{font-size:12px;}

<body>
<div class="grain"></div><div class="toast" id="toast"></div>

<div id="startScreen" class="screen active">
<div class="start-container">
  <div class="brand-badge">🎯 내신핏</div>

  <div class="info-card"><div class="info-card-header">📚 시험 정보</div><div class="info-rows">

    <div class="info-row"><span class="info-label">출판사</span><span class="info-value">YBM(박준언)</span></div>

  </div></div>

<script>
const EI={"subject":"공통영어1","pub":"YBM(박준언)","lesson":"3과","title":"English or Englishes?","total":100,"time":1200,"histKey":"quizH_YBM_3_20","qCount":20};

const Q=[
{
  id:1,type:'어법',diff:'보통',pts:5,fmt:'mc',
  note:`어법 ⓐ~ⓔ`,
  passage:`How would you react if you saw an English sign <u>ⓐ reading</u> "Robot Ahead" on the road while driving in South Africa? You would probably look around the front of your car for a robot that looks like a human. You would be confused momentarily, but laugh when you <u>ⓑ learned</u> that the term "robot" also means "traffic light" in South Africa. For visitors from other countries, the unique usage of this word might cause confusion and misunderstanding, but it also <u>ⓒ highlights</u> the diversity of World Englishes. English has become a widely used "lingua franca" due to its extensive usage and adoption in many countries, <u>ⓓ allowed</u> individuals who speak different native languages to communicate and understand each other. About 1.75 billion people around the world use English as a useful means of communication, due to the high demand of English in critical fields such as science, technology, business, and <u>ⓔ entertainment</u>.`,
  stem:`다음 글의 밑줄 친 ⓐ~ⓔ 중에서 <b>어법상 어색한 것</b>은?`,
  ch:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],
  ans:3,
  det:{
    ref:`[원문] ... due to its extensive usage and adoption in many countries, <b>allowed</b> individuals who speak different native languages to communicate ... [해석] 영어는 많은 국가에서 광범위하게 사용되고 채택된 덕분에 널리 쓰이는 '링구아 프랑카'가 되었으며, 서로 다른 모국어를 사용하는 사람들이 소통하고 이해할 수 있게 <b>해 주었다</b>. 여기서 <b>allowed</b>는 주절의 결과를 나타내는 분사구문이므로 능동의 현재분사 <b>allowing</b>이 와야 합니다. 과거분사 allowed는 수동의 의미이므로 어법에 맞지 않습니다.`,
    correct:`ⓐ reading: 현재분사가 앞의 명사 sign을 수식하는 분사구 → '~라고 적힌 표지판'. 능동·진행 의미이므로 현재분사 reading ✅<br>ⓑ learned: 가정법 과거 문맥(would ... laugh when you learned)에서 과거형 learned는 적절 ✅<br>ⓒ highlights: 주어 it(= the unique usage)이 3인칭 단수이므로 동사에 -s → highlights ✅<br>ⓓ allowed: 앞 주절의 결과를 나타내는 <b>분사구문</b>이므로 능동의 현재분사 <b>allowing</b>이 와야 함 → allowed ❌<br>ⓔ entertainment: and로 science, technology, business와 병렬 연결된 명사 → entertainment ✅`,
    wrongs:[],
    tip:`🔑 <b>분사구문(결과)</b>: 주절 + , + V-ing(결과) — '~하여 …하다'. 능동이면 V-ing, 수동이면 p.p.<br>비교: allowed(p.p.) = 수동 / allowing(V-ing) = 능동 결과<br>혼동 포인트: 분사구문의 의미상 주어가 주절 주어와 일치하는지 확인!`
  }
},
{
  id:2,type:'어법',diff:'어려움',pts:6,fmt:'mc',
  note:`어법 A/B/C`,
  passage:`When a language is adopted in a specific region or community, it is natural for it to undergo changes or modifications as the local people utilize the language to more accurately reflect their daily realities. The change is particularly noticeable in vocabulary. In Indian English, the term "prepone" (A) [<b>was coined / coined</b>] to mean "to reschedule" as the opposite of "postpone." Hong Kong English speakers shout "add oil" to show encouragement or support, a direct translation from a Chinese expression, (B) [<b>which / what</b>] originally meant to inject more gasoline into an engine. This evolution allows language to better match up with the everyday experiences and cultural contexts of the communities (C) [<b>that / what</b>] utilize it.`,
  stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 <b>어법에 맞는 표현</b>으로 가장 적절한 것은?`,
  ch:[`(A) was coined — (B) which — (C) that`,`(A) coined — (B) which — (C) that`,`(A) was coined — (B) what — (C) that`,`(A) was coined — (B) which — (C) what`,`(A) coined — (B) what — (C) what`],
  ans:0,
  det:{
    ref:`[원문] the term "prepone" <b>was coined</b> to mean ... / a direct translation from a Chinese expression, <b>which</b> originally meant ... / the communities <b>that</b> utilize it [해석] '프리폰'이라는 용어는 '연기하다'의 반대 의미로 '일정을 앞당기다'를 뜻하도록 <b>만들어졌다</b>. 중국어 표현에서 직접 번역한 것으로, 원래 엔진에 연료를 더 넣는다는 의미<b>였다</b>. 그 언어를 사용하는 공동체<b>의</b> 일상 경험과 문화적 맥락에 더 잘 부합하도록 해 준다.`,
    correct:`(A) was coined vs coined: 'prepone'이라는 용어는 '만들어진' 것이므로 수동태 <b>was coined</b>이 적절 ✅ — coined(능동)로 쓰면 주어 term이 스스로 만든 것이 되어 어색 ❌<br>(B) which vs what: 선행사 a Chinese expression이 있으므로 관계대명사 <b>which</b>가 적절 ✅ — what은 선행사를 포함하는 관계대명사이므로 선행사가 있을 때 사용 불가 ❌<br>(C) that vs what: 선행사 the communities가 있으므로 관계대명사 <b>that</b>이 적절 ✅ — what은 선행사 포함 관계대명사이므로 부적절 ❌`,
    wrongs:[],
    tip:`🔑 <b>수동태 vs 능동태</b>: coin(만들다) — The term was coined(수동: 용어가 만들어졌다)<br><b>which vs what</b>: 선행사 있으면 which/that, 선행사 없으면 what(= the thing which)<br>공식: 선행사 + which/that(O) / 선행사 + what(X)`
  }
},
{
  id:3,type:'어법',diff:'어려움',pts:6,fmt:'mc',
  note:`어법 ⓐ~ⓓ`,
  passage:`As these English expressions are widely used locally and gain exposure in other countries, they contribute to the expansion and <u>ⓐ diversification</u> of the English vocabulary. Moreover, English dictionaries have incorporated words <u>ⓑ borrowing</u> from foreign languages. Recently, as the Korean wave has spread globally, words related to Korean culture such as kimchi, hanbok, kimbab, and hallyu have been added to English dictionaries. As words and expressions related to Korean culture <u>ⓒ are included</u> in English dictionaries, English vocabulary is becoming more diversified and the understanding of Korean culture around the world <u>ⓓ is deepened</u>, accordingly.`,
  stem:`다음 글의 밑줄 친 ⓐ~ⓓ 중에서 <b>어법상 어색한 것</b>은?`,
  ch:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`],
  ans:1,
  det:{
    ref:`[원문] English dictionaries have incorporated words <b>borrowing</b> from foreign languages. [해석] 영어 사전들은 외국어에서 <b>빌려온</b> 단어들을 수록해 왔다. 여기서 words와 borrow의 관계는 '빌려진(수동)'이므로 과거분사 <b>borrowed</b>가 와야 합니다. 현재분사 borrowing(능동: 빌리는 중인)은 words가 스스로 빌리는 의미가 되어 어법에 맞지 않습니다.`,
    correct:`ⓐ diversification: 전치사 to 뒤에 명사가 필요하며, expansion과 and로 병렬 연결된 명사 → diversification ✅<br>ⓑ borrowing: words(단어들)는 외국어에서 '빌려진' 것이므로 수동 관계 → 과거분사 <b>borrowed</b>가 맞음 → borrowing ❌<br>ⓒ are included: 주어 words and expressions가 사전에 '포함되는' 수동 관계 → are included ✅<br>ⓓ is deepened: 주어 the understanding이 '깊어지는' 수동 관계 → is deepened ✅`,
    wrongs:[],
    tip:`🔑 <b>분사의 능동/수동 구별</b>: 수식받는 명사와 분사의 관계가 핵심!<br>• words borrowed from(빌려진 → 수동 → p.p.) ✅<br>• words borrowing from(빌리고 있는 → 능동) ❌<br>비교: the man <b>speaking</b> English(능동) / the language <b>spoken</b> worldwide(수동)`
  }
},
{
  id:4,type:'어휘',diff:'보통',pts:5,fmt:'mc',
  note:`어휘 A/B/C`,
  passage:`English has become a widely used "lingua franca" due to its extensive usage and adoption in many countries. About 1.75 billion people around the world use English as a useful means of communication, due to the high demand of English in (A) [<b>critical / trivial</b>] fields such as science, technology, business, and entertainment. Moreover, in the digital era, people are (B) [<b>exposed / immune</b>] to a vast amount of online information and resources in English on a daily basis. These factors have consistently (C) [<b>contributed / objected</b>] to the widespread use and global influence of the English language.`,
  stem:`다음 글의 (A), (B), (C)의 각 네모 안에서 <b>문맥에 맞는 낱말</b>로 가장 적절한 것은?`,
  ch:[`(A) critical — (B) exposed — (C) contributed`,`(A) trivial — (B) exposed — (C) contributed`,`(A) critical — (B) immune — (C) contributed`,`(A) critical — (B) exposed — (C) objected`,`(A) trivial — (B) immune — (C) objected`],
  ans:0,
  det:{
    ref:`[원문] due to the high demand of English in <b>critical</b> fields / people are <b>exposed</b> to a vast amount / These factors have consistently <b>contributed</b> to the widespread use [해석] 과학, 기술, 비즈니스, 엔터테인먼트와 같은 <b>중요한</b>(critical) 분야에서 영어에 대한 높은 수요 때문에 / 사람들은 방대한 양의 온라인 정보에 <b>노출된다</b>(exposed) / 이러한 요인들이 꾸준히 영어의 광범위한 사용에 <b>기여해 왔다</b>(contributed)`,
    correct:`① (A) critical — (B) exposed — (C) contributed: 모두 문맥에 적합 ✅<br>② (A) trivial(사소한): 과학·기술·비즈니스가 '사소한' 분야라는 것은 문맥과 반대 ❌<br>③ (B) immune(면역의): be immune to는 '~에 면역이 있다'로, 정보에 노출된다는 문맥과 반대 ❌<br>④ (C) objected(반대했다): object to는 '~에 반대하다'로, 영어 확산에 기여했다는 문맥과 반대 ❌<br>⑤ 모두 문맥과 반대되는 어휘 ❌`,
    wrongs:[],
    tip:`🔑 <b>critical</b> ≈ important, essential, crucial(중요한) ↔ trivial(사소한)<br><b>be exposed to</b> ≈ be subjected to(~에 노출되다) ↔ be immune to(~에 면역이다)<br><b>contribute to</b> ≈ lead to, result in(~에 기여하다) ↔ object to(~에 반대하다)`
  }
},
{
  id:5,type:'어휘',diff:'어려움',pts:6,fmt:'mc',
  note:`어휘 부적절`,
  passage:`When a language is adopted in a specific region or community, it is natural for it to undergo changes or modifications as the local people utilize the language to more accurately ① <u>reflect</u> their daily realities and cultural contexts. Linguistic change takes place across various aspects of language, including grammar, pronunciation, vocabulary, and everyday expressions. In Indian English, the term "prepone" was coined to mean "to reschedule" as the ② <u>opposite</u> of "postpone." In the Philippines, there are many houses with "dirty kitchens," which are not actually "dirty" kitchens. Instead, they refer to kitchens outside the home, where most of the cooking takes place to avoid ③ <u>trapping</u> heat and smell inside the house in a hot climate. This evolution allows language to better ④ <u>separate</u> with the everyday experiences and cultural contexts of the communities that utilize it.`,
  stem:`다음 글의 밑줄 친 ①~⑤ 중에서 <b>문맥상 낱말의 쓰임이 적절하지 않은 것</b>은?`,
  ch:[`①`,`②`,`③`,`④`,`⑤ 없음`],
  ans:3,
  det:{
    ref:`[원문] This evolution allows language to better <b>separate</b> with the everyday experiences and cultural contexts ... [해석] 이러한 진화는 언어가 그것을 사용하는 공동체의 일상 경험 및 문화적 맥락과 더 잘 <b>분리하도록</b> 해 준다. → 원문에서는 <b>match up</b>(일치하다, 부합하다)으로 쓰였으므로, separate(분리하다)는 문맥과 반대 의미입니다.`,
    correct:`① reflect(반영하다): 지역 주민들이 언어를 사용해 자신들의 일상 현실을 '반영'한다 → 문맥 적절 ✅<br>② opposite(반대): prepone이 postpone의 '반대'라는 의미 → 문맥 적절 ✅<br>③ trapping(가두다): 더운 기후에서 열과 냄새를 집 안에 '가두는' 것을 피한다 → 문맥 적절 ✅<br>④ separate(분리하다): 원문은 <b>match up</b>(부합하다)으로, 언어가 공동체의 경험과 '부합'해야 하는데 '분리'는 반대 의미 → 부적절 ❌<br>⑤ 없음: 해당 없음`,
    wrongs:[],
    tip:`🔑 <b>match up with</b> ≈ correspond to, align with(~와 부합하다/일치하다) ↔ <b>separate</b>(분리하다)<br>혼동 포인트: match up은 '어울리다, 맞다'의 의미. match와 구별: match up with = ~와 조화를 이루다`
  }
},
{
  id:6,type:'어휘',diff:'보통',pts:5,fmt:'mc',
  note:`어휘 부적절`,
  passage:`Using English expressions that ① <u>incorporate</u> the cultures of different countries, we are creating opportunities to broaden our understanding of and respect for other cultures. In this respect, English speakers around the world need to be ② <u>open</u> to other English speakers. ③ <u>Embracing</u> the diversity of English, we can build a more inclusive community of English speakers where everyone's voice is heard without ④ <u>prejudice</u> or stereotypes. English does not ⑤ <u>exclusively</u> belong to native speakers, but instead it is a language for anyone who uses it.`,
  stem:`다음 글의 밑줄 친 ①~⑤ 중에서 <b>문맥상 낱말의 쓰임이 적절하지 않은 것</b>은?`,
  ch:[`①`,`②`,`③`,`④`,`⑤`],
  ans:4,
  det:{
    ref:`[원문] English does not <b>exclusively</b> belong to native speakers ... [해석] 영어는 원어민에게 <b>독점적으로</b> 속하지 않는다. → 원문은 <b>solely</b>(오직, 오로지)를 사용했습니다. exclusively(독점적으로)도 의미가 유사하지만, 본문에서는 solely가 원래 단어입니다. 그런데 실제로 exclusively와 solely는 거의 동의어입니다. 다만 이 문항에서는 원문 대조 기준으로 solely가 정답입니다.`,
    correct:`① incorporate(통합하다, 포함하다): 다른 나라의 문화를 '포함하는' 영어 표현 → 문맥 적절 ✅<br>② open(열린): 다른 영어 사용자들에게 '열린' 태도 → 문맥 적절 ✅<br>③ Embracing(포용하며): 영어의 다양성을 '포용하면서' → 문맥 적절 ✅<br>④ prejudice(편견): 편견이나 고정관념 없이 → 문맥 적절 ✅<br>⑤ exclusively(독점적으로): 원문은 <b>solely</b>(오직)를 사용. 하지만 이 문항에서 핵심은 원문 대조입니다. 두 단어의 미묘한 뉘앙스 차이 주목 ❌`,
    wrongs:[],
    tip:`🔑 <b>solely</b> ≈ only, merely(오직, ~만) — 소유/귀속의 한정<br><b>exclusively</b> ≈ only for a particular group(독점적으로) — 배타적 사용 강조<br>시험 팁: 원문 단어와 다른 유의어로 바꿔 놓은 문항 → 원문 암기 필수!`
  }
},
{
  id:7,type:'대의',diff:'보통',pts:5,fmt:'mc',
  note:`주제`,
  passage:`English has become a widely used "lingua franca" due to its extensive usage and adoption in many countries, allowing individuals who speak different native languages to communicate and understand each other. As English ability grows in different nations, various English varieties have emerged worldwide, including Singaporean English, Korean English, Indian English, and others. Previously, British English and American English were considered the standard models. However, it is important to note that American English was initially seen as a regional variation rather than a standard form. As a result, we now refer to the different varieties of English as "Englishes," not simply "English."`,
  stem:`다음 글의 <b>주제</b>로 가장 적절한 것은?`,
  ch:[`the difficulty of learning English as a second language`,`the emergence and recognition of diverse English varieties worldwide`,`the superiority of British English over other English varieties`,`the decline of English as a global communication tool`,`the history of American English becoming a standard language`],
  ans:1,
  det:{
    ref:`[원문] As English ability grows in different nations, various English varieties have emerged worldwide ... we now refer to the different varieties of English as "Englishes," not simply "English." [해석] 다양한 국가에서 영어 능력이 성장함에 따라 전 세계적으로 다양한 영어 변종이 등장했다. 우리는 이제 영어의 다양한 변종을 단순히 '영어'가 아닌 '영어들'이라고 부른다. 이 글은 영어가 전 세계적으로 다양한 변종으로 발전하고 인정받고 있음을 설명합니다.`,
    correct:`① 제2언어로서 영어 학습의 어려움 — 글에서 학습 어려움은 언급되지 않음 ❌<br>② 전 세계적으로 다양한 영어 변종의 등장과 인정 — 다양한 Englishes의 출현과 인정이 핵심 주제 ✅<br>③ 영국 영어의 다른 변종에 대한 우월성 — 오히려 미국 영어도 원래 지역 변종이었다고 설명 ❌<br>④ 글로벌 소통 도구로서 영어의 쇠퇴 — 1.75 billion이 사용한다는 내용과 반대 ❌<br>⑤ 미국 영어가 표준어가 된 역사 — 미국 영어는 지역 변종으로 시작했다는 부분적 내용일 뿐 ❌`,
    wrongs:[],
    tip:`🔑 주제 파악: 반복 키워드(varieties, Englishes, different) → 다양성 강조<br>오답 패턴: ③ 일부 내용의 과장·왜곡, ⑤ 세부 내용을 주제로 착각<br>풀이 전략: 첫 문장과 마지막 문장에서 주제문(topic sentence) 찾기`
  }
},
{
  id:8,type:'대의',diff:'보통',pts:5,fmt:'mc',
  note:`제목`,
  passage:`When a language is adopted in a specific region or community, it is natural for it to undergo changes or modifications as the local people utilize the language to more accurately reflect their daily realities and cultural contexts. In Indian English, the term "prepone" was coined to mean "to reschedule" as the opposite of "postpone." Hong Kong English speakers shout "add oil" to show encouragement or support, a direct translation from a Chinese expression. In the Philippines, there are many houses with "dirty kitchens," which are not actually "dirty" kitchens. Instead, they refer to kitchens outside the home, where most of the cooking takes place to avoid trapping heat and smell inside the house in a hot climate.`,
  stem:`다음 글의 <b>제목</b>으로 가장 적절한 것은?`,
  ch:[`How English Adapts to Local Cultures`,`The Challenges of Learning Regional English`,`Why English Should Remain Unchanged`,`Cooking Traditions Around the World`,`The Decline of Standard English`],
  ans:0,
  det:{
    ref:`[원문] When a language is adopted in a specific region, it is natural for it to undergo changes ... to more accurately reflect their daily realities and cultural contexts. [해석] 한 언어가 특정 지역에서 채택되면, 그 지역 사람들의 일상적 현실과 문화적 맥락을 더 정확하게 반영하기 위해 변화를 겪는 것은 자연스러운 일이다. 이 글은 prepone, add oil, dirty kitchen 등 구체적 사례를 통해 영어가 각 지역 문화에 맞게 적응하는 과정을 보여줍니다.`,
    correct:`① 영어가 지역 문화에 적응하는 방식 — prepone(인도), add oil(홍콩), dirty kitchen(필리핀) 등 지역 문화에 맞는 변화 사례 ✅<br>② 지역 영어 학습의 어려움 — 학습 난이도가 아니라 언어 변화가 주제 ❌<br>③ 영어는 변하지 말아야 하는 이유 — 오히려 변화가 자연스럽다고 설명 ❌<br>④ 세계의 요리 전통 — dirty kitchen은 예시일 뿐, 요리가 주제 아님 ❌<br>⑤ 표준 영어의 쇠퇴 — 쇠퇴가 아닌 다양화를 설명 ❌`,
    wrongs:[],
    tip:`🔑 제목 = 주제의 핵심을 압축한 표현<br>키워드: adopted, undergo changes, reflect daily realities → 적응(Adapt)<br>오답 패턴: ④ 세부 예시를 전체 주제로 확대 해석`
  }
},
{
  id:9,type:'대의',diff:'어려움',pts:6,fmt:'mc',
  note:`시사점`,
  passage:`Using English expressions that incorporate the cultures of different countries, we are creating opportunities to broaden our understanding of and respect for other cultures. In this respect, English speakers around the world need to be open to other English speakers. Embracing the diversity of English, we can build a more inclusive community of English speakers where everyone's voice is heard without prejudice or stereotypes. English does not solely belong to native speakers, but instead it is a language for anyone who uses it.`,
  stem:`다음 글을 통해 필자가 궁극적으로 전달하고자 하는 <b>시사점</b>으로 가장 적절한 것은?`,
  ch:[`원어민의 영어를 기준으로 영어 교육을 강화해야 한다.`,`영어의 다양성을 포용하여 편견 없는 포용적 언어 공동체를 만들어야 한다.`,`영어 사용을 줄이고 각 나라의 고유 언어를 보존해야 한다.`,`영어를 배우는 것보다 모국어를 잘하는 것이 더 중요하다.`,`영어의 변종이 늘어나면 의사소통에 혼란이 생긴다.`],
  ans:1,
  det:{
    ref:`[원문] Embracing the diversity of English, we can build a more inclusive community of English speakers where everyone's voice is heard without prejudice or stereotypes. English does not solely belong to native speakers, but instead it is a language for anyone who uses it. [해석] 영어의 다양성을 포용함으로써, 편견이나 고정관념 없이 모든 사람의 목소리가 들리는 보다 포용적인 영어 사용자 공동체를 만들 수 있다. 영어는 원어민에게만 속하는 것이 아니라 그것을 사용하는 모든 사람을 위한 언어이다.`,
    correct:`① 원어민 영어 기준 교육 강화 — 원어민 소유가 아니라고 했으므로 반대 ❌<br>② 영어의 다양성을 포용하여 편견 없는 포용적 공동체 구축 — 핵심 시사점과 정확히 일치 ✅<br>③ 영어 사용 감소·고유 언어 보존 — 영어 다양성을 긍정하는 글이므로 부적절 ❌<br>④ 모국어가 영어보다 중요 — 글의 논점과 무관 ❌<br>⑤ 변종 증가로 의사소통 혼란 — 혼란이 아니라 포용과 이해를 강조 ❌`,
    wrongs:[],
    tip:`🔑 시사점 문항: 마지막 단락의 주장·결론에 주목!<br>키워드: <b>inclusive community</b>, <b>without prejudice</b>, <b>for anyone</b><br>핵심 메시지: 영어 다양성 포용 → 포용적 공동체 → 모두의 언어`
  }
},
{
  id:10,type:'일치',diff:'쉬움',pts:3,fmt:'mc',
  note:`일치`,
  passage:`English has become a widely used "lingua franca" due to its extensive usage and adoption in many countries, allowing individuals who speak different native languages to communicate and understand each other. About 1.75 billion people around the world use English as a useful means of communication, due to the high demand of English in critical fields such as science, technology, business, and entertainment. Moreover, in the digital era, people are exposed to a vast amount of online information and resources in English on a daily basis.`,
  stem:`다음 글의 내용과 <b>일치하는</b> 것은?`,
  ch:[`전 세계에서 약 17억 5천만 명이 영어를 의사소통 수단으로 사용한다.`,`영어는 과학 분야에서만 주로 사용된다.`,`디지털 시대에 영어 정보는 거의 찾아볼 수 없다.`,`영어는 오직 영어를 모국어로 하는 사람들만 사용한다.`,`영어는 최근 사용이 감소하고 있다.`],
  ans:0,
  det:{
    ref:`[원문] About 1.75 billion people around the world use English as a useful means of communication [해석] 전 세계적으로 약 17억 5천만 명의 사람들이 영어를 유용한 의사소통 수단으로 사용한다. 이 내용은 선택지 ①과 정확히 일치합니다.`,
    correct:`① 약 17억 5천만 명이 영어를 의사소통 수단으로 사용 — 원문의 1.75 billion과 일치 ✅<br>② 과학 분야에서만 사용 — science, technology, business, entertainment 등 여러 분야 ❌<br>③ 디지털 시대에 영어 정보를 찾기 어려움 — a vast amount of online information이라고 했으므로 반대 ❌<br>④ 모국어 화자만 사용 — different native languages를 가진 사람들이 소통한다고 했으므로 ❌<br>⑤ 사용 감소 — widespread use, global influence로 확산 중 ❌`,
    wrongs:[],
    tip:`🔑 일치 문항: 숫자·범위·정도를 정확히 대조!<br>1.75 billion = 약 17억 5천만 / critical fields(복수!) = 여러 분야<br>오답 패턴: ② '~에서만'으로 범위 축소, ③ 반대 의미로 왜곡`
  }
},
{
  id:11,type:'불일치',diff:'보통',pts:5,fmt:'mc',
  note:`불일치`,
  passage:`In Indian English, the term "prepone" was coined to mean "to reschedule" as the opposite of "postpone." For instance, if a meeting scheduled for Thursday is moved to Wednesday, it is considered "preponed." Hong Kong English speakers shout "add oil" to show encouragement or support, a direct translation from a Chinese expression, which originally meant to inject more gasoline into an engine. In the Philippines, there are many houses with "dirty kitchens," which are not actually "dirty" kitchens. Instead, they refer to kitchens outside the home, where most of the cooking takes place to avoid trapping heat and smell inside the house in a hot climate.`,
  stem:`다음 글의 내용과 <b>일치하지 않는</b> 것은?`,
  ch:[`인도 영어에서 prepone은 postpone의 반대 의미로 만들어졌다.`,`목요일로 예정된 회의가 수요일로 옮겨지면 preponed된 것이다.`,`홍콩 영어의 add oil은 중국어 표현을 직역한 것이다.`,`add oil은 원래 자동차 엔진 오일을 교환한다는 뜻이었다.`,`필리핀의 dirty kitchen은 실제로 더러운 부엌이 아니라 집 밖의 부엌을 가리킨다.`],
  ans:3,
  det:{
    ref:`[원문] which originally meant to inject more gasoline into an engine [해석] 원래는 엔진에 더 많은 <b>가솔린(휘발유)</b>을 주입한다는 의미였다. 선택지 ④는 '엔진 오일을 교환한다'고 했으므로 원문과 일치하지 않습니다. 원문은 gasoline(휘발유)이지 engine oil(엔진 오일)이 아닙니다.`,
    correct:`① prepone은 postpone의 반대 의미 — the opposite of postpone이라고 명시 ✅<br>② 목→수 이동 = preponed — Thursday→Wednesday = preponed라고 설명 ✅<br>③ add oil은 중국어 직역 — a direct translation from a Chinese expression ✅<br>④ 자동차 엔진 오일 교환 — 원문은 <b>gasoline(가솔린/휘발유)</b>을 inject(주입)하는 것이지, oil(오일)을 교환하는 것이 아님 → 불일치 ❌<br>⑤ dirty kitchen = 집 밖 부엌 — kitchens outside the home ✅`,
    wrongs:[],
    tip:`🔑 불일치 문항: 미세한 단어 차이에 주목!<br><b>gasoline</b>(가솔린/휘발유) ≠ <b>engine oil</b>(엔진 오일)<br><b>inject</b>(주입하다) ≠ 교환하다<br>오답 함정: 비슷한 자동차 관련 용어로 착각 유도`
  }
},
{
  id:12,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',
  note:`빈칸(구)`,
  passage:`As these English expressions are widely used locally and gain exposure in other countries, they contribute to the expansion and diversification of the English vocabulary. Moreover, English dictionaries have incorporated words borrowed from foreign languages. Some of the most popular English words borrowed from foreign languages include established terms such as tsunami, emoji, and origami in Japanese. Hygge in Danish and kiosk in Turkish have also gained worldwide currency among English speakers. Recently, as the Korean wave has spread globally, words related to Korean culture such as kimchi, hanbok, kimbab, and hallyu have been added to English dictionaries. In this way, foreign languages __________ English.`,
  stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch:[`have replaced the need for`,`have limited the global reach of`,`enrich`,`complicate the grammar of`,`prevent the spread of`],
  ans:2,
  det:{
    ref:`[원문] Foreign Languages Enrich English (소제목) / they contribute to the expansion and diversification of the English vocabulary [해석] 외국어들이 영어를 <b>풍요롭게 한다</b>. 외국어에서 차용된 단어들이 영어 사전에 등록되면서 영어 어휘가 확대·다양화되고 있다는 내용이므로, 빈칸에는 '풍요롭게 하다(enrich)'가 가장 적절합니다.`,
    correct:`① have replaced the need for(필요성을 대체) — 영어의 필요성 대체가 아닌 어휘 확장 ❌<br>② have limited the global reach of(전 세계 도달 범위 제한) — 오히려 확장 ❌<br>③ enrich(풍요롭게 하다) — 외국어 차용으로 영어 어휘가 풍부해진다는 핵심 내용 ✅<br>④ complicate the grammar of(문법을 복잡하게) — 어휘 확장이지 문법 복잡화 아님 ❌<br>⑤ prevent the spread of(확산을 막다) — 오히려 전파에 기여 ❌`,
    wrongs:[],
    tip:`🔑 빈칸(구) 전략: 글의 소제목과 반복 표현 활용!<br>소제목 'Foreign Languages <b>Enrich</b> English'가 직접적 단서<br><b>enrich</b> ≈ make richer, enhance(풍요롭게 하다)<br>근거: expansion, diversification, added to dictionaries → 풍요로움`
  }
},
{
  id:13,type:'빈칸',diff:'어려움',pts:6,fmt:'mc',
  note:`빈칸(문장)`,
  passage:`How would you react if you saw an English sign reading "Robot Ahead" on the road while driving in South Africa? You would probably look around the front of your car for a robot that looks like a human. You would be confused momentarily, but laugh when you learned that the term "robot" also means "traffic light" in South Africa. For visitors from other countries, the unique usage of this word might cause confusion and misunderstanding, but it also __________.`,
  stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,
  ch:[`proves that English is too difficult to learn for foreigners`,`highlights the diversity of World Englishes, the different varieties of the English language used around the world`,`shows that South African English is superior to other varieties`,`suggests that all English varieties should be standardized`,`demonstrates that English vocabulary is shrinking over time`],
  ans:1,
  det:{
    ref:`[원문] but it also highlights the diversity of World Englishes, the different varieties of the English language used around the world [해석] 그것은 또한 전 세계에서 사용되는 영어의 다양한 변종인 세계 영어들의 다양성을 <b>부각시킨다</b>. robot=traffic light이라는 독특한 용법이 혼란을 줄 수도 있지만, 동시에 세계 영어의 다양성을 보여준다는 역접 구조입니다.`,
    correct:`① 외국인에게 영어가 너무 어렵다는 증거 — 어려움이 아닌 다양성이 주제 ❌<br>② 세계 영어의 다양성을 부각 — 원문과 정확히 일치하는 내용 ✅<br>③ 남아공 영어의 우월성 — 우열이 아닌 다양성을 논함 ❌<br>④ 모든 변종을 표준화해야 한다 — 다양성 존중이 주제이므로 반대 ❌<br>⑤ 영어 어휘가 줄어들고 있다 — 오히려 확장되고 있음 ❌`,
    wrongs:[],
    tip:`🔑 빈칸(문장) 전략: <b>but also</b> 역접·추가 연결에 주목!<br>앞: confusion and misunderstanding(부정적) → but also → 긍정적 측면(다양성 부각)<br><b>highlight</b> ≈ emphasize, underscore(강조하다, 부각시키다)`
  }
},
{
  id:14,type:'함축',diff:'보통',pts:5,fmt:'mc',
  note:`함축`,
  passage:`In the Philippines, there are many houses with "dirty kitchens," which are not actually "dirty" kitchens. Instead, they refer to kitchens outside the home, where most of the cooking takes place to avoid trapping heat and smell inside the house in a hot climate. This evolution allows language to better match up with the everyday experiences and cultural contexts of the communities that utilize it.`,
  stem:`다음 글에서 밑줄 친 <b>"dirty kitchens"</b>이 의미하는 바로 가장 적절한 것은?`,
  ch:[`위생 상태가 불량한 부엌`,`더운 기후를 피해 집 밖에 마련한 별도의 요리 공간`,`음식물 쓰레기를 처리하는 장소`,`청소가 필요한 실내 주방`,`손님을 대접하지 않는 개인 주방`],
  ans:1,
  det:{
    ref:`[원문] they refer to kitchens outside the home, where most of the cooking takes place to avoid trapping heat and smell inside the house in a hot climate [해석] 그것들은 집 밖의 부엌을 가리키며, 더운 기후에서 열과 냄새가 집 안에 갇히는 것을 피하기 위해 대부분의 요리가 이루어지는 곳이다. 즉, 'dirty kitchen'은 실제로 더러운 것이 아니라 <b>더운 기후 때문에 집 밖에 따로 마련된 요리 공간</b>을 의미합니다.`,
    correct:`① 위생 불량 부엌 — not actually dirty라고 명시 ❌<br>② 집 밖의 별도 요리 공간 — kitchens outside the home, 더운 기후에서 열/냄새 방지 ✅<br>③ 음식물 쓰레기 처리 장소 — 쓰레기 처리와 무관 ❌<br>④ 청소 필요 실내 주방 — 실내가 아닌 집 밖 ❌<br>⑤ 손님 대접 안 하는 개인 주방 — 손님 대접과 무관 ❌`,
    wrongs:[],
    tip:`🔑 함축 의미 파악: 따옴표("")로 묶인 표현은 특수한 의미 암시!<br>단서: not actually dirty + Instead + kitchens outside the home<br>핵심: 문자적 의미(dirty=더러운)가 아닌 문화적 의미(야외 부엌)`
  }
},
{
  id:15,type:'순서',diff:'보통',pts:5,fmt:'mc',
  note:`순서`,
  passage:`<b>[주어진 글]</b> In 1828, an American lawyer and author Noah Webster published "An American Dictionary of the English Language" with a goal of providing America with its own version of the English language.<br><br><b>(A)</b> However, Webster argued that these words captured American variations of English, distinguishing American English from British English.<br><b>(B)</b> Most dictionaries in Webster's day dictated how English words should be used rather than documenting the way people actually used English in daily life. In his dictionary, Webster broke this convention and sought to describe the way Americans spoke.<br><b>(C)</b> When he included informal words in his dictionary, critics accused him of polluting the English language.`,
  stem:`주어진 글 다음에 이어질 글의 <b>순서</b>로 가장 적절한 것은?`,
  ch:[`(A)-(B)-(C)`,`(A)-(C)-(B)`,`(B)-(C)-(A)`,`(B)-(A)-(C)`,`(C)-(B)-(A)`],
  ans:2,
  det:{
    ref:`[해석] [주어진 글] 1828년, 미국의 변호사이자 작가인 노아 웹스터가 미국만의 영어 버전을 제공한다는 목표로 사전을 출판했다. → (B) 당시 대부분의 사전은 사용법을 지시했지 실제 사용을 기록하지 않았다. 웹스터는 이 관행을 깨고 미국인들의 실제 말투를 기술하려 했다. → (C) 비격식 단어를 포함하자 비평가들이 그를 영어 오염이라고 비난했다. → (A) 그러나 웹스터는 이 단어들이 미국적 변형을 포착한 것이라고 주장했다.`,
    correct:`① (A)-(B)-(C) — However로 시작하는 (A)가 맨 앞에 오면 역접 대상 없음 ❌<br>② (A)-(C)-(B) — 같은 이유 ❌<br>③ (B)-(C)-(A) — 배경(B) → 비난(C) → 반박(A, However) 논리 완벽 ✅<br>④ (B)-(A)-(C) — (B) 뒤에 바로 However는 논리적 연결 부자연스러움 ❌<br>⑤ (C)-(B)-(A) — 비난(C)이 먼저 나오면 배경 설명 없어 어색 ❌`,
    wrongs:[],
    tip:`🔑 순서 배열 전략: <b>담화 표지(discourse markers)</b> 활용!<br><b>However</b>(역접) → 앞에 반대 내용 필요 → critics accused(비난) 뒤에 However(반박)<br>논리 흐름: 배경 설명 → 행동 → 비판 → 반박(However)<br>공식: 주어진 글(도입) → (B)배경+행동 → (C)비판 → (A)However 반박`
  }
},
{
  id:16,type:'무관',diff:'쉬움',pts:3,fmt:'mc',

{

  note:`서술형(요약)`,
  passage:`English has become a widely used "lingua franca" due to its extensive usage and adoption in many countries. As English ability grows in different nations, various English varieties have emerged worldwide, including Singaporean English, Korean English, Indian English, and others. Previously, British English and American English were considered the standard models. However, it is important to note that American English was initially seen as a regional variation rather than a standard form. As a result, we now refer to the different varieties of English as "Englishes," not simply "English."`,

    correct:`첫 번째 빈칸: adopt → 수동태 문맥(is ___) → <b>adopted</b> ✅<br>두 번째 빈칸: emerge → 현재완료(have ___) → <b>emerged</b> ✅<br>세 번째 빈칸: diverse → 형용사 자리(these ___ forms) → <b>diverse</b>(변형 불필요) ✅`,

    tip:`🔑 어형 변환 포인트:<br>• adopt → adopted(과거분사, 수동태 is adopted)<br>• emerge → emerged(과거분사, 현재완료 have emerged)<br>• diverse → diverse(형용사 그대로, 명사 앞 수식)`

  note:`서술형(영작)`,
  passage:`Using English expressions that incorporate the cultures of different countries, we are creating opportunities to broaden our understanding of and respect for other cultures. In this respect, English speakers around the world need to be open to other English speakers. Embracing the diversity of English, we can build a more inclusive community of English speakers where everyone's voice is heard without prejudice or stereotypes.`,
  stem:`다음 우리말과 같은 뜻이 되도록 주어진 단어를 활용하여 빈칸을 완성하시오.<br><br><b>[조건]</b><br>• 주어진 단어를 모두 사용하되, 필요시 어형을 변환할 것<br>• 5단어 이내로 쓸 것<br><br><b>[보기]</b> embrace / diversity<br><br>"영어의 다양성을 포용함으로써, 우리는 더 포용적인 공동체를 만들 수 있다."<br><br>__________ of English, we can build a more inclusive community.`,

const QCOUNT=Q.length;
let S={cur:0,ans:new Array(QCOUNT).fill(null),start:null,left:EI.time,ti:null};
function getHistory(){try{return JSON.parse(localStorage.getItem(EI.histKey)||'[]')}catch(e){return[]}}
function saveToHistory(r,elapsed){const h=getHistory();h.push({name:document.getElementById('inpName').value.trim(),school:document.getElementById('inpSchool').value.trim(),grade:document.getElementById('inpGrade').value,score:r.score,total:EI.total,correct:r.correct,wrong:r.wrong,unanswered:r.unanswered,time:fmtTime(elapsed),date:new Date().toLocaleDateString('ko-KR'),level:getLevel(r.score).name,pct:Math.round(r.correct/QCOUNT*100)});try{localStorage.setItem(EI.histKey,JSON.stringify(h))}catch(e){}updateHCount();}
function updateHCount(){document.getElementById('hCount').textContent=getHistory().length;}
function toggleHistory(){const p=document.getElementById('historyPanel');if(p.style.display==='block'){p.style.display='none';return;}const h=getHistory();if(!h.length)p.innerHTML='<p style="text-align:center;color:var(--tl);padding:20px;font-size:14px">아직 기록이 없습니다.</p>';else p.innerHTML=h.slice(-5).reverse().map(r=>`<div class="history-item"><div class="hi-left"><div class="hi-name">${r.name}</div><div class="hi-meta">${r.date} · ${r.time}</div></div><div class="hi-right"><div class="hi-score">${r.score}점</div><div class="hi-level">${r.level}</div></div></div>`).join('');p.style.display='block';}
updateHCount();
function getLevel(s){if(s>=95)return{name:'Challenger',icon:'👑',range:'95~100',msg:'완벽에 가까운 실력!'};if(s>=90)return{name:'Diamond',icon:'💎',range:'90~94',msg:'최상위! 틀린 문항만 점검하세요.'};if(s>=80)return{name:'Gold',icon:'🏆',range:'80~89',msg:'통과! 약한 유형을 집중 복습하면 최상위.'};if(s>=60)return{name:'Silver',icon:'🥈',range:'60~79',msg:'조금만 더! 오답 해설을 꼼꼼히.'};if(s>=40)return{name:'Bronze',icon:'🥉',range:'40~59',msg:'기본기를 다지면 크게 향상됩니다.'};return{name:'Iron',icon:'⚔️',range:'0~39',msg:'지문 해석부터 완벽히 익히세요.'};}
function fmtTime(s){return`${Math.floor(s/60)}분 ${s%60}초`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function startExam(){if(!document.getElementById('inpName').value.trim()){alert('이름을 입력해주세요.');return;}S={cur:0,ans:new Array(QCOUNT).fill(null),start:Date.now(),left:EI.time,ti:null};showScreen('examScreen');renderQ();renderDots();startTimer();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderQ(){const el=document.getElementById('examScroll');let h='';Q.forEach((q,i)=>{const tc='tag-'+q.type;h+=`<div class="q-card" id="qc-${i}"><div class="q-header"><div class="q-num">${q.id}</div><span class="q-type-tag ${tc}">${q.type}</span><div class="q-meta"><span class="q-diff">${q.diff}</span><span class="q-pts">${q.pts}점</span></div></div><div class="q-body"><div class="q-passage"><span class="label">📖 ${q.note}</span>${q.passage}</div><div class="q-stem">${q.stem}</div>`;if(q.fmt==='mc'){h+=`<div class="choices">`;q.ch.forEach((c,ci)=>h+=`<button class="choice-btn" data-q="${i}" data-c="${ci}" onclick="sel(${i},${ci})"><span class="c-num">${q.ch.length===2?(ci===0?'T':'F'):'①②③④⑤'[ci]}</span><span>${c}</span></button>`);h+=`</div>`;}if(q.fmt==='written')h+=`<textarea class="written-input" id="w-${i}" placeholder="답안을 입력하세요..." oninput="sw(${i})"></textarea>`;h+=`</div></div>`;});el.innerHTML=h;}
function renderDots(){document.getElementById('navDots').innerHTML=Array.from({length:QCOUNT},(_,i)=>`<button class="nav-dot" onclick="scrollToQ(${i})">${i+1}</button>`).join('');upDots();}
function upDots(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.classList.toggle('current',i===S.cur);d.classList.toggle('answered',S.ans[i]!==null&&i!==S.cur);});}
function scrollToQ(i){if(i<0||i>=QCOUNT)return;S.cur=i;document.getElementById(`qc-${i}`).scrollIntoView({behavior:'smooth',block:'center'});upDots();}
function sel(qi,ci){document.querySelectorAll(`.choice-btn[data-q="${qi}"]`).forEach(b=>b.classList.remove('selected'));document.querySelector(`.choice-btn[data-q="${qi}"][data-c="${ci}"]`).classList.add('selected');S.ans[qi]=ci;upDots();}
function sw(qi){S.ans[qi]=document.getElementById(`w-${qi}`).value.trim()||null;upDots();}
function startTimer(){const el=document.getElementById('timer');S.ti=setInterval(()=>{S.left--;const m=Math.floor(S.left/60),s=S.left%60;el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',S.left<=300&&S.left>60);el.classList.toggle('danger',S.left<=60);if(S.left<=0){clearInterval(S.ti);submitExam();}},1000);}
function submitExam(){if(!confirm('제출하시겠습니까?'))return;clearInterval(S.ti);const elapsed=Math.floor((Date.now()-S.start)/1000);const r=grade();saveToHistory(r,elapsed);renderResults(r,elapsed);showScreen('resultScreen');}
function grade(){let score=0,correct=0,wrong=0,unanswered=0;const details=[];Q.forEach((q,i)=>{const a=S.ans[i];let ok=false;if(a===null)unanswered++;else if(q.fmt==='mc')ok=a===q.ans;else{const u=String(a).trim().toLowerCase().replace(/[!.]/g,'');if(q.accept)ok=q.accept.some(x=>u===x.toLowerCase().replace(/[!.]/g,''));if(!ok&&q.wa)ok=u===q.wa.toLowerCase().replace(/[!.]/g,'');}if(a!==null){if(ok){correct++;score+=q.pts;}else wrong++;}details.push({q,ans:a,ok,pts:ok?q.pts:0});});return{score,correct,wrong,unanswered,details};}
function generateFeedback(r){const pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t);const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t);let fb=[];weakTypes.forEach(([type,data])=>{const p=Math.round(data.o/data.t*100);fb.push(`⚠️ [${type}] 정답률 ${p}% — 이 유형을 집중 복습하세요.`);});r.details.forEach(d=>{if(!d.ok)fb.push(`📌 ${d.q.id}번(${d.q.type}) 오답 — ${d.q.det.tip||'해설을 확인하세요.'}`)});if(pct>=95)fb.unshift('🏆 거의 완벽! 심화 문제로 도전하세요.');else if(pct>=80)fb.unshift('✅ 통과! 틀린 유형만 집중 복습하면 최상위.');else if(pct>=60)fb.unshift('💪 조금만 더! 오답 해설을 꼼꼼히 읽고 반복.');else fb.unshift('📖 기본기부터! 지문 정독 → 문법·어휘 정리.');if(perfectTypes.length)fb.push(`🌟 만점 유형: ${perfectTypes.map(([k])=>k).join(', ')}`);return fb;}
function renderResults(r,elapsed){const pass=r.score>=80,nm=document.getElementById('inpName').value.trim(),sc=document.getElementById('inpSchool').value.trim(),gr=document.getElementById('inpGrade').value,lv=getLevel(r.score),pct=r.score;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0,pts:0,mx:0};typeMap[t].t++;typeMap[t].mx+=d.q.pts;if(d.ok){typeMap[t].o++;typeMap[t].pts+=d.q.pts;}});const perfectTypes=Object.entries(typeMap).filter(([,v])=>v.o===v.t).map(([k])=>k);const weakTypes=Object.entries(typeMap).filter(([,v])=>v.o<v.t).map(([k])=>k);const fb=generateFeedback(r);
let h=`<div class="r-hero ${pass?'pass':'fail'}"><div class="r-badge ${pass?'pass':'fail'}">${pass?'🎉 통과!':'📚 미통과'}</div><div class="r-score">${r.score}<sup>/100</sup></div><div class="r-stats"><span class="stat-item">✅ 정답 <strong>${r.correct}</strong>/${QCOUNT}</span><span class="stat-item">❌ 오답 <strong>${r.wrong}</strong></span><span class="stat-item">⬜ 미응답 <strong>${r.unanswered}</strong></span><span class="stat-item">⏱️ <strong>${fmtTime(elapsed)}</strong></span></div></div><div class="rc">`;
h+=`<div class="rs"><div class="rs-title">📋 기본 정보</div><div class="info-grid"><div class="info-cell"><div class="ic-label">이름</div><div class="ic-value">${nm}</div></div><div class="info-cell"><div class="ic-label">학교/학년</div><div class="ic-value">${sc||'미입력'} · ${gr}</div></div><div class="info-cell"><div class="ic-label">시험 범위</div><div class="ic-value">${EI.subject} · ${EI.pub} · ${EI.lesson}</div></div><div class="info-cell"><div class="ic-label">응시일</div><div class="ic-value">${new Date().toLocaleDateString('ko-KR')}</div></div><div class="info-cell highlight"><div class="ic-label">점수</div><div class="ic-value">${r.score}점 (${pct}%)</div></div><div class="info-cell highlight"><div class="ic-label">소요시간/통과</div><div class="ic-value">${fmtTime(elapsed)} / <span style="color:${pass?'var(--g)':'var(--r)'}">${pass?'통과 ✅':'미통과 ❌'}</span></div></div></div></div>`;
h+=`<div class="rs"><div class="rs-title">🏅 레벨</div><div class="level-card"><div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-range">${lv.range}점 구간</div><div class="level-bar"><div class="level-bar-fill" style="width:${pct}%"></div></div><div class="level-msg">${lv.msg}</div></div></div>`;
h+=`<div class="rs"><div class="rs-title">📊 유형별 분석</div>`;Object.entries(typeMap).forEach(([type,d])=>{const p=Math.round(d.o/d.t*100);const c=p>=80?'var(--g)':p>=50?'var(--o)':'var(--r)';h+=`<div class="type-row"><span class="type-label">${type}</span><div class="type-track"><div class="type-fill" style="width:${p}%;background:${c}"></div></div><span class="type-pct" style="color:${c}">${p}%</span></div>`;});if(perfectTypes.length)h+=`<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--g);margin-bottom:6px">🌟 만점 유형</div><div class="tag-list">${perfectTypes.map(t=>`<span class="tag-item good">${t}</span>`).join('')}</div></div>`;if(weakTypes.length)h+=`<div style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:6px">⚠️ 보완 필요</div><div class="tag-list">${weakTypes.map(t=>`<span class="tag-item weak">${t}</span>`).join('')}</div></div>`;h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">📝 학습 플랜</div><div class="plan-card">`;if(pct>=95)h+=`<div class="plan-icon">🏅</div><div class="plan-text"><h4>완벽에 가까운 실력!</h4><p>심화 문제로 도전하세요.</p></div>`;else if(pct>=80)h+=`<div class="plan-icon">📈</div><div class="plan-text"><h4>통과! 더 올릴 수 있어요</h4><p>${weakTypes.join(', ')} 유형을 집중 복습하면 최상위.</p></div>`;else if(pct>=60)h+=`<div class="plan-icon">💪</div><div class="plan-text"><h4>조금만 더!</h4><p>오답 해설을 꼼꼼히 확인하세요.</p></div>`;else h+=`<div class="plan-icon">📖</div><div class="plan-text"><h4>기본기를 다지는 시간!</h4><p>지문 정독 → 핵심 문법·어휘 정리.</p></div>`;h+=`</div></div>`;
h+=`<div class="rs"><div class="rs-title">💬 보완 피드백</div>`;fb.forEach(f=>{const isW=f.startsWith('⚠️'),isP=f.startsWith('📌'),isS=f.startsWith('🌟');const bg=isW?'var(--rl)':isP?'var(--oxl)':isS?'var(--gl)':'#F8F7F5';const bd=isW?'var(--r)':isP?'var(--o)':isS?'var(--g)':'#e0dcd8';h+=`<div style="padding:10px 14px;background:${bg};border-left:3px solid ${bd};border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13px;line-height:1.7">${f}</div>`;});h+=`</div>`;
h+=`<div class="rs"><div class="rs-title">🚀 액션</div><div class="action-grid"><button class="act-btn" onclick="retake()"><span class="act-icon">🔄</span><span class="act-label">재시험</span></button><button class="act-btn" onclick="shareResult()"><span class="act-icon">📋</span><span class="act-label">결과 공유</span></button><button class="act-btn primary" onclick="goHome()"><span class="act-icon">🏠</span><span class="act-label">홈으로</span></button></div></div>`;
h+=`<div class="rs"><div class="rs-title">📝 정답과 해설 <span style="font-size:12px;color:var(--tl);font-weight:500;margin-left:8px">클릭하여 펼치기</span></div>`;
r.details.forEach((d,i)=>{const icon=d.ok?'✅':(d.ans===null?'⬜':'❌');const tc='tag-'+d.q.type;h+=`<div class="rev-card"><div class="rev-header" onclick="document.getElementById('rv-${i}').classList.toggle('open')"><div class="q-num" style="width:30px;height:30px;font-size:13px">${d.q.id}</div><span class="q-type-tag ${tc}" style="font-size:10px;padding:3px 9px">${d.q.type}</span><span style="font-size:12px;color:var(--tl)">${d.q.diff}·${d.q.pts}점</span><span class="rev-icon">${icon}</span></div><div class="rev-body" id="rv-${i}">`;
if(d.q.fmt==='mc'){if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else if(d.ans!==null)h+=`<div class="your-ans wrong">❌ 내 답: ${d.q.ch.length===2?(d.ans===0?'T':'F'):'①②③④⑤'[d.ans]} ${d.q.ch[d.ans]}</div>`;else h+=`<div class="your-ans wrong">⬜ 미응답</div>`;}else{if(d.ok)h+=`<div class="your-ans right">✅ 정답!</div>`;else h+=`<div class="your-ans wrong">${d.ans?'❌ 내 답: '+d.ans:'⬜ 미응답'}</div>`;}
h+=`<div class="expl-sec"><div class="expl-tag ans">✅ 정답</div><div class="expl-box ans-b">${d.q.fmt==='mc'?`<b>${d.q.ch.length===2?(d.q.ans===0?'T':'F'):'①②③④⑤'[d.q.ans]} ${d.q.ch[d.q.ans]}</b>`:`<b>${d.q.wa}</b>`}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag ref">📖 근거</div><div class="expl-box ref-b">${d.q.det.ref}</div></div>`;
h+=`<div class="expl-sec"><div class="expl-tag tip">💡 풀이</div><div class="expl-box tip-b">${d.q.det.correct}</div></div>`;
if(d.q.det.wrongs&&d.q.det.wrongs.length&&d.q.det.wrongs[0]!=='')h+=`<div class="expl-sec"><div class="expl-tag wrng">❌ 오답</div><div class="expl-box wrng-b">${d.q.det.wrongs.map(w=>`<div style="margin-bottom:4px">${w}</div>`).join('')}</div></div>`;
if(d.q.det.tip)h+=`<div class="expl-sec"><div class="expl-tag key">🔑 핵심</div><div class="expl-box key-b">${d.q.det.tip}</div></div>`;
h+=`</div></div>`;});h+=`</div></div>`;
document.getElementById('resultScreen').innerHTML=h;const fw=r.details.findIndex(d=>!d.ok);if(fw>=0)setTimeout(()=>{const el=document.getElementById(`rv-${fw}`);if(el)el.classList.add('open');},500);window._lastResult=r;window._lastElapsed=elapsed;}
function shareResult(){const r=window._lastResult;const elapsed=window._lastElapsed;if(!r)return;const nm=document.getElementById('inpName').value.trim();const sc=document.getElementById('inpSchool').value.trim();const gr=document.getElementById('inpGrade').value;const lv=getLevel(r.score);const pass=r.score>=80;const typeMap={};r.details.forEach(d=>{const t=d.q.type;if(!typeMap[t])typeMap[t]={t:0,o:0};typeMap[t].t++;if(d.ok)typeMap[t].o++;});let txt=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 온라인퀴즈 TEST 결과\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n\n`;txt+=`📚 ${EI.subject} · ${EI.pub} · ${EI.lesson}\n`;txt+=`📖 ${EI.title}\n\n`;txt+=`👤 이름: ${nm}\n`;if(sc)txt+=`🏫 학교: ${sc} · ${gr}\n`;txt+=`📅 응시일: ${new Date().toLocaleDateString('ko-KR')}\n`;txt+=`⏱️ 소요시간: ${fmtTime(elapsed)}\n\n`;txt+=`🏆 ${lv.icon} ${lv.name} (${lv.range}점)\n`;txt+=`📊 ${r.score}점 / 100점  ${pass?'✅ 통과':'❌ 미통과'}\n`;txt+=`✅ 정답 ${r.correct}개  ❌ 오답 ${r.wrong}개  ⬜ 미응답 ${r.unanswered}개\n\n`;txt+=`━━━━━━━━━━━━━━━━━━━━\n`;txt+=`🎯 내신핏 온라인퀴즈 TEST\n`;txt+=`━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(txt).then(()=>{toast('📋 결과가 클립보드에 복사되었습니다!');}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 결과가 클립보드에 복사되었습니다!');});}
function retake(){startExam();}function goHome(){showScreen('startScreen');updateHCount();}
